t an internal auditor decide not to retest an IAM process when evaluating a federated resource?","options_en":{"A":"Nonrepudiation ensures actions can be verified.","B":"Control inheritance ensures previously tested controls remain effective.","C":"Least privilege minimizes unnecessary access.","D":"Mechanized ID eliminates manual errors."},"correct":"B","explanation_en":"Choice \"B\" is correct. Control inheritance allows reliance on prior testing of controls applied across federated systems."},{"id":"M3_U1_Q102","num":102,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"Which of the following cybersecurity risks is noteworthy for its social engineering– related abuse potential, achieved using deceptive email communications designed to obtain sensitive personal data from employees, customers, and others?","options_en":{"A":"Phishing.","B":"Spooling.","C":"Spamming.","D":"Pharming."},"correct":"A","explanation_en":"Choice \"A\" is correct. Phishing is a social engineering scam meant to trick the recipient of an email into believing that the originator is a trustworthy person or organization even though the message is from another party. The intent is to deceive people into disclosing information such as credit card numbers, bank account information, passwords, or other sensitive information."},{"id":"M3_U1_Q103","num":103,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"When planning a cybersecurity engagement for a company, what is the most important initial step to address potential risks and ensure the organization’s information security?","options_en":{"A":"Recognize existing and emerging cybersecurity risks, assess relevant IT general controls, and develop a strategy based on industry best practices.","B":"Focus solely on emerging cybersecurity risks without considering existing threats or internal controls.","C":"Implement a new IT control framework without reviewing the organization’s current data privacy policies.","D":"Prioritize the development of a data security policy before considering IT general controls or privacy requirements."},"correct":"A","explanation_en":"Choice \"A\" is correct. Recognizing both existing and emerging cybersecurity risks, assessing IT general controls, and developing a strategy based on industry best practices is a comprehensive approach. This ensures the identification of all relevant threats and the application of appropriate controls to protect the organization’s information systems."},{"id":"M3_U1_Q104","num":104,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"What is the best practice to ensure that system software remains effective against cyber intrusions?","options_en":{"A":"Maintain standard baselines.","B":"Use configuration management software.","C":"Conduct periodic audit system software configurations.","D":"Apply patches."},"correct":"D","explanation_en":"Choice \"D\" is correct. Applying patches promptly addresses vulnerabilities and keeps system software secure."},{"id":"M3_U1_Q105","num":105,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"Which of the following is considered a physical security control?","options_en":{"A":"System servers are secured by locking mechanisms with access granted to specific individuals.","B":"Failed system login attempts are recorded and analyzed to identify potential security incidents.","C":"Transaction logs are maintained to capture a history of system processing.","D":"System security settings require the use of strong passwords and access controls."},"correct":"A","explanation_en":"Choice \"A\" is correct. A physical security control protects physical assets like servers, ensuring they are physically secured and accessible only to authorized individuals. Locking mechanisms directly address the need to safeguard hardware against unauthorized access, making it a clear example of a physical security control. The other options focus on logical or system-level controls rather than physical measures."},{"id":"M3_U1_Q106","num":106,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"Which of the following is the strongest two-factor authentication control?","options_en":{"A":"Requiring a password and government-issued photo ID.","B":"Requiring a password and employee ID card or badge.","C":"Requiring a password and fingerprint.","D":"B.Requiring a password and employee ID card or badge. C.Requiring a password and fingerprint. D.Requiring a password and answers to two personal security questions."},"correct":"C","explanation_en":"Choice \"C\" is correct. Combining a password with a biometric factor like a fingerprint provides the strongest two-factor authentication devido a to its reliance on both knowledge and possession of unique traits."},{"id":"M3_U1_Q107","num":107,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"Which of the following is an example of a physical security control that should be in place at an organization's data center?","options_en":{"A":"Swipe cards are used to access the data center.","B":"Backup servers in the data center are stored in an environmentally controlled location.","C":"Firewalls and antivirus protection are in place to prevent unauthorized access to data.","D":"All users have a unique ID and password to access data."},"correct":"A","explanation_en":"Choice \"A\" is correct. Physical access to the data center can be restricted through the use of swipe cards."},{"id":"M3_U2_Q1","num":1,"total":52,"module":"M3","unit":"U2","topic":"Analytical Approaches and Process Mapping Techniques","question_en":"An auditor is evaluating the efficiency of an order-to-cash process. What is the best way to define the workflow segments?","options_en":{"A":"Comparing the process to a different department’s workflow.","B":"Focusing only on completed transactions rather than mapping the entire process.","C":"Breaking the process into steps such as order entry, invoicing, and payment processing.","D":"Gathering customer feedback on satisfaction with the payment process."},"correct":"C","explanation_en":"Choice \"C\" is correct. Defining workflow segments involves breaking down the process into its chave operational stages."},{"id":"M3_U2_Q2","num":2,"total":52,"module":"M3","unit":"U2","topic":"Analytical Approaches and Process Mapping Techniques","question_en":"Which of the following is true of systems flowcharts?","options_en":{"A":"They demonstrar only computer processing, not manual processing.","B":"They are generally kept up-to-date for systems changes.","C":"They are a good guide to potential segregation of duties.","D":"They demonstrar specific edit tests and batch control reconciliations that are implemented."},"correct":"C","explanation_en":"Choice \"C\" is correct. Systems flowcharts demonstrar segregation of duties and the transfer of data between different segments in the organization."},{"id":"M3_U2_Q3","num":3,"total":52,"module":"M3","unit":"U2","topic":"Analytical Approaches and Process Mapping Techniques","question_en":"An internal auditor is assessing the effectiveness of the organization's collection policy. The auditor computes the receivables turnover ratio and converts it into days, and the result is 42 days. Which of the following is the most appropriate next step for the auditor to take?","options_en":{"A":"Compare the results of the computations with the organization's credit term period.","B":"Compute the acid-test ratio, as the additional computation is needed in order to reach a conclusion.","C":"Assess the collection policy as effective, as receivables are collected every six weeks.","D":"Assess the organization's liquidity risk as average-to-high, devido a to the extended collection period."},"correct":"A","explanation_en":"Choice \"A\" is correct. Forty-two days alone says nothing as it is not known in which industry the company operates and what the industry's average collection period is. However, the general rule analysts often apply is that the collection period should not greatly exceed the credit term period (the time allowed for payment). Therefore, it is too early to draw conclusions, but the auditor should look up the collection policy and determine where 42 days stands in relation to it."},{"id":"M3_U2_Q4","num":4,"total":52,"module":"M3","unit":"U2","topic":"Analytical Approaches and Process Mapping Techniques","question_en":"Which of the following best describes the purpose of performing analytical procedures?","options_en":{"A":"To test for completeness of recorded information.","B":"To verify the correctness of calculations.","C":"To compare recorded information with expectations.","D":"To test for overstatements of recorded amounts."},"correct":"C","explanation_en":"Choice \"C\" is correct. The primary purpose of analytical procedures is to identify inconsistencies or unusual patterns by comparing recorded data against expected values, trends, or benchmarks. This helps auditors assess the reasonableness of financial information and identify areas requiring further investigation, rather than directly testing for overstatements, completeness, or calculation accuracy."},{"id":"M3_U2_Q5","num":5,"total":52,"module":"M3","unit":"U2","topic":"Analytical Approaches and Process Mapping Techniques","question_en":"In which of the following examples would sampling risk likely be the highest?","options_en":{"A":"The internal auditor failed to recognize a control deviation.","B":"The internal auditor tested 25% of a population.","C":"The internal auditor tested 85% of a population.","D":"The internal auditor misinterpreted sampling results."},"correct":"B","explanation_en":"Choice \"B\" is correct. Sampling risk is highest when a smaller portion of the population (e.g., 25%) is tested, as it increases the likelihood that the sample may not be representative of the entire population, potentially leading to inaccurate conclusions."},{"id":"M3_U2_Q6","num":6,"total":52,"module":"M3","unit":"U2","topic":"Analytical Approaches and Process Mapping Techniques","question_en":"An internal auditor aims to test authorizations of purchase invoices. The process is automated and thoroughly controlled by the finance department. The auditor wants to avoid excessive sampling. Which of the following sampling approaches would be the most appropriate?","options_en":{"A":"Stratified attribute sampling.","B":"Discovery sampling.","C":"Snowball sampling.","D":"Stop-and-go sampling."},"correct":"D","explanation_en":"Choice \"D\" is correct. Stop-and-go sampling is the most appropriate method for minimizing sample size while testing authorizations in an automated and thoroughly controlled process."},{"id":"M3_U2_Q7","num":7,"total":52,"module":"M3","unit":"U2","topic":"Analytical Approaches and Process Mapping Techniques","question_en":"Which of the following ratios would be the best measure of a customer's liquidity when an internal auditor wants to determine if the customer will likely be able to pay an account receivable created just prior to the statement of financial position (balance sheet) date?","options_en":{"A":"Debt ratio.","B":"Quick ratio.","C":"Current ratio.","D":"Cash ratio."},"correct":"B","explanation_en":"Choice \"B\" is correct. The quick ratio measures an organization's capacidade to meet its short-term debt obligations with its most liquid assets."},{"id":"M3_U2_Q8","num":8,"total":52,"module":"M3","unit":"U2","topic":"Analytical Approaches and Process Mapping Techniques","question_en":"When determining earnings per share (EPS) with a complex capital structure, which of the following is shared by both the if-converted method for convertibles and the treasury stock method for options and warrants?","options_en":{"A":"Both result in a change to the denominator but not the numerator for calculating EPS.","B":"Both consider the impact of antidilutive securities in their formula.","C":"Both result in a change to the numerator but not the denominator for calculating EPS.","D":"Both assume that dilutive securities are converted at the start of the period or as soon as they were issued."},"correct":"D","explanation_en":"Choice \"D\" is correct. Both methods assume that dilutive securities are converted at the beginning of the period or when issued, ensuring consistency in calculating EPS."},{"id":"M3_U2_Q9","num":9,"total":52,"module":"M3","unit":"U2","topic":"Analytical Approaches and Process Mapping Techniques","question_en":"Which of the following can reflect the effectiveness of a firm's personnel department?","options_en":{"A":"Comparison over time of the average number of days from the date the approved vacant position requisition is received until the date the new hire starts to work.","B":"Ratio of total hiring costs to the total number of hires.","C":"Ratio of the number of job offers accepted to the number of job offers extended.","D":"Ratio of employees hired at entry level in year 1 and still employed with the firm in year 5 compared to the total number of employees hired at entry level in year 1."},"correct":"D","explanation_en":"Choice \"D\" is correct. Retention of employees over time indicates the effectiveness of recruitment, onboarding, and employee satisfaction initiatives."},{"id":"M3_U2_Q10","num":10,"total":52,"module":"M3","unit":"U2","topic":"Analytical Approaches and Process Mapping Techniques","question_en":"Which of the following would be the appropriate analytical approach when comparing the number of employees working at a factory site with the direct cost of production each month over a period of one year?","options_en":{"A":"Ratio analysis.","B":"Trend analysis.","C":"Horizontal analysis.","D":"Regression analysis."},"correct":"D","explanation_en":"Choice \"D\" is correct. Ratio, trend, and regression analysis are examples of analytical procedures that may be used during engagement planning. Regression analysis compares relations among two or more financial or nonfinancial variables over a period of time."},{"id":"M3_U2_Q11","num":11,"total":52,"module":"M3","unit":"U2","topic":"Analytical Approaches and Process Mapping Techniques","question_en":"An internal auditor is reviewing the customer complaint resolution process. What is the most effective way to define workflow segments?","options_en":{"A":"Outlining steps such as complaint intake, investigation, resolution, and follow-up.","B":"Reviewing historical service metrics and summarizing overall complaint trends.","C":"Gathering customer feedback to assess perceptions of response time and issue resolution.","D":"Identifying only complaints related to refunds and categorizing their resolution process."},"correct":"A","explanation_en":"Choice \"A\" is correct. Defining workflow segments requires outlining chave process steps to ensure structured analysis and improvement."},{"id":"M3_U2_Q12","num":12,"total":52,"module":"M3","unit":"U2","topic":"Analytical Approaches and Process Mapping Techniques","question_en":"A company uses customer feedback surveys with multiple-choice responses. How should this data be categorized?","options_en":{"A":"Aggregated data, since responses are collected from multiple users.","B":"Open-ended data, as customers express their opinions in a free-text format.","C":"Subjective data, since customer opinions can vary significantly.","D":"Structured data, because responses are predefined and can be quantified."},"correct":"D","explanation_en":"Choice \"D\" is correct. Multiple-choice survey responses are structured data, as they follow a consistent format that allows easy aggregation and analysis."},{"id":"M3_U2_Q13","num":13,"total":52,"module":"M3","unit":"U2","topic":"Analytical Approaches and Process Mapping Techniques","question_en":"An organization relies on numerous applications that run on a variety of operating systems, collecting data in a variety of databases. Which of the following obstacles related to accuracy of data is most likely faced by the organization's internal audit function when performing data analytics?","options_en":{"A":"Difficulty in analyzing entire data populations devido a to restricted access.","B":"Inadvertent modification of different formats of data during the conversion process.","C":"Incapacidade of generalized data software to import and export data for audit tests.","D":"Delayed analytical results leading to erroneous conclusions and recommendations."},"correct":"B","explanation_en":"Choice \"B\" is correct. When data is collected from multiple applications and databases with varying formats, converting it into a unified structure for analysis may inadvertently alter the data. This poses a significant challenge to data accuracy, making it the most likely obstacle for the internal audit function. The other options address potential issues but are less directly tied to the accuracy of data in such a scenario."},{"id":"M3_U2_Q14","num":14,"total":52,"module":"M3","unit":"U2","topic":"Analytical Approaches and Process Mapping Techniques","question_en":"Which of the following tools would be most appropriate for assigning and clarifying distinct duties for individuals on a project team?","options_en":{"A":"A Pareto chart.","B":"A PERT chart.","C":"A RACI chart.","D":"A Gantt chart."},"correct":"C","explanation_en":"Choice \"C\" is correct. A RACI chart is specifically designed to assign and clarify distinct roles and responsibilities among team members."},{"id":"M3_U2_Q15","num":15,"total":52,"module":"M3","unit":"U2","topic":"Analytical Approaches and Process Mapping Techniques","question_en":"An internal auditor wants to search for anomalies in a set of data. Which of the following analytical procedures would be most useful for the auditor?","options_en":{"A":"Budget to actual comparisons.","B":"Benchmarking.","C":"Forecasts.","D":"Ratio comparison."},"correct":"D","explanation_en":"Choice \"D\" is correct. Ratio comparison is a useful analytical procedure for identifying anomalies by comparing chave financial or operational metrics, enabling auditors to detect trends or outliers in the data."},{"id":"M3_U2_Q16","num":16,"total":52,"module":"M3","unit":"U2","topic":"Analytical Approaches and Process Mapping Techniques","question_en":"Which of the following would be the best analytical procedure to identify if the cost of some materials installed on capital projects may have been transferred to the inventory account?","options_en":{"A":"Analyzing a sample of capital transactions each quarter to detect instances in which installed materials are transferred to inventory.","B":"Identifying variances between amounts capitalized each month and the capital budget.","C":"Reviewing journal entries that transfer costs from capital to inventory accounts.","D":"Comparing inventory receipts with debits to the inventory account and investigating discrepancies."},"correct":"C","explanation_en":"Choice \"C\" is correct. Reviewing journal entries that transfer costs from capital to inventory accounts would focus on the problem of inappropriate transfers."},{"id":"M3_U2_Q17","num":17,"total":52,"module":"M3","unit":"U2","topic":"Analytical Approaches and Process Mapping Techniques","question_en":"An internal auditor is conducting an assurance audit of a manufacturing facility. Senior management wants to know if organizational goals related to reducing waste and energy consumption have been achieved. Which analytical technique should the internal auditor use?","options_en":{"A":"Functional benchmarking.","B":"Trend analysis.","C":"Variance analysis.","D":"Ratio analysis."},"correct":"C","explanation_en":"Choice \"C\" is correct. Variance analysis compares actual performance with planned targets, making it ideal for assessing whether goals like reducing waste and energy consumption have been met."},{"id":"M3_U2_Q18","num":18,"total":52,"module":"M3","unit":"U2","topic":"Analytical Approaches and Process Mapping Techniques","question_en":"Which of the following accurately describes the proper order of steps for an internal auditor to use when analyzing data?","options_en":{"A":"Obtain the data; clean and normalize the data; define the question; analyze the data.","B":"Define the question; obtain the data; analyze the data; clean and normalize the data.","C":"Obtain the data; analyze the data; clean and normalize the data; define the question.","D":"Define the question; obtain the data; clean and normalize the data; analyze the data."},"correct":"D","explanation_en":"Choice \"D\" is correct. This sequence ensures a logical, efficient, and effective approach to data analysis, beginning with a clear objective and ending with actionable insights derived from properly prepared data."},{"id":"M3_U2_Q19","num":19,"total":52,"module":"M3","unit":"U2","topic":"Analytical Approaches and Process Mapping Techniques","question_en":"Which of the following methods should an internal auditor use to ensure that each payment processed during the audited period has the same probcapacidade of being selected for testing?","options_en":{"A":"Judgmental sampling.","B":"Stratified sampling.","C":"Convenience sampling.","D":"Random sampling."},"correct":"D","explanation_en":"Choice \"D\" is correct. Random sampling ensures that every payment processed during the audited period has an equal probcapacidade of selection, reducing selection bias and supporting statistically valid conclusions."},{"id":"M3_U2_Q20","num":20,"total":52,"module":"M3","unit":"U2","topic":"Analytical Approaches and Process Mapping Techniques","question_en":"Which of the following approaches could be used with both statistical and nonstatistical sampling methods?","options_en":{"A":"Judgmental sampling.","B":"Random sampling.","C":"Discovery sampling.","D":"Test of one sample."},"correct":"B","explanation_en":"Choice \"B\" is correct. Random sampling is a versatile approach that can be applied in both statistical and nonstatistical sampling methods. It ensures that each item in the population has an equal chance of selection, which helps to reduce bias and improve the relicapacidade of conclusions drawn from the sample."},{"id":"M3_U2_Q21","num":21,"total":52,"module":"M3","unit":"U2","topic":"Analytical Approaches and Process Mapping Techniques","question_en":"Which is the best analytical method to apply if an internal auditor wants to compare the employee turnover rate in his organization with the average employee turnover rate in the same industry?","options_en":{"A":"Regression analysis.","B":"Benchmarking.","C":"Root cause analysis.","D":"Ratio analysis."},"correct":"B","explanation_en":"Choice \"B\" is correct. Benchmarking would compare the organization’s turnover rates with industry averages, helping identify discrepancies or areas for improvement in employee retention practices."},{"id":"M3_U2_Q22","num":22,"total":52,"module":"M3","unit":"U2","topic":"Analytical Approaches and Process Mapping Techniques","question_en":"An internal auditor performs a comparison of complaints received to similar complaint rates in the same industry as part of performing a risk assessment. Which of the following techniques is the internal auditor employing?","options_en":{"A":"Forecasting.","B":"Trend analysis.","C":"Benchmarking.","D":"Horizontal analysis."},"correct":"C","explanation_en":"Choice \"C\" is correct. Benchmarking compares organizational data, such as complaint rates, against industry standards or peers to identify performance gaps and inform risk assessments or process improvements."},{"id":"M3_U2_Q23","num":23,"total":52,"module":"M3","unit":"U2","topic":"Analytical Approaches and Process Mapping Techniques","question_en":"Which of the sets of data attributes best enable the internal auditor to take advantage of the possibilities of data analytics?","options_en":{"A":"Validity, velocity, variety, and veracity.","B":"Volume, velocity, variety, and veracity.","C":"Volume, validity, variety, and veracity.","D":"Volume, velocity, validity, and veracity."},"correct":"B","explanation_en":"Choice \"B\" is correct. Volume, velocity, variety, and veracity are the foundational attributes that enable robust data analytics."},{"id":"M3_U2_Q24","num":24,"total":52,"module":"M3","unit":"U2","topic":"Analytical Approaches and Process Mapping Techniques","question_en":"During an annual operational review, an internal auditor notes that sales and inventory are unchanged, while gross margin has increased significantly. Which of the following areas should the internal auditor investigate first to determine the cause of the gross margin increase?","options_en":{"A":"Modifications to advertising strategy.","B":"Changes in customer base.","C":"Inefficiencies in manufacturing operations.","D":"Fluctuations in costs of raw materials."},"correct":"D","explanation_en":"Choice \"D\" is correct. Gross margin is directly influenced by the relationship between sales revenue and the cost of goods sold (COGS). If sales and inventory levels remain constant while the gross margin increases, the most likely cause is a change in the costs of raw materials, which affects the COGS. Investigating this area first provides the most direct insight into the observed variance. The other options are less likely to have an immediate impact on gross margin in this scenario."},{"id":"M3_U2_Q25","num":25,"total":52,"module":"M3","unit":"U2","topic":"Analytical Approaches and Process Mapping Techniques","question_en":"Which of the following sampling approaches would be most appropriate for an internal auditor to use if the auditor suspects fraud in a complex cash and bank transaction process?","options_en":{"A":"Random sampling.","B":"Haphazard sampling.","C":"Discovery sampling.","D":"Stratified attribute sampling."},"correct":"C","explanation_en":"Choice \"C\" is correct. Discovery sampling is most suitable for identifying fraud in high- risk or complex areas, as it focuses on detecting specific instances of errors or irregularities."},{"id":"M3_U2_Q26","num":26,"total":52,"module":"M3","unit":"U2","topic":"Analytical Approaches and Process Mapping Techniques","question_en":"Which of the following is the first step an internal audit function should undertake when executing a data analytics process?","options_en":{"A":"Conduct a risk assessment regarding the effectiveness of the data analytics process.","B":"Analyze possible and available sources of raw data for the data analytics process.","C":"Define the purpose and the anticipated value of the data analytics process.","D":"Select data for cleaning and normalization procedures in the data analytics process."},"correct":"C","explanation_en":"Choice \"C\" is correct. Defining the purpose and anticipated value of a data analytics process allows for cohesive process planning, including the determination of required data sources."},{"id":"M3_U2_Q27","num":27,"total":52,"module":"M3","unit":"U2","topic":"Analytical Approaches and Process Mapping Techniques","question_en":"Which of the following statements is true of audit evidence?","options_en":{"A":"A copy of an original document is as reliable as the original document.","B":"Physical observation provides the most reliable evidence of the existence of accounts receivable.","C":"An appropriate conclusion about a population based on a sample requires that the sample be representative of the population.","D":"Purchase orders are relevant evidence that goods paid for have been received."},"correct":"C","explanation_en":"Choice \"C\" is correct. Representativeness of the sample is critical for drawing valid conclusions about the entire population, ensuring relicapacidade of audit findings."},{"id":"M3_U2_Q28","num":28,"total":52,"module":"M3","unit":"U2","topic":"Analytical Approaches and Process Mapping Techniques","question_en":"All other things held constant, external capital requirements are lower for firms with which characteristic?","options_en":{"A":"Firms with higher sales growth rates.","B":"Firms with lower capital intensity ratios.","C":"Firms with lower earnings retention ratios.","D":"Firms with lower profit margins."},"correct":"B","explanation_en":"Choice \"B\" is correct. The capital intensity ratio is the amount of assets required per dollar of sales. External financial requirements are lower if the capital intensity ratio is low, because this means sales can grow rapidly without much outside capital, when other things are held constant."},{"id":"M3_U2_Q29","num":29,"total":52,"module":"M3","unit":"U2","topic":"Analytical Approaches and Process Mapping Techniques","question_en":"An internal auditor is using data analytics during an audit engagement. After determining the integrity of the data, which is the appropriate next step for the internal auditor to perform?","options_en":{"A":"Conduct a risk assessment.","B":"Inventory the data.","C":"Analyze the data.","D":"Examine data access and protection."},"correct":"C","explanation_en":"Choice \"C\" is correct. After verifying the integrity of the data, the next logical step is to analyze it to derive meaningful insights and identify patterns, trends, or anomalies. Data analysis is the core purpose of using data analytics in an audit and follows directly after ensuring the data is accurate and reliable. The other options are preparatory steps or focus on unrelated aspects."},{"id":"M3_U2_Q30","num":30,"total":52,"module":"M3","unit":"U2","topic":"Analytical Approaches and Process Mapping Techniques","question_en":"Which of the following is an example of the usage of unstructured data in an organization?","options_en":{"A":"The organization's sales department analyzes customer social media postings and tailors personalized sales offers based on them.","B":"The organization screens for potential employee conflicts of interests in a database of the commercial register.","C":"The organization's payments to vendors are regularly reviewed for anomalies in the accounts payable ledger.","D":"The organization monitors access logs to IT systems in order to identify security breaches."},"correct":"A","explanation_en":"Choice \"A\" is correct. Unstructured data refers to information that does not have a predefined format, such as social media postings, emails, images, or videos. Analyzing customer social media postings involves processing unstructured data to gain insights, making this the best example. The other options involve structured data, which is organized into predefined formats like databases or logs."},{"id":"M3_U2_Q31","num":31,"total":52,"module":"M3","unit":"U2","topic":"Analytical Approaches and Process Mapping Techniques","question_en":"When a high percentage of an organization's total cost is fixed, what is the impact on the organization's operating leverage?","options_en":{"A":"The organization's operating leverage will be high.","B":"The organization's operating level cannot be determined based on fixed costs alone. It also depends on the sales volume and the contribution margin.","C":"The organization's operating leverage will be low.","D":"The organization's operating leverage will be moderate, reflecting a balance between fixed and variable costs."},"correct":"A","explanation_en":"Choice \"A\" is correct. High fixed costs result in high operating leverage, amplifying the impact of changes in sales on profitcapacidade."},{"id":"M3_U2_Q32","num":32,"total":52,"module":"M3","unit":"U2","topic":"Analytical Approaches and Process Mapping Techniques","question_en":"A company wants to analyze gargalos in its inventory management process. What is the best way to define workflow segments?","options_en":{"A":"Comparing inventory practices across unrelated industries.","B":"Conducting random inventory counts without mapping the process.","C":"Surveying warehouse employees about their job satisfaction.","D":"Breaking down activities such as receiving, storage, and order fulfillment."},"correct":"D","explanation_en":"Choice \"D\" is correct. Defining workflow segments by chave activities allows for targeted analysis of inefficiencies."},{"id":"M3_U2_Q33","num":33,"total":52,"module":"M3","unit":"U2","topic":"Analytical Approaches and Process Mapping Techniques","question_en":"Which of the following is the main criterion when an internal auditor is deciding between the use of statistical and non-statistical sampling?","options_en":{"A":"Results of a cost-benefit assessment.","B":"Outcome of risk and control assessment.","C":"Requirement of audit evidence.","D":"Non-sampling audit risk."},"correct":"A","explanation_en":"Choice \"A\" is correct. The choice between statistical and non-statistical sampling depends on weighing the cost against the benefits of each approach."},{"id":"M3_U2_Q34","num":34,"total":52,"module":"M3","unit":"U2","topic":"Analytical Approaches and Process Mapping Techniques","question_en":"Which of the following describes a common approach used during judgmental sampling?","options_en":{"A":"Include some large or unusual items in the sample.","B":"Define expected and acceptable error rates.","C":"Use a systematic selection method.","D":"Focus on present, not past operations."},"correct":"A","explanation_en":"Choice \"A\" is correct. One common approach used during judgmental sampling is to include some large or unusual items in the sample. Selecting large items allows auditors to cover more risk, and selecting unusual items gives auditors more chances to find some errors."},{"id":"M3_U2_Q35","num":35,"total":52,"module":"M3","unit":"U2","topic":"Analytical Approaches and Process Mapping Techniques","question_en":"An internal auditor is reviewing the organization's authentication policies and procedures for users accessing their online accounts. Given the complexity of the authentication process, the internal auditor needs to document the process in a way that is easy for other readers of the workpaper to understand. Which of the following would best help the auditor with effective process documentation?","options_en":{"A":"Process maps.","B":"Flowcharts.","C":"Narratives.","D":"Risk and control matrices."},"correct":"B","explanation_en":"Choice \"B\" is correct. Flowcharts effectively document complex processes in a visual format, making them easier for others to understand when reviewing workpapers."},{"id":"M3_U2_Q36","num":36,"total":52,"module":"M3","unit":"U2","topic":"Analytical Approaches and Process Mapping Techniques","question_en":"An internal auditor is analyzing a company’s procurement process using process mapping. What is the most effective first step?","options_en":{"A":"Comparing procurement practices with an unrelated department’s workflow.","B":"Identifying chave process steps, decision points, and responsible parties.","C":"Reviewing only high value purchase orders without mapping the entire process.","D":"Interviewing employees to understand their opinions on procurement."},"correct":"B","explanation_en":"Choice \"B\" is correct. The first step in process mapping is defining chave steps, decision points, and roles to create a structured workflow."},{"id":"M3_U2_Q37","num":37,"total":52,"module":"M3","unit":"U2","topic":"Analytical Approaches and Process Mapping Techniques","question_en":"An auditor is reviewing the expense reimbursement process and uses process mapping to identify inefficiencies. What should be analyzed?","options_en":{"A":"The total number of reimbursement requests submitted each quarter.","B":"Employee feedback about how quickly they receive reimbursements.","C":"The sequence of steps, approval points, and potential delays.","D":"Only the final payment of reimbursements without examining prior steps."},"correct":"C","explanation_en":"Choice \"C\" is correct. Process mapping helps identify inefficiencies by examining step sequences, decision points, and gargalos."},{"id":"M3_U2_Q38","num":38,"total":52,"module":"M3","unit":"U2","topic":"Analytical Approaches and Process Mapping Techniques","question_en":"Why is residual income often preferred over return on investment (ROI) as a performance evaluation?","options_en":{"A":"The imputed interest rate used in calculating residual income is more easily derived than the target rate that is compared to the calculated ROI.","B":"Residual income is a measure over time, while ROI represents the results for a single time period.","C":"Average investment is employed with residual income, while year-end investment is employed with ROI.","D":"Residual income concentrates on maximizing absolute dollars of income rather than a percentage return as with ROI."},"correct":"D","explanation_en":"Choice \"D\" is correct. Residual income concentrates on earnings in excess of the minimum desired return. With ROI, a segment may reject a project that exceeds the minimum return if the project will decrease the segment's overall ROI. For example, a project that earns an ROI of 22%, which is greater than the target rate of 20%, might be rejected if the segment is currently earning 25%, because the project will decrease the segment's ROI. This would not occur with residual income."},{"id":"M3_U2_Q39","num":39,"total":52,"module":"M3","unit":"U2","topic":"Analytical Approaches and Process Mapping Techniques","question_en":"Which of the following analytical procedures is commonly used to evaluate an organization's financial statements for reasoncapacidade?","options_en":{"A":"Ratio analysis.","B":"Root cause analysis.","C":"Regression analysis.","D":"Statistical correlation."},"correct":"A","explanation_en":"Choice \"A\" is correct. Calculating financial ratios can be reviewed for reasonableness, or it can be compared to prior periods, internal or external benchmarks, or some other independent source of information (e.g., P/E ratio, debt-equity ratio, etc.)"},{"id":"M3_U2_Q40","num":40,"total":52,"module":"M3","unit":"U2","topic":"Analytical Approaches and Process Mapping Techniques","question_en":"Which of the following is an example of benchmarking?","options_en":{"A":"Comparing the internal control system of the company with the systems of other exemplary companies.","B":"Examining accounts for large, unexplained variances from the budget.","C":"Measuring performance against established goals.","D":"Reviewing financial statements to compare the company's current performance with that of previous years."},"correct":"A","explanation_en":"Choice \"A\" is correct. Benchmarking is a form of analysis in which you compare information against similar industries or organizational units. Comparing the internal control system with that of other exemplary companies is an example of benchmarking."},{"id":"M3_U2_Q41","num":41,"total":52,"module":"M3","unit":"U2","topic":"Analytical Approaches and Process Mapping Techniques","question_en":"An organization is heavily invested in mortgage-backed securities at a time when real estate prices are falling sharply. Which of the following ratios, if calculated from the most recently issued financial statements, might be the most misleading?","options_en":{"A":"Market-to-book-value ratio.","B":"Book value per common share ratio.","C":"Price/earnings (P/E) ratio.","D":"Dividend payout ratio."},"correct":"B","explanation_en":"Choice \"B\" is correct. The book value per common share ration depends on historical costs and does not reflect the declining market value of mortgage-backed securities, making it misleading in the context of falling real estate prices."},{"id":"M3_U2_Q42","num":42,"total":52,"module":"M3","unit":"U2","topic":"Analytical Approaches and Process Mapping Techniques","question_en":"Which of the following analytical approaches should an internal auditor use if the objective of an engagement is to evaluate the organization's competitiveness in the market?","options_en":{"A":"Benchmarking.","B":"Profitcapacidade analysis.","C":"Regression analysis.","D":"Trend analysis."},"correct":"A","explanation_en":"Choice \"A\" is correct. Benchmarking compares the organization’s performance metrics with industry standards or competitors, making it the most appropriate method to evaluate market competitiveness."},{"id":"M3_U2_Q43","num":43,"total":52,"module":"M3","unit":"U2","topic":"Analytical Approaches and Process Mapping Techniques","question_en":"An internal audit manager assigns an audit team to test purchase transactions by selecting a sample of transactions processed by each of the three procurement officers. Which of the following techniques will help the audit team achieve this sampling objective?","options_en":{"A":"Stop-or-go sampling.","B":"Stratified sampling.","C":"Discovery sampling.","D":"Systematic sampling."},"correct":"B","explanation_en":"Choice \"B\" is correct. Stratified sampling allows auditors to divide the population into distinct groups (e.g., procurement officers) to ensure each group is adequately represented in the sample, aligning with the audit objective."},{"id":"M3_U2_Q44","num":44,"total":52,"module":"M3","unit":"U2","topic":"Analytical Approaches and Process Mapping Techniques","question_en":"An internal auditor is investigating why the company’s expense reimbursements have increased significantly over the past year. Which data analysis method should be used?","options_en":{"A":"Diagnostic analysis to determine underlying causes of the increase.","B":"Predictive analysis to forecast future expense reimbursement trends.","C":"Prescriptive analysis to recommend policy changes before reviewing data.","D":"Anomaly detection to identify outliers without analyzing trends."},"correct":"A","explanation_en":"Choice \"A\" is correct. Diagnostic analysis focuses on identifying patterns and root causes of past events, making it the best approach for explaining expense trends."},{"id":"M3_U2_Q45","num":45,"total":52,"module":"M3","unit":"U2","topic":"Analytical Approaches and Process Mapping Techniques","question_en":"Which of the following would be the most efficient audit procedure to determine whether a bank's rejection of loan applications was appropriate?","options_en":{"A":"Select a sample of loans presented to the lending committee for approval and determine whether committee actions taken were consistent with bank policies.","B":"Select a sample of all loan applications, review the applications, and trace them to either a funded or rejected loan to determine whether all actions taken were consistent with bank policies.","C":"Select an attributes sample of loans not funded and review the loan applications and the reasons for rejecting them.","D":"Select an attributes sample of loans that were funded, review the loan applications, and determine whether the funded loans complied with bank policies."},"correct":"C","explanation_en":"Choice \"C\" is correct. This would be the most appropriate audit procedure because the audit objective only asks for a determination that rejected loans have been rejected for proper reasons. It is not concerned with the approval of loans that should not have been made."},{"id":"M3_U2_Q46","num":46,"total":52,"module":"M3","unit":"U2","topic":"Analytical Approaches and Process Mapping Techniques","question_en":"Which of the following is a drawback of using the cash ratio to determine an organization's default risk?","options_en":{"A":"It is a better measure of liquidity for opportunities than for measuring default risk.","B":"It is a more general measure of liquidity than the current ratio and could be misleading.","C":"The organization likely has other ways to pay its current liabilities that are not accounted for in the cash ratio.","D":"The organization may have a risk of inventory obsolescence or other incapacidade to liquidate inventory."},"correct":"C","explanation_en":"Choice \"C\" is correct. The cash ratio overlooks other sources of liquidity, such as unused credit lines or liquid assets not included in the ratio, potentially underestimating the organization's capacidade to meet obligations."},{"id":"M3_U2_Q47","num":47,"total":52,"module":"M3","unit":"U2","topic":"Analytical Approaches and Process Mapping Techniques","question_en":"An internal auditor should apply analytical review procedures under which of the following circumstances?","options_en":{"A":"When relationships identified for comparison are unpredictable.","B":"When financial and nonfinancial information are unreliable.","C":"When there is not enough information to develop independent expectations.","D":"When looking for expected changes between current and prior fiscal periods."},"correct":"D","explanation_en":"Choice \"D\" is correct. Internal auditors use analytic procedures while planning and performing engagements to identify anomalies in information such as unexpected fluctuations, differences, and correlations as well as the absence of expected fluctuations, differences, and correlations."},{"id":"M3_U2_Q48","num":48,"total":52,"module":"M3","unit":"U2","topic":"Analytical Approaches and Process Mapping Techniques","question_en":"In instances where a single deviation would be critical, which of the following forms of sampling should be used?","options_en":{"A":"Stop-or-go sampling.","B":"Discovery sampling.","C":"Acceptance sampling.","D":"Mean-per-unit sampling."},"correct":"B","explanation_en":"Choice \"B\" is correct. Discovery sampling is the form of sampling appropriate when a single deviation would be critical."},{"id":"M3_U2_Q49","num":49,"total":52,"module":"M3","unit":"U2","topic":"Analytical Approaches and Process Mapping Techniques","question_en":"Which of the following is a typical example of structured data?","options_en":{"A":"Sales reports documented in word processing software.","B":"Photos and videos stored in hard drive catalogs.","C":"Tweets and posts of users on social media.","D":"Production information maintained in relational tables."},"correct":"D","explanation_en":"Choice \"D\" is correct. Structured data, like production information in relational tables, is organized in predefined formats and is easily searchable."},{"id":"M3_U2_Q50","num":50,"total":52,"module":"M3","unit":"U2","topic":"Analytical Approaches and Process Mapping Techniques","question_en":"An internal auditor wants to analyze the improvements that were the result of a cost- reduction exercise performed over the last two years. Which of the following techniques would best help the auditor?","options_en":{"A":"Regression analysis.","B":"Vertical analysis.","C":"Correlation analysis.","D":"Horizontal analysis."},"correct":"D","explanation_en":"Choice \"D\" is correct. Horizontal analysis compares data across time periods and would be effective for identifying trends and improvements resulting from cost-reduction initiatives."},{"id":"M3_U2_Q51","num":51,"total":52,"module":"M3","unit":"U2","topic":"Analytical Approaches and Process Mapping Techniques","question_en":"While creating a flowchart for the invoice payment process, an internal auditor needs to represent a step where the finance manager decides whether to approve or reject an invoice based on the presence of a completed checklist. Which flowchart symbol should be used to represent this decision point?","options_en":{"A":"Rectangle.","B":"Diamond.","C":"Oval.","D":"Circle."},"correct":"B","explanation_en":"Choice \"B\" is correct. In flowcharting, a diamond symbol represents a decision point where a process branches based on a yes/no or true/false condition."},{"id":"M3_U2_Q52","num":52,"total":52,"module":"M3","unit":"U2","topic":"Analytical Approaches and Process Mapping Techniques","question_en":"When assessing the relative profitcapacidade of two potential investments, an investor would be most interested in which of the following ratios?","options_en":{"A":"Total liabilities/Total assets.","B":"(Net sales – Cost of goods sold)/Net sales.","C":"EBIT (earnings before interest and taxes)/Interest.","D":"Sales/Total assets."},"correct":"B","explanation_en":"Choice \"B\" is correct. When assessing the relative profitcapacidade of investments, investors are typically interested in profitcapacidade ratios that demonstrar the efficiency of a company in generating profit relative to its sales or costs. The ratio (net sales – cost of goods sold) / net sales, which is also known as the gross profit margin, is the most useful ratio for measuring a company's profitcapacidade. It shows how much profit is made after deducting the cost of goods sold from sales, which is a direct indicator of a company's profitcapacidade in its core business activities."},{"id":"M4_U1_Q1","num":1,"total":13,"module":"M4","unit":"U1","topic":"Business Continuity and Disaster Recovery","question_en":"Which backup method is the most efficient for minimizing storage space by only backing up changed data?","options_en":{"A":"Incremental.","B":"Mirror.","C":"Differential.","D":"Full."},"correct":"A","explanation_en":"Choice \"A\" is correct. Incremental backup only stores the data that has changed since the last backup, making it the most space efficient."},{"id":"M4_U1_Q2","num":2,"total":13,"module":"M4","unit":"U1","topic":"Business Continuity and Disaster Recovery","question_en":"In a disaster recovery audit, which of the following would represent the most significant weakness?","options_en":{"A":"Tests use recovery scripts.","B":"Hot-site contracts are two years old.","C":"Backup media are stored on site.","D":"Only a few systems are tested annually."},"correct":"C","explanation_en":"Choice \"C\" is correct. A lack of regular testing of recovery systems is the most significant weakness, as it could indicate the recovery process is unreliable."},{"id":"M4_U1_Q3","num":3,"total":13,"module":"M4","unit":"U1","topic":"Business Continuity and Disaster Recovery","question_en":"The data center of a nationwide mortgage servicing company is undergoing its annual review. The internal audit manager is concerned about the data center not having an adequate contingency plan, especially because it is located close to a river that occasionally floods and is in the vicinity of a major railroad and a major highway. Even though floodwaters might not reach the data center, being located adjacent to a river is associated with which of the following risks in the event of a significant flood?","options_en":{"A":"Customers might refuse to do business with the company.","B":"Expensive equipment might need to be replaced.","C":"Many customers might fail to make timely payments.","D":"Employees might be unable to report for work."},"correct":"D","explanation_en":"Choice \"D\" is correct. Proximity to a river increases the risk of employees being unable to report for work devido a to transportation disruptions in the event of flooding."},{"id":"M4_U1_Q4","num":4,"total":13,"module":"M4","unit":"U1","topic":"Business Continuity and Disaster Recovery","question_en":"Which of the following ensures that an organization's IT disaster plan supports the organization's overall business recovery plan?","options_en":{"A":"Additional resources, such as appropriately trained middle managers, are available if needed.","B":"System changes are tested before being released.","C":"A risk analysis study is performed to better define future problems.","D":"Organizational and operational changes are documented in the recovery plan, and testing is performed to ensure that the objectives are met."},"correct":"D","explanation_en":"Choice \"D\" is correct. Documenting organizational and operational changes is critical to the success of an organization's recovery plans. These types of changes are often \"interwoven\" and have the potential to impact an organization's capacidade to be successful if a major problem occurs."},{"id":"M4_U1_Q5","num":5,"total":13,"module":"M4","unit":"U1","topic":"Business Continuity and Disaster Recovery","question_en":"Which of the following should be management's primary concern when reviewing a reciprocal disaster recovery agreement between two organizations?","options_en":{"A":"Hardware and software compatibility.","B":"Differences in information system policies and procedures.","C":"Relicapacidade of the business impact analysis.","D":"Frequency of system testing."},"correct":"A","explanation_en":"Choice \"A\" is correct. A disaster recovery plan outlines the logical and efficient order in which critical and other systems should be restored following an outage or disaster. A reciprocal disaster recovery agreement is one made between different organizations to share resources if one suffers a disaster or systems failure. When reviewing a reciprocal recovery agreement, management's primary concern should be hardware and software compatibility between the organizations. Without compatibility, any attempt at recovery will either be inefficient or impossible and may levar to data loss or (in a worst-case scenario) no recovery."},{"id":"M4_U1_Q6","num":6,"total":13,"module":"M4","unit":"U1","topic":"Business Continuity and Disaster Recovery","question_en":"What would be the most critical aspect of a contingency plan for an organization providing help desk services?","options_en":{"A":"Restoring security and protection of client data.","B":"Restoring end user devices and networks.","C":"Restoring telecommunications for communication.","D":"Restoring customer relationship management tools."},"correct":"C","explanation_en":"Choice \"C\" is correct. Restoring telecommunications ensures essential communication channels remain intact, enabling continued service during a disaster."},{"id":"M4_U1_Q7","num":7,"total":13,"module":"M4","unit":"U1","topic":"Business Continuity and Disaster Recovery","question_en":"Which of the following is true of contingency planning?","options_en":{"A":"Purchasing insurance for specific contingencies is a valid part of a business continuity plan.","B":"Telecommunications is usually considered a noncritical system in a disaster recovery plan.","C":"The process of developing a contingency plan must not be outsourced.","D":"Off-site storage of backup data is secured best if a reciprocal processing agreement is used."},"correct":"A","explanation_en":"Choice \"A\" is correct. Contingency planning includes providing adequate business interruption insurance to cover operational losses (opportunity costs of lost work and sales, purchase of replacement equipment) and adequate equipment and property insurance to cover physical losses."},{"id":"M4_U1_Q8","num":8,"total":13,"module":"M4","unit":"U1","topic":"Business Continuity and Disaster Recovery","question_en":"During a business continuity audit, what is the primary goal of the business continuity management plan?","options_en":{"A":"Avoid, deter, and prevent disasters and prepare the organization to respond to a disaster.","B":"Manage external and internal communications and senior management activities during a disaster.","C":"Provide lifesaving, safety, and initial efforts to limit the impact to asset damage.","D":"Enable the organization to restore critical business processes after a disaster has been declared."},"correct":"D","explanation_en":"Choice \"D\" is correct. The primary goal of business continuity management is to ensure the organization can restore critical processes after a disaster."},{"id":"M4_U1_Q9","num":9,"total":13,"module":"M4","unit":"U1","topic":"Business Continuity and Disaster Recovery","question_en":"An event that, if not handled appropriately, may significantly impact an organization’s capacidade to operate, remain profitable, and manage reputational risk describes which of the following?","options_en":{"A":"A disaster.","B":"A crisis.","C":"An incident.","D":"An emergency."},"correct":"B","explanation_en":"Choice \"B\" is correct. A crisis has significant potential to disrupt operations and damage reputation if not managed properly."},{"id":"M4_U1_Q10","num":10,"total":13,"module":"M4","unit":"U1","topic":"Business Continuity and Disaster Recovery","question_en":"Which of the following types of data backup involves creating backup copies of only those files that have changed since the last backup of any kind?","options_en":{"A":"Full backup.","B":"Incremental backup.","C":"Data recovery.","D":"Off-site backup."},"correct":"B","explanation_en":"Choice \"B\" is correct. An incremental backup backs up only those files that have been changed since the last backup of any kind."},{"id":"M4_U1_Q11","num":11,"total":13,"module":"M4","unit":"U1","topic":"Business Continuity and Disaster Recovery","question_en":"Which of the following activities is necessary to determine what would constitute a disaster for an organization?","options_en":{"A":"Vendor supply agreement analysis","B":"Risk analysis","C":"File and equipment backup requirements analysis","D":"Contingent facility contract analysis"},"correct":"B","explanation_en":"Choice \"B\" is correct. Risk analysis is necessary to determine an organization's definition of a disaster. The other answer choices are part of a contingency planning strategy to react to a disaster."},{"id":"M4_U1_Q12","num":12,"total":13,"module":"M4","unit":"U1","topic":"Business Continuity and Disaster Recovery","question_en":"What is the best way for management to ensure they can quickly resume operations after an interruption?","options_en":{"A":"Maintain the same level of employment.","B":"Minimize the cost of facility repair.","C":"Receive the maximum benefit from planning.","D":"Fulfill its obligations to customers."},"correct":"D","explanation_en":"Choice \"D\" is correct. Correct: A recovery plan should primarily focus on ensuring that the organization can fulfill its obligations to customers by resuming operations quickly."},{"id":"M4_U1_Q13","num":13,"total":13,"module":"M4","unit":"U1","topic":"Business Continuity and Disaster Recovery","question_en":"Which of the following is the most persuasive evidence that contingency planning is effective?","options_en":{"A":"Successful testing of the plan.","B":"Comprehensive documentation of the plan.","C":"No processing interruptions during the past year.","D":"Sign-off on the plan by the internal audit function."},"correct":"A","explanation_en":"Choice \"A\" is correct. Successful testing of the plan provides tangible proof that the contingency planning is operationally effective and ready for actual emergencies."},{"id":"M4_U2_Q1","num":1,"total":25,"module":"M4","unit":"U2","topic":"Evaluation Criteria and Existing Conditions","question_en":"Which of the following is an example of internal evaluation criteria?","options_en":{"A":"Organizational policies and procedures","B":"Regulatory requirements","C":"Professional standards","D":"Industry benchmarks"},"correct":"A","explanation_en":"Choice \"A\" is correct. Evaluation criteria that are most relevant to the engagement represent the desired state of the activity under review and should be specific and practical. Adequate criteria provided in the Standards include internal criteria, external criteria, authoritative guidance, established organizational practices, expectations based on the design of a control, and procedures that may not be formally documented. Internal evaluation criteria include organizational policies and procedures, as they represent the desired state of the activity under review. Choice \"B\" is incorrect. Regulatory requirements are external evaluation criteria, not internal criteria. Choice \"C\" is incorrect. Professional standards are authoritative guidance, not internal criteria. Choice \"D\" is incorrect. Industry benchmarks are external evaluation criteria, not internal criteria."},{"id":"M4_U2_Q2","num":2,"total":25,"module":"M4","unit":"U2","topic":"Evaluation Criteria and Existing Conditions","question_en":"Which of the following best describes the purpose of evaluation criteria in an internal audit engagement?","options_en":{"A":"To define the desired state of the activity under review","B":"To document the historical conditions of the activity","C":"To identify the root causes of deviations","D":"To prioritize engagement findings based on their significance"},"correct":"A","explanation_en":"Choice \"A\" is correct. According to the Standards, evaluation criteria are defined as \"specifications of the desired state of the activity under review.\" Evaluation criteria that are most relevant to the engagement represent the desired state of the activity under review and should be specific and practical. Choice \"B\" is incorrect. Historical conditions are part of the evidence gathered during the engagement, not the evaluation criteria. Choice \"C\" is incorrect. Root cause analysis is performed after identifying deviations from evaluation criteria, not as part of defining evaluation criteria. Evaluation criteria are determined during the planning phase of the engagement and used in the testing and evaluation phase of the engagement to reach conclusions. Choice \"D\" is incorrect. Prioritizing findings is part of appraising their significance, not a description of evaluation criteria. Evaluation criteria are determined during the planning phase of the engagement and used in the testing and evaluation phase of the engagement to reach conclusions."},{"id":"M4_U2_Q3","num":3,"total":25,"module":"M4","unit":"U2","topic":"Evaluation Criteria and Existing Conditions","question_en":"An internal auditor is reviewing the inventory management process and finds that inventory records are frequently inaccurate. The evaluation criteria require accurate records to be maintained. Which of the following root causes is most likely responsible for this deviation?","options_en":{"A":"Overly strict evaluation criteria","B":"Insufficient evidence to support the finding","C":"Inadequate staff training on inventory procedures","D":"Lack of formal evaluation criteria"},"correct":"C","explanation_en":"Choice \"A\" is incorrect. The criteria are not overly strict and are reasonable for ensuring proper inventory management. Choice \"B\" is incorrect. The evidence (i.e., inaccurate records) supports the finding. Thus, insufficient evidence is not the root cause. Choice \"C\" is correct. Root cause analysis (RCA) helps internal auditors find the fundamental reasons for deviations from evaluation criteria. This method ensures that internal auditors address the actual problems rather than just the symptoms of the problems, leading to effective and lasting solutions. Inadequate staff training is a common root cause of inaccurate inventory records, as it directly impacts compliance with the criteria. Choice \"D\" is incorrect. The scenario indicates that criteria exist but are not being met. Thus, a lack of formal evaluation criteria is not the root cause."},{"id":"M4_U2_Q4","num":4,"total":25,"module":"M4","unit":"U2","topic":"Evaluation Criteria and Existing Conditions","question_en":"Which of the following best describes the purpose of fault tree analysis (FTA) in internal auditing?","options_en":{"A":"To visualize potential causes of a problem in a structured, categorized manner","B":"To analyze all possible causes of a failure using a top-down approach","C":"To identify a single root cause by repeatedly asking \"why\"","D":"To identify the most significant causes of a problem and prioritize them"},"correct":"B","explanation_en":"Choice \"A\" is incorrect. This describes the fishbone diagram, which categorizes potential causes. It helps an internal auditor to visualize the many potential causes of a problem, organizing them into categories. This diagram resembles a fish skeleton, with the problem statement at the \"head\" and the causes extending out as \"bones.\" Choice \"B\" is correct. Different RCA methods offer unique approaches to dissecting problems and uncovering their origins. Common RCA techniques internal auditors use include the Five Whys, fishbone diagrams, and fault tree analysis. Fault tree analysis (FTA) is a top-down approach that starts with a potential undesirable event (failure) and uses a tree diagram to explore all possible causes leading to that event. It helps internal auditors systematically identify and analyze contributing factors. Choice \"C\" is incorrect. This describes the Five Whys technique, which is a straightforward, powerful tool used to drill down to the root cause of a problem. It identifies a single root cause by repeatedly asking \"why.\" Choice \"D\" is incorrect. This describes Pareto analysis, which focuses on prioritizing the most significant causes. It determines which causes have the greatest impact based on frequency or severity."},{"id":"M4_U2_Q5","num":5,"total":25,"module":"M4","unit":"U2","topic":"Evaluation Criteria and Existing Conditions","question_en":"An auditor reviewing vendor payments identifies several duplicate payments. What aspect is most critical in evaluating the importance of this issue?","options_en":{"A":"Frequency with which vendors notify the company about duplicate payments.","B":"Total financial loss incurred and likelihood of recovering overpayments.","C":"Number of staff members involved in processing vendor invoices.","D":"Transaction volume in the accounts payable system during the audit period."},"correct":"B","explanation_en":"Choice \"B\" is correct. Quantifying financial exposure and assessing recovery options are chave factors in determining the severity of duplicate payments."},{"id":"M4_U2_Q6","num":6,"total":25,"module":"M4","unit":"U2","topic":"Evaluation Criteria and Existing Conditions","question_en":"Which of the following best describes the purpose of root cause analysis (RCA) in internal auditing?","options_en":{"A":"To compare evaluation criteria with the actual outcomes","B":"To document the existing conditions of the activity under review","C":"To identify the fundamental reasons for deviations from evaluation criteria","D":"To determine the significance of engagement findings"},"correct":"C","explanation_en":"Choice \"A\" is incorrect. Comparing criteria with outcomes identifies deviations but does not explain their root causes, which is not the purpose of RCA. Choice \"B\" is incorrect. Documenting existing conditions is part of gathering evidence, not RCA. Choice \"C\" is correct. Root cause analysis (RCA) helps internal auditors uncover the fundamental reasons for deviations from evaluation criteria, ensuring that recommendations address the actual problems rather than symptoms. By identifying root causes, internal auditors can make specific recommendations to prevent issues from recurring. Choice \"D\" is incorrect. Determining significance is a separate step after identifying root causes and, thus, is not the purpose of RCA."},{"id":"M4_U2_Q7","num":7,"total":25,"module":"M4","unit":"U2","topic":"Evaluation Criteria and Existing Conditions","question_en":"Which of the following root cause analysis techniques is best suited for identifying multiple interconnected causes of a problem?","options_en":{"A":"Fishbone diagram","B":"Fault tree analysis","C":"Pareto analysis","D":"The Five Whys"},"correct":"A","explanation_en":"Choice \"A\" is correct. Different RCA methods offer unique approaches to dissecting problems and uncovering their origins. Common RCA techniques internal auditors use include the Five Whys, fishbone diagrams, and fault tree analysis. A cause-and-effect diagram, such as a fishbone diagram (also known as Ishikawa diagram), helps with root cause analysis when the cause is not linear. It helps an internal auditor to visualize the many potential causes of a problem, organizing them into categories. A fishbone diagram (Ishikawa Diagram) is ideal for identifying multiple interconnected causes, as it organizes potential causes into categories such as People, Processes, Materials, and Equipment. Choice \"B\" is incorrect. Fault tree analysis is a top-down approach for analyzing potential failure points, not categorizing causes. Choice \"C\" is incorrect. Pareto analysis prioritizes issues but does not explore interconnected causes. Choice \"D\" is incorrect. The Five Whys is better suited for simple, linear problems."},{"id":"M4_U2_Q8","num":8,"total":25,"module":"M4","unit":"U2","topic":"Evaluation Criteria and Existing Conditions","question_en":"An auditor finds that employee expense reimbursements frequently exceed policy limits. What is the most effective way to determine the root cause?","options_en":{"A":"Comparing expense limits to those of other organizations.","B":"Surveying employees about their satisfaction with the reimbursement process.","C":"Reviewing policy enforcement practices and approval workflows.","D":"Adjusting policy limits to match current spending patterns."},"correct":"C","explanation_en":"Choice \"C\" is correct. Examining policy enforcement and approval workflows helps identify whether the issue stems from weak controls or lack of adherence."},{"id":"M4_U2_Q9","num":9,"total":25,"module":"M4","unit":"U2","topic":"Evaluation Criteria and Existing Conditions","question_en":"According to IIA guidance, which of the following provides additional insight into errors, problems, missed opportunities, or noncompliance to improve the effectiveness and efficiency of an organization's control process?","options_en":{"A":"Reperformance.","B":"Independent confirmation.","C":"Vouching.","D":"Root cause analysis."},"correct":"D","explanation_en":"Choice \"D\" is correct. Root cause analysis goes beyond identifying symptoms to uncover the underlying reasons for issues, enabling improvements to control processes and reducing the likelihood of recurring errors or problems."},{"id":"M4_U2_Q10","num":10,"total":25,"module":"M4","unit":"U2","topic":"Evaluation Criteria and Existing Conditions","question_en":"An IT security audit reveals that some employees have administrative access beyond their job requirements. What is the most relevant factor in assessing the severity of this issue?","options_en":{"A":"Risk of unauthorized system modifications or security breaches.","B":"Departments that frequently require elevated access permissions.","C":"Percentage of staff members who have completed cybersecurity training.","D":"Instances in which excess access has been used incorrectly in the past."},"correct":"A","explanation_en":"Choice \"A\" is correct. Assessing the potential for data breaches and improper system changes is crucial when evaluating security risks."},{"id":"M4_U2_Q11","num":11,"total":25,"module":"M4","unit":"U2","topic":"Evaluation Criteria and Existing Conditions","question_en":"Which of the following is not a valid example of evaluation criteria?","options_en":{"A":"Regulatory requirements","B":"Industry benchmarks","C":"Organizational policies and procedures","D":"Personal opinions of the internal auditor"},"correct":"D","explanation_en":"Choice \"A\" is incorrect. Regulatory requirements are valid external evaluation criteria. Choice \"B\" is incorrect. Industry benchmarks are valid external evaluation criteria. Choice \"C\" is incorrect. Organizational policies and procedures are valid internal evaluation criteria. Choice \"D\" is correct. Evaluation criteria that are most relevant to the engagement represent the desired state of the activity under review and should be specific and practical. Adequate criteria provided in the Standards include internal criteria, external criteria, authoritative guidance, established organizational practices, expectations based on the design of a control, and procedures that may not be formally documented. However, the personal opinions of the internal auditor are not valid evaluation criteria, as they lack objectivity and relevance to the activity under review."},{"id":"M4_U2_Q12","num":12,"total":25,"module":"M4","unit":"U2","topic":"Evaluation Criteria and Existing Conditions","question_en":"An internal auditor discovers that expense reports frequently exceed company policy limits. What should be considered when determining the significance of this issue?","options_en":{"A":"Employee concerns about the fairness of policy limits.","B":"Number of reimbursement requests submitted in a given period.","C":"Previous instances of minor expense violations noted in past audits.","D":"Financial impact and frequency of noncompliance cases."},"correct":"D","explanation_en":"Choice \"D\" is correct. The significance of the issue depends on the financial exposure and how often noncompliance occurs."},{"id":"M4_U2_Q13","num":13,"total":25,"module":"M4","unit":"U2","topic":"Evaluation Criteria and Existing Conditions","question_en":"Which of the following is an example of external evaluation criteria?","options_en":{"A":"Key performance indicators","B":"Regulatory requirements","C":"Organizational policies and procedures","D":"Established organizational practices"},"correct":"B","explanation_en":"Choice \"A\" is incorrect. Key performance indicators are internal evaluation criteria, not external criteria. Choice \"B\" is correct. Evaluation criteria that are most relevant to the engagement represent the desired state of the activity under review and should be specific and practical. Adequate criteria provided in the Standards include internal criteria, external criteria, authoritative guidance, established organizational practices, expectations based on the design of a control, and procedures that may not be formally documented. Regulatory requirements are external evaluation criteria because they are imposed by statutory bodies and are not internal to the organization. Choice \"C\" is incorrect. Organizational policies and procedures are internal evaluation criteria, not external criteria. Choice \"D\" is incorrect. Established organizational practices are internal evaluation criteria, not external criteria."},{"id":"M4_U2_Q14","num":14,"total":25,"module":"M4","unit":"U2","topic":"Evaluation Criteria and Existing Conditions","question_en":"Which of the following factors should internal auditors consider when appraising the significance of findings?","options_en":{"A":"The likelihood and impact of the risk","B":"The availcapacidade of evidence","C":"The organization's residual risk","D":"The cost of additional analyses"},"correct":"A","explanation_en":"Choice \"A\" is correct. According to Standard 14.3 Evaluation of Findings, internal auditors must evaluate each potential engagement finding to determine its significance. Internal auditors must consider the likelihood and impact of the risk when appraising the significance of findings. Other factors to be considered include risk tolerance and other factors important to the organization. Choice \"B\" is incorrect. Availcapacidade of evidence is considered during the analysis phase, not when appraising the significance of findings. Choice \"C\" is incorrect. Residual risk is an important consideration but is part of the broader risk assessment process, not the primary focus when appraising findings. Choice \"D\" is incorrect. The cost of additional analyses is considered earlier in the engagement process, not when appraising the significance of findings."},{"id":"M4_U2_Q15","num":15,"total":25,"module":"M4","unit":"U2","topic":"Evaluation Criteria and Existing Conditions","question_en":"Which of the following is the most appropriate action for an internal auditor when the organization lacks formal evaluation criteria for a process under review?","options_en":{"A":"Collaborate with senior management to identify appropriate criteria","B":"Conclude that the process is ineffective","C":"Postpone the engagement until criteria are established","D":"Use personal judgment to evaluate the process"},"correct":"A","explanation_en":"Choice \"A\" is correct. According to Standard 13.4, internal auditors must assess the extent to which the board and senior management have established adequate criteria to determine whether the activity under review has accomplished its objectives and goals. If formal evaluation criteria are inadequate or absent, internal auditors must collaborate with senior management or the board to identify appropriate criteria. Choice \"B\" is incorrect. Internal auditors cannot make conclusions on whether the process is ineffective in the absence of proper evaluation criteria. Choice \"C\" is incorrect. Postponing the engagement until criteria are established is unnecessary. Choice \"D\" is incorrect. Personal judgment lacks objectivity and is not a valid substitute for formal criteria."},{"id":"M4_U2_Q16","num":16,"total":25,"module":"M4","unit":"U2","topic":"Evaluation Criteria and Existing Conditions","question_en":"An internal auditor is reviewing procurement transactions to determine compliance with company policy. What is the best approach to compare existing conditions to evaluation criteria?","options_en":{"A":"Benchmarking procurement data against external industry averages.","B":"Matching transactions with documented approval limits and purchasing guidelines.","C":"Accepting management’s confirmation that policies are being followed.","D":"Selecting random transactions without considering policy guidelines."},"correct":"B","explanation_en":"Choice \"B\" is correct. The most effective way to assess compliance is by directly comparing procurement transactions to established approval criteria."},{"id":"M4_U2_Q17","num":17,"total":25,"module":"M4","unit":"U2","topic":"Evaluation Criteria and Existing Conditions","question_en":"During an audit of a customer service department, the internal auditor observes that customer complaints are not being resolved within the required 48-hour timeframe. The evaluation criteria specify that all complaints must be addressed within this period to ensure customer satisfaction. What is the most likely root cause of this deviation?","options_en":{"A":"Overly strict evaluation criteria","B":"Lack of formal evaluation criteria","C":"Inadequate staffing levels in the customer service department","D":"Insufficient evidence to support the finding"},"correct":"C","explanation_en":"Choice \"A\" is incorrect. The evaluation criteria are reasonable and not overly strict, as resolving complaints within 48 hours is a standard practice for customer satisfaction. Thus, overly strict evaluation criteria are not the root cause of this deviation. Choice \"B\" is incorrect. The scenario indicates that criteria exist but are not being met. Thus, the lack of formal evaluation criteria is not the root cause of this deviation. Choice \"C\" is correct. Root cause analysis (RCA) helps internal auditors find the fundamental reasons for deviations from evaluation criteria. This method ensures that internal auditors address the actual problems rather than just the symptoms of the problems, leading to effective and lasting solutions. Inadequate staffing levels in the customer service department are a common root cause of delays in resolving customer complaints, as it directly impacts the department's capacidade to meet the required timeframe. Choice \"D\" is incorrect. The evidence (i.e., delays in complaint resolution) supports the finding, so insufficient evidence is not the root cause of this deviation."},{"id":"M4_U2_Q18","num":18,"total":25,"module":"M4","unit":"U2","topic":"Evaluation Criteria and Existing Conditions","question_en":"Which of the following is an internal auditor's most important consideration when reviewing logs or other evidence of information security violations?","options_en":{"A":"Access controls that are in place to prevent security violations.","B":"Management's investigation and resolution of the security violations.","C":"Plans for improvements to the information security architecture.","D":"Industry trends regarding common types of security violations."},"correct":"B","explanation_en":"Choice \"B\" is correct. The auditor should ensure that information security violations are reviewed and addressed by management."},{"id":"M4_U2_Q19","num":19,"total":25,"module":"M4","unit":"U2","topic":"Evaluation Criteria and Existing Conditions","question_en":"Which of the follo
