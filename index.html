 a formal written report. In cases where management may request quick advice from internal auditors, formal communication (e.g., a formal report) might not be necessary. Choice \"D\" is incorrect. Advisory engagements may require final communication, depending on the nature of the engagement. There may be cases where a formal report is needed, especially when the internal audit function is part of a project to evaluate a process or product. In this case, advice from internal auditors may play a critical role in the success of the whole project, and a formal report may be requested to ensure the advice is accurate and timely."},{"id":"M2_U3_Q33","num":33,"total":35,"module":"M2","unit":"U3","topic":"Communication with Stakeholders","question_en":"An auditor discovers a material misstatement in financial records that management refuses to correct. What is the best course of action?","options_en":{"A":"Revising the audit scope to avoid addressing the misstatement.","B":"Escalating the issue to senior leadership and audit committee.","C":"Ignoring the issue since management does not see it as a problem.","D":"Documenting the concern privately without notifying leadership."},"correct":"B","explanation_en":"Choice \"B\" is correct. Material misstatements require escalation to ensure financial accuracy and compliance with Global Internal Audit Standards."},{"id":"M2_U3_Q34","num":34,"total":35,"module":"M2","unit":"U3","topic":"Communication with Stakeholders","question_en":"After emissão de the final engagement report, the internal audit team discovers a significant error in the report. What is the most appropriate action for the chief audit executive (CAE) to take?","options_en":{"A":"Address the error during the next engagement.","B":"Take no action, as the report has already been finalized and distributed.","C":"Communicate the corrected information to all parties who received the original report and document the correction process.","D":"Notify the board immediately and issue a revised engagement report."},"correct":"C","explanation_en":"Choice \"A\" is incorrect. Addressing the error during the next engagement is insufficient for a significant issue. Choice \"B\" is incorrect. Taking no action violates the Standards and is not acceptable when a significant error is identified. Choice \"C\" is correct. According to Standard 11.4, the internal audit team must communicate the error or omission to the appropriate parties and determine whether a revised report is necessary based on the significance of the issue. Therefore, the CAE must communicate the corrected information to all parties who received the original report and document the correction process. Choice \"D\" is incorrect. While notifying the board may be necessary, the decision to issue a revised report should be based on the significance of the error."},{"id":"M2_U3_Q35","num":35,"total":35,"module":"M2","unit":"U3","topic":"Communication with Stakeholders","question_en":"During a follow-up engagement, the internal audit team discovers that management has not implemented chave action plans to address a significant control deficiency by the agreed completion date. When questioned, management explains that resource constraints have delayed implementation but provides no clear timeline for completion. The internal auditors escalate the issue to the chief audit executive (CAE), who determines that the delay may indicate that management has accepted a risk exceeding the organization's risk tolerance. Which of the following is the most appropriate action for the CAE to take?","options_en":{"A":"Accept management's explanation and document the delay in the follow-up report.","B":"Recommend that management revise the action plan to include a new completion date.","C":"Close the issue in the audit records, as management has provided a reason for the delay.","D":"Communicate the issue to senior management for resolution, and if unresolved, escalate the matter to the board."},"correct":"D","explanation_en":"Choice \"A\" is incorrect. Accepting management's explanation without further action is insufficient for addressing an unacceptable risk. Choice \"B\" is incorrect. While revising the action plan may be part of the resolution, the CAE must still escalate the issue if the risk is deemed unacceptable. Choice \"C\" is incorrect. Closing the issue prematurely is not appropriate when the risk remains unresolved. Choice \"D\" is correct. According to Standard 15.2, if the CAE determines that the delay or inaction indicates an unacceptable risk, the matter must be communicated to senior management for resolution. If senior management does not resolve the issue, the CAE must escalate it to the board."},{"id":"M3_U1_Q1","num":1,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"A company has implemented a policy to comply with privacy regulations. What type of control does this represent?","options_en":{"A":"Preventive control.","B":"Technical control.","C":"Governance control.","D":"Management control."},"correct":"C","explanation_en":"Choice \"C\" is correct. A privacy compliance policy is primarily a preventive control as it aims to avoid violations by setting rules and procedures to protect privacy."},{"id":"M3_U1_Q2","num":2,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"Which database control would be most effective in maintaining segregation of duties appropriate to the users' reporting structure in an organization?","options_en":{"A":"Access security features.","B":"Software change control procedures.","C":"Dependency checks.","D":"Backup and recovery procedures."},"correct":"A","explanation_en":"Choice \"A\" is correct. Access security features restrict users to functions and data compatible with organizational structure. Software change control procedures provide controls over software changes for application development functions. Dependency checks provide controls over the form and type of data entered by users. Backup and recovery procedures provide controls over the continued availcapacidade of data resources for users."},{"id":"M3_U1_Q3","num":3,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"An organization is concerned about a small group of politically active individuals who might pose a moderate threat. What term is used to describe this group?","options_en":{"A":"Phishing artists.","B":"Cyber threat actors.","C":"Nation-state actors.","D":"Hacktivists."},"correct":"D","explanation_en":"Choice \"D\" is correct. Hacktivists are individuals who engage in cyberataques for political or social causes. While other options describe threat actors, they do not specifically focus on politically motivated individuals."},{"id":"M3_U1_Q4","num":4,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"Which of the following would be of greatest concern to an internal auditor reviewing a policy regarding the sale of a company's used personal computers to outside parties?","options_en":{"A":"Whether there is operating system software on the computer.","B":"Whether deleted files on the hard disk drive have been completely erased.","C":"Whether all software on the computer is properly licensed.","D":"Whether the computer has viruses."},"correct":"B","explanation_en":"Choice \"B\" is correct. Ensuring that deleted files have been completely erased mitigates the risk of unauthorized access to confidential or sensitive company information."},{"id":"M3_U1_Q5","num":5,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"What is the best indicator of a mature cybersecurity program?","options_en":{"A":"Shortened time for management response.","B":"Formal ongoing monitoring program.","C":"Maintenance of asset inventory.","D":"Fully automated access management processes."},"correct":"A","explanation_en":"Choice \"A\" is correct. Shortened time for management response demonstrates the capacidade to respond quickly and effectively to threats."},{"id":"M3_U1_Q6","num":6,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"An organization has 5,000 employees, who work in one centralized location. The organization’s provisioning policies require the employee’s supervisor to approve the employee’s access. The organization has 36 systems, and most employees have access to more than 10 systems. Examples of systems include treasury workstations, general ledger, accounts payable, accounts receivable, and the customer management system. An employee’s supervisor can approve any system and role for his or her employees to access. The organization has high turnover within its supervisor ranks. Most replacements for supervisory positions are external hires rather than internal promotions. Management requests that the internal audit function review the current provisioning process used by supervisors to approve access, and internal audit provides several recommendations. Which of the following is the best recommendation to improve the current process?","options_en":{"A":"Create documentation for each system, role, and role definition.","B":"Require a secondary approval by the system owner.","C":"Create role matrices by job category.","D":"Provide new supervisor training on provisioning employee access."},"correct":"C","explanation_en":"Choice \"C\" is correct. Creating role matrices by job category standardizes access, reducing errors and ensuring alinhamento with organizational requirements."},{"id":"M3_U1_Q7","num":7,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"Which of the following alerts an internal auditor that the organization may have a risk of exposure to computer viruses?","options_en":{"A":"Presence of data-encrypted files.","B":"Ability to download public-domain or unauthorized software.","C":"Need for daily backups of the system.","D":"Control of user access."},"correct":"B","explanation_en":"Choice \"B\" is correct. One of the most frequent problems with viruses is unauthorized or uncontrolled installation of software. The auditor should document this situation as a problem in his or her findings."},{"id":"M3_U1_Q8","num":8,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"Antivirus software to secure its computers. What is the major risk in depending solely on antivirus software?","options_en":{"A":"Interfering with system operations.","B":"Not detecting certain viruses.","C":"Consuming too many system resources.","D":"Making software installation overly complex."},"correct":"B","explanation_en":"Choice \"B\" is correct. Antivirus software may fail to detect some new or sophisticated viruses, posing a critical risk to security."},{"id":"M3_U1_Q9","num":9,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"Which of the following authentication factors is an example of something you have?","options_en":{"A":"Password.","B":"Fingerprint.","C":"Credit card.","D":"Numeric code."},"correct":"C","explanation_en":"Choice \"C\" is correct. A credit card is an example of something you have, one of the three authentication factors."},{"id":"M3_U1_Q10","num":10,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"Which of the following would be the best method to prove to outside authorities and auditors that all regulatory requirements are being satisfied in regard to information technology?","options_en":{"A":"Active IT controls exceeding an industry benchmark level.","B":"Audit results of IT controls showing compliance on the prior audit.","C":"Use of a control framework.","D":"All IT staff members possessing appropriate certifications."},"correct":"C","explanation_en":"Choice \"C\" is correct. Using a control framework demonstrates systematic compliance with regulatory requirements and provides evidence of structured IT governance practices."},{"id":"M3_U1_Q11","num":11,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"An organization wants to prevent unauthorized access to its systems and data. Which of the following would best help achieve this?","options_en":{"A":"Business continuity plans that detail procedures to follow in case of system disruptions or failures.","B":"Firewalls that monitor and block unauthorized access based on predefined security policies and configurations.","C":"Internal audits that evaluate organizational compliance with security and operational standards.","D":"Security event logs that acompanhar and document access and activity for later review and analysis."},"correct":"B","explanation_en":"Choice \"B\" is correct. Firewalls act as preventative controls, blocking unauthorized access and mitigating potential risks before they occur."},{"id":"M3_U1_Q12","num":12,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"A company’s network experiences a performance degradação devido a to an ataque that se espalha across systems and consome excessive resources. Which type ofsoftware malicioso is most likely responsible for this ataque?","options_en":{"A":"Logic bomb.","B":"Malware.","C":"Worm.","D":"Trojan horse."},"correct":"C","explanation_en":"Choice \"C\" is correct. A worm is a type of malicious program that can se replicar and spread across networks without user intervention. It often causes a denial-of-service (DoS) ataque by consuming network resources and causing performance issues."},{"id":"M3_U1_Q13","num":13,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"How can a company with multiple stores best protect the confidentiality of data being transmitted via satellite between stores and headquarters?","options_en":{"A":"Restrict access to the satellite network.","B":"Use a backup satellite connection.","C":"Encrypt the satellite transmissions.","D":"Monitor satellite network traffic."},"correct":"C","explanation_en":"Choice \"C\" is correct. Encryption ensures the confidentiality of data by making it unreadable during transmission, thus protecting sensitive information from unauthorized access."},{"id":"M3_U1_Q14","num":14,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"A company is very conscious of the sensitive nature of company information. What is the most important thing for the security administrator to monitor?","options_en":{"A":"Data owner specification of access privileges.","B":"Management authorization of modified access.","C":"Multiple access to data by data owners.","D":"Access to operational data by privileged users."},"correct":"D","explanation_en":"Choice \"D\" is correct. Monitoring access to operational data by privileged users is critical as these users often have extensive access rights that, if misused, could result in a breach."},{"id":"M3_U1_Q15","num":15,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"Why are detective controls considered the most significant type of cybersecurity control in protecting an organization’s network?","options_en":{"A":"Detective controls provide insights into potential risks and allow for corrective actions after an incident.","B":"Detective controls create logs and records that can be reviewed later but do not prevent ataques from happening.","C":"Detective controls help identify and respond to security breaches in real- time, minimizing the impact of threats.","D":"Detective controls are most effective at preventing ataques from occurring and stopping them before they escalate."},"correct":"C","explanation_en":"Choice \"C\" is correct. Detective controls are crucial because they help identify and respond to security incidents promptly, enabling the organization to minimize damage and maintain system integrity."},{"id":"M3_U1_Q16","num":16,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"If the financial system has begun to create errors in the organization's financial statements, which of the following would be the most effective first step an internal auditor could take to determine the cause?","options_en":{"A":"Review all output controls.","B":"Review the program code.","C":"Review all batch controls.","D":"Review program change logs."},"correct":"D","explanation_en":"Choice \"D\" is correct. The auditor should first eliminate the possibility of human intervention by ensuring only authorized individuals have accessed the program library and why."},{"id":"M3_U1_Q17","num":17,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"A large system requires careful management of processing resources to prioritize and schedule competing applications. At what level of the IT control framework would the IT auditor test these controls?","options_en":{"A":"Physical level.","B":"System development level.","C":"Application level.","D":"System software level."},"correct":"D","explanation_en":"Choice \"D\" is correct. These controls would form part of the system itself as it must deal with managing processing resources for the entire organization and all systems."},{"id":"M3_U1_Q18","num":18,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"A cyberataque overwhelms a shared resource, leaving none available for other users. What is this ataque called?","options_en":{"A":"Denial-of-service ataque designed to exhaust resources.","B":"Layer 7 DDoS ataque targeting specific web applications.","C":"Server/mainframe ataque targeting centralized computing power.","D":"Asynchronous ataque leveraging uncoordinated data flows."},"correct":"A","explanation_en":"Choice \"A\" is correct. Denial-of-service ataques aim to overwhelm shared resources, rendering them unavailable to other users."},{"id":"M3_U1_Q19","num":19,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"Which of the following best describes the responsibility of organizations in protecting personal data under data privacy regulations?","options_en":{"A":"Organizations must share personal data with third parties only after obtaining explicit consent.","B":"Organizations must provide individuals access to their personal data upon request.","C":"Organizations must ensure personal data is collected, stored, and used only for lawful purposes.","D":"Organizations must encrypt personal data in transit and at rest."},"correct":"C","explanation_en":"Choice \"C\" is correct. Organizations are responsible for collecting, storing, and using personal data only for lawful purposes, in compliance with data privacy laws."},{"id":"M3_U1_Q20","num":20,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"Which of the following IT controls include protection for mainframe computers and workstations?","options_en":{"A":"Change management controls.","B":"Organization and management controls.","C":"Physical and environmental controls.","D":"System software controls."},"correct":"C","explanation_en":"Choice \"C\" is correct. Physical and environmental controls include protection for mainframe computers and workstations."},{"id":"M3_U1_Q21","num":21,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"An organization uses email extensively over the Internet. All users have an established password to get into their account. Which of the following statements is correct regarding such security?","options_en":{"A":"All messages on the Internet are encrypted, thereby providing enhanced security.","B":"If someone gains supervisory-level access to the file server containing electronic messages, that person could still not gain access to the file containing electronic mail messages unless he or she first decrypted the security control log.","C":"There will be no way to determine which user accounts have been breached if a user reports that his or her password has been stolen.","D":"Passwords are effective in ensuring that someone attempting to log in under a user's name is prevented from casually accessing the user's data."},"correct":"D","explanation_en":"Choice \"D\" is correct. Passwords are effective against the casual intruder. Messages on the Internet are not encrypted. It is the sender's and receiver's responsibility to encrypt confidential information. If someone gains access to the server, he or she can download the file of messages and gain access to the messages without working with any security log."},{"id":"M3_U1_Q22","num":22,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"What is the best method for establishing criteria for when multi-factor authorization is required?","options_en":{"A":"Role-based access control and privilege assignment.","B":"Data classification and related data protection policies.","C":"Segregation/separation of duties for critical systems.","D":"Control inheritance and related permissions."},"correct":"B","explanation_en":"Choice \"B\" is correct. Data classification helps ensure that sensitive information is adequately protected, guiding the application of multi-factor authorization."},{"id":"M3_U1_Q23","num":23,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"Which of the following would be appropriate to consider in the physical design of a data center?","options_en":{"A":"Design of authorization tables for operating system access.","B":"Replacement of a badge and password system with a new biometric access system.","C":"Inclusion of an uninterruptible power supply system and surge protection.","D":"Evaluation of potential risks from remote hackers."},"correct":"C","explanation_en":"Choice \"C\" is correct. The inclusion of an uninterruptible power supply system and surge protection is crucial for protecting the equipment and ensuring uninterrupted operations during power outages."},{"id":"M3_U1_Q24","num":24,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"Which example would be considered a “non-malicious” insider threat?","options_en":{"A":"Consultant uses credit card information to commit fraud.","B":"Employee steals trade secrets and later sells them to a competitor.","C":"Employee damages an ex-employer’s computer network.","D":"Employee falls victim to social engineering or phishing emails."},"correct":"D","explanation_en":"Choice \"D\" is correct. Falling victim to social engineering or phishing represents unintentional actions that compromise security."},{"id":"M3_U1_Q25","num":25,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"Given that the organization is facing a 30% error rate when setting up user access in its current system, which of the following cost-efficient recommendations would help reduce this error rate while maintaining tight budget constraints?","options_en":{"A":"Assign specialists by system for user account setup with the IT help desk to ensure proper access configuration.","B":"Implement a one-over-one review of user access setup, which ensures an additional level of review for accuracy.","C":"Implement single sign-on to streamline user access management across all systems.","D":"Automate the user setup process to reduce manual intervention and errors."},"correct":"D","explanation_en":"Choice \"D\" is correct. Automating the user setup process addresses the core issue of manual errors, significantly reducing the 30% error rate while keeping costs down. Automation can be implemented with minimal investment compared to manual reviews or assigning additional specialists. This is the most cost-efficient solution for the organization under tight budget constraints."},{"id":"M3_U1_Q26","num":26,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"Which of the following would be included in a review of the controls over backup and recovery of a teleprocessing network?","options_en":{"A":"Review of the safeguarding and secrecy of documents/manuals indicating backup and recovery responsibilities.","B":"Ensuring that end user data file backups are never stored on the local area network (LAN).","C":"Review of controls over hardware and software failures.","D":"Review of the use and adequacy of encryption processes."},"correct":"C","explanation_en":"Choice \"C\" is correct. Controls need to be in place to address hardware and/or software failures. User data file backups can be on the LAN even though an off-site copy is also important. Encryption is a communication control for security and is not related to backup and recovery. Documentation that informs employees of their backup and recovery responsibilities should be widely disseminated to the persons with these responsibilities rather than kept a secret."},{"id":"M3_U1_Q27","num":27,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"During a privacy audit, an internal auditor reviews the organization's BYOD policy. Which of the following would be a primary control objective for this policy?","options_en":{"A":"Monitoring for unauthorized device access.","B":"Contractor certifications of self-owned device security updating.","C":"Existence and completeness of a signed licapacidade waiver form.","D":"Adequacy of security protections and patch updates."},"correct":"D","explanation_en":"Choice \"D\" is correct. The primary objective would focus on preventing unauthorized devices from accessing company resources, ensuring compliance with security standards."},{"id":"M3_U1_Q28","num":28,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"A company wants to ensure that only specific employees can perform critical actions, such as approving transactions. Which process would achieve this goal?","options_en":{"A":"Identity proofing mechanisms to verify a user’s identity during registration or onboarding.","B":"Accreditation procedures to certify compliance with external or internal requirements.","C":"Authentication steps to validate a user’s credentials at the time of login or access.","D":"Authorization processes to grant permissions based on predefined access roles and policies."},"correct":"D","explanation_en":"Choice \"D\" is correct. Authorization processes ensure that specific users have the required permissions to perform critical actions based on access roles and policies."},{"id":"M3_U1_Q29","num":29,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"What should the database administrator do to properly control access to accounting database files?","options_en":{"A":"Provide read-only access to the database files for users to prevent modification.","B":"Allow updating from privileged utilities to ensure data integrity and security.","C":"Ensure access only to authorized logical views of the data to prevent unauthorized access.","D":"Permit user updates of their access profiles for proper access control."},"correct":"C","explanation_en":"Choice \"C\" is correct. Allowing access only to authorized logical views of the database ensures that only those with the appropriate permissions can visão or modify sensitive data."},{"id":"M3_U1_Q30","num":30,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"Which of the following might be used in a biometric system to authenticate a user?","options_en":{"A":"Voice.","B":"Password.","C":"PIN code.","D":"Employee badge."},"correct":"A","explanation_en":"Choice \"A\" is correct. A person's voice is a personal characteristic. The other answer choices are either personal knowledge or a possession."},{"id":"M3_U1_Q31","num":31,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"What is a critical area an internal auditor must understand when planning an engagement to evaluate how well a company is managing insider threats?","options_en":{"A":"Knowledge of the company.","B":"Business objectives.","C":"Available protection resources.","D":"Nature of insider threats."},"correct":"D","explanation_en":"Choice \"D\" is correct. Understanding the nature of insider threats is essential for identifying potential vulnerabilities and areas for improvement."},{"id":"M3_U1_Q32","num":32,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"Why is collusion between two or more insiders considered the most difficult cybersecurity threat to detect?","options_en":{"A":"Detection tools often monitor individual actions, making it hard to identify coordinated efforts.","B":"Insiders working together can bypass security controls, create fake accounts, or manipulate data in ways that evade detection.","C":"Colluding insiders can hide their activities by blending them with normal operations, making detection harder.","D":"Two or more insiders can alter logs and fabricate data, preventing easy detection of their actions."},"correct":"B","explanation_en":"Choice \"B\" is correct. Collusion allows insiders to bypass controls, manipulate logs, and coordinate actions in ways that are difficult to detect using traditional monitoring systems."},{"id":"M3_U1_Q33","num":33,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"Which of the following is true of the infrastructure of the web?","options_en":{"A":"The Internet backbone is neither owned nor managed.","B":"The World Wide Web Consortium (W3C) manages the nonphysical portions of the Internet.","C":"The domain name system (DNS) automatically includes methods to provide authenticated denial of existence.","D":"Intranets and extranets require greater controls over user authentication and privacy than Internet access requires."},"correct":"D","explanation_en":"Choice \"D\" is correct. Intranets and extranets require stricter controls on authentication and privacy than the Internet devido a to their business-critical nature and sensitive data."},{"id":"M3_U1_Q34","num":34,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"As part of an organization's ongoing cybersecurity efforts, which of the following would be the best example of continuous monitoring?","options_en":{"A":"Providing governance oversight.","B":"Assigning access.","C":"Conducting penetration testing.","D":"Inventorying information assets."},"correct":"C","explanation_en":"Choice \"C\" is correct. Continuous monitoring is best illustrated by conducting penetration testing, as it actively identifies vulnerabilities in the network. Other options are important, but they are more administrative or structural actions, not monitoring."},{"id":"M3_U1_Q35","num":35,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"In responding to cybersecurity incidents, which control heavily relies on logging and monitoring technologies?","options_en":{"A":"Third-party risk assessments and oversight.","B":"Incident response.","C":"Malware discovery and follow-up.","D":"Vulnercapacidade assessments."},"correct":"B","explanation_en":"Choice \"B\" is correct. Logging and monitoring technologies are integral to incident response as they allow detection and tracking of security events. While they contribute to other areas, they are most central to incident response."},{"id":"M3_U1_Q36","num":36,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"What is the best thing internal auditors could recommend if an organization's IT management and IT security personnel have poor working relationships and there appears to be no established way to systematically identify IT vulnerabilities?","options_en":{"A":"Indicate that the organization has poor vulnercapacidade management and prioritize a list of mitigation or remediation steps according to risk.","B":"Enlist senior management support to improve the IT management and IT security relationship; however, there is no way to systematically identify IT vulnerabilities.","C":"While it is important for segregation of duties that IT management and IT security oppose one another, propose inventorying all IT assets and identifying their associated vulnerabilities.","D":"Perform a one-time asset discovery with vulnercapacidade testing and recommend a remediation process."},"correct":"A","explanation_en":"Choice \"A\" is correct. A recommended step for improving the management of vulnerabilities is to prioritize mitigation/remediation steps according to risk. Asset discovery needs to be an ongoing process to keep it continually up-to-date."},{"id":"M3_U1_Q37","num":37,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"What is a password an example of?","options_en":{"A":"A logical security control.","B":"A physical security control.","C":"A hazard control.","D":"A data storage control."},"correct":"A","explanation_en":"Choice \"A\" is correct. A password is a logical security control used to restrict unauthorized access to systems or data."},{"id":"M3_U1_Q38","num":38,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"Buy-side, sell-side, back-office activities, and enterprise resources planning (ERP) are subcategories of which of the following layers of IT?","options_en":{"A":"External connections.","B":"IT management.","C":"Applications.","D":"Technical infrastructure."},"correct":"C","explanation_en":"Choice \"C\" is correct. These activities fall under the Applications layer, which deals with business processes supported by IT systems."},{"id":"M3_U1_Q39","num":39,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"How would a bring-your-own-device (BYOD) policy best enhance an organization's cybersecurity strategy by providing the capacidade to detect, authenticate, and inventory unknown IT devices on the network?","options_en":{"A":"Tracking and monitoring.","B":"Maintaining an asset inventory.","C":"Maintaining the strategy.","D":"Identifying employees' devices."},"correct":"A","explanation_en":"Choice \"A\" is correct. A BYOD policy primarily aids in tracking and monitoring unknown devices on the network, which is crucial for detecting unauthorized access and preventing security threats. Maintaining an asset inventory is a part of the overall strategy but does not directly address the need for real-time detection and monitoring. Identifying employees' devices and maintaining the strategy are components of a broader cybersecurity approach but are less comprehensive in addressing the immediate security risks posed by unknown devices."},{"id":"M3_U1_Q40","num":40,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"Foundational to any cybersecurity framework is the need to ensure which of the following?","options_en":{"A":"Ongoing monitoring.","B":"Adequate data inventory.","C":"Appropriate security configurations.","D":"Good cybersecurity governance."},"correct":"D","explanation_en":"Choice \"D\" is correct. All frameworks start with good governance practices as the overarching component to achieve the framework's objectives. Appropriate security configurations will ensure consistent application of security across systems, but consistency cannot occur without the standards created and monitored by the overall cybersecurity governance process. Ongoing monitoring is a critical component of cybersecurity detection processes, which must include overall policies and procedures provided by the governance facet. An adequate data inventory would be used as part of the overall cybersecurity risk assessment to determine risk and placement of resources to protect data. The risk assessment would be part of the overall governance strategy."},{"id":"M3_U1_Q41","num":41,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"Which of the following controls is strongest and most likely to deter unauthorized access to a system?","options_en":{"A":"Fingerprint identification.","B":"Personal security questions.","C":"Signature verification.","D":"Complex passwords."},"correct":"A","explanation_en":"Choice \"A\" is correct. Biometric authentication is the strongest method of authentication from the choices listed."},{"id":"M3_U1_Q42","num":42,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"Unauthorized alteration of online records can be prevented by employing which of the following?","options_en":{"A":"Computer sequence checks.","B":"Computer matching.","C":"Key verification.","D":"Database access controls."},"correct":"D","explanation_en":"Choice \"D\" is correct. With database access controls, users can gain access to databases from terminals only through established recognition and authorization procedures; thus, unauthorized access is prevented."},{"id":"M3_U1_Q43","num":43,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"If a competitor gains access to pricing information being transmitted from branch offices to the head office, what control would best prevent this unauthorized access?","options_en":{"A":"Transmit data at night when traffic is low.","B":"Require strong password protection for data access.","C":"Use fiber-optic cables for transmission.","D":"Encrypt the data during transmission."},"correct":"D","explanation_en":"Choice \"D\" is correct. Encrypting the data during transmission ensures that even if the data is intercepted, it remains unreadable to unauthorized parties."},{"id":"M3_U1_Q44","num":44,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"To mitigate the risk of malware in a company’s systems, which of the following practices is most effective?","options_en":{"A":"Regular patching.","B":"Threshold analyses.","C":"Quarterly scans.","D":"Continuous assessments."},"correct":"A","explanation_en":"Choice \"A\" is correct. Regular patching ensures that systems are updated with the latest security fixes, reducing the risk of malware. While other methods also provide protection, patching directly addresses known vulnerabilities."},{"id":"M3_U1_Q45","num":45,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"The CIA model consists of three concepts: confidentiality, integrity, and which of the following?","options_en":{"A":"Accessibility.","B":"Availcapacidade.","C":"Authentication.","D":"Authenticity."},"correct":"B","explanation_en":"Choice \"B\" is correct. Availcapacidade ensures data and systems are accessible when required, completing the CIA triad."},{"id":"M3_U1_Q46","num":46,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"An individual is using the Internet to launch ataques targeting financial institutions and critical infrastructure. How would this individual best be categorized?","options_en":{"A":"Hacktivists targeting systems to expose vulnerabilities.","B":"Nation-states/spies conducting cyber warfare or espionage.","C":"Organized criminals seeking financial or strategic benefits.","D":"Terrorists aiming to disrupt infrastructure for political reasons."},"correct":"D","explanation_en":"Choice \"D\" is correct. Terrorists use cyberataques to disrupt infrastructure, such as financial systems, often to further political objectives or incite fear."},{"id":"M3_U1_Q47","num":47,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"A company is setting up a new IAM system and needs to establish processes for creating, modifying, and validating user identities. Which term best describes this activity?","options_en":{"A":"Provisioning processes that involve creating, modifying, validating, and managing user identities within an IAM system.","B":"Enforcement strategies to ensure that user access adheres to organizational policies and guidelines.","C":"Identity management activities to maintainfalha de revisãoof user roles, permissions, and system usage.","D":"Identity proofing methods to verify a user’s identity as part of onboarding or account creation processes."},"correct":"A","explanation_en":"Choice \"A\" is correct. Provisioning processes abranger creating, modifying, and validating user identity details, which are core activities of IAM systems."},{"id":"M3_U1_Q48","num":48,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"A company uses 25 systems, each with its own ID and password. The process of changing passwords has become cumbersome and risky, as users do not have a secure way to store them. What is the best recommendation to streamline the process and reduce risk?","options_en":{"A":"Use a secure password vault for users.","B":"Require standardized password policies across systems.","C":"Implement single sign-on for all systems.","D":"Reduce the total number of systems."},"correct":"C","explanation_en":"Choice \"C\" is correct. Implementing single sign-on (SSO) allows users to access multiple systems with a single login credential, significantly reducing the burden of remembering and managing numerous passwords. This approach enhances both security and efficiency by minimizing password-related risks such as password fatigue, weak passwords, and storage issues. Additionally, it simplifies the password reset process, reducing the potential for security vulnerabilities. SSO eliminates the need for users to store multiple passwords, thus addressing the security risk mentioned in the stem."},{"id":"M3_U1_Q49","num":49,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"What is the best method to prevent someone with sufficient technical skills from circumventing security procedures and making unauthorized changes to production programs?","options_en":{"A":"Running test data periodically to detect discrepancies and errors in production environments.","B":"Providing appropriate segregation of duties to ensure no individual has control over both development and production environments.","C":"Reviewing completed job reports to ensure all processes are correctly executed and meet expectations.","D":"Comparing production programs with independently controlled copies to identify unauthorized changes."},"correct":"B","explanation_en":"Choice \"B\" is correct. Segregation of duties ensures that individuals cannot both develop and operate production systems, reducing the risk of unauthorized changes."},{"id":"M3_U1_Q50","num":50,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"Which combination typically provides dual authorization for critical system roles?","options_en":{"A":"The database administrator and the system administrator.","B":"The superuser and the database administrator.","C":"The business owner and the system administrator.","D":"The business owner and the superuser."},"correct":"C","explanation_en":"Choice \"C\" is correct. Dual authorization often involves both the business owner, who defines requirements, and the system administrator, who manages technical access."},{"id":"M3_U1_Q51","num":51,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"What are cyber insider threat profiles primarily based on?","options_en":{"A":"Motivations.","B":"Known threats.","C":"Risk appetite.","D":"Impacts of disruptions."},"correct":"C","explanation_en":"Choice \"C\" is correct. Risk profiles are primarily based on risk appetite, which ensures the level of risk and threat a company will manage. User motivations would be considered part of known threats, which would be included as examples within the threat profile. Impacts of disruptions would provide a semblance of the degree of disruption to the company risk appetite."},{"id":"M3_U1_Q52","num":52,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"What term refers to the processes for determining system access and permissions for an ID?","options_en":{"A":"Federation.","B":"Separation of duties.","C":"Proofing.","D":"Authorization."},"correct":"D","explanation_en":"Choice \"D\" is correct. Authorization ensures that users only access systems and perform actions according to assigned permissions."},{"id":"M3_U1_Q53","num":53,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"Which of the following is the best thing an organization can do to use its limited resources to protect and defend against cyber intrusions?","options_en":{"A":"Implement standard security configurations.","B":"Inventory its information assets.","C":"Maintain good cybersecurity governance.","D":"Grant access based on job roles."},"correct":"B","explanation_en":"Choice \"B\" is correct. Inventorying information assets helps prioritize what needs protection, especially with limited resources."},{"id":"M3_U1_Q54","num":54,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"A company with an e-commerce system services multiple states and countries. What is the primary question internal audit should ask when reviewing data privacy protections?","options_en":{"A":"What are the common data elements that require protection?","B":"What are the maximum legal costs for not complying?","C":"What is the maximum protection required?","D":"What is the common denominator?"},"correct":"C","explanation_en":"Choice \"C\" is correct. The primary question is identifying the common data elements that require protection to ensure compliance across multiple regulations."},{"id":"M3_U1_Q55","num":55,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"Which of the following statements about email security risks and controls is true?","options_en":{"A":"Staging server encryption creates the encryption when the email is sent, and doesn't decrypt it until it is opened.","B":"Eavesdropping on emails is a problem only when the message is unencrypted.","C":"Denial-of-service ataques are the sending of unsolicited bulk email that could contain viruses.","D":"Digital signatures ensure accurate identification for senders outside the trusted network."},"correct":"D","explanation_en":"Choice \"D\" is correct. Digital signatures are used to authenticate the sender's identity and ensure message integrity."},{"id":"M3_U1_Q56","num":56,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"Which of the following is a good choice for mitigating physical risks to a computer data center without entailing unreasonable costs?","options_en":{"A":"Locate the data center along an outside concrete wall for better fire protection.","B":"Use reinforced walls that run to the top of the permanent ceiling to reduce electromagnetic interference in the data center.","C":"Use steel wool to clean rust from servers damaged by water leakage.","D":"Implement planned maintenance of heating, venting, and air conditioning equipment and log activity."},"correct":"D","explanation_en":"Choice \"D\" is correct. Maintenance and housekeeping schedules should be adhered to, including maintaining equipment needed for cooling, dust control, and maintenance of proper humidity levels. Reinforced walls that run from the floor to the permanent ceiling above (also called slab-to-slab construction) are intended to prevent physical access, not reduce interference. Steel wool will ruin a server with metallic dust. Data centers should not be located along outside walls."},{"id":"M3_U1_Q57","num":57,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"A company is reviewing potential cybersecurity risks. Of the items listed, which poses the highest cybersecurity risk to a company?","options_en":{"A":"User access.","B":"Third-party vendors.","C":"External-facing systems.","D":"Vulnerabilities identified by scanning software."},"correct":"C","explanation_en":"Choice \"C\" is correct. External-facing systems are the most vulnerable to ataques because they are directly accessible from the internet, increasing the chances of exploitation. While user access and third-party vendors present significant risks, external-facing systems are more exposed and often targeted in cyberataques. Identified vulnerabilities, although important, are not as immediately dangerous without an exposed system."},{"id":"M3_U1_Q58","num":58,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"What would generally be included in an audit trail log designed to summarize unauthorized system access attempts?","options_en":{"A":"List of authorized users.","B":"Type of event or transaction attempted.","C":"Vulnercapacidade that was exploited.","D":"Name of person who actually made the attempt."},"correct":"B","explanation_en":"Choice \"B\" is correct. The type of event or transaction, the location of the attempted access, and the data sought would all be included in an audit log and are necessary to investigate unauthorized attempted access to the system. The list of users and their passwords would not be included in an audit trail log but in a file within the computer. While the person may have used a username to gain access and this can be in the log, there is no guarantee that this person is the actual perpetrator. A different person's username and password might have been used."},{"id":"M3_U1_Q59","num":59,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"What is addressed by a computer program patch?","options_en":{"A":"Computer updates requiring the replacement of computer chip.","B":"A security vulnercapacidade.","C":"Materials used to remediate physical layer issues.","D":"Periodic updates to tech specs."},"correct":"B","explanation_en":"Choice \"B\" is correct. A computer program patch addressees security vulnerabilities within a software program."},{"id":"M3_U1_Q60","num":60,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"Which of the following best describes a logical access-control design that requires an employee to use a proximity badge and enter a PIN code?","options_en":{"A":"Something you know and something you are.","B":"Something you know and something you have.","C":"Something you are, know, and have.","D":"Something you are and something you have."},"correct":"B","explanation_en":"Choice \"B\" is correct. A PIN code is something you know, and a proximity badge is something you have. It is a double-access control and more effective than a single authentication method."},{"id":"M3_U1_Q61","num":61,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"Automated log-off of inactive users and the concept of least privilege are examples of which of the following types of controls?","options_en":{"A":"Hardware controls.","B":"Logical controls.","C":"IT operational controls.","D":"Input controls."},"correct":"B","explanation_en":"Choice \"B\" is correct. Logical controls are measures designed to ensure authorized access and use of systems and data."},{"id":"M3_U1_Q62","num":62,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"During an internal audit, an auditor identifies signs of malware infection within the organization’s network. Why is this considered a particularly dangerous threat?","options_en":{"A":"Malware can spread through systems, impacting the broader network and potentially compromising critical data.","B":"Malware may go undetected, allowing it to manipulate data and affect internal controls.","C":"Malware can disrupt operations, alter financial data, and remain hidden from detection systems.","D":"Malware can spread quickly across systems, steal sensitive data, and remain undetected, causing long-term damage."},"correct":"D","explanation_en":"Choice \"D\" is correct. Malware spreads rapidly, steals sensitive data, and remains undetected, leading to long-term damage to operations and financial integrity."},{"id":"M3_U1_Q63","num":63,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"Which of the following would normally be functions of security software?","options_en":{"A":"Displaying the data typed into a terminal chaveboard.","B":"Recording and monitoring changes to program source code and object code files.","C":"Authenticating user identification and controlling access to information resources.","D":"Logging the activity of the computer system, including the time each program is started and when each file is accessed."},"correct":"C","explanation_en":"Choice \"C\" is correct. Authentication and subsequent access to computer resources are the primary functions of security software."},{"id":"M3_U1_Q64","num":64,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"What is the primary purpose of using passwords for computer software programs?","options_en":{"A":"To prevent incomplete updating of data files devido a to unauthorized changes.","B":"To prevent unauthorized use of the software and protect against unauthorized access.","C":"To prevent unauthorized access to the computer system or its resources.","D":"To prevent inaccurate processing of data within the software."},"correct":"B","explanation_en":"Choice \"B\" is correct. Passwords are a basic form of security designed to limit access to authorized users only, ensuring the integrity and security of software and systems."},{"id":"M3_U1_Q65","num":65,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"Which best describes effective password controls?","options_en":{"A":"Length, complexity, media access codes.","B":"Digital certificates, lockout, storage, and access.","C":"Expiry and reuse, lockout, storage, and access.","D":"Complexity, digital access, voice pattern."},"correct":"C","explanation_en":"Choice \"C\" is correct. Effective password controls involve expiry/reuse policies, lockout measures, and secure storage/access management."},{"id":"M3_U1_Q66","num":66,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"Which of the following is the greatest risk to the protection of personal data?","options_en":{"A":"Maintaining appropriate security protections.","B":"Hackers or extortionists.","C":"Changing privacy regulations.","D":"Organization's employees."},"correct":"D","explanation_en":"Choice \"D\" is correct. People remain the greatest threat to any organization in regard to protection of personal information. External threats like hackers and extortionists remain a risk, but the greatest threats are from company insiders—its employees. Privacy regulations are ever evolving, but most new regulations provide a timetable for implementation so an organization has time to comply. The level of security protections is dependent on the costs and impacts of noncompliance, and risks can be mitigated."},{"id":"M3_U1_Q67","num":67,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"Why might internal auditors from outside the European Union (EU) need to be concerned with General Data Protection Regulation (GDPR) requirements?","options_en":{"A":"Continuing professional development mandates training on GDPR.","B":"The auditor's organization collects personal data of individuals in the EU.","C":"All EU-passed information technology laws have global impact.","D":"Best practices dictate compliance with the GDPR."},"correct":"B","explanation_en":"Choice \"B\" is correct. If an organization collects or holds personal data of individuals residing in the EU, it must comply with the GDPR, regardless of its location."},{"id":"M3_U1_Q68","num":68,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"Which company would be the most likely target for a hacker?","options_en":{"A":"A company with valuable data.","B":"A company that is publicly traded.","C":"A company in a competitive industry.","D":"A company that is well-known."},"correct":"A","explanation_en":"Choice \"A\" is correct. Hackers prioritize companies with valuable data as it is more lucrative and sensitive."},{"id":"M3_U1_Q69","num":69,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"Which term refers to an individual whose personal information is collected, used, disclosed, retained, and disposed of?","options_en":{"A":"Service provider.","B":"Data subject.","C":"Privacy officer.","D":"Data controller."},"correct":"B","explanation_en":"Choice \"B\" is correct. The term \"data subject\" refers to an individual whose personal information is collected, processed, and stored by an organization."},{"id":"M3_U1_Q70","num":70,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"Which of the following access setups is appropriate in a computer environment?","options_en":{"A":"Users have update access for production data, but application programmers do not. Neither users nor application programmers have update access for production programs.","B":"Users do not have update access for production data, but application programmers do. Both users and application programmers have update access for production programs.","C":"Users have update access for production data, but application programmers do not. Users do not have update access for production programs, but application programmers do.","D":"Users do not have update access for production data, but application programmers do. Users have update access for production programs, but application programmers do not."},"correct":"A","explanation_en":"Choice \"A\" is correct. Users need to update data through applications programs. An important segregation of duties is that application programmers should not be able to change production programs. They should submit changes to the change control unit. Application programmers should never have update access to production data. Users have no need to change production programs."},{"id":"M3_U1_Q71","num":71,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"Which of the following security controls would best prevent unauthorized access to sensitive data through an unattended computer?","options_en":{"A":"Encryption of data files.","B":"Use of workstation scripts.","C":"Two-factor authentication.","D":"Automatic log off of inactive users."},"correct":"D","explanation_en":"Choice \"D\" is correct. Automatic log off of inactive users may prevent the viewing of sensitive data on an unattended computer. While some form of authentication is needed, if the authorized user is already logged in but has stepped away, this control could be bypassed. Scripting is the use of a program to automate a process such as start-up. Encryption of data files will not prevent the viewing of data on an unattended data terminal."},{"id":"M3_U1_Q72","num":72,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"Which of the following is likely to be a benefit of electronic data interchange (EDI)?","options_en":{"A":"Improved business relationships with trading partners.","B":"Decreased requirements for backup and contingency planning.","C":"Decreased licapacidade related to protection of proprietary business data.","D":"Increased transmission speed of actual documents."},"correct":"A","explanation_en":"Choice \"A\" is correct. EDI facilitates improved business relationships by providing efficient, standardized, and reliable electronic transactions with trading partners."},{"id":"M3_U1_Q73","num":73,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"What is the best approach to developing an insider threat program?","options_en":{"A":"Incorporate an impact assessment.","B":"Include all insider threats.","C":"Collaborate with senior management.","D":"Develop a formalized program."},"correct":"D","explanation_en":"Choice \"D\" is correct. Developing a formalized program that systematically provides clearly documented expectations, roles and responsibilities, timing, and activities will ensure a high success rate. An understanding of known insider threats should be incorporated into the formal program as well as an impact assessment for each threat. Collaboration with senior management will ensure that the formal plan is accepted by the company."},{"id":"M3_U1_Q74","num":74,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"Which best describes the cybersecurity role of the chief audit executive (CAE) in regard to the audit committee?","options_en":{"A":"Training the audit committee on cybersecurity best practices.","B":"Reviewing cyber strategy with audit committee.","C":"Serving as technical advisor on cybersecurity threats.","D":"Providing assurance on risk management and controls."},"correct":"D","explanation_en":"Choice \"D\" is correct. Providing assurance on risk management and controls is the primary role of the CAE when addressing cybersecurity concerns."},{"id":"M3_U1_Q75","num":75,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"An auditor has just completed a physical security audit of a data center. Because the center engages in top-secret defense contract work, the auditor has chosen to recommend biometrics authentication for workers entering the building. Which is the best recommendation listed?","options_en":{"A":"Replace the current access system with a fingerprint recognition system.","B":"Supplement the current radio frequency badge identification system with a password verification system.","C":"Supplement the current radio frequency badge identification system with an iris recognition system.","D":"Replace the current badge system with a security guard and a face recognition system."},"correct":"C","explanation_en":"Choice \"C\" is correct. Two-factor identification (in this example, a badge plus a biometric iris recognition system) will provide the highest security of the items listed at the lowest incremental cost, because one of the systems is currently in place. Passwords are not a type of biometrics authentication and so do not fit the auditor's desired recommendation. The fingerprint recognition system is a single-factor biometrics authentication method. A security guard can provide an extra layer of security but at a higher cost than the iris recognition system."},{"id":"M3_U1_Q76","num":76,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"When analyzing insider threats, which type of potential bad actor should an organization prioritize considering?","options_en":{"A":"Trusted business partners.","B":"Hacktivists.","C":"National States.","D":"Consumers."},"correct":"A","explanation_en":"Choice \"A\" is correct. Trusted business partners may have access to internal systems and pose significant risks if they act maliciously or are compromised."},{"id":"M3_U1_Q77","num":77,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"A security architecture designed so that each entity is granted minimum system resources and authorizations that the entity needs to perform its function best describes which of the following?","options_en":{"A":"Mechanized ID.","B":"Least privilege.","C":"Privileged user.","D":"B.Least privilege. C.Privileged user. D.Credential."},"correct":"B","explanation_en":"Choice \"B\" is correct. The principle of least privilege ensures entities have only the permissions necessary for their roles, enhancing security."},{"id":"M3_U1_Q78","num":78,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"To reduce security exposure when transmitting proprietary data over communication lines, a company should use which of the following?","options_en":{"A":"Asynchronous modems.","B":"Cryptographic devices.","C":"Call-back procedures.","D":"Authentication techniques."},"correct":"B","explanation_en":"Choice \"B\" is correct. Cryptographic devices encrypt data to protect it in transmission over communication lines."},{"id":"M3_U1_Q79","num":79,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"What is a benefit to a business of good privacy controls that protect customer data?","options_en":{"A":"Achieving a competitive advantage.","B":"Protecting business partners.","C":"Increasing net income.","D":"Protecting proprietary data."},"correct":"A","explanation_en":"Choice \"A\" is correct. Good privacy controls can create a competitive advantage among similar businesses. Proprietary data usually does not include customer data. Although good privacy controls may result in an organization achieving a competitive advantage, this may not increase net income. Good privacy controls will protect business partners' data but not the partners themselves."},{"id":"M3_U1_Q80","num":80,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"Which of the following security controls would best prevent unauthorized access to sensitive data via an unattended data terminal directly connected to a mainframe?","options_en":{"A":"Use of a screen saver with a password.","B":"Encryption of data files.","C":"Establishment of security profiles in a multilayered data security system.","D":"Automatic logoff of inactive users."},"correct":"D","explanation_en":"Choice \"D\" is correct. Automatic logoff ensures that inactive users are securely disconnected after a period of inactivity, preventing unauthorized access to sensitive data from unattended terminals. This control directly addresses the issue of safeguarding data in scenarios where a terminal might be left open and unattended. While other options enhance security, automatic logoff is the most effective for this specific scenario."},{"id":"M3_U1_Q81","num":81,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"Which of the following is a control feature designed to negate the use of utility programs to read files that contain all authorized access user codes for the network?","options_en":{"A":"Protocol controls.","B":"Log-on passwords.","C":"A password hierarchy.","D":"Internally encrypted passwords."},"correct":"D","explanation_en":"Choice \"D\" is correct. Internally encrypted passwords ensure that even if files are accessed, the information is unreadable without decryption."},{"id":"M3_U1_Q82","num":82,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"Which of the following statements best describes the type of control provided by a chave card reader with a magnetic strip?","options_en":{"A":"A device security control designed to prevent phishing.","B":"An antivirus control designed to limit systems access.","C":"A physical security control designed to authenticate system users.","D":"A biometric control designed to limit systems access to authorized personnel."},"correct":"C","explanation_en":"Choice \"C\" is correct. A chave card reader is a type of physical security control that allows access to authorized personnel."},{"id":"M3_U1_Q83","num":83,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"A group is stealing and publishing an organization’s sensitive information to make a political statement. How would this group best be categorized?","options_en":{"A":"Terrorists, aiming to incite fear through cyberataques.","B":"Nation-states/spies, leveraging cyber capabilities for espionage.","C":"Hacktivists, using digital activism to push their agenda.","D":"Organized criminals, motivated by financial gain."},"correct":"C","explanation_en":"Choice \"C\" is correct. Hacktivists use cyberataques to make political or social statements, often through the theft and exposure of sensitive information."},{"id":"M3_U1_Q84","num":84,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"An organization is reviewing its access controls and wants to prioritize the most vulnerable capabilities. Which of the following access capabilities is most susceptible to cybersecurity risk?","options_en":{"A":"Access to large amounts of data.","B":"Access to administrative privileges.","C":"Access to many systems.","D":"Access to security software."},"correct":"B","explanation_en":"Choice \"B\" is correct. Access to administrative privileges provides the most significant risk to an organization because it typically grants unrestricted access to critical systems and data, making it a prime target for cyberataques. While access to large amounts of data, security software, or many systems can also present risks, administrative access is the most powerful and commonly exploited vulnercapacidade in cybersecurity ataques."},{"id":"M3_U1_Q85","num":85,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"Why is it important to identify which software and devices are interacting on a company’s network?","options_en":{"A":"To acompanhar all devices.","B":"To identify employee-owned devices.","C":"To defend against cyber threats.","D":"To measure changes in device output."},"correct":"C","explanation_en":"Choice \"C\" is correct. Identifying software and devices on a network is critical to defending against cyber threats by ensuring only authorized devices have access."},{"id":"M3_U1_Q86","num":86,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"Which of the following would demonstrate that IT controls are being effectively implemented in an organization?","options_en":{"A":"The customer support center reports fewer security-related inquiries.","B":"Management is clearly informed about how resources are allocated.","C":"The IT department focuses exclusively on maintaining existing systems.","D":"Individuals feel more secure and worry less about security."},"correct":"B","explanation_en":"Choice \"B\" is correct. Effective IT controls are demonstrated when employees feel secure and can focus on their work, which reflects an organizationwide implementation of strong controls and mitigated risks."},{"id":"M3_U1_Q87","num":87,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"After a system has been shut down and before it restarts automatically, changes may be made to the restart parameters to weaken security. This external threat is known as which of the following?","options_en":{"A":"Server/mainframe ataque.","B":"Denial-of-service ataque.","C":"Layer 7 DDoS ataque.","D":"Asynchronous ataque."},"correct":"D","explanation_en":"Choice \"D\" is correct. Asynchronous ataques target systems during downtime or transition states to exploit vulnerabilities."},{"id":"M3_U1_Q88","num":88,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"What is the best control for minimizing the likelihood of fictitious orders being entered from store terminals?","options_en":{"A":"Encrypt outward-bound transmissions from the stores to protect data in transit.","B":"Enforce password control procedures for users to ensure proper authentication.","C":"Require change control procedures for programs to minimize unauthorized changes.","D":"Encourage employees to report suspicious activity for better monitoring."},"correct":"B","explanation_en":"Choice \"B\" is correct. Enforcing password control procedures for users ensures that only authorized individuals can access and make changes in the system, reducing the risk of unauthorized orders."},{"id":"M3_U1_Q89","num":89,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"What is an important consideration when a patch is being implemented?","options_en":{"A":"Patching does not require any planning or testing.","B":"Patching will not impact the monthly change management success rate.","C":"Timing must be considered as appropriate preparation may be needed.","D":"Implementing a patch is always an inconvenience."},"correct":"C","explanation_en":"Choice \"C\" is correct. Timing is critical to ensure that the patch is properly prepared, tested, and deployed without disruption."},{"id":"M3_U1_Q90","num":90,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"Which of the following is an important senior management responsibility with regard to information systems security?","options_en":{"A":"Training employees in security matters.","B":"Assigning access privileges.","C":"Determining ownership of data.","D":"Assessing exposures."},"correct":"D","explanation_en":"Choice \"D\" is correct. Assessment of exposures is a senior management responsibility related to the establishment of organizational policy with regard to information systems security. The rest are tasks of security management."},{"id":"M3_U1_Q91","num":91,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"Which best describes authentication factors?","options_en":{"A":"Something you know, something you have, something you are.","B":"Something you know, something you have, something you do.","C":"Something you know, something you do, something you are.","D":"Something you have, something you do, something you are."},"correct":"A","explanation_en":"Choice \"A\" is correct. Authentication factors include knowledge (e.g., password), possession (e.g., token), and inherence (e.g., biometrics)."},{"id":"M3_U1_Q92","num":92,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"Management is concerned that data uploaded from a computer to the company's server in batch processing may be erroneous. Which of the following controls would best address this issue?","options_en":{"A":"The server should subject the data to the same edits and validation routines that online data entry would require.","B":"The mainframe computer should be backed up on a regular basis.","C":"Two individuals should be present at the microcomputer when it is uploading data.","D":"The users should be required to review a random sample of processed data."},"correct":"A","explanation_en":"Choice \"A\" is correct. Subjecting batch-uploaded data to the same edits and validation as online entry ensures the accuracy and consistency of the uploaded data."},{"id":"M3_U1_Q93","num":93,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"What primary types of controls, at a minimum, should an auditor generally expect an organization to address in its information security policies?","options_en":{"A":"Compliance and reporting.","B":"Preventive and detective.","C":"Administrative and corrective.","D":"Strategic and directive."},"correct":"B","explanation_en":"Choice \"B\" is correct. Preventive and detective controls addressing a variety of risks are expected inclusions in an effective information security policy."},{"id":"M3_U1_Q94","num":94,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"Which of the following is a potential risk for an organization that allows employees to use their personal devices to conduct business?","options_en":{"A":"Increased exposure to malware ataques.","B":"Lower employee satisfaction.","C":"Less efficiency.","D":"Higher organizational costs on devices."},"correct":"A","explanation_en":"Choice \"A\" is correct. Allowing employees to use personal devices increases exposure to malware ataques, as personal devices may not have the same security standards as corporate devices."},{"id":"M3_U1_Q95","num":95,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"Which of the following roles do auditors typically play in ensuring an organization's compliance with data privacy responsibilities?","options_en":{"A":"Ensuring that data privacy laws are properly communicated to responsible parties.","B":"Assisting management in developing privacy test scripts.","C":"Training organizational personnel on privacy compliance.","D":"Coordinating privacy awareness surveys with stakeholders."},"correct":"A","explanation_en":"Choice \"A\" is correct. Auditors ensure that data privacy laws are communicated to the relevant parties, ensuring compliance with legal and regulatory requirements, and minimizing privacy risks."},{"id":"M3_U1_Q96","num":96,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"Who typically determines business requirements for identity and access management?","options_en":{"A":"A network administrator.","B":"A system architect.","C":"A business owner.","D":"A super user."},"correct":"C","explanation_en":"Choice \"C\" is correct. Business owners define requirements based on operational needs and compliance standards."},{"id":"M3_U1_Q97","num":97,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"Which of the following is part of a third-party vendor assessment and monitoring program?","options_en":{"A":"Security configuration assessments.","B":"Incident monitoring and response.","C":"Vulnercapacidade assessments.","D":"Access-level evaluation."},"correct":"C","explanation_en":"Choice \"C\" is correct. Vulnercapacidade assessments are essential for identifying weaknesses in third-party vendors that could compromise the organization."},{"id":"M3_U1_Q98","num":98,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"An organization needs to control who can access sensitive data in a database. Which database element would regulate read-only access for a specific user role?","options_en":{"A":"Schema.","B":"Data dictionary.","C":"Structured query language (SQL).","D":"Data definition language."},"correct":"A","explanation_en":"Choice \"A\" is correct. A data dictionary is used to define and regulate how data can be accessed and modified, including setting access controls such as read-only permissions."},{"id":"M3_U1_Q99","num":99,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"Company policy states that all employee access requests are approved by the employee's immediate supervisor. A supervisor is new to the company. Which of the following will best allow the supervisor to understand requests and approve the appropriate access for employees?","options_en":{"A":"Standard role matrices denoting user access by job responsibility.","B":"Understanding of the various systems' access capabilities.","C":"Documentation that explains each system role and access capcapacidade.","D":"Understanding of employees' job duties."},"correct":"A","explanation_en":"Choice \"A\" is correct. Standard role matrices by job responsibility allow approval of access without requiring full knowledge of the various system roles. Such matrices take the decision-making away from the supervisor and provide for consistent and standard access assignment."},{"id":"M3_U1_Q100","num":100,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"Most organizations are concerned about the potential compromise of passwords. Which of the following procedures would be the most effective in controlling against a perpetrator obtaining someone else's password?","options_en":{"A":"Implement a computer program that tests to see that the password is not easily guessed.","B":"Implement the use of \"see-through\" authentication techniques whereby the user uses a card to generate a password and verifies both the chave and the generated password to the system.","C":"Allow only the users to change their passwords and encourage them to change passwords frequently.","D":"Limit password authorization to time of day and location."},"correct":"B","explanation_en":"Choice \"B\" is correct. \"See-through\" authentication techniques require the user to have two of the three important elements to identify oneself to the system, that is, something they possess (the card used to generate the password) and something they know (the chave or password to generate the new password)."},{"id":"M3_U1_Q101","num":101,"total":107,"module":"M3","unit":"U1","topic":"IT Considerations","question_en":"Why migh
