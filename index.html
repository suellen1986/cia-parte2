rk assignments?","options_en":{"A":"Matching tasks to auditors based on their expertise and experience.","B":"Allowing auditors to select their preferred assignments.","C":"Assigning work randomly to distribute tasks evenly.","D":"Giving the most complex tasks to new auditors for training purposes."},"correct":"A","explanation_en":"Choice \"A\" is correct. Assigning work based on skills and experience ensures that tasks are completed efficiently and accurately."},{"id":"M1_U3_Q3","num":3,"total":51,"module":"M1","unit":"U3","topic":"Engagement Supervision","question_en":"Which of the following best describes the purpose of workpapers in engagement supervision?","options_en":{"A":"Workpapers serve as the primary support for engagement communications.","B":"Workpapers are used to document the annual performance review of internal auditors.","C":"Workpapers are only required for engagements involving external service providers.","D":"Workpapers are not required for engagements with minimal findings."},"correct":"A","explanation_en":"Choice \"A\" is correct. Workpapers serve as the primary support for engagement conclusions, ensuring accuracy and completeness. As noted in the Standards, engagement workpapers should include information on the procedures performed, the information identified, and the findings and preliminary conclusions made during the engagement. The engagement supervisor should evaluate whether the engagement objectives have been achieved and whether engagement conclusions are supported by assessing the relevance, relicapacidade, and sufficiency of information, testing, and evidence obtained that are documented in the workpapers. Choice \"B\" is incorrect. Workpapers are not used for internal auditors’ annual performance reviews. The annual performance review with the CAE incorporates reviews conducted after each engagement for the internal auditor throughout the year, allowing the CAE to provide a comprehensive perspective on the internal auditor's overall performance and support the internal auditor's long-term professional development. Choice \"C\" is incorrect. Workpapers are required for all engagements, not just those involving external service providers. Choice \"D\" is incorrect. Workpapers are required regardless of the engagement's findings."},{"id":"M1_U3_Q4","num":4,"total":51,"module":"M1","unit":"U3","topic":"Engagement Supervision","question_en":"A supervisor is evaluating an auditor’s performance during an engagement. What is the most important factor to assess?","options_en":{"A":"The auditor’s level of enthusiasm for the engagement topic.","B":"The number of work hours the auditor logged during the engagement.","C":"The auditor’s capacidade to follow instructions without asking questions.","D":"The accuracy, completeness, and timeliness of the auditor’s work."},"correct":"D","explanation_en":"Choice \"D\" is correct. Performance evaluation should focus on accuracy, completeness, and timeliness to ensure audit quality."},{"id":"M1_U3_Q5","num":5,"total":51,"module":"M1","unit":"U3","topic":"Engagement Supervision","question_en":"Which of the following is the most effective way for an engagement supervisor to promote communication among team members during an engagement?","options_en":{"A":"Assign a single team member to handle all communication for the engagement.","B":"Limit communication to written updates to avoid unnecessary discussions.","C":"Hold regular team meetings to discuss progress, share insights, and resolve issues.","D":"Allow team members to communicate informally as needed without structured meetings."},"correct":"","explanation_en":"Choice “A” is incorrect. Assigning a single team member to handle all communication may levar to gargalos and falhas de comunicação. Choice “B” is incorrect. Limiting communication to written updates may hinder collaboration and problem solving. Choice “C” is correct. Appropriate communication between engagement team members is crucial for the effective implementation of the work program and should be driven by the engagement supervisor. Holding regular team meetings promotes communication, ensures alinhamento, and allows team members to share insights and resolve issues. Choice “D” is incorrect. While informal communication is useful, structured meetings are essential for effective coordination."},{"id":"M1_U3_Q6","num":6,"total":51,"module":"M1","unit":"U3","topic":"Engagement Supervision","question_en":"A supervisor notices that two auditors have overlapping tasks in their assignments. What is the best way to resolve this issue?","options_en":{"A":"Encouraging collaboration between the auditors to ensure both contribute effectively.","B":"Allowing both auditors to continue working independently, even if duplication occurs.","C":"Adjusting task assignments to eliminate duplication and improve efficiency.","D":"Asking auditors to discuss their tasks and decide how to divide responsibilities."},"correct":"C","explanation_en":"Choice \"C\" is correct. Supervisors should ensure responsibilities are clearly assigned to prevent inefficiencies and duplication of effort."},{"id":"M1_U3_Q7","num":7,"total":51,"module":"M1","unit":"U3","topic":"Engagement Supervision","question_en":"During an engagement, the supervisor and an internal auditor disagree on the sufficiency of evidence supporting a chave finding. The supervisor believes additional testing is required, whereas the auditor argues that the evidence is sufficient. What is the most appropriate action for the supervisor to take?","options_en":{"A":"Conduct further inquiries or research to resolve the difference in professional judgment.","B":"Approve the finding as it is to avoid delaying the engagement.","C":"Escalate the issue to the CAE immediately for resolution.","D":"Remove the finding from the engagement report to avoid conflict."},"correct":"","explanation_en":"Choice “A” is correct. When supervising engagements and reviewing workpapers and engagement conclusions, there may be instances in which there are differences in professional judgment. A process to resolve differences in professional judgment may include discussing relevant facts, conducting further inquiries or research, and documenting the differing viewpoints and conclusions in the engagement workpapers. Conducting further inquiries or research to resolve differences in professional judgment emphasizes resolving such differences through discussion and additional analysis. Choice “B” is incorrect. Approving the finding without addressing the disagreement compromises the quality of the engagement. Choice “C” is incorrect. Escalating the issue immediately to the CAE is unnecessary unless the disagreement cannot be resolved at the supervisor level. Choice “D” is incorrect. Removing the finding does not resolve the underlying issue and may compromise the engagement's objectives."},{"id":"M1_U3_Q8","num":8,"total":51,"module":"M1","unit":"U3","topic":"Engagement Supervision","question_en":"Which of the following is an example of inappropriate feedback during an engagement performance review of an internal auditor?","options_en":{"A":"Using generalizations, such as \"You always miss deadlines,\" without providing specific evidence","B":"Documenting the performance review and discussing an action plan for improvement","C":"Soliciting feedback from stakeholders to support the evaluation process","D":"Providing specific examples of areas where the internal auditor excelled and areas for improvement"},"correct":"","explanation_en":"Choice “A” is correct. Post-engagement reviews support internal auditors' development through job performance evaluations. Specific examples of individual performance, as well as client feedback collected through surveys, can serve as supporting evidence for evaluating the performance of internal auditors. Using generalizations without specific evidence is inappropriate because it lacks constructive feedback and does not help the auditor understand how to improve. Choice “B” is incorrect. Documenting the review and creating an action plan is essential for accountcapacidade and development. Choice “C” is incorrect. Soliciting feedback from stakeholders provides valuable input for the evaluation process. Choice “D” is incorrect. Providing specific examples of individual performance, such as observed behavior and the quality of workpapers, is a best practice for performance reviews."},{"id":"M1_U3_Q9","num":9,"total":51,"module":"M1","unit":"U3","topic":"Engagement Supervision","question_en":"During the planning phase of an engagement, the supervisor notices that the work program does not include procedures for testing a high-risk area identified during the risk assessment. What is the most appropriate action for the supervisor to take?","options_en":{"A":"Approve the work program as it is to avoid delaying the engagement.","B":"Direct the internal audit team to revise the work program to include procedures for testing the high-risk area.","C":"Assign the testing of the high-risk area to an external service provider without modifying the work program.","D":"Remove the high-risk area from the scope of the engagement to ensure timely completion."},"correct":"","explanation_en":"Choice “A” is incorrect. Approving the work program without addressing the high-risk area compromises the quality and objectives of the engagement. Choice “B” is correct. The supervisor should approve the engagement work program during engagement planning and may oversee other aspects of the planning process. The main considerations for approval are whether the work program effectively achieves the engagement objectives and includes procedures for identifying, analyzing, evaluating, and documenting information. Revising the work program to include procedures for testing the high-risk area ensures that the engagement objectives are met and align with the Standards. Choice “C” is incorrect. Assigning the testing to an external service provider without modifying the work program does not ensure proper documentation or alinhamento with the engagement objectives. Choice “D” is incorrect. Removing the high-risk area from the scope undermines the engagement's purpose and does not align with the Standards."},{"id":"M1_U3_Q10","num":10,"total":51,"module":"M1","unit":"U3","topic":"Engagement Supervision","question_en":"Which of the following is a chave responsibility of the engagement supervisor when reviewing workpapers?","options_en":{"A":"Preparing the engagement work program","B":"Evaluating the sufficiency, relicapacidade, and relevance of evidence","C":"Ensuring that workpapers are signed by all team members","D":"Conducting the annual performance review of internal auditors"},"correct":"B","explanation_en":"Choice \"A\" is incorrect. Preparing the engagement work program is typically the responsibility of internal auditors and is conducted during engagement planning. Choice \"B\" is correct. Under the requirement of Standard 14.6: Engagement Documentation, the engagement supervisor must review the engagement documentation for accuracy, relevance, and completeness. Therefore, the engagement supervisor is responsible for evaluating the sufficiency, relicapacidade, and relevance of evidence documented in the workpapers. Choice \"C\" is incorrect. While workpapers must be reviewed, signing by all team members is not a requirement. However, engagement workpapers should include evidence of supervisory approval (e.g., initialed and dated by the supervisor, electronically approved) and should be preserved. Choice \"D\" is incorrect. Annual performance reviews are conducted by the CAE, not the engagement supervisor. The annual performance review with the CAE usually incorporates reviews conducted after each engagement for the internal auditor throughout the year, allowing the CAE to provide a comprehensive perspective on the internal auditor's overall performance and support the internal auditor's long-term professional development. Feedback gathered through supervision and review of workpapers is part of the performance evaluation."},{"id":"M1_U3_Q11","num":11,"total":51,"module":"M1","unit":"U3","topic":"Engagement Supervision","question_en":"During an engagement, the supervisor notices that one team member has completed their assigned tasks ahead of schedule while another team member is struggling to meet deadlines devido a to the complexity of their assigned work. The delays are beginning to affect the overall engagement timeline. What is the most appropriate action for the supervisor to take?","options_en":{"A":"Escalate the issue to the CAE to request additional resources for the engagement.","B":"Reassign some of the complex tasks to the team member who completed their work early to balance the workload.","C":"Allow the struggling team member to continue working at their own pace to ensure quality.","D":"Extend the engagement timeline to accommodate the delays caused by the complex tasks."},"correct":"","explanation_en":"Choice “A” is incorrect. Escalating the issue to the CAE is unnecessary unless the problem cannot be resolved at the supervisor level. Choice “B” is correct. Supervisory responsibilities include making and communicating work assignments during planning and maintaining communication with internal auditors throughout the engagement. The engagement supervisor should take into account the skills of internal auditors alongside the engagement objectives when making work assignments. Reassigning some of the complex tasks to the team member who completed their work early helps balance the workload and ensures the engagement stays on track. This demonstrates effective supervision and resource management. Choice “C” is incorrect. Allowing the team member to continue at their own pace without intervention risks further delays and does not address the workload imbalance. Choice “D” is incorrect. Extending the timeline should be a last resort and does not address the underlying issue of workload imbalance."},{"id":"M1_U3_Q12","num":12,"total":51,"module":"M1","unit":"U3","topic":"Engagement Supervision","question_en":"During a performance review, the engagement supervisor provides feedback to an internal auditor. The feedback includes specific examples of areas for improvement but also includes vague statements such as, \"You need to be more proactive.\" The internal auditor expresses confusion about what \"proactive\" means in this context. What should the engagement supervisor do to improve the feedback process?","options_en":{"A":"Provide specific examples of what \"proactive\" behavior looks like in the context of the auditor's role.","B":"Focus more on the auditor's strengths to maintain a positive tone during the review.","C":"Avoid providing feedback on areas for improvement to prevent confusion.","D":"Use generalizations to ensure the feedback is broad and applicable to all situations."},"correct":"","explanation_en":"Choice “A” is correct. Post-engagement reviews support internal auditors' development through job performance evaluations. Audit staff performance can be assessed through direct observation and review of their work during an engagement. Specific examples of individual performance, such as observed behavior and the quality of workpapers, can serve as supporting evidence for evaluating the performance of internal auditors. Thus, providing specific examples of what \"proactive\" behavior looks like ensures the feedback is actionable and clear, which is essential for professional development. Choice “B” is incorrect. While focusing on strengths is important, addressing areas for improvement is equally critical for development. Choice “C” is incorrect. Avoiding feedback on areas for improvement does not support the auditor's growth. Choice “D” is incorrect. Using generalizations leads to confusion and does not provide actionable guidance."},{"id":"M1_U3_Q13","num":13,"total":51,"module":"M1","unit":"U3","topic":"Engagement Supervision","question_en":"Which of the following scenarios constitutes evidence of appropriate engagement supervision?","options_en":{"A":"The engagement supervisor documents their review of the workpapers by initialing and dating them and provides feedback to address identified issues.","B":"The engagement supervisor delegates all supervisory responsibilities to a senior auditor and does not review the engagement results personally.","C":"The engagement supervisor verbally approves the work program but does not document the approval in the workpapers.","D":"The engagement supervisor reviews the workpapers but does not provide feedback or document any review notes."},"correct":"A","explanation_en":"Choice \"A\" is correct. The CAE must ensure that evidence of supervision is documented in accordance with the internal audit function's established policies and procedures. Engagement workpapers with evidence of supervisory approval (e.g., initialed and dated by the supervisor, electronically approved) should be preserved. If used, a completed workpaper review checklist should also be maintained. Therefore, documenting the review of workpapers by initialing and dating them, along with providing feedback, constitutes evidence of appropriate engagement supervision as required by the Standards. Choice \"B\" is incorrect. Delegating supervisory responsibilities is acceptable, but the engagement supervisor must still review the engagement results personally to ensure quality and conformance with the Standards. Choice \"C\" is incorrect. Verbal approval without documentation does not meet the requirement for evidence of supervision. Choice \"D\" is incorrect. While reviewing workpapers is part of supervision, failing to provide feedback or document the review does not constitute sufficient evidence of supervision."},{"id":"M1_U3_Q14","num":14,"total":51,"module":"M1","unit":"U3","topic":"Engagement Supervision","question_en":"Which of the following is a chave benefit of conducting individual engagement performance reviews?","options_en":{"A":"They ensure that all engagement findings are communicated to senior management.","B":"They allow the CAE to evaluate the overall performance of the internal audit function.","C":"They provide internal auditors with feedback on specific engagements and identify areas for development.","D":"They eliminate the need for annual performance reviews."},"correct":"","explanation_en":"Choice “A” is incorrect. Communicating findings to senior management is part of the reporting process, not individual engagement performance reviews. Choice “B” is incorrect. Evaluating the overall performance of the internal audit function is not conducted during individual engagement performance reviews. Choice “C” is correct. Post-engagement reviews support internal auditors' development through job performance evaluations. Audit staff performance can be assessed through direct observation and review of their work during an engagement. Therefore, individual engagement performance reviews provide feedback on specific engagements and help identify areas for development. Choice “D” is incorrect. Individual engagement reviews complement, not replace, annual performance reviews."},{"id":"M1_U3_Q15","num":15,"total":51,"module":"M1","unit":"U3","topic":"Engagement Supervision","question_en":"What is the primary reason the chief audit executive should ensure that internal audit engagements are properly supervised?","options_en":{"A":"To ensure that audit teams are trained in annual regulatory compliance.","B":"To ensure remediations in the audit report are implemented by operational management.","C":"To ensure that audit work is completed as efficiently as possible.","D":"To ensure that work performed aligns with the engagement objectives."},"correct":"D","explanation_en":"Choice \"D\" is correct. Proper supervision ensures that audit activities align with the engagement’s objectives, maintaining consistency, quality, and adherence to professional standards throughout the audit process."},{"id":"M1_U3_Q16","num":16,"total":51,"module":"M1","unit":"U3","topic":"Engagement Supervision","question_en":"A staff internal auditor with extensive payroll experience from a previous employer is conducting an audit of the payroll function. The auditor in charge (AIC) has no experience in payroll, but is a seasoned auditor. Which of the following statements is true regarding the responsibility of the AIC?","options_en":{"A":"Significant professional judgments made by the staff auditor during the audit must be reviewed by the AIC, despite the AIC's lack of experience in payroll.","B":"The staff auditor is more knowledgeable about the area being audited; therefore, the AIC does not need to review the engagement program.","C":"Communications with payroll management must be conducted by the staff auditor because the staff auditor has more experience in this area than the AIC.","D":"The AIC must attend the exit interview and report review meetings with the client, despite the AIC's lack of experience in payroll."},"correct":"A","explanation_en":"Choice \"A\" is correct. The AIC is responsible for reviewing all significant professional judgments, regardless of their personal experience in the subject matter. This ensures proper oversight, adherence to auditing standards, and accountcapacidade during the audit process."},{"id":"M1_U3_Q17","num":17,"total":51,"module":"M1","unit":"U3","topic":"Engagement Supervision","question_en":"Which of the following is not typically a responsibility of the engagement supervisor?","options_en":{"A":"Coordinating work assignments","B":"Evaluating the sufficiency of evidence","C":"Reviewing engagement workpapers","D":"Conducting the annual performance review of internal auditors"},"correct":"D","explanation_en":"Choice \"A\" is incorrect. Coordinating work assignments is the responsibility of the engagement supervisor and includes making and communicating work assignments during planning and maintaining communication with internal auditors throughout the engagement. Choice \"B\" is incorrect. Evaluating the sufficiency of evidence is part of the supervisor's role. Choice \"C\" is incorrect. Reviewing workpapers is a chave responsibility of the engagement supervisor. Workpapers document engagement results and conclusions. According to Standard 14.6: Engagement Documentation, the engagement supervisor must review the engagement documentation for accuracy, relevance, and completeness. Choice \"D\" is correct. Conducting the annual performance review is usually the responsibility of the CAE, not the engagement supervisor. The annual performance review allows the CAE to provide a comprehensive perspective on the internal auditor's overall performance and supports the internal auditor's long-term professional development. Engagement supervisor responsibilities include: Approving the engagement work program Coordinating work assignments Maintaining ongoing communications with the internal auditors assigned to the engagement Engaging regularly with the management of the activity under review Reviewing engagement workpapers to assess the audit procedures performed, information identified, and the findings and preliminary conclusions Evaluating the sufficiency, relicapacidade, relevance, and usefulness of the information, testing, and evidence in achieving objectives and supporting conclusions Evaluating performance and providing feedback to internal audit team members"},{"id":"M1_U3_Q18","num":18,"total":51,"module":"M1","unit":"U3","topic":"Engagement Supervision","question_en":"During an engagement, the supervisor notices that an internal auditor has consistently failed to document sufficient evidence to support findings. Additionally, the auditor has missed several deadlines for submitting workpapers, causing delays in the engagement timeline. The supervisor also discovers that the auditor has not followed the approved engagement work program in certain areas, leading to incomplete testing of chave controls. What is the most appropriate action for the supervisor to take?","options_en":{"A":"Provide feedback to the auditor, offer guidance for improvement, and monitor their progresso closely.","B":"Ignore the issue and focus on completing the engagement.","C":"Escalate the issue to the CAE for disciplinary action.","D":"Reassign the auditor to a different engagement immediately."},"correct":"A","explanation_en":"Choice \"A\" is correct. Evaluating performance and providing feedback to help internal auditors identify areas for development is the responsibility of the engagement supervisor. Standard 12.3 requires the CAE or the engagement supervisor to \"provide internal auditors with feedback about their performance and opportunities for improvement.\" When the performance of the internal auditor during the engagement is unsatisfactory, the supervisor should provide feedback to the internal auditor, offer guidance for improvement, and monitor their progresso closely to ensure the engagement is completed successfully and the auditor develops their skills. Choice \"B\" is incorrect. Ignoring the issue compromises the quality of the engagement and does not address the auditor's performance issues. Choice \"C\" is incorrect. Escalating the issue to the CAE is unnecessary unless the problem persists or is severe. Choice \"D\" is incorrect. Reassigning the auditor without addressing the issue does not resolve the underlying problem and may disrupt the engagement further."},{"id":"M1_U3_Q19","num":19,"total":51,"module":"M1","unit":"U3","topic":"Engagement Supervision","question_en":"In a large internal audit function, a competent internal auditor will work alone to complete the planning, field work, and reporting phases for a complex first-time engagement. The chief audit executive (CAE) will be unable to supervise this engagement. According to IIA guidance, which of the following options is most appropriate in this scenario?","options_en":{"A":"The CAE should designate someone with appropriate experience to supervise all phases of the engagement.","B":"The final phase of the engagement should be postponed until the CAE becomes available, because the CAE is required to supervise engagement reporting.","C":"Engagement supervision is not required in this scenario because the internal auditor is deemed competent to complete all phases of the engagement.","D":"The CAE should thoroughly review and validate the workpapers when he becomes available."},"correct":"A","explanation_en":"Choice \"A\" is correct. The CAE must designate someone with the appropriate experience to supervise all phases, ensuring that properfalha de revisãoand guidance are provided throughout the engagement in line with IIA guidance."},{"id":"M1_U3_Q20","num":20,"total":51,"module":"M1","unit":"U3","topic":"Engagement Supervision","question_en":"Which of the following is a chave responsibility of the engagement supervisor during the planning phase?","options_en":{"A":"Preparing the engagement work program","B":"Conducting the risk assessment for the engagement","C":"Approving the engagement work program","D":"Performing fieldwork to gather evidence"},"correct":"C","explanation_en":"Choice \"A\" is incorrect. Preparing the work program is conducted during the planning phase, but it is the responsibility of the internal auditors, not the supervisor. Choice \"B\" is incorrect. Conducting the risk assessment is typically the responsibility of the internal auditors. Choice \"C\" is correct. There are several chave elements of supervision during the planning process centered around the engagement work program. Approving the engagement work program during the planning phase is one of the responsibilities of the engagement supervisor. The main considerations for approval are whether the work program effectively achieves the engagement objectives and includes procedures for identifying, analyzing, evaluating, and documenting information. The supervisor is also responsible for approving any changes to the work program and monitoring its execution as well as coordinating work assignments. Choice \"D\" is incorrect. Fieldwork is performed by internal auditors during engagement implementation, not the supervisor."},{"id":"M1_U3_Q21","num":21,"total":51,"module":"M1","unit":"U3","topic":"Engagement Supervision","question_en":"Which of the following best describes how supervision ensures quality throughout engagements?","options_en":{"A":"Supervision is only required for engagements involving high-risk areas.","B":"Supervision ensures that internal auditors adhere to the approved work program without deviation.","C":"Supervision involves ongoing monitoring, including setting expectations, promoting communication, and reviewing workpapers.","D":"Supervision focuses on reviewing engagement conclusions at the end of the engagement."},"correct":"","explanation_en":"Choice “A” is incorrect. Supervision is required for all engagements, not just those involving high-risk areas. Choice “B” is incorrect. While adherence to the work program is important, supervision also involves broader responsibilities such as communication and quality assurance to ensure quality throughout engagements. Choice “C” is correct. Supervision ensures quality by involving ongoing monitoring throughout the engagement, including setting expectations, promoting communication, and reviewing workpapers and conclusions. This aligns with Standard 12.3: Oversee and Improve Engagement Performance, which requires methodologies to be established and implemented for engagement supervision. Choice “D” is incorrect. Supervision is not limited to reviewing engagement conclusions; it is an ongoing process."},{"id":"M1_U3_Q22","num":22,"total":51,"module":"M1","unit":"U3","topic":"Engagement Supervision","question_en":"An internal audit supervisor is reviewing the engagement plan before fieldwork begins. What is the primary purpose of supervision at this stage?","options_en":{"A":"Assigning tasks based on auditor preference rather than expertise.","B":"Reducing the number of planned procedures to shorten the engagement timeline.","C":"Ensuring the audit objectives, scope, and resource allocation are appropriate.","D":"Limiting communication between team members to maintain independence."},"correct":"C","explanation_en":"Choice \"C\" is correct. Supervision during planning ensures that objectives, scope, and resources are properly aligned to achieve effective engagement results."},{"id":"M1_U3_Q23","num":23,"total":51,"module":"M1","unit":"U3","topic":"Engagement Supervision","question_en":"Which of the following is the most important factor an engagement supervisor should consider when coordinating work assignments for an engagement?","options_en":{"A":"The size of the internal audit function","B":"The skills and experience of internal auditors relative to the engagement objectives","C":"The availcapacidade of external service providers","D":"The number of findings expected during the engagement"},"correct":"","explanation_en":"Choice “A” is incorrect. The size of the internal audit function does not directly determine work assignments and, therefore, is not the most important factor to consider when coordinating work assignments for an engagement. Other assurance providers may be considered to support the engagement should the internal audit function not be able to solely staff the engagement. Choice “B” is correct. Supervisory responsibilities include making and communicating work assignments during planning and maintaining communication with internal auditors throughout the engagement. Engagement supervisors should consider the skills of internal auditors alongside the engagement objectives when making work assignments. As a result, matching the skills and experience of internal auditors to the engagement objectives helps to ensure that the work is performed effectively and efficiently, as outlined in Standard 12.3. Choice “C” is incorrect. While external service providers may be used, their availcapacidade is not a primary factor in coordinating work assignments for an engagement. Choice “D” is incorrect. The number of findings expected is never a factor in determining work assignments."},{"id":"M1_U3_Q24","num":24,"total":51,"module":"M1","unit":"U3","topic":"Engagement Supervision","question_en":"Which of the following factors determines the level of supervision required for an engagement?","options_en":{"A":"The size of the internal audit function","B":"The complexity of the engagement and the experience of the internal auditors","C":"The availcapacidade of external service providers","D":"The number of findings expected during the engagement"},"correct":"B","explanation_en":"Choice \"A\" is incorrect. The size of the internal audit function does not directly determine the level of supervision required for a particular engagement. Choice \"B\" is correct. Supervision is part of ongoing monitoring of the internal audit function. Supervision begins during the planning phase and is performed throughout the engagement process. The level of supervision required depends on the complexity of the engagement and the skills and experience of the internal auditors. Choice \"C\" is incorrect. The availcapacidade of external service providers is not a determining factor for supervision. Choice \"D\" is incorrect. The number of findings expected is not a factor in determining supervision levels."},{"id":"M1_U3_Q25","num":25,"total":51,"module":"M1","unit":"U3","topic":"Engagement Supervision","question_en":"Which of the following represents appropriate evidence of supervisory review of engagement workpapers?","options_en":{"A":"Tick marks next to all auditable items on each workpaper page along with a legend that explains the nature of all supervisory tick marks and includes a final supervisor signature.","B":"Supervisor's initials on the final workpaper and on the engagement workpaper review checklist.","C":"Performance appraisals that assess the quality of workpapers prepared by auditors and memoranda specifying the nature, extent, and results of the supervisory review of workpapers.","D":"Supervisor's initials on each workpaper, engagement workpaper review checklist, and memorandum specifying the nature, extent, and results of the supervisory review of workpapers."},"correct":"D","explanation_en":"Choice \"D\" is correct. Acceptable approaches for documenting supervisory review of engagement workpapers include the supervisor's initials on each workpaper, an engagement workpaper review checklist, and a memorandum specifying the nature, extent, and results of the review. Although performance appraisals might mention reviews of workpapers, they do not represent sufficient evidence of review. Tick marks are used by the internal auditor performing the work."},{"id":"M1_U3_Q26","num":26,"total":51,"module":"M1","unit":"U3","topic":"Engagement Supervision","question_en":"The internal audit function is conducting an engagement that involves evaluating a highly complex IT system. The internal audit team includes several experienced auditors and two junior auditors who are unfamiliar with IT audits. The engagement supervisor is responsible for determining the level of supervision required for this engagement. Which of the following factors should the supervisor consider when determining the level of supervision required?","options_en":{"A":"The number of findings expected during the engagement","B":"The availcapacidade of external service providers","C":"The size of the internal audit function","D":"The complexity of the engagement and the experience of the internal auditors"},"correct":"","explanation_en":"Choice “A” is incorrect. The number of findings expected is never a factor in determining supervision levels. Choice “B” is incorrect. The availcapacidade of external service providers is not a determining factor for supervision. Choice “C” is incorrect. The size of the internal audit function does not directly determine the level of supervision required for a particular engagement. Choice “D” is correct. According to Standard 12.3: Oversee and Improve Engagement Performance, the extent of supervision required depends on the maturity of the internal audit function, the proficiency and experience of internal auditors, and the complexity of engagements. Therefore, the complexity of the IT system and the junior auditors’ lack of experience in IT audits necessitate a higher level of supervision."},{"id":"M1_U3_Q27","num":27,"total":51,"module":"M1","unit":"U3","topic":"Engagement Supervision","question_en":"Which of the following is appropriate to conduct at a kickoff meeting during engagement planning?","options_en":{"A":"Communicating work assignments and expectations to the team","B":"Reviewing the organization's risk management framework","C":"Finalizing the engagement report","D":"Performing a cost-benefit analysis of the engagement"},"correct":"A","explanation_en":"Choice \"A\" is correct. Work assignments and expectations for the engagement team should be clearly communicated during kickoff meetings with engagement team members. During kickoff meetings, it is important to highlight the interdependent tasks and confirm that they are recognized by the team. Team members involved in those tasks should be encouraged to maintain close collaboration throughout the engagement. Choice \"B\" is incorrect. Reviewing the risk management framework is not the primary purpose of a kickoff meeting. Choice \"C\" is incorrect. The engagement report is finalized at the conclusion of the engagement. Choice \"D\" is incorrect. Cost-benefit analysis is not typically conducted during kickoff meetings."},{"id":"M1_U3_Q28","num":28,"total":51,"module":"M1","unit":"U3","topic":"Engagement Supervision","question_en":"During an engagement, the engagement supervisor identifies that an internal auditor has consistently failed to meet deadlines and has not followed the approved work program. The auditor explains that they were unclear about the expectations. What is the most appropriate action for the supervisor to take?","options_en":{"A":"Reassign the auditor to a different engagement immediately.","B":"Provide feedback to the auditor, clarify expectations, and offer additional guidance to ensure future compliance.","C":"Ignore the issue and focus on completing the engagement.","D":"Escalate the issue to the CAE for disciplinary action."},"correct":"","explanation_en":"Choice “A” is incorrect. Reassigning the auditor without addressing the issue does not resolve the underlying problems. Choice “B” is correct. The engagement supervisor should meet with internal auditors throughout the engagement to discuss the engagement process, which allows for opportunities to evaluate performance and share feedback with internal audit team members. These interactions enable the supervisor to observe the internal audit team members as well as evaluate the quality of work performed. Providing feedback, clarifying expectations, and offering additional guidance address the root cause of the issues and support the auditor's development. This aligns with the supervisor's responsibility to ensure engagement quality and promote team growth. Choice “C” is incorrect. Ignoring the issues compromises the quality of the engagement and does not address the auditor's performance issues. Choice “D” is incorrect. Escalating the issues to the CAE is unnecessary unless the problems persist or are severe."},{"id":"M1_U3_Q29","num":29,"total":51,"module":"M1","unit":"U3","topic":"Engagement Supervision","question_en":"The engagement supervisor's role during fieldwork includes which of the following activities?","options_en":{"A":"Obtaining management's approval of fieldwork procedures.","B":"Starting to plan for the follow-up audit.","C":"Reviewing audit workpapers for sufficiency.","D":"Approving the engagement work program."},"correct":"C","explanation_en":"Choice \"C\" is correct. Reviewing audit workpapers for sufficiency ensures that the audit evidence and documentation support the engagement's findings and conclusions, maintaining the quality and relicapacidade of the audit process."},{"id":"M1_U3_Q30","num":30,"total":51,"module":"M1","unit":"U3","topic":"Engagement Supervision","question_en":"According to IIA guidance, which of the following activities would help the engagement supervisor ensure that audit engagement results are well supported?","options_en":{"A":"Reviewing the draft internal audit report.","B":"Reviewing exit meeting notes.","C":"Reviewing engagement workpapers.","D":"Approving the engagement work program."},"correct":"C","explanation_en":"Choice \"C\" is correct. Reviewing engagement workpapers ensures that the audit results are thoroughly supported by documented evidence, providing a solidbasefor conclusions and recommendations."},{"id":"M1_U3_Q31","num":31,"total":51,"module":"M1","unit":"U3","topic":"Engagement Supervision","question_en":"An audit supervisor is conducting mid-engagement performance reviews. What is the primary reason for providing feedback at this stage?","options_en":{"A":"Comparing auditors’ performance to those in previous years without specific examples.","B":"Helping auditors improve their work before the engagement is completed.","C":"Focusing only on major errors rather than smaller improvement areas.","D":"Avoiding delays in the issue of the final report at the end of the assignment."},"correct":"B","explanation_en":"Choice \"B\" is correct. Mid-engagement feedback allows auditors to make real-time improvements, ensuring higher-quality work before the engagement concludes."},{"id":"M1_U3_Q32","num":32,"total":51,"module":"M1","unit":"U3","topic":"Engagement Supervision","question_en":"The engagement supervisor identifies that an internal auditor failed to document chave evidence supporting a critical finding. Additionally, the auditor deviated from the approved engagement work program without prior approval, resulting in incomplete testing of chave controls. What is the most appropriate action for the supervisor to take?","options_en":{"A":"Ignore the issue and focus on completing the engagement to avoid further delays.","B":"Escalate the issue to the CAE immediately and recommend disciplinary action against the auditor.","C":"Provide feedback to the auditor, ensure the evidence is documented properly, and implement additional supervision to prevent future issues.","D":"Remove the finding from the engagement report and reassign the auditor to a different engagement."},"correct":"C","explanation_en":"Choice \"A\" is incorrect. Ignoring the issue compromises the quality of the engagement and damages the credibility of the internal audit function. Choice \"B\" is incorrect. Escalating the issue to the CAE and recommending disciplinary action is unnecessary unless the issue persists or is severe. Choice \"C\" is correct. Evaluating performance and providing feedback to help internal auditors identify areas for development is the responsibility of the engagement supervisor. Standard 12.3 requires the CAE or the engagement supervisor to \"provide internal auditors with feedback about their performance and opportunities for improvement.\" When the performance of the internal auditor during an engagement is unsatisfactory, the supervisor should provide feedback to the internal auditor, ensure the evidence is documented properly, and implement additional supervision to address the immediate issue and prevent future occurrences. This approach balances accountcapacidade with development. Choice \"D\" is incorrect. Removing the finding and reassigning the auditor does not address the root cause of the issue and may compromise the engagement's integrity."},{"id":"M1_U3_Q33","num":33,"total":51,"module":"M1","unit":"U3","topic":"Engagement Supervision","question_en":"During an audit review, a supervisor notices that an auditor’s documentation lacks sufficient supporting evidence. What is the best course of action?","options_en":{"A":"Providing feedback and ensuring corrective actions are taken to improve documentation.","B":"Reducing the scope of the audit to require less documentation.","C":"Reassigning the auditor to a different engagement without discussing the issue.","D":"Ignoring the issue since other workpapers contain enough supporting evidence."},"correct":"A","explanation_en":"Choice \"A\" is correct. Supervisors should provide feedback and require corrective actions to maintain the quality and relicapacidade of audit documentation."},{"id":"M1_U3_Q34","num":34,"total":51,"module":"M1","unit":"U3","topic":"Engagement Supervision","question_en":"Which of the following best describes the engagement supervisor's role in ensuring the quality of workpapers?","options_en":{"A":"Ensuring that workpapers are signed by all team members","B":"Evaluating the sufficiency, relicapacidade, and relevance of evidence documented in the workpapers","C":"Preparing the engagement work program","D":"Conducting the annual performance review of internal auditors"},"correct":"","explanation_en":"Choice “A” is incorrect. While workpapers must be reviewed, obtaining signatures from every team member does not ensure the workpapers’ quality. Choice “B” is correct. As per Standard 14.6: Engagement Documentation, internal auditors and the engagement supervisor must review the engagement documentation for accuracy, relevance, and completeness. Therefore, evaluating the sufficiency, relicapacidade, and relevance of evidence documented in the workpapers is a chave responsibility of the engagement supervisor. This ensures that the engagement objectives are met and that conclusions are well supported. Choice “C” is incorrect. Preparing the engagement work program is done during engagement planning. The program helps guide the work to be performed, but it does not ensure the quality of the related workpapers. Choice “D” is incorrect. Annual performance reviews are usually conducted by the CAE at the end of the year. These reviews provide feedback on the internal auditor, not the quality of the workpapers for an engagement. Feedback from the engagement supervisor on the quality of the workpapers can be part of the annual performance review for the internal auditors."},{"id":"M1_U3_Q35","num":35,"total":51,"module":"M1","unit":"U3","topic":"Engagement Supervision","question_en":"During a review of engagement workpapers, the supervisor identifies that the evidence supporting a chave finding is sufficient but poorly organized, making it difficult to trace the conclusion back to the supporting documentation. What is the most appropriate action for the supervisor to take?","options_en":{"A":"Require the internal auditor to reorganize the workpapers to ensure they are clear, concise, and traceable.","B":"Escalate the issue to the CAE for immediate resolution.","C":"Remove the finding from the engagement report to avoid confusion.","D":"Approve the workpapers as they are since the evidence is sufficient."},"correct":"","explanation_en":"Choice “A” is correct. As per Standard 14.6: Engagement Documentation, internal auditors and the engagement supervisor must review the engagement documentation for accuracy, relevance, and completeness. Therefore, the supervisor must ensure that workpapers are clear, concise, and traceable. Reorganizing the workpapers helps ensure that the evidence can be easily reviewed and supports the engagement conclusions. Choice “B” is incorrect. Escalating the issue to the CAE for immediate resolution is unnecessary unless the problem cannot be resolved at the supervisor level. Choice “C” is incorrect. Removing the finding undermines the engagement's objectives and does not address the issue. Choice “D” is incorrect. Approving poorly organized workpapers compromises the quality and uscapacidade of the documentation."},{"id":"M1_U3_Q36","num":36,"total":51,"module":"M1","unit":"U3","topic":"Engagement Supervision","question_en":"Which of the following is inappropriate when conducting performance reviews of internal auditors?","options_en":{"A":"Documenting the performance evaluation in detail, including examples of strengths, areas for improvement, and agreed-upon action plans for development","B":"Using generalizations, such as \"You always miss deadlines\", without providing specific examples or evidence to support the feedback","C":"Notifying the internal auditors in advance about the performance review to allow them to prepare and reflect on their performance","D":"Using objective language that focuses on measurable outcomes and specific behaviors observed during the engagement"},"correct":"B","explanation_en":"Choice \"A\" is incorrect. Documenting the performance evaluation is essential for maintaining records, ensuring accountcapacidade, and supporting the auditor's development. Choice \"B\" is correct. Using generalizations, such as \"You always miss deadlines\", is inappropriate because it lacks specificity and does not provide constructive feedback that the auditor can act upon. This approach can levar to defensiveness and does not support professional development. Choice \"C\" is incorrect. Notifying internal auditors in advance about the performance review is a professional and ethical practice that allows for a more productive discussion. Choice \"D\" is incorrect. Using objective language ensures clarity and fairness in the evaluation process and helps the auditor understand the feedback."},{"id":"M1_U3_Q37","num":37,"total":51,"module":"M1","unit":"U3","topic":"Engagement Supervision","question_en":"Which of the following best describes how supervision applies throughout engagements?","options_en":{"A":"Supervision begins during the planning phase and continues throughout the engagement process.","B":"Supervision is only required during the review of engagement workpapers.","C":"Supervision is limited to the evaluation of auditors' performance after the engagement.","D":"Supervision is only necessary for complex engagements."},"correct":"A","explanation_en":"Choice \"A\" is correct. Supervision is part of the ongoing monitoring of the internal audit function. Supervision begins during the planning phase and continues throughout the engagement process and includes setting expectations, promoting communication with the internal audit team, and reviewing engagement workpapers and engagement conclusions. Choice \"B\" is incorrect. Supervision is not limited to the review of workpapers. It also includes setting expectations, promoting communication with the internal audit team, and reviewing engagement conclusions. Choice \"C\" is incorrect. Supervision is part of the ongoing monitoring of the internal audit function and is not limited to post-engagement evaluations. Choice \"D\" is incorrect. According to the Standards, supervision is required for all engagements, not just complex ones. The chief audit executive must ensure that evidence of supervision is documented and retained, according to the internal audit function's established methodologies."},{"id":"M1_U3_Q38","num":38,"total":51,"module":"M1","unit":"U3","topic":"Engagement Supervision","question_en":"Which of the following statements best describes how the review of workpapers may aid in the professional development of internal audit staff?","options_en":{"A":"It demonstrates whether designated auditors were collectively competent to perform the engagement.","B":"It ensures that engagement objectives are met.","C":"It validates that the work completed could be re-performed by another internal auditor.","D":"It ensures that any changes to the approved engagement program are justified and authorized."},"correct":"A","explanation_en":"Choice \"A\" is correct. Proper review of the workpapers provides the supervisor (or other designated reviewer) an opportunity to see that the internal auditors did, in fact, have the knowledge, skills, and competence required to perform the engagement. It also provides an opportunity to coach the auditors to improve their competence."},{"id":"M1_U3_Q39","num":39,"total":51,"module":"M1","unit":"U3","topic":"Engagement Supervision","question_en":"During an engagement, the supervisor discovers that an internal auditor has documented evidence supporting a chave finding but failed to include the rationale for the conclusion. What is the most appropriate action for the supervisor to take?","options_en":{"A":"Escalate the issue to the CAE for immediate resolution.","B":"Reassign the auditor to a different engagement to avoid further issues.","C":"Remove the finding from the engagement report to maintain consistency.","D":"Provide feedback to the auditor regarding the importance of documenting the rationale for the conclusion."},"correct":"","explanation_en":"Choice “A” is incorrect. Escalating the issue to the CAE for immediate resolution is unnecessary unless the problem persists or is severe. Choice “B” is incorrect. Reassigning the auditor does not address the root cause of the issue and may disrupt the engagement further. Choice “C” is incorrect. Removing the finding compromises the integrity of the engagement and does not resolve the underlying problem. Choice “D” is correct. According to Standard 12.3: Oversee and Improve Engagement Performance, methodologies must be established and implemented for engagement supervision, quality assurance, and the development of competencies. To develop competencies, internal auditors must be provided with feedback about their performance and opportunities for improvement. Therefore, providing feedback to the auditor regarding the importance of documenting the rationale for the conclusion supports the auditor's development. This approach aligns with the supervisor's responsibility to ensure engagement quality."},{"id":"M1_U3_Q40","num":40,"total":51,"module":"M1","unit":"U3","topic":"Engagement Supervision","question_en":"An engagement involves multiple team members working on interdependent tasks. The engagement supervisor notices certain tasks are not being completed on time, causing delays for others. What is the most appropriate action for the supervisor to take?","options_en":{"A":"Escalate the issue to the CAE for resolution.","B":"Extend the engagement timeline to accommodate the delays.","C":"Reassign the delayed tasks to another team member to ensure timely completion.","D":"Hold a team meeting to address the delays, clarify expectations, and promote collaboration."},"correct":"","explanation_en":"Choice “A” is incorrect. Escalating the issue to the CAE is unnecessary unless the problem cannot be resolved at the supervisor level. Choice “B” is incorrect. Extending the timeline should be a last resort that negatively impacts the quality of the engagement and does not address the underlying issue. Choice “C” is incorrect. Reassigning tasks may not address the root cause of the delay and could disrupt the engagement further. Choice “D” is correct. Work assignments for each engagement should be clearly communicated during kickoff meetings with engagement team members. During kickoff meetings, it is important to highlight the interdependent tasks and confirm that they are recognized by the team. Team members involved in those tasks should be encouraged to maintain close collaboration throughout the engagement. Therefore, holding a team meeting to address delays and clarify expectations promotes collaboration and ensures that interdependent tasks are completed efficiently. This aligns with best practices for coordinating work assignments."},{"id":"M1_U3_Q41","num":41,"total":51,"module":"M1","unit":"U3","topic":"Engagement Supervision","question_en":"Which of the following is an appropriate activity when supervising engagements?","options_en":{"A":"During fieldwork, scope changes made to the work program are at the auditor's discretion and should be supported adequately in the workpapers.","B":"Supervision is most critical to the fieldwork and reporting phases of the engagement, as this is where the majority of the work takes place.","C":"A degree of high supervision to no supervision may be provided to an auditor depending on his level of competence and the complexity of the engagement.","D":"During engagement planning, the audit work program should be discussed between auditors and the engagement supervisor, with the supervisor approving the work program."},"correct":"D","explanation_en":"Choice \"D\" is correct. During engagement planning, discussing and approving the audit work program ensures alinhamento with the audit objectives and provides clear guidance for executing the engagement effectively."},{"id":"M1_U3_Q42","num":42,"total":51,"module":"M1","unit":"U3","topic":"Engagement Supervision","question_en":"A significant part of the auditor's workpapers will be the conclusions reached by the auditor. In some situations, the engagement supervisor might not agree with the conclusions and will ask the staff auditor to perform more work. Assume that after subsequent work is performed, the staff auditor and the engagement supervisor continue to disagree on the conclusions documented in the workpapers developed by the staff auditor. Which of the following internal audit function responses would be appropriate?","options_en":{"A":"The disagreement is discussed in person, and the decision reached is retained in the audit working papers and in the final draft of the report.","B":"Both the staff auditor and the supervisor document their reasons for reaching different conclusions. The rationale of both parties is retained in the final report, but only one unified recommendation is provided.","C":"Both conclusions are presented to the chief audit executive for resolution, and the chief audit executive resolves the matter.","D":"Both conclusions are presented in the audit report, and management and the activity under review can then react to both."},"correct":"C","explanation_en":"Choice \"C\" is correct. The chief audit executive should determine the most reasonable conclusion and present that to the activity under review and management. The issue of disagreements on the workpapers should not necessarily affect reporting to management unless the chief audit executive believes that both conclusions are equally appropriate, and it would enhance management's understanding to be presented with both. Both the staff auditor and the supervisor document their reasons for reaching different conclusions, and this information should be noted in the workpapers. Two opinions should not be presented in the final report."},{"id":"M1_U3_Q43","num":43,"total":51,"module":"M1","unit":"U3","topic":"Engagement Supervision","question_en":"Which of the following best demonstrates evidence of engagement supervision in accordance with documentation requirements?","options_en":{"A":"The supervisor verbally approves the work program but does not document the approval.","B":"The supervisor reviews workpapers and documents their review by initialing and dating them.","C":"The supervisor delegates all supervisory responsibilities to a senior auditor without reviewing the engagement results.","D":"The supervisor provides feedback to the team but does not document the feedback."},"correct":"","explanation_en":"Choice “A” is incorrect. Verbal approval without documentation does not meet the requirement for evidence of supervision. Choice “B” is correct. The engagement supervisor plays an essential role in supervising and ongoing monitoring throughout the engagement. As per Standard 12.3: Oversee and Improve Engagement Performance, an engagement supervisor must provide internal auditors with guidance throughout the engagement, verify work programs are complete, and confirm engagement workpapers adequately support findings, conclusions, and recommendations. Documenting the review of workpapers by initialing and dating them demonstrates evidence of supervision. Choice “C” is incorrect. Delegating supervisory responsibilities without reviewing results does not fulfill the supervisor's role. Choice “D” is incorrect. Feedback must be documented to ensure accountcapacidade and tracecapacidade."},{"id":"M1_U3_Q44","num":44,"total":51,"module":"M1","unit":"U3","topic":"Engagement Supervision","question_en":"An audit supervisor is reviewing completed workpapers before the engagement report is finalized. What is a chave supervisory responsibility at this stage?","options_en":{"A":"Approving all workpapers without verifying the sufficiency of evidence.","B":"Modifying audit conclusions to align with management expectations.","C":"Relying on auditor self-reviews without performing an independent check.","D":"Confirming that documentation is complete, accurate, and supports audit conclusions."},"correct":"D","explanation_en":"Choice \"D\" is correct. Supervisors must ensure that workpapers are complete, accurate, and provide sufficient support for audit conclusions."},{"id":"M1_U3_Q45","num":45,"total":51,"module":"M1","unit":"U3","topic":"Engagement Supervision","question_en":"Which of the following best describes the primary purpose of the annual performance review conducted by the CAE?","options_en":{"A":"To document the results of all engagements conducted during the year","B":"To provide a comprehensive perspective on the internal auditor's overall performance and support their professional development","C":"To evaluate the internal audit function's conformance with the Standards","D":"To finalize the engagement work program for the upcoming year"},"correct":"","explanation_en":"Choice “A” is incorrect. Documenting engagement results is part of the reporting process, not the annual performance review. Choice “B” is correct. The annual performance review, which incorporates reviews conducted after each engagement for the internal auditor throughout the year, allows the CAE to provide a comprehensive perspective on the internal auditor's overall performance and supports the internal auditor's long-term professional development. Choice “C” is incorrect. Evaluating the internal audit function’s conformance with the Standards is part of the quality assurance process, not the annual performance review. Choice “D” is incorrect. Finalizing the engagement work program is part of engagement planning, not the annual performance review."},{"id":"M1_U3_Q46","num":46,"total":51,"module":"M1","unit":"U3","topic":"Engagement Supervision","question_en":"An audit manager is assigning responsibilities for an engagement that includes financial and operational audit areas. What is the best approach?","options_en":{"A":"Letting auditors switch assignments at their discretion.","B":"Allocating work based on auditors’ expertise in financial and operational areas.","C":"Dividing tasks equally among all auditors without considering their skill sets.","D":"Assigning financial audits only to senior auditors and operational audits only to juniors."},"correct":"B","explanation_en":"Choice \"B\" is correct. Assigning tasks based on subject matter expertise ensures high- quality audit execution."},{"id":"M1_U3_Q47","num":47,"total":51,"module":"M1","unit":"U3","topic":"Engagement Supervision","question_en":"An engagement involves multiple fieldwork sites across different countries. The engagement supervisor assigns tasks to team members based on their expertise but notices that communication between team members is inconsistent, leading to delays in completing interdependent tasks. What should the engagement supervisor do to address this issue?","options_en":{"A":"Reassign tasks to reduce interdependencies between team members.","B":"Hold regular team meetings to promote communication and collaboration.","C":"Require team members to submit daily progresso reports to the supervisor.","D":"Escalate the issue to the CAE for resolution."},"correct":"","explanation_en":"Choice “A” is incorrect. Reassigning tasks may not address the root cause of the communication issue and could disrupt the engagement. Choice “B” is correct. Part of coordinating work assignments is communication that starts with planning and continues throughout the engagement. Appropriate communication between engagement team members is crucial for the effective implementation of the work program and should be driven by the engagement supervisor. The engagement supervisor should hold regular meetings to keep the team informed and aligned. These meetings can allow team members to share insights for resolving problems that may occur during the engagement process. This may create efficiencies in the review of workpapers or findings, as the supervisor can ask questions or request additional information. Therefore, holding regular team meetings promotes communication and collaboration, ensuring that interdependent tasks are completed efficiently. This aligns with best practices for coordinating work assignments. Choice “C” is incorrect. While progresso reports can be helpful, they do not directly address the need for team collaboration. Choice “D” is incorrect. Escalating the issue to the CAE is unnecessary unless the problem cannot be resolved at the supervisor level."},{"id":"M1_U3_Q48","num":48,"total":51,"module":"M1","unit":"U3","topic":"Engagement Supervision","question_en":"Which of the following is the most appropriate way for an engagement supervisor to document evidence of supervision?","options_en":{"A":"Delegating all supervisory responsibilities to a senior auditor without reviewing the engagement results","B":"Initialing and dating reviewed workpapers and providing feedback to address identified issues","C":"Verbally approving the engagement work program without documenting the approval","D":"Reviewing workpapers but not documenting any review notes or feedback"},"correct":"","explanation_en":"Choice “A” is incorrect. While delegation is acceptable, the supervisor must still review the engagement results. Choice “B” is correct. As per Standard 12.3: Oversee and Improve Engagement Performance, an engagement supervisor must provide internal auditors with guidance throughout the engagement, verify work programs are complete, and confirm engagement workpapers adequately support findings, conclusions, and recommendations. Evidence of supervision must be documented in accordance with the internal audit function's established policies and procedures. Initialing and dating reviewed workpapers, along with providing feedback, constitutes evidence of supervision. Choice “C” is incorrect. Verbal approval without documentation does not meet the requirement for evidence of supervision. Choice “D” is incorrect. Reviewing workpapers without documenting feedback does not provide sufficient evidence of supervision."},{"id":"M1_U3_Q49","num":49,"total":51,"module":"M1","unit":"U3","topic":"Engagement Supervision","question_en":"Which of the following best describes the primary purpose of holding regular meetings with internal auditors throughout the engagement?","options_en":{"A":"To finalize the engagement report","B":"To document the engagement objectives and scope","C":"To evaluate performance, provide feedback, and address any issues during the engagement","D":"To ensure that all team members have equal workloads"},"correct":"","explanation_en":"Choice “A” is incorrect. Finalizing the engagement report occurs at the conclusion of the engagement, not during regular meetings throughout the engagement. Choice “B” is incorrect. Documenting objectives and scope is part of the planning phase, not ongoing meetings throughout the engagement. Choice “C” is correct. The engagement supervisor should meet with internal auditors throughout the engagement to discuss the engagement process, which allows for opportunities to evaluate performance as well as share feedback with internal audit team members. These interactions enable the supervisor to observe the internal audit team members as well as evaluate the quality of work performed. Therefore, regular meetings allow the supervisor to evaluate performance, provide feedback, and address issues during the engagement. Choice “D” is incorrect. While workload balance is important, it is not the primary purpose of regular meetings throughout the engagement."},{"id":"M1_U3_Q50","num":50,"total":51,"module":"M1","unit":"U3","topic":"Engagement Supervision","question_en":"An audit director reviews the performance of senior auditors as abasefor the annual staff performance appraisal. The audit director notes that auditor A has consistently completed audit engagements in less than the budgeted time and has gotten along well with audit clients but has not offered much in suggested improvements for auditees. Auditor B consistently exceeds the time budgeted for audits but also consistently identifies recommendations that should levar to cost savings for the audit client and the organization. Assume that both auditors have conducted audits that meet the organization's standards and that audit assignments are rotated. In evaluating the auditors, and considering only the facts identified above, which of the following would most likely explain the differences in auditor performance?","options_en":{"A":"Auditor B has been assigned to more difficult audits than has auditor A.","B":"The audit director has not clearly communicated staff evaluation criteria to the senior auditors.","C":"Auditor A performs less control procedure compliance testing than does auditor B.","D":"Auditor A is more efficient than auditor B."},"correct":"B","explanation_en":"Choice \"B\" is correct. Given only the facts stated in the question, it is most likely that the audit director has not clearly communicated the evaluation criteria, since the performance differences are consistently found over the year. Auditor A believes that getting jobs done in less than the budgeted time and maintaining good employee relations are more important than making recommendations. Auditor B believes that making cost-saving recommendations is more important than getting the audit done within the time budget. There is not sufficient evidence to support the conclusion that auditor A is more efficient than auditor B."},{"id":"M1_U3_Q51","num":51,"total":51,"module":"M1","unit":"U3","topic":"Engagement Supervision","question_en":"During engagement planning, the supervisor identifies that the work program does not include procedures for addressing a high-risk area. What is the most appropriate action for the supervisor to take?","options_en":{"A":"Remove the high-risk area from the scope of the engagement to ensure timely completion.","B":"Revise the work program to address the high-risk area.","C":"Escalate the issue to the CAE for immediate resolution.","D":"Approve the work program as it is to avoid delaying the engagement."},"correct":"","explanation_en":"Choice “A” is incorrect. Removing the high-risk area from the scope undermines the engagement's objectives and does not align with the Standards. Choice “B” is correct. The supervisor should approve the engagement work program during engagement planning and may oversee other aspects of the planning process. The main considerations for approval are whether the work program effectively achieves the engagement objectives and includes procedures for identifying, analyzing, evaluating, and documenting information. Therefore, revising the work program ensures that the high-risk area is adequately addressed and aligns with the engagement objectives and the Standards. Choice “C” is incorrect. Escalating the issue to the CAE is unnecessary unless the problem cannot be resolved at the supervisor level. Choice “D” is incorrect. Approving the work program without addressing the high-risk area compromises the quality and objectives of the engagement."},{"id":"M10_U1_Q1","num":1,"total":26,"module":"M10","unit":"U1","topic":"Engagement Resources and Skills","question_en":"An internal audit function lacks the technical knowledge for an advisory engagement to assess the processes of transferring data to a new accounting system. The chief audit executive (CAE) wants to ensure that the internal audit function can successfully complete the engagement. Which of the following is the most appropriate action for the CAE?","options_en":{"A":"Postpone the advisory engagement until next year after the CAE obtains the technical skills to supervise the advisory engagement.","B":"Hire permanent staff with knowledge of both systems to serve on this advisory engagement and future advisory engagements.","C":"Request an independent subject matter expert who works for the organization to be included with the internal audit function while completing the advisory engagement.","D":"Request an increase in training funds so the auditors can be trained on both systems prior to planning the advisory engagement."},"correct":"C","explanation_en":"Choice \"C\" is correct. Involving an independent subject matter expert ensures the internal audit team has the necessary expertise to complete the advisory engagement without delay or requiring extensive training."},{"id":"M10_U1_Q2","num":2,"total":26,"module":"M10","unit":"U1","topic":"Engagement Resources and Skills","question_en":"During an engagement, the internal audit team discovers that the budgeted resources are insufficient to complete the work. The CAE is informed of the issue and must decide how to proceed. Which of the following actions would best align with the Standards?","options_en":{"A":"Cancel the engagement and reassign the team to other projects.","B":"Proceed with the engagement using the available resources.","C":"Discuss the resource limitations with senior management and the board to determine the best course of action.","D":"Reduce the scope of the engagement without notifying senior management."},"correct":"C","explanation_en":"Choice \"A\" is incorrect. Canceling the engagement outright may not be appropriate, especially for high-risk areas, and should only be considered after consulting senior management and the board. Choice \"B\" is incorrect. Proceeding with insufficient resources could compromise the quality of the engagement and does not align with the Standards. Choice \"C\" is correct. The internal audit function may face resource limitations, such as constraints in the availcapacidade of human resources, time, budget, or technology, which may prevent the internal audit function from achieving the engagement objectives. According to the Standards, the CAE must communicate with senior management and the board regarding resource limitations and their implications. This ensures transparency and allows for an informed decision on how to proceed, such as reallocating resources, reducing the scope, or rescheduling the engagement. Choice \"D\" is incorrect. The scope of an engagement is designed to address specific objectives and risks. Reducing the scope without proper authorization would not be an appropriate course of action as it could significantly impact the audit's objectives and the assurance it provides."},{"id":"M10_U1_Q3","num":3,"total":26,"module":"M10","unit":"U1","topic":"Engagement Resources and Skills","question_en":"How should logistical planning for an engagement, such as considering the need for passports or visas and potential language or translation issues, be addressed?","options_en":{"A":"By the chief audit executive (CAE) with a high-ranking client executive.","B":"During preliminary client communications and the initial client meeting.","C":"During the risk assessment process for annual audit planning.","D":"While finalizing engagement scope and objectives."},"correct":"B","explanation_en":"Choice \"B\" is correct. Logistical planning, such as securing passports, visas, and addressing language or translation needs, should be addressed early during preliminary client communications and the initial client meeting. This ensures these practical considerations are resolved in advance, allowing the engagement to proceed smoothly and without delays. Addressing logistics at this stage aligns with establishing mutual understanding and preparing for the engagement."},{"id":"M10_U1_Q4","num":4,"total":26,"module":"M10","unit":"U1","topic":"Engagement Resources and Skills","question_en":"How should a chief audit executive (CAE) determine the level of staff and resources required in order to complete an audit engagement?","options_en":{"A":"Consider whether there are sufficiently skilled staff and availcapacidade of resources to undertake the audit engagement.","B":"Consider which members of staff are free to undertake the engagement prior to the start of the work.","C":"Consider the amount of staff time taken on a previous or similar review in order to apply that to the planned engagement.","D":"Consider whether there is a sufficient number of staff on the team to complete the engagement."},"correct":"A","explanation_en":"Choice \"A\" is correct. The CAE should assess whether there are sufficient skilled staff and available resources, as this ensures that the engagement can be effectively conducted without compromising quality or efficiency."},{"id":"M10_U1_Q5","num":5,"total":26,"module":"M10","unit":"U1","topic":"Engagement Resources and Skills","question_en":"An internal audit team is conducting an engagement for a high-risk area. Midway through the engagement, a chave team member unexpectedly leaves the organization. What is the most appropriate action for the CAE to take?","options_en":{"A":"Reallocate internal resources or engage external consultants to complete the engagement.","B":"Cancel the engagement and reassign the team to other projects.","C":"Reduce the scope of the engagement without notifying senior management.","D":"Proceed with the engagement using the remaining team members."},"correct":"A","explanation_en":"Choice \"A\" is correct. As noted in the Standards, in situations where the available resources are inappropriate or insufficient to complete the engagement, the engagement supervisor is responsible for escalating the concern to the CAE. The CAE should reallocate resources or engage external consultants to ensure the engagement objectives are met. The Standards emphasize the importance of addressing resource limitations appropriately. Choice \"B\" is incorrect. Canceling the engagement would not be an appropriate course of action, especially for an engagement of a high-risk area where achieving assurance is crucial. Choice \"C\" is incorrect. The scope of an engagement is designed to address specific objectives and risks. Reducing the scope without proper authorization would not be an appropriate course of action as it could significantly impact the audit's objectives and the assurance it provides. Choice \"D\" is incorrect. Proceeding without sufficient resources could compromise the quality of the engagement."},{"id":"M10_U1_Q6","num":6,"total":26,"module":"M10","unit":"U1","topic":"Engagement Resources and Skills","question_en":"The CAE is planning an engagement that requires internal auditors to review documentation and perform interviews in a foreign language. However, none of the internal auditors are proficient in this foreign language. What is the most appropriate action for the CAE to take?","options_en":{"A":"Postpone the engagement until internal auditors can be trained in the language.","B":"Proceed with the engagement and rely on translation software.","C":"Engage an external service provider with the required language skills.","D":"Assign the engagement to the most experienced auditor available."},"correct":"C","explanation_en":"Choice \"A\" is incorrect. Providing timely assurance is crucial. Teaching internal audit staff a new language would be very time-consuming and is unlikely to be a cost- effective solution. Furthermore, postponing the
