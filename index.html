correct":"C","explanation_pt":"Alternativa \"C\" está correta. dois-fator identificação (em este exemplo, badge plus biométrico iris recognition sistema) irá fornecer o highest segurança itens listed não lowest incremental custo, porque one sistemas é atually em place. Senhas são não tipo de biometria autenticação e então fazer não fit fazer auditor desired recomendação. O impressão digital recognition sistema é único-fator biometria autenticação método. Segurança guard pode fornecer um extra layer de segurança mas em um higher custo fazer que o iris recognition sistema."},{"id":"M3_U1_Q76","num":76,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Quando analisando insider ameaças, que tipo de potencial bad actor deve uma organização priorizar considerando?","options_pt":{"A":"Trusted negócio parceiros.","B":"Hacktivists.","C":"Nacional declara.","D":"Consumers."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Trusted negócio parceiros pode têm acesso para interno sistemas e pose significativo riscos se eles act maliciously ou são compromised."},{"id":"M3_U1_Q77","num":77,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Segurança arquitetura elaborado então esse cada entidade é granted mínimo sistema recursos e authorizations esse a entidade necessidades para realizar seu função melhor descreve Qual das seguintes alternativas?","options_pt":{"A":"Mechanized ID.","B":"Menor privilege.","C":"Privileged usuário.","D":"B.menor privilege. C.Privileged usuário. D.Credential."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. O princípio de menor privilege garante entities têm apenas o permissions necessário para seus papéis, aprimorando segurança."},{"id":"M3_U1_Q78","num":78,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Para reduzir segurança exposure quando transmitting proprietary dados sobre comunicação lines, empresa deve usar Qual das seguintes alternativas?","options_pt":{"A":"Asynchronous modems.","B":"Cryptographic dispositivos.","C":"Call-back procedimentos.","D":"Autenticação técnicas."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Cryptographic dispositivos encrypt dados para proteger ele em transmission sobre comunicação lines."},{"id":"M3_U1_Q79","num":79,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Qual é benefit um negócio de bem privacidade controles esse proteger cliente dados?","options_pt":{"A":"Atingindo vantagem competitiva.","B":"Protegendo negócio parceiros.","C":"Aumentando líquido renda.","D":"Protegendo proprietary dados."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Bem privacidade controles pode create vantagem competitiva entre similar businesses. Proprietary dados geralmente faz não incluir cliente dados. Embora bem privacidade controles pode resultado em uma organização atingindo vantagem competitiva, este pode não increase líquido renda. Bem privacidade controles irá proteger negócio parceiros' dados mas não parceiros themselves."},{"id":"M3_U1_Q80","num":80,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Qual das seguintes alternativas segurança controles deveria melhor prevenir não autorizado acesso para sensível dados via um unattended dados terminal diretamente connected um principalframe?","options_pt":{"A":"Usar de um screen saver com um senha.","B":"Criptografia de dados arquivos.","C":"Estabelecimento de segurança profiles em um multilayered dados segurança sistema.","D":"Automatic registraroff de inactive usuários."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Automatic registraroff garante esse inactive usuários são securely disconnected após período de inactivity, prevenindo não autorizado acesso para sensível dados de unattended terminals. Este controle diretamente trata questão de protegendo dados em cenários onde terminal poderia ser left abrir e unattended. Enquanto outro opções enhance segurança, automatic registraroff é o mais eficaz para este específico cenário."},{"id":"M3_U1_Q81","num":81,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Qual das seguintes é um controle funcionalidade projetado para negate o usar de utility programas para read arquivos esse contain todos autorizado acesso usuário codes para o rede?","options_pt":{"A":"Protocolo controles.","B":"Registrar-em senhas.","C":"Senha hierarquia.","D":"Internally encrypted senhas."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Internally encrypted senhas garantir esse even se arquivos são accessed, as informações é unreadable sem descriptografia."},{"id":"M3_U1_Q82","num":82,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Qual das seguintes afirmações melhor descreve o tipo de controle fornecido por um principal card reader com um magnetic strip?","options_pt":{"A":"Dispositivos segurança controle projetado para prevenir phishing.","B":"Um antivirus controle projetado para limitar sistemas acesso.","C":"Físico segurança controle projetado para authenticate sistema usuários.","D":"biométrico controle projetado para limitar sistemas acesso para autorizado pessoal."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Principal card reader é tipo de físico segurança controle esse permite acesso para autorizado pessoal."},{"id":"M3_U1_Q83","num":83,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Grupo é stealing e publishing uma organização sensível informação para fazer political declaração. Como deveria este grupo melhor ser categorized?","options_pt":{"A":"Terrorists, aiming para incite fear por meio de cyberataques.","B":"Nation-declara/spies, aproveitando cyber capabilities para espionage.","C":"Hacktivists, usando digital activism para push seus agenda.","D":"Organized criminals, motivated por financeiro obter."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Hacktivists usar cyberataques para fazer political ou social declarações, frequentemente por meio do furto e exposure de sensível informação."},{"id":"M3_U1_Q84","num":84,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Uma organização está revisando seu controles de acesso e quer priorizar o mais vulnerable capabilities. Qual das seguintes alternativas acesso capabilities é mais susceptible para segurança cibernética risco?","options_pt":{"A":"Acesso para grande valores de dados.","B":"Acesso para privilégios administrativos.","C":"Acesso para muitos sistemas.","D":"Acesso para segurança software."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Acesso para privilégios administrativos fornece o mais significativo risco uma organização porque ele tipicamente grants unrestricted acesso para crítico sistemas e dados, tomada ele prime meta para cyberataques. Enquanto acesso para grande valores de dados, segurança software, ou muitos sistemas pode também apresentar riscos, administrative acesso é o mais powerful e comumente exploited vulnerabilidade em segurança cibernética ataques."},{"id":"M3_U1_Q85","num":85,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Por que é ele importante para identificar que software e dispositivos são interacting em uma empresa rede?","options_pt":{"A":"Para acompanhar todos dispositivos.","B":"Para identificar funcionário-owned dispositivos.","C":"Para defend contra cyber ameaças.","D":"Para medir mudanças em dispositivos saída."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Identificando software e dispositivos em um rede é crítico para defending contra cyber ameaças por garantindo apenas autorizado dispositivos têm acesso."},{"id":"M3_U1_Q86","num":86,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Qual das seguintes alternativas deveria demonstrate esse controles de TI são sendo eficazmente implementado em uma organização?","options_pt":{"A":"O cliente apoiar center relatórios fewer segurança-relacionado indagações.","B":"Administração é claramente informado sobre como recursos são alocado.","C":"O ele departamento foca exclusivamente em mantendo existente sistemas.","D":"Indivíduos feel mais seguro e worry menos sobre segurança."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Eficaz controles de TI são demonstrated quando funcionários feel seguro e pode focar em seus trabalho, que reflects um organizationwide implementação de forte controles e mitigado riscos."},{"id":"M3_U1_Q87","num":87,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Após um sistema teve sido shut down e antes de ele restarts automatically, mudanças pode ser feita ao restart parameters para weaken segurança. Este externo ameaça é conhecido como Qual das seguintes alternativas?","options_pt":{"A":"Servidor/principalframe ataque.","B":"Denial-de-serviço ataque.","C":"Layer 7 DDoS ataque.","D":"Asynchronous ataque."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Asynchronous ataques meta sistemas durante downtime ou migrar declara para exploit vulnerabilidades."},{"id":"M3_U1_Q88","num":88,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Qual é melhor controle para minimizing a probabilidade de fictitious orders sendo entered de store terminals?","options_pt":{"A":"Encrypt outward-bound transmissions stores para proteger dados em transit.","B":"Enforce senha controle procedimentos para usuários para garantir adequado autenticação.","C":"Exigir mudança controle procedimentos para programas para minimize não autorizado mudanças.","D":"Incentivando funcionários para relatórioar suspicious atividade para melhor monitorando."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Enforcing senha controle procedimentos para usuários garante esse apenas autorizado indivíduos pode acesso e fazer mudanças não sistema, reduzindo risco de não autorizado orders."},{"id":"M3_U1_Q89","num":89,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Qual é um importante consideração quando correção está sendo implementado?","options_pt":{"A":"Patching faz não exigir qualquer planejando ou testando.","B":"Patching irá não impacto mensal mudança administração success taxa.","C":"Timing deve ser considerado como adequado preparation pode ser necessidade.","D":"Implementando correção é sempre um inconvenience."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Timing é crítico para garantir esse a correção é adequadamente preparado, testado, e deployed sem disruption."},{"id":"M3_U1_Q90","num":90,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Qual das seguintes é um importante alta administração responsabilidade em relação sistemas de informação segurança?","options_pt":{"A":"Treinamento funcionários em segurança matters.","B":"Designando acesso privileges.","C":"Determinando ownership de dados.","D":"Avaliando exposures."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Avaliação de exposures é alta administração responsabilidade relacionado estabelecimento de organizacional política em relação sistemas de informação segurança. O rest são tarefas de segurança administração."},{"id":"M3_U1_Q91","num":91,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Que melhor descreve autenticação fatores?","options_pt":{"A":"Algo você saber, algo você têm, algo você são.","B":"Algo você saber, algo você têm, algo você fazer.","C":"Algo você saber, algo você fazer, algo você são.","D":"Algo você têm, algo você fazer, algo você são."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Autenticação fatores incluir conhecimento (e.g., senha), possession (e.g., token), e inherence (e.g., biometria)."},{"id":"M3_U1_Q92","num":92,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Administração é concerned esse dados uploaded de um computador à empresa servidor em batch processamento pode ser erroneous. Qual das seguintes alternativas controles deveria melhor tratar este questão?","options_pt":{"A":"O servidor deve subject os dados ao mesmo edits e validação routines esse online dados entrada deveria exigir.","B":"O principalframe computador deve ser backed up em um regular basis.","C":"Dois indivíduos deve ser apresentar não microcomputer quando ele é uploading dados.","D":"O usuários deve ser obrigado revisar random amostra de processado dados."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Subjecting batch-uploaded dados ao mesmo edits e validação como online entrada garante a precisão e consistency uploaded dados."},{"id":"M3_U1_Q93","num":93,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Qual principal tipos de controles, em um mínimo, deve um auditor geralmente expect uma organização para tratar em seu informação segurança políticas?","options_pt":{"A":"Conformidade e relatórioando.","B":"Preventivo e detectivo.","C":"Administrative e corretivo.","D":"Estratégico e directive."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Preventivo e controles detectivos tratando variety de riscos são expected inclusions em um eficaz informação segurança política."},{"id":"M3_U1_Q94","num":94,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Qual das seguintes é um potencial risco para uma organização esse permite funcionários para usar seus personal dispositivos para conduzir negócio?","options_pt":{"A":"Aumentado exposure para malware ataques.","B":"Lower funcionário satisfaction.","C":"Menos eficiência.","D":"Higher organizacional custos em dispositivos."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Permitindo funcionários para usar personal dispositivos aumenta exposure para malware ataques, como personal dispositivos pode não têm o mesmo segurança Normas como corporativo dispositivos."},{"id":"M3_U1_Q95","num":95,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Qual das seguintes alternativas papéis fazer auditores tipicamente play em garantindo de uma organização conformidade com dados privacidade responsabilidades?","options_pt":{"A":"Garantindo esse dados privacidade leis são adequadamente comunicado responsável partes.","B":"Assisting administração em desenvolvendo privacidade testar scripts.","C":"Treinamento organizacional pessoal em privacidade conformidade.","D":"Coordenando privacidade awareness surveys com partes interessadas."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Auditores garantir esse dados privacidade leis são comunicado relevantee partes, garantindo conformidade com legal e regulatório requisitos, e minimizing privacidade riscos."},{"id":"M3_U1_Q96","num":96,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Quem tipicamente determina negócio requisitos para identity e acesso administração?","options_pt":{"A":"Rede administrador.","B":"Um sistema architect.","C":"Negócio owner.","D":"Super usuário."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Negócio owners definir requisitos com base em operacional necessidades e conformidade Normas."},{"id":"M3_U1_Q97","num":97,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Qual das seguintes é parte de um terceiros fornecedor avaliação e monitorando programa?","options_pt":{"A":"Segurança configuração avaliações.","B":"Incidente monitorando e resposta.","C":"Vulnerabilidade avaliações.","D":"Acesso-nível avaliação."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Vulnerabilidade avaliações são essencial para identificando fraquezas em terceiros fornecedores que poderia compromise a organização."},{"id":"M3_U1_Q98","num":98,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Uma organização necessidades para controle quem pode acesso sensível dados em um banco de dados. Que banco de dados elemento deveria regulate read-apenas acesso para um específico usuário papel?","options_pt":{"A":"Schema.","B":"Dados dictionary.","C":"Estruturado query language (SQL).","D":"Dados definição language."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Dados dictionary é utilizado para definir e regulate como dados pode ser accessed e modified, incluindo definindo controles de acesso como read-apenas permissions."},{"id":"M3_U1_Q99","num":99,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Empresa política declara esse todos funcionário acessas solicitaçõesções são aprovado por o funcionário imediato supervisor. Um supervisor é novo à empresa. Qual das seguintes alternativas irá melhor permitir o supervisor para compreender solicitações e aprovar o adequado acesso para funcionários?","options_pt":{"A":"Norma papel matrices denoting usuário acesso por job responsabilidade.","B":"Compreensão vários sistemas' acesso capabilities.","C":"Documentação esse explica cada sistema papel e acesso capcapacidade.","D":"Compreensão de funcionários' job deveres."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Norma papel matrices por job responsabilidade permitir aprovação de acesso sem requerendo completo conhecimento vários sistema papéis. Tal matrices tomar decisão-tomada away supervisor e fornecer para consistente e Norma acesso atribuições."},{"id":"M3_U1_Q100","num":100,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Mais organizações são concerned sobre o potencial compromise de senhas. Qual das seguintes alternativas procedimentos deveria ser o mais eficaz em controlling contra perpetrator obtendo someone else senha?","options_pt":{"A":"Implementar computador programa esse testes para see esse o senha é não facilmente guessed.","B":"Implementar o usar de \"see-por meio de\" autenticação técnicas pelo qual o usuário usa card para generate senha e verifica ambos o principal e o generated senha ao sistema.","C":"Permitir apenas o usuários para mudança seus senhas e incentivando them para mudança senhas frequentemente.","D":"Limitar senha autorização para tempo de day e localização."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. \"See-por meio de\" autenticação técnicas exigir o usuário para têm dois three importante elementos para identificar oneself ao sistema, que é, algo eles possess (o card utilizado para generate o senha) e algo eles saber (o principal ou senha para generate o novo senha)."},{"id":"M3_U1_Q101","num":101,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Por que poderia um auditor interno decidir não para retest um IAM processo quando avaliando federated recurso?","options_pt":{"A":"Não repúdio garante ações pode ser verificado.","B":"Controle inheritance garante anteriormente testado controles reprincipal eficaz.","C":"Menor privilege minimizes desnecessário acesso.","D":"Mechanized ID eliminates manual erros."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Controle inheritance permite reliance em anterior testando de controles aplicado em toda federated sistemas."},{"id":"M3_U1_Q102","num":102,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Qual das seguintes alternativas segurança cibernética riscos é noteworthy para seu social engineering– relacionado abuse potencial, atingido usando deceptive e-mail comunicações projetado para obter sensível personal dados de funcionários, clientes, e others?","options_pt":{"A":"Phishing.","B":"Spooling.","C":"Spamming.","D":"Pharming."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Phishing é social engineering scam meant para trick o recipient de um e-mail em believing esse o originator é trustworthy pessoa ou organização mesmo que o message é de outro parte. O intent é para deceive people em divulgando informação como crédito card numbers, banco conta informação, senhas, ou outro sensível informação."},{"id":"M3_U1_Q103","num":103,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Quando planejando segurança cibernética trabalho de auditoria para uma empresa, qual é o mais importante inicial etapa para tratar potencial riscos e garantir a organização informação segurança?","options_pt":{"A":"Recognize existente e emerging segurança cibernética riscos, avaliar relevantee ele geral controles, e desenvolver uma estratégia com base em setor melhor práticas.","B":"Focar exclusivamente em emerging segurança cibernética riscos sem considerando existente ameaças ou controles internos.","C":"Implementar novo ele controle estrutura sem revisando a organização atual dados privacidade políticas.","D":"Priorizar o desenvolvimento de um dados segurança política antes de considerando ele geral controles ou privacidade requisitos."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Recognizing ambos existente e emerging segurança cibernética riscos, avaliando ele geral controles, e desenvolvendo uma estratégia com base em setor melhor práticas é abrangente abordagem. Este garante a identificação de todos relevantee ameaças e o aplicativo de adequado controles para proteger a organização sistemas de informação."},{"id":"M3_U1_Q104","num":104,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Qual é melhor prática para garantir esse sistema software reprincipals eficaz contra cyber intrusions?","options_pt":{"A":"Manter Norma baselines.","B":"Usar configuração administração software.","C":"Conduzir periódico auditoria sistema software configurações.","D":"Aplicar correções."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Aplicando correções prontamente trata vulnerabilidades e keeps sistema software seguro."},{"id":"M3_U1_Q105","num":105,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Qual das seguintes é considerado físico segurança controle?","options_pt":{"A":"Sistema servers são secured por locking mechanisms com acesso granted para específico indivíduos.","B":"Falhou sistema registrarin attempts são registrado e analisado para identificar potencial segurança incidentes.","C":"Transação registra são mantido para registrar hirelato de sistema processamento.","D":"Sistema segurança settings exigir o usar de forte senhas e controles de acesso."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Físico segurança controle protege físico ativos like servers, garantindo eles são physically secured e acessível apenas para autorizado indivíduos. Locking mechanisms diretamente tratar o necessidade para proteger hardware contra não autorizado acesso, tomada ele claro exemplo de um físico segurança controle. O outro opções focar em lógico ou sistema-nível controles em vez de físico mede."},{"id":"M3_U1_Q106","num":106,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Qual das seguintes é o strongest dois-fator autenticação controle?","options_pt":{"A":"Requerendo senha e governo-issued photo ID.","B":"Requerendo senha e funcionário ID card ou badge.","C":"Requerendo senha e impressão digital.","D":"B.requerendo senha e funcionário ID card ou badge. C.requerendo senha e impressão digital. D.requerendo senha e answers para dois personal segurança questions."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Combining senha com um biométrico fator like impressão digital fornece o strongest dois-fator autenticação devido a seu reliance em ambos conhecimento e possession de único traits."},{"id":"M3_U1_Q107","num":107,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Qual das seguintes é um exemplo de um físico segurança controle que deve ser em place em de uma organização dados center?","options_pt":{"A":"Swipe cards são utilizado para acesso os dados center.","B":"Cópia de segurança servers não dados center são stored em um ambienteally controlled localização.","C":"Firewalls e antivirus proteção são em place para prevenir não autorizado acesso para dados.","D":"Todos usuários têm único ID e senha para acesso dados."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Físico acesso ao dados center pode ser restrito por meio do usar de swipe cards."},{"id":"M3_U2_Q1","num":1,"total":52,"module":"M3","unit":"U2","topic":"Abordagens Analíticas e Técnicas de Mapeamento de Processos","question_pt":"Um auditor está avaliando eficiência de um order-para-caixa processo. Qual é melhor maneira para definir o workflow segments?","options_pt":{"A":"Comparando processo um diferente departamento workflow.","B":"Focando apenas em concluído transações em vez de mapping o todo processo.","C":"Breaking o processo em etapas como order entrada, invoicing, e pagamento processamento.","D":"Coletando cliente retorno em satisfaction com o pagamento processo."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Definindo workflow segments envolve breaking down o processo em seu principal operacional stages."},{"id":"M3_U2_Q2","num":2,"total":52,"module":"M3","unit":"U2","topic":"Abordagens Analíticas e Técnicas de Mapeamento de Processos","question_pt":"Qual das seguintes é verdadeiro de sistemas fluxogramas?","options_pt":{"A":"Eles demonstrar apenas computador processamento, não manual processamento.","B":"Eles são geralmente kept up-para-date para sistemas mudanças.","C":"Eles são bem guide para potencial segregação de deveres.","D":"Eles demonstrar específico edit testes e batch controle conciliações que são implementado."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Sistemas fluxogramas demonstrar segregação de deveres e o transfer de dados entre diferente segments na organização."},{"id":"M3_U2_Q3","num":3,"total":52,"module":"M3","unit":"U2","topic":"Abordagens Analíticas e Técnicas de Mapeamento de Processos","question_pt":"Um auditor interno está avaliando eficácia da organização cobrança política. O auditor computes o receivables turnover ratio e converte ele em days, e o resultado é 42 days. Qual das seguintes é mais adequada próximo etapa para o auditor para tomar?","options_pt":{"A":"Comparar os resultados computations com da organização crédito termo período.","B":"Compute o índice de liquidez imediata, como adicional computation é necessidade fim de reach conclusão.","C":"Avaliar o cobrança política como eficaz, como receivables são coletado todo six weeks.","D":"Avaliar da organização liquidity risco como average-para-alto, devido ao ampliado cobrança período."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Forty-dois days sozinho says nada como ele é não conhecido em que setor a empresa operates e qual o setor average cobrança período é. no entanto, o geral regra analysts frequentemente aplicar é esse o cobrança período deve não greatly exceed o crédito termo período (o tempo permitido para pagamento). Portanto, ele é too inicial para draw conclusões, mas o auditor deve look up o cobrança política e determinar onde 42 days stands em relation para ele."},{"id":"M3_U2_Q4","num":4,"total":52,"module":"M3","unit":"U2","topic":"Abordagens Analíticas e Técnicas de Mapeamento de Processos","question_pt":"Qual das seguintes alternativas melhor descreve o propósito de realizando procedimentos analíticos?","options_pt":{"A":"Para testar para completude de registrado informação.","B":"Para verificar o correctness de calculations.","C":"Para comparar registrado informação com expectativas.","D":"Para testar para superestimações de registrado valores."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. O principal propósito de procedimentos analíticos é para identificar inconsistências ou unusual padrões por comparando registrado dados contra expected valores, tendências, ou parâmetros de referência. Este ajuda auditores avaliar o reasonableness de financeiro informação e identificar áreas requerendo adicional investigação, em vez de diretamente testando para superestimações, completude, ou calculation precisão."},{"id":"M3_U2_Q5","num":5,"total":52,"module":"M3","unit":"U2","topic":"Abordagens Analíticas e Técnicas de Mapeamento de Processos","question_pt":"Em Qual das seguintes alternativas exemplos deveria risco de amostragem provável ser o highest?","options_pt":{"A":"O auditor interno falhou para recognize um controle desvio.","B":"O auditor interno testado 25% de uma população.","C":"O auditor interno testado 85% de uma população.","D":"O auditor interno interpretou erroneamente amostragem resultados."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Risco de amostragem é highest quando smaller portion população (e.g., 25%) é testado, como ele aumenta probabilidade esse amostra pode não ser representante todo população, potentially leading para inaccurate conclusões."},{"id":"M3_U2_Q6","num":6,"total":52,"module":"M3","unit":"U2","topic":"Abordagens Analíticas e Técnicas de Mapeamento de Processos","question_pt":"Um auditor interno aims para testar authorizations de compra notas fiscais. O processo é automatizado e thoroughly controlled pelo finanças departamento. O auditor quer avoid excessivo amostragem. Qual das seguintes alternativas amostragem abordagens deveria ser o mais adequado?","options_pt":{"A":"Stratified amostragem de atributos.","B":"Amostragem de descoberta.","C":"Snowball amostragem.","D":"Parar-e-go amostragem."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Parar-e-go amostragem é o mais adequado método para minimizing tamanho da amostra enquanto testando authorizations em um automatizado e thoroughly controlled processo."},{"id":"M3_U2_Q7","num":7,"total":52,"module":"M3","unit":"U2","topic":"Abordagens Analíticas e Técnicas de Mapeamento de Processos","question_pt":"Qual das seguintes alternativas ratios deveria ser o melhor medir de um cliente liquidity quando um auditor interno quer determinar se o cliente irá provável ser capaz para pay um conta receivable created just antes da declaração de financeiro position (balanço patrimonial) date?","options_pt":{"A":"Dívida ratio.","B":"Quick ratio.","C":"Atual ratio.","D":"Caixa ratio."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. O quick ratio mede de uma organização capacidade para atender a seu curto prazo dívida obligations com seu mais liquid ativos."},{"id":"M3_U2_Q8","num":8,"total":52,"module":"M3","unit":"U2","topic":"Abordagens Analíticas e Técnicas de Mapeamento de Processos","question_pt":"Quando determinando lucros por ação (EPS) com um complexo capital estrutura, Qual das seguintes é shared por ambos o se-convertido método para convertibles e a tesouraria estoque método para opções e warrants?","options_pt":{"A":"Ambos resultado em um mudança ao denominator mas não numerator para calculando EPS.","B":"Ambos considerar o impacto de antidilutive securities em seus formula.","C":"Ambos resultado em um mudança ao numerator mas não denominator para calculando EPS.","D":"Ambos assume esse dilutive securities são convertido não começar período ou como soon como eles foram issued."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Ambos métodos assume esse dilutive securities são convertido não beginning período ou quando issued, garantindo consistency em calculando EPS."},{"id":"M3_U2_Q9","num":9,"total":52,"module":"M3","unit":"U2","topic":"Abordagens Analíticas e Técnicas de Mapeamento de Processos","question_pt":"Qual das seguintes alternativas pode refletir eficácia de uma empresa pessoal departamento?","options_pt":{"A":"Comparação sobre tempo average número de days date o aprovado vacant position requisition é recebido até que o date o novo contratar começa para trabalho.","B":"Ratio de total hiring custos ao total número de hires.","C":"Ratio número de job offers accepted ao número de job offers ampliado.","D":"Ratio de funcionários contratado em entrada nível em ano 1 e ainda employed com a empresa em ano 5 compared ao total número de funcionários contratado em entrada nível em ano 1."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Retention de funcionários sobre tempo indica eficácia de recruitment, onconselhoing, e funcionário satisfaction initiatives."},{"id":"M3_U2_Q10","num":10,"total":52,"module":"M3","unit":"U2","topic":"Abordagens Analíticas e Técnicas de Mapeamento de Processos","question_pt":"Qual das seguintes alternativas deveria ser o adequado analytical abordagem quando comparando número de funcionários trabalhando em um factory local com o direto custo de production cada month sobre período de one ano?","options_pt":{"A":"Ratio análise.","B":"Análise de tendências.","C":"Horizontal análise.","D":"Análise de regressão."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Ratio, tendência, e análise de regressão são exemplos de procedimentos analíticos que pode ser utilizado durante planejamento do trabalho. Análise de regressão compara relations entre dois ou mais financeiro ou nonfinancial variables sobre período de tempo."},{"id":"M3_U2_Q11","num":11,"total":52,"module":"M3","unit":"U2","topic":"Abordagens Analíticas e Técnicas de Mapeamento de Processos","question_pt":"Um auditor interno está revisando cliente reclamação resolução processo. Qual é o mais eficaz maneira para definir workflow segments?","options_pt":{"A":"Outlining etapas como reclamação intake, investigação, resolução, e acompanhamento.","B":"Revisando histórico serviço métricas e resumindo geral reclamação tendências.","C":"Coletando cliente retorno para avaliar perceptions de resposta tempo e questão resolução.","D":"Identificando apenas reclamações relacionado refunds e categorizing seus resolução processo."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Definindo workflow segments exige outlining principal processo etapas para garantir estruturado análise e melhoria."},{"id":"M3_U2_Q12","num":12,"total":52,"module":"M3","unit":"U2","topic":"Abordagens Analíticas e Técnicas de Mapeamento de Processos","question_pt":"Empresa usa cliente retorno surveys com múltiplos-Alternativa respostas. Como deve este dados ser categorized?","options_pt":{"A":"Aggregated dados, desde respostas são coletado de múltiplos usuários.","B":"Abrir-ended dados, como clientes express seus opiniões em um free-text formato.","C":"Subjetivo dados, desde cliente opiniões pode vary significativamente.","D":"Estruturado dados, porque respostas são predefined e pode ser quantified."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Múltiplos-Alternativa pesquisa respostas são estruturado dados, como eles acompanhar consistente formato esse permite easy aggregation e análise."},{"id":"M3_U2_Q13","num":13,"total":52,"module":"M3","unit":"U2","topic":"Abordagens Analíticas e Técnicas de Mapeamento de Processos","question_pt":"Uma organização depende em numerous aplicações esse run em um variety de operacional sistemas, coletando dados em um variety de bancos de dados. Qual das seguintes alternativas obstacles relacionado precisão de dados é mais provável faced por da organização função de auditoria interna quando realizando análise de dados?","options_pt":{"A":"Difficulty em analisando todo dados populations devido a restrito acesso.","B":"Inadvertent modificação de diferente formats de dados durante o conversion processo.","C":"Incapacidade de generalized dados software para import e export dados para auditoria testes.","D":"Atrasado analytical resultados leading para erroneous conclusões e recomendações."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Quando dados é coletado de múltiplos aplicações e bancos de dados com varying formats, converting ele em unified estrutura para análise pode inadvertently alter os dados. Este poses significativo desafio para dados precisão, tomada ele o mais provável obstacle para o função de auditoria interna. O outro opções tratar potencial questões mas são menos diretamente tied à precisão de dados em tal cenário."},{"id":"M3_U2_Q14","num":14,"total":52,"module":"M3","unit":"U2","topic":"Abordagens Analíticas e Técnicas de Mapeamento de Processos","question_pt":"Qual das seguintes alternativas ferramentas deveria ser mais adequado para designando e clarifying distinct deveres para indivíduos em um projeto equipe?","options_pt":{"A":"Pareto gráfico.","B":"Gráfico PERT.","C":"RACI gráfico.","D":"Gráfico de Gantt."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. RACI gráfico é eespecíficoamente projetado para atribuir e esclarecer distinct papéis e responsabilidades entre equipe membros."},{"id":"M3_U2_Q15","num":15,"total":52,"module":"M3","unit":"U2","topic":"Abordagens Analíticas e Técnicas de Mapeamento de Processos","question_pt":"Um auditor interno quer buscar para anomalias em um set de dados. Qual das seguintes alternativas procedimentos analíticos deveria ser mais útil para o auditor?","options_pt":{"A":"Orçamento para actual comparações.","B":"Benchmarking.","C":"Forecasts.","D":"Ratio comparação."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Ratio comparação é útil analytical procedimento para identificando anomalias por comparando principal financeiro ou operacional métricas, possibilitando auditores para detectar tendências ou outliers não dados."},{"id":"M3_U2_Q16","num":16,"total":52,"module":"M3","unit":"U2","topic":"Abordagens Analíticas e Técnicas de Mapeamento de Processos","question_pt":"Qual das seguintes seria melhor analytical procedimento para identificar se o custo de alguns materials installed em capital projetos pode têm sido transferred ao estoque conta?","options_pt":{"A":"Analisando uma amostra de capital transações cada quarter para detectar casos em que installed materials são transferred para estoque.","B":"Identificando variances entre valores capitalized cada month e o capital orçamento.","C":"Revisando lançamentos contábeis esse transfer custos de capital para estoque contas.","D":"Comparando estoque recibos com debits ao estoque conta e investigating discrepâncias."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Revisando lançamentos contábeis esse transfer custos de capital para estoque contas deveria focar em o problema de inadequado transfers."},{"id":"M3_U2_Q17","num":17,"total":52,"module":"M3","unit":"U2","topic":"Abordagens Analíticas e Técnicas de Mapeamento de Processos","question_pt":"Um auditor interno está conduzindo uma garantia auditoria de um manufacturing instalação. Alta administração quer saber se organizacional metas relacionado reduzindo waste e energy consumption têm sido atingido. Que analytical técnica deve O auditor interno usar?","options_pt":{"A":"Funcional benchmarking.","B":"Análise de tendências.","C":"Variance análise.","D":"Ratio análise."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Variance análise compara actual desempenho com planejado metas, tomada ele ideal para avaliando se metas like reduzindo waste e energy consumption têm sido met."},{"id":"M3_U2_Q18","num":18,"total":52,"module":"M3","unit":"U2","topic":"Abordagens Analíticas e Técnicas de Mapeamento de Processos","question_pt":"Qual das seguintes alternativas com precisão descreve o adequado order de etapas para um auditor interno para usar quando analisando dados?","options_pt":{"A":"Obter os dados; clean e normalize os dados; definir o question; analisar os dados.","B":"Definir o question; obter os dados; analisar os dados; clean e normalize os dados.","C":"Obter os dados; analisar os dados; clean e normalize os dados; definir o question.","D":"Definir o question; obter os dados; clean e normalize os dados; analisar os dados."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Este sequence garante lógico, eficiente, e eficaz abordagem para análise de dados, beginning com um claro objetivo e ending com actionable percepções derived de adequadamente preparado dados."},{"id":"M3_U2_Q19","num":19,"total":52,"module":"M3","unit":"U2","topic":"Abordagens Analíticas e Técnicas de Mapeamento de Processos","question_pt":"Qual das seguintes alternativas métodos deve um auditor interno usar para garantir esse cada pagamento processado durante o audited período tem o mesmo probabilidade de sendo selected para testando?","options_pt":{"A":"Amostragem por julgamento.","B":"Stratified amostragem.","C":"Convenience amostragem.","D":"Random amostragem."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Random amostragem garante esse todo pagamento processado durante o audited período tem um equal probabilidade de seleção, reduzindo seleção bias e apoiando statistically válido conclusões."},{"id":"M3_U2_Q20","num":20,"total":52,"module":"M3","unit":"U2","topic":"Abordagens Analíticas e Técnicas de Mapeamento de Processos","question_pt":"Qual das seguintes alternativas abordagens poderia ser utilizado com ambos statistical e nonstatistical amostragem métodos?","options_pt":{"A":"Amostragem por julgamento.","B":"Random amostragem.","C":"Amostragem de descoberta.","D":"Testar de one amostra."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Random amostragem é versatile abordagem esse pode ser aplicado em ambos statistical e nonstatistical amostragem métodos. Ele garante esse cada item não população tem um equal chance de seleção, que ajuda para reduzir bias e melhorar a confiabilidade de conclusões drawn amostra."},{"id":"M3_U2_Q21","num":21,"total":52,"module":"M3","unit":"U2","topic":"Abordagens Analíticas e Técnicas de Mapeamento de Processos","question_pt":"Que é o melhor analytical método para aplicar se um auditor interno quer comparar o funcionário turnover taxa em seu organização com o average funcionário turnover taxa não mesmo setor?","options_pt":{"A":"Análise de regressão.","B":"Benchmarking.","C":"Causa-raiz análise.","D":"Ratio análise."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Benchmarking deveria comparar a organização turnover rates com setor averages, ajudando identificar discrepâncias ou áreas para melhoria em funcionário retention práticas."},{"id":"M3_U2_Q22","num":22,"total":52,"module":"M3","unit":"U2","topic":"Abordagens Analíticas e Técnicas de Mapeamento de Processos","question_pt":"Um auditor interno realiza comparação de reclamações recebido para similar reclamação rates não mesmo setor como parte de realizando um risco avaliação. Qual das seguintes alternativas técnicas é O auditor interno employing?","options_pt":{"A":"Prevendo.","B":"Análise de tendências.","C":"Benchmarking.","D":"Horizontal análise."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Benchmarking compara organizacional dados, como reclamação rates, contra setor Normas ou peers para identificar desempenho lacunas e informar avaliações de riscos ou processo melhorias."},{"id":"M3_U2_Q23","num":23,"total":52,"module":"M3","unit":"U2","topic":"Abordagens Analíticas e Técnicas de Mapeamento de Processos","question_pt":"Que sets de dados attributes melhor possibilitar O auditor interno para tomar vantagem possibilities de análise de dados?","options_pt":{"A":"Validade, velocity, variety, e veracity.","B":"Volume, velocity, variety, e veracity.","C":"Volume, validade, variety, e veracity.","D":"Volume, velocity, validade, e veracity."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Volume, velocity, variety, e veracity são identificadoational attributes esse possibilitar robust análise de dados."},{"id":"M3_U2_Q24","num":24,"total":52,"module":"M3","unit":"U2","topic":"Abordagens Analíticas e Técnicas de Mapeamento de Processos","question_pt":"Durante um anual operacional revisar, um auditor interno observa esse vendas e estoque são unmudançad, enquanto bruto margin teve aumentado significativamente. Qual das seguintes alternativas áreas deve O auditor interno investigate primeiro para determinar a causa bruto margin increase?","options_pt":{"A":"Modificações para advertising estratégia.","B":"Mudanças em cliente base.","C":"Ineficiências em manufacturing operações.","D":"Fluctuations em custos de raw materials."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Bruto margin é diretamente influenciado pela relação entre vendas receita e o custo de bens sold (COGS). Se vendas e estoque níveis reprincipal constant enquanto bruto margin aumenta, o mais provável causa é mudança não custos de raw materials, que affects o COGS. Investigating este área primeiro fornece o mais direto percepção não observado variance. O outro opções são menos provável que têm um imediato impacto em bruto margin em este cenário."},{"id":"M3_U2_Q25","num":25,"total":52,"module":"M3","unit":"U2","topic":"Abordagens Analíticas e Técnicas de Mapeamento de Processos","question_pt":"Qual das seguintes alternativas amostragem abordagens deveria ser mais adequado para um auditor interno para usar se o auditor suspeita fraude em um complexo caixa e banco transação processo?","options_pt":{"A":"Random amostragem.","B":"Aleatório amostragem.","C":"Amostragem de descoberta.","D":"Stratified amostragem de atributos."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Amostragem de descoberta é mais adequado para identificando fraude em alto- risco ou complexo áreas, como ele foca em detectando específico casos de erros ou irregularidades."},{"id":"M3_U2_Q26","num":26,"total":52,"module":"M3","unit":"U2","topic":"Abordagens Analíticas e Técnicas de Mapeamento de Processos","question_pt":"Qual das seguintes é o primeiro etapa uma função de auditoria interna deve undertake quando executing análise de dados processo?","options_pt":{"A":"Conduzir um risco avaliação em relação a eficácia análise de dados processo.","B":"Analisar possível e disponível fontes de raw dados para o análise de dados processo.","C":"Definir o propósito e o anticipated valor análise de dados processo.","D":"Selecionar dados para cleaning e normalization procedimentos não análise de dados processo."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Definindo propósito e anticipated valor de uma análise de dados processo permite para cohesive processo planejando, incluindo determinação de exigido dados fontes."},{"id":"M3_U2_Q27","num":27,"total":52,"module":"M3","unit":"U2","topic":"Abordagens Analíticas e Técnicas de Mapeamento de Processos","question_pt":"Qual das seguintes afirmações é verdadeira de evidências de auditoria?","options_pt":{"A":"Copy de um originalmente documentar é como confiável como originalmente documentar.","B":"Físico observação fornece o mais confiável evidências existence de contas receber.","C":"Um adequado conclusão sobre população com base em uma amostra exige esse amostra ser representante população.","D":"Pedidos de compra são relevantee evidências esse bens pago para têm sido recebido."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Representativeness amostra é crítico para drawing válido conclusões sobre o todo população, garantindo confiabilidade de achados de auditoria."},{"id":"M3_U2_Q28","num":28,"total":52,"module":"M3","unit":"U2","topic":"Abordagens Analíticas e Técnicas de Mapeamento de Processos","question_pt":"Todos outro things held constant, externo capital requisitos são lower para firms com que característica?","options_pt":{"A":"Firms com higher vendas crescimento rates.","B":"Firms com lower capital intensity ratios.","C":"Firms com lower earnings retention ratios.","D":"Firms com lower lucro margins."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. O capital intensity ratio é o valor de ativos exigido per dollar de vendas. Externo financeiro requisitos são lower se o capital intensity ratio é baixo, porque este means vendas pode grow rapidly sem much fora de capital, quando outro things são held constant."},{"id":"M3_U2_Q29","num":29,"total":52,"module":"M3","unit":"U2","topic":"Abordagens Analíticas e Técnicas de Mapeamento de Processos","question_pt":"Um auditor interno está usando análise de dados durante uma auditoria trabalho de auditoria. Após determinando integridade dados, que é o adequado próximo etapa para o auditor interno para realizar?","options_pt":{"A":"Conduzir um risco avaliação.","B":"Estoque os dados.","C":"Analisar os dados.","D":"Examinar dados acesso e proteção."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Após verificando integridade dados, o próximo lógico etapa é para analisar ele para derive meaningful percepções e identificar padrões, tendências, ou anomalias. Análise de dados é o núcleo propósito de usando análise de dados em uma auditoria e follows diretamente após garantindo os dados é preciso e confiável. O outro opções são preparatory etapas ou focar em unrelated aspectos."},{"id":"M3_U2_Q30","num":30,"total":52,"module":"M3","unit":"U2","topic":"Abordagens Analíticas e Técnicas de Mapeamento de Processos","question_pt":"Qual das seguintes é um exemplo usage de unestruturad dados em uma organização?","options_pt":{"A":"Da organização vendas departamento analisa cliente social media postings e tailors personalized vendas offers com base em them.","B":"A organização screens para potencial funcionário conflitos de interests em um banco de dados comercial register.","C":"Da organização pagamentos para fornecedores são regularmente revisado para anomalias não contas pagar razão contábil.","D":"A organização monitora acesso registra para sistemas de TI fim de identificar segurança breaches."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Unestruturad dados refers para informação esse faz não têm predefined formato, como social media postings, emails, images, ou videos. Analisando cliente social media postings envolve processamento unestruturad dados para obter percepções, tomada este o melhor exemplo. O outro opções envolver estruturado dados, que é organized em predefined formats like bancos de dados ou registra."},{"id":"M3_U2_Q31","num":31,"total":52,"module":"M3","unit":"U2","topic":"Abordagens Analíticas e Técnicas de Mapeamento de Processos","question_pt":"Quando alto percentage de de uma organização total custo é fixed, qual é o impacto em da organização operacional leverage?","options_pt":{"A":"Da organização operacional leverage irá ser alto.","B":"Da organização operacional nível não pode ser determinado com base em fixed custos sozinho. Ele também depende não vendas volume e o contribution margin.","C":"Da organização operacional leverage irá ser baixo.","D":"Da organização operacional leverage irá ser moderado, reflecting saldo entre fixed e variável custos."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Alto fixed custos resultado em alto operacional leverage, amplifying o impacto de mudanças em vendas em rentabilidade."},{"id":"M3_U2_Q32","num":32,"total":52,"module":"M3","unit":"U2","topic":"Abordagens Analíticas e Técnicas de Mapeamento de Processos","question_pt":"Empresa quer analisar gargalos em seu estoque administração processo. Qual é melhor maneira para definir workflow segments?","options_pt":{"A":"Comparando estoque práticas em toda unrelated setores.","B":"Conduzindo random contagem de estoques sem mapping o processo.","C":"Surveying armazém funcionários sobre seus job satisfaction.","D":"Breaking down atividades como receiving, armazenamento, e order fulfillment."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Definindo workflow segments por principal atividades permite para targeted análise de ineficiências."},{"id":"M3_U2_Q33","num":33,"total":52,"module":"M3","unit":"U2","topic":"Abordagens Analíticas e Técnicas de Mapeamento de Processos","question_pt":"Qual das seguintes é o principal critério quando um auditor interno é deciding entre o usar de statistical e non-amostragem estatística?","options_pt":{"A":"Resultados de um custo-benefício avaliação.","B":"Resultado de risco e controle avaliação.","C":"Requisito de evidências de auditoria.","D":"Non-amostragem auditoria risco."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. O Alternativa entre statistical e non-amostragem estatística depende em weighing o custo contra o benefícios de cada abordagem."},{"id":"M3_U2_Q34","num":34,"total":52,"module":"M3","unit":"U2","topic":"Abordagens Analíticas e Técnicas de Mapeamento de Processos","question_pt":"Qual das seguintes alternativas descreve comum abordagem utilizado durante amostragem por julgamento?","options_pt":{"A":"Incluir alguns grande ou unusual itens não amostra.","B":"Definir expected e acceptable erro rates.","C":"Usar sistemático seleção método.","D":"Focar em apresentar, nos últimos operações."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. One comum abordagem utilizado durante amostragem por julgamento é para incluir alguns grande ou unusual itens não amostra. Selecting grande itens permite que auditores para cover mais risco, e selecting unusual itens gives auditores mais chances para constatar alguns erros."},{"id":"M3_U2_Q35","num":35,"total":52,"module":"M3","unit":"U2","topic":"Abordagens Analíticas e Técnicas de Mapeamento de Processos","question_pt":"Um auditor interno está revisando da organização autenticação políticas e procedimentos para usuários acessando seus online contas. fornecidos a complexidade autenticação processo, O auditor interno necessidades para documentar o processo em um maneira que é easy para outro readers papel de trabalho para compreender. Qual das seguintes alternativas deveria melhor ajudar o auditor com eficaz processo documentação?","options_pt":{"A":"Processo maps.","B":"Fluxogramas.","C":"Narratives.","D":"Risco e controle matrices."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Fluxogramas eficazmente documentar complexo processos em um visual formato, tomada them easier para others para compreender quando revisando papéis de trabalho."},{"id":"M3_U2_Q36","num":36,"total":52,"module":"M3","unit":"U2","topic":"Abordagens Analíticas e Técnicas de Mapeamento de Processos","question_pt":"Um auditor interno está analisando empresa processo de compras usando mapeamento de processos. Qual é o mais eficaz primeiro etapa?","options_pt":{"A":"Comparando compras e aquisições práticas com um unrelated departamento workflow.","B":"Identificando principal processo etapas, decisão points, e responsável partes.","C":"Revisando apenas alto valor pedidos de compra sem mapping o todo processo.","D":"Entrevistaring funcionários para compreender seus opiniões em compras e aquisições."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. O primeiro etapa em mapeamento de processos está definindo principal etapas, decisão points, e papéis para create estruturado workflow."},{"id":"M3_U2_Q37","num":37,"total":52,"module":"M3","unit":"U2","topic":"Abordagens Analíticas e Técnicas de Mapeamento de Processos","question_pt":"Um auditor está revisando despesa reembolso processo e usa mapeamento de processos para identificar ineficiências. Qual deve ser analisado?","options_pt":{"A":"O total número de reembolsas solicitaçõesções submitted cada quarter.","B":"Retorno dos empregados sobre como quickly eles receber reembolsos.","C":"O sequence de etapas, aprovação points, e potencial adiars.","D":"Apenas o final pagamento de reembolsos sem examining anterior etapas."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Mapeamento de processos ajuda identificar ineficiências por examining etapa sequences, decisão points, e gargalos."},{"id":"M3_U2_Q38","num":38,"total":52,"module":"M3","unit":"U2","topic":"Abordagens Analíticas e Técnicas de Mapeamento de Processos","question_pt":"Por que é residual renda frequentemente preferido sobre retorno sobre investimento (ROI) como desempenho avaliação?","options_pt":{"A":"O imputed juros taxa utilizado em calculando residual renda é mais facilmente derived fazer que o meta taxa que é compared ao calculated ROI.","B":"Residual renda é medir sobre tempo, enquanto ROI representa os resultados para um único tempo período.","C":"Average investimento é employed com residual renda, enquanto ano-end investimento é employed com ROI.","D":"Residual renda concentrates em maximizing absolute dollars de renda em vez de percentage retorno como com ROI."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Residual renda concentrates em earnings em excess mínimo desired retorno. Com ROI, segment pode rejeitar projeto esse exceeds o mínimo retorno se o projeto irá decrease o segment geral ROI. Para exemplo, projeto esse earns um ROI de 22%, que é greater fazer que o meta taxa de 20%, poderia ser rejected se o segment é atually earning 25%, porque o projeto irá decrease o segment ROI. Este deveria não ocorre com residual renda."},{"id":"M3_U2_Q39","num":39,"total":52,"module":"M3","unit":"U2","topic":"Abordagens Analíticas e Técnicas de Mapeamento de Processos","question_pt":"Qual das seguintes alternativas procedimentos analíticos é comumente utilizado para avaliar de uma organização demonstrações financeiras para reasoncapacidade?","options_pt":{"A":"Ratio análise.","B":"Causa-raiz análise.","C":"Análise de regressão.","D":"Statistical correlation."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Calculando financeiro ratios pode ser revisado para reasonableness, ou ele pode ser compared para anterior períodos, interno ou externo parâmetros de referência, ou alguns outro independente fonte de informação (e.g., P/E ratio, dívida-patrimônio líquido ratio, etc.)"},{"id":"M3_U2_Q40","num":40,"total":52,"module":"M3","unit":"U2","topic":"Abordagens Analíticas e Técnicas de Mapeamento de Processos","question_pt":"Qual das seguintes é um exemplo de benchmarking?","options_pt":{"A":"Comparando controle interno sistema empresa com o sistemas de outro exemplary companies.","B":"Examining contas para grande, unexplained variances orçamento.","C":"Medindo desempenho contra estabelecido metas.","D":"Revisando demonstrações financeiras para comparar a empresa atual desempenho com esse de anterior years."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Benchmarking é form de análise em que você comparar informação contra similar setores ou organizacional unidades. Comparando controle interno sistema com esse de outro exemplary companies é um exemplo de benchmarking."},{"id":"M3_U2_Q41","num":41,"total":52,"module":"M3","unit":"U2","topic":"Abordagens Analíticas e Técnicas de Mapeamento de Processos","question_pt":"Uma organização é heavily invested em mortgage-backed securities em um tempo quando real estate prices são falling sharply. Qual das seguintes alternativas ratios, se calculated mais recentemente issued demonstrações financeiras, poderia ser o mais misleading?","options_pt":{"A":"Market-para-book-valor ratio.","B":"Book valor per comum compartilhar ratio.","C":"Preço/earnings (P/E) ratio.","D":"dividendos payout ratio."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. O book valor per comum compartilhar ration depende em histórico custos e faz não refletir o declining mercado valor de mortgage-backed securities, tomada ele misleading não contexto de falling real estate prices."},{"id":"M3_U2_Q42","num":42,"total":52,"module":"M3","unit":"U2","topic":"Abordagens Analíticas e Técnicas de Mapeamento de Processos","question_pt":"Qual das seguintes alternativas analytical abordagens deve um auditor interno usar se o objetivo de um trabalho de auditoria é para avaliar da organização competitiveness não mercado?","options_pt":{"A":"Benchmarking.","B":"Rentabilidade análise.","C":"Análise de regressão.","D":"Análise de tendências."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Benchmarking compara organização desempenho métricas com setor Normas ou concorrentes, tomada ele o mais adequado método para avaliar mercado competitiveness."},{"id":"M3_U2_Q43","num":43,"total":52,"module":"M3","unit":"U2","topic":"Abordagens Analíticas e Técnicas de Mapeamento de Processos","question_pt":"Um interno auditoria gestor designa uma auditoria equipe para testar compra transações por selecting uma amostra de transações processado por cada three compras e aquisições officers. Qual das seguintes alternativas técnicas irá ajudar auditoria equipe atingir este amostragem objetivo?","options_pt":{"A":"Parar-ou-go amostragem.","B":"Stratified amostragem.","C":"Amostragem de descoberta.","D":"Sistemático amostragem."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Stratified amostragem permite que auditores para divida população em distinct grupos (e.g., compras e aquisições officers) para garantir cada grupo é adequadamente represented não amostra, alinhando-se com a auditoria objetivo."},{"id":"M3_U2_Q44","num":44,"total":52,"module":"M3","unit":"U2","topic":"Abordagens Analíticas e Técnicas de Mapeamento de Processos","question_pt":"Um auditor interno é investigating por que a empresa despesa reembolsos têm aumentado significativamente sobre o passado ano. Que análise de dados método deve ser utilizado?","options_pt":{"A":"Diagnostic análise para determinar subjacente causes increase.","B":"Predictive análise para prever futuro despesa reembolso tendências.","C":"Prescriptive análise para recomendar política mudanças antes de revisando dados.","D":"Anomalia detecção para identificar outliers sem analisando tendências."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Diagnostic análise foca em identificando padrões e root causes de passado events, tomada ele o melhor abordagem para explaining despesa tendências."},{"id":"M3_U2_Q45","num":45,"total":52,"module":"M3","unit":"U2","topic":"Abordagens Analíticas e Técnicas de Mapeamento de Processos","question_pt":"Qual das seguintes alternativas deveria ser o mais eficiente auditoria procedimento para determinar se banco rejeição de empréstimo aplicações foi adequado?","options_pt":{"A":"Selecionar uma amostra de loans apresentado lending comitê para aprovação e determinar se comitê ações taken foram consistente com banco políticas.","B":"Selecionar uma amostra de todos empréstimo aplicações, revisar o aplicações, e rastrear them para qualquer um funded ou rejected empréstimo para determinar se todos ações taken foram consistente com banco políticas.","C":"Selecionar um attributes amostra de loans não funded e revisar o empréstimo aplicações e o reasons para rejeitando them.","D":"Selecionar um attributes amostra de loans que foram funded, revisar o empréstimo aplicações, e determinar se o funded loans complied com banco políticas."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Este deveria ser o mais adequado auditoria procedimento porque auditoria objetivo apenas solicitações um determinação esse rejected loans têm sido rejected para adequado reasons. Ele é não concerned com a aprovação de loans que deve não têm sido feita."},{"id":"M3_U2_Q46","num":46,"total":52,"module":"M3","unit":"U2","topic":"Abordagens Analíticas e Técnicas de Mapeamento de Processos","question_pt":"Qual das seguintes é um drawback de usando caixa ratio para determinar de uma organização default risco?","options_pt":{"A":"Ele é melhor medir de liquidity para oportunidades fazer que para medindo default risco.","B":"Ele é mais geral medir de liquidity fazer que o atual ratio e poderia ser misleading.","C":"A organização provável tem outro ways para pay seu atual passivos que são não accontagemed para não caixa ratio.","D":"A organização pode têm um risco de estoque obsolescence ou outro incapacidade para liquidate estoque."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. O caixa ratio overlooks outro fontes de liquidity, como unused crédito lines ou liquid ativos não incluído não ratio, potentially underestimating da organização capacidade para meet obligations."},{"id":"M3_U2_Q47","num":47,"total":52,"module":"M3","unit":"U2","topic":"Abordagens Analíticas e Técnicas de Mapeamento de Processos","question_pt":"Um auditor interno deve aplicar analytical revisar procedimentos sob Qual das seguintes alternativas circunstâncias?","options_pt":{"A":"Quando relações identificado para comparação são unpredictable.","B":"Quando financeiro e nonfinancial informação são unconfiável.","C":"Quando há é não suficientemente informação para desenvolver independente expectativas.","D":"Quando looking para expected mudanças entre atual e anterior fiscal períodos."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Auditores internos usar analytic procedimentos enquanto planejando e realizando trabalho de auditorias para identificar anomalias em informação como unexpected fluctuations, diferenças, e correlations bem como absence de expected fluctuations, diferenças, e correlations."},{"id":"M3_U2_Q48","num":48,"total":52,"module":"M3","unit":"U2","topic":"Abordagens Analíticas e Técnicas de Mapeamento de Processos","question_pt":"Em casos onde único desvio deveria ser crítico, Qual das seguintes alternativas forms de amostragem deve ser utilizado?","options_pt":{"A":"Parar-ou-go amostragem.","B":"Amostragem de descoberta.","C":"Aceitação amostragem.","D":"Mean-per-unidade amostragem."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Amostragem de descoberta é o form de amostragem adequado quando único desvio deveria ser crítico."},{"id":"M3_U2_Q49","num":49,"total":52,"module":"M3","unit":"U2","topic":"Abordagens Analíticas e Técnicas de Mapeamento de Processos","question_pt":"Qual das seguintes é um típico exemplo de estruturado dados?","options_pt":{"A":"Vendas relatórios documentarado em word processamento software.","B":"Photos e videos stored em hard drive cataregistrars.","C":"Tweets e posts de usuários em social media.","D":"Production informação mantido em relational tables."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Estruturado dados, like production informação em relational tables, é organized em predefined formats e é facilmente buscarable."},{"id":"M3_U2_Q50","num":50,"total":52,"module":"M3","unit":"U2","topic":"Abordagens Analíticas e Técnicas de Mapeamento de Processos","question_pt":"Um auditor interno quer analisar a melhorias que foram o resultado de um custo- reduction exercise realizado sobre o último dois years. Qual das seguintes alternativas técnicas deveria melhor ajudar o auditor?","options_pt":{"A":"Análise de regressão.","B":"Vertical análise.","C":"Correlation análise.","D":"Horizontal análise."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Horizontal análise compara dados em toda tempo períodos e deveria ser eficaz para identificando tendências e melhorias resulting de custo-reduction initiatives."},{"id":"M3_U2_Q51","num":51,"total":52,"module":"M3","unit":"U2","topic":"Abordagens Analíticas e Técnicas de Mapeamento de Processos","question_pt":"Enquanto creating fluxograma para o nota fiscal pagamento processo, um auditor interno necessidades para representa etapa ondo finanças gestor decides se para aprovar ou rejeitar um nota fiscal com base não presence de um concluído lista de verificação. Que fluxograma symbol deve ser utilizado para representa este decisão point?","options_pt":{"A":"Rectangle.","B":"Diamond.","C":"Oval.","D":"Circle."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Em mapeamento de processos, diamond symbol representa uma decisão point onde um processo branches com base em sim/não ou verdadeiro/falso condição."},{"id":"M3_U2_Q52","num":52,"total":52,"module":"M3","unit":"U2","topic":"Abordagens Analíticas e Técnicas de Mapeamento de Processos","question_pt":"Quando avaliando relativo rentabilidade de dois potencial investments, um investor deveria ser mais interested em Qual das seguintes alternativas ratios?","options_pt":{"A":"Total passivos/total ativos.","B":"(líquido vendas – custo de bens sold)/líquido vendas.","C":"EBIT (earnings antes de juros e taxes)/juros.","D":"Vendas/total ativos."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Quando avaliando relativo rentabilidade de investments, investors são tipicamente interested em rentabilidade ratios esse demonstrar eficiência de uma empresa em generating lucro relativo para seu vendas ou custos. O ratio (líquido vendas – custo de bens sold) / líquido vendas, que é também conhecido como bruto lucro margin, é o mais útil ratio para medindo empresa rentabilidade. Ele mostra como much lucro é feita após deducting o custo de bens sold de vendas, que é direto indicador de uma empresa rentabilidade em seu núcleo negócio atividades."},{"id":"M4_U1_Q1","num":1,"total":13,"module":"M4","unit":"U1","topic":"Continuidade de Negócios e Recuperação de Desastres","question_pt":"Que cópia de segurança método é o mais eficiente para minimizing armazenamento space por apenas backing up mudançad dados?","options_pt":{"A":"Incremental.","B":"Mirror.","C":"Differential.","D":"Completo."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Cópia de segurança incremental apenas stores os dados esse tem mudançad desdo último cópia de segurança, tomada ele o mais space eficiente."},{"id":"M4_U1_Q2","num":2,"total":13,"module":"M4","unit":"U1","topic":"Continuidade de Negócios e Recuperação de Desastres","question_pt":"Em uma recuperação de desastres auditoria, Qual das seguintes alternativas deveria representa o mais significativo fraqueza?","options_pt":{"A":"Testes usar recuperação scripts.","B":"Hot-local contratos são dois years antigo.","C":"Cópia de segurança media são stored em local.","D":"Apenas few sistemas são testado annually."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. falta de regular testando de recuperação sistemas é o mais significativo fraqueza, como ele poderia indicar o recuperação processo é unconfiável."},{"id":"M4_U1_Q3","num":3,"total":13,"module":"M4","unit":"U1","topic":"Continuidade de Negócios e Recuperação de Desastres","question_pt":"Os dados center de um nationwide mortgage servicing empresa é undergoing seu anual revisar. O interno auditoria gestor é concerned sobre o dados center não having um adequado contingency plano, especialmente porque ele é located encerrar um river esse ocasionalmente floods e é não vicinity de um principal railroad e principal highway. Mesmo que floodwaters poderia não reach os dados center, sendo located adjacent um river é associated com Qual das seguintes alternativas riscos não caso de significativo flood?","options_pt":{"A":"Clientes poderia recusar para fazer negócio com a empresa.","B":"Expensive equipamento poderia necessidade para ser replaced.","C":"Muitos clientes poderia falha para fazer tempestivo pagamentos.","D":"Funcionários poderia ser unable para relatórioar para trabalho."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Proximity um river aumenta o risco de funcionários sendo unable para relatórioar para trabalho devido a transportation disruptions não caso de flooding."},{"id":"M4_U1_Q4","num":4,"total":13,"module":"M4","unit":"U1","topic":"Continuidade de Negócios e Recuperação de Desastres","question_pt":"Qual das seguintes alternativas garante esse de uma organização ele disaster plano apoia da organização geral negócio recuperação plano?","options_pt":{"A":"Adicional recursos, como adequadamente capacitados middle gestores, são disponível se necessidade.","B":"Sistema mudanças são testado antes de sendo released.","C":"Um risco análise estudo é realizado para melhor definir futuro problemas.","D":"Organizacional e operacional mudanças são documentarado não recuperação plano, e testando é realizado para garantir esse os objetivos são met."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Documentando organizacional e operacional mudanças é crítico ao success de de uma organização recuperação planos. Estes tipos de mudanças são frequentemente \"interwoven\" e têm o potencial para impacto de uma organização capacidade para ser successful se principal problema ocorre."},{"id":"M4_U1_Q5","num":5,"total":13,"module":"M4","unit":"U1","topic":"Continuidade de Negócios e Recuperação de Desastres","question_pt":"Qual das seguintes alternativas deve ser administração principal preocupação quando revisando reciprocal recuperação de desastres acordo entre dois organizações?","options_pt":{"A":"Hardware e software compatibility.","B":"Diferenças em sistema de informação políticas e procedimentos.","C":"Confiabilidade negócio impacto análise.","D":"Frequência de sistema testando."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Recuperação de desastres plano outlines o lógico e eficiente order em que crítico e outro sistemas deve ser restaurado seguinte um outage ou disaster. Reciprocal recuperação de desastres acordo é one feita entre diferente organizações para compartilhar recursos se one suffers disaster ou sistemas falha. Quando revisando reciprocal recuperação acordo, administração principal preocupação deve ser hardware e software compatibility entre o organizações. Sem compatibility, qualquer attempt em recuperação irá qualquer um ser ineficiente ou impossible e pode levar para dados perda ou (em um pior-caso cenário) não recuperação."},{"id":"M4_U1_Q6","num":6,"total":13,"module":"M4","unit":"U1","topic":"Continuidade de Negócios e Recuperação de Desastres","question_pt":"Qual deveria ser o mais crítico aspecto de um contingency plano para uma organização fornecendo ajudar desk serviços?","options_pt":{"A":"Restaurando segurança e proteção de cliente dados.","B":"Restaurando end usuário dispositivos e redes.","C":"Restaurando telecomunicações para comunicação.","D":"Restaurando cliente relação administração ferramentas."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Restaurando telecomunicações garante essencial comunicação channels reprincipal intact, possibilitando continuard serviço durante disaster."},{"id":"M4_U1_Q7","num":7,"total":13,"module":"M4","unit":"U1","topic":"Continuidade de Negócios e Recuperação de Desastres","question_pt":"Qual das seguintes é verdadeiro de contingency planejando?","options_pt":{"A":"Purchasing insurance para específico contingencies é válido parte de um plano de continuidade de negócios.","B":"Telecomunicações é geralmente considerado noncritical sistema em uma recuperação de desastres plano.","C":"O processo de desenvolvendo contingency plano deve não ser outfonted.","D":"Off-local armazenamento de cópia de segurança dados é secured melhor se reciprocal processamento acordo é utilizado."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Contingency planejando inclui fornecendo adequado negócio interruption insurance para cover operacional perdas (oportunidade custos de lost trabalho e vendas, compra de substituição equipamento) e adequado equipamento e adequadoty insurance para cover físico perdas."},{"id":"M4_U1_Q8","num":8,"total":13,"module":"M4","unit":"U1","topic":"Continuidade de Negócios e Recuperação de Desastres","question_pt":"Durante continuidade de negócios auditoria, qual é o principal meta continuidade de negócios administração plano?","options_pt":{"A":"Avoid, deter, e prevenir disasters e preparar a organização para responder um disaster.","B":"Gerenciar externo e interno comunicações e alta administração atividades durante disaster.","C":"Fornecer lifesaving, safety, e inicial esforços para limitar o impacto para ativo damage.","D":"Possibilitar a organização para restaurar crítico processos de negócio após disaster teve sido declared."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. O principal meta de continuidade de negócios administração é para garantir a organização pode restaurar crítico processos após disaster."},{"id":"M4_U1_Q9","num":9,"total":13,"module":"M4","unit":"U1","topic":"Continuidade de Negócios e Recuperação de Desastres","question_pt":"Um event esse, se não handled adequadamente, pode significativamente impacto uma organização capacidade para operar, reprincipal profitable, e gerenciar reputational risco descreve Qual das seguintes alternativas?","options_pt":{"A":"Disaster.","B":"Crisis.","C":"Um incidente.","D":"Um emergency."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Crisis tem significativo potencial para disrupt operações e damage reputation se não gerenciado adequadamente."},{"id":"M4_U1_Q10","num":10,"total":13,"module":"M4","unit":"U1","topic":"Continuidade de Negócios e Recuperação de Desastres","question_pt":"Qual das seguintes alternativas tipos de dados cópia de segurança envolve creating cópia de segurança cópias de apenas esses arquivos que têm mudançad desdo último cópia de segurança de qualquer kind?","options_pt":{"A":"Cópia de segurança completo.","B":"Cópia de segurança incremental.","C":"Dados recuperação.","D":"Off-local cópia de segurança."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Um cópia de segurança incremental backs up apenas esses arquivos que têm sido mudançad desdo último cópia de segurança de qualquer kind."},{"id":"M4_U1_Q11","num":11,"total":13,"module":"M4","unit":"U1","topic":"Continuidade de Negócios e Recuperação de Desastres","question_pt":"Qual das seguintes alternativas atividades é necessário para determinar qual deveria constitute disaster para uma organização?","options_pt":{"A":"Fornecedor supply acordo análise","B":"Risco análise","C":"Arquivo e equipamento cópia de segurança requisitos análise","D":"Contingent instalação contrato análise"},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Risco análise é necessário para determinar de uma organização definição de um disaster. O outro answer choices são parte de um contingency planejando estratégia para react um disaster."},{"id":"M4_U1_Q12","num":12,"total":13,"module":"M4","unit":"U1","topic":"Continuidade de Negócios e Recuperação de Desastres","question_pt":"Qual é melhor maneira para administração para garantir eles pode quickly resume operações após um interruption?","options_pt":{"A":"Manter o mesmo nível de employment.","B":"Minimize o custo de instalação repair.","C":"Receber o máximo benefit de planejando.","D":"Fulfill seu obligations para clientes."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Correto: recuperação plano deve principalmente focar em garantindo esse a organização pode fulfill seu obligations para clientes por resuming operações quickly."},{"id":"M4_U1_Q13","num":13,"total":13,"module":"M4","unit":"U1","topic":"Continuidade de Negócios e Recuperação de Desastres","question_pt":"Qual das seguintes é o mais persuasive evidências esse contingency planejando é eficaz?","options_pt":{"A":"Successful testando plano.","B":"Abrangente documentação plano.","C":"Não processamento interruptions durante o passado ano.","D":"Sign-off não plano pela função de auditoria interna."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Successful testando plano fornece tangible proof esse o contingency planejando é operacionalmente eficaz e ready para actual emergencies."},{"id":"M4_U2_Q1","num":1,"total":25,"module":"M4","unit":"U2","topic":"Critérios de Avaliação e Condições Existentes","question_pt":"Qual das seguintes é um exemplo de interno avaliação critérios?","options_pt":{"A":"Organizacional políticas e procedimentos","B":"Regulatório requisitos","C":"Profissional Normas","D":"Setor parâmetros de referência"},"correct":"A","explan
