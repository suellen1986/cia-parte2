":"D","explanation_pt":"Alternativa \"D\" está correta. Turnover analisa ajudar identificar produtos que pode não ser alinhado com mercado demand, assisting em ajustando estoque estratégias consequentemente."},{"id":"M6_U1_Q3","num":3,"total":11,"module":"M6","unit":"U1","topic":"Riscos e Controles-Chave Relacionados a Processos de Negócio","question_pt":"Qual é one primeiro things auditores internos deve fazer quando preparando para uma auditoria de um outfonted processo de negócio?","options_pt":{"A":"Determinar se a organização teve definido terceiros gestão de riscos programa e estrutura de governança.","B":"Comparar outfonted custos para em-house custo alternativas.","C":"Avaliar por que processo de negócio teve sido outfonted não primeiro place.","D":"Compreender se o processo de negócio teve sido outfonted um local ou internacional parte."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. O terceiros gestão de riscos programa fornece iniciando point para identificando outsourcing apetite ao risco, políticas, papéis e responsabilidades, e disponível ferramentas para controle terceiros riscos."},{"id":"M6_U1_Q4","num":4,"total":11,"module":"M6","unit":"U1","topic":"Riscos e Controles-Chave Relacionados a Processos de Negócio","question_pt":"Para que uma cadeia de suprimentos seja bem-sucedida, qual é o objetivo mais importante para todas as partes envolvidas?","options_pt":{"A":"Estabelecer vínculos de confiança.","B":"Manter registros abertos e transparentes.","C":"Praticar preços competitivos entre si.","D":"Operar os mesmos sistemas de informação."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Embora o enunciado aponte os sistemas de informação como resposta, a lógica central é que estabelecer confiança é fundamental para uma colaboração eficaz e garante operações de cadeia de suprimentos eficientes e eficazes."},{"id":"M6_U1_Q5","num":5,"total":11,"module":"M6","unit":"U1","topic":"Riscos e Controles-Chave Relacionados a Processos de Negócio","question_pt":"Empresa usando eletrônico dados intermudança (EDI) feita ele prática para acompanhar funcional acknowledgments de trading parceiros e questão warning messages se acknowledgments fez não ocorre dentro de razoável duração de tempo. Qual risco foi a empresa attempting para tratar por este prática?","options_pt":{"A":"Transmission de EDI transações para trading parceiros pode às vezes falha.","B":"Transações que têm não originated de um legitimate trading parceiro pode ser inserted não EDI rede.","C":"Há pode ser disagreement entre a partes como para se EDI transações form legal contrato.","D":"EDI dados pode não ser com precisão e completoly processado por o EDI software."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Por tracking funcional acknowledgments, a empresa pode verificar esse EDI transações foram com êxito transmitted e recebido. Sem este prática, undetected transmission falhas poderia levar para missed transações, disruptions em negócio operações, e potencial financeiro ou reputational riscos."},{"id":"M6_U1_Q6","num":6,"total":11,"module":"M6","unit":"U1","topic":"Riscos e Controles-Chave Relacionados a Processos de Negócio","question_pt":"Purchasing departamento é touting seu reduzido ordering custo com base em ordering materials pelo containerload de fewer fornecedores. Um auditor interno está realizando um trabalho de consultoria não estoque administração processo geral. Qual deve o auditor também look em?","options_pt":{"A":"Se set-up custos têm aumentado devido ao higher valor de materials handling que é necessidade para estes itens.","B":"Se purchasing custos per unidade têm aumentado por mais fazer que estes ordering custo savings.","C":"Se ruptura de estoque custos têm aumentado por mais fazer que estes ordering custo savings.","D":"Se estoque holding custos têm aumentado por mais fazer que estes ordering custo savings."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Ordering materials pelo containerload de fewer fornecedores reduz ordering custos mas pode levar para higher estoque holding custos devido a larger quantities de estoque sendo stored. O auditor interno deve examinar se estes aumentado holding custos offset ou exceed o ordering custo savings, como este poderia negate o benefícios purchasing estratégia e impacto geral estoque administração eficiência."},{"id":"M6_U1_Q7","num":7,"total":11,"module":"M6","unit":"U1","topic":"Riscos e Controles-Chave Relacionados a Processos de Negócio","question_pt":"Um varejista de alto volume de bens de consumo utiliza dados de ponto de venda para registrar vendas e atualizar os registros de estoque há vários anos. Quando são programadas alterações de preços, a matriz baixa um arquivo de alteração de preços nos servidores das lojas. Entretanto, o pessoal da loja ainda precisa verificar manualmente e atualizar os arquivos de preços nos terminais de ponto de venda. Qual é o efeito mais provável desse processo?","options_pt":{"A":"Aumentar o risco de que os clientes sejam sistematicamente cobrados a menos pelos itens vendidos.","B":"Aumentar o risco de que os preços dos itens sejam às vezes imprecisos.","C":"Diminuir o risco de que os clientes sejam sistematicamente cobrados a menos pelos itens vendidos.","D":"Diminuir o risco de que os preços dos itens sejam às vezes imprecisos."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Ao depender de funcionários da loja para verificar e atualizar manualmente os arquivos de preços, aumenta-se a probabilidade de erros, atrasos ou atualizações omitidas. Essa abordagem descentralizada introduz variabilidade e inconsistência, elevando o risco de preços imprecisos."},{"id":"M6_U1_Q8","num":8,"total":11,"module":"M6","unit":"U1","topic":"Riscos e Controles-Chave Relacionados a Processos de Negócio","question_pt":"Fluxogramas são útil durante planejamento do trabalho porque eles contain informação que pode ajudar auditores internos com Qual das seguintes alternativas?","options_pt":{"A":"Determinando size equipe necessidade para realizar o trabalho de auditoria.","B":"Compreensão processos de negócio.","C":"Compreensão administração tolerância ao risco.","D":"Compreensão organizacional objetivos."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Fluxogramas fornecer claro, visual representation de processos de negócio, ajudando auditores internos compreender fluxos de trabalho, identificar potencial lacunas, e plano seus trabalho de auditorias eficazmente."},{"id":"M6_U1_Q9","num":9,"total":11,"module":"M6","unit":"U1","topic":"Riscos e Controles-Chave Relacionados a Processos de Negócio","question_pt":"Durante uma revisão de aplicativo mudanças, um auditor interno descobre esse múltiplos developers têm unrestricted acesso para fonte code. Este questão é mais provável categorized sob que causa-raiz?","options_pt":{"A":"Uncontrolled atualiza para aplicativo code.","B":"Alto instcapacidade em sistema desempenho.","C":"Erros em aplicativo desenho registraric.","D":"Falta de formal mudança administração processos."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Unrestricted acesso para fonte code reflects falta de estruturado governança e controles, que alinha-se com a causa-raiz de faltaing formal mudança administração processos."},{"id":"M6_U1_Q10","num":10,"total":11,"module":"M6","unit":"U1","topic":"Riscos e Controles-Chave Relacionados a Processos de Negócio","question_pt":"Qual das seguintes alternativas seria mais provavelmente incluída em uma matriz de riscos e controles para impedir que funcionários cadastrem fornecedores fictícios no processo de compras de uma organização?","options_pt":{"A":"Revisão de números de identificação duplicados de fornecedores.","B":"Segregação de funções nos processos de gestão de fornecedores.","C":"Recebimento de declarações anuais de devida diligência dos fornecedores.","D":"Monitoramento e aprovação regulares de faturas."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. A segregação de funções é um controle interno essencial que impede que um único indivíduo cadastre fornecedores fictícios e aprove pagamentos relacionados, reduzindo assim o risco de fraude nos processos de compras."},{"id":"M6_U1_Q11","num":11,"total":11,"module":"M6","unit":"U1","topic":"Riscos e Controles-Chave Relacionados a Processos de Negócio","question_pt":"O auditor interno identifica esse a organização aplicativo software negócio resiliência plano (ASBRP) exige um aplicativo ser restaurado para production status não mais longa fazer que 18 hours após failing. no entanto, há é não corresponding serviço nível acordo (SLA) com o terceiros fornecendo requerendo eles alcançar trabalhando- order/production recuperação em este timeframe. Este constitutes disparity entre Qual das seguintes alternativas?","options_pt":{"A":"Terceiros contrato e o SLA.","B":"SLA e a organização regulatório conformidade requisitos.","C":"Terceiros contrato e a organização apetite ao risco.","D":"SLA e a organização apetite ao risco."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. O risco appetite é o tipo e valor de risco esse uma organização é willing para aceitar não pursuit de seu estratégias e objetivos. O incapacidade terceiro parte para alcançar trabalhando-order recuperação dentro do timeframe exigido por a organização constitutes disparity entre o SLA e a organização apetite ao risco."},{"id":"M7_U1_Q1","num":1,"total":33,"module":"M7","unit":"U1","topic":"Abordagem Adequada do Trabalho","question_pt":"Qual das seguintes alternativas melhor descreve um desafio em adopting auditoria ágil?","options_pt":{"A":"Shifts em mindset e culture","B":"Mais longa trabalho de auditoria cronogramas","C":"Reduzido necessidade para parte interessada involvement","D":"Aumentado necessidade para em-pessoa meetings"},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Originating agile metodoregistraria inicialmente utilizado em software desenvolvimento, auditoria ágil é um inovador abordagem para interno auditoria characterized por seu velocidade, flexibilidade, colaboração, e iterative progresso ao longo do trabalho de auditoria processo. Resistance para mudança dentro da organização pode arise, especialmente de principal partes interessadas e equipe de auditoria interna membros que são accustomed para auditoria tradicional métodos. Portanto, auditoria ágil exige fundamental shift em mindset em como trabalho de auditorias são conduzido e mudança em culture dentro de função de auditoria interna. Alternativa \"B\" está incorreta. Auditoria ágil tipicamente envolve shorter trabalho de auditoria cronogramas. One principal benefícios de auditoria ágil é aumentado eficiência e velocidade no trabalho de auditoria processo. Ele facilitates streamlining avaliação de riscos processos, resulting em quicker decisão-tomada e tempestivo resolução de questões. Alternativa \"C\" está incorreta. Auditoria ágil promotes greater parte interessada involvement e colaboração. Por engaging partes interessadas ao longo do trabalho de auditoria processo, auditoria ágil promotes greater transparência e leads para mais preciso e abrangente avaliações de riscos e controles. Alternativa \"D\" está incorreta. Auditoria ágil faz não necessarily increase o necessidade para em- pessoa meetings."},{"id":"M7_U1_Q2","num":2,"total":33,"module":"M7","unit":"U1","topic":"Abordagem Adequada do Trabalho","question_pt":"Equipe de auditoria interna está conduzindo um trabalho de auditoria com um apertado prazo. Enquanto mais tarefas são não caminho crítico e deve ser concluído não prazo, few non-crítico tarefas têm alguns flexibilidade em seus começar e end dates. O projeto gestor quer adiar o começar de estes non-crítico tarefas para alocar recursos para crítico tarefas sem affecting o geral projeto cronograma. Que gerenciamento de projetos técnica é o projeto gestor usando em este situação?","options_pt":{"A":"Douramento","B":"Usando folga não cronograma","C":"Paralelização de atividades","D":"Compressão de cronograma"},"correct":"B","explanation_pt":"Alternativa \"A\" está incorreta. Douramento é não gerenciamento de projetos técnica mas comum problema auditores internos pode encontrar. Ele envolve realizando trabalho além do escopo projeto sem aprovação. Alternativa \"B\" está correta. Usando folga não cronograma é técnica esse projeto gestores pode usar para ajudar tratar unexpected adiars ou recurso conflitos que pode arise durante projeto/trabalho de auditoria e permite para o capacidade para adiar o começar tempo de non-crítico tarefas sem affecting o geral projeto cronograma. Alternativa \"C\" está incorreta. Paralelização de atividades é técnica esse projeto gestores pode usar para ajudar tratar unexpected adiars ou recurso conflitos que pode arise durante projeto/trabalho de auditoria e envolve iniciando tarefa antes de seu predecessor é concluído. Este resultados não tarefas sendo realizado simultaneamente, quando possível. O risco com este abordagem é o rework successor tarefa com base no trabalho e achados predecessor tarefa. Alternativa \"D\" está incorreta. Compressão de cronograma é técnica esse projeto gestores pode usar para ajudar tratar unexpected adiars ou recurso conflitos que pode arise durante projeto/trabalho de auditoria e envolve adding recursos ao atrasado tarefas fim de shorten o caminho crítico e prevenir geral projeto adiars."},{"id":"M7_U1_Q3","num":3,"total":33,"module":"M7","unit":"U1","topic":"Abordagem Adequada do Trabalho","question_pt":"Que gerenciamento de projetos técnica ajuda avaliar projeto tarefas e seus dependencies para constatar o mais eficiente path para reaching o projeto metas?","options_pt":{"A":"Gráfico de Gantt","B":"Compressão de cronograma","C":"Paralelização de atividades","D":"Rede análise"},"correct":"D","explanation_pt":"Alternativa \"A\" está incorreta. Gráfico de Gantt é visual ferramenta esse ajuda projeto gestores cronograma e acompanhar projeto atividades. Ele displays tarefas como horizontal bars, showing seus começar e end dates, durations, e sequence de atividades. Este permite para easy visualization projeto cronograma e ajuda identificar potencial agendando conflitos ou adiars. Alternativa \"B\" está incorreta. Compressão de cronograma é técnica esse projeto gestores pode usar para ajudar tratar unexpected adiars ou recurso conflitos que pode arise durante projeto/trabalho de auditoria e envolve adding recursos ao atrasado tarefas fim de shorten o caminho crítico e prevenir geral projeto adiars. Alternativa \"C\" está incorreta. Paralelização de atividades é técnica esse projeto gestores pode usar para ajudar tratar unexpected adiars ou recurso conflitos que pode arise durante projeto/trabalho de auditoria e envolve iniciando tarefa antes de seu predecessor é concluído. Este resultados não tarefas sendo realizado simultaneamente, quando possível. O risco com este abordagem é o rework successor tarefa com base no trabalho e achados predecessor tarefa. Alternativa \"D\" está correta. Rede análise, frequentemente usando técnicas como programa avaliação revisar técnica (PERT) e o caminho crítico método (CPM), ajuda avaliar projeto tarefas e seus dependencies para constatar o mais eficiente path para reaching o projeto metas."},{"id":"M7_U1_Q4","num":4,"total":33,"module":"M7","unit":"U1","topic":"Abordagem Adequada do Trabalho","question_pt":"Função de auditoria interna é looking para conduzir uma auditoria esse combines vários auditoria disciplines em único trabalho de auditoria para maximize eficiência e eficácia. Que abordagem do trabalho deveria ser mais adequado para este cenário?","options_pt":{"A":"Auditoria tradicional","B":"Auditoria integrada","C":"Auditoria remota","D":"Auditoria ágil"},"correct":"B","explanation_pt":"Alternativa \"A\" está incorreta. Auditoria tradicional é mais adequado para trabalho de auditorias com um longo cronograma e limitado recursos, não para trabalho de auditorias esse necessidade para combine vários auditoria disciplines em único trabalho de auditoria para maximize eficiência e eficácia. Alternativa \"B\" está correta. Auditoria integrada é particularmente útil para organizações em larger e mais complexo organizações, especialmente quando há são interdependências entre processos e quando processos span múltiplos departamentos. Este permite múltiplos aspectos para ser considerado simultaneamente, para atingir mais holistic compreensão em um mais eficiente manner. Ele pode envolver conduzindo integrado auditorias, que incluir combining diferente auditoria disciplines, como financeiro, operacional, e ele auditorias, em único auditoria. há são vários benefícios para usando um integrado abordagem em tal situações, incluindo aumentando efficiencies e eficácia de risco cobertura, aprimorando presence função de auditoria interna na organização, e expandindo conhecimento e habilidades equipe de auditoria interna membros por having them trabalho em broader e mais complexo trabalhos de auditoria. Alternativa \"C\" está incorreta. Auditoria remota foca não localização trabalho de auditoria atividades, no trabalho de auditorias esse necessidade para combine vários auditoria disciplines em único trabalho de auditoria para maximize eficiência e eficácia. Alternativa \"D\" está incorreta. Auditoria ágil é mais adequado para trabalho de auditorias com shorter cronogramas e anticipated mudanças, não para trabalho de auditorias esse necessidade para combine vários auditoria disciplines em único trabalho de auditoria para maximize eficiência e eficácia."},{"id":"M7_U1_Q5","num":5,"total":33,"module":"M7","unit":"U1","topic":"Abordagem Adequada do Trabalho","question_pt":"Qual das seguintes é uma consideração para determinando suitcapacidade de realizando um trabalho de auditoria remotamente?","options_pt":{"A":"A disponibilidade de externo consultants","B":"O personal preferences equipe de auditoria interna","C":"O disponível tecnoregistraria aplicações","D":"O histórico desempenho função de auditoria interna"},"correct":"C","explanation_pt":"Alternativa \"A\" está incorreta. Enquanto a disponibilidade de externo consultants poderia ser beneficial para certain trabalho de auditorias, ele é não principal consideração para determinando suitcapacidade de realizando um trabalho de auditoria remotamente. Alternativa \"B\" está incorreta. O personal preferences equipe de auditoria interna deve não ser consideração para determinando suitcapacidade de realizando um trabalho de auditoria remotamente. Alternativa \"C\" está correta. O disponível tecnoregistraria aplicações são principal consideração em determinando se ele é adequado para realizar o trabalho de auditoria remotamente. Auditoria remota pode então ser realizado de um distance, aproveitando tecnoregistraria ferramentas para realizar vários tarefas remotamente, como entrevistas, walk-throughs, e físico observações. Auditoria software é necessidade para facilitar documentação de auditoria e revisa bem como outro elementos interno auditoria processos. Auditoria remota abordagem pode ser adequado quando função de auditoria interna tem o adequado technoregistrarical soluções para trabalho colaborativamente e mitigar gestão de riscos preocupações. Alternativa \"D\" está incorreta. O histórico desempenho função de auditoria interna é não relevantee para determinando suitcapacidade de realizando um trabalho de auditoria remotamente."},{"id":"M7_U1_Q6","num":6,"total":33,"module":"M7","unit":"U1","topic":"Abordagem Adequada do Trabalho","question_pt":"Qual das seguintes alternativas descreve etapa não mudança administração processo para tratar potencial expansão de escopo e/ou douramento em gerenciamento de projetos?","options_pt":{"A":"Submetendo mudança solicitaçõesr","B":"Realizando todos tarefas simultaneamente para save tempo","C":"Avoiding parte interessada involvement para manter objetividade","D":"Ignoring mudanças em escopo once o projeto tem começou"},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. One crítico elemento de gerenciamento de projetos é mudança administração processo para tratar potencial expansão de escopo e/ou douramento. Comum etapas não processo incluir: submetendo mudança solicitaçõesr aprovaçãas solicitaçõesçõesr pelo projeto sponsor e/ou adequado partes atualizar plano fazer projeto, incluindo cronograma, recursos, e entregáveis impacted, com base não aprovado mudanças comunicação atualizado plano fazer projeto alternativa \"B\" está incorreta. Realizando todos tarefas simultaneamente é não relevantee para o mudança administração processo. Alternativa \"C\" está incorreta. Avoiding parte interessada involvement é não relevantee para o mudança administração processo. Em vez de, mudança administração processo deve ser formalmente comunicado e agreed para não começar projeto/trabalho de auditoria. Alternativa \"D\" está incorreta. Ignoring mudanças em escopo é não relevantee para o mudança administração processo."},{"id":"M7_U1_Q7","num":7,"total":33,"module":"M7","unit":"U1","topic":"Abordagem Adequada do Trabalho","question_pt":"Qual das seguintes alternativas melhor descreve um benefit de auditoria remota?","options_pt":{"A":"Aumentado necessidade para em-pessoa meetings","B":"Limitado acesso para certain tipos de evidências","C":"Aumentado risco de fraude devido a falta de em-pessoa contact","D":"Reduzido travel tempo e custos"},"correct":"D","explanation_pt":"Alternativa \"A\" está incorreta. Auditoria remota reduz o necessidade para em-pessoa meetings. Alternativa \"B\" está incorreta. Limitado acesso para certain tipos de evidências é desafio, não benefit, de auditoria remota. Alternativa \"C\" está incorreta. Aumentado risco de fraude devido a falta de em-pessoa contact é desafio, não benefit, de auditoria remota. Alternativa \"D\" está correta. One benefícios de auditoria remota é reduzido travel tempo e custos. Auditoria remota fornece benefícios por meio de reduzido travel tempo e custos, um expandido pool de disponível equipe membros, potentially broader cobertura devido a tempo savings, e reduzido burden não instalações atividades sob revisão."},{"id":"M7_U1_Q8","num":8,"total":33,"module":"M7","unit":"U1","topic":"Abordagem Adequada do Trabalho","question_pt":"Que gerenciamento de projetos técnica envolve adding recursos para shorten o caminho crítico e prevenir geral projeto adiars?","options_pt":{"A":"Usando folga não cronograma","B":"Compressão de cronograma","C":"Douramento","D":"Paralelização de atividades"},"correct":"B","explanation_pt":"Alternativa \"A\" está incorreta. Usando folga não cronograma permite para o capacidade para adiar o começar tempo de non-crítico tarefas. Alternativa \"B\" está correta. Compressão de cronograma envolve adding recursos ao atrasado tarefas fim de shorten o caminho crítico e prevenir geral projeto adiars. O projeto gestor deve determinar se adding os recursos irá custo menos fazer que atrasando geral projeto conclusão. Alternativa \"C\" está incorreta. Douramento é não gerenciamento de projetos técnica mas potencial problema auditores internos pode encontrar, que envolve realizando trabalho além do escopo projeto sem aprovação. Ele pode também impacto projeto custos e prazos. Alternativa \"D\" está incorreta. Paralelização de atividades envolve iniciando tarefa antes de seu predecessor é concluído. Este resultados não tarefas sendo realizado simultaneamente quando possível. O risco com este abordagem é reworking o successor tarefa com base no trabalho e achados predecessor tarefa."},{"id":"M7_U1_Q9","num":9,"total":33,"module":"M7","unit":"U1","topic":"Abordagem Adequada do Trabalho","question_pt":"Durante fase de planejamento de uma auditoria, o levar auditor quer garantir eficiente alocação de recursos. Que gerenciamento de projetos técnica deveria melhor apoiar este objetivo?","options_pt":{"A":"Definindo papéis e responsabilidades com base não escopo do trabalho para optimize recurso usar.","B":"Avoiding detalhado planejando para permitir auditores para ajustar seus workload dynamically como prioridades shift.","C":"Designando todos auditores para todo tarefa, independentemente de especialização, para garantir completo cobertura e flexibilidade.","D":"Agendando auditoria equipe principalmente com base em disponibilidade em vez de aligning especialização com trabalho de auditoria necessidades."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Claramente definindo papéis e responsabilidades garante esse recursos são eficazmente utilized e alinhado com o trabalho de auditoria necessidades."},{"id":"M7_U1_Q10","num":10,"total":33,"module":"M7","unit":"U1","topic":"Abordagem Adequada do Trabalho","question_pt":"Qual das seguintes alternativas etapas é parte de implementando auditoria ágil usando Scrum estrutura?","options_pt":{"A":"Realizando todos tarefas simultaneamente para save tempo","B":"Avoiding parte interessada involvement para manter objetividade","C":"Conduzindo único, abrangente revisar não end trabalho de auditoria","D":"Conduzindo frequente check-ins dentro de equipe de auditoria interna"},"correct":"D","explanation_pt":"Alternativa \"A\" está incorreta. Auditoria ágil envolve curto, focused sprints, não realizando todos tarefas simultaneamente. Alternativa \"B\" está incorreta. Auditoria ágil promotes parte interessada involvement e colaboração, não avoidance de parte interessada involvement. Alternativa \"C\" está incorreta. Auditoria ágil envolve iterative revisa, não único abrangente revisar não end. Alternativa \"D\" está correta. Originating agile metodoregistraria inicialmente utilizado em software desenvolvimento, auditoria ágil é um inovador abordagem para interno auditoria characterized por seu velocidade, flexibilidade, colaboração, e iterative progresso ao longo do trabalho de auditoria processo. Aplicando Scrum técnicas é considerado um eficaz means de implementando auditoria ágil. Sob o Scrum estrutura, o trabalho de auditoria processo é broken down em curto, focused sprints. Ao longo do sprint processo, auditores internos conduzir frequente check-ins (e.g., diário 15-minute meetings) dentro de equipe de auditoria interna. Portanto, conduzindo frequente check-ins dentro de equipe de auditoria interna é parte de implementando auditoria ágil usando Scrum estrutura."},{"id":"M7_U1_Q11","num":11,"total":33,"module":"M7","unit":"U1","topic":"Abordagem Adequada do Trabalho","question_pt":"Qual das seguintes é uma característica auditoria tradicional abordagem?","options_pt":{"A":"Ele é altamente adaptable para mudanças.","B":"Ele usa waterfall método onde atividades são realizado em sequential order.","C":"Ele envolve curto, focused sprints.","D":"Ele enfatizars contínuo retorno e iteration."},"correct":"B","explanation_pt":"Alternativa \"A\" está incorreta. Alto adaptabilidade para mudanças é funcionalidade de auditoria ágil. Alternativa \"B\" está correta. Auditoria tradicional usa qual é referred para em gerenciamento de projetos como waterfall abordagem. Este abordagem envolve estrutura com um series de fases (planejamento do trabalho, trabalho de campo, revisar, e relatórioando) que são realizado em sequence com não overlap ou consecutive atividades. Portanto, o usar de um waterfall método onde atividades são realizado em sequential order é característica auditoria tradicional abordagem. Alternativa \"C\" está incorreta. Curto, focused sprints são característica de auditoria ágil. Alternativa \"D\" está incorreta. Contínuo retorno e iteration são enfatizard em auditoria ágil."},{"id":"M7_U1_Q12","num":12,"total":33,"module":"M7","unit":"U1","topic":"Abordagem Adequada do Trabalho","question_pt":"Qual das seguintes alternativas ajuda garantir o trabalho de auditoria objetivos são atingido por optimizing o allocation e integração de entradas?","options_pt":{"A":"Expansão de escopo","B":"Rework","C":"Gerenciamento de projetos","D":"Douramento"},"correct":"C","explanation_pt":"Alternativa \"A\" está incorreta. Expansão de escopo é one comum problemas auditores internos pode face. Ele refers um increase não valor de trabalho, recursos (financeiro ou recursos humanos), ou tempo não projeto (após ele tem begun) não originalmente planejado para devido a unanticipated mudanças em circunstâncias impacting o projeto ou poor planejando. Alternativa \"B\" está incorreta. Rework é one comum problemas auditores internos pode face. Ele envolve rerealização tarefas que pode têm sido inappropriately planejado para (inadequado recursos ou timing alocado ao originalmente tarefas resulting em incompleto ou inaccurate resultados). Alternativa \"C\" está correta. Gerenciamento de projetos ajuda garantir esse objetivos do trabalho de auditoria são atingido por optimizing o allocation e integração de entradas. Successful gerenciamento de projetos inclui delivering projeto esse atinge seu objetivos por optimizing o allocation e integração de entradas e reaches desired desempenho ou qualidade nível dentro de definido tempo e orçamento. Alternativa \"D\" está incorreta. Douramento é one comum problemas auditores internos pode face. Ele envolve realizando trabalho além do escopo projeto sem aprovação, que pode também impacto projeto custos e prazos."},{"id":"M7_U1_Q13","num":13,"total":33,"module":"M7","unit":"U1","topic":"Abordagem Adequada do Trabalho","question_pt":"Qual das seguintes é um comum problema em gerenciamento de projetos esse envolve realizando trabalho além do escopo projeto sem aprovação?","options_pt":{"A":"Rework","B":"Paralelização de atividades","C":"Douramento","D":"Expansão de escopo"},"correct":"C","explanation_pt":"Alternativa \"A\" está incorreta. Rework envolve rerealização tarefas que pode têm sido inappropriately planejado para, incluindo inadequado recursos ou timing alocado ao originalmente tarefas resulting em incompleto ou inaccurate resultados. Alternativa \"B\" está incorreta. Paralelização de atividades é não comum problema em gerenciamento de projetos. Em vez de, ele é one técnicas esse projeto gestores pode usar para ajudar tratar unexpected adiars ou recurso conflitos que pode arise durante projeto/trabalho de auditoria. Ele envolve iniciando tarefa antes de seu predecessor é concluído. Este resultados não tarefas para ser realizado simultaneamente, quando possível. O risco com este abordagem é o rework successor tarefa com base no trabalho e achados predecessor tarefa. Alternativa \"C\" está correta. Douramento envolve realizando trabalho que é além do escopo projeto e projeto objetivos sem aprovação. Ele pode também impacto projeto custos e prazos. Alternativa \"D\" está incorreta. Expansão de escopo envolve um increase não valor de trabalho, recursos, ou tempo não projeto não originalmente planejado para. Ele é geralmente caused por poor planejando ou unanticipated mudanças em circunstâncias impacting o projeto."},{"id":"M7_U1_Q14","num":14,"total":33,"module":"M7","unit":"U1","topic":"Abordagem Adequada do Trabalho","question_pt":"Equipe de auditoria interna está planejando um trabalho de auditoria para revisar de uma organização ele segurança processos. Equipe tem grande orçamento e acesso para avançado tecnoregistraria ferramentas. O ele segurança processos envolver múltiplos departamentos, e o trabalho de auditoria necessidades para ser concluído dentro de relativamente curto cronograma. Que abordagem do trabalho deveria ser mais adequado para este cenário?","options_pt":{"A":"Auditoria ágil","B":"Auditoria tradicional","C":"Auditoria integrada","D":"Auditoria remota"},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Auditoria ágil deveria ser o mais adequado abordagem para este cenário devido a seu flexibilidade e capacidade para adapt para mudanças em escopo e recursos. Auditoria ágil é particularmente útil em um changing e dynamic negócio ambiente esse exige auditores internos para priorizar adaptabilidade e capacidade de resposta para garantir a relevância e eficiência necessidade para trabalho de auditorias com o curto cronogramas função de auditoria interna quando apoiando a organização. Adicionalmente, fornecidos o curto cronograma do trabalho, auditoria ágil é o mais adequado abordagem como ele facilitates streamlining avaliação de riscos processos, resulting em quicker decisão tomada e tempestivo resolução de questões, e permite para faster turnaround tempo para relatórioando. Alternativa \"B\" está incorreta. Auditoria tradicional é menos adaptable para mudanças e pode não ser adequado para um trabalho de auditoria com um relativamente curto cronograma. Alternativa \"C\" está incorreta. Auditoria integrada é adequado para larger e mais complexo organizações com interdependências mas pode não ser o melhor fit para um trabalho de auditoria com um relativamente curto cronograma. Alternativa \"D\" está incorreta. Auditoria remota foca não localização trabalho de auditoria atividades e pode não tratar o necessidade para flexibilidade e adaptabilidade em este cenário."},{"id":"M7_U1_Q15","num":15,"total":33,"module":"M7","unit":"U1","topic":"Abordagem Adequada do Trabalho","question_pt":"Manufacturing empresa com well-estabelecido processos e mínimo operacional mudanças é undergoing agendado auditoria. Que abordagem deveria ser mais eficaz?","options_pt":{"A":"Aplicar um agile auditoria metodoregistraria para permitir rapid adaptations para changing condições.","B":"Conduzir um integrado auditoria esse envolve externo reguladores e terceiros consultants.","C":"Utilize traditional auditoria método para fornecer estruturado e sequential revisar.","D":"Undertake desktop revisar. Estabelecido processos e mínimo operacional mudanças fazer este baixo prioridade para auditoria."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Traditional auditorias são well adequado para stable ambientes onde estruturado, periódico revisa fornecer suficiente garantia."},{"id":"M7_U1_Q16","num":16,"total":33,"module":"M7","unit":"U1","topic":"Abordagem Adequada do Trabalho","question_pt":"Qual componente do triângulo de gerenciamento de projetos representa os objetivos e as entregas definidos do projeto?","options_pt":{"A":"Custo.","B":"Tempo.","C":"Qualidade.","D":"Escopo."},"correct":"D","explanation_pt":"Alternativa \"A\" está incorreta. Custo representa o orçamento disponível para concluir o projeto, determinado por fatores como taxas de mão de obra, materiais, equipamentos e lucratividade organizacional. Alternativa \"B\" está incorreta. Tempo refere-se ao cronograma do projeto. Alternativa \"C\" está incorreta. Qualidade refere-se ao padrão das entregas. Alternativa \"D\" está correta. O escopo representa os objetivos definidos e as entregas do projeto."},{"id":"M7_U1_Q17","num":17,"total":33,"module":"M7","unit":"U1","topic":"Abordagem Adequada do Trabalho","question_pt":"Qual das seguintes é um comum problema em gerenciamento de projetos esse envolve um increase não valor de trabalho, recursos, ou tempo não projeto não originalmente planejado para?","options_pt":{"A":"Expansão de escopo","B":"Douramento","C":"Rework","D":"Paralelização de atividades"},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Expansão de escopo envolve um increase não valor de trabalho, recursos (financeiro ou recursos humanos), ou tempo não projeto (após ele tem begun) não originalmente planejado para devido a unanticipated mudanças em circunstâncias impacting o projeto ou poor planejando. Alternativa \"B\" está incorreta. Douramento envolve realizando trabalho além do escopo projeto sem aprovação, que pode também impacto projeto custos e prazos. Alternativa \"C\" está incorreta. Rework envolve rerealização tarefas que pode têm sido inappropriately planejado para (inadequado recursos ou timing alocado ao originalmente tarefas resulting em incompleto ou inaccurate resultados). Alternativa \"D\" está incorreta. Paralelização de atividades é não comum problema em gerenciamento de projetos. Em vez de, ele é one técnicas esse projeto gestores pode usar para ajudar em tratando unexpected adiars ou recurso conflitos que pode arise durante projeto/trabalho de auditoria. Ele envolve iniciando tarefa antes de seu predecessor é concluído. Este resultados não tarefas para ser realizado simultaneamente, quando possível. O risco com este abordagem é o rework successor tarefa com base no trabalho e achados predecessor tarefa."},{"id":"M7_U1_Q18","num":18,"total":33,"module":"M7","unit":"U1","topic":"Abordagem Adequada do Trabalho","question_pt":"Que abordagem do trabalho envolve conduzindo auditorias esse combine diferente auditoria disciplines em único auditoria?","options_pt":{"A":"Auditoria ágil","B":"Auditoria integrada","C":"Auditoria tradicional","D":"Auditoria remota"},"correct":"B","explanation_pt":"Alternativa \"A\" está incorreta. Originating agile metodoregistraria inicialmente utilizado em software desenvolvimento, auditoria ágil é um inovador abordagem para interno auditoria characterized por seu velocidade, flexibilidade, colaboração, e iterative progresso ao longo do trabalho de auditoria processo. Alternativa \"B\" está correta. Auditoria integrada envolve conduzindo auditorias esse combine diferente auditoria disciplines em único auditoria. Um integrado abordagem para interno auditoria é sistemático, inovador, e flexível abordagem esse aims para create valor para o organização por integrating vários aspectos de interno auditoria. Integrado auditorias incluir combining diferente auditoria disciplines, como financeiro, operacional, e ele auditorias, em único auditoria. Alternativa \"C\" está incorreta. Auditoria tradicional foca em separado auditorias de específico áreas ou disciplines. Alternativa \"D\" está incorreta. Auditoria remota foca não localização trabalho de auditoria atividades e pode ser realizado de um distance, aproveitando tecnoregistraria ferramentas."},{"id":"M7_U1_Q19","num":19,"total":33,"module":"M7","unit":"U1","topic":"Abordagem Adequada do Trabalho","question_pt":"Equipe de auditoria interna está planejando um trabalho de auditoria para revisar de uma organização processo de compras. Equipe teve limitado recursos e apertado prazo. Adicionalmente, há são anticipated mudanças não escopo e recursos durante o trabalho de auditoria. Que abordagem do trabalho deveria ser mais adequado para este cenário?","options_pt":{"A":"Auditoria remota","B":"Auditoria integrada","C":"Auditoria ágil","D":"Auditoria tradicional"},"correct":"C","explanation_pt":"Alternativa \"A\" está incorreta. Auditoria remota foca não localização trabalho de auditoria atividades e pode não tratar o necessidade para flexibilidade e adaptabilidade em este cenário. Alternativa \"B\" está incorreta. Auditoria integrada é mais adequado para larger e mais complexo organizações com interdependências mas pode não ser o melhor fit para um trabalho de auditoria com um apertado prazo e anticipated mudanças em escopo e recursos. Alternativa \"C\" está correta. Auditoria ágil deveria ser o mais adequado abordagem para este cenário devido a seu flexibilidade e capacidade para adapt para mudanças em escopo e recursos. Auditoria ágil é particularmente útil em um changing e dynamic negócio ambiente esse exige auditores internos para priorizar adaptabilidade e capacidade de resposta para garantir a relevância e eficiência função de auditoria interna em apoiando a organização. Alternativa \"D\" está incorreta. Auditoria tradicional é menos adaptable para mudanças e pode não ser adequado para um trabalho de auditoria com um apertado prazo e limitado recursos."},{"id":"M7_U1_Q20","num":20,"total":33,"module":"M7","unit":"U1","topic":"Abordagem Adequada do Trabalho","question_pt":"Qual das seguintes alternativas gerenciamento de projetos técnicas é mais eficaz em identificando potencial riscos e questões inicial em um interno trabalho de auditoria?","options_pt":{"A":"Compressão de cronograma","B":"Tracking e monitorando recursos e atividades","C":"Paralelização de atividades","D":"Usando folga não cronograma"},"correct":"B","explanation_pt":"Alternativa \"A\" está incorreta. Compressão de cronograma é técnica esse projeto gestores pode usar para ajudar tratar unexpected adiars ou recurso conflitos que pode arise durante projeto/trabalho de auditoria. Ele envolve adding recursos para shorten o caminho crítico e prevenir geral projeto adiars, que pode não necessarily identificar riscos inicial. Alternativa \"B\" está correta. Gerenciamento de projetos é crítico em gerenciando eficiência trabalho de auditoria e ajudando garantir o trabalho de auditoria objetivos são atingido. Tracking e monitorando vários recursos e atividades pode ajudar para identificar potencial riscos e questões inicial em então esse eles pode ser tratado adequadamente e não comprometendo o success trabalho de auditoria. Alternativa \"C\" está incorreta. Paralelização de atividades é também referred para como adding levar tempo. Em este método, tarefa é accelerated para begin antes de seu predecessor tarefa é concluído. Este resultados não tarefas para ser realizado simultaneamente, quando possível. O risco com este abordagem é rework successor tarefa com base no trabalho e achados predecessor tarefa. Alternativa \"D\" está incorreta. Usando folga não cronograma permite para adiars em non-crítico tarefas mas faz não diretamente ajudar em identificando riscos inicial."},{"id":"M7_U1_Q21","num":21,"total":33,"module":"M7","unit":"U1","topic":"Abordagem Adequada do Trabalho","question_pt":"Equipe de auditoria interna em um médio-sized organização está planejando um trabalho de auditoria para revisar da organização conformidade com novo regulatório requisitos. Equipe teve limitado recursos e relativamente longo cronograma. Adicionalmente, há são não anticipated mudanças não escopo e recursos durante o trabalho de auditoria. Que abordagem do trabalho deveria ser mais adequado para este cenário?","options_pt":{"A":"Auditoria ágil","B":"Auditoria remota","C":"Auditoria integrada","D":"Auditoria tradicional"},"correct":"D","explanation_pt":"Alternativa \"A\" está incorreta. Auditoria ágil é mais adequado para trabalho de auditorias com shorter cronogramas e anticipated mudanças. Alternativa \"B\" está incorreta. Auditoria remota foca não localização trabalho de auditoria atividades e pode não tratar o necessidade para um estruturado abordagem em este cenário. Alternativa \"C\" está incorreta. Auditoria integrada é mais adequado para larger e mais complexo organizações com interdependências. Alternativa \"D\" está correta. Auditoria tradicional deveria ser o mais adequado abordagem para este cenário como há é longo cronograma com não anticipated mudanças. Este é porque auditoria tradicional usa qual é referred para em gerenciamento de projetos como a \"waterfall abordagem.\" este abordagem envolve estrutura com um series de fases (planejamento do trabalho, trabalho de campo, revisar, e relatórioando) que são realizado em sequence com não overlap ou consecutive atividades. O traditional abordagem pode também ser menos adaptable para mudança, é frequentemente descrito como rigid, e geralmente takes mais longa para concluir o trabalho de auditoria processo."},{"id":"M7_U1_Q22","num":22,"total":33,"module":"M7","unit":"U1","topic":"Abordagem Adequada do Trabalho","question_pt":"Que gerenciamento de projetos técnica envolve adding recursos ao atrasado tarefas fim de shorten o caminho crítico e prevenir geral projeto adiars?","options_pt":{"A":"Paralelização de atividades","B":"Douramento","C":"Usando folga não cronograma","D":"Compressão de cronograma"},"correct":"D","explanation_pt":"Alternativa \"A\" está incorreta. Paralelização de atividades é técnica esse projeto gestores pode usar para ajudar tratar unexpected adiars ou recurso conflitos que pode arise durante projeto/trabalho de auditoria e envolve iniciando tarefa antes de seu predecessor é concluído. Este resultados não tarefas sendo realizado simultaneamente, quando possível. O risco com este abordagem é o rework successor tarefa com base no trabalho e achados predecessor tarefa. Alternativa \"B\" está incorreta. Douramento é não gerenciamento de projetos técnica mas comum problema auditores internos pode encontrar. Ele envolve realizando trabalho além do escopo projeto sem aprovação. Alternativa \"C\" está incorreta. Usando folga não cronograma é técnica esse projeto gestores pode usar para ajudar tratar unexpected adiars ou recurso conflitos que pode arise durante projeto/trabalho de auditoria e permite para o capacidade para adiar o começar tempo de non-crítico tarefas. Alternativa \"D\" está correta. Compressão de cronograma é técnica esse projeto gestores pode usar para ajudar tratar unexpected adiars ou recurso conflitos que pode arise durante projeto/trabalho de auditoria. Compressão de cronograma é referred para como adding recursos ao atrasado tarefas fim de shorten o caminho crítico e prevenir geral projeto adiars."},{"id":"M7_U1_Q23","num":23,"total":33,"module":"M7","unit":"U1","topic":"Abordagem Adequada do Trabalho","question_pt":"Qual fase do ciclo de vida do projeto envolve a definição de metas, objetivos, natureza e escopo do projeto?","options_pt":{"A":"Iniciação.","B":"Planejamento e design.","C":"Execução e produção.","D":"Monitoramento e controle."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Um projeto normalmente avança por diferentes fases ao longo do seu ciclo de vida: iniciação, planejamento e design, execução e produção, monitoramento e controle, e encerramento e avaliação. A fase de iniciação envolve a definição das metas, objetivos, natureza e escopo do projeto."},{"id":"M7_U1_Q24","num":24,"total":33,"module":"M7","unit":"U1","topic":"Abordagem Adequada do Trabalho","question_pt":"Qual das seguintes é um gerenciamento de projetos técnica esse envolve iniciando tarefa antes de seu predecessor é concluído?","options_pt":{"A":"Usando folga não cronograma","B":"Compressão de cronograma","C":"Paralelização de atividades","D":"Douramento"},"correct":"C","explanation_pt":"Alternativa \"A\" está incorreta. Usando folga não cronograma é gerenciamento de projetos técnica esse permite para o capacidade para adiar o começar tempo de non-crítico tarefas. Alternativa \"B\" está incorreta. Compressão de cronograma é gerenciamento de projetos técnica esse envolve adding recursos para shorten o caminho crítico. Alternativa \"C\" está correta. Paralelização de atividades é gerenciamento de projetos técnica esse envolve iniciando tarefa antes de seu predecessor é concluído. Este resultados não tarefas sendo realizado simultaneamente, quando possível. Alternativa \"D\" está incorreta. Douramento é não gerenciamento de projetos técnica mas comum problema auditores internos pode encontrar durante o trabalho de auditoria. Ele envolve realizando trabalho além do escopo projeto sem aprovação."},{"id":"M7_U1_Q25","num":25,"total":33,"module":"M7","unit":"U1","topic":"Abordagem Adequada do Trabalho","question_pt":"Que gerenciamento de projetos técnica envolve usando visual ferramenta esse displays tarefas como horizontal bars para demonstrar seus começar e end dates, durations, e sequence de atividades?","options_pt":{"A":"Gráfico de Gantt","B":"Compressão de cronograma","C":"Rede análise","D":"Paralelização de atividades"},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Gráfico de Gantt é visual ferramenta esse ajuda projeto gestores cronograma e acompanhar projeto atividades. Ele displays tarefas como horizontal bars, showing seus começar e end dates, durations, e sequence de atividades. Alternativa \"B\" está incorreta. Compressão de cronograma é técnica esse projeto gestores pode usar para ajudar tratar unexpected adiars ou recurso conflitos que pode arise durante projeto/trabalho de auditoria e envolve adding recursos ao atrasado tarefas fim de shorten o caminho crítico e prevenir geral projeto adiars. Alternativa \"C\" está incorreta. Rede análise, frequentemente usando técnicas como programa avaliação revisar técnica (PERT) e o caminho crítico método (CPM), que são frequentemente referred para como PERT/CPM, envolve avaliando projeto tarefas e seus dependencies para constatar o mais eficiente path para reach o projeto metas. Alternativa \"D\" está incorreta. Paralelização de atividades é técnica esse projeto gestores pode usar para ajudar tratar unexpected adiars ou recurso conflitos que pode arise durante projeto/trabalho de auditoria e envolve iniciando tarefa antes de seu predecessor é concluído. Este resultados não tarefas sendo realizado simultaneamente, quando possível. O risco com este abordagem é o rework successor tarefa com base no trabalho e achados predecessor tarefa."},{"id":"M7_U1_Q26","num":26,"total":33,"module":"M7","unit":"U1","topic":"Abordagem Adequada do Trabalho","question_pt":"Um supervisor do trabalho está usando gráfico de Gantt para planejar um trabalho de auditoria. Qual é indicado pelo duração de um tarefa bar não gráfico?","options_pt":{"A":"O duration tarefa.","B":"O earliest começar date para cada tarefa.","C":"Se o tarefa é parallel ou sequential tarefa.","D":"O nível de risco associated com cada tarefa."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. O duração tarefa bar indica o duration tarefa, essencial para projeto planejando."},{"id":"M7_U1_Q27","num":27,"total":33,"module":"M7","unit":"U1","topic":"Abordagem Adequada do Trabalho","question_pt":"Qual das seguintes alternativas melhor descreve o benefit de adopting auditoria ágil?","options_pt":{"A":"Reduzido necessidade para parte interessada involvement","B":"Aumentado eficiência e velocidade no trabalho de auditoria processo","C":"Rigid adherence ao originalmente plano","D":"Mais longa trabalho de auditoria cronogramas"},"correct":"B","explanation_pt":"Alternativa \"A\" está incorreta. Auditoria ágil promotes greater parte interessada involvement e colaboração; ele faz não reduzir o necessidade para parte interessada involvement. Por engaging partes interessadas ao longo do trabalho de auditoria processo, auditoria ágil promotes greater transparência e leads para mais preciso e abrangente avaliações de riscos e controles. Alternativa \"B\" está correta. One principal benefícios de auditoria ágil é aumentado eficiência e velocidade no trabalho de auditoria processo. Auditoria ágil facilitates streamlining avaliação de riscos processos, resulting em quicker decisão tomada e o tempestivo resolução de questões. Ele também permite para faster relatórioando turnaround tempo. Alternativa \"C\" está incorreta. Auditoria ágil é characterized por flexibilidade e adaptabilidade, não rigid adherence ao originalmente plano. Alternativa \"D\" está incorreta. Auditoria ágil deveria ser adequado abordagem para trabalho de auditorias com shorter cronogramas."},{"id":"M7_U1_Q28","num":28,"total":33,"module":"M7","unit":"U1","topic":"Abordagem Adequada do Trabalho","question_pt":"Que abordagem do trabalho é particularmente útil em um changing e dynamic negócio ambiente esse exige auditores internos para priorizar adaptabilidade e capacidade de resposta?","options_pt":{"A":"Auditoria tradicional","B":"Auditoria integrada","C":"Auditoria remota","D":"Auditoria ágil"},"correct":"D","explanation_pt":"Alternativa \"A\" está incorreta. Auditoria tradicional é menos adaptable para mudanças. Este abordagem envolve estrutura com um series de fases (planejamento do trabalho, trabalho de campo, revisar, e relatórioando) que são realizado em sequence com não overlap ou consecutive atividades. Abordagem é frequentemente descrito como rigid, e ele geralmente takes mais longa para concluir o trabalho de auditoria processo. Alternativa \"B\" está incorreta. Um integrado abordagem para interno auditoria é sistemático, inovador, e flexível abordagem esse aims para create valor para o organização por integrating vários aspectos de interno auditoria. Ele pode envolver conduzindo integrado auditorias, que incluir combining diferente auditoria disciplines, como financeiro, operacional, e ele auditorias, em único auditoria. Ele é mais adequado para larger e mais complexo organizações com interdependence. Alternativa \"C\" está incorreta. Auditoria remota foca não localização trabalho de auditoria atividades e pode ser realizado de um distance, aproveitando tecnoregistraria ferramentas. Alternativa \"D\" está correta. Auditoria ágil é particularmente útil em um changing e dynamic negócio ambiente esse exige auditores internos para priorizar adaptabilidade e capacidade de resposta para garantir a relevância e eficiência função de auditoria interna em apoiando a organização."},{"id":"M7_U1_Q29","num":29,"total":33,"module":"M7","unit":"U1","topic":"Abordagem Adequada do Trabalho","question_pt":"Auditor líder é concerned sobre expansão de escopo em um trabalho de auditoria. Que gerenciamento de projetos prática deveria melhor ajudar prevenir este questão?","options_pt":{"A":"Adding solicitaçõesções das partes interessadas ao longo do trabalho de auditoria sem formal revisar.","B":"Claramente definindo e Documentando escopo do trabalho de auditoria, objetivos, e entregáveis.","C":"Expandindo auditoria escopo sempre que novo questões são identificado, independentemente de relevância.","D":"Tratando escopo preocupações quando significativo orçamento ou tempo overruns ocorre."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Claramente definindo e Documentando escopo do trabalho de auditoria ajuda prevenir expansão de escopo e garante focar em o originalmente objetivos."},{"id":"M7_U1_Q30","num":30,"total":33,"module":"M7","unit":"U1","topic":"Abordagem Adequada do Trabalho","question_pt":"Qual das seguintes é um principal consideração quando determinando mais adequado abordagem do trabalho para um interno trabalho de auditoria?","options_pt":{"A":"O histórico desempenho função de auditoria interna","B":"Os recursos disponível","C":"O personal preferences equipe de auditoria interna","D":"A disponibilidade de externo consultants"},"correct":"B","explanation_pt":"Alternativa \"A\" está incorreta. O histórico desempenho função de auditoria interna é não altamente relevantee em determinando mais adequado abordagem do trabalho para um interno trabalho de auditoria. Alternativa \"B\" está correta. Os recursos disponível (financeiro, human, e technoregistrarical) para realizar o trabalho de auditoria trabalho são principal consideração quando determinando mais adequado abordagem do trabalho. Função de auditoria interna deve considerar qual é o mais adequado abordagem para um trabalho de auditoria com base em vários fatores, incluindo recursos disponível (financeiro, human, e technoregistrarical) para realizar o trabalho de auditoria trabalho, cronograma trabalho de auditoria (longo prazo versus curto prazo), anticipated nível de mudanças ao escopo, timing, ou recursos para o trabalho de auditoria, nível de dependencies tarefas para ser realizado, interdependências entre processo e se processos span múltiplos departamentos, e a localização de pessoal trabalhando na área sob revisão (em-local versus remoto). Alternativa \"C\" está incorreta. O personal preferences equipe de auditoria interna deve não affect o determinization mais adequado abordagem do trabalho. Alternativa \"D\" está incorreta. Enquanto a disponibilidade de externo consultants pode ser útil para certain trabalho de auditorias, ele é não principal consideração quando determinando mais adequado abordagem do trabalho para um interno trabalho de auditoria."},{"id":"M7_U1_Q31","num":31,"total":33,"module":"M7","unit":"U1","topic":"Abordagem Adequada do Trabalho","question_pt":"Qual das seguintes alternativas melhor descreve um benefit de auditoria integrada?","options_pt":{"A":"Reduzido necessidade para parte interessada involvement","B":"Rigid adherence ao originalmente plano","C":"Holistic avaliação de riscos","D":"Mais longa trabalho de auditoria cronogramas"},"correct":"C","explanation_pt":"Alternativa \"A\" está incorreta. Auditoria integrada incentivando parte interessada involvement e colaboração. Além disso, uma auditoria integrada abordagem minimizes disruptions ao negócio por consolidating auditoria esforços e streamlining interactions com partes interessadas. Alternativa \"B\" está incorreta. Auditoria integrada é characterized por flexibilidade e adaptabilidade, não rigid adherence ao originalmente plano. Alternativa \"C\" está correta. Integrado abordagens para interno auditoria facilitate mais agile desenvolvimento de objetivos, escopo, recurso opções, conhecimento transfer, auditoria técnicas, questão perspectives, e soluções, leading para mais holistic e insightful interno auditoria serviços. Portanto, one benefícios de auditoria integrada é holistic avaliação de riscos, que promotes mais abrangente compreensão de riscos para garantir alinhamento com negócio objetivos. Alternativa \"D\" está incorreta. Auditoria integrada faz não necessarily envolver mais longa trabalho de auditoria cronogramas. Em vez, ele frequentemente resultados em aumentado eficiência e operacional melhorias por streamlining processos e aproveitando recursos em toda diferente áreas, resulting em greater eficiência e operacional eficácia."},{"id":"M7_U1_Q32","num":32,"total":33,"module":"M7","unit":"U1","topic":"Abordagem Adequada do Trabalho","question_pt":"Qual das seguintes é um comum problema em gerenciamento de projetos esse envolve rerealização tarefas que pode têm sido inappropriately planejado para?","options_pt":{"A":"Expansão de escopo","B":"Rework","C":"Paralelização de atividades","D":"Douramento"},"correct":"B","explanation_pt":"Alternativa \"A\" está incorreta. Expansão de escopo envolve um increase não valor de trabalho, recursos, ou tempo não projeto não originalmente planejado para devido a poor planejando ou unanticipated mudanças em circunstâncias impacting o projeto. Alternativa \"B\" está correta. Rework envolve rerealização tarefas que pode têm sido inappropriately planejado para (inadequado recursos ou timing alocado ao originalmente tarefas resulting em incompleto ou inaccurate resultados). Alternativa \"C\" está incorreta. Paralelização de atividades é não comum problema em gerenciamento de projetos. Em vez de, ele é one técnicas esse projeto gestores pode usar para ajudar tratar unexpected adiars ou recurso conflitos que pode arise durante projeto/trabalho de auditoria. Ele envolve iniciando tarefa antes de seu predecessor é concluído. Este resultados não tarefas sendo realizado simultaneamente, quando possível. Alternativa \"D\" está incorreta. Douramento envolve realizando trabalho além do escopo projeto sem aprovação, que pode também impacto projeto custos e prazos."},{"id":"M7_U1_Q33","num":33,"total":33,"module":"M7","unit":"U1","topic":"Abordagem Adequada do Trabalho","question_pt":"Uma organização está migrando um hybrid trabalho ambiente, com funcionários trabalhando ambos remotamente e em-local. Que auditoria abordagem deveria melhor garantir eficaz oversight?","options_pt":{"A":"Leverage auditoria remota para avaliar processos eficientemente em toda diferente trabalho settings.","B":"Exigir todos auditorias para ser conduzido em-pessoa para manter traditionalfalha de revisãométodos.","C":"Cronograma auditorias apenas para em-local funcionários para simplify registrarística.","D":"Avoid auditoria remoto processos até que stable trabalho política é fully implementado."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Auditoria remota permite para flexível avaliações sem requerendo todos funcionários para ser physically apresentar."},{"id":"M8_U1_Q1","num":1,"total":16,"module":"M8","unit":"U1","topic":"Realização de uma Avaliação Detalhada de Riscos","question_pt":"Qual das seguintes é uma implicação de controle tipicamente associada a organizações menores em comparação com organizações maiores?","options_pt":{"A":"Há caracteristicamente menos linhas de negócios e menos produtos dentro das linhas.","B":"A amplitude maior de funções dificulta a segregação adequada de tarefas.","C":"Há maior capacidade de recrutar e reter pessoal com a especialização necessária.","D":"A administração foca mais em controles internos do que na gestão do negócio."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. A maior amplitude de funções nas organizações menores frequentemente dificulta a segregação de tarefas, aumentando os riscos de controle."},{"id":"M8_U1_Q2","num":2,"total":16,"module":"M8","unit":"U1","topic":"Realização de uma Avaliação Detalhada de Riscos","question_pt":"Um controle tem maior probabilidade de ser testado em apenas um local em uma empresa com qual tipo de estrutura organizacional?","options_pt":{"A":"Centralizada.","B":"Descentralizada.","C":"Matricial.","D":"Híbrida."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Em uma estrutura organizacional centralizada, os processos de tomada de decisão e controle estão concentrados em um único local ou autoridade. Essa uniformidade permite que os controles sejam consistentes em toda a organização, sendo suficiente testá-los em um único local para obter conclusões válidas."},{"id":"M8_U1_Q3","num":3,"total":16,"module":"M8","unit":"U1","topic":"Realização de uma Avaliação Detalhada de Riscos","question_pt":"Uma organização que atua em um mercado altamente competitivo e em constante mudança provavelmente utilizaria qual das seguintes estruturas organizacionais?","options_pt":{"A":"Centralizada.","B":"Hierarquia equilibrada.","C":"Totalmente virtual.","D":"Descentralizada."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Uma estrutura descentralizada permite uma tomada de decisão mais rápida e maior adaptabilidade em ambientes dinâmicos."},{"id":"M8_U1_Q4","num":4,"total":16,"module":"M8","unit":"U1","topic":"Realização de uma Avaliação Detalhada de Riscos","question_pt":"Um provedor de saúde está implementando diagnósticos baseados em inteligência artificial. Qual risco emergente deve ser priorizado na avaliação de riscos?","options_pt":{"A":"Potenciais vieses nos algoritmos de IA que levam a diagnósticos imprecisos.","B":"Custos crescentes de implementação de IA que reduzem a lucratividade.","C":"Redução da demanda por profissionais médicos tradicionais.","D":"Diminuição das visitas de pacientes devido a soluções de saúde automatizadas."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Os sistemas de IA podem introduzir vieses que afetam a precisão diagnóstica, representando um risco significativo na tomada de decisões em saúde."},{"id":"M8_U1_Q5","num":5,"total":16,"module":"M8","unit":"U1","topic":"Realização de uma Avaliação Detalhada de Riscos","question_pt":"Um auditor interno está conduzindo preliminar avaliação de riscos para planejar um trabalho de avaliação. devido a tempo e recurso constraints, o auditor estima esse não todos riscos pode ser revisado durante o planejado trabalho de auditoria. fornecidos este situação, como deve o auditor prosseguir para garantir conformance com a Normas?","options_pt":{"A":"O auditor deve reschedule o trabalho de auditoria para o próximo ano, quando mais recursos irá ser disponível.","B":"O auditor deve mudança o focar trabalho de auditoria para advisory em natureza, que permite para greater flexibilidade em definição de escopo e resourcing o trabalho de auditoria.","C":"O auditor deve buscar assistance de um segundo-linha função então todos riscos pode ser avaliado sem atrasando trabalho de auditoria.","D":"O auditor deve priorizar riscos de acordo com seus importância e prosseguir com o planejado trabalho de avaliação."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Priorizando riscos garante esse o mais significativo ones são tratado durante o planejado trabalho de auditoria, alinhando-se com tempo e recurso constraints enquanto mantendo conformance com a Normas."},{"id":"M8_U1_Q6","num":6,"total":16,"module":"M8","unit":"U1","topic":"Realização de uma Avaliação Detalhada de Riscos","question_pt":"Quais são os dois principais fatores considerados durante uma avaliação de riscos?","options_pt":{"A":"Probabilidade de ocorrência de fraude e risco financeiro potencial.","B":"Impacto de um evento de risco e sua probabilidade de ocorrência.","C":"Perdas financeiras potenciais e complexidade do processo.","D":"Perdas financeiras potenciais e mudanças recentes nos processos."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. A avaliação de riscos concentra-se principalmente no impacto de um evento de risco e na probabilidade de sua ocorrência — fatores essenciais para compreender e tratar eficazmente as ameaças potenciais."},{"id":"M8_U1_Q7","num":7,"total":16,"module":"M8","unit":"U1","topic":"Realização de uma Avaliação Detalhada de Riscos","question_pt":"Como deve um auditor interno abordagem preparando detalhado avaliação de riscos durante planejamento do trabalho?","options_pt":{"A":"Trabalho com administração atividade sob revisão, como administração deveria ser mais familiar com o negócio objetivos e relacionado riscos.","B":"Consultar com a conformidade departamento, que tipicamente tem mais abrangente visão organização.","C":"Trabalho com auditores externos para garantir esse o risco avaliação inclui itens reflected não independente fazer auditor relatório.","D":"Completo risco avaliação independentemente para prevenir conflitos de interesse com a atividade sob revisão."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Trabalhando com administração durante planejamento do trabalho garante o risco avaliação incorpora conhecimento negócio objetivos e riscos, leading um mais preciso e abrangente risco avaliação."},{"id":"M8_U1_Q8","num":8,"total":16,"module":"M8","unit":"U1","topic":"Realização de uma Avaliação Detalhada de Riscos","question_pt":"Qual das seguintes alternativas opções é o melhor prática para concluindo um risco e controle matrix?","options_pt":{"A":"Auditores internos delegate conclusão matrix para administração atividade sob revisão.","B":"Auditores internos coordenar com administração atividade sob revisão para concluir o matrix together.","C":"Auditores internos completo matrix com base em observações atividade sob revisão.","D":"Auditores internos coordenar com auditores externos para concluir o matrix."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Colaboração entre auditores internos e administração garante o risco e controle matrix reflects preciso, prático, e completo informação sobre o processos sob revisão, melhorando seu eficácia e confiabilidade."},{"id":"M8_U1_Q9","num":9,"total":16,"module":"M8","unit":"U1","topic":"Realização de uma Avaliação Detalhada de Riscos","question_pt":"Quais são as duas principais variáveis de avaliação de riscos tipicamente representadas em uma matriz de riscos e controles?","options_pt":{"A":"Impacto e probabilidade do evento de risco.","B":"Impacto financeiro do evento de risco e probabilidade de fraude.","C":"Intensidade e velocidade do evento de risco.","D":"Impacto do evento de risco e duração do impacto."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Impacto e probabilidade são variáveis fundamentais na avaliação de riscos, pois capturam a gravidade e a chance de ocorrência de um evento de risco — aspectos cruciais para priorizar e gerenciar riscos com eficácia."},{"id":"M8_U1_Q10","num":10,"total":16,"module":"M8","unit":"U1","topic":"Realização de uma Avaliação Detalhada de Riscos","question_pt":"Qual é uma vantagem de uma estrutura organizacional descentralizada?","options_pt":{"A":"Uso eficiente de recursos.","B":"Economias de escala.","C":"Tomada de decisão e respostas mais rápidas.","D":"Maior participação dos funcionários."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. As estruturas organizacionais descentralizadas distribuem a autoridade de tomada de decisão mais próxima do ponto de ação, permitindo respostas mais rápidas às necessidades locais ou operacionais. Essa estrutura reduz os gargalos causados pela dependência de uma autoridade central."},{"id":"M8_U1_Q11","num":11,"total":16,"module":"M8","unit":"U1","topic":"Realização de uma Avaliação Detalhada de Riscos","question_pt":"Durante auditoria de conformidade de um farmacêutico empresa, qual regulatório risco deve ser prioritized não avaliação de riscos?","options_pt":{"A":"Aumentado competition de emerging startups farmacêuticas.","B":"Alto funcionário turnover affecting pesquisa e desenvolvimento eficiência.","C":"Ineficiente marketing estratégias leading para decreased produto visibilidade.","D":"Falha para cumprir com setor-específico drug safety e aprovação regulamentações."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Não conformidade com drug safety e aprovação regulamentações pode resultado em severe legal penalidades e reputational damage."},{"id":"M8_U1_Q12","num":12,"total":16,"module":"M8","unit":"U1","topic":"Realização de uma Avaliação Detalhada de Riscos","question_pt":"Qual é uma vantagem essencial de uma configuração centralizada para uma organização?","options_pt":{"A":"Tende a empoderar os funcionários.","B":"Estimula a motivação e o aprendizado.","C":"É altamente adaptável.","D":"Apoia a consistência na gestão."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Uma configuração centralizada possui vários níveis de autoridade, uma longa cadeia de comando e uma amplitude de controle restrita. Todas essas características apoiam a consistência na gestão e podem desestimular a inovação e o envolvimento dos funcionários."},{"id":"M8_U1_Q13","num":13,"total":16,"module":"M8","unit":"U1","topic":"Realização de uma Avaliação Detalhada de Riscos","question_pt":"Menos níveis de autoridade, uma cadeia de comando mais curta e uma amplitude de controle mais ampla são características de qual tipo de estrutura organizacional?","options_pt":{"A":"Hierárquica.","B":"Descentralizada.","C":"Centralizada.","D":"Híbrida."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Uma estrutura descentralizada apresenta hierarquia mínima e confere autonomia aos funcionários em diversos níveis."},{"id":"M8_U1_Q14","num":14,"total":16,"module":"M8","unit":"U1","topic":"Realização de uma Avaliação Detalhada de Riscos","question_pt":"Uma auditoria gestor decides para let trabalho grupo fazer uma decisão sobre se para adotar novo trabalho procedimento. Em permitindo grupo para fazer decisão, Qual das seguintes alternativas deve o gestor considerar?","options_pt":{"A":"Grupos fazer decisões que são menos preciso fazer que esses feita por indivíduos.","B":"Grupos fazer faster decisões fazer que fazer indivíduos, porque grupos têm mais especialização fazer que faz qualquer one pessoa.","C":"Grupos são em risco de groupthink.","D":"Grupos tend para fazer very conservative decisões e fazer não quer para assume risco."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Grupos são em risco de groupthink, que pode hinder decisão- tomada por suppressing dissent e favoring consensus."},{"id":"M8_U1_Q15","num":15,"total":16,"module":"M8","unit":"U1","topic":"Realização de uma Avaliação Detalhada de Riscos","question_pt":"Que fase de um trabalho de auditoria é tipicamente o mais eficaz tempo para um auditor interno para desenvolver um risco e controle matriz?","options_pt":{"A":"Em planejando, para assist em desenvolvendo o trabalho de auditoria trabalho programa.","B":"Em amostra seleção, para determinar amostragem metodologia.","C":"Não(a) começar de trabalho de campo, como parte de desenvolvendo o anual plano de auditoria.","D":"Quando preparando para recap auditoria testar resultados."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Desenvolvendo um risco e controle matriz durante fase de planejamento garante ele alinha com o objetivos do trabalho e informa o desenvolvimento  trabalho de auditoria programa, maximizing seu eficácia."},{"id":"M8_U1_Q16","num":16,"total":16,"module":"M8","unit":"U1","topic":"Realização de uma Avaliação Detalhada de Riscos","question_pt":"Um auditor interno está realizando um risco avaliação para uma empresa’s folha de pagamento função. Que risco é mais relevante para o operacional eficácia de folha de pagamento processamento?","options_pt":{"A":"Market fluctuations affecting funcionário compensation rates.","B":"Segurança cibernética ameaças de não autorizado acesso para funcionário e-mail contas.","C":"Erros em folha de pagamento calculations levando para incorreta funcionário compensation.","D":"Alto funcionários giro."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Folha de pagamento processamento deve garantir precisão, como miscalculations pode lead para funcionário dissatisfaction e conformidade questões."},{"id":"M9_U1_Q1","num":1,"total":14,"module":"M9","unit":"U1","topic":"Procedimentos do Trabalho","question_pt":"Que é o melhor procedimento para o auditor interno para realizar para testar para ativo administração controles?","options_pt":{"A":"Verificar se contratos incluir serviço nível acordos.","B":"Verificar se administração analisa o causa-raizs de desempenho questões.","C":"Determinar se suficiente software estoque sistema é em place.","D":"Verificar se o necessário documentação para o aplicativo(s) sob revisão é mantido adequadamente."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Suficiente estoque sistema garante esse ativos são adequadamente tracked e gerenciado."},{"id":"M9_U1_Q2","num":2,"total":14,"module":"M9","unit":"U1","topic":"Procedimentos do Trabalho","question_pt":"Que melhor descreve um trabalho de auditoria para que O auditor interno deveria incluir o definição de escopo método não trabalho de auditoria trabalho programa?","options_pt":{"A":"Um trabalho de auditoria envolvendo aplicações esse apoiar processos whose operacional controles são provável que ser covered elsewhere.","B":"Um trabalho de auditoria focando não aplicações’ funcionalidades e capacidade para atender negócio necessidade.","C":"Um trabalho de auditoria avaliando se negócio rules são documentado e adequadamente implementado.","D":"Um trabalho de auditoria comprising um end-para-end view  aplicativo ecosystem."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Processo de negócio definição de escopo método foca não funcionalidade e capacidade de aplicações para atender negócio necessidade."},{"id":"M9_U1_Q3","num":3,"total":14,"module":"M9","unit":"U1","topic":"Procedimentos do Trabalho","question_pt":"Durante uma revisão de dados privacidade, um auditor interno é incumbido de testando identificação do administração e prioritization de crítico dados coletado por a organização. Qual das seguintes alternativas etapas deveria alcançar este objetivo?","options_pt":{"A":"Documentar e testar dados estoque e classificação programa por determinando os dados classificação níveis e estrutura.","B":"Entrevista administração para determinar qual tipos de dados são coletado e mantido.","C":"Revisar uma amostra de dados para determinar se o risco classificação é razoável.","D":"Rastrear dados de armazenamento ao cobrança fontes para determinar como crítico dados é coletado e organized."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Documentando e testando dados estoque e classificação programa avalia se administração tem adequadamente identificado e priorizou crítico dados. Este abordagem garante a organização’s dados classificação estrutura é functioning eficazmente."},{"id":"M9_U1_Q4","num":4,"total":14,"module":"M9","unit":"U1","topic":"Procedimentos do Trabalho","question_pt":"Qual das seguintes afirmações é verdadeira em relação a trabalho de auditoria trabalho programas?","options_pt":{"A":"O trabalho de auditoria trabalho programa deve ser aprovado por interno auditoria administração e administração  atividade sob revisão, antes de commencement  trabalho de auditoria.","B":"O trabalho de auditoria trabalho programa deve ser aprovado por administração  atividade sob revisão antes de commencement  trabalho de auditoria.","C":"Qualquer ajustes ao trabalho de auditoria trabalho programa deve ser aprovado pelo conselho antes de implementação.","D":"O trabalho de auditoria trabalho programa deve ser aprovado por interno auditoria administração antes de o commencement de trabalho de campo."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. De acordo com a Normas Globais de Auditoria Interna, o Diretor de Auditoria Interna deve revisar e aprovar o trabalho de auditoria trabalho programa antes de ele é implementado e prontamente quando qualquer subsequente mudanças são feita. Supervisão do trabalho também envolve aprovando mudanças ao trabalho programa quando tal responsabilidade é delegado pelo Diretor de Auditoria Interna."},{"id":"M9_U1_Q5","num":5,"total":14,"module":"M9","unit":"U1","topic":"Procedimentos do Trabalho","question_pt":"Antes de uma auditoria trabalho de auditoria em um subsidiária, um auditor interno learns esse o dispositivos que foram incluído não trabalho de auditoria programa para testando foram liquidated, e tal dispositivos são não mais longa utilizado em esse localização. Qual das seguintes alternativas ações é o mais adequado para o auditor interno para tomar?","options_pt":{"A":"Make o necessário mudanças ao trabalho de auditoria programa e apresentar ele ao supervisores do trabalho para aprovação pelo supervisores do trabalho ou Diretor de Auditoria Interna (CAE).","B":"Transfer os testes atividade  trabalho de auditoria programa  subsidiária para esse de outro subsidiária.","C":"Completo auditoria trabalho programa como planejado, apenas sem esse particular testando fase.","D":"Modify auditoria trabalho programa e completo os testes de outro dispositivos esse ainda são utilizado não subsidiária."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. De acordo com o global interno auditoria diretrizes, o Diretor de Auditoria Interna ou um supervisores do trabalho deve fornecer auditores internos com orientação ao longo de o trabalho de auditoria e verificar trabalho programas são completo, e o Diretor de Auditoria Interna deve revisar e aprovar o trabalho de auditoria trabalho programa antes de ele é implementado e prontamente quando qualquer subsequente mudanças são feita. Supervisão do trabalho também envolve aprovando mudanças ao trabalho programa quando tal responsabilidade é delegado pelo CAE."},{"id":"M9_U1_Q6","num":6,"total":14,"module":"M9","unit":"U1","topic":"Procedimentos do Trabalho","question_pt":"Não(a) beginning de trabalho de campo em uma auditoria de investments, um auditor interno observou esse o juros taxa tinha declined significativamente desde o trabalho de auditoria trabalho programa foi created. Qual deve o auditor fazer?","options_pt":{"A":"Consultar com administração para verificar o juros taxa mudança e prosseguir com o trabalho de auditoria.","B":"Determinar o efeito  juros taxa mudança e se o programa deve ser modified.","C":"Modify auditoria programa e prosseguir com o trabalho de auditoria.","D":"Prosseguir com o existente programa desde este foi o originalmente escopo de trabalho que foi aprovado."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. O auditor deve avaliar como o significativo mudança em juros rates affects os riscos e objetivos  auditoria. Este avaliação garante o trabalho programa permanece relevante e alinhado com o atual ambiente. Proceeding sem ajustes ou blindly modifying o programa sem análise pode resultado em uma auditoria esse perder crítico questões ou ineficiências."},{"id":"M9_U1_Q7","num":7,"total":14,"module":"M9","unit":"U1","topic":"Procedimentos do Trabalho","question_pt":"Um auditor interno está preparando um trabalho de auditoria trabalho pr
