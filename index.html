<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIA Parte 2 – Simulado Interativo</title>
<style>
:root{--p:#1a3a5c;--pl:#2563a8;--ac:#e67e22;--al:#f39c12;--ok:#27ae60;--er:#e74c3c;--bg:#f0f4f8;--cd:#fff;--tx:#1a202c;--mu:#718096;--bd:#e2e8f0;--sh:0 2px 12px rgba(0,0,0,.10)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
nav{background:var(--p);color:#fff;padding:0 20px;height:58px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.2);position:sticky;top:0;z-index:100}
nav h1{font-size:1rem;font-weight:700;letter-spacing:.2px}nav h1 span{color:var(--al)}
.nr{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.lb{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:4px 13px;border-radius:20px;cursor:pointer;font-size:.82rem;font-weight:700;transition:background .2s}
.lb:hover,.lb.on{background:var(--ac);border-color:var(--ac)}
.nt{background:none;border:none;color:rgba(255,255,255,.7);padding:7px 14px;cursor:pointer;font-size:.87rem;border-bottom:3px solid transparent;transition:all .2s}
.nt.on,.nt:hover{color:#fff;border-bottom-color:var(--al)}
.wrap{max-width:1080px;margin:0 auto;padding:22px 14px}
.view{display:none}.view.on{display:block}
.fbar{background:var(--cd);border-radius:12px;padding:14px 18px;margin-bottom:18px;box-shadow:var(--sh);display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.fbar label{font-size:.82rem;font-weight:600;color:var(--mu)}
.fbar select{border:1px solid var(--bd);border-radius:8px;padding:6px 10px;font-size:.88rem;background:var(--bg);color:var(--tx);cursor:pointer;max-width:260px}
.btn{border:none;border-radius:8px;padding:8px 18px;font-size:.88rem;font-weight:600;cursor:pointer;transition:all .18s;display:inline-flex;align-items:center;gap:5px}
.bp{background:var(--pl);color:#fff}.bp:hover{background:var(--p)}
.ba{background:var(--ac);color:#fff}.ba:hover{background:#d35400}
.bo{background:none;border:2px solid var(--bd);color:var(--tx)}.bo:hover{border-color:var(--pl);color:var(--pl)}
.bs{padding:5px 12px;font-size:.8rem}
.qcard{background:var(--cd);border-radius:14px;padding:26px;box-shadow:var(--sh);margin-bottom:18px}
.qmeta{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.bm{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.76rem;font-weight:600}
.bm-m{background:var(--p);color:#fff}
.bm-t{background:#eef2ff;color:var(--pl);border:1px solid #c7d2fe}
.bm-n{background:var(--bg);color:var(--mu);border:1px solid var(--bd)}
.qprog{display:flex;gap:10px;align-items:center;margin-bottom:16px}
.pwrap{flex:1;background:var(--bg);border-radius:10px;height:7px}
.pbar{height:7px;border-radius:10px;background:linear-gradient(90deg,var(--pl),var(--al));transition:width .4s}
.plbl{font-size:.8rem;color:var(--mu);white-space:nowrap}
.qtxt{font-size:1.02rem;line-height:1.75;color:var(--tx);margin-bottom:22px;font-weight:500}
.opts{display:flex;flex-direction:column;gap:9px}
.opt{border:2px solid var(--bd);border-radius:10px;padding:12px 15px;cursor:pointer;transition:all .18s;display:flex;align-items:flex-start;gap:11px;font-size:.95rem;line-height:1.55}
.opt:hover:not(.dis){border-color:var(--pl);background:#f0f7ff}
.opt.sel{border-color:var(--pl);background:#e8f0fe}
.opt.ok{border-color:var(--ok);background:#f0fdf4}
.opt.er{border-color:var(--er);background:#fff5f5}
.opt.dis{cursor:default}
.ol{width:28px;height:28px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.86rem;color:var(--mu);flex-shrink:0;border:2px solid var(--bd);transition:all .18s;margin-top:1px}
.opt.sel .ol{background:var(--pl);color:#fff;border-color:var(--pl)}
.opt.ok .ol{background:var(--ok);color:#fff;border-color:var(--ok)}
.opt.er .ol{background:var(--er);color:#fff;border-color:var(--er)}
.exp{margin-top:18px;padding:15px 19px;border-radius:10px;border-left:4px solid;display:none}
.exp.show{display:block}
.exp.ok{background:#f0fdf4;border-color:var(--ok)}
.exp.er{background:#fff5f5;border-color:var(--er)}
.expt{font-weight:700;font-size:.9rem;margin-bottom:6px}
.exp.ok .expt{color:var(--ok)}.exp.er .expt{color:var(--er)}
.exptx{font-size:.93rem;line-height:1.65;color:#374151}
.qact{display:flex;gap:9px;margin-top:18px;flex-wrap:wrap;align-items:center}
.sp{flex:1}
.dgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:22px}
.sc{background:var(--cd);border-radius:12px;padding:18px;box-shadow:var(--sh);text-align:center}
.sn{font-size:1.9rem;font-weight:800;color:var(--pl)}
.sl{font-size:.83rem;color:var(--mu);margin-top:3px;font-weight:500}
.ttbl{background:var(--cd);border-radius:12px;box-shadow:var(--sh);overflow:hidden}
.ttbl table{width:100%;border-collapse:collapse}
.ttbl th{background:var(--p);color:#fff;padding:11px 15px;text-align:left;font-size:.85rem;font-weight:600}
.ttbl td{padding:10px 15px;border-bottom:1px solid var(--bd);font-size:.87rem;vertical-align:middle}
.ttbl tr:last-child td{border-bottom:none}
.ttbl tr:hover td{background:#f8faff}
.pbw{width:100%;background:var(--bg);border-radius:6px;height:6px;margin-bottom:3px}
.pb{height:6px;border-radius:6px;transition:width .4s}
.pb.g{background:var(--ok)}.pb.m{background:var(--al)}.pb.b{background:var(--er)}
.hlist{display:flex;flex-direction:column;gap:7px}
.hi{background:var(--cd);border-radius:10px;padding:11px 15px;box-shadow:var(--sh);display:flex;gap:11px;align-items:flex-start;cursor:pointer;transition:box-shadow .15s}
.hi:hover{box-shadow:0 4px 16px rgba(0,0,0,.12)}
.hb{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.82rem;color:#fff;flex-shrink:0}
.hb.ok{background:var(--ok)}.hb.er{background:var(--er)}
.toast{position:fixed;bottom:22px;right:22px;background:#333;color:#fff;padding:11px 18px;border-radius:10px;font-size:.88rem;z-index:9999;opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
@media(max-width:600px){.wrap{padding:14px 8px}.qcard{padding:16px}.dgrid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<nav>
  <h1>CIA <span>Part 2</span> – Quiz</h1>
  <div class="nr">
    <button class="nt on" onclick="showV('quiz')" id="tq">📝 <span id="ltq">Questões</span></button>
    <button class="nt" onclick="showV('dash')" id="td">📊 <span id="ltd">Desempenho</span></button>
    <button class="nt" onclick="showV('hist')" id="th">📋 <span id="lth">Histórico</span></button>
  </div>
</nav>

<div id="v-quiz" class="view on"><div class="wrap">
  <div class="fbar">
    <label id="lmod">Módulo:</label>
    <select id="smod" onchange="onMod()"></select>
    <label id="ltop">Tópico:</label>
    <select id="stop" onchange="applyF()"></select>
    <label id="lmode">Modo:</label>
    <select id="smode" onchange="applyF()">
      <option value="all" id="oall">Todas</option>
      <option value="wrong" id="owrong">Erradas</option>
      <option value="unseen" id="ounseen">Não respondidas</option>
    </select>
    <button class="btn bp bs" onclick="doRand()" id="brand">🔀 Aleatório</button>
    <button class="btn bo bs" onclick="doReset()" id="breset">🗑 Resetar</button>
  </div>
  <div id="qcard" class="qcard"></div>
</div></div>

<div id="v-dash" class="view"><div class="wrap">
  <div class="dgrid" id="dstats"></div>
  <h2 style="margin-bottom:13px;font-size:1.05rem;color:var(--p)" id="lddash">Desempenho por Tópico</h2>
  <div class="ttbl" id="dtbl"></div>
</div></div>

<div id="v-hist" class="view"><div class="wrap">
  <div style="display:flex;gap:10px;margin-bottom:14px;align-items:center;flex-wrap:wrap">
    <h2 style="font-size:1.05rem;color:var(--p)" id="ldhist">Histórico de Respostas</h2>
    <span class="sp"></span>
    <button class="btn bo bs" onclick="doExport()" id="bexp">⬇ Exportar CSV</button>
  </div>
  <div class="hlist" id="hlist"></div>
</div></div>

<div class="toast" id="toast"></div>
<script>
const Q=[{"id":"M1_U1_Q1","num":1,"total":34,"module":"M1","unit":"U1","topic":"Engagement Objectives, Scope, and Evaluation Criteria","question_en":"An internal auditor is assigned to review the organization's procurement process. During planning, the auditor finds that high-level procurement staff may not be available for interviews devido a to schedule conflicts. What action should the internal auditor consider to most effectively manage this limitation when defining the engagement scope?","options_en":{"A":"Limit the scope to select purchase orders processed by staff who are available for interview during the audit fieldwork phase.","B":"Document the limitation and seek alternative sources of information where feasible.","C":"Defer the engagement timeline until procurement staff can confirm availcapacidade.","D":"Proceed with the engagement and rely on available documentation."},"correct":"B","explanation_en":"Choice \"B\" is correct. Documenting the limitation and leveraging alternative sources preserves the engagement scope despite scheduling challenges."},{"id":"M1_U1_Q2","num":2,"total":34,"module":"M1","unit":"U1","topic":"Engagement Objectives, Scope, and Evaluation Criteria","question_en":"An auditor has developed objectives for an upcoming engagement. However, the chief audit executive instructed the auditor to make a preliminary assessment of risks relevant to the activity under review and to consider the results in revising the objectives. Why is the chief audit executive requiring this?","options_en":{"A":"Risks relevant to the activity are important just to comply with the Standards.","B":"The CAE wants the auditor to perform a longer audit.","C":"Risks relevant to the activity under review are more important than other inputs to the engagement objectives.","D":"Objectives should focus efforts on risks relevant to the activity under review."},"correct":"D","explanation_en":"Choice \"D\" is correct. Properly defining engagement objectives and scope before the engagement starts enables internal auditors to focus efforts on the risks relevant to the activity under review based on the results of the engagement risk assessment."},{"id":"M1_U1_Q3","num":3,"total":34,"module":"M1","unit":"U1","topic":"Engagement Objectives, Scope, and Evaluation Criteria","question_en":"An auditor is reviewing the effectiveness of evaluation criteria used to assess financial reporting controls. Which factor best determines whether the criteria are specific and aligned with the organization's objectives?","options_en":{"A":"The criteria are developed based solely on prior audit findings without considering control objectives.","B":"The criteria allow for broad interpretations depending on the auditor’s judgment.","C":"The criteria focus primarily on stakeholder communication rather than improving financial controls.","D":"The criteria are clearly defined and linked to financial reporting accuracy and completeness."},"correct":"D","explanation_en":"Choice \"D\" is correct. Clearly defined criteria that directly link to financial reporting accuracy and completeness ensure specificity and alinhamento with objectives."},{"id":"M1_U1_Q4","num":4,"total":34,"module":"M1","unit":"U1","topic":"Engagement Objectives, Scope, and Evaluation Criteria","question_en":"An auditor is preparing a financial compliance engagement when senior management requests an assessment of staff efficiency. What is the most appropriate way to address this request while finalizing engagement objectives?","options_en":{"A":"Evaluate staff efficiency if it closely aligns with the original engagement goals.","B":"Redesign the engagement plan to emphasize staff performance metrics over financial compliance.","C":"Add staff efficiency to the scope without evaluating its impact on other objectives.","D":"Inform senior management that efficiency assessments require a different type of engagement."},"correct":"A","explanation_en":"Choice \"A\" is correct. Determining whether the added area aligns with original objectives ensures the engagement remains focused and relevant."},{"id":"M1_U1_Q5","num":5,"total":34,"module":"M1","unit":"U1","topic":"Engagement Objectives, Scope, and Evaluation Criteria","question_en":"An organization has stated that its values include providing the least-cost products to its customers possible, and part of this philosophy is reflected in a refusal to adopt a corporate social responsibility program. When setting objectives for a requested advisory engagement on how to reduce labor costs, which represents the best engagement objective listed to present to management for discussion and approval?","options_en":{"A":"Evaluate the use of contractors to avoid payment of benefits.","B":"Evaluate salaries against the local labor market to find areas of overcompensation.","C":"Evaluate whether adoption of a corporate social responsibility program would reduce long-term labor costs.","D":"Determine whether workers make a living wage and if this is adequate for purposes of morale."},"correct":"B","explanation_en":"Choice \"B\" is correct. Evaluating salaries against the local labor market addresses the goal of reducing labor costs and aligns with the organization's values."},{"id":"M1_U1_Q6","num":6,"total":34,"module":"M1","unit":"U1","topic":"Engagement Objectives, Scope, and Evaluation Criteria","question_en":"Which of the following is an appropriate audit engagement objective?","options_en":{"A":"To observe the physical inventory count.","B":"To determine whether inventory levels are sufficient to meet projected sales.","C":"To search for the existence of obsolete inventory by computing inventory turnover by product line.","D":"To include information about stockouts in the engagement final communication."},"correct":"B","explanation_en":"Choice \"B\" is correct. Audit engagement objectives focus on evaluating whether an organization's processes, controls, and systems effectively achieve specific goals. In this case, determining whether inventory levels are sufficient to meet projected sales is a clear, measurable, and relevant objective for an audit engagement. It aligns with the purpose of assessing inventory management processes and ensuring that business objectives are met."},{"id":"M1_U1_Q7","num":7,"total":34,"module":"M1","unit":"U1","topic":"Engagement Objectives, Scope, and Evaluation Criteria","question_en":"An internal auditor is planning a review of the marketing department. The marketing team asks for added coverage on promotional spending. Which approach best addresses this request while preserving the engagement scope?","options_en":{"A":"Inform the marketing team their request will be escalated so that consideration may be given to undertaking a review of this area at some point in the future.","B":"Limit the review to the predefined objectives and schedule a further audit to focus on promotional spending.","C":"Extend the planned testing to include the additional promotional processes across multiple departments.","D":"Incorporate relevant promotional spending concerns that fit the established scope."},"correct":"D","explanation_en":"Choice \"D\" is correct. Incorporating stakeholder requests that align with the scope helps address new concerns without jeopardizing existing objectives."},{"id":"M1_U1_Q8","num":8,"total":34,"module":"M1","unit":"U1","topic":"Engagement Objectives, Scope, and Evaluation Criteria","question_en":"Which statement most accurately describes how criteria are established for use by internal auditors in determining whether the organization's goals and objectives have been accomplished?","options_en":{"A":"The company's industry establishes criteria through benchmarks and best practices.","B":"Financial and accounting regulators establish the criteria.","C":"Management and/or the board establish the criteria.","D":"Internal auditors use professional standards or government regulations to establish the criteria."},"correct":"C","explanation_en":"Choice \"C\" is correct. Internal auditors rely on criteria established by management or the board to evaluate whether goals and objectives have been achieved. While professional standards or industry benchmarks can guide evaluations, the ultimate responsibility for setting these criteria rests with the organization’s leadership. This ensures alinhamento with the organization's unique goals and context."},{"id":"M1_U1_Q9","num":9,"total":34,"module":"M1","unit":"U1","topic":"Engagement Objectives, Scope, and Evaluation Criteria","question_en":"An audit team is planning to examine a newly introduced software deployment. The IT manager requests additional coverage to include user satisfaction feedback. Which approach effectively documents and addresses this request within the engagement scope?","options_en":{"A":"Replace the software deployment review with a primary focus on user experience data.","B":"Add user feedback to the existing objectives if it aligns with the planned scope.","C":"Maintain the initial objectives without acknowledging the request to preserve scope boundaries.","D":"Inform the IT manager that user feedback is outside the scope and cannot be included."},"correct":"B","explanation_en":"Choice \"B\" is correct. Including user satisfaction data that fits the planned scope maintains responsiveness to stakeholder needs."},{"id":"M1_U1_Q10","num":10,"total":34,"module":"M1","unit":"U1","topic":"Engagement Objectives, Scope, and Evaluation Criteria","question_en":"Management of an activity under review complains to the chief audit executive that work being done by auditors is out of scope and requests that they stop. What is the best way for the chief audit executive to respond if she believes the auditors are doing the right thing?","options_en":{"A":"Persuade the manager to allow the auditors to continue their work.","B":"Review the internal audit charter with the manager, highlighting that internal audit has \"access to all areas.\"","C":"Schedule a meeting with the manager and the CEO to collaborate on resolving the issue.","D":"Explain to the manager how the auditors' work relates to the scope of the engagement as described in the announcement letter."},"correct":"D","explanation_en":"Choice \"D\" is correct. Explaining how the auditors' work aligns with the scope of the engagement addresses the manager's concern and maintains audit credibility."},{"id":"M1_U1_Q11","num":11,"total":34,"module":"M1","unit":"U1","topic":"Engagement Objectives, Scope, and Evaluation Criteria","question_en":"In an organization with a less mature governance system, which of the following would be an appropriate action by the internal audit function?","options_en":{"A":"Comparing the current governance structure and practices against regulations and other compliance requirements.","B":"Auditing the design and effectiveness of specific governance-related processes.","C":"Analyzing the transparency and disclosure practices among parts of the governance structure.","D":"Evaluating best practices for use by the organization."},"correct":"A","explanation_en":"Choice \"A\" is correct. When less maturity in governance processes prevails, the internal audit function tends to focus more on performing discrete audits, providing advice regarding optimal structure and practices, and comparing the current governance structure and practices against regulations and other compliance requirements."},{"id":"M1_U1_Q12","num":12,"total":34,"module":"M1","unit":"U1","topic":"Engagement Objectives, Scope, and Evaluation Criteria","question_en":"An auditor is conducting an internal review of project governance when leadership requests that the scope be narrowed to focus only on cost controls. What is the most effective response?","options_en":{"A":"Delay the engagement until leadership confirms the full scope of review.","B":"Evaluate whether the requested change aligns with engagement objectives before modifying the scope.","C":"Immediately adjust the scope to exclude all governance-related procedures.","D":"Continue with the original scope and inform leadership that cost control is a separate issue."},"correct":"B","explanation_en":"Choice \"B\" is correct. Ensuring that scope changes support the original objectives helps maintain the integrity of the engagement."},{"id":"M1_U1_Q13","num":13,"total":34,"module":"M1","unit":"U1","topic":"Engagement Objectives, Scope, and Evaluation Criteria","question_en":"An organization has transitioned from manual processes to automated IT systems for managing its business operations. During an audit, the internal auditor focuses on evaluating system controls to ensure that business objectives are achieved effectively. What is the primary type of assurance the auditor seeks?","options_en":{"A":"Assurance gained by third-party review.","B":"Assurance gained by auditing external IT interfaces.","C":"Assurance regarding historical data accuracy.","D":"Assurance regarding processes."},"correct":"D","explanation_en":"Choice \"D\" is correct. When organizations shift from manual methods to IT-based systems, auditors focus on process assurance. This involves evaluating IT system controls, workflows, and configurations to ensure they are designed and operated effectively to meet business objectives. By examining these processes, auditors can determine the relicapacidade of the system in achieving accurate, consistent, and secure operations."},{"id":"M1_U1_Q14","num":14,"total":34,"module":"M1","unit":"U1","topic":"Engagement Objectives, Scope, and Evaluation Criteria","question_en":"What is the most likely reason an internal auditor would interview operational management during engagement planning?","options_en":{"A":"To help the internal auditor understand the objectives of the area or process under review.","B":"To determine whether management followed through on action plans from a previous advisory engagement.","C":"To validate the engagement work program.","D":"To determine whether operational management has sufficient knowledge of risks and controls."},"correct":"A","explanation_en":"Choice \"A\" is correct. Interviews with operational management during engagement planning provide valuable insights into the objectives, processes, and risks of the activity under review, ensuring that the auditor has a clear understanding of the engagement context."},{"id":"M1_U1_Q15","num":15,"total":34,"module":"M1","unit":"U1","topic":"Engagement Objectives, Scope, and Evaluation Criteria","question_en":"An internal auditor has been asked to review the treasury department's compliance with corporate policy related to the use of forward trading to manage currency valuation risk. The auditor finds no related policies in the corporate policy manual but does discover that the department is following a policy developed by the company's bank. Which of the following would be the most appropriate response from the auditor?","options_en":{"A":"Withdraw from the audit engagement, because there is nothing to audit devido a to the lack of a corporate policy.","B":"Use the bank's policy as the audit criteria and determine whether formal adoption should be recommended in the engagement final communication.","C":"Postpone the audit engagement until a corporate policy can be established.","D":"Perform no further audit work and report the lack of a corporate policy as an audit observation."},"correct":"B","explanation_en":"Choice \"B\" is correct. When a corporate policy is absent, it is appropriate to use the bank’s policy as a temporary audit criterion, as it provides relevant guidance. The auditor should also assess whether formal adoption of such a policy is necessary and include this recommendation in the final report, ensuring the organization strengthens its governance framework."},{"id":"M1_U1_Q16","num":16,"total":34,"module":"M1","unit":"U1","topic":"Engagement Objectives, Scope, and Evaluation Criteria","question_en":"An internal auditor is drafting objectives for an upcoming assurance engagement. Which of the following would most directly influence the objectives being drafted?","options_en":{"A":"Previous audit report.","B":"Management interview.","C":"System walkthrough.","D":"Preliminary risk assessment."},"correct":"D","explanation_en":"Choice \"D\" is correct. A preliminary risk assessment identifies chave risks and priorities for the engagement, directly influencing the objectives being drafted and ensuring the audit focuses on areas of greatest importance."},{"id":"M1_U1_Q17","num":17,"total":34,"module":"M1","unit":"U1","topic":"Engagement Objectives, Scope, and Evaluation Criteria","question_en":"An internal auditor is assessing the evaluation criteria used in a compliance audit. Which factor best ensures that the criteria are practical and relevant to the organization’s objectives?","options_en":{"A":"The criteria focus only on areas where previous noncompliance has occurred.","B":"The criteria align with regulatory requirements and internal compliance policies.","C":"The criteria include subjective opinions from department managers.","D":"The criteria consider industry benchmarks."},"correct":"B","explanation_en":"Choice \"B\" is correct. Practical and relevant evaluation criteria should align with both external regulations and internal compliance policies to ensure effectiveness."},{"id":"M1_U1_Q18","num":18,"total":34,"module":"M1","unit":"U1","topic":"Engagement Objectives, Scope, and Evaluation Criteria","question_en":"An organization is experiencing frequent asset losses devido a to inadequate processes. To which category of objectives should management focus its efforts to address the safeguarding of assets or resources?","options_en":{"A":"Compliance objectives.","B":"Strategic objectives.","C":"Reporting objectives.","D":"Operational objectives."},"correct":"D","explanation_en":"Choice \"D\" is correct. Safeguarding of assets is primarily associated with operational objectives. These objectives are designed to ensure the effective and efficient use of resources, including the protection of assets from loss, theft, or misuse. Reporting objectives focus on the accuracy of financial or operational reporting, while compliance objectives ensure adherence to laws and regulations. Strategic objectives, on the other hand, relate to long-term goals and vision."},{"id":"M1_U1_Q19","num":19,"total":34,"module":"M1","unit":"U1","topic":"Engagement Objectives, Scope, and Evaluation Criteria","question_en":"A review of a bank's compliance department by regulators highlighted multiple instances where threshold transactions were not detected devido a to faulty transaction- monitoring software. Management intends to solicit proposals from a list of vendors to provide a more comprehensive and reliable transaction-monitoring tool. After the tool is acquired and implemented, the internal audit function will perform a follow-up audit. Which of the following objectives would be most relevant for the audit?","options_en":{"A":"Assess the adequacy of competence for all users of the software.","B":"Assess the level of compliance with the bank's procurement policy during the acquisition of the new software.","C":"Determine the operating effectiveness of the new tool in detecting reportable transactions.","D":"Evaluate the adequacy of the new transaction-monitoring software's architecture."},"correct":"C","explanation_en":"Choice \"C\" is correct. Determining the operating effectiveness of the transaction- monitoring tool ensures that the tool resolves the previously identified deficiencies and meets its intended purpose of detecting reportable transactions."},{"id":"M1_U1_Q20","num":20,"total":34,"module":"M1","unit":"U1","topic":"Engagement Objectives, Scope, and Evaluation Criteria","question_en":"An internal auditor is evaluating the effectiveness of an organization’s procurement process. Which criterion would be the most relevant for assessing compliance with internal policies?","options_en":{"A":"Number of procurement employees relative to purchase volume.","B":"Frequency of vendor communication and relationship strength.","C":"Speed at which purchase orders are processed.","D":"Alignment with approved procurement procedures and authorization limits."},"correct":"D","explanation_en":"Choice \"D\" is correct. Evaluating compliance requires assessing whether procurement activities align with internal procedures and authorization requirements."},{"id":"M1_U1_Q21","num":21,"total":34,"module":"M1","unit":"U1","topic":"Engagement Objectives, Scope, and Evaluation Criteria","question_en":"An internal audit function is charged with measuring the compliance of the organization's human resources area with applicable laws, regulations, and internal policies. Which of the following objectives would be appropriate for this engagement plan?","options_en":{"A":"To establish proof of citizenship by requiring a birth certificate.","B":"To question recently hired employees to assess compliance with the interviewing process.","C":"To assess the process used by human resources to respond to employee complaints.","D":"To ensure that applicant pools represent a fair cross section of the population."},"correct":"C","explanation_en":"Choice \"C\" is correct. An engagement objective is a broad statement intended to define the engagement's accomplishments. This might include evaluating such items of compliance as documentation of proof of residency and complaint response processes. Ensuring that applicants represent a cross section of the population would be an operational objective for human resources rather than an engagement objective for internal auditing. It might also be an objective to evaluate compliance of the interview process with laws, regulations, and policies, but the objective would not specify the manner of accomplishing it (e.g., by interviewing recently hired employees or requiring a birth certificate)."},{"id":"M1_U1_Q22","num":22,"total":34,"module":"M1","unit":"U1","topic":"Engagement Objectives, Scope, and Evaluation Criteria","question_en":"An auditor receives multiple stakeholder requests to assess compliance with new data privacy regulations. The original scope includes only a review of existing privacy protocols. Which approach would help maintain a clear record of these requests while finalizing the engagement plan?","options_en":{"A":"Inform stakeholders that their requests will be consolidated for a future compliance review.","B":"Retain the current scope and note stakeholder requests for consideration in a subsequent engagement.","C":"Log the requests and analyze how new regulatory requirements align with the original scope.","D":"Convert the engagement into a comprehensive regulatory compliance review across all departments involved."},"correct":"C","explanation_en":"Choice \"C\" is correct. Logging and assessing the additional requests help ensure proper scope adjustment while documenting stakeholder input."},{"id":"M1_U1_Q23","num":23,"total":34,"module":"M1","unit":"U1","topic":"Engagement Objectives, Scope, and Evaluation Criteria","question_en":"Which of the following considerations by an internal auditor is most critical in determining the audit engagement objectives?","options_en":{"A":"The scope of the audit.","B":"The purpose of the audit.","C":"The competence of the available staff.","D":"The hours planned for the audit."},"correct":"B","explanation_en":"Choice \"B\" is correct. According to the Global Internal Audit Standards, the engagement objectives must articulate the purpose of the engagement and describe the specific goals to be achieved."},{"id":"M1_U1_Q24","num":24,"total":34,"module":"M1","unit":"U1","topic":"Engagement Objectives, Scope, and Evaluation Criteria","question_en":"An organization is implementing measures to improve its capacidade to manage business operations effectively and efficiently. Which of the following actions best represents this objective?","options_en":{"A":"Collecting useful, reliable, and timely information for decision making.","B":"Safeguarding of assets (physical, human, information).","C":"Complying with internal policies and procedures.","D":"Determining if correct reports are given to the proper managers in the organization."},"correct":"B","explanation_en":"Choice \"B\" is correct. Effective and efficient management of business operations often includes safeguarding of assets, which ensures the protection and optimal use of physical, human, and informational resources. This aligns with operational objectives focused on maintaining efficiency and reducing risks. While the other options address aspects of reporting, decision-making, and policy compliance, they are not as directly tied to the overarching goal of managing operations effectively and efficiently."},{"id":"M1_U1_Q25","num":25,"total":34,"module":"M1","unit":"U1","topic":"Engagement Objectives, Scope, and Evaluation Criteria","question_en":"Which of the following is an example of a competitive advantage?","options_en":{"A":"Low capital investment required for market entry.","B":"Access to high-cost labor.","C":"Easily duplicated technology.","D":"Loyal and satisfied customers."},"correct":"D","explanation_en":"Choice \"D\" is correct. Loyal and satisfied customers provide a sustainable competitive advantage through repeat business and brand advocacy."},{"id":"M1_U1_Q26","num":26,"total":34,"module":"M1","unit":"U1","topic":"Engagement Objectives, Scope, and Evaluation Criteria","question_en":"Scope statements for assurance engagements may include which of the following?","options_en":{"A":"Areas excluded from the scope.","B":"Collaborative definition between auditor and the activity under review.","C":"Final report distribution.","D":"Statement that the time frame reviewed shall not be limited."},"correct":"A","explanation_en":"Choice \"A\" is correct. Areas excluded from scope clarify the focus and boundaries of the engagement, reducing ambiguity."},{"id":"M1_U1_Q27","num":27,"total":34,"module":"M1","unit":"U1","topic":"Engagement Objectives, Scope, and Evaluation Criteria","question_en":"During an operational audit, the audit team is reviewing evaluation criteria for measuring process efficiency. Which characteristic best ensures that the criteria will produce reliable comparisons?","options_en":{"A":"The criteria include general guidelines rather than specific performance measures.","B":"The criteria change depending on the department being audited to allow for flexibility.","C":"The criteria are based on measurable performance indicators consistently applied across all units.","D":"The criteria focus primarily on employee feedback regarding process efficiency."},"correct":"C","explanation_en":"Choice \"C\" is correct. Using measurable and consistently applied performance indicators ensures that evaluations produce reliable comparisons."},{"id":"M1_U1_Q28","num":28,"total":34,"module":"M1","unit":"U1","topic":"Engagement Objectives, Scope, and Evaluation Criteria","question_en":"An ongoing compliance audit reveals new risks related to third-party vendors that were not initially considered. How should the auditor address this change?","options_en":{"A":"Recommend that vendor-related risks be evaluated in a separate audit.","B":"Acknowledge the vendor risks but continue with the original scope; the budget has been set.","C":"Determine whether the new risks warrant an adjustment to the scope and document any necessary modifications.","D":"Extend the audit scope to include all third-party vendor relationships."},"correct":"C","explanation_en":"Choice \"C\" is correct. Assessing whether the new risks require an adjustment ensures the audit remains comprehensive and useful."},{"id":"M1_U1_Q29","num":29,"total":34,"module":"M1","unit":"U1","topic":"Engagement Objectives, Scope, and Evaluation Criteria","question_en":"Which of the following would best help internal auditors establish engagement objectives during the planning phase?","options_en":{"A":"Risk assessments prepared by management.","B":"Financial statements from the previous year.","C":"Earnings per share figures.","D":"Analysts' forecast expectations."},"correct":"A","explanation_en":"Choice \"A\" is correct. Internal auditors typically review risk assessments (both those prepared by management and those previously prepared by the internal audit function) and previous audit reports to aid in establishing engagement objectives during engagement planning."},{"id":"M1_U1_Q30","num":30,"total":34,"module":"M1","unit":"U1","topic":"Engagement Objectives, Scope, and Evaluation Criteria","question_en":"An auditing team has been asked to perform an operational audit on a subsidiary’s inventory management. Management at the subsidiary has stated that certain remote warehouse locations are inaccessible devido a to safety concerns. Which method would best help the auditing team refine the engagement objectives in light of the access constraint?","options_en":{"A":"Request that safety restrictions be lifted for the audit team immediately.","B":"Redirect the engagement to focus on financial reporting instead of operational processes.","C":"Note the constraint and adjust audit techniques to analyze available inventory data remotely.","D":"Perform a full physical inspection of the main warehouse and exclude remote sites."},"correct":"C","explanation_en":"Choice \"C\" is correct. Addressing the constraint and using remote procedures or other verification methods ensures that the engagement objectives remain relevant and feasible."},{"id":"M1_U1_Q31","num":31,"total":34,"module":"M1","unit":"U1","topic":"Engagement Objectives, Scope, and Evaluation Criteria","question_en":"An internal auditor should use which of the following as the primarybasefor determining the objectives of an upcoming audit engagement?","options_en":{"A":"Requests received from management during the entrance conference.","B":"The availcapacidade of audit resources and time constraints of the audit team.","C":"The recommendations made in previous audit reports on the same activity.","D":"Results of a risk assessment performed on the activity under review."},"correct":"D","explanation_en":"Choice \"D\" is correct. Determining audit objectives should be risk-based, aligning with identified risks from the activity under review. This ensures that the audit focuses on areas of greatest potential impact and relevance."},{"id":"M1_U1_Q32","num":32,"total":34,"module":"M1","unit":"U1","topic":"Engagement Objectives, Scope, and Evaluation Criteria","question_en":"During the planning phase of a cybersecurity audit, the organization experiences a data breach, prompting executives to request an immediate focus on incident response controls. How should the auditor handle this request?","options_en":{"A":"Assess whether the engagement objectives can be adjusted to incorporate incident response controls.","B":"Delegate the incident response review to an external cybersecurity consultant.","C":"Proceed with the original cybersecurity scope and address incident response in the next audit cycle.","D":"Expand the scope significantly to include all security incidents in the past three years."},"correct":"A","explanation_en":"Choice \"A\" is correct. Evaluating the feasibility of incorporating the incident response controls ensures the audit remains relevant and valuable."},{"id":"M1_U1_Q33","num":33,"total":34,"module":"M1","unit":"U1","topic":"Engagement Objectives, Scope, and Evaluation Criteria","question_en":"An internal auditor is developing the scope for a capital projects engagement. Multiple stakeholders submit requests to assess whether the projects align with the organization’s new sustaincapacidade goals. Which action would ensure these requests are properly managed and documented?","options_en":{"A":"Limit the review of sustaincapacidade concerns to those that directly impact capital investment decisions.","B":"Forward the requests to an external consultant for a separate, non-audit project.","C":"Defer sustaincapacidade-related evaluations until the next scheduled environmental audit is conducted.","D":"Capture the requests and determine if sustaincapacidade goals fit within the current objectives."},"correct":"D","explanation_en":"Choice \"D\" is correct. Reviewing whether sustaincapacidade goals align with the planned focus ensures stakeholder concerns are addressed properly."},{"id":"M1_U1_Q34","num":34,"total":34,"module":"M1","unit":"U1","topic":"Engagement Objectives, Scope, and Evaluation Criteria","question_en":"An auditor is reviewing the efficiency of a company’s payroll processing. Which criterion would be the most appropriate for evaluating the effectiveness of payroll controls?","options_en":{"A":"Accuracy and timeliness of payroll disbursements compared to established policies.","B":"Employee opinions on payroll department responsiveness.","C":"The length of the payroll cycle compared to other companies in the industry.","D":"The number of payroll department employees."},"correct":"A","explanation_en":"Choice \"A\" is correct. Evaluating payroll controls requires measuring accuracy and adherence to policies to ensure proper processing."},{"id":"M1_U2_Q1","num":1,"total":38,"module":"M1","unit":"U2","topic":"Identifying Information and Evaluating Evidence","question_en":"An internal auditor is most likely to use a yes/no questionnaire for which of the following reasons?","options_en":{"A":"To gather uniform information from all informants for accurate comparisons.","B":"To gather information for all types of issues.","C":"To gather in-depth knowledge.","D":"To observe respondents’ behavior and environment."},"correct":"A","explanation_en":"Choice \"A\" is correct. Yes/no questionnaires are effective for gathering uniform information to enable accurate comparisons across respondents."},{"id":"M1_U2_Q2","num":2,"total":38,"module":"M1","unit":"U2","topic":"Identifying Information and Evaluating Evidence","question_en":"Senior management requested a special inventory warehouse audit devido a to recent fraud in the area. First, the internal auditor plans to verify the current inventory in the warehouse. Which of the following sources would be reliable to verify the current inventory in the warehouse?","options_en":{"A":"An inventory listing from the inventory management software obtained by the internal auditor without the help of management.","B":"An inventory account balance from current management accounts.","C":"An inventory count performed by management of the activity under review while the internal auditor observes.","D":"An inventory balance from the most recently published financial statements, verified by the external auditor."},"correct":"C","explanation_en":"Choice \"C\" is correct. Observing an inventory count performed by management ensures the auditor directly verifies the inventory, providing a reliable and independent assessment of the current inventory levels."},{"id":"M1_U2_Q3","num":3,"total":38,"module":"M1","unit":"U2","topic":"Identifying Information and Evaluating Evidence","question_en":"During an audit of a company's procurement process, which of the following would an internal auditor use to reconcile a supplier's account balance?","options_en":{"A":"Copies of the supplier's account balance confirmation provided by the procurement area.","B":"An account balance confirmation obtained directly from the supplier.","C":"The supplier's account balance, obtained from the procurement area's resource planning system.","D":"The supplier's account balance details in a spreadsheet format, provided by the procurement area."},"correct":"B","explanation_en":"Choice \"B\" is correct. An account balance confirmation obtained directly from the supplier provides independent and reliable evidence for reconciling balances, meeting audit standards for accuracy and relicapacidade."},{"id":"M1_U2_Q4","num":4,"total":38,"module":"M1","unit":"U2","topic":"Identifying Information and Evaluating Evidence","question_en":"An internal auditor interviewed the head of security as part of an engagement to assess the safeguarding of sensitive equipment at facilities. Based on this interview, the auditor concluded that the facilities had adequate security measures in place to safeguard the sensitive equipment. Which of the following actions should the auditor have taken to meet the engagement objective?","options_en":{"A":"The auditor should have performed onsite inspections of the facilities to corroborate information obtained from the interview.","B":"The auditor should have compared the security policies and procedures to the information provided from the interview and searched for discrepancies.","C":"The auditor should have performed follow-up interviews with the head of security and determine if responses are consistent with first interview.","D":"The auditor should have interviewed additional security personnel to corroborate the story before documenting the conclusion."},"correct":"A","explanation_en":"Choice \"A\" is correct. Onsite inspections provide direct evidence and corroborate information obtained during interviews, ensuring the auditor's conclusions about security measures are supported by reliable evidence."},{"id":"M1_U2_Q5","num":5,"total":38,"module":"M1","unit":"U2","topic":"Identifying Information and Evaluating Evidence","question_en":"A new staff auditor, who has an undergraduate degree in psychology, suggests that a questionnaire be developed to examine bus drivers' attitudes toward departmental operations, overtime, number of hours/miles driven, etc. The internal audit function has never used questionnaires like this before. Should the chief audit executive approve the development and use of such a questionnaire?","options_en":{"A":"Yes, questionnaires are a more objective form of evidence gathering than observation and interviews.","B":"No, audit work should be confined to objective data so that audit independence is not compromised.","C":"Yes, the data would be relevant to understanding the causes of accidents and breakdowns.","D":"No, the audit department does not have sufficient expertise in developing such questionnaires."},"correct":"C","explanation_en":"Choice \"C\" is correct. The use of questionnaires should be approved, as questionnaires provide relevant, objective data. If needed, auditing standards allow outside expertise to be used to develop the questionnaire. Objectivity is a secondary issue to relevancy."},{"id":"M1_U2_Q6","num":6,"total":38,"module":"M1","unit":"U2","topic":"Identifying Information and Evaluating Evidence","question_en":"Which of the following is a primary reason for an internal auditor to use a risk and control questionnaire when auditing financial processes?","options_en":{"A":"To test the effectiveness of financial controls in an efficient and relatively inexpensive way.","B":"To collect as much financial data as possible before engagement fieldwork begins.","C":"To gain an understanding of the control environment.","D":"To facilitate the quantification of financial data obtained."},"correct":"C","explanation_en":"Choice \"C\" is correct. Using a risk and control questionnaire helps gain an understanding of the control environment by identifying potential control weaknesses and risks, providing a framework for planning further audit procedures."},{"id":"M1_U2_Q7","num":7,"total":38,"module":"M1","unit":"U2","topic":"Identifying Information and Evaluating Evidence","question_en":"A company that supplies medications to large hospitals relies heavily on subcontractors to replenish any shortages within 24 hours. Where should internal auditors look for evidence that subcontractors are held responsible for this obligation?","options_en":{"A":"The subcontractor's risk register.","B":"The signed service-level agreement.","C":"The company's Code of Ethics.","D":"The subcontractors’ annual satisfaction survey."},"correct":"B","explanation_en":"Choice \"B\" is correct. The signed service-level agreement is the contractual evidence outlining subcontractor obligations."},{"id":"M1_U2_Q8","num":8,"total":38,"module":"M1","unit":"U2","topic":"Identifying Information and Evaluating Evidence","question_en":"An internal auditor proposes using an internal control questionnaire during an audit of the organization's operations. What would be the primary purpose of using such a questionnaire?","options_en":{"A":"To assess the design and effectiveness of controls.","B":"To compare control activities with other available sources in the operations.","C":"To validate control information through parties independent of the operations.","D":"To gather information about the control environment and the existence of specific controls."},"correct":"D","explanation_en":"Choice \"D\" is correct. The primary purpose of an internal control questionnaire is to gather information about the control environment and the existence of specific control procedures."},{"id":"M1_U2_Q9","num":9,"total":38,"module":"M1","unit":"U2","topic":"Identifying Information and Evaluating Evidence","question_en":"Which of the following represents a possible weakness related to the use of observation by the internal auditor during a portion of the physical inventory count?","options_en":{"A":"Observation of the inventory count procedures provides evidence of compliance to count procedures and directives.","B":"Observation provides direct evidence to the auditor of the appropriateness of the counting process.","C":"The evidence obtained by observation is more persuasive than the review of company procedures related to physical inventory.","D":"Results from observation of the physical inventory count provide credible evidence at a fixed time and location."},"correct":"D","explanation_en":"Choice \"D\" is correct. Observation only provides evidence at the specific time and location, limiting its usefulness in assessing processes over a period or in different conditions."},{"id":"M1_U2_Q10","num":10,"total":38,"module":"M1","unit":"U2","topic":"Identifying Information and Evaluating Evidence","question_en":"Which of the following would be considered a major advantage of obtaining a complete internal control questionnaire regarding financial reporting?","options_en":{"A":"To determine the tests required for data relationships.","B":"To provide thebasefor effective benchmarking.","C":"To examine the risks associated with current practices.","D":"To obtain specific support for chave ratio analysis."},"correct":"C","explanation_en":"Choice \"C\" is correct. The primary advantage of a completed internal control questionnaire (ICQ) is that it provides information about the auditee's practices and risks."},{"id":"M1_U2_Q11","num":11,"total":38,"module":"M1","unit":"U2","topic":"Identifying Information and Evaluating Evidence","question_en":"Management of a property and casualty insurance company has two major concerns about the efficiency and effectiveness of claims-processing activities: Some claims are being paid that should not be paid or are being paid in amounts in excess of the policy, while many claims are not being paid on a timely basis. In preparing for an audit of the area, the internal auditor decides to perform a preliminary survey to gather more information about the nature of processing and potential problems. The auditor uses a questionnaire during interviews to gather this information. Unfortunately, the questionnaire does not cover some of the information offered by the persons being interviewed. Consequently, the auditor does not document the potential problems for further audit investigation. The primary deficiency with this process is which of the following?","options_en":{"A":"Management objectives were defined too narrowly.","B":"The auditor failed to consider the importance of the information offered.","C":"Questionnaires do not allow for opportunities to document other information.","D":"The auditor used a questionnaire in a situation where a structured interview should have been used."},"correct":"B","explanation_en":"Choice \"B\" is correct. The major problem is that the auditor was too oriented to the questionnaire and failed to appropriately consider the other information that was offered. Questionnaires may be limited, but the auditor needs to be flexible enough to gather other information when it is offered."},{"id":"M1_U2_Q12","num":12,"total":38,"module":"M1","unit":"U2","topic":"Identifying Information and Evaluating Evidence","question_en":"During the planning stage of an engagement, a senior internal auditor sends an internal control questionnaire to the head of the revenue department to be completed. Which of the following is a drawback of this approach?","options_en":{"A":"This approach is an expensive way to obtain the information.","B":"A high degree of data analytics proficiency is required to interpret the results.","C":"Control owners tend to respond positively about the controls in their area.","D":"This type of questionnaire can be used only during the planning stage of an engagement."},"correct":"C","explanation_en":"Choice \"C\" is correct. Control owners may provide overly optimistic responses to internal control questionnaires, potentially skewing the results. This drawback emphasizes the need for corroborating evidence or additional audit procedures."},{"id":"M1_U2_Q13","num":13,"total":38,"module":"M1","unit":"U2","topic":"Identifying Information and Evaluating Evidence","question_en":"Which of the following is the best reason for an internal auditor to interview management regarding the results of an internal control questionnaire, even when the results revealed no significant concerns?","options_en":{"A":"The interview would allow the internal auditor to gather additional information in any areas of interest.","B":"The interview is the most efficient method of obtaining objective information to support the results of the questionnaire.","C":"The interview is the only technique that provides sufficient corroboration of the information provided.","D":"The interview technique is required by the Standards regardless of the outcome."},"correct":"A","explanation_en":"Choice \"A\" is correct. Interviews allow the auditor to gather additional information and corroborate responses provided in the internal control questionnaire, ensuring thorough coverage of any issues."},{"id":"M1_U2_Q14","num":14,"total":38,"module":"M1","unit":"U2","topic":"Identifying Information and Evaluating Evidence","question_en":"An auditor is assessing whether the evidence gathered during an engagement is sufficient. What characteristic must the evidence have to ensure that another competent professional would reach the same conclusion?","options_en":{"A":"The evidence was collected quickly to meet audit deadlines.","B":"The evidence is clear, well documented, and supports the audit findings.","C":"The evidence aligns with the auditor’s initial expectations.","D":"The evidence consists mostly verbal confirmations from management."},"correct":"B","explanation_en":"Choice \"B\" is correct. Sufficient evidence must be clear, properly documented, and directly support audit conclusions to ensure repliccapacidade."},{"id":"M1_U2_Q15","num":15,"total":38,"module":"M1","unit":"U2","topic":"Identifying Information and Evaluating Evidence","question_en":"During an investigation of unexplained inventory shrinkage, which of the following would provide the internal auditor with the most reliable information?","options_en":{"A":"Vendor invoices.","B":"Inventory records.","C":"Receiving reports.","D":"Purchase orders."},"correct":"A","explanation_en":"Choice \"A\" is correct. The vendors’ invoices provide the best source of independent information about additions to inventory."},{"id":"M1_U2_Q16","num":16,"total":38,"module":"M1","unit":"U2","topic":"Identifying Information and Evaluating Evidence","question_en":"An internal auditor wants to verify whether a particular invoice was paid by the organization. Which of the following forms of evidence provides the highest relicapacidade?","options_en":{"A":"Operational management provides a vendor receipt that verifies the invoice has been paid.","B":"An internal auditor observes operational management's invoice payment process.","C":"Operational management produces a report showing invoices paid.","D":"An internal auditor receives a letter from the bank that aligns with operational management's payment records."},"correct":"D","explanation_en":"Choice \"D\" is correct. Evidence from an independent external source, such as a bank confirmation letter, provides the highest relicapacidade. This type of evidence is objective, verifiable, and free from internal bias, making it more reliable than reports or receipts produced by operational management or observations by the auditor."},{"id":"M1_U2_Q17","num":17,"total":38,"module":"M1","unit":"U2","topic":"Identifying Information and Evaluating Evidence","question_en":"During a financial audit, an auditor wants to ensure that collected evidence would allow another competent professional to draw the same conclusions. What type of evidence best supports this goal?","options_en":{"A":"Verbal statements from company executives about financial transactions.","B":"Financial records that summarize transactions and policy requirements.","C":"Third-party confirmations and independently verifiable records.","D":"Internally generated reports that have been reviewed and approved by management."},"correct":"C","explanation_en":"Choice \"C\" is correct. Third-party confirmations and verifiable records provide objective, repeatable evidence that supports audit conclusions."},{"id":"M1_U2_Q18","num":18,"total":38,"module":"M1","unit":"U2","topic":"Identifying Information and Evaluating Evidence","question_en":"Which of the following would offer the strongest evidence to support the internal auditor's conclusion that a product is in stock, as stated in the accounting records?","options_en":{"A":"The vendor provides third-party confirmation.","B":"The auditor performs an observation.","C":"Warehouse management submits photographs of the product on the inventory shelf.","D":"The auditor documents interviews with multiple warehouse personnel."},"correct":"B","explanation_en":"Choice \"B\" is correct. Observing the product directly provides the strongest evidence to confirm the product’s presence in stock, as it eliminates reliance on indirect or secondhand sources of verification."},{"id":"M1_U2_Q19","num":19,"total":38,"module":"M1","unit":"U2","topic":"Identifying Information and Evaluating Evidence","question_en":"What is a realistic outcome of a preliminary survey for an activity under review?","options_en":{"A":"Rough draft of engagement recommendations.","B":"List of all persons who need to be interviewed.","C":"Clear idea of why the engagement is being performed.","D":"Detailed list of departmental documents to gather and review."},"correct":"C","explanation_en":"Choice \"C\" is correct. A preliminary survey helps auditors gain a clear understanding of the purpose of the engagement, which will inform development of the objectives and scope."},{"id":"M1_U2_Q20","num":20,"total":38,"module":"M1","unit":"U2","topic":"Identifying Information and Evaluating Evidence","question_en":"Which of the following is the most persuasive evidence of the existence of newly acquired computers for the sales department?","options_en":{"A":"Documentation prepared externally.","B":"Management inquiry.","C":"Observation of auditee's procedures.","D":"Physical examination."},"correct":"D","explanation_en":"Choice \"D\" is correct. Physical examination provides direct and most reliable evidence of the existence of tangible assets such as computers."},{"id":"M1_U2_Q21","num":21,"total":38,"module":"M1","unit":"U2","topic":"Identifying Information and Evaluating Evidence","question_en":"An internal auditor is assessing the organization’s ethics program. Which of the following sources of information is most likely to yield the best evidence that the organization’s ethics and values are effectively communicated?","options_en":{"A":"Documentation of the organization's handling of violations of the ethics policy.","B":"Signatures of staff acknowledging their understanding of the organization's values and their willingness to comply with the ethics policy.","C":"Board minutes approving the establishment of the organization's value statement and ethics program.","D":"The organization's internal employee newsletters that regularly include articles on its values and ethics."},"correct":"B","explanation_en":"Choice \"B\" is correct. Staff signatures acknowledging their understanding of values and ethics provide direct evidence that these concepts are communicated effectively within the organization."},{"id":"M1_U2_Q22","num":22,"total":38,"module":"M1","unit":"U2","topic":"Identifying Information and Evaluating Evidence","question_en":"During an interview with an internal auditor, an organization's shipping department manager mentioned several problems with the current shipping procedures. The auditor did not formally document the problems, but instead administered a questionnaire to gather information about the shipping process. How was this choice of actions a mistake?","options_en":{"A":"The auditor used a questionnaire when he should have conducted a structured interview.","B":"The auditor should have performed a ratio analysis prior to the interview.","C":"The auditor failed to consider the significance of the other information offered.","D":"The auditor is not able to document the other information since he used the questionnaire."},"correct":"C","explanation_en":"Choice \"C\" is correct. The auditor should be receptive to new information during interviews rather than relying too heavily on questionnaires. In this case, the auditor was too oriented to the questionnaire and failed to appropriately consider the other information that was offered."},{"id":"M1_U2_Q23","num":23,"total":38,"module":"M1","unit":"U2","topic":"Identifying Information and Evaluating Evidence","question_en":"An internal auditor reviewed bank reconciliations prepared by management of the activity under review. The auditor noted that the bank statements attached did not have the bank heading, logo, or address. Which of the following statements is true regarding this situation?","options_en":{"A":"The evidence is not relevant.","B":"The evidence may not be reliable.","C":"The information missing is not relevant to the audit.","D":"The evidence may not be sufficient."},"correct":"B","explanation_en":"Choice \"B\" is correct. Evidence without the bank's logo, address, or heading may not be reliable as it raises questions about its authenticity. Key identifying information is critical to ensure the evidence supports audit conclusions."},{"id":"M1_U2_Q24","num":24,"total":38,"module":"M1","unit":"U2","topic":"Identifying Information and Evaluating Evidence","question_en":"An internal auditor suspects that high turnover may be caused by an oppressive work environment. To encourage staff members to confirm or refute this opinion, the auditor might best use which of the following tactics?","options_en":{"A":"In an interview, ask staff members if they feel supported by their manager.","B":"In an interview, ask staff members if they enjoy their work.","C":"In an interview, ask staff members to talk about their work environment.","D":"In a questionnaire, ask staff members to rate the work environment on a scale of 1 to 5."},"correct":"C","explanation_en":"Choice \"C\" is correct. Asking staff members to talk openly about their work environment in an interview encourages them to provide detailed, qualitative insights. This approach allows the auditor to gather context-specific information, uncover potential issues, and explore follow-up questions based on their responses. It is more effective than closed or narrowly focused questions, as it enables a deeper understanding of whether an oppressive work environment is contributing to high turnover."},{"id":"M1_U2_Q25","num":25,"total":38,"module":"M1","unit":"U2","topic":"Identifying Information and Evaluating Evidence","question_en":"Which of the following is the most efficient tool to determine whether a specified internal procedure is in place?","options_en":{"A":"Internal control questionnaires.","B":"Observations.","C":"Vouching.","D":"Interviews."},"correct":"A","explanation_en":"Choice \"A\" is correct. Internal control questionnaires are an efficient tool for determining the existence of specific internal procedures, as they systematically collect information on controls and processes."},{"id":"M1_U2_Q26","num":26,"total":38,"module":"M1","unit":"U2","topic":"Identifying Information and Evaluating Evidence","question_en":"Which is the best manual procedure for the internal auditor to use to test the completeness of documented or recorded information?","options_en":{"A":"Vouching.","B":"Reperformance.","C":"Tracing.","D":"Independent confirmation."},"correct":"C","explanation_en":"Choice \"C\" is correct. Tracing ensures that recorded transactions are tracked back to their source to verify completeness."},{"id":"M1_U2_Q27","num":27,"total":38,"module":"M1","unit":"U2","topic":"Identifying Information and Evaluating Evidence","question_en":"A levar internal auditor assigned to carry out an assessment of entity-level controls in a large multinational organization deployed an internal control questionnaire containing 30 questions to 100 employees organizationwide. Respondents only needed to indicate whether they agreed or disagreed with the control questions. What is the major drawback of this approach?","options_en":{"A":"The time taken to cover controls through this approach is lengthy.","B":"Respondents are likely to withhold sharing specific details.","C":"It is difficult to quantify information provided with this approach.","D":"Information provided through this approach can be repudiated by respondents."},"correct":"B","explanation_en":"Choice \"B\" is correct. Binary responses (agree/disagree) often do not capture detailed insights into control deficiencies, leading to a lack of actionable information."},{"id":"M1_U2_Q28","num":28,"total":38,"module":"M1","unit":"U2","topic":"Identifying Information and Evaluating Evidence","question_en":"An internal auditor decided to observe a monthly physical inventory count and determined there were no deviations from established procedures. Which of the following statements is true regarding the limitations of this audit procedure?","options_en":{"A":"Participation in the process by the auditor may levar to a biased attitude and impact independence.","B":"Direct personal observation by an auditor provides less assurance than written and formal inquiries.","C":"The conclusion made about the inventory count cannot be made simply through direct observation.","D":"The evidence obtained cannot be considered representative of what happened on previous counts."},"correct":"D","explanation_en":"Choice \"D\" is correct. This is a significant limitation of an observation. People typically are aware that they are being watched, and as a result, behave differently. Usually, an observation is a reflection of a certain time - meaning the auditor cannot conclude that what is observed is representative of what happened."},{"id":"M1_U2_Q29","num":29,"total":38,"module":"M1","unit":"U2","topic":"Identifying Information and Evaluating Evidence","question_en":"An internal auditor decides to conduct a physical inspection of property at a warehouse rather than having the warehouse manager provide signed documentation of the current inventory. This decision is an indication that the auditor is focused on obtaining what type of evidence?","options_en":{"A":"Relevant evidence.","B":"Reliable evidence.","C":"Useful evidence.","D":"Sufficient evidence."},"correct":"B","explanation_en":"Choice \"B\" is correct. Physical inspection provides the most reliable evidence because it involves direct observation by the auditor, reducing reliance on management-provided documentation, which may be incomplete or biased."},{"id":"M1_U2_Q30","num":30,"total":38,"module":"M1","unit":"U2","topic":"Identifying Information and Evaluating Evidence","question_en":"Which of the following is the most efficient approach for internal auditors to obtain information about the organization's culture?","options_en":{"A":"Use surveys to collect information.","B":"Review existing policies and procedures.","C":"Conduct an informal interview with management.","D":"Review customer satisfaction surveys."},"correct":"A","explanation_en":"Choice \"A\" is correct. Surveys are a cost-effective and efficient way for internal auditors to obtain broad insights into the organization's culture by collecting structured feedback from a variety of respondents."},{"id":"M1_U2_Q31","num":31,"total":38,"module":"M1","unit":"U2","topic":"Identifying Information and Evaluating Evidence","question_en":"Which of the following is the most reliable source for obtaining bank account balances?","options_en":{"A":"An electronic report provided by management of the activity under review.","B":"A statement obtained directly from the e-banking application.","C":"General ledger information obtained from the accounting department.","D":"A physical bank statement provided by management of the activity under review."},"correct":"B","explanation_en":"Choice \"B\" is correct. A statement obtained directly from the e-banking application is the most reliable source, as it eliminates the risk of manipulation and provides real-time, system-generated account balances."},{"id":"M1_U2_Q32","num":32,"total":38,"module":"M1","unit":"U2","topic":"Identifying Information and Evaluating Evidence","question_en":"Which of the following procedures would provide the most reliable audit evidence that payroll information is sufficiently checked for accuracy before being processed?","options_en":{"A":"Reviewing a sample of completed payroll transactions for errors.","B":"Observing payroll staff checking payroll information before processing.","C":"Interviewing the payroll supervisor about checks performed before processing.","D":"Reviewing the control check sheets created by employees before processing."},"correct":"B","explanation_en":"Choice \"B\" is correct. This is the most reliable evidence given the choices. It provides an independent verification of what was done by an objective source."},{"id":"M1_U2_Q33","num":33,"total":38,"module":"M1","unit":"U2","topic":"Identifying Information and Evaluating Evidence","question_en":"What is the purpose of in an internal control questionnaire?","options_en":{"A":"To gather information about control procedures.","B":"To identify the objectives of the activity under review.","C":"To assess the effectiveness of controls.","D":"To assess the design of controls."},"correct":"A","explanation_en":"Choice \"A\" is correct. The primary purpose of an internal control questionnaire is to gather information about the control environment and the existence of specific control procedures."},{"id":"M1_U2_Q34","num":34,"total":38,"module":"M1","unit":"U2","topic":"Identifying Information and Evaluating Evidence","question_en":"Which of the following would provide the internal auditor with the most reliable documentary evidence?","options_en":{"A":"Bank deposit slips obtained from accounts payable.","B":"Vendor invoices obtained from accounts receivable.","C":"Employee time cards obtained directly by the auditor.","D":"Bank statements obtained from the bank."},"correct":"D","explanation_en":"Choice \"D\" is correct. This describes a document with high relicapacidade. There is no \"middleman\"; the chain of communication and custody goes back and forth directly between the internal auditor and the source."},{"id":"M1_U2_Q35","num":35,"total":38,"module":"M1","unit":"U2","topic":"Identifying Information and Evaluating Evidence","question_en":"As part of the preliminary survey activities for an audit of the vendor management process, an internal auditor administers a risk and control questionnaire to selected vendors. What is the purpose of this questionnaire?","options_en":{"A":"To obtain testimonial information about certain controls in the organization's vendor management process.","B":"To validate control information through outside parties independent of the vendor management process.","C":"To ascertain the existence of certain control procedures in the organization's vendor management process.","D":"To obtain physical evidence regarding risks and controls in the vendor management process."},"correct":"C","explanation_en":"Choice \"C\" is correct. The questionnaire is used to ascertain whether specific control procedures exist in the organization's vendor management process, providing insight into the control environment."},{"id":"M1_U2_Q36","num":36,"total":38,"module":"M1","unit":"U2","topic":"Identifying Information and Evaluating Evidence","question_en":"An internal auditor is reviewing operational efficiency within a manufacturing plant. What type of evidence would best ensure that another auditor could reach the same conclusions?","options_en":{"A":"Employee opinions on production efficiency collected in informal discussions.","B":"A verbal confirmation from the plant manager on performance metrics.","C":"A summary report provided by management without supporting details.","D":"Direct observation of production processes and documented workflow analyses."},"correct":"D","explanation_en":"Choice \"D\" is correct. Direct observation and documented analyses provide tangible, repeatable evidence that supports objective conclusions."},{"id":"M1_U2_Q37","num":37,"total":38,"module":"M1","unit":"U2","topic":"Identifying Information and Evaluating Evidence","question_en":"Which of the following best describes a major drawback of observation as an audit procedure?","options_en":{"A":"Observation is limited by the fact that the act of being observed may affect how the process or procedure is performed.","B":"Observation is the least persuasive audit procedure because the internal auditor is obtaining indirect evidence.","C":"Observation should not be combined with other audit procedures when testing the operating effectiveness of controls.","D":"Observation is less effective for testing completeness than it is for testing validity."},"correct":"A","explanation_en":"Choice \"A\" is correct. Observation is limited to the point in time at which it takes place and by the propensity of people to behave differently when they know they are being watched."},{"id":"M1_U2_Q38","num":38,"total":38,"module":"M1","unit":"U2","topic":"Identifying Information and Evaluating Evidence","question_en":"An internal auditor interviewed the accounting clerk to test whether bank reconciliation process rules are being followed. The internal auditor draws a conclusion based on the feedback received. The engagement supervisor questions the internal auditor's approach. Which of the following is the most likely reason for the engagement supervisor's concern?","options_en":{"A":"The information obtained by the internal auditor is not relevant.","B":"The information obtained by the internal auditor is not sufficient.","C":"The information obtained by the internal auditor is not reliable.","D":"The information obtained by the internal auditor is not current."},"correct":"B","explanation_en":"Choice \"B\" is correct. The information gathered by interviewing the accounting clerk may not be sufficient to draw a conclusion, as it likely lacks corroborative evidence or a broader context to validate the observations, prompting the supervisor's concern."},{"id":"M1_U3_Q1","num":1,"total":51,"module":"M1","unit":"U3","topic":"Engagement Supervision","question_en":"Which of the following demonstrates insufficient evidence of engagement supervision?","options_en":{"A":"The supervisor documents their review of workpapers by initialing and dating them and provides feedback to address identified issues.","B":"The supervisor delegates all supervisory responsibilities to a senior auditor and does not review the engagement results personally.","C":"The supervisor holds regular meetings with the engagement team to discuss progresso and address challenges.","D":"The supervisor reviews the engagement work program and ensures it aligns with the engagement objectives."},"correct":"","explanation_en":"Choice “A” is incorrect. Documenting the review of workpapers and providing feedback is a chave aspect of engagement supervision. Choice “B” is correct. The engagement supervisor plays an essential role in supervising and ongoing monitoring throughout the engagement. As per Standard 12.3: Oversee and Improve Engagement Performance, an engagement supervisor must provide internal auditors with guidance throughout the engagement, verify work programs are complete, and confirm engagement workpapers adequately support findings, conclusions, and recommendations. Delegating all supervisory responsibilities without personally reviewing the engagement results demonstrates insufficient evidence of supervision, as the engagement supervisor must ensure quality and conformance with the Standards. Choice “C” is incorrect. Holding regular meetings with the engagement team demonstrates active supervision and promotes communication. Choice “D” is incorrect. Reviewing the engagement work program ensures it aligns with the engagement objectives and is part of the supervisor's responsibilities."},{"id":"M1_U3_Q2","num":2,"total":51,"module":"M1","unit":"U3","topic":"Engagement Supervision","question_en":"An audit supervisor is assigning tasks for an upcoming engagement. What is the most important factor to consider when coordinating wo
