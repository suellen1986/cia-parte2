<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIA Parte 2 – Simulado Interativo</title>
<style>
:root{--p:#1a3a5c;--pl:#2563a8;--ac:#e67e22;--al:#f39c12;--ok:#27ae60;--er:#e74c3c;--bg:#f0f4f8;--cd:#fff;--tx:#1a202c;--mu:#718096;--bd:#e2e8f0;--sh:0 2px 12px rgba(0,0,0,.10)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
nav{background:var(--p);color:#fff;padding:0 20px;height:58px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.2);position:sticky;top:0;z-index:100}
nav h1{font-size:1rem;font-weight:700;letter-spacing:.2px}nav h1 span{color:var(--al)}
.nr{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.lb{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:4px 13px;border-radius:20px;cursor:pointer;font-size:.82rem;font-weight:700;transition:background .2s}
.lb:hover,.lb.on{background:var(--ac);border-color:var(--ac)}
.nt{background:none;border:none;color:rgba(255,255,255,.7);padding:7px 14px;cursor:pointer;font-size:.87rem;border-bottom:3px solid transparent;transition:all .2s}
.nt.on,.nt:hover{color:#fff;border-bottom-color:var(--al)}
.wrap{max-width:1080px;margin:0 auto;padding:22px 14px}
.view{display:none}.view.on{display:block}
.fbar{background:var(--cd);border-radius:12px;padding:14px 18px;margin-bottom:18px;box-shadow:var(--sh);display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.fbar label{font-size:.82rem;font-weight:600;color:var(--mu)}
.fbar select{border:1px solid var(--bd);border-radius:8px;padding:6px 10px;font-size:.88rem;background:var(--bg);color:var(--tx);cursor:pointer;max-width:260px}
.btn{border:none;border-radius:8px;padding:8px 18px;font-size:.88rem;font-weight:600;cursor:pointer;transition:all .18s;display:inline-flex;align-items:center;gap:5px}
.bp{background:var(--pl);color:#fff}.bp:hover{background:var(--p)}
.ba{background:var(--ac);color:#fff}.ba:hover{background:#d35400}
.bo{background:none;border:2px solid var(--bd);color:var(--tx)}.bo:hover{border-color:var(--pl);color:var(--pl)}
.bs{padding:5px 12px;font-size:.8rem}
.qcard{background:var(--cd);border-radius:14px;padding:26px;box-shadow:var(--sh);margin-bottom:18px}
.qmeta{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.bm{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.76rem;font-weight:600}
.bm-m{background:var(--p);color:#fff}
.bm-t{background:#eef2ff;color:var(--pl);border:1px solid #c7d2fe}
.bm-n{background:var(--bg);color:var(--mu);border:1px solid var(--bd)}
.qprog{display:flex;gap:10px;align-items:center;margin-bottom:16px}
.pwrap{flex:1;background:var(--bg);border-radius:10px;height:7px}
.pbar{height:7px;border-radius:10px;background:linear-gradient(90deg,var(--pl),var(--al));transition:width .4s}
.plbl{font-size:.8rem;color:var(--mu);white-space:nowrap}
.qtxt{font-size:1.02rem;line-height:1.75;color:var(--tx);margin-bottom:22px;font-weight:500}
.opts{display:flex;flex-direction:column;gap:9px}
.opt{border:2px solid var(--bd);border-radius:10px;padding:12px 15px;cursor:pointer;transition:all .18s;display:flex;align-items:flex-start;gap:11px;font-size:.95rem;line-height:1.55}
.opt:hover:not(.dis){border-color:var(--pl);background:#f0f7ff}
.opt.sel{border-color:var(--pl);background:#e8f0fe}
.opt.ok{border-color:var(--ok);background:#f0fdf4}
.opt.er{border-color:var(--er);background:#fff5f5}
.opt.dis{cursor:default}
.ol{width:28px;height:28px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.86rem;color:var(--mu);flex-shrink:0;border:2px solid var(--bd);transition:all .18s;margin-top:1px}
.opt.sel .ol{background:var(--pl);color:#fff;border-color:var(--pl)}
.opt.ok .ol{background:var(--ok);color:#fff;border-color:var(--ok)}
.opt.er .ol{background:var(--er);color:#fff;border-color:var(--er)}
.exp{margin-top:18px;padding:15px 19px;border-radius:10px;border-left:4px solid;display:none}
.exp.show{display:block}
.exp.ok{background:#f0fdf4;border-color:var(--ok)}
.exp.er{background:#fff5f5;border-color:var(--er)}
.expt{font-weight:700;font-size:.9rem;margin-bottom:6px}
.exp.ok .expt{color:var(--ok)}.exp.er .expt{color:var(--er)}
.exptx{font-size:.93rem;line-height:1.65;color:#374151}
.qact{display:flex;gap:9px;margin-top:18px;flex-wrap:wrap;align-items:center}
.sp{flex:1}
.dgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:22px}
.sc{background:var(--cd);border-radius:12px;padding:18px;box-shadow:var(--sh);text-align:center}
.sn{font-size:1.9rem;font-weight:800;color:var(--pl)}
.sl{font-size:.83rem;color:var(--mu);margin-top:3px;font-weight:500}
.ttbl{background:var(--cd);border-radius:12px;box-shadow:var(--sh);overflow:hidden}
.ttbl table{width:100%;border-collapse:collapse}
.ttbl th{background:var(--p);color:#fff;padding:11px 15px;text-align:left;font-size:.85rem;font-weight:600}
.ttbl td{padding:10px 15px;border-bottom:1px solid var(--bd);font-size:.87rem;vertical-align:middle}
.ttbl tr:last-child td{border-bottom:none}
.ttbl tr:hover td{background:#f8faff}
.pbw{width:100%;background:var(--bg);border-radius:6px;height:6px;margin-bottom:3px}
.pb{height:6px;border-radius:6px;transition:width .4s}
.pb.g{background:var(--ok)}.pb.m{background:var(--al)}.pb.b{background:var(--er)}
.hlist{display:flex;flex-direction:column;gap:7px}
.hi{background:var(--cd);border-radius:10px;padding:11px 15px;box-shadow:var(--sh);display:flex;gap:11px;align-items:flex-start;cursor:pointer;transition:box-shadow .15s}
.hi:hover{box-shadow:0 4px 16px rgba(0,0,0,.12)}
.hb{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.82rem;color:#fff;flex-shrink:0}
.hb.ok{background:var(--ok)}.hb.er{background:var(--er)}
.toast{position:fixed;bottom:22px;right:22px;background:#333;color:#fff;padding:11px 18px;border-radius:10px;font-size:.88rem;z-index:9999;opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
@media(max-width:600px){.wrap{padding:14px 8px}.qcard{padding:16px}.dgrid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<nav>
  <h1>CIA <span>Parte 2</span> – Simulado</h1>
  <div class="nr">
    <button class="nt on" onclick="showV('quiz')" id="tq">📝 <span id="ltq">Questões</span></button>
    <button class="nt" onclick="showV('dash')" id="td">📊 <span id="ltd">Desempenho</span></button>
    <button class="nt" onclick="showV('hist')" id="th">📋 <span id="lth">Histórico</span></button>
  </div>
</nav>

<div id="v-quiz" class="view on"><div class="wrap">
  <div class="fbar">
    <label id="lmod">Módulo:</label>
    <select id="smod" onchange="onMod()"></select>
    <label id="ltop">Tópico:</label>
    <select id="stop" onchange="applyF()"></select>
    <label id="lmode">Modo:</label>
    <select id="smode" onchange="applyF()">
      <option value="all" id="oall">Todas</option>
      <option value="wrong" id="owrong">Erradas</option>
      <option value="unseen" id="ounseen">Não respondidas</option>
    </select>
    <button class="btn bp bs" onclick="doRand()" id="brand">🔀 Aleatório</button>
    <button class="btn bo bs" onclick="doReset()" id="breset">🗑 Resetar</button>
  </div>
  <div id="qcard" class="qcard"></div>
</div></div>

<div id="v-dash" class="view"><div class="wrap">
  <div class="dgrid" id="dstats"></div>
  <h2 style="margin-bottom:13px;font-size:1.05rem;color:var(--p)" id="lddash">Desempenho por Tópico</h2>
  <div class="ttbl" id="dtbl"></div>
</div></div>

<div id="v-hist" class="view"><div class="wrap">
  <div style="display:flex;gap:10px;margin-bottom:14px;align-items:center;flex-wrap:wrap">
    <h2 style="font-size:1.05rem;color:var(--p)" id="ldhist">Histórico de Respostas</h2>
    <span class="sp"></span>
    <button class="btn bo bs" onclick="doExport()" id="bexp">⬇ Exportar CSV</button>
  </div>
  <div class="hlist" id="hlist"></div>
</div></div>

<div class="toast" id="toast"></div>
<script>
const Q=[{"id":"M1_U1_Q1","num":1,"total":34,"module":"M1","unit":"U1","topic":"Objetivos, Escopo e Critérios de Avaliação do Trabalho","question_pt":"Um auditor interno é designado para revisar o processo da organização de compras. Durante o planejamento, o auditor constata que funcionários de nível hierárquico elevado da área de compras podem não estar disponíveis para entrevistas devido a conflitos de agenda. Qual ação o auditor interno deve considerar para gerenciar essa limitação de forma mais eficaz ao definir o escopo do trabalho de auditoria?","options_pt":{"A":"Limitar o escopo para selecionar pedidos de compra processados por funcionários disponíveis para entrevista durante a fase de trabalho de campo da auditoria.","B":"Documentar a limitação e buscar fontes alternativas de informação onde viável.","C":"Adiar o trabalho de auditoria até que os funcionários da área de compras possam confirmar disponibilidade.","D":"Prosseguir com o trabalho de auditoria e basear-se em documentação disponível."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Documentar a limitação e aproveitando fontes alternativas preserva o escopo do trabalho de auditoria apesar de desafios de agenda."},{"id":"M1_U1_Q2","num":2,"total":34,"module":"M1","unit":"U1","topic":"Objetivos, Escopo e Critérios de Avaliação do Trabalho","question_pt":"Um auditor desenvolveu objetivos para um próximo trabalho de auditoria. no entanto, o Diretor Executivo de Auditoria instruiu o auditor para fazer avaliação preliminar de riscos relevantee para atividade sob revisão e para considerar os resultados ao revisar os objetivos. Por que o Diretor Executivo de Auditoria requerendo este?","options_pt":{"A":"Riscos relevantee para atividade são importante apenas para cumprir com as Normas.","B":"O Diretor Executivo de Auditoria quer que o auditor realizar uma auditoria mais longa.","C":"Riscos relevantee para atividade sob revisão são mais importante fazer que outros entradas para o trabalho de auditoria objetivos.","D":"Objetivos deve concentrar esforços em riscos relevantee para atividade sob revisão."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Definindo adequadamente objetivos e escopo do trabalho antes do trabalho de auditoria começa possibilita que auditores internos para focar esforços em os riscos relevantee para atividade sob revisão com base nos resultados risco do trabalho avaliação."},{"id":"M1_U1_Q3","num":3,"total":34,"module":"M1","unit":"U1","topic":"Objetivos, Escopo e Critérios de Avaliação do Trabalho","question_pt":"Um auditor está revisando eficácia de avaliação critérios utilizado para avaliar relatórios financeiros controles. Qual fator melhor determina se os critérios são específico e alinhado com da organização objetivos?","options_pt":{"A":"Os critérios são desenvolvido baseado exclusivamente em anterior achados de auditoria sem considerando objetivos de controle.","B":"Os critérios permitir para amplo interpretações dependendo não auditor julgamento.","C":"Os critérios focar principalmente em parte interessada comunicação em vez de melhorando controles financeiros.","D":"Os critérios são claramente definido e vinculado a relatórios financeiros precisão e completude."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Claramente definido critérios esse diretamente vincular-se a relatórios financeiros precisão e completude garantir eespecíficoidade e alinhamento com objetivos."},{"id":"M1_U1_Q4","num":4,"total":34,"module":"M1","unit":"U1","topic":"Objetivos, Escopo e Critérios de Avaliação do Trabalho","question_pt":"Um auditor está preparando financeiro conformidade trabalho de auditoria quando alta administraçãas solicitaçõesções uma avaliação de eficiência dos funcionários. Qual é ação mais adequada maneira para tratar este solicitaçõesr enquanto finalizando objetivos do trabalho de auditoria?","options_pt":{"A":"Avaliar eficiência dos funcionários se ele closely alinha-se com o originalmente trabalho de auditoria metas.","B":"Reformular o trabalho de auditoria plano para enfatizar funcionários desempenho métricas sobre financeiro conformidade.","C":"Add eficiência dos funcionários ao escopo sem avaliando seu impacto em outro objetivos.","D":"Informar alta administração esse eficiência avaliações exigir diferente tipo de trabalho de auditoria."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Determinando se o adicional área alinha-se com originalmente objetivos garante o trabalho de auditoria reprincipals focused e relevantee."},{"id":"M1_U1_Q5","num":5,"total":34,"module":"M1","unit":"U1","topic":"Objetivos, Escopo e Critérios de Avaliação do Trabalho","question_pt":"Uma organização declarou esse seu valores incluir fornecendo menor-custo produtos para seu clientes possível, e parte de este filosofia é reflected em um recusa para adotar corporativo social responsabilidade programa. Quando definindo objetivos para um solicitaçõesdo trabalho de consultoria em como para reduzir custos trabalhistas, que representa o melhor trabalho de auditoria objetivo listed para apresentar para administração para discussão e aprovação?","options_pt":{"A":"Avaliar o usar de contratados para avoid pagamento de benefícios.","B":"Avaliar salários contra o local mercado de trabalho para constatar áreas de remuneração excessiva.","C":"Avaliar se adoption de um corporativo social responsabilidade programa deveria reduzir longo prazo custos trabalhistas.","D":"Determinar se trabalhadores fazer um salário digno e se este é adequado para propósitos de moral."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Avaliando salários contra o local mercado de trabalho trata o meta de reduzindo custos trabalhistas e alinha-se com da organização valores."},{"id":"M1_U1_Q6","num":6,"total":34,"module":"M1","unit":"U1","topic":"Objetivos, Escopo e Critérios de Avaliação do Trabalho","question_pt":"Qual das seguintes é um adequado trabalho de auditoria objetivo?","options_pt":{"A":"Para observar o físico contagem de estoque.","B":"Para determinar se estoque níveis são suficiente para atender às vendas projetadas.","C":"Para buscar para o existence de obsolete estoque por calculando giro de estoque por produto linha.","D":"Para incluir informação sobre rupturas de estoque não comunicação final do trabalho de auditoria."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Trabalho de auditoria objetivos focar em avaliando se de uma organização processos, controles, e sistemas eficazmente atingir específico metas. Em este caso, determinando se estoque níveis são suficiente para atender às vendas projetadas é claro, mensurável, e relevantee objetivo para um trabalho de auditoria. Ele alinha-se com o propósito de avaliando estoque administração processos e garantindo esse negócio objetivos são met."},{"id":"M1_U1_Q7","num":7,"total":34,"module":"M1","unit":"U1","topic":"Objetivos, Escopo e Critérios de Avaliação do Trabalho","question_pt":"Um auditor interno está planejando uma revisão marketing departamento. O marketing equipe solicitações adicional cobertura em gastos com promoção. Que abordagem melhor trata este solicitaçõesr enquanto preservando escopo do trabalho de auditoria?","options_pt":{"A":"Informar o marketing equipe seus solicitaçõesr irá ser escalado então esse consideração pode ser fornecidos para undertaking uma revisão de este área em alguns point não futuro.","B":"Limitar revisão ao predefined objetivos e cronograma adicional auditoria para focar em gastos com promoção.","C":"Ampliar o planejado testando para incluir o adicional promotional processos em toda múltiplos departamentos.","D":"Incorporar relevantee gastos com promoção preocupações esse fit o estabelecido escopo."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Incorporandas solicitaçõesçõesções das partes interessadas esse alinhar-se com o escopo ajuda tratar novo preocupações sem comprometer existente objetivos."},{"id":"M1_U1_Q8","num":8,"total":34,"module":"M1","unit":"U1","topic":"Objetivos, Escopo e Critérios de Avaliação do Trabalho","question_pt":"Que declaração mais com precisão descreve como critérios são estabelecido para usar por auditores internos em determinando se da organização metas e objetivos têm sido alcançado?","options_pt":{"A":"A empresa setor estabelece critérios por meio de parâmetros de referência e melhor práticas.","B":"Financeiro e contabilidade reguladores estabelecer os critérios.","C":"Administração e/ou o conselho estabelecer os critérios.","D":"Auditores internos usar profissional Normas ou governo regulamentações para estabelecer os critérios."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Auditores internos basear-se em critérios estabelecido por administração ou o conselho para avaliar se metas e objetivos têm sido atingido. Enquanto profissional Normas ou setor parâmetros de referência pode guide avaliações, o ultimate responsabilidade para definindo estes critérios rests com a organização liderança. Este garante alinhamento com da organização único metas e contexto."},{"id":"M1_U1_Q9","num":9,"total":34,"module":"M1","unit":"U1","topic":"Objetivos, Escopo e Critérios de Avaliação do Trabalho","question_pt":"Uma auditoria equipe está planejando para examinar recentemente introduced implantação de software. O ele gestor solicitações adicional cobertura para incluir satisfação fazer retorno dos usuários. Que abordagem eficazmente documentara e trata este solicitaçõesr dentro do escopo do trabalho de auditoria?","options_pt":{"A":"Replace o implantação de software revisar com um principal focar em usuário experiência dados.","B":"Add retorno dos usuários ao existente objetivos se ele alinha-se com o planejado escopo.","C":"Manter o inicial objetivos sem reconhecendas solicitaçõesçõesr preservar escopo boundaries.","D":"Informar o ele gestor esse retorno dos usuários é fora do escopo e não pode ser incluído."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Incluindo satisfação fazer usuário dados esse se ajusta ao planejado escopo mantém capacidade de resposta para parte interessada necessidades."},{"id":"M1_U1_Q10","num":10,"total":34,"module":"M1","unit":"U1","topic":"Objetivos, Escopo e Critérios de Avaliação do Trabalho","question_pt":"Administração de uma atividade sob revisão reclama ao Diretor Executivo de Auditoria esse trabalho sendo realizado por auditores é fora fazer escopo e solicitações esse eles parar. Qual é melhor maneira para o Diretor Executivo de Auditoria para responder se ela believes o auditores são fazendo procedimento correto?","options_pt":{"A":"Persuadir o gestor para permitir o auditores para continuar seus trabalho.","B":"Revisar o estatuto de auditoria interna com o gestor, destacando esse interno auditoria tem \"acesso para todos áreas.\"","C":"Cronograma reunião com o gestor e o CEO para colaborar em resolver questão.","D":"Explicar ao gestor como auditores' trabalho relates ao escopo do trabalho de auditoria como descrito não carta de anúncio."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Explaining como auditores' trabalho alinha-se com o escopo do trabalho de auditoria trata o gestor preocupação e mantém auditoria credibilidade."},{"id":"M1_U1_Q11","num":11,"total":34,"module":"M1","unit":"U1","topic":"Objetivos, Escopo e Critérios de Avaliação do Trabalho","question_pt":"Em uma organização com um menos maduro governança sistema, Qual das seguintes alternativas deveria ser um adequado ação pela função de auditoria interna?","options_pt":{"A":"Comparando atual estrutura de governança e práticas contra regulamentações e outro conformidade requisitos.","B":"Auditoria o desenho e eficácia de específico governança-relacionado processos.","C":"Analisando a transparência e divulgação práticas entre parts estrutura de governança.","D":"Avaliando melhor práticas para usar pela organização."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Quando menos maturidade em governança processos predomina, função de auditoria interna tends para focar mais em realizando auditorias pontuais, fornecendo orientação em relação a ótimo estrutura e práticas, e comparando atual estrutura de governança e práticas contra regulamentações e outro conformidade requisitos."},{"id":"M1_U1_Q12","num":12,"total":34,"module":"M1","unit":"U1","topic":"Objetivos, Escopo e Critérios de Avaliação do Trabalho","question_pt":"Um auditor está conduzindo um interno revisar de projeto governança quando liderança solicitações esse o escopo ser reduzido para focar apenas em custo controles. Qual é o mais eficaz resposta?","options_pt":{"A":"Adiar o trabalho de auditoria até que liderança confirma o completo escopo de revisar.","B":"Avaliar se as solicitaçõesçõesdo mudança alinha-se com objetivos do trabalho de auditoria antes de modificando escopo.","C":"Imediatamente ajustar o escopo para excluir todos governança-relacionado procedimentos.","D":"Continuar com o originalmente escopo e informar liderança esse custo controle é separado questão."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Garantindo esse escopo mudanças apoiar o originalmente objetivos ajuda manter integridade trabalho de auditoria."},{"id":"M1_U1_Q13","num":13,"total":34,"module":"M1","unit":"U1","topic":"Objetivos, Escopo e Critérios de Avaliação do Trabalho","question_pt":"Uma organização tem migrou de manual processos para automatizado sistemas de TI para gerenciando seu negócio operações. Durante uma auditoria, O auditor interno foca em avaliando sistema controles para garantir esse negócio objetivos são atingido eficazmente. Qual é o principal tipo de garantia o auditor busca?","options_pt":{"A":"Garantia obtido por terceiros revisar.","B":"Garantia obtido por auditoria externo ele interfaces.","C":"Garantia em relação a histórico dados precisão.","D":"Garantia em relação a processos."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Quando organizações shift de manual métodos para ele-baseado sistemas, auditores focar em processo garantia. Este envolve avaliando ele sistema controles, fluxos de trabalho, e configurações para garantir eles são elaborado e operated eficazmente para meet negócio objetivos. Por examining estes processos, auditores pode determinar a confiabilidade sistema em atingindo preciso, consistente, e seguro operações."},{"id":"M1_U1_Q14","num":14,"total":34,"module":"M1","unit":"U1","topic":"Objetivos, Escopo e Critérios de Avaliação do Trabalho","question_pt":"Qual é o mais provável reason um auditor interno deveria entrevista operacional administração durante planejamento do trabalho?","options_pt":{"A":"Para ajudar O auditor interno compreender os objetivos área ou processo sob revisão.","B":"Para determinar se administração followed por meio de em planos de ação de um anterior trabalho de consultoria.","C":"Para validar o trabalho de auditoria trabalho programa.","D":"Para determinar se operacional administração tem suficiente conhecimento de riscos e controles."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Entrevistas com operacional administração durante planejamento do trabalho fornecer valioso percepções não objetivos, processos, e riscos atividade sob revisão, garantindo esse o auditor tem claro compreensão trabalho de auditoria contexto."},{"id":"M1_U1_Q15","num":15,"total":34,"module":"M1","unit":"U1","topic":"Objetivos, Escopo e Critérios de Avaliação do Trabalho","question_pt":"Um auditor interno foi solicitaçõesdo para revisar a tesouraria departamento conformidade com corporativo política relacionado usar de negociação futura para gerenciar valoração cambial risco. O auditor identifica não relacionado políticas não corporativo política manual mas faz descobrir esse o departamento é seguinte uma política desenvolvido por a empresa banco. Qual das seguintes seria mais adequada resposta auditor?","options_pt":{"A":"Retirar-se trabalho de auditoria, porque há é nada para auditoria devido ao falta de um corporativo política.","B":"Usar o banco política como auditoria critérios e determinar se adoção formal deve ser recomendado não comunicação final do trabalho de auditoria.","C":"Adiar auditoria trabalho de auditoria até que corporativo política pode ser estabelecido.","D":"Realizar não adicional trabalho de auditoria e relatório falta de um corporativo política como uma auditoria observação."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Quando corporativo política é ausente, ele é adequado para usar o banco política como temporário auditoria critério, como ele fornece relevantee orientação. O auditor deve também avaliar se adoção formal de tal uma política é necessário e incluir este recomendação no relatório final relatório, garantindo a organização fortalece seu estrutura de governança."},{"id":"M1_U1_Q16","num":16,"total":34,"module":"M1","unit":"U1","topic":"Objetivos, Escopo e Critérios de Avaliação do Trabalho","question_pt":"Um auditor interno está elaborando objetivos para um próximo trabalho de avaliação. Qual das seguintes alternativas deveria mais diretamente influenciar os objetivos sendo elaborou?","options_pt":{"A":"Anterior relatório de auditoria.","B":"Administração entrevista.","C":"Sistema passo a passo fazer processo.","D":"Preliminar avaliação de riscos."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Preliminar avaliação de riscos identifica principal riscos e prioridades para o trabalho de auditoria, diretamente influenciando os objetivos sendo elaborou e garantindo auditoria foca em áreas de greatest importance."},{"id":"M1_U1_Q17","num":17,"total":34,"module":"M1","unit":"U1","topic":"Objetivos, Escopo e Critérios de Avaliação do Trabalho","question_pt":"Um auditor interno está avaliando a avaliação critérios utilizado em uma auditoria de conformidade. Que fator melhor garante esse os critérios são prático e relevantee para organização objetivos?","options_pt":{"A":"Os critérios focar apenas em áreas onde anterior não conformidade tem ocorreu.","B":"Os critérios alinhar-se com regulatório requisitos e interno conformidade políticas.","C":"Os critérios incluir subjetivo opiniões de departamento gestores.","D":"Os critérios considerar setor parâmetros de referência."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Prático e relevantee avaliação critérios deve alinhar-se com ambos externo regulamentações e interno conformidade políticas para garantir eficácia."},{"id":"M1_U1_Q18","num":18,"total":34,"module":"M1","unit":"U1","topic":"Objetivos, Escopo e Critérios de Avaliação do Trabalho","question_pt":"Uma organização é experiencing frequente ativo perdas devido a inadequado processos. Para que categoria de objetivos deve administração focar seu esforços para tratar o salvaguarda de ativos ou recursos?","options_pt":{"A":"Conformidade objetivos.","B":"Estratégico objetivos.","C":"Relatórioando objetivos.","D":"Operacional objetivos."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. salvaguarda de ativos é principalmente associated com operacional objetivos. Estes objetivos são projetado para garantir o eficaz e eficiente usar de recursos, incluindo proteção de ativos de perda, furto, ou uso indevido. relatórioando objetivos focar em a precisão de financeiro ou operacional relatórioando, enquanto conformidade objetivos garantir adherence para leis e regulamentações. Estratégico objetivos, não outro hand, relacionar para longo prazo metas e visão."},{"id":"M1_U1_Q19","num":19,"total":34,"module":"M1","unit":"U1","topic":"Objetivos, Escopo e Critérios de Avaliação do Trabalho","question_pt":"Uma revisão de um banco conformidade departamento por reguladores destacou múltiplos casos onde limiar transações foram não detectado devido a falho transação- monitorando software. Administração pretende para solicit propostas de um lista de fornecedores para fornecer mais abrangente e confiável monitoramento de transações ferramenta. Após o ferramenta é adquirido e implementado, função de auditoria interna irá realizar acompanhamento auditoria. Qual das seguintes alternativas objetivos deveria ser mais relevantee para o auditoria?","options_pt":{"A":"Avaliar o adequação de competência para todos usuários software.","B":"Avaliar o nível de conformidade com o banco compras e aquisições política durante o aquisição novo software.","C":"Determinar o eficácia operacional novo ferramenta em detectando relatórioable transações.","D":"Avaliar o adequação novo monitoramento de transações software arquitetura."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Determinando eficácia operacional transação- monitorando ferramenta garante esse o ferramenta resolves o anteriormente identificado deficiências e meets seu pretendido propósito de detectando relatórioable transações."},{"id":"M1_U1_Q20","num":20,"total":34,"module":"M1","unit":"U1","topic":"Objetivos, Escopo e Critérios de Avaliação do Trabalho","question_pt":"Um auditor interno está avaliando eficácia de uma organização processo de compras. Que critério deveria ser o mais relevantee para avaliando conformidade com interno políticas?","options_pt":{"A":"Número de compras e aquisições funcionários relativo para compra volume.","B":"Frequência de fornecedor comunicação e relação força.","C":"Velocidade em que pedidos de compra são processado.","D":"Alinhamento com aprovado compras e aquisições procedimentos e autorização limita."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Avaliando conformidade exige avaliando se compras e aquisições atividades alinhar-se com interno procedimentos e autorização requisitos."},{"id":"M1_U1_Q21","num":21,"total":34,"module":"M1","unit":"U1","topic":"Objetivos, Escopo e Critérios de Avaliação do Trabalho","question_pt":"Uma função de auditoria interna é charged com medindo a conformidada organização recursos humanos área com aplicável leis, regulamentações, e interno políticas. Qual das seguintes alternativas objetivos deveria ser adequado para este trabalho de auditoria plano?","options_pt":{"A":"Para estabelecer proof de citizenship por requerendo certidão de nascimento.","B":"Para question recentemente contratado funcionários para avaliar conformidade com o processo de entrevistao.","C":"Para avaliar o processo utilizado por recursos humanos para responder para funcionário reclamações.","D":"Para garantir esse grupos de candidatos representa fair representação diversificada população."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Um trabalho de auditoria objetivo é amplo declaração destinado definir o trabalho de auditoria accomplishments. Este poderia incluir avaliando tal itens de conformidade como documentação de comprovação de residência e reclamação resposta processos. Garantindo esse candidatos representa representação diversificada população deveria ser um operacional objetivo para recursos humanos em vez de um trabalho de auditoria objetivo para interno auditoria. Ele poderia também ser um objetivo para avaliar conformidade entrevista processo com leis, regulamentações, e políticas, mas o objetivo deveria não specify o manner de accomplishing ele (e.g., por entrevistaring recentemente contratado funcionários ou requerendo certidão de nascimento)."},{"id":"M1_U1_Q22","num":22,"total":34,"module":"M1","unit":"U1","topic":"Objetivos, Escopo e Critérios de Avaliação do Trabalho","question_pt":"Um auditor receives múltiplos solicitaçõesções das partes interessadas para avaliar conformidade com novo dados privacidade regulamentações. O originalmente escopo inclui apenas uma revisão de existente privacidade protocolos. Que abordagem deveria ajudar manter claro registro de essas solicitaçõesções enquanto finalizando o trabalho de auditoria plano?","options_pt":{"A":"Informar partes interessadas esse seus solicitações irá ser consolidated para um futuro conformidade revisar.","B":"Manter o atual escopo e observar solicitaçõesções das partes interessadas para consideração em um subsequente trabalho de auditoria.","C":"Registrar as solicitaçõesções e analisar como novo regulatório requisitos alinhar-se com o originalmente escopo.","D":"Converter o trabalho de auditoria em abrangente regulatório conformidade revisar em todas as departamentos envolvido."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Registrando e avaliando adicional solicitações ajudar garantir adequado escopo ajuste enquanto Documentando parte interessada entrada."},{"id":"M1_U1_Q23","num":23,"total":34,"module":"M1","unit":"U1","topic":"Objetivos, Escopo e Critérios de Avaliação do Trabalho","question_pt":"Qual das seguintes alternativas considerações por um auditor interno é mais crítico em determinando auditoria objetivos do trabalho de auditoria?","options_pt":{"A":"O escopo auditoria.","B":"O propósito auditoria.","C":"A competência disponível funcionários.","D":"O hours planejado para o auditoria."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. De acordo com a Normas Globais de Auditoria Interna, o trabalho de auditoria objetivos deve articulate o propósito trabalho de auditoria e descrever o específico metas para ser atingido."},{"id":"M1_U1_Q24","num":24,"total":34,"module":"M1","unit":"U1","topic":"Objetivos, Escopo e Critérios de Avaliação do Trabalho","question_pt":"Uma organização está implementando mede para melhorar seu capacidade para gerenciar negócio operações eficazmente e eficientemente. Qual das seguintes alternativas ações melhor representa este objetivo?","options_pt":{"A":"Coletando útil, confiável, e tempestivo informação para decisão tomada.","B":"Salvaguarda de ativos (físico, human, informação).","C":"Cumprindo com interno políticas e procedimentos.","D":"Determinando se correto relatórios são fornecidos ao adequado gestores na organização."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Eficaz e eficiente administração de negócio operações frequentemente inclui salvaguarda de ativos, que garante o proteção e ótimo usar de físico, human, e informaçõesal recursos. Este alinha-se com operacional objetivos focado em mantendo eficiência e reduzindo riscos. Enquanto outro opções tratar aspectos de relatórioando, decisão-tomada, e política conformidade, eles são não como diretamente tied ao overarching meta de gerenciando operações eficazmente e eficientemente."},{"id":"M1_U1_Q25","num":25,"total":34,"module":"M1","unit":"U1","topic":"Objetivos, Escopo e Critérios de Avaliação do Trabalho","question_pt":"Qual das seguintes é um exemplo de uma vantagem competitiva?","options_pt":{"A":"Baixo investimento de capital exigido para entrada não mercado.","B":"Acesso para alto-custo trabalho.","C":"Facilmente duplicável tecnoregistraria.","D":"Fiéis e satisfeitos clientes."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. fiéis e satisfeitos clientes fornecer sustentável vantagem competitiva por meio de repeat negócio e defesa da marca."},{"id":"M1_U1_Q26","num":26,"total":34,"module":"M1","unit":"U1","topic":"Objetivos, Escopo e Critérios de Avaliação do Trabalho","question_pt":"Escopo declarações para garantia trabalho de auditorias pode incluir Qual das seguintes alternativas?","options_pt":{"A":"Áreas excluídas escopo.","B":"Colaborativo definição entre auditor e atividade sob revisão.","C":"Final relatório distribuição.","D":"Declaração esse o tempo frame revisado deverá não ser limitado."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Áreas excluídas de escopo esclarecer o focar e boundaries trabalho de auditoria, reduzindo ambiguidade."},{"id":"M1_U1_Q27","num":27,"total":34,"module":"M1","unit":"U1","topic":"Objetivos, Escopo e Critérios de Avaliação do Trabalho","question_pt":"Durante uma auditoria operacional, auditoria equipe está revisando avaliação critérios para medindo processo eficiência. Que característica melhor garante esse os critérios irá produce confiável comparações?","options_pt":{"A":"Os critérios incluir geral diretrizes em vez de específico desempenho mede.","B":"Os critérios mudança dependendo não departamento sendo audited para permitir para flexibilidade.","C":"Os critérios são com base em mensurável desempenho indicadores consistentemente aplicado em todas as unidades.","D":"Os critérios focar principalmente em retorno dos empregados em relação a processo eficiência."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Usando mensurável e consistentemente aplicado desempenho indicadores garante esse avaliações produce confiável comparações."},{"id":"M1_U1_Q28","num":28,"total":34,"module":"M1","unit":"U1","topic":"Objetivos, Escopo e Critérios de Avaliação do Trabalho","question_pt":"Um contínuo auditoria de conformidade reveals novo riscos relacionado terceiros fornecedores que foram não inicialmente considerado. Como deve o auditor tratar este mudança?","options_pt":{"A":"Recomendar esse fornecedor-relacionado riscos ser avaliado em um separado auditoria.","B":"Reconhecer o fornecedor riscos mas continuar com o originalmente escopo; o orçamento teve sido set.","C":"Determinar se o novo riscos justificar um ajuste ao escopo e documentar qualquer necessário modificações.","D":"Ampliar auditoria escopo para incluir todos terceiros fornecedor relações."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Avaliando se o novo riscos exigir um ajuste garante auditoria reprincipals abrangente e útil."},{"id":"M1_U1_Q29","num":29,"total":34,"module":"M1","unit":"U1","topic":"Objetivos, Escopo e Critérios de Avaliação do Trabalho","question_pt":"Qual das seguintes alternativas deveria melhor ajudar auditores internos estabelecer objetivos do trabalho de auditoria durante fase de planejamento?","options_pt":{"A":"Avaliações de riscos preparado por administração.","B":"Demonstrações financeiras anterior ano.","C":"Lucros por ação figures.","D":"Analysts' prever expectativas."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Auditores internos tipicamente revisar avaliações de riscos (ambos esses preparado por administração e esses anteriormente preparado por função de auditoria interna) e anterior relatórios de auditoria para aid em estabelecendo objetivos do trabalho de auditoria durante planejamento do trabalho."},{"id":"M1_U1_Q30","num":30,"total":34,"module":"M1","unit":"U1","topic":"Objetivos, Escopo e Critérios de Avaliação do Trabalho","question_pt":"Uma auditoria equipe teve sido asked para realizar uma auditoria operacional em um subsidiária estoque administração. Administração não subsidiária declarou esse certain remoto armazém localizações são inacessíveis devido a safety preocupações. Que método deveria melhor ajudar a auditoria equipe refine o trabalho de auditoria objetivos em light acesso constraint?","options_pt":{"A":"Solicitaçõesr esse restrições de segurança ser lifted para o auditoria equipe imediatamente.","B":"Redirect o trabalho de auditoria para focar em relatórios financeiros em vez de operacional processos.","C":"Observar o constraint e ajustar auditoria técnicas para analisar disponível estoque dados remotamente.","D":"Realizar completo físico inspeção principal armazém e excluir remoto locais."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Tratando constraint e usando remoto procedimentos ou outro verificação métodos garante esse o trabalho de auditoria objetivos reprincipal relevantee e viável."},{"id":"M1_U1_Q31","num":31,"total":34,"module":"M1","unit":"U1","topic":"Objetivos, Escopo e Critérios de Avaliação do Trabalho","question_pt":"Um auditor interno deve usar Qual das seguintes alternativas como principalbasepara determinando os objetivos de um próximo trabalho de auditoria?","options_pt":{"A":"Solicitações recebido de administração durante o entrance conferência.","B":"A disponibilidade de auditoria recursos e restrições de tempo auditoria equipe.","C":"As recomendações feita em anterior relatórios de auditoria não mesmo atividade.","D":"Resultados de uma avaliação de riscos realizado na atividade sob revisão."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Determinando objetivos de auditoria deve ser baseado em riscos, alinhando-se com identificado riscos atividade sob revisão. Este garante esse auditoria foca em áreas de greatest potencial impacto e relevância."},{"id":"M1_U1_Q32","num":32,"total":34,"module":"M1","unit":"U1","topic":"Objetivos, Escopo e Critérios de Avaliação do Trabalho","question_pt":"Durante fase de planejamento de um segurança cibernética auditoria, a organização experiences dados breach, prompting executivos para solicitaçõesr um imediato focar em incidente resposta controles. Como deve o auditor tratar este solicitaçõesr?","options_pt":{"A":"Avaliar se o trabalho de auditoria objetivos pode ser ajustado para incorporar incidente resposta controles.","B":"Delegate o incidente resposta revisar um externo segurança cibernética consultor.","C":"Prosseguir com o originalmente segurança cibernética escopo e tratar incidente resposta no próximo auditoria ciclo.","D":"Expandir o escopo significativamente para incluir todos segurança incidentes nos últimos three years."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Avaliando viabilidade de incorporando incidente resposta controles garante auditoria reprincipals relevantee e valioso."},{"id":"M1_U1_Q33","num":33,"total":34,"module":"M1","unit":"U1","topic":"Objetivos, Escopo e Critérios de Avaliação do Trabalho","question_pt":"Um auditor interno está desenvolvendo escopo para um capital projetos trabalho de auditoria. Múltiplos partes interessadas submeter solicitações avaliar se o projetos alinhar-se com a organização novo sustentabilidade metas. Que ação deveria garantir essas solicitaçõesções são adequadamente gerenciado e documentarado?","options_pt":{"A":"Limitar revisão de sustentabilidade preocupações para esses esse diretamente impacto investimento de capital decisões.","B":"Forward as solicitaçõesções um externo consultor para um separado, não relacionado à auditoria projeto.","C":"Adiar sustentabilidade-relacionado avaliações até que o próximo agendado auditoria ambientaloria é conduzido.","D":"Registrar as solicitaçõesções e determinar se sustentabilidade metas se enquadram dentro do atual objetivos."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Revisando se sustentabilidade metas alinhar-se com o planejado focar garante parte interessada preocupações são tratado adequadamente."},{"id":"M1_U1_Q34","num":34,"total":34,"module":"M1","unit":"U1","topic":"Objetivos, Escopo e Critérios de Avaliação do Trabalho","question_pt":"Um auditor está revisando eficiência de uma empresa folha de pagamento processamento. Que critério deveria ser o mais adequado para avaliando eficácia de folha de pagamento controles?","options_pt":{"A":"Precisão e pontualidade de folha de pagamento desembolsos compared para estabelecido políticas.","B":"Funcionário opiniões em folha de pagamento departamento capacidade de resposta.","C":"O duração folha de pagamento ciclo compared para outro companies no setor.","D":"O número de folha de pagamento departamento funcionários."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Avaliando folha de pagamento controles exige medindo precisão e adherence para políticas para garantir adequado processamento."},{"id":"M1_U2_Q1","num":1,"total":38,"module":"M1","unit":"U2","topic":"Identificação de Informações e Avaliação de Evidências","question_pt":"Um auditor interno é mais provável que usar sim/não questionário para Qual das seguintes alternativas reasons?","options_pt":{"A":"Para coletar uniforme informação de todos informantes para preciso comparações.","B":"Para coletar informação para todos tipos de questões.","C":"Para coletar aprofundado conhecimento.","D":"Para observar respondentes' comportamento e ambiente."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. sim/não questionários são eficaz para coletando uniforme informação para possibilitar preciso comparações em toda respondentes."},{"id":"M1_U2_Q2","num":2,"total":38,"module":"M1","unit":"U2","topic":"Identificação de Informações e Avaliação de Evidências","question_pt":"Alta administraçãas solicitaçõesçõesdo special estoque armazém auditoria devido a recente fraude na área. Primeiro, O auditor interno planos para verificar o atual estoque no armazém. Qual das seguintes alternativas fontes deveria ser confiável para verificar o atual estoque no armazém?","options_pt":{"A":"Um estoque listagem estoque administração software obtido por O auditor interno sem o ajudar de administração.","B":"Um estoque conta saldo de atual contas gerenciais.","C":"Um contagem de estoque realizado por administração atividade sob revisão enquanto O auditor interno observa.","D":"Um estoque saldo mais recentemente publicadas demonstrações financeiras, verificado por o auditor externo."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Observando um contagem de estoque realizado por administração garante o auditor diretamente verifica o estoque, fornecendo confiável e independente avaliação atual estoque níveis."},{"id":"M1_U2_Q3","num":3,"total":38,"module":"M1","unit":"U2","topic":"Identificação de Informações e Avaliação de Evidências","question_pt":"Durante uma auditoria de uma empresa processo de compras, Qual das seguintes alternativas deveria um auditor interno usar para reconciliar fornecedor conta saldo?","options_pt":{"A":"Cópias fornecedor conta saldo confirmação fornecido pelo compras e aquisições área.","B":"Um conta saldo confirmação obtido diretamente fornecedor.","C":"O fornecedor conta saldo, obtido compras e aquisições área recurso planejando sistema.","D":"O fornecedor conta saldo detalhes em um formato de planilha, fornecido pelo compras e aquisições área."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Um conta saldo confirmação obtido diretamente fornecedor fornece independente e confiável evidências para conciliação saldos, reunião auditoria Normas para precisão e confiabilidade."},{"id":"M1_U2_Q4","num":4,"total":38,"module":"M1","unit":"U2","topic":"Identificação de Informações e Avaliação de Evidências","question_pt":"Um auditor interno entrevistou o head de segurança como parte de um trabalho de auditoria para avaliar o protegendo de sensível equipamento em instalações. Com base em este entrevista, o auditor concluded esse o instalações tinha adequado segurança mede em place para proteger o sensível equipamento. Qual das seguintes alternativas ações deve o auditor têm taken para meet o trabalho de auditoria objetivo?","options_pt":{"A":"O auditor deve têm realizado inspeções presenciais instalações para corroborar informação obtido entrevista.","B":"O auditor deve têm compared o segurança políticas e procedimentos à informação fornecido entrevista e buscared para discrepâncias.","C":"O auditor deve têm realizado acompanhamento entrevistas com o head de segurança e determinar se respostas são consistente com primeiro entrevista.","D":"O auditor deve têm entrevistou adicional segurança pessoal para corroborar o relato antes de Documentando conclusão."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. inspeções presenciais fornecer direto evidências e corroborar informação obtido durante entrevistas, garantindo fazer auditor conclusões sobre segurança mede são apoiado por confiável evidências."},{"id":"M1_U2_Q5","num":5,"total":38,"module":"M1","unit":"U2","topic":"Identificação de Informações e Avaliação de Evidências","question_pt":"Novo funcionários auditor, quem tem um undergraduate grau em psychoregistrary, sugere esse questionário ser desenvolvido para examinar bus drivers' attitudes em direção a departamental operações, overtime, número de hours/miles driven, etc. Função de auditoria interna tem nunca utilizado questionários like este antes de. Deve o Diretor Executivo de Auditoria aprovar o desenvolvimento e usar de tal questionário?","options_pt":{"A":"Sim, questionários são mais objetivo form de evidências coletando fazer que observação e entrevistas.","B":"Não, trabalho de auditoria deve ser confined para objetivo dados então esse auditoria independência é não compromised.","C":"Sim, os dados deveria ser relevantee para compreensão o causes de acidentes e falhas.","D":"Não, auditoria departamento faz não têm suficiente especialização em desenvolvendo tal questionários."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. O usar de questionários deve ser aprovado, como questionários fornecer relevantee, objetivo dados. Se necessidade, normas de auditoria permitir fora de especialização para ser utilizado para desenvolver o questionário. Objetividade é secundário questão para relevancy."},{"id":"M1_U2_Q6","num":6,"total":38,"module":"M1","unit":"U2","topic":"Identificação de Informações e Avaliação de Evidências","question_pt":"Qual das seguintes é um principal reason para um auditor interno para usar um risco e controle questionário quando auditoria financeiro processos?","options_pt":{"A":"Para testar eficácia de controles financeiros em um eficiente e relativamente inexpensive maneira.","B":"Para coletar como much dados financeiros como possível antes de trabalho de campo begins.","C":"Para obter um compreensão ambiente de controle.","D":"Para facilitar a quantificação de dados financeiros obtido."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Usando um risco e controle questionário ajuda obter um compreensão ambiente de controle por identificando potencial deficiências de controle e riscos, fornecendo estrutura para planejando adicional procedimentos de auditoria."},{"id":"M1_U2_Q7","num":7,"total":38,"module":"M1","unit":"U2","topic":"Identificação de Informações e Avaliação de Evidências","question_pt":"Empresa esse suprimentos medicamentos para grande hospitais depende heavily em subcontratados para replenish qualquer shortages dentro de 24 hours. Onde deve auditores internos look para evidências esse subcontratados são held responsável por este obrigação?","options_pt":{"A":"O subcontratado registro de riscos.","B":"O signed serviço-nível acordo.","C":"A empresa código de ética.","D":"O subcontratados' anual satisfaction pesquisa."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. O signed serviço-nível acordo é o contractual evidências outlining subcontratado obligations."},{"id":"M1_U2_Q8","num":8,"total":38,"module":"M1","unit":"U2","topic":"Identificação de Informações e Avaliação de Evidências","question_pt":"Um auditor interno propõe usando um controle interno questionário durante uma auditoria da organização operações. Qual deveria ser o principal propósito de usando tal questionário?","options_pt":{"A":"Para avaliar o desenho e eficácia de controles.","B":"Para comparar atividades de controle com outro disponível fontes não operações.","C":"Para validar controle informação por meio de partes independente operações.","D":"Para coletar informação sobre o ambiente de controle e o existence de específico controles."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. O principal propósito de um controle interno questionário é para coletar informação sobre o ambiente de controle e o existence de específico controle procedimentos."},{"id":"M1_U2_Q9","num":9,"total":38,"module":"M1","unit":"U2","topic":"Identificação de Informações e Avaliação de Evidências","question_pt":"Qual das seguintes alternativas representa possível fraqueza relacionado usar de observação pelo auditor interno durante portion físico contagem de estoque?","options_pt":{"A":"Observação contagem de estoque procedimentos fornece evidências de conformidade para contagem procedimentos e directives.","B":"Observação fornece direto evidências ao auditor adequação contageming processo.","C":"As evidências obtido por observação é mais persuasive fazer que o revisar de empresa procedimentos relacionado físico estoque.","D":"Resultados de observação físico contagem de estoque fornecer credible evidências em um fixed tempo e localização."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Observação apenas fornece evidências não específico tempo e localização, limitando seu úteisness em avaliando processos sobre período ou em diferente condições."},{"id":"M1_U2_Q10","num":10,"total":38,"module":"M1","unit":"U2","topic":"Identificação de Informações e Avaliação de Evidências","question_pt":"Qual das seguintes alternativas deveria ser considerado principal vantagem de obtendo completo controle interno questionário em relação a relatórios financeiros?","options_pt":{"A":"Para determinar os testes exigido para dados relações.","B":"Para fornecer obasepara eficaz benchmarking.","C":"Para examinar os riscos associated com atual práticas.","D":"Para obter específico apoiar para principal ratio análise."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. O principal vantagem de um concluído controle interno questionário (ICQ) é esse ele fornece informação sobre o auditee práticas e riscos."},{"id":"M1_U2_Q11","num":11,"total":38,"module":"M1","unit":"U2","topic":"Identificação de Informações e Avaliação de Evidências","question_pt":"Administração de um adequadoty e acidentes insurance empresa tem dois principal preocupações sobre a eficiência e eficácia de claims-processamento atividades: alguns claims são sendo pago que deve não ser pago ou são sendo pago em valores em excess política, enquanto muitos claims são não sendo pago em um tempestivo basis. Em preparando para uma auditoria área, O auditor interno decides para realizar preliminar pesquisa para coletar mais informação sobre o natureza de processamento e potencial problemas. O auditor usa questionário durante entrevistas para coletar este informação. Unfortunately, o questionário faz não cover alguns informação offered pelo pessoas sendo entrevistou. Consequentemente, o auditor faz não documentar o potencial problemas para adicional auditoria investigação. O principal deficiência com este processo é Qual das seguintes alternativas?","options_pt":{"A":"Administração objetivos foram definido too narrowly.","B":"O auditor falhou para considerar o importance informação offered.","C":"Questionários fazer não permitir para oportunidades para documentar outro informação.","D":"O auditor utilizado questionário em uma situação onde estruturado entrevista deve têm sido utilizado."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. O principal problema é esse o auditor foi too oriented ao questionário e falhou para adequadamente considerar o outro informação que foi offered. Questionários pode ser limitado, mas o auditor necessidades para ser flexível suficientemente para coletar outro informação quando ele é offered."},{"id":"M1_U2_Q12","num":12,"total":38,"module":"M1","unit":"U2","topic":"Identificação de Informações e Avaliação de Evidências","question_pt":"Durante o planejando etapa de um trabalho de auditoria, auditor interno sênior sends um controle interno questionário ao head receita departamento para ser concluído. Qual das seguintes é um drawback de este abordagem?","options_pt":{"A":"Este abordagem é um expensive maneira para obter as informações.","B":"Alto grau de análise de dados proficiência é obrigado interpretar os resultados.","C":"Controle owners tend para responder positively sobre o controles em seus área.","D":"Este tipo de questionário pode ser utilizado apenas durante o planejando etapa de um trabalho de auditoria."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Controle owners pode fornecer overly optimistic respostas para controle interno questionários, potentially skewing os resultados. Este drawback enfatizars o necessidade para corroboração evidências ou adicional procedimentos de auditoria."},{"id":"M1_U2_Q13","num":13,"total":38,"module":"M1","unit":"U2","topic":"Identificação de Informações e Avaliação de Evidências","question_pt":"Qual das seguintes é melhor reason para um auditor interno para entrevista administração em relação a os resultados de um controle interno questionário, even quando os resultados revealed não significativo preocupações?","options_pt":{"A":"Entrevista deveria permitir O auditor interno para coletar adicional informação em qualquer áreas de juros.","B":"Entrevista é o mais eficiente método de obtendo objetivo informação para apoiar os resultados questionário.","C":"Entrevista é o apenas técnica esse fornece suficiente corroboration informação fornecido.","D":"Entrevista técnica é exigido por a Normas independentemente do resultado."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Entrevistas permitir o auditor para coletar adicional informação e corroborar respostas fornecido não controle interno questionário, garantindo minucioso cobertura de qualquer questões."},{"id":"M1_U2_Q14","num":14,"total":38,"module":"M1","unit":"U2","topic":"Identificação de Informações e Avaliação de Evidências","question_pt":"Um auditor está avaliando se as evidências gathered durante um trabalho de auditoria é suficiente. Qual característica deve as evidências têm para garantir esse outro competente profissional deveria reach o mesmo conclusão?","options_pt":{"A":"As evidências foi coletado quickly para meet auditoria prazos.","B":"As evidências é claro, well documentarado, e apoia auditoria achados.","C":"As evidências alinha-se com o auditor inicial expectativas.","D":"As evidências consists principalmente verbal confirmations de administração."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Evidências suficientes deve ser claro, adequadamente documentarado, e diretamente apoiar auditoria conclusões para garantir repliccapacidade."},{"id":"M1_U2_Q15","num":15,"total":38,"module":"M1","unit":"U2","topic":"Identificação de Informações e Avaliação de Evidências","question_pt":"Durante uma investigação de unexplained estoque shrinkage, Qual das seguintes alternativas deveria fornecer O auditor interno com o mais confiável informação?","options_pt":{"A":"Fornecedor notas fiscais.","B":"Estoque registros.","C":"Receiving relatórios.","D":"Pedidos de compra."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Os fornecedores' notas fiscais fornecer o melhor fonte de independente informação sobre additions para estoque."},{"id":"M1_U2_Q16","num":16,"total":38,"module":"M1","unit":"U2","topic":"Identificação de Informações e Avaliação de Evidências","question_pt":"Um auditor interno quer verificar se particular nota fiscal foi pago pela organização. Qual das seguintes alternativas forms de evidências fornece o highest confiabilidade?","options_pt":{"A":"Operacional administração fornece fornecedor recibo esse verifica o nota fiscal teve sido pago.","B":"Um auditor interno observa operacional administração nota fiscal pagamento processo.","C":"Operacional administração produces um relatório showing notas fiscais pago.","D":"Um auditor interno receives carta banco esse alinha-se com operacional administração pagamento registros."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Evidências de um independente externo fonte, como banco confirmação carta, fornece o highest confiabilidade. Este tipo de evidências é objetivo, verificável, e free de interno bias, tomada ele mais confiável fazer que relatórios ou recibos produced por operacional administração ou observações pelo auditor."},{"id":"M1_U2_Q17","num":17,"total":38,"module":"M1","unit":"U2","topic":"Identificação de Informações e Avaliação de Evidências","question_pt":"Durante auditoria financeira, um auditor quer garantir esse coletado evidências deveria permitir outro competente profissional para draw o mesmo conclusões. Qual tipo de evidências melhor apoia este meta?","options_pt":{"A":"Verbal declarações de empresa executivos sobre transações financeiras.","B":"Registros financeiros esse resumir transações e política requisitos.","C":"Terceiros confirmations e independentemente verificável registros.","D":"Internally generated relatórios que têm sido revisado e aprovado por administração."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. terceiros confirmations e verificável registros fornecer objetivo, repeatable evidências esse apoia auditoria conclusões."},{"id":"M1_U2_Q18","num":18,"total":38,"module":"M1","unit":"U2","topic":"Identificação de Informações e Avaliação de Evidências","question_pt":"Qual das seguintes alternativas deveria oferecer o strongest evidências para apoiar o interno fazer auditor conclusão esse produto é em estoque, como declarou não contabilidade registros?","options_pt":{"A":"O fornecedor fornece terceiros confirmação.","B":"O auditor realiza uma observação.","C":"Armazém administração submete photographs produto não estoque shelf.","D":"O auditor documentara entrevistas com múltiplos armazém pessoal."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Observando produto diretamente fornece o strongest evidências para confirmar o produto presence em estoque, como ele eliminates reliance em indirect ou secondhand fontes de verificação."},{"id":"M1_U2_Q19","num":19,"total":38,"module":"M1","unit":"U2","topic":"Identificação de Informações e Avaliação de Evidências","question_pt":"Qual é realista resultado de um preliminar pesquisa para uma atividade sob revisão?","options_pt":{"A":"Rough elaborar de trabalho de auditoria recomendações.","B":"Lista de todos pessoas quem necessidade para ser entrevistou.","C":"Claro idea de por que o trabalho de auditoria está sendo realizado.","D":"Detalhado lista de departamental documentara para coletar e revisar."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Preliminar pesquisa ajuda auditores obter claro compreensão propósito trabalho de auditoria, que irá informar desenvolvimento objetivos e escopo."},{"id":"M1_U2_Q20","num":20,"total":38,"module":"M1","unit":"U2","topic":"Identificação de Informações e Avaliação de Evidências","question_pt":"Qual das seguintes é o mais persuasive evidências existence de recentemente adquirido computers para o vendas departamento?","options_pt":{"A":"Documentação preparado externally.","B":"Administração indagação.","C":"Observação de auditee procedimentos.","D":"Físico exame."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Físico exame fornece direto e mais confiável evidências existence de tangible ativos como computers."},{"id":"M1_U2_Q21","num":21,"total":38,"module":"M1","unit":"U2","topic":"Identificação de Informações e Avaliação de Evidências","question_pt":"Um auditor interno está avaliando a organização ética programa. Qual das seguintes alternativas fontes de informação é mais provável que rendimento melhor evidências esse a organização ética e valores são eficazmente comunicado?","options_pt":{"A":"Documentação da organização handling de violações ética política.","B":"Signatures de funcionários reconhecendo seus compreensão da organização valores e seus willingness para cumprir com ética política.","C":"Conselho minutes aprovando estabelecimento da organização valor declaração e ética programa.","D":"Da organização interno funcionário newsletters esse regularmente incluir articles em seu valores e ética."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Funcionários signatures reconhecendo seus compreensão de valores e ética fornecer direto evidências esse estes concepts são comunicado eficazmente dentro da organização."},{"id":"M1_U2_Q22","num":22,"total":38,"module":"M1","unit":"U2","topic":"Identificação de Informações e Avaliação de Evidências","question_pt":"Durante uma entrevista com um auditor interno, de uma organização shipping departamento gestor mencionou vários problemas com o atual shipping procedimentos. O auditor fez não formalmente documentar o problemas, mas em vez de administered questionário para coletar informação sobre o shipping processo. Como foi este Alternativa de ações mistake?","options_pt":{"A":"O auditor utilizado questionário quando ele deve têm conduzido estruturado entrevista.","B":"O auditor deve têm realizado ratio análise antes de entrevista.","C":"O auditor falhou para considerar o importância outro informação offered.","D":"O auditor é não capaz para documentar o outro informação desde ele utilizado questionário."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. O auditor deve ser receptivo para novo informação durante entrevistas em vez de relying too heavily em questionários. Em este caso, o auditor foi too oriented ao questionário e falhou para adequadamente considerar o outro informação que foi offered."},{"id":"M1_U2_Q23","num":23,"total":38,"module":"M1","unit":"U2","topic":"Identificação de Informações e Avaliação de Evidências","question_pt":"Um auditor interno revisado banco conciliações preparado por administração atividade sob revisão. O auditor observou esse o banco declarações attached fez não têm o banco heading, registraro, ou tratar. Qual das seguintes afirmações é verdadeira em relação a este situação?","options_pt":{"A":"As evidências é não relevantee.","B":"As evidências pode não ser confiável.","C":"As informações missing é não relevantee para auditoria.","D":"As evidências pode não ser suficiente."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Evidências sem o banco registraro, tratar, ou heading pode não ser confiável como ele raises questions sobre seu authenticity. Principal identificando informação é crítico para garantir as evidências apoia auditoria conclusões."},{"id":"M1_U2_Q24","num":24,"total":38,"module":"M1","unit":"U2","topic":"Identificação de Informações e Avaliação de Evidências","question_pt":"Um auditor interno suspeita esse alto turnover pode ser caused por um oppressive trabalho ambiente. Para incentivando funcionários membros para confirmar ou refute este opinião, o auditor poderia melhor usar Qual das seguintes alternativas tactics?","options_pt":{"A":"Em uma entrevista, ask funcionários membros se eles feel apoiado por seus gestor.","B":"Em uma entrevista, ask funcionários membros se eles enjoy seus trabalho.","C":"Em uma entrevista, ask funcionários membros para talk sobre seus trabalho ambiente.","D":"Em um questionário, ask funcionários membros para taxa o trabalho ambiente em um scale de 1 para 5."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Asking funcionários membros para talk openly sobre seus trabalho ambiente em uma entrevista incentivando them para fornecer detalhado, qualitative percepções. Este abordagem permite o auditor para coletar contexto-específico informação, uncover potencial questões, e explore acompanhamento questions com base em seus respostas. Ele é mais eficaz fazer que closed ou narrowly focused questions, como ele possibilita deeper compreensão de se um oppressive trabalho ambiente é contributing para alto turnover."},{"id":"M1_U2_Q25","num":25,"total":38,"module":"M1","unit":"U2","topic":"Identificação de Informações e Avaliação de Evidências","question_pt":"Qual das seguintes é o mais eficiente ferramenta para determinar se specified interno procedimento é em place?","options_pt":{"A":"Controle interno questionários.","B":"Observações.","C":"Vouching.","D":"Entrevistas."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Controle interno questionários são um eficiente ferramenta para determinando existence de específico interno procedimentos, como eles sistematicamente coletar informação em controles e processos."},{"id":"M1_U2_Q26","num":26,"total":38,"module":"M1","unit":"U2","topic":"Identificação de Informações e Avaliação de Evidências","question_pt":"Que é o melhor manual procedimento para o auditor interno para usar para testar o completude de documentarado ou registrado informação?","options_pt":{"A":"Vouching.","B":"Rerealizarance.","C":"Tracing.","D":"Independente confirmação."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Tracing garante esse registrado transações são tracked back para seus fonte para verificar completude."},{"id":"M1_U2_Q27","num":27,"total":38,"module":"M1","unit":"U2","topic":"Identificação de Informações e Avaliação de Evidências","question_pt":"Auditor líder interno designado para conduzir uma avaliação de entidade-nível controles em um grande multinational organização deployed um controle interno questionário containing 30 questions para 100 funcionários organizationwide. respondentes apenas necessidade para indicar se eles agreed ou disagreed com o controle questions. Qual é o principal drawback de este abordagem?","options_pt":{"A":"O tempo taken para cover controles por meio de este abordagem é lengthy.","B":"Respondentes são provável que withhold sharing específico detalhes.","C":"Ele é difficult para quantificar informação fornecido com este abordagem.","D":"Informação fornecido por meio de este abordagem pode ser repudiated por respondentes."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Binary respostas (agree/discordar) frequentemente fazer não registrar detalhado percepções em deficiências de controle, leading um falta de actionable informação."},{"id":"M1_U2_Q28","num":28,"total":38,"module":"M1","unit":"U2","topic":"Identificação de Informações e Avaliação de Evidências","question_pt":"Um auditor interno decided para observar mensal físico contagem de estoque e determinado há foram não desvios de estabelecido procedimentos. Qual das seguintes afirmações é verdadeira em relação a as limitações de este auditoria procedimento?","options_pt":{"A":"Participation não processo pelo auditor pode levar um biased attitude e impacto independência.","B":"Direto personal observação por um auditor fornece menos garantia fazer que escrito e formal indagações.","C":"Conclusão feita sobre o contagem de estoque não pode ser feita simplesmente por meio de direto observação.","D":"As evidências obtido não pode ser considerado representante de qual happened em anterior contagems."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Este é significativo limitação de uma observação. People tipicamente são aware esse eles são sendo watched, e como resultado, behave differently. Geralmente, uma observação é reflection de um certain tempo - significado auditor não pode conclude esse qual é observado é representante de qual happened."},{"id":"M1_U2_Q29","num":29,"total":38,"module":"M1","unit":"U2","topic":"Identificação de Informações e Avaliação de Evidências","question_pt":"Um auditor interno decides para conduzir físico inspeção de adequadoty em um armazém em vez de having o armazém gestor fornecer signed documentação atual estoque. Este decisão é um indication esse o auditor é focado em obtendo qual tipo de evidências?","options_pt":{"A":"Relevantee evidências.","B":"Confiável evidências.","C":"Útil evidências.","D":"Evidências suficientes."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Físico inspeção fornece o mais confiável evidências porque ele envolve direto observação pelo auditor, reduzindo reliance em administração-fornecido documentação, que pode ser incompleto ou biased."},{"id":"M1_U2_Q30","num":30,"total":38,"module":"M1","unit":"U2","topic":"Identificação de Informações e Avaliação de Evidências","question_pt":"Qual das seguintes é o mais eficiente abordagem para auditores internos para obter informação sobre da organização culture?","options_pt":{"A":"Usar surveys para coletar informação.","B":"Revisar existente políticas e procedimentos.","C":"Conduzir um informal entrevista com administração.","D":"Revisar cliente satisfaction surveys."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Surveys são custo-eficaz e eficiente maneira para auditores internos para obter amplo percepções em da organização culture por coletando estruturado retorno de um variety de respondentes."},{"id":"M1_U2_Q31","num":31,"total":38,"module":"M1","unit":"U2","topic":"Identificação de Informações e Avaliação de Evidências","question_pt":"Qual das seguintes é o mais confiável fonte para obtendo banco conta saldos?","options_pt":{"A":"Um eletrônico relatório fornecido por administração atividade sob revisão.","B":"Declaração obtido diretamente e-banking aplicativo.","C":"Razão geral informação obtido contabilidade departamento.","D":"Físico banco declaração fornecido por administração atividade sob revisão."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Declaração obtido diretamente e-banking aplicativo é o mais confiável fonte, como ele eliminates o risco de manipulation e fornece tempo real, sistema-generated conta saldos."},{"id":"M1_U2_Q32","num":32,"total":38,"module":"M1","unit":"U2","topic":"Identificação de Informações e Avaliação de Evidências","question_pt":"Qual das seguintes alternativas procedimentos deveria fornecer o mais confiável evidências de auditoria esse folha de pagamento informação é suficientemente checked para precisão antes de sendo processado?","options_pt":{"A":"Revisando uma amostra de concluído folha de pagamento transações para erros.","B":"Observando folha de pagamento funcionários checking folha de pagamento informação antes de processamento.","C":"Entrevistaring o folha de pagamento supervisor sobre checks realizado antes de processamento.","D":"Revisando controle check sheets created por funcionários antes de processamento."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Este é o mais confiável evidências fornecidos o choices. Ele fornece um independente verificação de qual foi realizado por um objetivo fonte."},{"id":"M1_U2_Q33","num":33,"total":38,"module":"M1","unit":"U2","topic":"Identificação de Informações e Avaliação de Evidências","question_pt":"Qual é o propósito de em um controle interno questionário?","options_pt":{"A":"Para coletar informação sobre controle procedimentos.","B":"Para identificar os objetivos atividade sob revisão.","C":"Para avaliar eficácia de controles.","D":"Para avaliar o desenho de controles."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. O principal propósito de um controle interno questionário é para coletar informação sobre o ambiente de controle e o existence de específico controle procedimentos."},{"id":"M1_U2_Q34","num":34,"total":38,"module":"M1","unit":"U2","topic":"Identificação de Informações e Avaliação de Evidências","question_pt":"Qual das seguintes alternativas deveria fornecer O auditor interno com o mais confiável documentary evidências?","options_pt":{"A":"Banco deposit slips obtido de contas pagar.","B":"Fornecedor notas fiscais obtido de contas receber.","C":"Funcionário tempo cards obtido diretamente pelo auditor.","D":"Banco declarações obtido banco."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Este descreve documentar com alto confiabilidade. há é não \"middleman\"; o chain de comunicação e custody goes back e forth diretamente entre O auditor interno e o fonte."},{"id":"M1_U2_Q35","num":35,"total":38,"module":"M1","unit":"U2","topic":"Identificação de Informações e Avaliação de Evidências","question_pt":"Como parte preliminar pesquisa atividades para uma auditoria fornecedor administração processo, um auditor interno administers um risco e controle questionário para selected fornecedores. Qual é o propósito de este questionário?","options_pt":{"A":"Para obter testimonial informação sobre certain controles em da organização fornecedor administração processo.","B":"Para validar controle informação por meio de fora de partes independente fornecedor administração processo.","C":"Para ascertain o existence de certain controle procedimentos em da organização fornecedor administração processo.","D":"Para obter físico evidências em relação a riscos e controles não fornecedor administração processo."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. O questionário é utilizado para ascertain se específico controle procedimentos exist em da organização fornecedor administração processo, fornecendo percepção não ambiente de controle."},{"id":"M1_U2_Q36","num":36,"total":38,"module":"M1","unit":"U2","topic":"Identificação de Informações e Avaliação de Evidências","question_pt":"Um auditor interno está revisando operacional eficiência dentro de manufacturing plant. Qual tipo de evidências deveria melhor garantir esse outro auditor poderia reach o mesmo conclusões?","options_pt":{"A":"Funcionário opiniões em production eficiência coletado em informal discussões.","B":"Verbal confirmação plant gestor em desempenho métricas.","C":"Relatório resumido fornecido por administração sem apoiando detalhes.","D":"Direto observação de production processos e documentarado workflow analisa."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Direto observação e documentarado analisa fornecer tangible, repeatable evidências esse apoia objetivo conclusões."},{"id":"M1_U2_Q37","num":37,"total":38,"module":"M1","unit":"U2","topic":"Identificação de Informações e Avaliação de Evidências","question_pt":"Qual das seguintes alternativas melhor descreve um principal drawback de observação como uma auditoria procedimento?","options_pt":{"A":"Observação é limitado pelo fact esse o act de sendo observado pode affect como processo ou procedimento é realizado.","B":"Observação é o menor persuasive auditoria procedimento porque O auditor interno está obtendo indirect evidências.","C":"Observação deve não ser combinado com outro procedimentos de auditoria quando testando eficácia operacional de controles.","D":"Observação é menos eficaz para testando completude fazer que ele é para testando validade."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Observação é lim
