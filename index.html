re, conducting frequent check-ins within the internal audit team is part of implementing agile auditing using the Scrum framework."},{"id":"M7_U1_Q11","num":11,"total":33,"module":"M7","unit":"U1","topic":"Appropriate Engagement Approach","question_en":"Which of the following is a characteristic of the traditional auditing approach?","options_en":{"A":"It is highly adaptable to changes.","B":"It uses a waterfall method where activities are performed in sequential order.","C":"It involves short, focused sprints.","D":"It emphasizes continuous feedback and iteration."},"correct":"B","explanation_en":"Choice \"A\" is incorrect. High adaptcapacidade to changes is a feature of agile auditing. Choice \"B\" is correct. Traditional auditing uses what is referred to in project management as a waterfall approach. This approach involves a structure with a series of phases (engagement planning, fieldwork, review, and reporting) that are performed in sequence with no overlap or consecutive activities. Therefore, the use of a waterfall method where activities are performed in sequential order is a characteristic of the traditional auditing approach. Choice \"C\" is incorrect. Short, focused sprints are characteristic of agile auditing. Choice \"D\" is incorrect. Continuous feedback and iteration are emphasized in agile auditing."},{"id":"M7_U1_Q12","num":12,"total":33,"module":"M7","unit":"U1","topic":"Appropriate Engagement Approach","question_en":"Which of the following helps ensure the engagement objectives are achieved by optimizing the allocation and integration of inputs?","options_en":{"A":"Scope creep","B":"Rework","C":"Project management","D":"Gold plating"},"correct":"C","explanation_en":"Choice \"A\" is incorrect. Scope creep is one of the common problems internal auditors may face. It refers to an increase in the amount of work, resources (financial or human resources), or time on the project (after it has begun) not originally planned for devido a to unanticipated changes in circumstances impacting the project or poor planning. Choice \"B\" is incorrect. Rework is one of the common problems internal auditors may face. It involves reperforming tasks that may have been inappropriately planned for (inappropriate resources or timing allocated to the original tasks resulting in incomplete or inaccurate results). Choice \"C\" is correct. Project management helps ensure that engagement objectives are achieved by optimizing the allocation and integration of inputs. Successful project management includes delivering a project that achieves its objectives by optimizing the allocation and integration of inputs and reaches a desired performance or quality level within a defined time and budget. Choice \"D\" is incorrect. Gold plating is one of the common problems internal auditors may face. It involves performing work beyond the scope of the project without approval, which may also impact project costs and deadlines."},{"id":"M7_U1_Q13","num":13,"total":33,"module":"M7","unit":"U1","topic":"Appropriate Engagement Approach","question_en":"Which of the following is a common problem in project management that involves performing work beyond the scope of the project without approval?","options_en":{"A":"Rework","B":"Fast tracking","C":"Gold plating","D":"Scope creep"},"correct":"C","explanation_en":"Choice \"A\" is incorrect. Rework involves reperforming tasks that may have been inappropriately planned for, including inappropriate resources or timing allocated to the original tasks resulting in incomplete or inaccurate results. Choice \"B\" is incorrect. Fast tracking is not a common problem in project management. Instead, it is one of the techniques that project managers may use to help address unexpected delays or resource conflicts that may arise during a project/engagement. It involves starting a task before its predecessor is completed. This results in the tasks to be performed simultaneously, when possible. The risk with this approach is the rework of the successor task based on the work and findings of the predecessor task. Choice \"C\" is correct. Gold plating involves performing work that is beyond the scope of the project and project objectives without approval. It may also impact the project costs and deadlines. Choice \"D\" is incorrect. Scope creep involves an increase in the amount of work, resources, or time on the project not originally planned for. It is usually caused by poor planning or unanticipated changes in circumstances impacting the project."},{"id":"M7_U1_Q14","num":14,"total":33,"module":"M7","unit":"U1","topic":"Appropriate Engagement Approach","question_en":"The internal audit team is planning an engagement to review an organization's IT security processes. The team has a large budget and access to advanced technology tools. The IT security processes involve multiple departments, and the engagement needs to be completed within a relatively short timeline. Which engagement approach would be most suitable for this scenario?","options_en":{"A":"Agile auditing","B":"Traditional auditing","C":"Integrated auditing","D":"Remote auditing"},"correct":"A","explanation_en":"Choice \"A\" is correct. Agile auditing would be the most suitable approach for this scenario devido a to its flexibility and capacidade to adapt to changes in scope and resources. Agile auditing is particularly useful in a changing and dynamic business environment that requires internal auditors to prioritize adaptcapacidade and responsiveness to ensure the relevance and efficiency needed for engagements with the short timelines of the internal audit function when supporting the organization. Additionally, given the short engagement timeline, agile auditing is the most suitable approach as it facilitates streamlining risk assessment processes, resulting in quicker decision making and timely resolution of issues, and allows for faster turnaround time for reporting. Choice \"B\" is incorrect. Traditional auditing is less adaptable to changes and may not be suitable for an engagement with a relatively short timeline. Choice \"C\" is incorrect. Integrated auditing is suitable for larger and more complex organizations with interdependencies but may not be the best fit for an engagement with a relatively short timeline. Choice \"D\" is incorrect. Remote auditing focuses on the location of the engagement activities and may not address the need for flexibility and adaptcapacidade in this scenario."},{"id":"M7_U1_Q15","num":15,"total":33,"module":"M7","unit":"U1","topic":"Appropriate Engagement Approach","question_en":"A manufacturing company with well-established processes and minimal operational changes is undergoing a scheduled audit. Which approach would be most effective?","options_en":{"A":"Apply an agile audit methodology to allow rapid adaptations to changing conditions.","B":"Conduct an integrated audit that involves external regulators and third-party consultants.","C":"Utilize a traditional audit method to provide a structured and sequential review.","D":"Undertake a desktop review. Established processes and minimal operational changes make this a low priority for audit."},"correct":"C","explanation_en":"Choice \"C\" is correct. Traditional audits are well suited for stable environments where structured, periodic reviews provide sufficient assurance."},{"id":"M7_U1_Q16","num":16,"total":33,"module":"M7","unit":"U1","topic":"Appropriate Engagement Approach","question_en":"Which component of the project management triangle represents the project's defined objectives and deliverables?","options_en":{"A":"Cost","B":"Time","C":"Quality","D":"Scope"},"correct":"D","explanation_en":"Choice \"A\" is incorrect. Cost represents the budget available to complete the project and is determined by factors like labor rates, material rates, equipment (including technology applications), and organizational profitcapacidade. Choice \"B\" is incorrect. Time represents the amount of time available to complete the project, including the time required for each task and component. Choice \"C\" is incorrect. Quality is sometimes represented inside the triangle to indicate that the quality of the project's outcome is influenced by its timeline, cost, and scope. Choice \"D\" is correct. The project management triangle (also known as the triple constraint) shows the interdependence of time, cost, and scope in managing any project. All three of the components of the triangle impact the quality of the project. Scope represents the project's defined objectives (i.e., what the project is supposed to accomplish) and deliverables (i.e., what the end result is supposed to be), as well as the tasks to be performed to achieve those."},{"id":"M7_U1_Q17","num":17,"total":33,"module":"M7","unit":"U1","topic":"Appropriate Engagement Approach","question_en":"Which of the following is a common problem in project management that involves an increase in the amount of work, resources, or time on the project not originally planned for?","options_en":{"A":"Scope creep","B":"Gold plating","C":"Rework","D":"Fast tracking"},"correct":"A","explanation_en":"Choice \"A\" is correct. Scope creep involves an increase in the amount of work, resources (financial or human resources), or time on the project (after it has begun) not originally planned for devido a to unanticipated changes in circumstances impacting the project or poor planning. Choice \"B\" is incorrect. Gold plating involves performing work beyond the scope of the project without approval, which may also impact the project costs and deadlines. Choice \"C\" is incorrect. Rework involves reperforming tasks that may have been inappropriately planned for (inappropriate resources or timing allocated to the original tasks resulting in incomplete or inaccurate results). Choice \"D\" is incorrect. Fast tracking is not a common problem in project management. Instead, it is one of the techniques that project managers may use to help in addressing unexpected delays or resource conflicts that may arise during a project/engagement. It involves starting a task before its predecessor is completed. This results in the tasks to be performed simultaneously, when possible. The risk with this approach is the rework of the successor task based on the work and findings of the predecessor task."},{"id":"M7_U1_Q18","num":18,"total":33,"module":"M7","unit":"U1","topic":"Appropriate Engagement Approach","question_en":"Which engagement approach involves conducting audits that combine different audit disciplines into a single audit?","options_en":{"A":"Agile auditing","B":"Integrated auditing","C":"Traditional auditing","D":"Remote auditing"},"correct":"B","explanation_en":"Choice \"A\" is incorrect. Originating from the agile methodology initially used in software development, agile auditing is an innovative approach to internal auditing characterized by its speed, flexibility, collaboration, and iterative progresso throughout the engagement process. Choice \"B\" is correct. Integrated auditing involves conducting audits that combine different audit disciplines into a single audit. An integrated approach to internal auditing is a systematic, innovative, and flexible approach that aims to create value for the organization by integrating various aspects of internal auditing. Integrated audits include combining different audit disciplines, such as financial, operational, and IT audits, into a single audit. Choice \"C\" is incorrect. Traditional auditing focuses on separate audits of specific areas or disciplines. Choice \"D\" is incorrect. Remote auditing focuses on the location of the engagement activities and can be performed from a distance, leveraging technology tools."},{"id":"M7_U1_Q19","num":19,"total":33,"module":"M7","unit":"U1","topic":"Appropriate Engagement Approach","question_en":"The internal audit team is planning an engagement to review an organization's procurement process. The team has limited resources and a tight deadline. Additionally, there are anticipated changes in the scope and resources during the engagement. Which engagement approach would be most suitable for this scenario?","options_en":{"A":"Remote auditing","B":"Integrated auditing","C":"Agile auditing","D":"Traditional auditing"},"correct":"C","explanation_en":"Choice \"A\" is incorrect. Remote auditing focuses on the location of the engagement activities and may not address the need for flexibility and adaptcapacidade in this scenario. Choice \"B\" is incorrect. Integrated auditing is more suitable for larger and more complex organizations with interdependencies but may not be the best fit for an engagement with a tight deadline and anticipated changes in scope and resources. Choice \"C\" is correct. Agile auditing would be the most suitable approach for this scenario devido a to its flexibility and capacidade to adapt to changes in scope and resources. Agile auditing is particularly useful in a changing and dynamic business environment that requires internal auditors to prioritize adaptcapacidade and responsiveness to ensure the relevance and efficiency of the internal audit function in supporting the organization. Choice \"D\" is incorrect. Traditional auditing is less adaptable to changes and may not be suitable for an engagement with a tight deadline and limited resources."},{"id":"M7_U1_Q20","num":20,"total":33,"module":"M7","unit":"U1","topic":"Appropriate Engagement Approach","question_en":"Which of the following project management techniques is most effective in identifying potential risks and issues early in an internal audit engagement?","options_en":{"A":"Crashing","B":"Tracking and monitoring resources and activities","C":"Fast tracking","D":"Using slack time"},"correct":"B","explanation_en":"Choice \"A\" is incorrect. Crashing is a technique that project managers may use to help address unexpected delays or resource conflicts that may arise during a project/engagement. It involves adding resources to shorten the critical path and prevent overall project delays, which may not necessarily identify risks early. Choice \"B\" is correct. Project management is critical in managing the efficiency of the engagement and helping ensure the engagement objectives are achieved. Tracking and monitoring the various resources and activities can help to identify potential risks and issues early on so that they may be addressed appropriately and not jeopardize the success of the engagement. Choice \"C\" is incorrect. Fast tracking is also referred to as adding levar time. In this method, a task is accelerated to begin before its predecessor task is completed. This results in the tasks to be performed simultaneously, when possible. The risk with this approach is rework of the successor task based on the work and findings of the predecessor task. Choice \"D\" is incorrect. Using slack time allows for delays in non-critical tasks but does not directly help in identifying risks early."},{"id":"M7_U1_Q21","num":21,"total":33,"module":"M7","unit":"U1","topic":"Appropriate Engagement Approach","question_en":"The internal audit team at a medium-sized organization is planning an engagement to review the organization's compliance with new regulatory requirements. The team has limited resources and a relatively long timeline. Additionally, there are no anticipated changes in the scope and resources during the engagement. Which engagement approach would be most suitable for this scenario?","options_en":{"A":"Agile auditing","B":"Remote auditing","C":"Integrated auditing","D":"Traditional auditing"},"correct":"D","explanation_en":"Choice \"A\" is incorrect. Agile auditing is more suitable for engagements with shorter timelines and anticipated changes. Choice \"B\" is incorrect. Remote auditing focuses on the location of the engagement activities and may not address the need for a structured approach in this scenario. Choice \"C\" is incorrect. Integrated auditing is more suitable for larger and more complex organizations with interdependencies. Choice \"D\" is correct. Traditional auditing would be the most suitable approach for this scenario as there is a long timeline with no anticipated changes. This is because traditional auditing uses what is referred to in project management as a \"waterfall approach.\" This approach involves a structure with a series of phases (engagement planning, fieldwork, review, and reporting) that are performed in sequence with no overlap or consecutive activities. The traditional approach can also be less adaptable to change, is often described as rigid, and usually takes longer to complete the engagement process."},{"id":"M7_U1_Q22","num":22,"total":33,"module":"M7","unit":"U1","topic":"Appropriate Engagement Approach","question_en":"Which project management technique involves adding resources to the delayed tasks in order to shorten the critical path and prevent overall project delays?","options_en":{"A":"Fast tracking","B":"Gold plating","C":"Using slack time","D":"Crashing"},"correct":"D","explanation_en":"Choice \"A\" is incorrect. Fast tracking is a technique that project managers may use to help address unexpected delays or resource conflicts that may arise during a project/engagement and involves starting a task before its predecessor is completed. This results in the tasks being performed simultaneously, when possible. The risk with this approach is the rework of the successor task based on the work and findings of the predecessor task. Choice \"B\" is incorrect. Gold plating is not a project management technique but a common problem internal auditors may encounter. It involves performing work beyond the scope of the project without approval. Choice \"C\" is incorrect. Using slack time is a technique that project managers may use to help address unexpected delays or resource conflicts that may arise during a project/engagement and allows for the capacidade to delay the start time of non-critical tasks. Choice \"D\" is correct. Crashing is a technique that project managers may use to help address unexpected delays or resource conflicts that may arise during a project/engagement. Crashing is referred to as adding resources to the delayed tasks in order to shorten the critical path and prevent overall project delays."},{"id":"M7_U1_Q23","num":23,"total":33,"module":"M7","unit":"U1","topic":"Appropriate Engagement Approach","question_en":"Which stage of the project life cycle involves defining the project's goals, objectives, nature, and scope?","options_en":{"A":"Initiation","B":"Planning and design","C":"Execution and production","D":"Execution and production"},"correct":"A","explanation_en":"Choice \"A\" is correct. A project usually progresses through different stages during its life cycle. These stages include initiation, planning and design, execution and production, monitoring and control, and completion and evaluation. The initiation stage involves defining the project's goals, objectives, nature, and scope. Choice \"B\" is incorrect. The planning and design stage involves determining schedules, budgets, and resource allocation, not defining the project's goals, objectives, nature, and scope. Choice \"C\" is incorrect. The monitoring and control stage involves tracking progresso and managing resources, not defining the project's goals, objectives, nature, and scope. Choice \"D\" is incorrect. The execution and production stage involves performing the project's work according to the plan, not defining the project's goals, objectives, nature, and scope."},{"id":"M7_U1_Q24","num":24,"total":33,"module":"M7","unit":"U1","topic":"Appropriate Engagement Approach","question_en":"Which of the following is a project management technique that involves starting a task before its predecessor is completed?","options_en":{"A":"Using slack time","B":"Crashing","C":"Fast tracking","D":"Gold plating"},"correct":"C","explanation_en":"Choice \"A\" is incorrect. Using slack time is a project management technique that allows for the capacidade to delay the start time of non-critical tasks. Choice \"B\" is incorrect. Crashing is a project management technique that involves adding resources to shorten the critical path. Choice \"C\" is correct. Fast tracking is a project management technique that involves starting a task before its predecessor is completed. This results in the tasks being performed simultaneously, when possible. Choice \"D\" is incorrect. Gold plating is not a project management technique but a common problem internal auditors may encounter during the engagement. It involves performing work beyond the scope of the project without approval."},{"id":"M7_U1_Q25","num":25,"total":33,"module":"M7","unit":"U1","topic":"Appropriate Engagement Approach","question_en":"Which project management technique involves using a visual tool that displays tasks as horizontal bars to demonstrar their start and end dates, durations, and sequence of activities?","options_en":{"A":"Gantt chart","B":"Crashing","C":"Network analysis","D":"Fast tracking"},"correct":"A","explanation_en":"Choice \"A\" is correct. A Gantt chart is a visual tool that helps project managers schedule and acompanhar project activities. It displays tasks as horizontal bars, showing their start and end dates, durations, and sequence of activities. Choice \"B\" is incorrect. Crashing is a technique that project managers may use to help address unexpected delays or resource conflicts that may arise during a project/engagement and involves adding resources to the delayed tasks in order to shorten the critical path and prevent overall project delays. Choice \"C\" is incorrect. Network analysis, often using techniques such as the program evaluation review technique (PERT) and the critical path method (CPM), which are often referred to as PERT/CPM, involves evaluating a project's tasks and their dependencies to find the most efficient path to reach the project goals. Choice \"D\" is incorrect. Fast tracking is a technique that project managers may use to help address unexpected delays or resource conflicts that may arise during a project/engagement and involves starting a task before its predecessor is completed. This results in the tasks being performed simultaneously, when possible. The risk with this approach is the rework of the successor task based on the work and findings of the predecessor task."},{"id":"M7_U1_Q26","num":26,"total":33,"module":"M7","unit":"U1","topic":"Appropriate Engagement Approach","question_en":"An engagement supervisor is using a Gantt chart to plan an engagement. What is indicated by the length of a task bar on the chart?","options_en":{"A":"The duration of the task.","B":"The earliest start date for each task.","C":"Whether the task is a parallel or sequential task.","D":"The level of risk associated with each task."},"correct":"A","explanation_en":"Choice \"A\" is correct. The length of the task bar indicates the duration of the task, essential for project planning."},{"id":"M7_U1_Q27","num":27,"total":33,"module":"M7","unit":"U1","topic":"Appropriate Engagement Approach","question_en":"Which of the following best describes the benefit of adopting agile auditing?","options_en":{"A":"Reduced need for stakeholder involvement","B":"Increased efficiency and speed in the engagement process","C":"Rigid adherence to the original plan","D":"Longer engagement timelines"},"correct":"B","explanation_en":"Choice \"A\" is incorrect. Agile auditing promotes greater stakeholder involvement and collaboration; it does not reduce the need for stakeholder involvement. By engaging stakeholders throughout the engagement process, agile auditing promotes greater transparency and leads to more accurate and comprehensive assessments of risks and controls. Choice \"B\" is correct. One of the primary benefits of agile auditing is increased efficiency and speed in the engagement process. Agile auditing facilitates streamlining risk assessment processes, resulting in quicker decision making and the timely resolution of issues. It also allows for faster reporting turnaround time. Choice \"C\" is incorrect. Agile auditing is characterized by flexibility and adaptcapacidade, not rigid adherence to the original plan. Choice \"D\" is incorrect. Agile auditing would be a suitable approach for engagements with shorter timelines."},{"id":"M7_U1_Q28","num":28,"total":33,"module":"M7","unit":"U1","topic":"Appropriate Engagement Approach","question_en":"Which engagement approach is particularly useful in a changing and dynamic business environment that requires internal auditors to prioritize adaptcapacidade and responsiveness?","options_en":{"A":"Traditional auditing","B":"Integrated auditing","C":"Remote auditing","D":"Agile auditing"},"correct":"D","explanation_en":"Choice \"A\" is incorrect. Traditional auditing is less adaptable to changes. This approach involves a structure with a series of phases (engagement planning, fieldwork, review, and reporting) that are performed in sequence with no overlap or consecutive activities. The approach is often described as rigid, and it usually takes longer to complete the engagement process. Choice \"B\" is incorrect. An integrated approach to internal auditing is a systematic, innovative, and flexible approach that aims to create value for the organization by integrating various aspects of internal auditing. It may involve conducting integrated audits, which include combining different audit disciplines, such as financial, operational, and IT audits, into a single audit. It is more suitable for larger and more complex organizations with interdependence. Choice \"C\" is incorrect. Remote auditing focuses on the location of the engagement activities and can be performed from a distance, leveraging technology tools. Choice \"D\" is correct. Agile auditing is particularly useful in a changing and dynamic business environment that requires internal auditors to prioritize adaptcapacidade and responsiveness to ensure the relevance and efficiency of the internal audit function in supporting the organization."},{"id":"M7_U1_Q29","num":29,"total":33,"module":"M7","unit":"U1","topic":"Appropriate Engagement Approach","question_en":"A levar auditor is concerned about scope creep in an engagement. Which project management practice would best help prevent this issue?","options_en":{"A":"Adding stakeholder requests throughout the engagement without formal review.","B":"Clearly defining and documenting the engagement scope, objectives, and deliverables.","C":"Expanding the audit scope whenever new issues are identified, regardless of relevance.","D":"Addressing scope concerns when significant budget or time overruns occur."},"correct":"B","explanation_en":"Choice \"B\" is correct. Clearly defining and documenting the engagement scope helps prevent scope creep and ensures focus on the original objectives."},{"id":"M7_U1_Q30","num":30,"total":33,"module":"M7","unit":"U1","topic":"Appropriate Engagement Approach","question_en":"Which of the following is a chave consideration when determining the most suitable engagement approach for an internal audit engagement?","options_en":{"A":"The historical performance of the internal audit function","B":"The resources available","C":"The personal preferences of the internal audit team","D":"The availcapacidade of external consultants"},"correct":"B","explanation_en":"Choice \"A\" is incorrect. The historical performance of the internal audit function is not highly relevant in determining the most suitable engagement approach for an internal audit engagement. Choice \"B\" is correct. The resources available (financial, human, and technological) to perform the engagement work are a chave consideration when determining the most suitable engagement approach. The internal audit function should consider what is the most suitable approach for an engagement based on several factors, including resources available (financial, human, and technological) to perform the engagement work, timeline of the engagement (long-term versus short-term), anticipated level of changes to the scope, timing, or resources for the engagement, level of dependencies of the tasks to be performed, interdependencies between process and whether processes span multiple departments, and the location of personnel working in the area under review (on-site versus remote). Choice \"C\" is incorrect. The personal preferences of the internal audit team should not affect the determinization of the most suitable engagement approach. Choice \"D\" is incorrect. While the availcapacidade of external consultants can be useful for certain engagements, it is not a primary consideration when determining the most suitable engagement approach for an internal audit engagement."},{"id":"M7_U1_Q31","num":31,"total":33,"module":"M7","unit":"U1","topic":"Appropriate Engagement Approach","question_en":"Which of the following best describes a benefit of integrated auditing?","options_en":{"A":"Reduced need for stakeholder involvement","B":"Rigid adherence to the original plan","C":"Holistic risk assessment","D":"Longer engagement timelines"},"correct":"C","explanation_en":"Choice \"A\" is incorrect. Integrated auditing encourages stakeholder involvement and collaboration. Moreover, an integrated auditing approach minimizes disruptions to the business by consolidating audit efforts and streamlining interactions with stakeholders. Choice \"B\" is incorrect. Integrated auditing is characterized by flexibility and adaptcapacidade, not rigid adherence to the original plan. Choice \"C\" is correct. Integrated approaches to internal auditing facilitate more agile development of objectives, scope, resource options, knowledge transfer, audit techniques, issue perspectives, and solutions, leading to more holistic and insightful internal audit services. Therefore, one of the benefits of integrated auditing is a holistic risk assessment, which promotes a more comprehensive understanding of risks to ensure alinhamento with business objectives. Choice \"D\" is incorrect. Integrated auditing does not necessarily involve longer engagement timelines. Rather, it often results in increased efficiency and operational improvements by streamlining processes and leveraging resources across different areas, resulting in greater efficiency and operational effectiveness."},{"id":"M7_U1_Q32","num":32,"total":33,"module":"M7","unit":"U1","topic":"Appropriate Engagement Approach","question_en":"Which of the following is a common problem in project management that involves reperforming tasks that may have been inappropriately planned for?","options_en":{"A":"Scope creep","B":"Rework","C":"Fast tracking","D":"Gold plating"},"correct":"B","explanation_en":"Choice \"A\" is incorrect. Scope creep involves an increase in the amount of work, resources, or time on the project not originally planned for devido a to poor planning or unanticipated changes in circumstances impacting the project. Choice \"B\" is correct. Rework involves reperforming tasks that may have been inappropriately planned for (inappropriate resources or timing allocated to the original tasks resulting in incomplete or inaccurate results). Choice \"C\" is incorrect. Fast tracking is not a common problem in project management. Instead, it is one of the techniques that project managers may use to help address unexpected delays or resource conflicts that may arise during a project/engagement. It involves starting a task before its predecessor is completed. This results in the tasks being performed simultaneously, when possible. Choice \"D\" is incorrect. Gold plating involves performing work beyond the scope of the project without approval, which may also impact the project costs and deadlines."},{"id":"M7_U1_Q33","num":33,"total":33,"module":"M7","unit":"U1","topic":"Appropriate Engagement Approach","question_en":"An organization is transitioning to a hybrid work environment, with employees working both remotely and on-site. Which audit approach would best ensure effective oversight?","options_en":{"A":"Leverage remote auditing to assess processes efficiently across different work settings.","B":"Require all audits to be conducted in-person to maintain traditionalfalha de revisãomethods.","C":"Schedule audits only for on-site employees to simplify logistics.","D":"Avoid auditing remote processes until a stable work policy is fully implemented."},"correct":"A","explanation_en":"Choice \"A\" is correct. Remote auditing allows for flexible assessments without requiring all employees to be physically present."},{"id":"M8_U1_Q1","num":1,"total":16,"module":"M8","unit":"U1","topic":"Performing a Detailed Risk Assessment","question_en":"Which of the following is a control implication typically associated with smaller organizations, compared to larger organizations?","options_en":{"A":"There are characteristically fewer lines of business and fewer products within lines.","B":"The wider span of duties hinders adequate segregation of tasks.","C":"There is a greater capacidade to recruit and retain personnel with needed expertise.","D":"Management places more focus on internal controls than on running the business."},"correct":"B","explanation_en":"Choice \"B\" is correct. A wider span of duties in smaller organizations often hinders segregation of tasks, increasing control risks."},{"id":"M8_U1_Q2","num":2,"total":16,"module":"M8","unit":"U1","topic":"Performing a Detailed Risk Assessment","question_en":"A control is more likely to be tested in only one site in a company that has which type of organizational structure?","options_en":{"A":"Centralized.","B":"Decentralized.","C":"Matrix.","D":"Hybrid."},"correct":"A","explanation_en":"Choice \"A\" is correct. In a centralized organizational structure, decision-making and control processes are consolidated at a single location or authority. This uniformity allows controls to be consistent across the organization, making it sufficient to test the control at one site to evaluate its effectiveness across the company."},{"id":"M8_U1_Q3","num":3,"total":16,"module":"M8","unit":"U1","topic":"Performing a Detailed Risk Assessment","question_en":"An organization that operates in a highly competitive and changing market would most likely use which of the following organizational structures?","options_en":{"A":"Centralized.","B":"Balanced hierarchy.","C":"Totally virtual.","D":"Decentralized."},"correct":"D","explanation_en":"Choice \"D\" is correct. A decentralized structure allows quicker decision-making and adaptcapacidade in dynamic environments."},{"id":"M8_U1_Q4","num":4,"total":16,"module":"M8","unit":"U1","topic":"Performing a Detailed Risk Assessment","question_en":"A healthcare provider is implementing AI-based diagnostics. What emerging risk should be prioritized in the risk assessment?","options_en":{"A":"Potential biases in AI algorithms leading to inaccurate diagnoses.","B":"Rising costs of AI implementation reducing profitcapacidade.","C":"Reduced demand for traditional medical professionals.","D":"Decreased patient visits devido a to automated healthcare solutions."},"correct":"A","explanation_en":"Choice \"A\" is correct. AI systems can introduce biases that impact diagnostic accuracy, posing a significant risk in healthcare decision-making."},{"id":"M8_U1_Q5","num":5,"total":16,"module":"M8","unit":"U1","topic":"Performing a Detailed Risk Assessment","question_en":"An internal auditor is conducting a preliminary risk assessment to plan an assurance engagement. Due to time and resource constraints, the auditor estimates that not all risks can be reviewed during the planned engagement. Given this situation, how must the auditor proceed to ensure conformance with the Standards?","options_en":{"A":"The auditor must reschedule the engagement for the next year, when more resources will be available.","B":"The auditor must change the focus of the engagement to advisory in nature, which allows for greater flexibility in scoping and resourcing the engagement.","C":"The auditor must seek assistance from a second-line function so all risks can be evaluated without delaying the engagement.","D":"The auditor must prioritize risks according to their significance and proceed with the planned assurance engagement."},"correct":"D","explanation_en":"Choice \"D\" is correct. Prioritizing risks ensures that the most significant ones are addressed during the planned engagement, aligning with time and resource constraints while maintaining conformance with the Standards."},{"id":"M8_U1_Q6","num":6,"total":16,"module":"M8","unit":"U1","topic":"Performing a Detailed Risk Assessment","question_en":"Which of the following are the primary two factors taken into account during a risk assessment?","options_en":{"A":"Likelihood of fraud occurring and potential financial risk.","B":"Impact of a risk event and its likelihood of occurring.","C":"Potential financial losses and complexity of the process.","D":"Potential financial losses and recent changes to processes."},"correct":"B","explanation_en":"Choice \"B\" is correct. Risk assessment primarily focuses on the impact of a risk event and the likelihood of its occurrence, which are essential for understanding and addressing potential threats effectively."},{"id":"M8_U1_Q7","num":7,"total":16,"module":"M8","unit":"U1","topic":"Performing a Detailed Risk Assessment","question_en":"How should an internal auditor approach preparing a detailed risk assessment during engagement planning?","options_en":{"A":"Work with management of the activity under review, as management would be most familiar with the business objectives and related risks.","B":"Consult with the compliance department, which typically has a more comprehensive visão of the organization.","C":"Work with external auditors to ensure that the risk assessment includes items reflected on the independent auditor's report.","D":"Complete the risk assessment independently to prevent conflicts of interest with the activity under review."},"correct":"A","explanation_en":"Choice \"A\" is correct. Working with management during engagement planning ensures the risk assessment incorporates knowledge of the business objectives and risks, leading to a more accurate and comprehensive risk evaluation."},{"id":"M8_U1_Q8","num":8,"total":16,"module":"M8","unit":"U1","topic":"Performing a Detailed Risk Assessment","question_en":"Which of the following options is the best practice for completing a risk and control matrix?","options_en":{"A":"Internal auditors delegate completion of the matrix to management of the activity under review.","B":"Internal auditors coordinate with management of the activity under review to complete the matrix together.","C":"Internal auditors complete the matrix based on observations of the activity under review.","D":"Internal auditors coordinate with external auditors to complete the matrix."},"correct":"B","explanation_en":"Choice \"B\" is correct. Collaboration between internal auditors and management ensures the risk and control matrix reflects accurate, practical, and complete information about the processes under review, improving its effectiveness and relicapacidade."},{"id":"M8_U1_Q9","num":9,"total":16,"module":"M8","unit":"U1","topic":"Performing a Detailed Risk Assessment","question_en":"Which of the following are the two main risk assessment variables typically represented in a risk and control matrix?","options_en":{"A":"Impact and likelihood of the risk event.","B":"Financial impact of the risk event and likelihood of fraud.","C":"Intensity and velocity of the risk event.","D":"Impact of the risk event and length of time of the impact."},"correct":"A","explanation_en":"Choice \"A\" is correct. Impact and likelihood are fundamental risk assessment variables, as they capture the severity and probcapacidade of a risk event, which are crucial in prioritizing and managing risks effectively."},{"id":"M8_U1_Q10","num":10,"total":16,"module":"M8","unit":"U1","topic":"Performing a Detailed Risk Assessment","question_en":"What is an advantage of a decentralized organization structure?","options_en":{"A":"Efficient use of resources.","B":"Economies of scale.","C":"Faster decision making/responses.","D":"More employee participation."},"correct":"C","explanation_en":"Choice \"C\" is correct. Decentralized organizational structures allow decision-making authority to be distributed closer to the point of action, enabling faster responses to local or operational needs. This structure reduces gargalos caused by reliance on central authority and empowers managers or teams to act quickly, which is a primary advantage over centralized systems."},{"id":"M8_U1_Q11","num":11,"total":16,"module":"M8","unit":"U1","topic":"Performing a Detailed Risk Assessment","question_en":"During a compliance audit of a pharmaceutical company, what regulatory risk should be prioritized in the risk assessment?","options_en":{"A":"Increased competition from emerging pharmaceutical startups.","B":"High employee turnover affecting research and development efficiency.","C":"Inefficient marketing strategies leading to decreased product visibility.","D":"Failure to comply with industry-specific drug safety and approval regulations."},"correct":"D","explanation_en":"Choice \"D\" is correct. Noncompliance with drug safety and approval regulations can result in severe legal penalties and reputational damage."},{"id":"M8_U1_Q12","num":12,"total":16,"module":"M8","unit":"U1","topic":"Performing a Detailed Risk Assessment","question_en":"What is a chave advantage of a centralized configuration for an organization?","options_en":{"A":"It tends to empower employees.","B":"It encourages motivation and learning.","C":"It is highly adaptable.","D":"It supports management consistency."},"correct":"D","explanation_en":"Choice \"D\" is correct. A centralized configuration has several levels of authority, a long chain of command, and a narrow span of control. All of these characteristics support management consistency and may discourage innovation and employee involvement and empowerment."},{"id":"M8_U1_Q13","num":13,"total":16,"module":"M8","unit":"U1","topic":"Performing a Detailed Risk Assessment","question_en":"Fewer levels of authority, a shorter chain of command, and a wider span of control are characteristics of what type of organizational structure?","options_en":{"A":"Hierarchical.","B":"Decentralized.","C":"Centralized.","D":"Hybrid."},"correct":"B","explanation_en":"Choice \"B\" is correct. A decentralized structure features minimal hierarchy and empowers employees at various levels."},{"id":"M8_U1_Q14","num":14,"total":16,"module":"M8","unit":"U1","topic":"Performing a Detailed Risk Assessment","question_en":"An audit manager decides to let a work group make a decision about whether to adopt a new work procedure. In allowing the group to make the decision, which of the following should the manager consider?","options_en":{"A":"Groups make decisions that are less accurate than those made by individuals.","B":"Groups make faster decisions than do individuals, because groups have more expertise than does any one person.","C":"Groups are at risk of groupthink.","D":"Groups tend to make very conservative decisions and do not want to assume risk."},"correct":"C","explanation_en":"Choice \"C\" is correct. Groups are at risk of groupthink, which can hinder decision- making by suppressing dissent and favoring consensus."},{"id":"M8_U1_Q15","num":15,"total":16,"module":"M8","unit":"U1","topic":"Realização de uma Avaliação Detalhada de Riscos","question_en":"","options_en":{},"correct":"A","explanation_en":""},{"id":"M8_U1_Q16","num":16,"total":16,"module":"M8","unit":"U1","topic":"Realização de uma Avaliação Detalhada de Riscos","question_en":"","options_en":{},"correct":"C","explanation_en":""},{"id":"M9_U1_Q1","num":1,"total":14,"module":"M9","unit":"U1","topic":"Procedimentos do Trabalho","question_en":"","options_en":{},"correct":"C","explanation_en":""},{"id":"M9_U1_Q2","num":2,"total":14,"module":"M9","unit":"U1","topic":"Procedimentos do Trabalho","question_en":"","options_en":{},"correct":"B","explanation_en":""},{"id":"M9_U1_Q3","num":3,"total":14,"module":"M9","unit":"U1","topic":"Procedimentos do Trabalho","question_en":"","options_en":{},"correct":"A","explanation_en":""},{"id":"M9_U1_Q4","num":4,"total":14,"module":"M9","unit":"U1","topic":"Procedimentos do Trabalho","question_en":"","options_en":{},"correct":"D","explanation_en":""},{"id":"M9_U1_Q5","num":5,"total":14,"module":"M9","unit":"U1","topic":"Procedimentos do Trabalho","question_en":"","options_en":{},"correct":"A","explanation_en":""},{"id":"M9_U1_Q6","num":6,"total":14,"module":"M9","unit":"U1","topic":"Procedimentos do Trabalho","question_en":"","options_en":{},"correct":"B","explanation_en":""},{"id":"M9_U1_Q7","num":7,"total":14,"module":"M9","unit":"U1","topic":"Procedimentos do Trabalho","question_en":"","options_en":{},"correct":"B","explanation_en":""},{"id":"M9_U1_Q8","num":8,"total":14,"module":"M9","unit":"U1","topic":"Procedimentos do Trabalho","question_en":"","options_en":{},"correct":"C","explanation_en":""},{"id":"M9_U1_Q9","num":9,"total":14,"module":"M9","unit":"U1","topic":"Procedimentos do Trabalho","question_en":"","options_en":{},"correct":"B","explanation_en":""},{"id":"M9_U1_Q10","num":10,"total":14,"module":"M9","unit":"U1","topic":"Procedimentos do Trabalho","question_en":"","options_en":{},"correct":"C","explanation_en":""},{"id":"M9_U1_Q11","num":11,"total":14,"module":"M9","unit":"U1","topic":"Procedimentos do Trabalho","question_en":"","options_en":{},"correct":"B","explanation_en":""},{"id":"M9_U1_Q12","num":12,"total":14,"module":"M9","unit":"U1","topic":"Procedimentos do Trabalho","question_en":"","options_en":{},"correct":"D","explanation_en":""},{"id":"M9_U1_Q13","num":13,"total":14,"module":"M9","unit":"U1","topic":"Procedimentos do Trabalho","question_en":"","options_en":{},"correct":"D","explanation_en":""},{"id":"M9_U1_Q14","num":14,"total":14,"module":"M9","unit":"U1","topic":"Procedimentos do Trabalho","question_en":"","options_en":{},"correct":"D","explanation_en":""}];
const TP={"Engagement Objectives, Scope, and Evaluation Criteria": "Objetivos, Escopo e Critérios de Avaliação", "Identifying Information and Evaluating Evidence": "Identificação de Informações e Avaliação de Evidências", "Engagement Supervision": "Supervisão do Trabalho", "Topical Requirements and Strategic Objectives": "Requisitos Temáticos e Objetivos Estratégicos", "Technology Options": "Opções Tecnológicas", "Communication with Stakeholders": "Comunicação com Partes Interessadas", "IT Considerations": "Considerações de TI", "Analytical Approaches and Process Mapping Techniques": "Abordagens Analíticas e Mapeamento de Processos", "Business Continuity and Disaster Recovery": "Continuidade de Negócios e Recuperação de Desastres", "Evaluation Criteria and Existing Conditions": "Critérios de Avaliação e Condições Existentes", "Finance and Accounting Concepts": "Conceitos de Finanças e Contabilidade", "Prepare Workpapers and Engagement Conclusions": "Papéis de Trabalho e Conclusões do Trabalho", "Key Risks and Controls Related to Business Processes": "Riscos e Controles em Processos de Negócio", "Appropriate Engagement Approach": "Abordagem Adequada do Trabalho", "Performing a Detailed Risk Assessment": "Avaliação Detalhada de Riscos", "Engagement Procedures": "Procedimentos do Trabalho", "Engagement Resources and Skills": "Recursos e Habilidades do Trabalho"};
const MPT={"M1": "Módulo 1", "M2": "Módulo 2", "M3": "Módulo 3", "M4": "Módulo 4", "M5": "Módulo 5", "M6": "Módulo 6", "M7": "Módulo 7", "M8": "Módulo 8", "M9": "Módulo 9", "M10": "Módulo 10"};
const MEN={"M1": "Module 1", "M2": "Module 2", "M3": "Module 3", "M4": "Module 4", "M5": "Module 5", "M6": "Module 6", "M7": "Module 7", "M8": "Module 8", "M9": "Module 9", "M10": "Module 10"};

const lang='pt';
let prog=JSON.parse(localStorage.getItem('cia2_prog')||'{}');
let hist=JSON.parse(localStorage.getItem('cia2_hist')||'[]');
let fq=[],ci=0,answered=false,sel=null;

const UI={
pt:{quiz:'Questions',dash:'Performance',hist:'History',
    mod:'Module:',top:'Topic:',mode:'Mode:',
    allmod:'All modules',alltop:'All topics',
    oall:'All',owrong:'Wrong',ounseen:'Unseen',
    rand:'🔀 Random',reset:'🗑 Reset',exp:'⬇ Export CSV',
    confirm:'Reset all progress?',toastreset:'Progress reset!',
    prev:'← Previous',next:'Next →',submit:'✓ Confirm',
    corT:'✓ Correct!',wroT:'✗ Incorrect',noq:'No questions found.',
    prog:'Progress:',of:'of',q:'Question',
    ddash:'Performance by Topic',dhist:'Answer History',
    scA:'Answered',scC:'Correct',scW:'Wrong',scP:'Score',
    cT:'Topic',cA:'Ans.',cC:'Right',cP:'%',hc:'Correct',hw:'Wrong'}
};
const T=k=>UI.pt[k];
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function refreshUI(){
  ['ltq','ltd','lth'].forEach((id,i)=>document.getElementById(id).textContent=T(['quiz','dash','hist'][i]));
  document.getElementById('lmod').textContent=T('mod');
  document.getElementById('ltop').textContent=T('top');
  document.getElementById('lmode').textContent=T('mode');
  document.getElementById('brand').textContent=T('rand');
  document.getElementById('breset').textContent=T('reset');
  document.getElementById('bexp').textContent=T('exp');
  document.getElementById('lddash').textContent=T('ddash');
  document.getElementById('ldhist').textContent=T('dhist');
  document.getElementById('oall').textContent=T('oall');
  document.getElementById('owrong').textContent=T('owrong');
  document.getElementById('ounseen').textContent=T('ounseen');
  buildMod();applyF();renderDash();renderHist();
}

function showV(v){
  ['quiz','dash','hist'].forEach(id=>{
    document.getElementById('v-'+id).classList.toggle('on',id===v);
    document.getElementById('t'+id[0]).classList.toggle('on',id===v);
  });
  if(v==='dash')renderDash();
  if(v==='hist')renderHist();
}

function mLbl(m){return lang==='pt'?(MPT[m]||m):(MEN[m]||m)}
function tLbl(t){return lang==='pt'?(TP[t]||t):t}

function buildMod(){
  const s=document.getElementById('smod'),pv=s.value;
  const ms=[...new Set(Q.map(q=>q.module))].sort();
  s.innerHTML=`<option value="">${T('allmod')}</option>`+ms.map(m=>`<option value="${m}"${m===pv?' selected':''}>${esc(mLbl(m))}</option>`).join('');
  buildTop(s.value);
}
function buildTop(mod){
  const s=document.getElementById('stop'),pv=s.value;
  const ts=[...new Set(Q.filter(q=>!mod||q.module===mod).map(q=>q.topic))].sort();
  s.innerHTML=`<option value="">${T('alltop')}</option>`+ts.map(t=>`<option value="${t}"${t===pv?' selected':''}>${esc(tLbl(t))}</option>`).join('');
}
function onMod(){buildTop(document.getElementById('smod').value);applyF();}

function applyF(){
  const mod=document.getElementById('smod').value;
  const top=document.getElementById('stop').value;
  const mode=document.getElementById('smode').value;
  fq=Q.filter(q=>{
    if(mod&&q.module!==mod)return false;
    if(top&&q.topic!==top)return false;
    if(mode==='wrong')return prog[q.id]&&prog[q.id].last==='wrong';
    if(mode==='unseen')return!prog[q.id];
    return true;
  });
  ci=0;renderQ();
}
function doRand(){
  document.getElementById('smod').value='';
  document.getElementById('stop').value='';
  document.getElementById('smode').value='all';
  buildTop('');
  fq=[...Q].sort(()=>Math.random()-.5);
  ci=0;renderQ();
}

function renderQ(){
  answered=false;sel=null;
  const card=document.getElementById('qcard');
  if(!fq.length){card.innerHTML=`<p style="text-align:center;padding:40px;color:var(--mu)">${T('noq')}</p>`;return;}
  const q=fq[ci];
  const pct=fq.length>1?(ci/(fq.length-1))*100:100;
  const qTx=lang==='pt'?q.question_en:q.question_en;
  const opts=q.options_en;
  card.innerHTML=`
    <div class="qprog">
      <div class="pwrap"><div class="pbar" style="width:${pct}%"></div></div>
      <span class="plbl">${T('prog')} ${ci+1} ${T('of')} ${fq.length}</span>
    </div>
    <div class="qmeta">
      <span class="bm bm-m">${esc(mLbl(q.module))}</span>
      <span class="bm bm-t">${esc(tLbl(q.topic))}</span>
      <span class="bm bm-n">${T('q')} ${q.num}/${q.total}</span>
    </div>
    <div class="qtxt">${esc(qTx)}</div>
    <div class="opts" id="opts">
      ${['A','B','C','D'].filter(l=>opts[l]).map(l=>`
        <div class="opt" data-l="${l}" onclick="pick('${l}')">
          <div class="ol">${l}</div><div>${esc(opts[l])}</div>
        </div>`).join('')}
    </div>
    <div class="exp" id="exp"><div class="expt" id="expt"></div><div class="exptx" id="exptx"></div></div>
    <div class="qact" id="qact"></div>`;
  renderAct(false);
}

function pick(l){
  if(answered)return;
  sel=l;
  document.querySelectorAll('.opt').forEach(e=>e.classList.toggle('sel',e.dataset.l===l));
}

function doSubmit(){
  if(!sel||answered)return;
  answered=true;
  const q=fq[ci];
  const ok=sel===q.correct;
  const p=prog[q.id]||{correct:0,wrong:0};
  if(ok)p.correct=(p.correct||0)+1;else p.wrong=(p.wrong||0)+1;
  p.last=ok?'correct':'wrong';
  prog[q.id]=p;
  localStorage.setItem('cia2_prog',JSON.stringify(prog));
  hist.unshift({id:q.id,module:q.module,topic:q.topic,sel,correct:q.correct,ok,ts:Date.now()});
  if(hist.length>1000)hist.pop();
  localStorage.setItem('cia2_hist',JSON.stringify(hist));
  document.querySelectorAll('.opt').forEach(e=>{
    e.classList.add('dis');
    if(e.dataset.l===q.correct)e.classList.add('ok');
    else if(e.dataset.l===sel)e.classList.add('er');
  });
  const expTx=lang==='pt'?q.explanation_en:q.explanation_en;
  const ex=document.getElementById('exp');
  ex.className='exp show '+(ok?'ok':'er');
  document.getElementById('expt').textContent=ok?T('corT'):T('wroT');
  document.getElementById('exptx').textContent=expTx;
  renderAct(true);
}

function renderAct(post){
  const div=document.getElementById('qact');
  div.innerHTML='';
  if(ci>0){const b=mkBtn('bo',T('prev'),()=>{ci--;renderQ();});div.appendChild(b);}
  const sp=document.createElement('span');sp.className='sp';div.appendChild(sp);
  if(!post){div.appendChild(mkBtn('bp',T('submit'),doSubmit));}
  else if(ci<fq.length-1){div.appendChild(mkBtn('ba',T('next'),()=>{ci++;renderQ();}));}
}
function mkBtn(cls,txt,fn){
  const b=document.createElement('button');
  b.className='btn '+cls;b.textContent=txt;b.onclick=fn;return b;
}

function renderDash(){
  const vals=Object.values(prog);
  const ans=vals.length,cor=vals.filter(p=>p.last==='correct').length;
  const pct=ans?Math.round(cor/ans*100):0;
  document.getElementById('dstats').innerHTML=`
    <div class="sc"><div class="sn">${ans}</div><div class="sl">${T('scA')}</div></div>
    <div class="sc"><div class="sn" style="color:var(--ok)">${cor}</div><div class="sl">${T('scC')}</div></div>
    <div class="sc"><div class="sn" style="color:var(--er)">${ans-cor}</div><div class="sl">${T('scW')}</div></div>
    <div class="sc"><div class="sn">${pct}%</div><div class="sl">${T('scP')}</div></div>`;
  const byT={};
  Q.forEach(q=>{
    if(!byT[q.topic])byT[q.topic]={tot:0,ans:0,cor:0};
    byT[q.topic].tot++;
    const p=prog[q.id];
    if(p){byT[q.topic].ans++;if(p.last==='correct')byT[q.topic].cor++;}
  });
  const rows=Object.entries(byT).map(([t,s])=>({t,...s,pct:s.ans?Math.round(s.cor/s.ans*100):null}))
    .sort((a,b)=>(a.pct??101)-(b.pct??101));
  document.getElementById('dtbl').innerHTML=`<table>
    <thead><tr><th>${T('cT')}</th><th style="text-align:center">${T('cA')}</th><th style="text-align:center">${T('cC')}</th><th style="min-width:100px">${T('cP')}</th></tr></thead>
    <tbody>${rows.map(r=>{
      const cls=r.pct===null?'':r.pct>=70?'g':r.pct>=50?'m':'b';
      return`<tr><td>${esc(tLbl(r.t))}</td><td style="text-align:center">${r.ans}/${r.tot}</td><td style="text-align:center">${r.cor}</td>
        <td><div class="pbw"><div class="pb ${cls}" style="width:${r.pct??0}%"></div></div><span style="font-size:.78rem;color:var(--mu)">${r.pct!==null?r.pct+'%':'—'}</span></td></tr>`;
    }).join('')}</tbody></table>`;
}

function renderHist(){
  const c=document.getElementById('hlist');
  if(!hist.length){c.innerHTML='<p style="text-align:center;padding:40px;color:var(--mu)">—</p>';return;}
  c.innerHTML=hist.slice(0,300).map(h=>`
    <div class="hi" onclick="goQ('${h.id}')">
      <div class="hb ${h.ok?'ok':'er'}">${h.sel}</div>
      <div><div style="font-size:.82rem;font-weight:600;color:var(--mu)">${esc(tLbl(h.topic))}</div>
        <div style="font-size:.88rem;margin-top:2px">${h.ok?T('hc'):T('hw')} — ${T('q')} ${h.id}</div></div>
    </div>`).join('');
}
function goQ(id){
  fq=Q;ci=Math.max(0,Q.findIndex(q=>q.id===id));
  document.getElementById('smod').value='';
  document.getElementById('stop').value='';
  document.getElementById('smode').value='all';
  buildTop('');showV('quiz');renderQ();
}

function doReset(){
  if(!confirm(T('confirm')))return;
  prog={};hist=[];
  localStorage.removeItem('cia2_prog');localStorage.removeItem('cia2_hist');
  toast(T('toastreset'));renderQ();renderDash();renderHist();
}
function doExport(){
  const rows=[['ID','Module','Topic','Selected','Correct','Result','Date']];
  hist.forEach(h=>rows.push([h.id,h.module,h.topic,h.sel,h.correct,h.ok?'Correct':'Wrong',new Date(h.ts).toLocaleString()]));
  const csv=rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,﻿'+encodeURIComponent(csv);
  a.download='cia_parte2_historico.csv';a.click();
}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// Init
refreshUI();buildMod();applyF();
</script></body></html>
