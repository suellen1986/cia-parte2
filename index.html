ria trabalho programa é tipicamente responsabilidade supervisor do trabalho."},{"id":"M2_U3_Q24","num":24,"total":35,"module":"M2","unit":"U3","topic":"Comunicação com Partes Interessadas","question_pt":"Qual das seguintes é mais adequada parte interessada para receiving final comunicação do trabalho?","options_pt":{"A":"Operacional funcionários envolvido no trabalho de auditoria","B":"Fornecedores impacted pelo trabalho de auditoria achados","C":"Externo consultants não envolvido com o trabalho de auditoria","D":"Administração responsável por tratando identificado riscos"},"correct":"D","explanation_pt":"Alternativa \"A\" está incorreta. Operacional funcionários são não principal recipients de final comunicação. Alternativa \"B\" está incorreta. Fornecedores são não principal partes interessadas para final comunicação. Alternativa \"C\" está incorreta. Externo consultants não envolvido com o trabalho de auditoria são não tipicamente recipients de final comunicação. Alternativa \"D\" está correta. Não conclusão trabalho de auditoria, auditores internos preparar final comunicações com base em trabalho de auditoria achados bem como recomendações e/ou planos de ação que são discussed com administração atividade sob revisão. Partes interessadas envolvido em comunicação durante conclusão e fase de elaboração fazer relatório trabalho de auditoria incluir administração atividade sob revisão, alta administração, o conselho, e outro partes interessadas como auditores externos ou reguladores. Assim, administração responsável por tratando identificado riscos é o mais adequado parte interessada para final comunicação do trabalho."},{"id":"M2_U3_Q25","num":25,"total":35,"module":"M2","unit":"U3","topic":"Comunicação com Partes Interessadas","question_pt":"Equipe de auditoria interna descobre esse administração tem não implementado principal planos de ação para tratar significativo deficiência de controle pelo agreed conclusão date. Quando questioned, administração explica esse recurso constraints têm atrasado implementação mas fornece não claro cronograma para conclusão. Qual deve o Diretor Executivo de Auditoria fazer próximo?","options_pt":{"A":"Comunicar questão para alta administração para resolução, e se unresolved, escalar o assunto ao conselho.","B":"Encerrar questão na auditoria registros, como administração teve fornecido reason para o adiar.","C":"Aceitar administração explanation e documentar o adiar não acompanhamento relatório.","D":"Recomendar esse administração revise o plano de ação para incluir novo conclusão date."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Função de auditoria interna é responsável por confirmando a implementação de recomendações e/ou administração planos de ação. De acordo com Norma 11.5 comunicando a aceitação de riscos, quando Diretor Executivo de Auditoria concludes esse administração tem accepted nível de risco esse exceeds da organização apetite ao risco ou tolerância ao risco, o assunto deve ser discussed com alta administração. Se o Diretor Executivo de Auditoria determina esse o assunto tem não sido resolved por alta administração, o assunto deve ser escalado ao conselho. Portanto, se o Diretor Executivo de Auditoria determina esse o adiar ou inaction indica um unacceptable risco, o assunto deve ser comunicado alta administração para resolução. Se alta administração faz não resolve questão, o Diretor Executivo de Auditoria deve escalar ele ao conselho. Alternativa \"B\" está incorreta. Closing questão prematurely é não adequado quando risco reprincipals unresolved. Alternativa \"C\" está incorreta. Aceitando administração explanation sem adicional ação é insuficiente para tratando um unacceptable risco, de acordo com a Normas. Alternativa \"D\" está incorreta. Enquanto revisando plano de ação pode ser parte resolução, o Diretor Executivo de Auditoria deve ainda escalar questão se o risco é deemed unacceptable."},{"id":"M2_U3_Q26","num":26,"total":35,"module":"M2","unit":"U3","topic":"Comunicação com Partes Interessadas","question_pt":"Qual das seguintes alternativas cenários deveria mais provável exigir formal final comunicação para um trabalho de consultoria?","options_pt":{"A":"Equipe de auditoria interna fornece informal retorno para administração durante brainstorming session.","B":"Equipe de auditoria interna conduz conformidade revisar com não significativo achados.","C":"Equipe de auditoria interna fornece quick orientação para administração em um menor operacional questão.","D":"Equipe de auditoria interna fornece recomendações como parte de um projeto para avaliar novo processo crítico à organização success."},"correct":"D","explanation_pt":"Alternativa \"A\" está incorreta. Informal retorno durante brainstorming sessions faz não exigir comunicação formal. Alternativa \"B\" está incorreta. Conformidade revisa são mais comum em garantia trabalho de auditorias, no trabalhos de auditoria consultivos. Alternativa \"C\" está incorreta. Quick orientação em menor questões faz não tipicamente exigir comunicação formal. Alternativa \"D\" está correta. Final comunicação formal é não sempre exigido para trabalhos de auditoria consultivos, dependendo não natureza trabalho de auditoria e cliente expectativas. Em casos onde administração pode solicitaçõesr quick orientação de auditores internos, comunicação formal (e.g., relatório formal) poderia não ser necessário. no entanto, formal final comunicação pode ser exigido quando trabalho de consultoria envolve crítico recomendações para um projeto success. Em este caso, orientação de auditores internos pode play crítico papel não success whole projeto, e relatório formal pode ser solicitaçõesdo para garantir a orientação é preciso e tempestivo."},{"id":"M2_U3_Q27","num":27,"total":35,"module":"M2","unit":"U3","topic":"Comunicação com Partes Interessadas","question_pt":"Durante fase de planejamento, Qual das seguintes alternativas partes interessadas deve ser incluído em inicial comunicação para foster colaboração?","options_pt":{"A":"Administração atividade sob revisão","B":"Alta administração","C":"Conselho membros","D":"Reguladores"},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Auditores internos deve incluir todos relevantee partes interessadas não inicial comunicação para foster colaboração. Estes partes interessadas geralmente incluir administração atividade sob revisão, bem como relevantee funcionários. Alternativa \"B\" está incorreta. Alta administração são não principal partes interessadas não fase de planejamento. Alternativa \"C\" está incorreta. Conselho membros são não diretamente envolvido em inicial comunicação para mais trabalho de auditorias. Alternativa \"D\" está incorreta. Reguladores são não tipicamente envolvido em inicial comunicação. Eles poderia ser envolvido no relatório final comunicação do trabalho, dependendo não circunstâncias."},{"id":"M2_U3_Q28","num":28,"total":35,"module":"M2","unit":"U3","topic":"Comunicação com Partes Interessadas","question_pt":"Equipe de auditoria interna identifica esse administração tem accepted nível de risco esse exceeds a organização tolerância ao risco. O Diretor Executivo de Auditoria discusses questão com alta administração, mas não resolução é reached. Qual é o Diretor Executivo de Auditoria próximo etapa?","options_pt":{"A":"Escalar questão ao conselho, como risco exceeds a organização tolerância ao risco.","B":"Aceitar alta administração decisão e documentar questão não relatório do trabalho.","C":"Adiar adicional ação até que o próximo trabalho de auditoria para reavaliar o risco.","D":"Recomendar esse administração revise o plano de ação para mitigar o risco."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. De acordo com Norma 11.5 comunicando a aceitação de riscos, quando Diretor Executivo de Auditoria (Diretor Executivo de Auditoria) concludes esse administração tem accepted nível de risco esse exceeds da organização apetite ao risco ou tolerância ao risco, o assunto deve ser discussed com alta administração. Se o Diretor Executivo de Auditoria determina esse o assunto tem não sido resolved por alta administração, o assunto deve ser escalado ao conselho. Portanto, escalando questão ao conselho é o correto ação para tomar para o Diretor Executivo de Auditoria desdo risco exceeds a organização tolerância ao risco e questão é não resolved por alta administração. Alternativa \"B\" está incorreta. Aceitando alta administração decisão é não adequado para significativo riscos, de acordo com a Normas. Alternativa \"C\" está incorreta. Atrasando ação é não adequado para um crítico risco esse exige imediato attention. Alternativa \"D\" está incorreta. Revisando plano de ação faz não tratar o unresolved risco."},{"id":"M2_U3_Q29","num":29,"total":35,"module":"M2","unit":"U3","topic":"Comunicação com Partes Interessadas","question_pt":"Qual das seguintes alternativas não uma parte interessada tipicamente envolvido em final comunicação do trabalho?","options_pt":{"A":"Externo fornecedores","B":"Administração atividade sob revisão","C":"Conselho membros","D":"Alta administração"},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Não conclusão trabalho de auditoria, auditores internos preparar final comunicações com base em trabalho de auditoria achados bem como recomendações e/ou planos de ação que são discussed com administração atividade sob revisão. Partes interessadas envolvido em comunicação durante conclusão e fase de elaboração fazer relatório trabalho de auditoria incluir administração atividade sob revisão, alta administração, o conselho, e outro partes interessadas como auditores externos ou reguladores. Portanto, externo fornecedores são não tipicamente envolvido em final comunicação do trabalho. Alternativa \"B\" está incorreta. Administração atividade sob revisão é principal parte interessada em final comunicação do trabalho. Alternativa \"C\" está incorreta. Conselho membros são principal partes interessadas em final comunicação do trabalho. Alternativa \"D\" está incorreta. Alta administração é principal parte interessada em final comunicação do trabalho."},{"id":"M2_U3_Q30","num":30,"total":35,"module":"M2","unit":"U3","topic":"Comunicação com Partes Interessadas","question_pt":"Qual das seguintes é um exemplo de uma comunicação formal método durante fase de planejamento de um trabalho de auditoria?","options_pt":{"A":"Verbal atualiza durante trabalho de campo","B":"Escrito announcements ou entrance reunião agendas","C":"Impromptu discussões com administração","D":"Informal emails para esclarecer objetivos do trabalho de auditoria"},"correct":"B","explanation_pt":"Alternativa \"A\" está incorreta. Verbal atualiza durante trabalho de campo são parte de contínuo comunicação e são não específico à fase de planejamento de um trabalho de auditoria. Alternativa \"B\" está correta. Durante fase de planejamento de um trabalho de auditoria, comunicação formal métodos, como escrito announcements ou entrance reunião agendas, são eficaz para definindo claro expectativas sobre o trabalho de auditoria objetivos, escopo, e timing. Estes métodos garantir esse todos partes têm documentarado compreensão trabalho de auditoria propósito e requisitos. Alternativa \"C\" está incorreta. Impromptu discussões são comunicação informal métodos. Alternativa \"D\" está incorreta. Informal emails são não considerado comunicação formal métodos."},{"id":"M2_U3_Q31","num":31,"total":35,"module":"M2","unit":"U3","topic":"Comunicação com Partes Interessadas","question_pt":"Durante uma revisão de fornecedor administração práticas, equipe de auditoria interna descobre esse novo fornecedor contrato foi aprovado sem seguinte da organização compras e aquisições política. O contrato envolve significativo financeiro compromisso e foi assinado por mid-nível gestor sem adequado autorização. Quando questão é raised com o compras e aquisições diretor, eles argue esse o contrato foi necessário para avoid operacional adiars. no entanto, equipe de auditoria interna também identifica esse o fornecedor tem hirelato de regulatório não conformidade, que poderia expose a organização para legal riscos. O Diretor Executivo de Auditoria escala questão para alta administração, mas eles decidir não para tomar qualquer ação, citing o operacional importance fornecedor. Qual é fazer Diretor Executivo de Auditoria próximo etapa?","options_pt":{"A":"Aceitar alta administração decisão e documentar questão não relatório do trabalho.","B":"Escalar questão ao conselho, como financeiro e legal riscos exceed da organização tolerância ao risco.","C":"Recomendar esse o compras e aquisições diretor renegotiate o contrato termos para mitigar os riscos.","D":"Adiar adicional ação até que o próximo trabalho de auditoria para reavaliar o fornecedor conformidade."},"correct":"B","explanation_pt":"Alternativa \"A\" está incorreta. Aceitando alta administração decisão é não adequado para significativo riscos esse reprincipal unresolved. Alternativa \"B\" está correta. De acordo com Norma 11.5: comunicando a aceitação de riscos, quando Diretor Executivo de Auditoria concludes esse administração tem accepted nível de risco esse exceeds da organização apetite ao risco ou tolerância ao risco, o assunto deve ser discussed com um sênior gestor. Se o Diretor Executivo de Auditoria determina esse o assunto tem não sido resolved por alta administração, o assunto deve ser escalado ao conselho. Após o Diretor Executivo de Auditoria escala questão sobre o novo fornecedor contrato para alta administração, o alta administração decides não para tomar qualquer ação, indicando esse o risco esse exceeds da organização tolerância ao risco tem não sido resolved. Portanto, o Diretor Executivo de Auditoria deve escalar questão ao conselho. Alternativa \"C\" está incorreta. Renegotiating o contrato faz não tratar o subjacente risco de não conformidade e não autorizado aprovação. Alternativa \"D\" está incorreta. Atrasando ação é não adequado para um crítico risco esse exige imediato attention."},{"id":"M2_U3_Q32","num":32,"total":35,"module":"M2","unit":"U3","topic":"Comunicação com Partes Interessadas","question_pt":"Qual das seguintes alternativas melhor descreve final comunicações para trabalhos de auditoria consultivos?","options_pt":{"A":"Final comunicações para trabalhos de auditoria consultivos deve acompanhar o mesmo formato como garantia trabalho de auditorias.","B":"Final comunicações para trabalhos de auditoria consultivos pode ser menos formal e pode incluir presentations, memorandos, ou emails.","C":"Trabalhos de auditoria consultivos sempre exigir formal relatório escrito.","D":"Trabalhos de auditoria consultivos fazer não exigir qualquer form de final comunicação."},"correct":"B","explanation_pt":"Alternativa \"A\" está incorreta. Final comunicações para trabalhos de auditoria consultivos fazer não têm para acompanhar o mesmo formato como garantia trabalho de auditorias. Alternativa \"B\" está correta. Final comunicação formal é não sempre exigido para trabalhos de auditoria consultivos, dependendo não natureza trabalho de auditoria e cliente expectativas. Final comunicações para trabalhos de auditoria consultivos pode ser menos formal fazer que um trabalho de avaliação e pode incluir presentations, memorandos, ou emails. Alternativa \"C\" está incorreta. Trabalhos de auditoria consultivos fazer não sempre exigir formal relatório escrito. Em casos onde administração pode solicitaçõesr quick orientação de auditores internos, comunicação formal (e.g., relatório formal) poderia não ser necessário. Alternativa \"D\" está incorreta. Trabalhos de auditoria consultivos pode exigir final comunicação, dependendo não natureza trabalho de auditoria. há pode ser casos onde relatório formal é necessidade, especialmente quando função de auditoria interna é parte de um projeto para avaliar um processo ou produto. Em este caso, orientação de auditores internos pode play crítico papel não success whole projeto, e relatório formal pode ser solicitaçõesdo para garantir a orientação é preciso e tempestivo."},{"id":"M2_U3_Q33","num":33,"total":35,"module":"M2","unit":"U3","topic":"Comunicação com Partes Interessadas","question_pt":"Um auditor descobre material misstatement em registros financeiros esse administração refuses para correto. Qual é o melhor curso de ação?","options_pt":{"A":"Revisando auditoria escopo para avoid tratando misstatement.","B":"Escalando questão para sênior liderança e comitê de auditoria.","C":"Ignoring questão desde administração faz não see ele como problema.","D":"Documentando a preocupação privately sem notificando liderança."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Material misstatements exigir escalonamento para garantir financeiro precisão e conformidade com Normas Globais de Auditoria Interna."},{"id":"M2_U3_Q34","num":34,"total":35,"module":"M2","unit":"U3","topic":"Comunicação com Partes Interessadas","question_pt":"Após emissão de o relatório final do trabalho, equipe de auditoria interna descobre significativo erro não relatório. Qual é ação mais adequada ação para o Diretor Executivo de Auditoria (Diretor Executivo de Auditoria) para tomar?","options_pt":{"A":"Tratar o erro durante o próximo trabalho de auditoria.","B":"Tomar não ação, como relatório tem already sido finalizando e distributed.","C":"Comunicar o corrected informação para todos partes quem recebido originalmente relatório e documentar a correção processo.","D":"Notificar o conselho imediatamente e questão revised relatório do trabalho."},"correct":"C","explanation_pt":"Alternativa \"A\" está incorreta. Tratando erro durante o próximo trabalho de auditoria é insuficiente para um significativo questão. Alternativa \"B\" está incorreta. Taking não ação violates a Normas e é não acceptable quando significativo erro é identificado. Alternativa \"C\" está correta. De acordo com Norma 11.4, equipe de auditoria interna deve comunicar o erro ou omission ao adequado partes e determinar se revised relatório é necessário com base não importância questão. Portanto, o Diretor Executivo de Auditoria deve comunicar o corrected informação para todos partes quem recebido originalmente relatório e documentar a correção processo. Alternativa \"D\" está incorreta. Enquanto notificando conselho pode ser necessário, decisão para questão revised relatório deve ser com base não importância erro."},{"id":"M2_U3_Q35","num":35,"total":35,"module":"M2","unit":"U3","topic":"Comunicação com Partes Interessadas","question_pt":"Durante acompanhamento trabalho de auditoria, equipe de auditoria interna descobre esse administração tem não implementado principal planos de ação para tratar significativo deficiência de controle pelo agreed conclusão date. Quando questioned, administração explica esse recurso constraints têm atrasado implementação mas fornece não claro cronograma para conclusão. O auditores internos escalar questão ao Diretor Executivo de Auditoria (Diretor Executivo de Auditoria), quem determina esse o adiar pode indicar esse administração tem accepted um risco exceeding da organização tolerância ao risco. Qual das seguintes é ação mais adequada para o Diretor Executivo de Auditoria para tomar?","options_pt":{"A":"Aceitar administração explanation e documentar o adiar não acompanhamento relatório.","B":"Recomendar esse administração revise o plano de ação para incluir novo conclusão date.","C":"Encerrar questão na auditoria registros, como administração teve fornecido reason para o adiar.","D":"Comunicar questão para alta administração para resolução, e se unresolved, escalar o assunto ao conselho."},"correct":"D","explanation_pt":"Alternativa \"A\" está incorreta. Aceitando administração explanation sem adicional ação é insuficiente para tratando um unacceptable risco. Alternativa \"B\" está incorreta. Enquanto revisando plano de ação pode ser parte resolução, o Diretor Executivo de Auditoria deve ainda escalar questão se o risco é deemed unacceptable. Alternativa \"C\" está incorreta. Closing questão prematurely é não adequado quando risco reprincipals unresolved. Alternativa \"D\" está correta. De acordo com Norma 15.2, se o Diretor Executivo de Auditoria determina esse o adiar ou inaction indica um unacceptable risco, o assunto deve ser comunicado alta administração para resolução. Se alta administração faz não resolve questão, o Diretor Executivo de Auditoria deve escalar ele ao conselho."},{"id":"M3_U1_Q1","num":1,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Empresa implementou uma política para cumprir com privacidade regulamentações. Qual tipo de controle faz este representa?","options_pt":{"A":"Controle preventivo.","B":"Técnico controle.","C":"Governança controle.","D":"Administração controle."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Privacidade conformidade política é principalmente controle preventivo como ele aims para avoid violações por definindo rules e procedimentos para proteger privacidade."},{"id":"M3_U1_Q2","num":2,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Que banco de dados controle deveria ser mais eficaz em mantendo segregação de deveres adequado ao usuários' relatórioando estrutura em uma organização?","options_pt":{"A":"Acesso segurança features.","B":"Software mudança controle procedimentos.","C":"Dependency checks.","D":"Cópia de segurança e recuperação procedimentos."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Acesso segurança features restringir usuários para funções e dados compatible com organizacional estrutura. Software mudança controle procedimentos fornecer controles sobre software mudanças para aplicativo desenvolvimento funções. Dependency checks fornecer controles sobre o form e tipo de dados entered por usuários. Cópia de segurança e recuperação procedimentos fornecer controles sobre o continuard disponibilidade de dados recursos para usuários."},{"id":"M3_U1_Q3","num":3,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Uma organização é concerned sobre pequeno grupo de politically active indivíduos quem poderia pose moderado ameaça. Qual termo é utilizado para descrever este grupo?","options_pt":{"A":"Phishing artists.","B":"Cyber ameaça actors.","C":"Nation-declarar actors.","D":"Hacktivists."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Hacktivists são indivíduos quem engage em cyberataques para political ou social causes. Enquanto outro opções descrever ameaça actors, eles fazer não eespecíficoamente focar em politically motivated indivíduos."},{"id":"M3_U1_Q4","num":4,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Qual das seguintes alternativas deveria ser de greatest preocupação um auditor interno revisando uma política em relação a o venda de uma empresa utilizado personal computers para fora de partes?","options_pt":{"A":"Se há é operacional sistema software não computador.","B":"Se deleted arquivos não hard disk drive têm sido completoly erased.","C":"Se todos software não computador é adequadamente licensed.","D":"Se o computador tem viruses."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Garantindo esse deleted arquivos têm sido completoly erased mitiga o risco de não autorizado acesso para confidencial ou sensível empresa informação."},{"id":"M3_U1_Q5","num":5,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Qual é melhor indicador de um maduro segurança cibernética programa?","options_pt":{"A":"Shortened tempo para resposta da administração.","B":"Formal contínuo monitorando programa.","C":"Manutenção de ativo estoque.","D":"Fully automatizado acesso administração processos."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Shortened tempo para resposta da administração demonstra o capacidade para responder quickly e eficazmente para ameaças."},{"id":"M3_U1_Q6","num":6,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Uma organização tem 5,000 funcionários, quem trabalho em one centralizado localização. A organização provisioning políticas exigir o funcionário supervisor para aprovar o funcionário acesso. A organização tem 36 sistemas, e mais funcionários têm acesso para mais fazer que 10 sistemas. Exemplos de sistemas incluir tesouraria workstations, razão geral, contas pagar, contas receber, e o cliente administração sistema. Um funcionário supervisor pode aprovar qualquer sistema e papel para seu ou seu funcionários para acesso. A organização tem alto turnover dentro de seu supervisor ranks. Mais replacements para de supervisão positions são externo hires em vez de interno promotions. Administraçãas solicitaçõesções esse função de auditoria interna revisar o atual provisioning processo utilizado por supervisores para aprovar acesso, e interno auditoria fornece vários recomendações. Qual das seguintes é melhor recomendação para melhorar o atual processo?","options_pt":{"A":"Create documentação para cada sistema, papel, e papel definição.","B":"Exigir secundário aprovação pelo sistema owner.","C":"Create papel matrices por job categoria.","D":"Fornecer novo supervisor treinamento em provisioning funcionário acesso."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Creating papel matrices por job categoria standardizes acesso, reduzindo erros e garantindo alinhamento com organizacional requisitos."},{"id":"M3_U1_Q7","num":7,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Qual das seguintes alternativas alerta um auditor interno esse a organização pode têm um risco de exposure para computador viruses?","options_pt":{"A":"Presence de dados-encrypted arquivos.","B":"Ability para download público-doprincipal ou não autorizado software.","C":"Necessidade para diário cópias de segurança sistema.","D":"Controle de usuário acesso."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. One mais frequente problemas com viruses é não autorizado ou uncontrolled installation de software. O auditor deve documentar este situação como problema em seu ou seu achados."},{"id":"M3_U1_Q8","num":8,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Antivirus software para seguro seu computers. Qual é o principal risco em dependendo exclusivamente em antivirus software?","options_pt":{"A":"Interfering com sistema operações.","B":"Não detectando certain viruses.","C":"Consuming too muitos sistema recursos.","D":"Tomada software installation overly complexo."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Antivirus software pode falha para detectar alguns novo ou sophisticated viruses, posing crítico risco para segurança."},{"id":"M3_U1_Q9","num":9,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Qual das seguintes alternativas autenticação fatores é um exemplo de algo você têm?","options_pt":{"A":"Senha.","B":"impressão digital.","C":"Crédito card.","D":"Numeric code."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Crédito card é um exemplo de algo você têm, one three autenticação fatores."},{"id":"M3_U1_Q10","num":10,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Qual das seguintes seria melhor método para prove para fora de autoridades e auditores esse todos regulatório requisitos são sendo satisfeitos em regard para tecnoregistraria da informação?","options_pt":{"A":"Active controles de TI exceeding um setor parâmetro de referência nível.","B":"Auditoria resultados de controles de TI showing conformidade não anterior auditoria.","C":"Usar de um controle estrutura.","D":"Todos ele funcionários membros possessing adequado certificações."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Usando um controle estrutura demonstra sistemático conformidade com regulatório requisitos e fornece evidências de estruturado ele governança práticas."},{"id":"M3_U1_Q11","num":11,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Uma organização quer prevenir não autorizado acesso para seu sistemas e dados. Qual das seguintes alternativas deveria melhor ajudar atingir este?","options_pt":{"A":"Continuidade de negócios planos esse detalhe procedimentos para acompanhar em caso de sistema disruptions ou falhas.","B":"Firewalls esse monitorar e block não autorizado acesso com base em predefined segurança políticas e configurações.","C":"Interno auditorias esse avaliar organizacional conformidade com segurança e operacional Normas.","D":"Segurança event registra esse acompanhar e documentar acesso e atividade para later revisar e análise."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Firewalls act como preventative controles, blocking não autorizado acesso e mitigando potencial riscos antes de eles ocorre."},{"id":"M3_U1_Q12","num":12,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Empresa rede experiences desempenho degradação devido a um ataque esse se espalha em toda sistemas e consome excessivo recursos. Que tipo desoftware malicioso é mais provável responsável por este ataque?","options_pt":{"A":"Registraric bomb.","B":"Malware.","C":"Worm.","D":"Trojan horse."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Worm é tipo de programa malicioso esse pode se replicar e spread em toda redes sem usuário intervention. Ele frequentemente causes denial-de-serviço (DoS) ataque por consuming rede recursos e causing desempenho questões."},{"id":"M3_U1_Q13","num":13,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Como pode empresa com múltiplos stores melhor proteger a confidencialidade de dados sendo transmitted via satellite entre stores e sede?","options_pt":{"A":"Restringir acesso ao satellite rede.","B":"Usar cópia de segurança satellite connection.","C":"Encrypt o satellite transmissions.","D":"Monitorar satellite rede traffic."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Criptografia garante a confidencialidade de dados por tomada ele unreadable durante transmission, assim protegendo sensível informação de não autorizado acesso."},{"id":"M3_U1_Q14","num":14,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Empresa é very conscious sensível natureza de empresa informação. Qual é o mais importante thing para o segurança administrador para monitorar?","options_pt":{"A":"Dados owner específicoation de acesso privileges.","B":"Administração autorização de modified acesso.","C":"Múltiplos acesso para dados por dados owners.","D":"Acesso para operacional dados por privileged usuários."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Monitorando acesso para operacional dados por privileged usuários é crítico como estes usuários frequentemente têm extensive acesso rights esse, se misused, poderia resultado em um breach."},{"id":"M3_U1_Q15","num":15,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Por que são controles detectivos considerado mais significativo tipo de segurança cibernética controle em protegendo uma organização rede?","options_pt":{"A":"Controles detectivos fornecer percepções em potencial riscos e permitir para ações corretivas após um incidente.","B":"Controles detectivos create registra e registros esse pode ser revisado later mas fazer não prevenir ataques de happening.","C":"Controles detectivos ajudar identificar e responder para segurança breaches em real- tempo, minimizing o impacto de ameaças.","D":"Controles detectivos são mais eficaz em prevenindo ataques de occurring e stopping them antes de eles escalar."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Controles detectivos são crucial porque eles ajudar identificar e responder para segurança incidentes prontamente, possibilitando a organização para minimize damage e manter sistema integridade."},{"id":"M3_U1_Q16","num":16,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Se o financeiro sistema tem begun para create erros em da organização demonstrações financeiras, Qual das seguintes alternativas deveria ser o mais eficaz primeiro etapa um auditor interno poderia tomar para determinar a causa?","options_pt":{"A":"Revisar todos saída controles.","B":"Revisar o programa code.","C":"Revisar todos batch controles.","D":"Revisar programa mudança registra."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. O auditor deve primeiro eliminar o possibility de human intervention por garantindo apenas autorizado indivíduos têm accessed o programa library e por que."},{"id":"M3_U1_Q17","num":17,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Grande sistema exige careful administração de processamento recursos para priorizar e cronograma competing aplicações. Em qual nível ele controle estrutura deveria o ele auditor testar estes controles?","options_pt":{"A":"Físico nível.","B":"Sistema desenvolvimento nível.","C":"Aplicativo nível.","D":"Sistema software nível."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Estes controles deveria form parte sistema itself como ele deve deal com gerenciando processamento recursos para o todo organização e todos sistemas."},{"id":"M3_U1_Q18","num":18,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Cyberataque overwhelms shared recurso, leaving none disponível para outro usuários. Qual é este ataque called?","options_pt":{"A":"Denial-de-serviço ataque projetado para exhaust recursos.","B":"Layer 7 DDoS ataque targeting específico web aplicações.","C":"Servidor/principalframe ataque targeting centralizado calculando power.","D":"Asynchronous ataque aproveitando uncoordinated dados flows."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Denial-de-serviço ataques aim para overwhelm shared recursos, rendering them undisponível para outro usuários."},{"id":"M3_U1_Q19","num":19,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Qual das seguintes alternativas melhor descreve a responsabilidade de organizações em protegendo personal dados sob dados privacidade regulamentações?","options_pt":{"A":"Organizações deve compartilhar personal dados com terceiro partes apenas após obtendo explicit consent.","B":"Organizações deve fornecer indivíduos acesso para seus personal dados sobre solicitaçõesr.","C":"Organizações deve garantir personal dados é coletado, stored, e utilizado apenas para lawful propósitos.","D":"Organizações deve encrypt personal dados em transit e em rest."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Organizações são responsável por coletando, storing, e usando personal dados apenas para lawful propósitos, em conformidade com dados privacidade leis."},{"id":"M3_U1_Q20","num":20,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Qual das seguintes alternativas controles de TI incluir proteção para principalframe computers e workstations?","options_pt":{"A":"Mudança administração controles.","B":"Organização e administração controles.","C":"Físico e ambienteal controles.","D":"Sistema software controles."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Físico e ambienteal controles incluir proteção para principalframe computers e workstations."},{"id":"M3_U1_Q21","num":21,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Uma organização usa e-mail extensively sobre o Internet. Todos usuários têm um estabelecido senha para get em seus conta. Qual das seguintes afirmações está correta em relação a tal segurança?","options_pt":{"A":"Todos messages não Internet são encrypted, portanto fornecendo enhanced segurança.","B":"Se someone gains de supervisão-nível acesso ao arquivo servidor containing eletrônico messages, esse pessoa poderia ainda não obter acesso ao arquivo containing eletrônico mail messages menos que ele ou ela primeiro decrypted o segurança controle registrar.","C":"Há irá ser não maneira para determinar que usuário contas têm sido breached se usuário relatórios esse seu ou seu senha teve sido stolen.","D":"Senhas são eficaz em garantindo esse someone attempting para registrar em sob usuário name é prevenido de casually acessando o usuário dados."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Senhas são eficaz contra o casual intrusos. Messages não Internet são não encrypted. Ele é o sender e receiver responsabilidade para encrypt confidencial informação. Se someone gains acesso ao servidor, ele ou ela pode download o arquivo de messages e obter acesso ao messages sem trabalhando com qualquer segurança registrar."},{"id":"M3_U1_Q22","num":22,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Qual é melhor método para estabelecendo critérios para quando multi-fator autorização é exigido?","options_pt":{"A":"Papel-baseado controle de acesso e privilege atribuições.","B":"Dados classificação e relacionado dados proteção políticas.","C":"Segregação/separation de deveres para crítico sistemas.","D":"Controle inheritance e relacionado permissions."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Dados classificação ajuda garantir esse sensível informação é adequadamente protegido, guiding o aplicativo de multi-fator autorização."},{"id":"M3_U1_Q23","num":23,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Qual das seguintes alternativas deveria ser adequado para considerar não físico desenho de um dados center?","options_pt":{"A":"Desenho de autorização tables para operacional sistema acesso.","B":"Substituição de um badge e senha sistema com um novo biométrico acesso sistema.","C":"Inclusão de um fonte de energia ininterrupta sistema e surge proteção.","D":"Avaliação de potencial riscos de remoto hackers."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. A inclusão de um fonte de energia ininterrupta sistema e surge proteção é crucial para protegendo equipamento e garantindo uninterrupted operações durante power outages."},{"id":"M3_U1_Q24","num":24,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Que exemplo deveria ser considerado a \"non-malicious\" insider ameaça?","options_pt":{"A":"Consultor usa crédito card informação para commit fraude.","B":"Funcionário steals trade secrets e later sells them um concorrente.","C":"Funcionário damages um ex-employer computador rede.","D":"Funcionário falls victim para social engineering ou phishing emails."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Falling victim para social engineering ou phishing representa unintentional ações esse compromise segurança."},{"id":"M3_U1_Q25","num":25,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Fornecidos esse a organização é facing 30% erro taxa quando definindo up usuário acesso em seu atual sistema, Qual das seguintes alternativas custo-eficiente recomendações deveria ajudar reduzir este erro taxa enquanto mantendo apertado orçamento constraints?","options_pt":{"A":"Atribuir specialists por sistema para usuário conta setup com o ele ajudar desk para garantir adequado acesso configuração.","B":"Implementar one-sobre-one revisar de usuário acesso setup, que garante um adicional nível de revisar para precisão.","C":"Implementar único sign-em para otimizar usuário acesso administração em todas as sistemas.","D":"Automate o usuário setup processo para reduzir manual intervention e erros."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. automatizando o usuário setup processo trata o núcleo questão de manual erros, significativamente reduzindo 30% erro taxa enquanto keeping custos down. Automation pode ser implementado com mínimo investimento compared para manual revisa ou designando adicional specialists. Este é o mais custo-eficiente solução para o organização sob apertado orçamento constraints."},{"id":"M3_U1_Q26","num":26,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Qual das seguintes alternativas deveria ser incluído em um revisar controles sobre cópia de segurança e recuperação de um teleprocessing rede?","options_pt":{"A":"Revisar protegendo e secrecy de documentara/manuals indicando cópia de segurança e recuperação responsabilidades.","B":"Garantindo esse end usuário dados arquivo cópias de segurança são nunca stored não local área rede (LAN).","C":"Revisar de controles sobre hardware e software falhas.","D":"Revisar usar e adequação de criptografia processos."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Controles necessidade para ser em place para tratar hardware e/ou software falhas. Usuário dados arquivo cópias de segurança pode ser não LAN mesmo que um off-local copy é também importante. Criptografia é comunicação controle para segurança e é não relacionado cópia de segurança e recuperação. documentação esse informa funcionários de seus cópia de segurança e recuperação responsabilidades deve ser amplamente disseminated ao pessoas com estes responsabilidades em vez de kept secret."},{"id":"M3_U1_Q27","num":27,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Durante privacidade auditoria, um auditor interno revisa da organização BYOD política. Qual das seguintes alternativas deveria ser principal controle objetivo para este política?","options_pt":{"A":"Monitorando para não autorizado dispositivos acesso.","B":"Contratado certificações de self-owned dispositivos segurança atualizando.","C":"Existence e completude de um signed passivo waiver form.","D":"Adequação de segurança protections e correção atualiza."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. O principal objetivo deveria focar em prevenindo não autorizado dispositivos de acessando empresa recursos, garantindo conformidade com segurança Normas."},{"id":"M3_U1_Q28","num":28,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Empresa quer garantir esse apenas específico funcionários pode realizar crítico ações, como aprovando transações. Que processo deveria atingir este meta?","options_pt":{"A":"Identity proofing mechanisms para verificar usuário identity durante registro ou onconselhoing.","B":"Acreditação procedimentos para certify conformidade com externo ou interno requisitos.","C":"Autenticação etapas para validar usuário credentials não tempo de registrarin ou acesso.","D":"Autorização processos para grant permissions com base em predefined acesso papéis e políticas."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Autorização processos garantir esse específico usuários têm o exigido permissions para realizar crítico ações com base em acesso papéis e políticas."},{"id":"M3_U1_Q29","num":29,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Qual deve o banco de dados administrador fazer para adequadamente controle acesso para contabilidade banco de dados arquivos?","options_pt":{"A":"Fornecer read-apenas acesso ao banco de dados arquivos para usuários para prevenir modificação.","B":"Permitir atualizando de privileged utilities para garantir integridade dos dados e segurança.","C":"Garantir acesso apenas para autorizado lógico views dados para prevenir não autorizado acesso.","D":"Autorização usuário atualiza de seus acesso profiles para adequado controle de acesso."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Permitindo acesso apenas para autorizado lógico views banco de dados garante esse apenas esses com o adequado permissions pode visão ou modificar sensível dados."},{"id":"M3_U1_Q30","num":30,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Qual das seguintes alternativas poderia ser utilizada em um sistema biométrico para autenticar um usuário?","options_pt":{"A":"Voz.","B":"Senha.","C":"Código PIN.","D":"Crachá de funcionário."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. A voz de uma pessoa é uma característica pessoal (biométrica). As demais alternativas são baseadas em conhecimento pessoal (senha, PIN) ou em posse de um objeto (crachá)."},{"id":"M3_U1_Q31","num":31,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Qual é crítico área um auditor interno deve compreender quando planejando um trabalho de auditoria para avaliar como well empresa está gerenciando insider ameaças?","options_pt":{"A":"Conhecimento empresa.","B":"Negócio objetivos.","C":"Disponível proteção recursos.","D":"Natureza de insider ameaças."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. compreensão o natureza de insider ameaças é essencial para identificando potencial vulnerabilidades e áreas para melhoria."},{"id":"M3_U1_Q32","num":32,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Por que é collusion entre dois ou mais insiders considerado mais difficult segurança cibernética ameaça para detectar?","options_pt":{"A":"Detecção ferramentas frequentemente monitorar indivíduo ações, tomada ele hard para identificar coordinated esforços.","B":"Insiders trabalhando together pode bypass segurança controles, create fake contas, ou manipulate dados em ways esse evade detecção.","C":"Colluding insiders pode hide seus atividades por blending them com normal operações, tomada detecção harder.","D":"Dois ou mais insiders pode alter registra e fabricate dados, prevenindo easy detecção de seus ações."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Collusion permite insiders para bypass controles, manipulate registra, e coordenar ações em ways que são difficult para detectar usando traditional monitorando sistemas."},{"id":"M3_U1_Q33","num":33,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Qual das seguintes é verdadeiro infraestrutura web?","options_pt":{"A":"O Internet backbone é nenhum owned nem gerenciado.","B":"O World amplo Web Consortium (W3C) gerencia o nonphysical portions Internet.","C":"O doprincipal name sistema (DNS) automatically inclui métodos para fornecer authenticated denial de existence.","D":"Intranets e extranets exigir greater controles sobre usuário autenticação e privacidade fazer que Internet acesso exige."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Intranets e extranets exigir stricter controles em autenticação e privacidade fazer que o Internet devido a seus negócio-crítico natureza e sensível dados."},{"id":"M3_U1_Q34","num":34,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Como parte de de uma organização contínuo segurança cibernética esforços, Qual das seguintes seria melhor exemplo de monitoramento contínuo?","options_pt":{"A":"Fornecendo governança oversight.","B":"Designando acesso.","C":"Conduzindo penetration testando.","D":"Inventorying informação ativos."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Monitoramento contínuo é melhor ilustrou por conduzindo penetration testando, como ele actively identifica vulnerabilidades não rede. Outro opções são importante, mas eles são mais administrative ou structural ações, não monitorando."},{"id":"M3_U1_Q35","num":35,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Em responding para segurança cibernética incidentes, que controle heavily depende em registrando e monitorando tecnoregistrarias?","options_pt":{"A":"Terceiros avaliações de riscos e oversight.","B":"Incidente resposta.","C":"Malware discovery e acompanhamento.","D":"Vulnerabilidade avaliações."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Registrando e monitorando tecnoregistrarias são integral para incidente resposta como eles permitir detecção e tracking de segurança events. Enquanto eles contribute para outro áreas, eles são mais central para incidente resposta."},{"id":"M3_U1_Q36","num":36,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Qual é melhor thing auditores internos poderia recomendar se de uma organização ele administração e ele segurança pessoal têm poor trabalhando relações e há appears para ser não estabelecido maneira para sistematicamente identificar ele vulnerabilidades?","options_pt":{"A":"Indicar esse a organização tem poor vulnerabilidade administração e priorizar lista de mitigação ou remediação etapas de acordo com risco.","B":"Enlist alta administração apoiar para melhorar o ele administração e ele segurança relação; no entanto, há é não maneira para sistematicamente identificar ele vulnerabilidades.","C":"Enquanto ele é importante para segregação de deveres esse ele administração e ele segurança oppose one outro, propor inventorying todos ele ativos e identificando seus associated vulnerabilidades.","D":"Realizar one-tempo ativo discovery com vulnerabilidade testando e recomendar remediação processo."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Recomendado etapa para melhorando administração de vulnerabilidades é para priorizar mitigação/remediação etapas de acordo com risco. Ativo discovery necessidades para ser um contínuo processo para keep ele continually up-para-date."},{"id":"M3_U1_Q37","num":37,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Qual é senha um exemplo de?","options_pt":{"A":"Lógico segurança controle.","B":"Físico segurança controle.","C":"Hazard controle.","D":"Dados armazenamento controle."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Senha é lógico segurança controle utilizado para restringir não autorizado acesso para sistemas ou dados."},{"id":"M3_U1_Q38","num":38,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Buy-side, sell-side, back-escritório atividades, e empresa recursos planejando (ERP) são subcategories de Qual das seguintes alternativas layers de ele?","options_pt":{"A":"Externo connections.","B":"Ele administração.","C":"Aplicações.","D":"Técnico infraestrutura."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Estes atividades fall sob o aplicações layer, que deals com processos de negócio apoiado por sistemas de TI."},{"id":"M3_U1_Q39","num":39,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Como deveria traga seu próprio dispositivo (BYOD) política melhor enhance de uma organização segurança cibernética estratégia por fornecendo capacidade para detectar, authenticate, e estoque unknown ele dispositivos não rede?","options_pt":{"A":"Tracking e monitorando.","B":"Mantendo um ativo estoque.","C":"Mantendo estratégia.","D":"Identificando funcionários' dispositivos."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. BYOD política principalmente aids em tracking e monitorando unknown dispositivos não rede, que é crucial para detectando não autorizado acesso e prevenindo segurança ameaças. Mantendo um ativo estoque é parte geral estratégia mas faz não diretamente tratar o necessidade para tempo real detecção e monitorando. Identificando funcionários' dispositivos e mantendo estratégia são componentes de um broader segurança cibernética abordagem mas são menos abrangente em tratando imediato segurança riscos posed por unknown dispositivos."},{"id":"M3_U1_Q40","num":40,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Identificadoational para qualquer segurança cibernética estrutura é o necessidade para garantir Qual das seguintes alternativas?","options_pt":{"A":"Contínuo monitorando.","B":"Adequado dados estoque.","C":"Adequado segurança configurações.","D":"Bem segurança cibernética governança."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Todos estruturas começar com bem governança práticas como overarching componente para atingir estrutura objetivos. Adequado segurança configurações irá garantir consistente aplicativo de segurança em toda sistemas, mas consistency não pode ocorre sem a Normas created e monitorado pelo geral segurança cibernética governança processo. Contínuo monitorando é crítico componente de segurança cibernética detecção processos, que deve incluir geral políticas e procedimentos fornecido pela governança facet. Um adequado dados estoque deveria ser utilizado como parte geral segurança cibernética avaliação de riscos para determinar risco e placement de recursos para proteger dados. O risco avaliação deveria ser parte geral governança estratégia."},{"id":"M3_U1_Q41","num":41,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Qual dos seguintes controles é o mais robusto e o mais provável de impedir acessos não autorizados a um sistema?","options_pt":{"A":"Identificação por impressão digital.","B":"Perguntas de segurança pessoal.","C":"Verificação de assinatura.","D":"Senhas complexas."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. A autenticação biométrica é o método de autenticação mais robusto entre as alternativas apresentadas."},{"id":"M3_U1_Q42","num":42,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Não autorizado alteration de online registros pode ser prevenido por employing Qual das seguintes alternativas?","options_pt":{"A":"Computador sequence checks.","B":"Computador matching.","C":"Principal verificação.","D":"Banco de dados controles de acesso."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Com banco de dados controles de acesso, usuários pode obter acesso para bancos de dados de terminals apenas por meio de estabelecido recognition e autorização procedimentos; assim, não autorizado acesso é prevenido."},{"id":"M3_U1_Q43","num":43,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Se concorrente gains acesso para pricing informação sendo transmitted de filial offices ao head escritório, qual controle deveria melhor prevenir este não autorizado acesso?","options_pt":{"A":"Transmit dados em night quando traffic é baixo.","B":"Exigir forte senha proteção para dados acesso.","C":"Usar fiber-optic cables para transmission.","D":"Encrypt os dados durante transmission."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Encrypting os dados durante transmission garante esse even se os dados é intercepted, ele reprincipals unreadable para não autorizado partes."},{"id":"M3_U1_Q44","num":44,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Para mitigar o risco de malware em uma empresa sistemas, Qual das seguintes alternativas práticas é mais eficaz?","options_pt":{"A":"Regular patching.","B":"Limiar analisa.","C":"Trimestral scans.","D":"Contínuo avaliações."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Regular patching garante esse sistemas são atualizado com o latest segurança fixes, reduzindo risco de malware. Enquanto outro métodos também fornecer proteção, patching diretamente trata conhecido vulnerabilidades."},{"id":"M3_U1_Q45","num":45,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"O CIA modelo consists de three concepts: confidencialidade, integridade, e Qual das seguintes alternativas?","options_pt":{"A":"Accessibility.","B":"Disponibilidade.","C":"Autenticação.","D":"Authenticity."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Disponibilidade garante dados e sistemas são acessível quando exigido, concluindo CIA triad."},{"id":"M3_U1_Q46","num":46,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Um indivíduo está usando Internet para launch ataques targeting financeiro institutions e crítico infraestrutura. Como deveria este indivíduo melhor ser categorized?","options_pt":{"A":"Hacktivists targeting sistemas para expose vulnerabilidades.","B":"Nation-declara/spies conduzindo cyber warfare ou espionage.","C":"Organized criminals buscando financeiro ou estratégico benefícios.","D":"Terrorists aiming para disrupt infraestrutura para political reasons."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Terrorists usar cyberataques para disrupt infraestrutura, como financeiro sistemas, frequentemente para adicional political objetivos ou incite fear."},{"id":"M3_U1_Q47","num":47,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Empresa está definindo up novo IAM sistema e necessidades para estabelecer processos para creating, modificando, e validando usuário identities. Que termo melhor descreve este atividade?","options_pt":{"A":"Provisioning processos esse envolver creating, modificando, validando, e gerenciando usuário identities dentro de um IAM sistema.","B":"Enforcement estratégias para garantir esse usuário acesso adheres para organizacional políticas e diretrizes.","C":"Identity administração atividades para manterfalha de revisãode usuário papéis, permissions, e sistema usage.","D":"Identity proofing métodos para verificar usuário identity como parte de onconselhoing ou conta creation processos."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Provisioning processos abranger creating, modificando, e validando usuário identity detalhes, que são núcleo atividades de IAM sistemas."},{"id":"M3_U1_Q48","num":48,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Empresa usa 25 sistemas, cada com seu own ID e senha. O processo de changing senhas tem become cumbersome e risky, como usuários fazer não têm seguro maneira para store them. Qual é melhor recomendação para otimizar o processo e reduzir risco?","options_pt":{"A":"Usar seguro senha vault para usuários.","B":"Exigir standardized senha políticas em toda sistemas.","C":"Implementar único sign-em para todos sistemas.","D":"Reduzir o total número de sistemas."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Implementando único sign-em (SSO) permite usuários para acesso múltiplos sistemas com um único registrarin credential, significativamente reduzindo burden de remembering e gerenciando numerous senhas. Este abordagem aprimora ambos segurança e eficiência por minimizing senha-relacionado riscos como senha fatigue, fraco senhas, e armazenamento questões. Adicionalmente, ele simplifies o senha reset processo, reduzindo potencial para segurança vulnerabilidades. SSO eliminates o necessidade para usuários para store múltiplos senhas, assim tratando segurança risco mencionou não stem."},{"id":"M3_U1_Q49","num":49,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Qual é melhor método para prevenir someone com suficiente técnico habilidades de circumventing segurança procedimentos e tomada não autorizado mudanças para production programas?","options_pt":{"A":"Running testar dados periodicamente para detectar discrepâncias e erros em production ambientes.","B":"Fornecendo adequado segregação de deveres para garantir não indivíduo tem controle sobre ambos desenvolvimento e production ambientes.","C":"Revisando concluído job relatórios para garantir todos processos são correctly executed e meet expectativas.","D":"Comparando production programas com independentemente controlled cópias para identificar não autorizado mudanças."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Segregação de deveres garante esse indivíduos não pode ambos desenvolver e operar production sistemas, reduzindo risco de não autorizado mudanças."},{"id":"M3_U1_Q50","num":50,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Que combination tipicamente fornece duplo autorização para crítico sistema papéis?","options_pt":{"A":"O banco de dados administrador e o sistema administrador.","B":"O superuser e o banco de dados administrador.","C":"O negócio owner e o sistema administrador.","D":"O negócio owner e o superuser."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Duplo autorização frequentemente envolve ambos o negócio owner, quem defines requisitos, e o sistema administrador, quem gerencia técnico acesso."},{"id":"M3_U1_Q51","num":51,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Qual são cyber insider ameaça profiles principalmente com base em?","options_pt":{"A":"Motivations.","B":"Conhecido ameaças.","C":"Apetite ao risco.","D":"Impactos de disruptions."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Risco profiles são principalmente com base em apetite ao risco, que garante o nível de risco e ameaça empresa irá gerenciar. Usuário motivations deveria ser considerado parte de conhecido ameaças, que deveria ser incluído como exemplos dentro da ameaça profile. Impactos de disruptions deveria fornecer semblance grau de disruption à empresa apetite ao risco."},{"id":"M3_U1_Q52","num":52,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Qual termo refers ao processos para determinando sistema acesso e permissions para um ID?","options_pt":{"A":"Federation.","B":"Separation de deveres.","C":"Proofing.","D":"Autorização."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Autorização garante esse usuários apenas acesso sistemas e realizar ações de acordo com designado permissions."},{"id":"M3_U1_Q53","num":53,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Qual das seguintes é melhor thing uma organização pode fazer para usar seu limitado recursos para proteger e defend contra cyber intrusions?","options_pt":{"A":"Implementar Norma segurança configurações.","B":"Estoque seu informação ativos.","C":"Manter bem segurança cibernética governança.","D":"Grant acesso com base em job papéis."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Inventorying informação ativos ajuda priorizar qual necessidades proteção, especialmente com limitado recursos."},{"id":"M3_U1_Q54","num":54,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Empresa com um e-commerce sistema serviços múltiplos declara e países. Qual é o principal question interno auditoria deve ask quando revisando dados privacidade protections?","options_pt":{"A":"Qual são comum dados elementos esse exigir proteção?","B":"Qual são máximo legal custos para não cumprindo?","C":"Qual é o máximo proteção exigido?","D":"Qual é o comum denominator?"},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. O principal question está identificando comum dados elementos esse exigir proteção para garantir conformidade em toda múltiplos regulamentações."},{"id":"M3_U1_Q55","num":55,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Qual das seguintes alternativas declarações sobre e-mail segurança riscos e controles é verdadeiro?","options_pt":{"A":"Staging servidor criptografia creates o criptografia quando e-mail é sent, e doesn't decrypt ele até que ele é opened.","B":"Eavesdropping em emails é problema apenas quando message é unencrypted.","C":"Denial-de-serviço ataques são sending de unsolicited bulk e-mail que poderia contain viruses.","D":"Digital signatures garantir preciso identificação para senders fora do trusted rede."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Digital signatures são utilizado para authenticate o sender identity e garantir message integridade."},{"id":"M3_U1_Q56","num":56,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Qual das seguintes é um bem Alternativa para mitigando físico riscos um computador dados center sem entailing unreasonable custos?","options_pt":{"A":"Locate os dados center ao longo de um fora de concrete wall para melhor fire proteção.","B":"Usar reinforced walls esse run ao top permanent ceiling para reduzir interferência eletromagnética não dados center.","C":"Usar steel wool para clean rust de servers damaged por water leakage.","D":"Implementar planejado manutenção de heating, venting, e air conditioning equipamento e registrar atividade."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Manutenção e housekeeping agenda deve ser adhered para, incluindo mantendo equipamento necessidade para cooling, dust controle, e manutenção de adequado humidity níveis. Reinforced walls esse run floor ao permanent ceiling acima (também called slab-para-slab construction) são destinado prevenir físico acesso, não reduzir interference. Steel wool irá ruin servidor com metallic dust. Dados centers deve não ser located ao longo de fora de walls."},{"id":"M3_U1_Q57","num":57,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Empresa está revisando potencial segurança cibernética riscos. Itens listed, que poses o highest segurança cibernética risco uma empresa?","options_pt":{"A":"Usuário acesso.","B":"Terceiros fornecedores.","C":"Externo-facing sistemas.","D":"Vulnerabilidades identificado por scanning software."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Externo-facing sistemas são mais vulnerable para ataques porque eles são diretamente acessível internet, aumentando chances de exploitation. Enquanto usuário acesso e terceiros fornecedores apresentar significativo riscos, externo-facing sistemas são mais exposed e frequentemente targeted em cyberataques. Identificado vulnerabilidades, embora importante, são não como imediatamente dangerous sem um exposed sistema."},{"id":"M3_U1_Q58","num":58,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Qual deveria geralmente ser incluído em um trilha de auditoria registrar projetado para resumir não autorizado sistema acesso attempts?","options_pt":{"A":"Lista de autorizado usuários.","B":"Tipo de event ou transação attempted.","C":"Vulnerabilidade que foi exploited.","D":"Name de pessoa quem actually mado attempt."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. O tipo de event ou transação, a localização attempted acesso, e os dados buscado deveria todos ser incluído em uma auditoria registrar e são necessário para investigate não autorizado attempted acesso ao sistema. O lista de usuários e seus senhas deveria não ser incluído em um trilha de auditoria registrar mas em um arquivo dentro do computador. Enquanto pessoa pode têm utilizado username para obter acesso e este pode ser não registrar, há é não guarantee esse este pessoa é o actual perpetrator. Diferente pessoa username e senha poderia têm sido utilizado."},{"id":"M3_U1_Q59","num":59,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Qual é tratado por um computador programa correção?","options_pt":{"A":"Computador atualiza requerendo substituição de computador chip.","B":"Segurança vulnerabilidade.","C":"Materials utilizado para remediate físico layer questões.","D":"Periódico atualiza para tech specs."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. computador programa correção addressees segurança vulnerabilidades dentro de software programa."},{"id":"M3_U1_Q60","num":60,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Qual das seguintes alternativas melhor descreve um lógico acesso-controle desenho esse exige um funcionário para usar proximity badge e enter PIN code?","options_pt":{"A":"Algo você saber e algo você são.","B":"Algo você saber e algo você têm.","C":"Algo você são, saber, e têm.","D":"Algo você são e algo você têm."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. PIN code é algo você saber, e proximity badge é algo você têm. Ele é double-controle de acesso e mais eficaz fazer que um único autenticação método."},{"id":"M3_U1_Q61","num":61,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Automatizado registrar-off de inactive usuários e o concept de menor privilege são exemplos de Qual das seguintes alternativas tipos de controles?","options_pt":{"A":"Hardware controles.","B":"Lógico controles.","C":"Ele operacional controles.","D":"Entrada controles."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Lógico controles são mede projetado para garantir autorizado acesso e usar de sistemas e dados."},{"id":"M3_U1_Q62","num":62,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Durante um interno auditoria, um auditor identifica signs de malware infection dentro da organização rede. Por que isso considerado particularmente dangerous ameaça?","options_pt":{"A":"Malware pode spread por meio de sistemas, impacting o broader rede e potentially compromising crítico dados.","B":"Malware pode go undetected, permitindo ele para manipulate dados e affect controles internos.","C":"Malware pode disrupt operações, alter dados financeiros, e reprincipal hidden de detecção sistemas.","D":"Malware pode spread quickly em toda sistemas, steal sensível dados, e reprincipal undetected, causing longo prazo damage."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Malware spreads rapidly, steals sensível dados, e reprincipals undetected, leading para longo prazo damage para operações e financeiro integridade."},{"id":"M3_U1_Q63","num":63,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Qual das seguintes alternativas deveria normalmente ser funções de segurança software?","options_pt":{"A":"Displaying os dados typed em terminal chaveconselho.","B":"Recording e monitorando mudanças para programa fonte code e object code arquivos.","C":"Authenticating usuário identificação e controlling acesso para informação recursos.","D":"Registrando atividade computador sistema, incluindo tempo cada programa é começou e quando cada arquivo é accessed."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Autenticação e subsequente acesso para computador recursos são principal funções de segurança software."},{"id":"M3_U1_Q64","num":64,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Qual é o objetivo principal de usando senhas para computador software programas?","options_pt":{"A":"Para prevenir incompleto atualizando de dados arquivos devido a não autorizado mudanças.","B":"Para prevenir não autorizado usar software e proteger contra não autorizado acesso.","C":"Para prevenir não autorizado acesso ao computador sistema ou seu recursos.","D":"Para prevenir inaccurate processamento de dados dentro do software."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Senhas são básico form de segurança projetado para limitar acesso para autorizado usuários apenas, garantindo integridade e segurança de software e sistemas."},{"id":"M3_U1_Q65","num":65,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Que melhor descreve eficaz senha controles?","options_pt":{"A":"Duração, complexidade, media acesso codes.","B":"Digital certificates, lockout, armazenamento, e acesso.","C":"Expiry e reuse, lockout, armazenamento, e acesso.","D":"Complexidade, digital acesso, voice padrão."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Eficaz senha controles envolver expiry/reuse políticas, lockout mede, e seguro armazenamento/acesso administração."},{"id":"M3_U1_Q66","num":66,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Qual das seguintes é o greatest risco ao proteção de personal dados?","options_pt":{"A":"Mantendo adequado segurança protections.","B":"Hackers ou extortionists.","C":"Changing privacidade regulamentações.","D":"Da organização funcionários."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. People reprincipal o greatest ameaça para qualquer organização em regard para proteção de personal informação. Externo ameaças like hackers e extortionists reprincipal um risco, mas o greatest ameaças são de empresa insiders—seu funcionários. Privacidade regulamentações são ever evolving, mas mais novo regulamentações fornecer timetable para implementação então uma organização tem tempo para cumprir. O nível de segurança protections é dependent não custos e impactos de não conformidade, e riscos pode ser mitigado."},{"id":"M3_U1_Q67","num":67,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Por que poderia auditores internos de fora do European Union (EU) necessidade para ser concerned com geral dados proteção regulamentação (GDPR) requisitos?","options_pt":{"A":"Continuing profissional desenvolvimento mandates treinamento em GDPR.","B":"Fazer auditor organização coleta personal dados de indivíduos não EU.","C":"Todos EU-passed tecnoregistraria da informação leis têm global impacto.","D":"Melhor práticas dictate conformidade com o GDPR."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Se uma organização coleta ou holds personal dados de indivíduos residing não EU, ele deve cumprir com o GDPR, independentemente de seu localização."},{"id":"M3_U1_Q68","num":68,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Que empresa deveria ser o mais provável meta para um hacker?","options_pt":{"A":"Empresa com valioso dados.","B":"Empresa que é publicly traded.","C":"Empresa em um competitivo setor.","D":"Empresa que é well-conhecido."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Hackers priorizar companies com valioso dados como ele é mais lucrative e sensível."},{"id":"M3_U1_Q69","num":69,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Que termo refers um indivíduo whose personal informação é coletado, utilizado, divulgado, mantido, e disposed de?","options_pt":{"A":"Serviço fornecendo.","B":"Dados subject.","C":"Privacidade officer.","D":"Dados controller."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. O termo \"dados subject\" refers um indivíduo whose personal informação é coletado, processado, e stored por uma organização."},{"id":"M3_U1_Q70","num":70,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Qual das seguintes configurações de acesso é adequada em um ambiente informatizado?","options_pt":{"A":"Os usuários têm acesso de atualização para dados de produção, mas os programadores de aplicativos não. Nem os usuários nem os programadores têm acesso de atualização para programas de produção.","B":"Os usuários não têm acesso de atualização para dados de produção, mas os programadores de aplicativos têm. Tanto os usuários quanto os programadores têm acesso de atualização para programas de produção.","C":"Os usuários têm acesso de atualização para dados de produção, mas os programadores não. Os usuários não têm acesso de atualização para programas de produção, mas os programadores têm.","D":"Os usuários não têm acesso de atualização para dados de produção, mas os programadores têm. Os usuários têm acesso de atualização para programas de produção, mas os programadores não."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Os usuários precisam atualizar dados por meio dos programas de aplicativos. Um aspecto fundamental da segregação de funções é que os programadores de aplicativos não devem ter permissão para alterar programas de produção diretamente — eles devem submeter alterações à unidade de controle de mudanças, que as implementa após aprovação."},{"id":"M3_U1_Q71","num":71,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Qual das seguintes alternativas segurança controles deveria melhor prevenir não autorizado acesso para sensível dados por meio de um unattended computador?","options_pt":{"A":"Criptografia de dados arquivos.","B":"Usar de workstation scripts.","C":"Dois-fator autenticação.","D":"Automatic registrar off de inactive usuários."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Automatic registrar off de inactive usuários pode prevenir o viewing de sensível dados em um unattended computador. Enquanto alguns form de autenticação é necessidade, se o autorizado usuário é already registrado em mas tem stepped away, este controle poderia ser bypassed. Scripting é o usar de um programa para automate um processo como começar-up. Criptografia de dados arquivos irá não prevenir o viewing de dados em um unattended dados terminal."},{"id":"M3_U1_Q72","num":72,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Qual das seguintes é provável que ser benefit de eletrônico dados intermudança (EDI)?","options_pt":{"A":"Melhorado negócio relações com trading parceiros.","B":"Decreased requisitos para cópia de segurança e contingency planejando.","C":"Decreased passivo relacionado proteção de proprietary negócio dados.","D":"Aumentado transmission velocidade de actual documentara."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. EDI facilitates melhorado negócio relações por fornecendo eficiente, standardized, e confiável eletrônico transações com trading parceiros."},{"id":"M3_U1_Q73","num":73,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Qual é melhor abordagem para desenvolvendo um insider ameaça programa?","options_pt":{"A":"Incorporar um impacto avaliação.","B":"Incluir todos insider ameaças.","C":"Colaborar com alta administração.","D":"Desenvolver formalized programa."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Desenvolvendo formalized programa esse sistematicamente fornece claramente documentarado expectativas, papéis e responsabilidades, timing, e atividades irá garantir alto success taxa. Um compreensão de conhecido insider ameaças deve ser incorporado não formal programa bem como um impacto avaliação para cada ameaça. Colaboração com alta administração irá garantir esse o formal plano é accepted pela empresa."},{"id":"M3_U1_Q74","num":74,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Que melhor descreve o segurança cibernética papel Diretor Executivo de Auditoria (Diretor Executivo de Auditoria) em regard ao comitê de auditoria?","options_pt":{"A":"Treinamento comitê de auditoria em segurança cibernética melhor práticas.","B":"Revisando cyber estratégia com comitê de auditoria.","C":"Serving como técnico avaliaror em segurança cibernética ameaças.","D":"Fornecendo garantia em gestão de riscos e controles."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Fornecendo garantia em gestão de riscos e controles é o principal papel Diretor Executivo de Auditoria quando tratando segurança cibernética preocupações."},{"id":"M3_U1_Q75","num":75,"total":107,"module":"M3","unit":"U1","topic":"Considerações de TI","question_pt":"Um auditor tem just concluído físico segurança auditoria de um dados center. Porque o center engages em top-secret defense contrato trabalho, o auditor tem chosen para recomendar biometria autenticação para trabalhadores entering o building. Que é o melhor recomendação listed?","options_pt":{"A":"Replace o atual acesso sistema com um impressão digital recognition sistema.","B":"Supplement o atual radio frequência badge identificação sistema com um senha verificação sistema.","C":"Supplement o atual radio frequência badge identificação sistema com um iris recognition sistema.","D":"Replace o atual badge sistema com um segurança guard e face recognition sistema."},"
