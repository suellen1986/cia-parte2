ograma para avaliar o processo de compras. Qual das seguintes alternativas deve ser incluído não trabalho programa?","options_pt":{"A":"O número de trabalho hours obrigado completo cada tarefa.","B":"Procedimentos de auditoria que são indo para ser conduzido.","C":"Resumo de compras e aquisições rules e regulamentações.","D":"Compras e aquisições statistics por contratado e por tender valor."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. De acordo com a Normas Globais de Auditoria Interna, o trabalho de auditoria trabalho programa deve identificar methodologies, incluindo o procedimentos analíticos para ser utilizado, e ferramentas para realizar o tarefas."},{"id":"M9_U1_Q8","num":8,"total":14,"module":"M9","unit":"U1","topic":"Procedimentos do Trabalho","question_pt":"Uma organização implementou segregação de deveres controle em seu processo de compras. Qual é melhor procedimento para testar seu eficácia?","options_pt":{"A":"Revisando política documenta para confirmar o controle exists.","B":"Comparando a organização’s controles para setor parâmetros de referência.","C":"Analisando transação registros para verificar esse aprovações são adequadamente segregated.","D":"Asking funcionários se eles feel o processo de aprovação é eficiente."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Revisando transação registros garante esse a segregação de deveres controle é functioning como pretendido e prevenindo conflitos de interesse."},{"id":"M9_U1_Q9","num":9,"total":14,"module":"M9","unit":"U1","topic":"Procedimentos do Trabalho","question_pt":"Uma vez que controle projeto adequação teve sido independentemente confirmado, qual irá auditores internos frequentemente próximo ser responsável por de um controles garantia perspective?","options_pt":{"A":"Promoting positive controle reinforcement por meio de operador treinamento.","B":"Avaliando se controle (operacional) eficácia atende ou exceeds predetermined mínimo nível.","C":"Facilitando controle self-avaliação processos e fornecendo retorno em seus adequação.","D":"Identificando potencial consultoria-relacionado controle enhancement oportunidades para adding valor."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. uma vez que o adequação de controle-chave projeto teve sido confirmado, auditores internos próximo move para testando e avaliando o operacional eficácia de esses controles. Testando para eficácia irá envolver determinando se os controles, como implementado, atender ou exceed predetermined mínimo nível. O outro three resposta alternativas (enquanto potencialmente valor-adding) fazer não representa principal garantia papéis de um auditor interno."},{"id":"M9_U1_Q10","num":10,"total":14,"module":"M9","unit":"U1","topic":"Procedimentos do Trabalho","question_pt":"De acordo com como orientações fazer IIA, qual das seguintes alternativas declarações é verdadeiro em relação a trabalho de auditoria trabalho programas?","options_pt":{"A":"Trabalho programas deve não ser changed após trabalho de campo commences.","B":"Trabalho programas deve não ser discutido ou divulgado para administração  atividade sob revisão.","C":"Trabalho programas deve ser aprovado pelo Diretor de Auditoria Interna (CAE) antes de iniciando trabalho de campo.","D":"Trabalho programas desenvolvido por função de auditoria interna deve ser consistente e uniform para cada trabalho de auditoria."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. De acordo com a Normas Globais de Auditoria Interna, o Diretor de Auditoria Interna deve revisar e aprovar o trabalho de auditoria trabalho programa antes de ele é implementado e prontamente quando qualquer subsequente mudanças são feita."},{"id":"M9_U1_Q11","num":11,"total":14,"module":"M9","unit":"U1","topic":"Procedimentos do Trabalho","question_pt":"Um auditor interno está testando eficácia de usuário controles de acesso em um financeiro sistema. Qual é ação mais adequada procedimento?","options_pt":{"A":"Comparando acesso níveis entre departamentos para consistency.","B":"Revisando sistema registra para identificar não autorizado acesso attempts.","C":"Surveying funcionários sobre seus satisfaction com o sistema’s segurança mede.","D":"Conduzindo funcionário entrevistas para avaliar awareness de acesso políticas."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Revisando sistema registra ajuda determinar se controles de acesso são eficazmente prevenindo não autorizado acesso."},{"id":"M9_U1_Q12","num":12,"total":14,"module":"M9","unit":"U1","topic":"Procedimentos do Trabalho","question_pt":"Que é o melhor procedimento para o auditor interno para realizar para testar banco de dados administration e negócio intelligence controles?","options_pt":{"A":"Avaliar controles sobre nonemployee contas.","B":"Reconciliar licença assignees contra o humano recursos sistema de informação.","C":"Verificar se requisitos para mantendo listados documentar tipos são estabelecido.","D":"Avaliar o projeto e implementação de vários dados administração controles."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Para testar banco de dados administration e negócio intelligence controles, ele é essencial para avaliar o projeto e implementação de dados administração controles. Este garante esse integridade dos dados, segurança, e disponibilidade são adequadamente tratado. focando em estes controles diretamente avalia eficácia de banco de dados administration e negócio intelligence processos, realizando este procedimento o mais abrangente e relevante."},{"id":"M9_U1_Q13","num":13,"total":14,"module":"M9","unit":"U1","topic":"Procedimentos do Trabalho","question_pt":"Durante o trabalho de campo de um produção processo revisar, um auditor interno realizes esse dois novo etapas poderia toma o place de three  atual etapas  trabalho de auditoria programa e atingir o mesmo resultados mais eficientemente. Outro membros  equipe agree com o novo abordagem. O que o auditor interno deve fazer em este situação?","options_pt":{"A":"Make não mudanças ao trabalho de auditoria programa, como ele deveria ser too tardio para get aprovação.","B":"Make o substitution, como qualquer ação esse makes o processo mais eficiente é sempre welcome.","C":"Conduzir revisão com o novo etapas, como buy-em  outro equipe membros é suficiente para fazer o substitutions.","D":"Discutir o proposta com o supervisores do trabalho para buy-em e aprovação pelo supervisores do trabalho ou Diretor de Auditoria Interna (CAE)."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. De acordo com o global interno auditoria diretrizes, o Diretor de Auditoria Interna ou um supervisores do trabalho deve fornecer auditores internos com orientação ao longo de o trabalho de auditoria e verificar trabalho programas são completo, e o Diretor de Auditoria Interna deve revisar e aprovar o trabalho de auditoria trabalho programa antes de ele é implementado e prontamente quando qualquer subsequente mudanças são feita. Supervisão do trabalho também envolve aprovando mudanças ao trabalho programa quando tal responsabilidade é delegado pelo CAE."},{"id":"M9_U1_Q14","num":14,"total":14,"module":"M9","unit":"U1","topic":"Procedimentos do Trabalho","question_pt":"Qual das seguintes alternativas deve ser incluído em um trabalho de auditoria trabalho programa?","options_pt":{"A":"O mais recente risco classificação  atividade sob revisão.","B":"Autoridade  função de auditoria interna para conduzir revisão.","C":"O crítico importance de objetividade para conduzir revisão.","D":"O analytical técnicas o auditores internos irá usar para conduzir revisão."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. De acordo com a Normas Globais de Auditoria Interna, o trabalho de auditoria trabalho programa deve identificar methodologies, incluindo o procedimentos analíticos para ser utilizado, e ferramentas para realizar o tarefas."}];
const TP={"Engagement Objectives, Scope, and Evaluation Criteria": "Objetivos, Escopo e Critérios de Avaliação", "Identifying Information and Evaluating Evidence": "Identificação de Informações e Avaliação de Evidências", "Engagement Supervision": "Supervisão do Trabalho", "Topical Requirements and Strategic Objectives": "Requisitos Temáticos e Objetivos Estratégicos", "Technology Options": "Opções Tecnológicas", "Communication with Stakeholders": "Comunicação com Partes Interessadas", "IT Considerations": "Considerações de TI", "Analytical Approaches and Process Mapping Techniques": "Abordagens Analíticas e Mapeamento de Processos", "Business Continuity and Disaster Recovery": "Continuidade de Negócios e Recuperação de Desastres", "Evaluation Criteria and Existing Conditions": "Critérios de Avaliação e Condições Existentes", "Finance and Accounting Concepts": "Conceitos de Finanças e Contabilidade", "Prepare Workpapers and Engagement Conclusions": "Papéis de Trabalho e Conclusões do Trabalho", "Key Risks and Controls Related to Business Processes": "Riscos e Controles em Processos de Negócio", "Appropriate Engagement Approach": "Abordagem Adequada do Trabalho", "Performing a Detailed Risk Assessment": "Avaliação Detalhada de Riscos", "Engagement Procedures": "Procedimentos do Trabalho", "Engagement Resources and Skills": "Recursos e Habilidades do Trabalho"};
const MPT={"M1": "Módulo 1", "M2": "Módulo 2", "M3": "Módulo 3", "M4": "Módulo 4", "M5": "Módulo 5", "M6": "Módulo 6", "M7": "Módulo 7", "M8": "Módulo 8", "M9": "Módulo 9", "M10": "Módulo 10"};
const MEN={"M1": "Module 1", "M2": "Module 2", "M3": "Module 3", "M4": "Module 4", "M5": "Module 5", "M6": "Module 6", "M7": "Module 7", "M8": "Module 8", "M9": "Module 9", "M10": "Module 10"};

const lang='pt';
let prog=JSON.parse(localStorage.getItem('cia2_prog')||'{}');
let hist=JSON.parse(localStorage.getItem('cia2_hist')||'[]');
let fq=[],ci=0,answered=false,sel=null;

const UI={
pt:{quiz:'Questões',dash:'Desempenho',hist:'Histórico',
    mod:'Módulo:',top:'Tópico:',mode:'Modo:',
    allmod:'Todos os módulos',alltop:'Todos os tópicos',
    oall:'Todas',owrong:'Erradas',ounseen:'Não respondidas',
    rand:'🔀 Aleatório',reset:'🗑 Resetar',exp:'⬇ Exportar CSV',
    confirm:'Resetar todo o progresso?',toastreset:'Progresso resetado!',
    prev:'← Anterior',next:'Próxima →',submit:'✓ Confirmar',
    corT:'✓ Correto!',wroT:'✗ Incorreto',noq:'Nenhuma questão encontrada.',
    prog:'Progresso:',of:'de',q:'Questão',
    ddash:'Desempenho por Tópico',dhist:'Histórico de Respostas',
    scA:'Respondidas',scC:'Corretas',scW:'Erradas',scP:'Aproveitamento',
    cT:'Tópico',cA:'Resp.',cC:'Certas',cP:'%',hc:'Correto',hw:'Errado'}
};
const T=k=>UI.pt[k];
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function refreshUI(){
  ['ltq','ltd','lth'].forEach((id,i)=>document.getElementById(id).textContent=T(['quiz','dash','hist'][i]));
  document.getElementById('lmod').textContent=T('mod');
  document.getElementById('ltop').textContent=T('top');
  document.getElementById('lmode').textContent=T('mode');
  document.getElementById('brand').textContent=T('rand');
  document.getElementById('breset').textContent=T('reset');
  document.getElementById('bexp').textContent=T('exp');
  document.getElementById('lddash').textContent=T('ddash');
  document.getElementById('ldhist').textContent=T('dhist');
  document.getElementById('oall').textContent=T('oall');
  document.getElementById('owrong').textContent=T('owrong');
  document.getElementById('ounseen').textContent=T('ounseen');
  buildMod();applyF();renderDash();renderHist();
}

function showV(v){
  ['quiz','dash','hist'].forEach(id=>{
    document.getElementById('v-'+id).classList.toggle('on',id===v);
    document.getElementById('t'+id[0]).classList.toggle('on',id===v);
  });
  if(v==='dash')renderDash();
  if(v==='hist')renderHist();
}

function mLbl(m){return lang==='pt'?(MPT[m]||m):(MEN[m]||m)}
function tLbl(t){return lang==='pt'?(TP[t]||t):t}

function buildMod(){
  const s=document.getElementById('smod'),pv=s.value;
  const ms=[...new Set(Q.map(q=>q.module))].sort();
  s.innerHTML=`<option value="">${T('allmod')}</option>`+ms.map(m=>`<option value="${m}"${m===pv?' selected':''}>${esc(mLbl(m))}</option>`).join('');
  buildTop(s.value);
}
function buildTop(mod){
  const s=document.getElementById('stop'),pv=s.value;
  const ts=[...new Set(Q.filter(q=>!mod||q.module===mod).map(q=>q.topic))].sort();
  s.innerHTML=`<option value="">${T('alltop')}</option>`+ts.map(t=>`<option value="${t}"${t===pv?' selected':''}>${esc(tLbl(t))}</option>`).join('');
}
function onMod(){buildTop(document.getElementById('smod').value);applyF();}

function applyF(){
  const mod=document.getElementById('smod').value;
  const top=document.getElementById('stop').value;
  const mode=document.getElementById('smode').value;
  fq=Q.filter(q=>{
    if(mod&&q.module!==mod)return false;
    if(top&&q.topic!==top)return false;
    if(mode==='wrong')return prog[q.id]&&prog[q.id].last==='wrong';
    if(mode==='unseen')return!prog[q.id];
    return true;
  });
  ci=0;renderQ();
}
function doRand(){
  document.getElementById('smod').value='';
  document.getElementById('stop').value='';
  document.getElementById('smode').value='all';
  buildTop('');
  fq=[...Q].sort(()=>Math.random()-.5);
  ci=0;renderQ();
}

function renderQ(){
  answered=false;sel=null;
  const card=document.getElementById('qcard');
  if(!fq.length){card.innerHTML=`<p style="text-align:center;padding:40px;color:var(--mu)">${T('noq')}</p>`;return;}
  const q=fq[ci];
  const pct=fq.length>1?(ci/(fq.length-1))*100:100;
  const qTx=lang==='pt'?q.question_pt:q.question_pt;
  const opts=lang==='pt'?q.options_pt:q.options_pt;
  card.innerHTML=`
    <div class="qprog">
      <div class="pwrap"><div class="pbar" style="width:${pct}%"></div></div>
      <span class="plbl">${T('prog')} ${ci+1} ${T('of')} ${fq.length}</span>
    </div>
    <div class="qmeta">
      <span class="bm bm-m">${esc(mLbl(q.module))}</span>
      <span class="bm bm-t">${esc(tLbl(q.topic))}</span>
      <span class="bm bm-n">${T('q')} ${q.num}/${q.total}</span>
    </div>
    <div class="qtxt">${esc(qTx)}</div>
    <div class="opts" id="opts">
      ${['A','B','C','D'].filter(l=>opts[l]).map(l=>`
        <div class="opt" data-l="${l}" onclick="pick('${l}')">
          <div class="ol">${l}</div><div>${esc(opts[l])}</div>
        </div>`).join('')}
    </div>
    <div class="exp" id="exp"><div class="expt" id="expt"></div><div class="exptx" id="exptx"></div></div>
    <div class="qact" id="qact"></div>`;
  renderAct(false);
}

function pick(l){
  if(answered)return;
  sel=l;
  document.querySelectorAll('.opt').forEach(e=>e.classList.toggle('sel',e.dataset.l===l));
}

function doSubmit(){
  if(!sel||answered)return;
  answered=true;
  const q=fq[ci];
  const ok=sel===q.correct;
  const p=prog[q.id]||{correct:0,wrong:0};
  if(ok)p.correct=(p.correct||0)+1;else p.wrong=(p.wrong||0)+1;
  p.last=ok?'correct':'wrong';
  prog[q.id]=p;
  localStorage.setItem('cia2_prog',JSON.stringify(prog));
  hist.unshift({id:q.id,module:q.module,topic:q.topic,sel,correct:q.correct,ok,ts:Date.now()});
  if(hist.length>1000)hist.pop();
  localStorage.setItem('cia2_hist',JSON.stringify(hist));
  document.querySelectorAll('.opt').forEach(e=>{
    e.classList.add('dis');
    if(e.dataset.l===q.correct)e.classList.add('ok');
    else if(e.dataset.l===sel)e.classList.add('er');
  });
  const expTx=lang==='pt'?q.explanation_pt:q.explanation_pt;
  const ex=document.getElementById('exp');
  ex.className='exp show '+(ok?'ok':'er');
  document.getElementById('expt').textContent=ok?T('corT'):T('wroT');
  document.getElementById('exptx').textContent=expTx;
  renderAct(true);
}

function renderAct(post){
  const div=document.getElementById('qact');
  div.innerHTML='';
  if(ci>0){const b=mkBtn('bo',T('prev'),()=>{ci--;renderQ();});div.appendChild(b);}
  const sp=document.createElement('span');sp.className='sp';div.appendChild(sp);
  if(!post){div.appendChild(mkBtn('bp',T('submit'),doSubmit));}
  else if(ci<fq.length-1){div.appendChild(mkBtn('ba',T('next'),()=>{ci++;renderQ();}));}
}
function mkBtn(cls,txt,fn){
  const b=document.createElement('button');
  b.className='btn '+cls;b.textContent=txt;b.onclick=fn;return b;
}

function renderDash(){
  const vals=Object.values(prog);
  const ans=vals.length,cor=vals.filter(p=>p.last==='correct').length;
  const pct=ans?Math.round(cor/ans*100):0;
  document.getElementById('dstats').innerHTML=`
    <div class="sc"><div class="sn">${ans}</div><div class="sl">${T('scA')}</div></div>
    <div class="sc"><div class="sn" style="color:var(--ok)">${cor}</div><div class="sl">${T('scC')}</div></div>
    <div class="sc"><div class="sn" style="color:var(--er)">${ans-cor}</div><div class="sl">${T('scW')}</div></div>
    <div class="sc"><div class="sn">${pct}%</div><div class="sl">${T('scP')}</div></div>`;
  const byT={};
  Q.forEach(q=>{
    if(!byT[q.topic])byT[q.topic]={tot:0,ans:0,cor:0};
    byT[q.topic].tot++;
    const p=prog[q.id];
    if(p){byT[q.topic].ans++;if(p.last==='correct')byT[q.topic].cor++;}
  });
  const rows=Object.entries(byT).map(([t,s])=>({t,...s,pct:s.ans?Math.round(s.cor/s.ans*100):null}))
    .sort((a,b)=>(a.pct??101)-(b.pct??101));
  document.getElementById('dtbl').innerHTML=`<table>
    <thead><tr><th>${T('cT')}</th><th style="text-align:center">${T('cA')}</th><th style="text-align:center">${T('cC')}</th><th style="min-width:100px">${T('cP')}</th></tr></thead>
    <tbody>${rows.map(r=>{
      const cls=r.pct===null?'':r.pct>=70?'g':r.pct>=50?'m':'b';
      return`<tr><td>${esc(tLbl(r.t))}</td><td style="text-align:center">${r.ans}/${r.tot}</td><td style="text-align:center">${r.cor}</td>
        <td><div class="pbw"><div class="pb ${cls}" style="width:${r.pct??0}%"></div></div><span style="font-size:.78rem;color:var(--mu)">${r.pct!==null?r.pct+'%':'—'}</span></td></tr>`;
    }).join('')}</tbody></table>`;
}

function renderHist(){
  const c=document.getElementById('hlist');
  if(!hist.length){c.innerHTML='<p style="text-align:center;padding:40px;color:var(--mu)">—</p>';return;}
  c.innerHTML=hist.slice(0,300).map(h=>`
    <div class="hi" onclick="goQ('${h.id}')">
      <div class="hb ${h.ok?'ok':'er'}">${h.sel}</div>
      <div><div style="font-size:.82rem;font-weight:600;color:var(--mu)">${esc(tLbl(h.topic))}</div>
        <div style="font-size:.88rem;margin-top:2px">${h.ok?T('hc'):T('hw')} — ${T('q')} ${h.id}</div></div>
    </div>`).join('');
}
function goQ(id){
  fq=Q;ci=Math.max(0,Q.findIndex(q=>q.id===id));
  document.getElementById('smod').value='';
  document.getElementById('stop').value='';
  document.getElementById('smode').value='all';
  buildTop('');showV('quiz');renderQ();
}

function doReset(){
  if(!confirm(T('confirm')))return;
  prog={};hist=[];
  localStorage.removeItem('cia2_prog');localStorage.removeItem('cia2_hist');
  toast(T('toastreset'));renderQ();renderDash();renderHist();
}
function doExport(){
  const rows=[['ID','Module','Topic','Selected','Correct','Result','Date']];
  hist.forEach(h=>rows.push([h.id,h.module,h.topic,h.sel,h.correct,h.ok?'Correct':'Wrong',new Date(h.ts).toLocaleString()]));
  const csv=rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,﻿'+encodeURIComponent(csv);
  a.download='cia_parte2_historico.csv';a.click();
}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// Init
refreshUI();buildMod();applyF();
</script></body></html>
