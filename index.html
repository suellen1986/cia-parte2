itado ao point em tempo em que ele takes place e pelo propensity de people para behave differently quando eles saber eles são sendo watched."},{"id":"M1_U2_Q38","num":38,"total":38,"module":"M1","unit":"U2","topic":"Identificação de Informações e Avaliação de Evidências","question_pt":"Um auditor interno entrevistou o assistente de contabilidade para verificar se as regras do processo de conciliação bancária estão sendo seguidas. O auditor interno chega a uma conclusão com base no retorno recebido. O supervisor questiona a conclusão. Qual é a razão mais provável para o questionamento do supervisor?","options_pt":{"A":"As informações obtidas pelo auditor interno não são relevantes.","B":"As informações obtidas pelo auditor interno não são suficientes.","C":"As informações obtidas pelo auditor interno não são confiáveis.","D":"As informações obtidas pelo auditor interno não são atuais."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. As informações obtidas por meio de entrevista com o assistente de contabilidade podem não ser suficientes para sustentar uma conclusão, pois provavelmente carecem de evidências corroborativas ou de um contexto mais amplo para validar as observações — o que justifica o questionamento do supervisor."},{"id":"M1_U3_Q1","num":1,"total":51,"module":"M1","unit":"U3","topic":"Supervisão do Trabalho","question_pt":"Qual das seguintes alternativas demonstra insuficiente evidências de supervisão do trabalho?","options_pt":{"A":"O supervisor documentara seus revisar de papéis de trabalho por rubricando e datando them e fornece retorno para tratar identificado questões.","B":"O supervisor delega todos de supervisão responsabilidades um auditor sênior e faz não revisar o trabalho de auditoria resultados personally.","C":"O supervisor holds regular meetings com a equipe do trabalho para discutir progresso e tratar desafios.","D":"O supervisor revisa o trabalho de auditoria trabalho programa e garante ele alinha-se com o objetivos do trabalho de auditoria."},"correct":"","explanation_pt":"Alternativa \"A\" é incorreto. Documentando revisão de papéis de trabalho e fornecendo retorno é principal aspecto de supervisão do trabalho. Alternativa \"B\" é correto. O supervisor do trabalho plays um essencial papel em supervisionando e contínuo monitorando ao longo do trabalho de auditoria. conforme Norma 12.3: Supervisionar e melhorar trabalho de auditoria desempenho, um supervisor do trabalho deve fornecer auditores internos com orientação ao longo do trabalho de auditoria, verificar trabalho programas são completo, e confirmar trabalho de auditoria papéis de trabalho adequadamente apoiar achados, conclusões, e recomendações. Delegando todos de supervisão responsabilidades sem personally revisando trabalho de auditoria resultados demonstra insuficiente evidências de supervisão, como supervisor do trabalho deve garantir qualidade e conformance com a Normas. Alternativa \"C\" é incorreto. Holding regular meetings com a equipe do trabalho demonstra active supervisão e promotes comunicação. Alternativa \"D\" é incorreto. Revisando trabalho de auditoria trabalho programa garante ele alinha-se com o objetivos do trabalho de auditoria e é parte de fazer supervisor responsabilidades."},{"id":"M1_U3_Q2","num":2,"total":51,"module":"M1","unit":"U3","topic":"Supervisão do Trabalho","question_pt":"Um supervisor de auditoria está designando tarefas para um próximo trabalho de auditoria. Qual é o mais importante fator para considerar quando coordenando trabalho atribuições?","options_pt":{"A":"Matching tarefas para auditores com base em seus especialização e experiência.","B":"Permitindo auditores para selecionar seus preferido atribuições.","C":"Designando trabalho randomly para distribuir tarefas evenly.","D":"Giving o mais complexo tarefas para novo auditores para treinamento propósitos."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Designando trabalho com base em habilidades e experiência garante esse tarefas são concluído eficientemente e com precisão."},{"id":"M1_U3_Q3","num":3,"total":51,"module":"M1","unit":"U3","topic":"Supervisão do Trabalho","question_pt":"Qual das seguintes alternativas melhor descreve o propósito de papéis de trabalho em supervisão do trabalho?","options_pt":{"A":"Papéis de trabalho atuar como principal apoiar para trabalho de auditoria comunicações.","B":"Papéis de trabalho são utilizado para documentar o anual desempenho revisar de auditores internos.","C":"Papéis de trabalho são apenas exigido para trabalho de auditorias involving externo serviço fornecendo.","D":"Papéis de trabalho são não exigido para trabalho de auditorias com mínimo achados."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Papéis de trabalho atuar como principal apoiar para conclusões do trabalho, garantindo precisão e completude. Como observou não Normas, trabalho de auditoria papéis de trabalho deve incluir informação não procedimentos realizado, as informações identificado, e os achados e preliminar conclusões feita durante o trabalho de auditoria. O supervisor do trabalho deve avaliar se o trabalho de auditoria objetivos têm sido atingido e se conclusões do trabalho são apoiado por avaliando a relevância, confiabilidade, e sufficiency de informação, testando, e evidências obtido que são documentarado não papéis de trabalho. Alternativa \"B\" está incorreta. Papéis de trabalho são não utilizado para auditores internos' anual desempenho revisa. O anual desempenho revisar com o Diretor Executivo de Auditoria incorpora revisa conduzido após cada trabalho de auditoria para o auditor interno ao longo do ano, permitindo Diretor Executivo de Auditoria para fornecer abrangente perspective não interno fazer auditor geral desempenho e apoiar o interno fazer auditor longo prazo profissional desenvolvimento. Alternativa \"C\" está incorreta. Papéis de trabalho são exigido para todos trabalho de auditorias, não just esses involving externo serviço fornecendo. Alternativa \"D\" está incorreta. Papéis de trabalho são exigido independentemente do trabalho de auditoria achados."},{"id":"M1_U3_Q4","num":4,"total":51,"module":"M1","unit":"U3","topic":"Supervisão do Trabalho","question_pt":"Um supervisor está avaliando um auditor desempenho durante um trabalho de auditoria. Qual é o mais importante fator para avaliar?","options_pt":{"A":"O auditor nível de enthusiasm para o trabalho de auditoria topic.","B":"O número de trabalho hours o auditor registrado durante o trabalho de auditoria.","C":"O auditor capacidade para acompanhar instructions sem asking questions.","D":"A precisão, completude, e pontualidade auditor trabalho."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Desempenho avaliação deve focar em precisão, completude, e pontualidade para garantir auditoria qualidade."},{"id":"M1_U3_Q5","num":5,"total":51,"module":"M1","unit":"U3","topic":"Supervisão do Trabalho","question_pt":"Qual das seguintes é mais eficaz maneira para um supervisor do trabalho para promote comunicação entre equipe membros durante um trabalho de auditoria?","options_pt":{"A":"Atribuir único equipe membro para tratar todos comunicação para o trabalho de auditoria.","B":"Limitar comunicação para escrito atualiza para avoid desnecessário discussões.","C":"Hold regular equipe meetings para discutir progresso, compartilhar percepções, e resolve questões.","D":"Permitir equipe membros para comunicar informalmente como necessidade sem estruturado meetings."},"correct":"","explanation_pt":"Alternativa \"A\" é incorreto. Designando único equipe membro para tratar todos comunicação pode levar para gargalos e falhas de comunicação. Alternativa \"B\" é incorreto. Limitando comunicação para escrito atualiza pode hinder colaboração e problema solving. Alternativa \"C\" é correto. Adequado comunicação entre equipe do trabalho membros é crucial para o eficaz implementação trabalho programa e deve ser driven pelo supervisor do trabalho. Holding regular equipe meetings promotes comunicação, garante alinhamento, e permite equipe membros para compartilhar percepções e resolve questões. Alternativa \"D\" é incorreto. Enquanto comunicação informal é útil, estruturado meetings são essencial para eficaz coordenação."},{"id":"M1_U3_Q6","num":6,"total":51,"module":"M1","unit":"U3","topic":"Supervisão do Trabalho","question_pt":"Um supervisor observa esse dois auditores têm overlapping tarefas em seus atribuições. Qual é melhor maneira para resolve este questão?","options_pt":{"A":"Incentivando colaboração entre o auditores para garantir ambos contribute eficazmente.","B":"Permitindo ambos auditores para continuar trabalhando independentemente, even se duplication ocorre.","C":"Ajustando tarefa atribuições para eliminar duplication e melhorar eficiência.","D":"Asking auditores para discutir seus tarefas e decidir como para divide responsabilidades."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Supervisores deve garantir responsabilidades são claramente designado para prevenir ineficiências e duplication de esforço."},{"id":"M1_U3_Q7","num":7,"total":51,"module":"M1","unit":"U3","topic":"Supervisão do Trabalho","question_pt":"Durante um trabalho de auditoria, o supervisor e um auditor interno discordar não sufficiency de evidências apoiando principal achado. O supervisor believes adicional testando é exigido, enquanto auditor argues esse as evidências é suficiente. Qual é ação mais adequada ação para o supervisor para tomar?","options_pt":{"A":"Conduzir adicional indagações ou pesquisa para resolve a diferença em julgamento profissional.","B":"Aprovar o achado como ele é para avoid atrasando trabalho de auditoria.","C":"Escalar questão ao Diretor Executivo de Auditoria imediatamente para resolução.","D":"Remove o achado relatório do trabalho para avoid conflitos."},"correct":"","explanation_pt":"Alternativa \"A\" é correto. Quando supervisionando trabalho de auditorias e revisando papéis de trabalho e conclusões do trabalho, há pode ser casos em que há são diferenças em julgamento profissional. Um processo para resolve diferenças em julgamento profissional pode incluir discutindo relevantee facts, conduzindo adicional indagações ou pesquisa, e Documentando differing viewpoints e conclusões no trabalho de auditoria papéis de trabalho. Conduzindo adicional indagações ou pesquisa para resolve diferenças em julgamento profissional enfatizars resolver tal diferenças por meio de discussão e adicional análise. Alternativa \"B\" é incorreto. Aprovando achado sem tratando disagreement compromises a qualidade trabalho de auditoria. Alternativa \"C\" é incorreto. Escalando questão imediatamente ao Diretor Executivo de Auditoria é desnecessário menos que o disagreement não pode ser resolved não supervisor nível. Alternativa \"D\" é incorreto. Removing o achado faz não resolve o subjacente questão e pode compromise o trabalho de auditoria objetivos."},{"id":"M1_U3_Q8","num":8,"total":51,"module":"M1","unit":"U3","topic":"Supervisão do Trabalho","question_pt":"Qual das seguintes é um exemplo de inadequado retorno durante um trabalho de auditoria desempenho revisar de um auditor interno?","options_pt":{"A":"Usando generalizações, como \"você sempre miss prazos,\" sem fornecendo específico evidências","B":"Documentando desempenho revisar e discutindo um plano de ação para melhoria","C":"Soliciting retorno de partes interessadas para apoiar a avaliação processo","D":"Fornecendo específico exemplos de áreas onde O auditor interno excelled e áreas para melhoria"},"correct":"","explanation_pt":"Alternativa \"A\" é correto. Pós-trabalho revisa apoiar auditores internos' desenvolvimento por meio de job desempenho avaliações. Específico exemplos de indivíduo desempenho, bem como cliente retorno coletado por meio de surveys, pode atuar como apoiando evidências para avaliando desempenho de auditores internos. Usando generalizações sem específico evidências é inadequado porque ele faltas constructive retorno e faz não ajudar o auditor compreender como para melhorar. Alternativa \"B\" é incorreto. Documentando revisão e creating um plano de ação é essencial para responsabilização e desenvolvimento. Alternativa \"C\" é incorreto. Soliciting retorno de partes interessadas fornece valioso entrada para o avaliação processo. Alternativa \"D\" é incorreto. Fornecendo específico exemplos de indivíduo desempenho, como observado comportamento e a qualidade de papéis de trabalho, é melhor prática para desempenho revisa."},{"id":"M1_U3_Q9","num":9,"total":51,"module":"M1","unit":"U3","topic":"Supervisão do Trabalho","question_pt":"Durante fase de planejamento de um trabalho de auditoria, o supervisor observa esse o trabalho programa faz não incluir procedimentos para testando alto-risco área identificado durante o risco avaliação. Qual é ação mais adequada ação para o supervisor para tomar?","options_pt":{"A":"Aprovar o trabalho programa como ele é para avoid atrasando trabalho de auditoria.","B":"Direto equipe de auditoria interna para revise o trabalho programa para incluir procedimentos para testando alto-risco área.","C":"Atribuir os testes alto-risco área um prestador de serviços externo sem modificando trabalho programa.","D":"Remove o alto-risco área escopo do trabalho de auditoria para garantir tempestivo conclusão."},"correct":"","explanation_pt":"Alternativa \"A\" é incorreto. Aprovando trabalho programa sem tratando alto-risco área compromises a qualidade e objetivos do trabalho de auditoria. Alternativa \"B\" é correto. O supervisor deve aprovar o trabalho de auditoria trabalho programa durante planejamento do trabalho e pode Supervisionar outro aspectos planejando processo. O principal considerações para aprovação são se o trabalho programa eficazmente atinge o trabalho de auditoria objetivos e inclui procedimentos para identificando, analisando, avaliando, e Documentando informação. Revisando trabalho programa para incluir procedimentos para testando alto-risco área garante esse o trabalho de auditoria objetivos são met e alinhar-se com a Normas. Alternativa \"C\" é incorreto. Designando os testes um prestador de serviços externo sem modificando trabalho programa faz não garantir adequado documentação ou alinhamento com o objetivos do trabalho de auditoria. Alternativa \"D\" é incorreto. Removing o alto-risco área escopo undermines o trabalho de auditoria propósito e faz não alinhar-se com a Normas."},{"id":"M1_U3_Q10","num":10,"total":51,"module":"M1","unit":"U3","topic":"Supervisão do Trabalho","question_pt":"Qual das seguintes é um principal responsabilidade supervisor do trabalho quando revisando papéis de trabalho?","options_pt":{"A":"Preparando trabalho de auditoria trabalho programa","B":"Avaliando sufficiency, confiabilidade, e relevância de evidências","C":"Garantindo esse papéis de trabalho são assinado por todos equipe membros","D":"Conduzindo anual desempenho revisar de auditores internos"},"correct":"B","explanation_pt":"Alternativa \"A\" está incorreta. Preparando trabalho de auditoria trabalho programa é tipicamente responsabilidade de auditores internos e é conduzido durante planejamento do trabalho. Alternativa \"B\" está correta. Sob o requisito de Norma 14.6: trabalho de auditoria documentação, o supervisor do trabalho deve revisar o trabalho de auditoria documentação para precisão, relevância, e completude. Portanto, o supervisor do trabalho é responsável por avaliando sufficiency, confiabilidade, e relevância de evidências documentarado não papéis de trabalho. Alternativa \"C\" está incorreta. Enquanto papéis de trabalho deve ser revisado, signing por todos equipe membros é não requisito. no entanto, trabalho de auditoria papéis de trabalho deve incluir evidências de de supervisão aprovação (e.g., rubricado e datado pelo supervisor, electronically aprovado) e deve ser preserved. Alternativa \"D\" está incorreta. Anual desempenho revisa são conduzido por o Diretor Executivo de Auditoria, não supervisor do trabalho. O anual desempenho revisar com o Diretor Executivo de Auditoria geralmente incorpora revisa conduzido após cada trabalho de auditoria para o auditor interno ao longo do ano, permitindo Diretor Executivo de Auditoria para fornecer abrangente perspective não interno fazer auditor geral desempenho e apoiar o interno fazer auditor longo prazo profissional desenvolvimento. Retorno gathered por meio de supervisão e revisar de papéis de trabalho é parte desempenho avaliação."},{"id":"M1_U3_Q11","num":11,"total":51,"module":"M1","unit":"U3","topic":"Supervisão do Trabalho","question_pt":"Durante um trabalho de auditoria, o supervisor observa esse one equipe membro concluiu seus designado tarefas à frente de cronograma enquanto outro equipe membro é struggling para meet prazos devido à complexidade de seus designado trabalho. O adiars são beginning para affect o geral cronograma do trabalho. Qual é ação mais adequada ação para o supervisor para tomar?","options_pt":{"A":"Escalar questão ao Diretor Executivo de Auditoria para solicitaçõesr adicional recursos para o trabalho de auditoria.","B":"Reatribuir alguns complexo tarefas à equipe membro quem concluído seus trabalho inicial para saldo workload.","C":"Permitir o struggling equipe membro para continuar trabalhando em seus own pace para garantir qualidade.","D":"Ampliar o trabalho de auditoria cronograma para accommodate o adiars caused pelo complexo tarefas."},"correct":"","explanation_pt":"Alternativa \"A\" é incorreto. Escalando questão ao Diretor Executivo de Auditoria é desnecessário menos que o problema não pode ser resolved não supervisor nível. Alternativa \"B\" é correto. de supervisão responsabilidades incluir tomada e comunicando trabalho atribuições durante o planejamento e mantendo comunicação com auditores internos ao longo do trabalho de auditoria. O supervisor do trabalho deve tomar em conta o habilidades de auditores internos alongsido trabalho de auditoria objetivos quando tomada trabalho atribuições. reatribuir alguns complexo tarefas à equipe membro quem concluído seus trabalho inicial ajuda saldo workload e garante o trabalho de auditoria stays em track. Este demonstra eficaz supervisão e gerenciamento de recursos. Alternativa \"C\" é incorreto. Permitindo equipe membro para continuar em seus own pace sem intervention riscos adicional adiars e faz não tratar o workload imbalance. Alternativa \"D\" é incorreto. Ampliando cronograma deve ser último resort e faz não tratar o subjacente questão de workload imbalance."},{"id":"M1_U3_Q12","num":12,"total":51,"module":"M1","unit":"U3","topic":"Supervisão do Trabalho","question_pt":"Durante desempenho revisar, o supervisor do trabalho fornece retorno um auditor interno. O retorno inclui específico exemplos de áreas para melhoria mas também inclui vague declarações como, \"você necessidade para ser mais proativo.\" O auditor interno expresses confusion sobre qual \"proativo\" means em este contexto. Qual deve o supervisor do trabalho fazer para melhorar o retorno processo?","options_pt":{"A":"Fornecer específico exemplos de qual \"proativo\" comportamento looks like não contexto de fazer auditor papel.","B":"Focar mais em fazer auditor pontos fortes para manter positive tone durante revisão.","C":"Avoid fornecendo retorno em áreas para melhoria para prevenir confusion.","D":"Usar generalizações para garantir o retorno é amplo e aplicável para todos situações."},"correct":"","explanation_pt":"Alternativa \"A\" é correto. Pós-trabalho revisa apoiar auditores internos' desenvolvimento por meio de job desempenho avaliações. Auditoria funcionários desempenho pode ser avaliado por meio de direto observação e revisar de seus trabalho durante um trabalho de auditoria. Específico exemplos de indivíduo desempenho, como observado comportamento e a qualidade de papéis de trabalho, pode atuar como apoiando evidências para avaliando desempenho de auditores internos. Assim, fornecendo específico exemplos de qual \"proativo\" comportamento looks like garante o retorno é actionable e claro, que é essencial para profissional desenvolvimento. Alternativa \"B\" é incorreto. Enquanto focando em pontos fortes é importante, tratando áreas para melhoria é equally crítico para desenvolvimento. Alternativa \"C\" é incorreto. Avoiding retorno em áreas para melhoria faz não apoiar fazer auditor crescimento. Alternativa \"D\" é incorreto. Usando generalizações leads para confusion e faz não fornecer actionable orientação."},{"id":"M1_U3_Q13","num":13,"total":51,"module":"M1","unit":"U3","topic":"Supervisão do Trabalho","question_pt":"Qual das seguintes alternativas cenários constitutes evidências de adequado supervisão do trabalho?","options_pt":{"A":"O supervisor do trabalho documentara seus revisar papéis de trabalho por rubricando e datando them e fornece retorno para tratar identificado questões.","B":"O supervisor do trabalho delega todos de supervisão responsabilidades um auditor sênior e faz não revisar o trabalho de auditoria resultados personally.","C":"O supervisor do trabalho verbally aprova o trabalho programa mas faz não documentar a aprovação não papéis de trabalho.","D":"O supervisor do trabalho revisa os papéis de trabalho mas faz não fornecer retorno ou documentar qualquer revisar observa."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. O Diretor Executivo de Auditoria deve garantir esse evidências de supervisão é documentarado em conformidade com função de auditoria interna estabelecido políticas e procedimentos. Trabalho de auditoria papéis de trabalho com evidências de de supervisão aprovação (e.g., rubricado e datado pelo supervisor, electronically aprovado) deve ser preserved. Se utilizado, concluído papel de trabalho revisar lista de verificação deve também ser mantido. Portanto, Documentando revisão de papéis de trabalho por rubricando e datando them, ao longo de com fornecendo retorno, constitutes evidências de adequado supervisão do trabalho como exigido por a Normas. Alternativa \"B\" está incorreta. Delegando de supervisão responsabilidades é acceptable, mas o supervisor do trabalho deve ainda revisar o trabalho de auditoria resultados personally para garantir qualidade e conformance com a Normas. Alternativa \"C\" está incorreta. Verbal aprovação sem documentação faz não meet o requisito para evidências de supervisão. Alternativa \"D\" está incorreta. Enquanto revisando papéis de trabalho é parte de supervisão, failing para fornecer retorno ou documentar revisão faz não constitute evidências suficientes de supervisão."},{"id":"M1_U3_Q14","num":14,"total":51,"module":"M1","unit":"U3","topic":"Supervisão do Trabalho","question_pt":"Qual das seguintes é um principal benefit de conduzindo indivíduo trabalho de auditoria desempenho revisa?","options_pt":{"A":"Eles garantir esse todos trabalho de auditoria achados são comunicado alta administração.","B":"Eles permitir o Diretor Executivo de Auditoria para avaliar o geral desempenho função de auditoria interna.","C":"Eles fornecer auditores internos com retorno em específico trabalho de auditorias e identificar áreas para desenvolvimento.","D":"Eles eliminar o necessidade para anual desempenho revisa."},"correct":"","explanation_pt":"Alternativa \"A\" é incorreto. Comunicando achados para alta administração é parte relatórioando processo, não indivíduo trabalho de auditoria desempenho revisa. Alternativa \"B\" é incorreto. Avaliando geral desempenho função de auditoria interna é não conduzido durante indivíduo trabalho de auditoria desempenho revisa. Alternativa \"C\" é correto. Pós-trabalho revisa apoiar auditores internos' desenvolvimento por meio de job desempenho avaliações. Auditoria funcionários desempenho pode ser avaliado por meio de direto observação e revisar de seus trabalho durante um trabalho de auditoria. Portanto, indivíduo trabalho de auditoria desempenho revisa fornecer retorno em específico trabalho de auditorias e ajudar identificar áreas para desenvolvimento. Alternativa \"D\" é incorreto. Indivíduo trabalho de auditoria revisa complement, não replace, anual desempenho revisa."},{"id":"M1_U3_Q15","num":15,"total":51,"module":"M1","unit":"U3","topic":"Supervisão do Trabalho","question_pt":"Qual é principal razão Diretor Executivo de Auditoria deve garantir esse interno trabalhos de auditoria são adequadamente supervisionado?","options_pt":{"A":"Para garantir esse auditoria equipes são capacitados em anual regulatório conformidade.","B":"Para garantir remediations não relatório de auditoria são implementado por operacional administração.","C":"Para garantir esse trabalho de auditoria é concluído como eficientemente como possível.","D":"Para garantir esse trabalho realizado alinha-se com o objetivos do trabalho de auditoria."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. adequado supervisão garante esse auditoria atividades alinhar-se com o trabalho de auditoria objetivos, mantendo consistency, qualidade, e adherence para profissional Normas ao longo de auditoria processo."},{"id":"M1_U3_Q16","num":16,"total":51,"module":"M1","unit":"U3","topic":"Supervisão do Trabalho","question_pt":"Funcionários auditor interno com extensive folha de pagamento experiência de um anterior employer está conduzindo uma auditoria folha de pagamento função. O auditor em cobrança (AIC) tem não experiência em folha de pagamento, mas é seasoned auditor. Qual das seguintes afirmações é verdadeira em relação a responsabilidade AIC?","options_pt":{"A":"Significativo profissional judgments feita pelo funcionários auditor durante auditoria deve ser revisado por o AIC, apesar do AIC falta de experiência em folha de pagamento.","B":"Os funcionários auditor é mais knowledgeable sobre a área sendo audited; portanto, o AIC faz não necessidade para revisar o trabalho de auditoria programa.","C":"Comunicações com folha de pagamento administração deve ser conduzido por os funcionários auditor porque os funcionários auditor tem mais experiência em este área fazer que o AIC.","D":"O AIC deve attend o exit entrevista e relatório revisar meetings com o cliente, apesar do AIC falta de experiência em folha de pagamento."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. O AIC é responsável por revisando todos significativo profissional judgments, independentemente de seus personal experiência não assunto. Este garante adequado oversight, adherence para normas de auditoria, e responsabilização durante auditoria processo."},{"id":"M1_U3_Q17","num":17,"total":51,"module":"M1","unit":"U3","topic":"Supervisão do Trabalho","question_pt":"Qual das seguintes alternativas não tipicamente responsabilidade supervisor do trabalho?","options_pt":{"A":"Coordenando trabalho atribuições","B":"Avaliando sufficiency de evidências","C":"Revisando trabalho de auditoria papéis de trabalho","D":"Conduzindo anual desempenho revisar de auditores internos"},"correct":"D","explanation_pt":"Alternativa \"A\" está incorreta. Coordenando trabalho atribuições é responsabilidade supervisor do trabalho e inclui tomada e comunicando trabalho atribuições durante o planejamento e mantendo comunicação com auditores internos ao longo do trabalho de auditoria. Alternativa \"B\" está incorreta. Avaliando sufficiency de evidências é parte de fazer supervisor papel. Alternativa \"C\" está incorreta. Revisando papéis de trabalho é principal responsabilidade supervisor do trabalho. Papéis de trabalho documentar trabalho de auditoria resultados e conclusões. De acordo com Norma 14.6: trabalho de auditoria documentação, o supervisor do trabalho deve revisar o trabalho de auditoria documentação para precisão, relevância, e completude. Alternativa \"D\" está correta. Conduzindo anual desempenho revisar é geralmente responsabilidade Diretor Executivo de Auditoria, não supervisor do trabalho. O anual desempenho revisar permite o Diretor Executivo de Auditoria para fornecer abrangente perspective não interno fazer auditor geral desempenho e apoia o interno fazer auditor longo prazo profissional desenvolvimento. Supervisor do trabalho responsabilidades incluir: aprovando trabalho de auditoria trabalho programa coordenando trabalho atribuições mantendo contínuo comunicações com o auditores internos designado ao trabalho de auditoria Engaging regularmente com a administração atividade sob revisão revisando trabalho de auditoria papéis de trabalho para avaliar auditoria procedimentos realizado, informação identificado, e os achados e preliminar conclusões avaliando sufficiency, confiabilidade, relevância, e úteisness informação, testando, e evidências em atingindo objetivos e apoiando conclusões avaliando desempenho e fornecendo retorno para equipe de auditoria interna membros"},{"id":"M1_U3_Q18","num":18,"total":51,"module":"M1","unit":"U3","topic":"Supervisão do Trabalho","question_pt":"Durante um trabalho de auditoria, o supervisor observa esse um auditor interno tem consistentemente falhou para documentar evidências suficientes para apoiar achados. Adicionalmente, o auditor tem missed vários prazos para submetendo papéis de trabalho, causing adiars não cronograma do trabalho. O supervisor também descobre esse o auditor tem não followed o aprovado trabalho de auditoria trabalho programa em certain áreas, leading para incompleto testando de controles-chave. Qual é ação mais adequada ação para o supervisor para tomar?","options_pt":{"A":"Fornecer retorno ao auditor, oferecer orientação para melhoria, e monitorar seus progresso closely.","B":"Ignore questão e focar em concluindo trabalho de auditoria.","C":"Escalar questão ao Diretor Executivo de Auditoria para disciplinary ação.","D":"Reatribuir o auditor um diferente trabalho de auditoria imediatamente."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Avaliando desempenho e fornecendo retorno para ajudar auditores internos identificar áreas para desenvolvimento é responsabilidade supervisor do trabalho. Norma 12.3 exige o Diretor Executivo de Auditoria ou o supervisor do trabalho para \"fornecer auditores internos com retorno sobre seus desempenho e oportunidades para melhoria.\" quando desempenho auditor interno durante o trabalho de auditoria é unsatisfactory, o supervisor deve fornecer retorno ao auditor interno, oferecer orientação para melhoria, e monitorar seus progresso closely para garantir o trabalho de auditoria é concluído com êxito e o auditor desenvolve seus habilidades. Alternativa \"B\" está incorreta. Ignoring questão compromises a qualidade trabalho de auditoria e faz não tratar fazer auditor desempenho questões. Alternativa \"C\" está incorreta. Escalando questão ao Diretor Executivo de Auditoria é desnecessário menos que o problema persists ou é severe. Alternativa \"D\" está incorreta. reatribuir o auditor sem tratando questão faz não resolve o subjacente problema e pode disrupt o trabalho de auditoria adicional."},{"id":"M1_U3_Q19","num":19,"total":51,"module":"M1","unit":"U3","topic":"Supervisão do Trabalho","question_pt":"Em um grande função de auditoria interna, competente auditor interno irá trabalho sozinho para concluir o planejando, trabalho de campo, e relatórioando fases para um complexo primeiro-tempo trabalho de auditoria. O Diretor Executivo de Auditoria (Diretor Executivo de Auditoria) irá ser unable para supervisionar este trabalho de auditoria. De acordo com as orientações fazer IIA, qual das seguintes alternativas opções é mais adequado em este cenário?","options_pt":{"A":"O Diretor Executivo de Auditoria deve designate someone com adequado experiência para supervisionar todos fases trabalho de auditoria.","B":"O final fase trabalho de auditoria deve ser adiard até que o Diretor Executivo de Auditoria becomes disponível, porque o Diretor Executivo de Auditoria é obrigado supervisionar trabalho de auditoria relatórioando.","C":"Supervisão do trabalho é não exigido em este cenário porque O auditor interno é deemed competente para concluir todos fases trabalho de auditoria.","D":"O Diretor Executivo de Auditoria deve thoroughly revisar e validar os papéis de trabalho quando ele becomes disponível."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. O Diretor Executivo de Auditoria deve designate someone com o adequado experiência para supervisionar todos fases, garantindo esse adequadofalha de revisãoe orientação são fornecido ao longo do trabalho de auditoria em linha com orientações fazer IIA."},{"id":"M1_U3_Q20","num":20,"total":51,"module":"M1","unit":"U3","topic":"Supervisão do Trabalho","question_pt":"Qual das seguintes é um principal responsabilidade supervisor do trabalho durante fase de planejamento?","options_pt":{"A":"Preparando trabalho de auditoria trabalho programa","B":"Conduzindo risco avaliação para o trabalho de auditoria","C":"Aprovando trabalho de auditoria trabalho programa","D":"Realizando trabalho de campo para coletar evidências"},"correct":"C","explanation_pt":"Alternativa \"A\" está incorreta. Preparando trabalho programa é conduzido durante fase de planejamento, mas ele é responsabilidade auditores internos, não supervisor. Alternativa \"B\" está incorreta. Conduzindo risco avaliação é tipicamente responsabilidade auditores internos. Alternativa \"C\" está correta. há são vários principal elementos de supervisão durante o planejando processo centered around o trabalho de auditoria trabalho programa. Aprovando trabalho de auditoria trabalho programa durante fase de planejamento é one responsabilidades supervisor do trabalho. O principal considerações para aprovação são se o trabalho programa eficazmente atinge o trabalho de auditoria objetivos e inclui procedimentos para identificando, analisando, avaliando, e Documentando informação. O supervisor é também responsável por aprovando qualquer mudanças ao trabalho programa e monitorando seu execução bem como coordenando trabalho atribuições. Alternativa \"D\" está incorreta. Trabalho de campo é realizado por auditores internos durante trabalho de auditoria implementação, não supervisor."},{"id":"M1_U3_Q21","num":21,"total":51,"module":"M1","unit":"U3","topic":"Supervisão do Trabalho","question_pt":"Qual das seguintes alternativas melhor descreve como supervisão garante qualidade ao longo de trabalho de auditorias?","options_pt":{"A":"Supervisão é apenas exigido para trabalho de auditorias involving alto-risco áreas.","B":"Supervisão garante esse auditores internos adhere ao aprovado trabalho programa sem desvio.","C":"Supervisão envolve contínuo monitorando, incluindo definindo expectativas, promoting comunicação, e revisando papéis de trabalho.","D":"Supervisão foca em revisando conclusões do trabalho não end trabalho de auditoria."},"correct":"","explanation_pt":"Alternativa \"A\" é incorreto. Supervisão é exigido para todos trabalho de auditorias, não just esses involving alto-risco áreas. Alternativa \"B\" é incorreto. Enquanto adherence ao trabalho programa é importante, supervisão também envolve broader responsabilidades como comunicação e garantia de qualidade para garantir qualidade ao longo de trabalho de auditorias. Alternativa \"C\" é correto. Supervisão garante qualidade por involving contínuo monitorando ao longo do trabalho de auditoria, incluindo definindo expectativas, promoting comunicação, e revisando papéis de trabalho e conclusões. Este alinha-se com Norma 12.3: Supervisionar e melhorar trabalho de auditoria desempenho, que exige methodoregistraries para ser estabelecido e implementado para supervisão do trabalho. Alternativa \"D\" é incorreto. Supervisão é não limitado para revisando conclusões do trabalho; ele é um contínuo processo."},{"id":"M1_U3_Q22","num":22,"total":51,"module":"M1","unit":"U3","topic":"Supervisão do Trabalho","question_pt":"Um interno supervisor de auditoria está revisando trabalho de auditoria plano antes de trabalho de campo begins. Qual é o objetivo principal de supervisão em este etapa?","options_pt":{"A":"Designando tarefas com base em auditor preference em vez de especialização.","B":"Reduzindo número de planejado procedimentos para shorten o trabalho de auditoria cronograma.","C":"Garantindo auditoria objetivos, escopo, e alocação de recursos são adequado.","D":"Limitando comunicação entre equipe membros para manter independência."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Supervisão durante o planejamento garante esse objetivos, escopo, e recursos são adequadamente alinhado para atingir eficaz trabalho de auditoria resultados."},{"id":"M1_U3_Q23","num":23,"total":51,"module":"M1","unit":"U3","topic":"Supervisão do Trabalho","question_pt":"Qual das seguintes é mais importante fator um supervisor do trabalho deve considerar quando coordenando trabalho atribuições para um trabalho de auditoria?","options_pt":{"A":"O size função de auditoria interna","B":"O habilidades e experiência de auditores internos relativo ao objetivos do trabalho de auditoria","C":"A disponibilidade de externo serviço fornecendo","D":"O número de achados expected durante o trabalho de auditoria"},"correct":"","explanation_pt":"Alternativa \"A\" é incorreto. O size função de auditoria interna faz não diretamente determinar trabalho atribuições e, portanto, é não mais importante fator para considerar quando coordenando trabalho atribuições para um trabalho de auditoria. Outro garantia fornecendo pode ser considerado para apoiar o trabalho de auditoria deve função de auditoria interna não ser capaz para exclusivamente funcionários o trabalho de auditoria. Alternativa \"B\" é correto. de supervisão responsabilidades incluir tomada e comunicando trabalho atribuições durante o planejamento e mantendo comunicação com auditores internos ao longo do trabalho de auditoria. Trabalho de auditoria supervisores deve considerar o habilidades de auditores internos alongsido trabalho de auditoria objetivos quando tomada trabalho atribuições. Como resultado, matching o habilidades e experiência de auditores internos ao objetivos do trabalho de auditoria ajuda para garantir esse o trabalho é realizado eficazmente e eficientemente, como outlined em Norma 12.3. Alternativa \"C\" é incorreto. Enquanto externo serviço fornecendo pode ser utilizado, seus disponibilidade é não principal fator em coordenando trabalho atribuições para um trabalho de auditoria. Alternativa \"D\" é incorreto. O número de achados expected é nunca fator em determinando trabalho atribuições."},{"id":"M1_U3_Q24","num":24,"total":51,"module":"M1","unit":"U3","topic":"Supervisão do Trabalho","question_pt":"Qual das seguintes alternativas fatores determina o nível de supervisão exigido para um trabalho de auditoria?","options_pt":{"A":"O size função de auditoria interna","B":"A complexidade trabalho de auditoria e experiência auditores internos","C":"A disponibilidade de externo serviço fornecendo","D":"O número de achados expected durante o trabalho de auditoria"},"correct":"B","explanation_pt":"Alternativa \"A\" está incorreta. O size função de auditoria interna faz não diretamente determinar o nível de supervisão exigido para um particular trabalho de auditoria. Alternativa \"B\" está correta. Supervisão é parte de contínuo monitorando função de auditoria interna. Supervisão begins durante fase de planejamento e é realizado ao longo do trabalho de auditoria processo. O nível de supervisão exigido depende não complexidade trabalho de auditoria e o habilidades e experiência auditores internos. Alternativa \"C\" está incorreta. A disponibilidade de externo serviço fornecendo é não determinando fator para supervisão. Alternativa \"D\" está incorreta. O número de achados expected é não fator em determinando supervisão níveis."},{"id":"M1_U3_Q25","num":25,"total":51,"module":"M1","unit":"U3","topic":"Supervisão do Trabalho","question_pt":"Qual das seguintes alternativas representa evidências adequadas de de supervisão revisar de trabalho de auditoria papéis de trabalho?","options_pt":{"A":"Tick marks próximo para todos auditável itens em cada papel de trabalho page ao longo de com um legend esse explica o natureza de todos de supervisão tick marks e inclui final supervisor signature.","B":"Supervisor initials no relatório final papel de trabalho e no trabalho de auditoria papel de trabalho revisar lista de verificação.","C":"Desempenho appraisals esse avaliar a qualidade de papéis de trabalho preparado por auditores e memoranda specifying o natureza, extent, e resultados de supervisão revisar de papéis de trabalho.","D":"Supervisor initials em cada papel de trabalho, trabalho de auditoria papel de trabalho revisar lista de verificação, e memorandum specifying o natureza, extent, e resultados de supervisão revisar de papéis de trabalho."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Acceptable abordagens para Documentando de supervisão revisar de trabalho de auditoria papéis de trabalho incluir fazer supervisor initials em cada papel de trabalho, um trabalho de auditoria papel de trabalho revisar lista de verificação, e memorandum specifying o natureza, extent, e resultados revisar. Embora desempenho appraisals poderia mention revisa de papéis de trabalho, eles fazer não representa evidências suficientes de revisar. Tick marks são utilizado por O auditor interno realizando trabalho."},{"id":"M1_U3_Q26","num":26,"total":51,"module":"M1","unit":"U3","topic":"Supervisão do Trabalho","question_pt":"Função de auditoria interna está conduzindo um trabalho de auditoria esse envolve avaliando altamente complexo ele sistema. Equipe de auditoria interna inclui vários experiente auditores e dois júnior auditores que são unfamiliar com ele auditorias. O supervisor do trabalho é responsável por determinando nível de supervisão exigido para este trabalho de auditoria. Qual das seguintes alternativas fatores deve o supervisor considerar quando determinando nível de supervisão exigido?","options_pt":{"A":"O número de achados expected durante o trabalho de auditoria","B":"A disponibilidade de externo serviço fornecendo","C":"O size função de auditoria interna","D":"A complexidade trabalho de auditoria e experiência auditores internos"},"correct":"","explanation_pt":"Alternativa \"A\" é incorreto. O número de achados expected é nunca fator em determinando supervisão níveis. Alternativa \"B\" é incorreto. A disponibilidade de externo serviço fornecendo é não determinando fator para supervisão. Alternativa \"C\" é incorreto. O size função de auditoria interna faz não diretamente determinar o nível de supervisão exigido para um particular trabalho de auditoria. Alternativa \"D\" é correto. De acordo com Norma 12.3: Supervisionar e melhorar trabalho de auditoria desempenho, o extent de supervisão exigido depende não maturidade função de auditoria interna, a proficiência e experiência de auditores internos, e a complexidade de trabalho de auditorias. Portanto, a complexidade ele sistema e o júnior auditores' falta de experiência em ele auditorias necessitate higher nível de supervisão."},{"id":"M1_U3_Q27","num":27,"total":51,"module":"M1","unit":"U3","topic":"Supervisão do Trabalho","question_pt":"Qual das seguintes é adequado para conduzir em um kickoff reunião durante planejamento do trabalho?","options_pt":{"A":"Comunicando trabalho atribuições e expectativas à equipe","B":"Revisando da organização gestão de riscos estrutura","C":"Finalizando o trabalho de auditoria relatório","D":"Realizando análise de custo-benefício trabalho de auditoria"},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Trabalho atribuições e expectativas para o equipe do trabalho deve ser claramente comunicado durante kickoff meetings com equipe do trabalho membros. Durante kickoff meetings, ele é importante para destacar o interdependent tarefas e confirmar esse eles são recognized pela equipe. Equipe membros envolvido em esses tarefas deve ser incentivando para manter encerrar colaboração ao longo do trabalho de auditoria. Alternativa \"B\" está incorreta. Revisando risco administração estrutura é não principal propósito de um kickoff reunião. Alternativa \"C\" está incorreta. O trabalho de auditoria relatório está finalizando não conclusão trabalho de auditoria. Alternativa \"D\" está incorreta. Análise de custo-benefício é não tipicamente conduzido durante kickoff meetings."},{"id":"M1_U3_Q28","num":28,"total":51,"module":"M1","unit":"U3","topic":"Supervisão do Trabalho","question_pt":"Durante um trabalho de auditoria, o supervisor do trabalho identifica esse um auditor interno tem consistentemente falhou para meet prazos e tem não followed o aprovado trabalho programa. O auditor explica esse eles foram unclear sobre o expectativas. Qual é ação mais adequada ação para o supervisor para tomar?","options_pt":{"A":"Reatribuir o auditor um diferente trabalho de auditoria imediatamente.","B":"Fornecer retorno ao auditor, esclarecer expectativas, e oferecer adicional orientação para garantir futuro conformidade.","C":"Ignore questão e focar em concluindo trabalho de auditoria.","D":"Escalar questão ao Diretor Executivo de Auditoria para disciplinary ação."},"correct":"","explanation_pt":"Alternativa \"A\" é incorreto. reatribuir o auditor sem tratando questão faz não resolve o subjacente problemas. Alternativa \"B\" é correto. O supervisor do trabalho deve meet com auditores internos ao longo do trabalho de auditoria para discutir o trabalho de auditoria processo, que permite para oportunidades para avaliar desempenho e compartilhar retorno com equipe de auditoria interna membros. Estes interactions possibilitar o supervisor para observar equipe de auditoria interna membros bem como avaliar a qualidade de trabalho realizado. Fornecendo retorno, clarifying expectativas, e offering adicional orientação tratar a causa-raiz questões e apoiar fazer auditor desenvolvimento. Este alinha-se com fazer supervisor responsabilidade para garantir trabalho de auditoria qualidade e promote equipe crescimento. Alternativa \"C\" é incorreto. Ignoring as questões compromises a qualidade trabalho de auditoria e faz não tratar fazer auditor desempenho questões. Alternativa \"D\" é incorreto. Escalando as questões ao Diretor Executivo de Auditoria é desnecessário menos que o problemas persist ou são severe."},{"id":"M1_U3_Q29","num":29,"total":51,"module":"M1","unit":"U3","topic":"Supervisão do Trabalho","question_pt":"O supervisor do trabalho papel durante trabalho de campo inclui Qual das seguintes alternativas atividades?","options_pt":{"A":"Obtendo administração aprovação de trabalho de campo procedimentos.","B":"Iniciando para planejar para o acompanhamento auditoria.","C":"Revisando auditoria papéis de trabalho para sufficiency.","D":"Aprovando trabalho de auditoria trabalho programa."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Revisando auditoria papéis de trabalho para sufficiency garante esse auditoria evidências e documentação apoiar o trabalho de auditoria achados e conclusões, mantendo a qualidade e confiabilidade auditoria processo."},{"id":"M1_U3_Q30","num":30,"total":51,"module":"M1","unit":"U3","topic":"Supervisão do Trabalho","question_pt":"De acordo com as orientações fazer IIA, qual das seguintes alternativas atividades deveria ajudar o supervisor do trabalho garantir esse trabalho de auditoria resultados são well apoiado?","options_pt":{"A":"Revisando elaborar interno relatório de auditoria.","B":"Revisando exit reunião observa.","C":"Revisando trabalho de auditoria papéis de trabalho.","D":"Aprovando trabalho de auditoria trabalho programa."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Revisando trabalho de auditoria papéis de trabalho garante esse auditoria resultados são thoroughly apoiado por documentarado evidências, fornecendo solidbasepara conclusões e recomendações."},{"id":"M1_U3_Q31","num":31,"total":51,"module":"M1","unit":"U3","topic":"Supervisão do Trabalho","question_pt":"Um supervisor de auditoria está conduzindo mid-trabalho de auditoria desempenho revisa. Qual é principal razão para fornecendo retorno em este etapa?","options_pt":{"A":"Comparando auditores' desempenho para esses em anterior years sem específico exemplos.","B":"Ajudando auditores melhorar seus trabalho antes do trabalho de auditoria é concluído.","C":"Focando apenas em principal erros em vez de smaller melhoria áreas.","D":"Avoiding adiars não questão final relatório não end atribuições."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Mid-trabalho de auditoria retorno permite que auditores para fazer tempo real melhorias, garantindo higher-qualidade trabalho antes do trabalho de auditoria concludes."},{"id":"M1_U3_Q32","num":32,"total":51,"module":"M1","unit":"U3","topic":"Supervisão do Trabalho","question_pt":"O supervisor do trabalho identifica esse um auditor interno falhou para documentar principal evidências apoiando crítico achado. Adicionalmente, o auditor deviated aprovado trabalho de auditoria trabalho programa sem anterior aprovação, resulting em incompleto testando de controles-chave. Qual é ação mais adequada ação para o supervisor para tomar?","options_pt":{"A":"Ignore questão e focar em concluindo trabalho de auditoria para avoid adicional adiars.","B":"Escalar questão ao Diretor Executivo de Auditoria imediatamente e recomendar disciplinary ação contra o auditor.","C":"Fornecer retorno ao auditor, garantir as evidências é documentarado adequadamente, e implementar adicional supervisão para prevenir futuro questões.","D":"Remove o achado relatório do trabalho e reatribuir o auditor um diferente trabalho de auditoria."},"correct":"C","explanation_pt":"Alternativa \"A\" está incorreta. Ignoring questão compromises a qualidade trabalho de auditoria e damages o credibilidade função de auditoria interna. Alternativa \"B\" está incorreta. Escalando questão ao Diretor Executivo de Auditoria e recomendando disciplinary ação é desnecessário menos que questão persists ou é severe. Alternativa \"C\" está correta. Avaliando desempenho e fornecendo retorno para ajudar auditores internos identificar áreas para desenvolvimento é responsabilidade supervisor do trabalho. Norma 12.3 exige o Diretor Executivo de Auditoria ou o supervisor do trabalho para \"fornecer auditores internos com retorno sobre seus desempenho e oportunidades para melhoria.\" quando desempenho auditor interno durante um trabalho de auditoria é unsatisfactory, o supervisor deve fornecer retorno ao auditor interno, garantir as evidências é documentarado adequadamente, e implementar adicional supervisão para tratar o imediato questão e prevenir futuro occurrences. Este abordagem saldos responsabilização com desenvolvimento. Alternativa \"D\" está incorreta. Removing o achado e reatribuir o auditor faz não tratar a causa-raiz questão e pode compromise o trabalho de auditoria integridade."},{"id":"M1_U3_Q33","num":33,"total":51,"module":"M1","unit":"U3","topic":"Supervisão do Trabalho","question_pt":"Durante uma revisão de auditoria, o supervisor observa que a documentação de um auditor não possui evidências de suporte suficientes. Qual é a melhor ação a tomar?","options_pt":{"A":"Fornecer retorno ao auditor e garantir que ações corretivas sejam adotadas para melhorar a documentação.","B":"Reduzir o escopo da auditoria para exigir menos documentação.","C":"Reatribuir o auditor a um trabalho diferente sem discutir o problema.","D":"Ignorar o problema, pois outros papéis de trabalho contêm evidências de suporte suficientes."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Os supervisores devem fornecer retorno e exigir ações corretivas para manter a qualidade e a confiabilidade da documentação de auditoria."},{"id":"M1_U3_Q34","num":34,"total":51,"module":"M1","unit":"U3","topic":"Supervisão do Trabalho","question_pt":"Qual das seguintes alternativas melhor descreve o supervisor do trabalho papel em garantindo a qualidade de papéis de trabalho?","options_pt":{"A":"Garantindo esse papéis de trabalho são assinado por todos equipe membros","B":"Avaliando sufficiency, confiabilidade, e relevância de evidências documentarado não papéis de trabalho","C":"Preparando trabalho de auditoria trabalho programa","D":"Conduzindo anual desempenho revisar de auditores internos"},"correct":"","explanation_pt":"Alternativa \"A\" é incorreto. Enquanto papéis de trabalho deve ser revisado, obtendo signatures de todo equipe membro faz não garantir os papéis de trabalho' qualidade. Alternativa \"B\" é correto. conforme Norma 14.6: trabalho de auditoria documentação, auditores internos e o supervisor do trabalho deve revisar o trabalho de auditoria documentação para precisão, relevância, e completude. Portanto, avaliando sufficiency, confiabilidade, e relevância de evidências documentarado não papéis de trabalho é principal responsabilidade supervisor do trabalho. Este garante esse o trabalho de auditoria objetivos são met e esse conclusões são well apoiado. Alternativa \"C\" é incorreto. Preparando trabalho de auditoria trabalho programa é realizado durante planejamento do trabalho. O programa ajuda guido trabalho para ser realizado, mas ele faz não garantir a qualidade relacionado papéis de trabalho. Alternativa \"D\" é incorreto. Anual desempenho revisa são geralmente conduzido por o Diretor Executivo de Auditoria não end ano. Estes revisa fornecer retorno não auditor interno, não a qualidade papéis de trabalho para um trabalho de auditoria. Retorno supervisor do trabalho não qualidade papéis de trabalho pode ser parte anual desempenho revisar para o auditores internos."},{"id":"M1_U3_Q35","num":35,"total":51,"module":"M1","unit":"U3","topic":"Supervisão do Trabalho","question_pt":"Durante uma revisão de trabalho de auditoria papéis de trabalho, o supervisor identifica esse as evidências apoiando principal achado é suficiente mas poorly organized, tomada ele difficult para rastrear conclusão back ao apoiando documentação. Qual é ação mais adequada ação para o supervisor para tomar?","options_pt":{"A":"Exigir O auditor interno para reorganize os papéis de trabalho para garantir eles são claro, concise, e rastreável.","B":"Escalar questão ao Diretor Executivo de Auditoria para imediato resolução.","C":"Remove o achado relatório do trabalho para avoid confusion.","D":"Aprovar os papéis de trabalho como eles são desde as evidências é suficiente."},"correct":"","explanation_pt":"Alternativa \"A\" é correto. conforme Norma 14.6: trabalho de auditoria documentação, auditores internos e o supervisor do trabalho deve revisar o trabalho de auditoria documentação para precisão, relevância, e completude. Portanto, o supervisor deve garantir esse papéis de trabalho são claro, concise, e rastreável. Reorganizing os papéis de trabalho ajuda garantir esse as evidências pode ser facilmente revisado e apoia o trabalho de auditoria conclusões. Alternativa \"B\" é incorreto. Escalando questão ao Diretor Executivo de Auditoria para imediato resolução é desnecessário menos que o problema não pode ser resolved não supervisor nível. Alternativa \"C\" é incorreto. Removing o achado undermines o trabalho de auditoria objetivos e faz não tratar questão. Alternativa \"D\" é incorreto. Aprovando poorly organized papéis de trabalho compromises a qualidade e uscapacidade documentação."},{"id":"M1_U3_Q36","num":36,"total":51,"module":"M1","unit":"U3","topic":"Supervisão do Trabalho","question_pt":"Qual das seguintes é inadequado quando conduzindo desempenho revisa de auditores internos?","options_pt":{"A":"Documentando desempenho avaliação em detalhe, incluindo exemplos de pontos fortes, áreas para melhoria, e agreed-sobre planos de ação para desenvolvimento","B":"Usando generalizações, como \"você sempre miss prazos\", sem fornecendo específico exemplos ou evidências para apoiar o retorno","C":"Notificando auditores internos em advance sobre o desempenho revisar para permitir them para preparar e refletir em seus desempenho","D":"Usando objetivo language esse foca em mensurável resultados e específico comportamentos observado durante o trabalho de auditoria"},"correct":"B","explanation_pt":"Alternativa \"A\" está incorreta. Documentando desempenho avaliação é essencial para mantendo registros, garantindo responsabilização, e apoiando fazer auditor desenvolvimento. Alternativa \"B\" está correta. Usando generalizações, como \"você sempre miss prazos\", é inadequado porque ele faltas eespecíficoidade e faz não fornecer constructive retorno esse o auditor pode act sobre. Este abordagem pode levar para defensiveness e faz não apoiar profissional desenvolvimento. Alternativa \"C\" está incorreta. Notificando auditores internos em advance sobre o desempenho revisar é profissional e ético prática esse permite para um mais produtivo discussão. Alternativa \"D\" está incorreta. Usando objetivo language garante clarity e fairness não avaliação processo e ajuda o auditor compreender o retorno."},{"id":"M1_U3_Q37","num":37,"total":51,"module":"M1","unit":"U3","topic":"Supervisão do Trabalho","question_pt":"Qual das seguintes alternativas melhor descreve como supervisão aplica ao longo de trabalho de auditorias?","options_pt":{"A":"Supervisão begins durante fase de planejamento e continuars ao longo do trabalho de auditoria processo.","B":"Supervisão é apenas exigido durante revisão de trabalho de auditoria papéis de trabalho.","C":"Supervisão é limitado à avaliação de auditores' desempenho após o trabalho de auditoria.","D":"Supervisão é apenas necessário para complexo trabalho de auditorias."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Supervisão é parte contínuo monitorando função de auditoria interna. Supervisão begins durante fase de planejamento e continuars ao longo do trabalho de auditoria processo e inclui definindo expectativas, promoting comunicação com a equipe de auditoria interna, e revisando trabalho de auditoria papéis de trabalho e conclusões do trabalho. Alternativa \"B\" está incorreta. Supervisão é não limitado ao revisar de papéis de trabalho. Ele também inclui definindo expectativas, promoting comunicação com a equipe de auditoria interna, e revisando conclusões do trabalho. Alternativa \"C\" está incorreta. Supervisão é parte contínuo monitorando função de auditoria interna e é não limitado para pós-trabalho avaliações. Alternativa \"D\" está incorreta. De acordo com a Normas, supervisão é exigido para todos trabalho de auditorias, não just complexo ones. O Diretor Executivo de Auditoria deve garantir esse evidências de supervisão é documentarado e mantido, de acordo com função de auditoria interna estabelecido methodoregistraries."},{"id":"M1_U3_Q38","num":38,"total":51,"module":"M1","unit":"U3","topic":"Supervisão do Trabalho","question_pt":"Qual das seguintes afirmações melhor descreve como revisão de papéis de trabalho pode aid não profissional desenvolvimento de interno auditoria funcionários?","options_pt":{"A":"Ele demonstra se designated auditores foram coletivamente competente para realizar o trabalho de auditoria.","B":"Ele garante esse objetivos do trabalho de auditoria são met.","C":"Ele valida esse o trabalho concluído poderia ser re-realizado por outro auditor interno.","D":"Ele garante esse qualquer mudanças ao aprovado trabalho de auditoria programa são justified e autorizado."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. adequado revisar papéis de trabalho fornece o supervisor (ou outro designated revisãoer) uma oportunidade para see esse o auditores internos fez, em fact, têm o conhecimento, habilidades, e competência obrigado realizar o trabalho de auditoria. Ele também fornece uma oportunidade para coach o auditores para melhorar seus competência."},{"id":"M1_U3_Q39","num":39,"total":51,"module":"M1","unit":"U3","topic":"Supervisão do Trabalho","question_pt":"Durante um trabalho de auditoria, o supervisor descobre esse um auditor interno teve documentarado evidências apoiando principal achado mas falhou para incluir o rationale para o conclusão. Qual é ação mais adequada ação para o supervisor para tomar?","options_pt":{"A":"Escalar questão ao Diretor Executivo de Auditoria para imediato resolução.","B":"Reatribuir o auditor um diferente trabalho de auditoria para avoid adicional questões.","C":"Remove o achado relatório do trabalho para manter consistency.","D":"Fornecer retorno ao auditor em relação a o importance de Documentando rationale para o conclusão."},"correct":"","explanation_pt":"Alternativa \"A\" é incorreto. Escalando questão ao Diretor Executivo de Auditoria para imediato resolução é desnecessário menos que o problema persists ou é severe. Alternativa \"B\" é incorreto. reatribuir o auditor faz não tratar a causa-raiz questão e pode disrupt o trabalho de auditoria adicional. Alternativa \"C\" é incorreto. Removing o achado compromises integridade trabalho de auditoria e faz não resolve o subjacente problema. Alternativa \"D\" é correto. De acordo com Norma 12.3: Supervisionar e melhorar trabalho de auditoria desempenho, methodoregistraries deve ser estabelecido e implementado para supervisão do trabalho, garantia de qualidade, e o desenvolvimento de competencies. Para desenvolver competencies, auditores internos deve ser fornecido com retorno sobre seus desempenho e oportunidades para melhoria. Portanto, fornecendo retorno ao auditor em relação a o importance de Documentando rationale para o conclusão apoia fazer auditor desenvolvimento. Este abordagem alinha-se com fazer supervisor responsabilidade para garantir trabalho de auditoria qualidade."},{"id":"M1_U3_Q40","num":40,"total":51,"module":"M1","unit":"U3","topic":"Supervisão do Trabalho","question_pt":"Um trabalho de auditoria envolve múltiplos equipe membros trabalhando em interdependent tarefas. O supervisor do trabalho observa certain tarefas são não sendo concluído não prazo, causing adiars para others. Qual é ação mais adequada ação para o supervisor para tomar?","options_pt":{"A":"Escalar questão ao Diretor Executivo de Auditoria para resolução.","B":"Ampliar o trabalho de auditoria cronograma para accommodate o adiars.","C":"Reatribuir o atrasado tarefas para outro equipe membro para garantir tempestivo conclusão.","D":"Hold equipe reunião para tratar o adiars, esclarecer expectativas, e promote colaboração."},"correct":"","explanation_pt":"Alternativa \"A\" é incorreto. Escalando questão ao Diretor Executivo de Auditoria é desnecessário menos que o problema não pode ser resolved não supervisor nível. Alternativa \"B\" é incorreto. Ampliando cronograma deve ser último resort esse negatively impactos a qualidade trabalho de auditoria e faz não tratar o subjacente questão. Alternativa \"C\" é incorreto. reatribuir tarefas pode não tratar a causa-raiz adiar e poderia disrupt o trabalho de auditoria adicional. Alternativa \"D\" é correto. Trabalho atribuições para cada trabalho de auditoria deve ser claramente comunicado durante kickoff meetings com equipe do trabalho membros. Durante kickoff meetings, ele é importante para destacar o interdependent tarefas e confirmar esse eles são recognized pela equipe. Equipe membros envolvido em esses tarefas deve ser incentivando para manter encerrar colaboração ao longo do trabalho de auditoria. Portanto, holding equipe reunião para tratar adiars e esclarecer expectativas promotes colaboração e garante esse interdependent tarefas são concluído eficientemente. Este alinha-se com melhor práticas para coordenando trabalho atribuições."},{"id":"M1_U3_Q41","num":41,"total":51,"module":"M1","unit":"U3","topic":"Supervisão do Trabalho","question_pt":"Qual das seguintes é um adequado atividade quando supervisionando trabalho de auditorias?","options_pt":{"A":"Durante trabalho de campo, escopo mudanças feita ao trabalho programa são em fazer auditor discrição e deve ser apoiado adequadamente não papéis de trabalho.","B":"Supervisão é mais crítico ao trabalho de campo e relatórioando fases trabalho de auditoria, como este é ondo majority trabalho takes place.","C":"Grau de alto supervisão para não supervisão pode ser fornecido um auditor dependendo em seu nível de competência e a complexidade trabalho de auditoria.","D":"Durante planejamento do trabalho, auditoria trabalho programa deve ser discussed entre auditores e o supervisor do trabalho, com o supervisor aprovando trabalho programa."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Durante planejamento do trabalho, discutindo e aprovando auditoria trabalho programa garante alinhamento com o objetivos de auditoria e fornece claro orientação para executing o trabalho de auditoria eficazmente."},{"id":"M1_U3_Q42","num":42,"total":51,"module":"M1","unit":"U3","topic":"Supervisão do Trabalho","question_pt":"Significativo parte de fazer auditor papéis de trabalho irá ser as conclusões reached pelo auditor. Em alguns situações, o supervisor do trabalho poderia não agree com o conclusões e irá ask os funcionários auditor para realizar mais trabalho. Assume esse após subsequente trabalho é realizado, os funcionários auditor e o supervisor do trabalho continuar para discordar não conclusões documentarado não papéis de trabalho desenvolvido por os funcionários auditor. Qual das seguintes alternativas função de auditoria interna respostas deveria ser adequado?","options_pt":{"A":"O disagreement é discussed em pessoa, e decisão reached é mantido na auditoria papéis de trabalho e no relatório final elaborar relatório.","B":"Ambos os funcionários auditor e o supervisor documentar seus reasons para reaching diferente conclusões. O rationale de ambos partes é mantido no relatório final relatório, mas apenas one unified recomendação é fornecido.","C":"Ambos conclusões são apresentado Diretor Executivo de Auditoria para resolução, e o Diretor Executivo de Auditoria resolves o assunto.","D":"Ambos conclusões são presented não relatório de auditoria, e administração e atividade sob revisão pode então react para ambos."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. O Diretor Executivo de Auditoria deve determinar o mais razoável conclusão e apresentar esse à atividade sob revisão e administração. Questão de disagreements não papéis de trabalho deve não necessarily affect relatórioando para administração menos que o Diretor Executivo de Auditoria believes esse ambos conclusões são equally adequado, e ele deveria enhance administração compreensão para ser presented com ambos. Ambos os funcionários auditor e o supervisor documentar seus reasons para reaching diferente conclusões, e este informação deve ser observou não papéis de trabalho. dois opiniões deve não ser presented no relatório final relatório."},{"id":"M1_U3_Q43","num":43,"total":51,"module":"M1","unit":"U3","topic":"Supervisão do Trabalho","question_pt":"Qual das seguintes alternativas melhor demonstra evidências de supervisão do trabalho em conformidade com documentação requisitos?","options_pt":{"A":"O supervisor verbally aprova o trabalho programa mas faz não documentar a aprovação.","B":"O supervisor revisa papéis de trabalho e documentara seus revisar por rubricando e datando them.","C":"O supervisor delega todos de supervisão responsabilidades um auditor sênior sem revisando trabalho de auditoria resultados.","D":"O supervisor fornece retorno à equipe mas faz não documentar o retorno."},"correct":"","explanation_pt":"Alternativa \"A\" é incorreto. Verbal aprovação sem documentação faz não meet o requisito para evidências de supervisão. Alternativa \"B\" é correto. O supervisor do trabalho plays um essencial papel em supervisionando e contínuo monitorando ao longo do trabalho de auditoria. conforme Norma 12.3: Supervisionar e melhorar trabalho de auditoria desempenho, um supervisor do trabalho deve fornecer auditores internos com orientação ao longo do trabalho de auditoria, verificar trabalho programas são completo, e confirmar trabalho de auditoria papéis de trabalho adequadamente apoiar achados, conclusões, e recomendações. Documentando revisão de papéis de trabalho por rubricando e datando them demonstra evidências de supervisão. Alternativa \"C\" é incorreto. Delegando de supervisão responsabilidades sem revisando resultados faz não fulfill fazer supervisor papel. Alternativa \"D\" é incorreto. Retorno deve ser documentarado para garantir responsabilização e tracecapacidade."},{"id":"M1_U3_Q44","num":44,"total":51,"module":"M1","unit":"U3","topic":"Supervisão do Trabalho","question_pt":"Um supervisor de auditoria está revisando concluído papéis de trabalho antes do trabalho de auditoria relatório está finalizando. Qual é principal de supervisão responsabilidade em este etapa?","options_pt":{"A":"Aprovando todos papéis de trabalho sem verificando sufficiency de evidências.","B":"Modificando auditoria conclusões para alinhar-se com administração expectativas.","C":"Relying em auditor self-revisa sem realizando um independente check.","D":"Confirmando esse documentação é completo, preciso, e apoia auditoria conclusões."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Supervisores deve garantir esse papéis de trabalho são completo, preciso, e fornecer suficiente apoiar para auditoria conclusões."},{"id":"M1_U3_Q45","num":45,"total":51,"module":"M1","unit":"U3","topic":"Supervisão do Trabalho","question_pt":"Qual das seguintes alternativas melhor descreve o principal propósito anual desempenho revisar conduzido por o Diretor Executivo de Auditoria?","options_pt":{"A":"Para documentar os resultados de todos trabalho de auditorias conduzido durante o ano","B":"Para fornecer abrangente perspective não interno fazer auditor geral desempenho e apoiar seus profissional desenvolvimento","C":"Para avaliar função de auditoria interna conformance com a Normas","D":"Para finalizando o trabalho de auditoria trabalho programa para o próximo ano"},"correct":"","explanation_pt":"Alternativa \"A\" é incorreto. Documentando trabalho de auditoria resultados é parte relatórioando processo, não anual desempenho revisar. Alternativa \"B\" é correto. O anual desempenho revisar, que incorpora revisa conduzido após cada trabalho de auditoria para o auditor interno ao longo do ano, permite o Diretor Executivo de Auditoria para fornecer abrangente perspective não interno fazer auditor geral desempenho e apoia o interno fazer auditor longo prazo profissional desenvolvimento. Alternativa \"C\" é incorreto. Avaliando função de auditoria interna conformance com a Normas é parte garantia de qualidade processo, não anual desempenho revisar. Alternativa \"D\" é incorreto. finalizando o trabalho de auditoria trabalho programa é parte de planejamento do trabalho, não anual desempenho revisar."},{"id":"M1_U3_Q46","num":46,"total":51,"module":"M1","unit":"U3","topic":"Supervisão do Trabalho","question_pt":"Uma auditoria gestor está designando responsabilidades para um trabalho de auditoria esse inclui financeiro e auditoria operacional áreas. Qual é melhor abordagem?","options_pt":{"A":"Letting auditores switch atribuições em seus discrição.","B":"Alocando trabalho com base em auditores' especialização em financeiro e operacional áreas.","C":"Dividing tarefas equally entre todos auditores sem considerando seus habilidade sets.","D":"Designando financeiro auditorias apenas para sênior auditores e operacional auditorias apenas para juniors."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Designando tarefas com base em assunto especialização garante alto- qualidade auditoria execução."},{"id":"M1_U3_Q47","num":47,"total":51,"module":"M1","unit":"U3","topic":"Supervisão do Trabalho","question_pt":"Um trabalho de auditoria envolve múltiplos trabalho de campo locais em toda diferente países. O supervisor do trabalho designa tarefas para equipe membros com base em seus especialização mas observa esse comunicação entre equipe membros é inconsistent, leading para adiars em concluindo interdependent tarefas. Qual deve o supervisor do trabalho fazer para tratar este questão?","options_pt":{"A":"Reatribuir tarefas para reduzir interdependências entre equipe membros.","B":"Hold regular equipe meetings para promote comunicação e colaboração.","C":"Exigir equipe membros para submeter diário progresso relatórios ao supervisor.","D":"Escalar questão ao Diretor Executivo de Auditoria para resolução."},"correct":"","explanation_pt":"Alternativa \"A\" é incorreto. reatribuir tarefas pode não tratar a causa-raiz comunicação questão e poderia disrupt o trabalho de auditoria. Alternativa \"B\" é correto. Parte de coordenando trabalho atribuições é comunicação esse começa com planejando e continuars ao longo do trabalho de auditoria. Adequado comunicação entre equipe do trabalho membros é crucial para o eficaz implementação trabalho programa e deve ser driven pelo supervisor do trabalho. O supervisor do trabalho deve hold regular meetings para keep equipe informado e alinhado. Estes meetings pode permitir equipe membros para compartilhar percepções para resolver problemas que pode ocorre durante o trabalho de auditoria processo. Este pode create efficiencies não revisar de papéis de trabalho ou achados, como supervisor pode ask questions ou solicitaçõesr adicional informação. Portanto, holding regular equipe meetings promotes comunicação e colaboração, garantindo esse interdependent tarefas são concluído eficientemente. Este alinha-se com melhor práticas para coordenando trabalho atribuições. Alternativa \"C\" é incorreto. Enquanto progresso relatórios pode ser helpful, eles fazer não diretamente tratar o necessidade para equipe colaboração. Alternativa \"D\" é incorreto. Escalando questão ao Diretor Executivo de Auditoria é desnecessário menos que o problema não pode ser resolved não supervisor nível."},{"id":"M1_U3_Q48","num":48,"total":51,"module":"M1","unit":"U3","topic":"Supervisão do Trabalho","question_pt":"Qual das seguintes é mais adequada maneira para um supervisor do trabalho para documentar evidências de supervisão?","options_pt":{"A":"Delegando todos de supervisão responsabilidades um auditor sênior sem revisando trabalho de auditoria resultados","B":"Rubricando e datando revisado papéis de trabalho e fornecendo retorno para tratar identificado questões","C":"Verbally aprovando trabalho de auditoria trabalho programa sem Documentando a aprovação","D":"Revisando papéis de trabalho mas não Documentando qualquer revisar observa ou retorno"},"correct":"","explanation_pt":"Alternativa \"A\" é incorreto. Enquanto delegação é acceptable, o supervisor deve ainda revisar o trabalho de auditoria resultados. Alternativa \"B\" é correto. conforme Norma 12.3: Supervisionar e melhorar trabalho de auditoria desempenho, um supervisor do trabalho deve fornecer auditores internos com orientação ao longo do trabalho de auditoria, verificar trabalho programas são completo, e confirmar trabalho de auditoria papéis de trabalho adequadamente apoiar achados, conclusões, e recomendações. Evidências de supervisão deve ser documentarado em conformidade com função de auditoria interna estabelecido políticas e procedimentos. rubricando e datando revisado papéis de trabalho, ao longo de com fornecendo retorno, constitutes evidências de supervisão. Alternativa \"C\" é incorreto. Verbal aprovação sem documentação faz não meet o requisito para evidências de supervisão. Alternativa \"D\" é incorreto. Revisando papéis de trabalho sem Documentando retorno faz não fornecer evidências suficientes de supervisão."},{"id":"M1_U3_Q49","num":49,"total":51,"module":"M1","unit":"U3","topic":"Supervisão do Trabalho","question_pt":"Qual das seguintes alternativas melhor descreve o principal propósito de holding regular meetings com auditores internos ao longo do trabalho de auditoria?","options_pt":{"A":"Para finalizando o trabalho de auditoria relatório","B":"Para documentar o trabalho de auditoria objetivos e escopo","C":"Para avaliar desempenho, fornecer retorno, e tratar qualquer questões durante o trabalho de auditoria","D":"Para garantir esse todos equipe membros têm equal workloads"},"correct":"","explanation_pt":"Alternativa \"A\" é incorreto. finalizando o trabalho de auditoria relatório ocorre não conclusão trabalho de auditoria, não durante regular meetings ao longo do trabalho de auditoria. Alternativa \"B\" é incorreto. Documentando objetivos e escopo é parte fase de planejamento, não contínuo meetings ao longo do trabalho de auditoria. Alternativa \"C\" é correto. O supervisor do trabalho deve meet com auditores internos ao longo do trabalho de auditoria para discutir o trabalho de auditoria processo, que permite para oportunidades para avaliar desempenho bem como compartilhar retorno com equipe de auditoria interna membros. Estes interactions possibilitar o supervisor para observar equipe de auditoria interna membros bem como avaliar a qualidade de trabalho realizado. Portanto, regular meetings permitir o supervisor para avaliar desempenho, fornecer retorno, e tratar questões durante o trabalho de auditoria. Alternativa \"D\" é incorreto. Enquanto workload saldo é importante, ele é não principal propósito de regular meetings ao longo do trabalho de auditoria."},{"id":"M1_U3_Q50","num":50,"total":51,"module":"M1","unit":"U3","topic":"Supervisão do Trabalho","question_pt":"Uma auditoria diretor revisa o desempenho de sênior auditores comobasepara o anual funcionários desempenho appraisal. Auditoria diretor observa esse auditor tem consistentemente concluído trabalhos de auditoria em menos fazer que o budgeted tempo e tem gotten ao longo de well com auditoria clientes mas tem não offered much em sugerido melhorias para auditees. Auditor B consistentemente exceeds o tempo budgeted para auditorias mas também consistentemente identifica recomendações que deve levar para custo savings para o auditoria cliente e a organização. Assume esse ambos auditores têm conduzido auditorias esse meet da organização Normas e esse auditoria atribuições são rotated. Em avaliando auditores, e considerando apenas o facts identificado acima, Qual das seguintes seria mais provável explicar a diferenças em auditor desempenho?","options_pt":{"A":"Auditor B teve sido designado para mais difficult auditorias fazer que tem auditor A.","B":"Auditoria diretor tem não claramente comunicado funcionários avaliação critérios ao sênior auditores.","C":"Auditor realiza menos controle procedimento conformidade testando fazer que faz auditor B.","D":"Auditor é mais eficiente fazer que auditor B."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. fornecidos apenas o facts declarou não question, ele é mais provável esse auditoria diretor tem não claramente comunicado a avaliação critérios, desdo desempenho diferenças são consistentemente constatou sobre o ano. Auditor believes esse getting jobs realizado em menos fazer que o budgeted tempo e mantendo bem funcionário relations são mais importante fazer que tomada recomendações. Auditor B believes esse tomada custo-saving recomendações é mais importante fazer que getting auditoria realizado dentro do tempo orçamento. há é não evidências suficientes para apoiar conclusão esse auditor é mais eficiente fazer que auditor B."},{"id":"M1_U3_Q51","num":51,"total":51,"module":"M1","unit":"U3","topic":"Supervisão do Trabalho","question_pt":"Durante planejamento do trabalho, o supervisor identifica esse o trabalho programa faz não incluir procedimentos para tratando alto-risco área. Qual é ação mais adequada ação para o supervisor para tomar?","options_pt":{"A":"Remove o alto-risco área escopo do trabalho de auditoria para garantir tempestivo conclusão.","B":"Revise o trabalho programa para tratar o alto-risco área.","C":"Escalar questão ao Diretor Executivo de Auditoria para imediato resolução.","D":"Aprovar o trabalho programa como ele é para avoid atrasando trabalho de auditoria."},"correct":"","explanation_pt":"Alternativa \"A\" é incorreto. Removing o alto-risco área escopo undermines
