pt":"Qual das seguintes alternativas melhor descreve o usar de análise de dados não fase de planejamento interno trabalho de auditoria?","options_pt":{"A":"Tracking o status de abrir achados e garantindo tempestivo resolução","B":"Apoiando creation de tempestivo relatórios e tempo real observações","C":"Identificando tendências e risco áreas para ajudar escopo trabalho de auditoria e priorizar recursos","D":"Streamlining testando processos para detectar anomalias e deficiências de controle"},"correct":"C","explanation_pt":"Alternativa \"A\" está incorreta. Tracking o status de abrir achados e garantindo tempestivo resolução é função de análise de dados não monitorando fase. Alternativa \"B\" está incorreta. Apoiando creation de tempestivo relatórios e tempo real observações é função de análise de dados não fase de elaboração fazer relatório. Alternativa \"C\" está correta. Não fase de planejamento de um interno trabalho de auditoria, análise de dados é utilizado para analisar dados, identificar tendências, e pinpoint alto-risco áreas. Este ajuda auditores definir o escopo do trabalho de auditoria, allocate recursos eficazmente, e focar em áreas esse exigir o mais attention. Alternativa \"D\" está incorreta. Streamlining testando processos para detectar anomalias e deficiências de controle é função de análise de dados não avaliação (testando) fase."},{"id":"M2_U2_Q4","num":4,"total":30,"module":"M2","unit":"U2","topic":"Opções Tecnológicas","question_pt":"Qual cenário melhor ilustra o usar de generalized auditoria software (GAS) em interno auditoria?","options_pt":{"A":"AI-powered pesquisa ferramentas são utilizado para analisar retorno dos empregados, identificando recurring preocupações sobre workplace políticas e gargalos em comunicação.","B":"Um auditor interno selects uma amostra de funcionários banco de dados e verifica os dados fields para garantir o correctness de informação already contained não banco de dados.","C":"Bot é programmed para extract dados de fo a display o status de abrir achados de auditoria, permitindo alta administração para monitorar progresso e priorizar crítico questões em real tempo.","D":"AI-powered pesquisa ferramentas são utilizado para analisar retorno dos empregados, identificando recurring preocupações sobre workplace políticas e gargalos em comunicação."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Análise de dados software pode ser utilizado para agregar dados de múltiplos localizações para analisar tendências, identificar discrepâncias, e avaliar eficácia de processos em um centralizado e eficiente manner. O cenário de uma equipe de auditoria interna aggregating dados de múltiplos regional offices em centralizado sistema para análise para identificar discrepâncias é um exemplo de usando análise de dados software em interno auditoria. Alternativa \"B\" está incorreta. Este cenário descreve o usar de automação robótica de processos (RPA), que automates repetitivo, regra-baseado tarefas como dados extraction e comparação. Alternativa \"C\" está incorreta. Este cenário descreve o usar de painéis de controle, que são visual ferramentas utilizado para relatórioar resultados e fornecer tempo real atualiza não status de abrir questões. Alternativa \"D\" está incorreta. Este cenário descreve o usar de inteligência artificial (IA), que é utilizado para avaliar retorno e identificar padrões ou preocupações por meio de sentiment análise."},{"id":"M2_U2_Q6","num":6,"total":30,"module":"M2","unit":"U2","topic":"Opções Tecnológicas","question_pt":"Qual das seguintes é um principal benefit de usando painéis de controle em interno auditoria?","options_pt":{"A":"Automatizando dados entrada","B":"Relatórioando trabalho de auditoria indicador-chave de desempenho (KPI) resultados ao conselho","C":"Analisando grande conjuntos de dados","D":"Realizando tempo real monitorando"},"correct":"B","explanation_pt":"Alternativa \"A\" está incorreta. automatizando dados entrada é benefit de usando auto  acesso padrões. Alternativa \"C\" está correta. Aprendizado de máquina (ML) é tipo de inteligência artificial esse permite sistemas para melhorar sobre tempo por learning de dados. Aprendizado de máquina excels em identificando tendências ou anomalias esse poderia signal fraude, erros, ou ineficiências. Portanto, ele pode ser very útil para detectando outliers em despesa claims ou unusual sistema acesso padrões. Alternativa \"D\" está incorreta. Automação robótica de processos (RPA) é utilizado para automatizando repetitivo, regra-baseado tarefas e pode não ser útil para detectando outliers em despesa claims ou unusual sistema acesso padrões."},{"id":"M2_U2_Q8","num":8,"total":30,"module":"M2","unit":"U2","topic":"Opções Tecnológicas","question_pt":"Qual das seguintes alternativas TAACs pode ser utilizado para automate o preparation, revisar, e armazenamento de trabalho de auditoria papéis de trabalho?","options_pt":{"A":"Auditoria expert sistemas","B":"Automatizado papéis de trabalho","C":"Análise de dados software","D":"Generalized auditoria software (GAS)"},"correct":"B","explanation_pt":"Alternativa \"A\" está incorreta. Auditoria expert sistemas são decisão apoiar ferramentas para ajudar auditores internos avaliar riscos e identificar potencial questões, não para automate o preparation, revisar, e armazenamento de trabalho de auditoria papéis de trabalho. Alternativa \"B\" está correta. Auditores internos pode usar computerized sistema ou software para preparar, revisar, e store trabalho de auditoria papéis de trabalho para ajudar create consistency e eficiência. Assim, automatizado papéis de trabalho são utilizado para preparar, revisar, e store trabalho de auditoria papéis de trabalho. Alternativa \"C\" está incorreta. Análise de dados software é utilizado para analisar grande conjuntos de dados para identificar tendências e detectar anomalias, não para automate o preparation, revisar, e armazenamento de trabalho de auditoria papéis de trabalho. Alternativa  a função de generalized auditoria software (GAS) em interno auditoria?","options_pt":{"A":"Acessando dados diretamente de uma organização sistemas e analisando registros para validade, completude, e precisão","B":"Automatizando repetitivo, regra-baseado tarefas","C":"Monitorando dados em real tempo para sinalizar anomalias","D":"Fornecendo tempo real atualiza não status de abrir achados"},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Generalized auditoria software (GAS) possibilita que auditores internos para acesso dados diretamente de uma organização sistemas. GAS é útil para automatizando vários auditoria tarefas, que possibilita que auditores para diretamente acesso e analisar registros para validade, completude, e precisão. Alternativa \"B\" está incorreta. automatizando repetitivo, regra-baseado tarefas descreve função de automação robótica de processos (RPA). Alternativa \"C\" está incorreta. Monitorando dados em real tempo para sinalizar anomalias descreve função de módulos de auditoria integrados. Alternativa \"D\" está incorreta. Fornecendo tempo real atualiza não status de abrir achados descreve função de painéis de controle."},{"id":"M2_U2_Q12","num":12,"total":30,"module":"M2","unit":"U2","topic":"Opções Tecnológicas","question_pt":"Uma equipe de auditoria interna é incumbido de revisando da organização processo de compras para garantir conformidade com aprovação fluxos de trabalho e pagamento autorização políticas. Equipe necessidades para analisar grande conjuntos de dados de transações para identificar conformidade lacunas, como pagamentos feita sem adequado autorização ou repeated aprovações pelo mesmo indivíduo para unusually grande valores. Que tecnoregistraria é melhor adequado para este tarefa?","options_pt":{"A":"Monitoramento contínuo","B":"Aprendizado de máquina (ML)","C":"Automação robótica de processos (RPA)","D":"Painéis de controle"},"correct":"B","explanation_pt":"Alternativa \"A\" está incorreta. Monitoramento contínuo é utilizado para tempo realfalha de revisãode processos de negócio e controles, mas ele faz não realizar o aprofundado análise de histórico conjuntos de dados exigido em este cenário. Alternativa \"B\" está correta. Aprendizado de máquina (ML) é tipo de inteligência artificial esse permite sistemas para melhorar sobre tempo por learning de dados. ML pode avaliar grande volumes de transações para detectar conformidade lacunas, como pagamentos feita sem adequado autorização, ou inconsistências em aprovação fluxos de trabalho, like repeated aprovações pelo mesmo pessoa para unusually grande valores. Portanto, a tecnoregistraria melhor adequado para avaliando grande volumes de transações para detectar conformidade lacunas é ML. Alternativa \"C\" está incorreta. Automação robótica de processos (RPA) é utilizado para automatizando repetitivo, regra-baseado tarefas, mas ele é não elaborado para analisando grande conjuntos de dados para detectar conformidade lacunas. Alternativa \"D\" está incorreta. Painel de controle é visual esse displays pertinent informação ao usuário. Painéis de controle são utilizado para relatórioar resultados e atualizar administração não status de abrir questões, mas eles fazer não analisar conjuntos de dados para detectar conformidade lacunas."},{"id":"M2_U2_Q13","num":13,"total":30,"module":"M2","unit":"U2","topic":"Opções Tecnológicas","question_pt":"Uma equipe de auditoria interna quer enhance fraude detecção por analisando grande volumes de transação dados em real tempo. Que tecnoregistraria solução deveria ser mais eficaz?","options_pt":{"A":"Aprendizado de máquina algorithms para identificar unusual padrões e anomalias.","B":"Funcionário surveys para coletar opiniões em potencial fraude riscos.","C":"Traditional amostragem métodos para revisar subset de transações manually.","D":"Norma planilha software para analisando indivíduo transações."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Aprendizado de máquina pode eficientemente analisar grande conjuntos de dados, detectar padrões, e identificar fraude riscos mais eficazmente fazer que manual métodos."},{"id":"M2_U2_Q14","num":14,"total":30,"module":"M2","unit":"U2","topic":"Opções Tecnológicas","question_pt":"Qual das seguintes alternativas cenários melhor ilustra o usar de módulos de auditoria integrados em interno auditoria?","options_pt":{"A":"Routine é embedded não expenditures processo para automatically notificar auditores internos qualquer tempo um nota fiscal $15,000 é entered.","B":"AI-powered pesquisa ferramentas avaliar retorno de partes interessadas para guide escopo de auditoria.","C":"Visual ferramenta é utilizado para relatórioar trabalho de auditoria indicador-chave de desempenho (KPI) resultados ao conselho.","D":"Bot é utilizado para verificar fornecedor notas fiscais contra pedidos de compra e pagamento registros."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Módulos de auditoria integrados são routines programmed para monitorar dados em real tempo para sinalizar anomalias e coletar relevantee evidências de auditoria. Qualquer anomalias flagged são automatically registrado para manual revisar pela função de auditoria interna. Routine embedded não expenditures processo para automatically notificar auditores internos qualquer tempo um nota fiscal de $15,000 é entered é um exemplo de usando módulos de auditoria integrados. Alternativa \"B\" está incorreta. Usando AI-powered pesquisa ferramentas para avaliar retorno de partes interessadas descreve o usar de inteligência artificial (IA). Alternativa \"C\" está incorreta. Visual ferramenta utilizado para relatórioar um trabalho de auditoria indicador-chave de desempenho (KPI) descreve o usar de painéis de controle. Alternativa \"D\" está incorreta. Usando bot para verificar fornecedor notas fiscais contra pedidos de compra e pagamento registros descreve o usar de automação robótica de processos (RPA)."},{"id":"M2_U2_Q15","num":15,"total":30,"module":"M2","unit":"U2","topic":"Opções Tecnológicas","question_pt":"Uma equipe de auditoria interna é incumbido de monitorando da organização folha de pagamento transações para garantir conformidade com políticas e detectar potencial erros ou fraude. Eles necessidade um sistema esse pode continuamente monitorar folha de pagamento dados em real tempo, sinalizar unusual padrões como duplicate pagamentos para funcionários ou pagamentos exceeding autorizado limita, e fornecer alerta para imediato revisar. Que tecnoregistraria é melhor adequado para este tarefa?","options_pt":{"A":"Aprendizado de máquina (ML)","B":"Monitoramento contínuo","C":"Automação robótica de processos (RPA)","D":"Painéis de controle"},"correct":"B","explanation_pt":"Alternativa \"A\" está incorreta. Aprendizado de máquina (ML) é tipo de inteligência artificial esse permite sistemas para melhorar sobre tempo por learning de dados, mas ele é não melhor adequado para tempo real monitorando de folha de pagamento transações. Alternativa \"B\" está correta. Monitoramento contínuo usa tecnoregistraria para realizar tempo real ou near-tempo realfalha de revisãode processos de negócio e controles. Monitoramento contínuo pode detectar unusual padrões, como duplicate pagamentos ou pagamentos exceeding autorizado limita, e prontamente generate alerta para imediato revisar. Auditores internos então revisar flagged itens para determinar se eles indicar deficiências de controle ou fraude. Alternativa \"C\" está incorreta. Automação robótica de processos (RPA) é utilizado para automatizando repetitivo, regra-baseado tarefas, como dados entrada ou conciliações, mas ele é não melhor adequado para tempo real monitorando de folha de pagamento transações. Alternativa \"D\" está incorreta. Painéis de controle são utilizado para relatórioar resultados e atualizar administração não status de abrir questões, mas eles fazer não actively monitorar transações ou sinalizar anomalias em real tempo."},{"id":"M2_U2_Q16","num":16,"total":30,"module":"M2","unit":"U2","topic":"Opções Tecnológicas","question_pt":"Que tecnoregistraria pode não ser adequado para tempo real monitorando de processos de negócio e controles?","options_pt":{"A":"Aprendizado de máquina (ML)","B":"Monitoramento contínuo","C":"Inteligência artificial (IA)","D":"Automação robótica de processos (RPA)"},"correct":"D","explanation_pt":"Alternativa \"A\" está incorreta. Aprendizado de máquina (ML), subset de AI, é capaz de tempo real monitorando por learning de dados e melhorando seu capacidade para detectar anomalias ou riscos sobre tempo. ML algorithms pode processo grande volumes de dados em real tempo, sinalizando unusual padrões ou transações para adicional revisar. Alternativa \"B\" está incorreta. Monitoramento contínuo é eespecíficoamente elaborado para tempo real ou near-tempo realfalha de revisãode processos de negócio e controles. Ele usa automatizado ferramentas e sistemas para coletar, analisar, e avaliar dados continuamente, permitindo auditores internos para tratar questões proativamente. Monitoramento contínuo sistemas identificar anomalias, política violações, ou potencial riscos como eles ocorre, garantindo tempestivo ações corretivas. Alternativa \"C\" está incorreta. Inteligência artificial (IA) pode ser utilizado para tempo real monitorando por analisando grande conjuntos de dados e identificando padrões ou anomalias como eles ocorre. AI ferramentas pode possibilitar tempo real decisão tomada e alertar auditores internos para riscos como eles arise. Alternativa \"D\" está correta. Automação robótica de processos (RPA) é não well-adequado para tempo real monitorando de processos de negócio e controles. RPA é projetado para automate repetitivo, regra-baseado tarefas, como dados entrada, conciliações, e relatório generation. Enquanto ele pode melhorar eficiência e reduzir erros em routine processos, ele faz não fornecer o contínuo, tempo realfalha de revisãoexigido para monitorando processos de negócio e controles."},{"id":"M2_U2_Q17","num":17,"total":30,"module":"M2","unit":"U2","topic":"Opções Tecnológicas","question_pt":"Qual das seguintes é um principal usar de análise de dados software em interno auditoria?","options_pt":{"A":"Analisando grande conjuntos de dados para identificar tendências e detectar anomalias","B":"Monitorando dados em real tempo para sinalizar anomalias","C":"Fornecendo tempo real atualiza não status de abrir achados","D":"Automatizando repetitivo tarefas"},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Análise de dados software pode ser utilizado para analisar grande conjuntos de dados para identificar tendências e detectar anomalias. Este pode incluir duplicate nota fiscal numbers, valores, dates, ou fornecedor detalhes usando filters, padrão recognition, ou matching algorithms. Alternativa \"B\" está incorreta. Monitorando dados em real tempo para sinalizar anomalias é função de módulos de auditoria integrados, não principal usar de análise de dados software. Alternativa \"C\" está incorreta. Fornecendo tempo real atualiza não status de abrir achados é função de painéis de controle, não principal usar de análise de dados software. Alternativa \"D\" está incorreta. automatizando repetitivo tarefas é função de automação robótica de processos (RPA), não principal usar de análise de dados software."},{"id":"M2_U2_Q18","num":18,"total":30,"module":"M2","unit":"U2","topic":"Opções Tecnológicas","question_pt":"Qual das seguintes é um exemplo de um assistido por computador auditoria técnica (CAAT)?","options_pt":{"A":"Painéis de controle","B":"Monitoramento contínuo","C":"Módulos de auditoria integrados","D":"Análise de dados software"},"correct":"D","explanation_pt":"Alternativa \"A\" está incorreta. Painéis de controle são visual ferramentas esse apresentar dados em um organized, easy-para-compreender formato. Enquanto painéis de controle apoiar auditoria processos, eles são não um exemplo de um CAAT. Alternativa \"B\" está incorreta. Monitoramento contínuo é tecnoregistraria utilizado para tempo realfalha de revisãode processos de negócio e controles. Enquanto monitoramento contínuo apoia auditoria processos, ele é não um exemplo de um CAAT. Alternativa \"C\" está incorreta. Módulos de auditoria integrados são routines programmed para monitorar dados em real tempo para sinalizar anomalias e coletar relevantee evidências de auditoria. Enquanto eles enhance auditoria processos, módulos de auditoria integrados são não um exemplo de um CAAT. Alternativa \"D\" está correta. Auditores internos pode usar técnicas de auditoria assistidas por computador (TAACs) quando realizando trabalho de auditorias para testar grande valores de dados eficientemente, incluindo em testando controles. Exemplos de TAACs incluir análise de dados software, generalized auditoria software (GAS), auditoria expert sistemas, e automatizado papéis de trabalho."},{"id":"M2_U2_Q19","num":19,"total":30,"module":"M2","unit":"U2","topic":"Opções Tecnológicas","question_pt":"Qual cenário melhor ilustra o usar de auditoria expert sistemas em interno auditoria?","options_pt":{"A":"Uma equipe de auditoria interna usa uma decisão apoiar ferramenta para avaliar riscos, identificar potencial questões, e priorizar controles para um alto-risco trabalho de auditoria, garantindo esse crítico áreas são tratado primeiro.","B":"Uma equipe de auditoria interna aggregates dados de múltiplos regional offices, analisa tendências, e identifica discrepâncias em despesa relatórioando em toda localizações.","C":"Um auditor interno selects uma amostra de funcionários banco de dados e verifica os dados fields para garantir o correctness de informação already contained não banco de dados.","D":"Computerized sistema é utilizado para preparar, revisar, e store trabalho de auditoria papéis de trabalho, garantindo consistency e eficiência em documentação."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Auditoria expert sistemas são uma decisão apoiar ferramenta para ajudar auditores internos em vários atividades como avaliando riscos, identificando potencial questões e red flags, e priorizando controles e áreas para o trabalho de auditoria. Assim, uma decisão apoiar ferramenta ajudando auditores internos avaliar riscos e identificar potencial questões e red flags é um exemplo de usando auditoria expert sistemas. Alternativa \"B\" está incorreta. Este cenário descreve o usar de análise de dados software, que é utilizado para agregar dados de múltiplos localizações para analisar tendências e identificar discrepâncias. Alternativa \"C\" está incorreta. Selecting uma amostra de funcionários banco de dados e verificando os dados fields para garantir o correctness de informação already contained não banco de dados é um exemplo de usando generalized auditoria software (GAS). Alternativa \"D\" está incorreta. Este cenário descreve o usar de automatizado papéis de trabalho, que são utilizado para preparar, revisar, e store trabalho de auditoria papéis de trabalho para garantir consistency e eficiência."},{"id":"M2_U2_Q20","num":20,"total":30,"module":"M2","unit":"U2","topic":"Opções Tecnológicas","question_pt":"Uma equipe de auditoria interna é responsável por tracking o status de abrir trabalho de auditoria questões e garantindo tempestivo resolução. Equipe necessidades um sistema esse pode fornecer tempo real atualiza não progresso de achados e notificar responsável partes sobre overdue tarefas. Que tecnoregistraria é melhor adequado para gerenciando e tratando estes abrir trabalho de auditoria questões?","options_pt":{"A":"Monitoramento contínuo","B":"Aprendizado de máquina (ML)","C":"Inteligência artificial (IA)","D":"Automação robótica de processos (RPA)"},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Monitoramento contínuo usa tecnoregistraria para tempo real desempenho relatórioando e tracking abrir questões. Para caso, tempo real painéis de controle pode ser utilizado para fornecer atualiza não status de achados, enquanto automatizado fluxos de trabalho streamline o processo de gerenciando e tratando esses questões. Portanto, monitoramento contínuo tecnoregistraria é melhor adequado para gerenciando e tratando estes abrir trabalho de auditoria questões. Alternativa \"B\" está incorreta. Aprendizado de máquina (ML) é tipo de inteligência artificial esse permite sistemas para melhorar sobre tempo por learning de dados, mas ele é não tipicamente utilizado para tracking e gerenciando trabalho de auditoria questões. Alternativa \"C\" está incorreta. Inteligência artificial (IA) é utilizado para analisar grande conjuntos de dados e identificar padrões e anomalias, mas ele é não eespecíficoamente elaborado para gerenciando abrir trabalho de auditoria questões. Alternativa \"D\" está incorreta. Automação robótica de processos (RPA) é utilizado para automatizando repetitivo, regra-baseado tarefas, mas ele faz não fornecer o tempo real tracking e workflow automation exigido para gerenciando abrir trabalho de auditoria questões."},{"id":"M2_U2_Q21","num":21,"total":30,"module":"M2","unit":"U2","topic":"Opções Tecnológicas","question_pt":"Em qual fase da auditoria interna trabalho de auditoria pode inteligência artificial (IA) ser utilizado para identificar tendências e risco áreas para ajudar escopo trabalho de auditoria e priorizar recursos?","options_pt":{"A":"Monitorando","B":"Avaliação (testando)","C":"Relatórioando","D":"Planejando"},"correct":"D","explanation_pt":"Alternativa \"A\" está incorreta. O monitorando fase usa tecnoregistraria para tempo real desempenho relatórioando e tracking abrir questões. no entanto, AI é não utilizado não monitorando fase para identificar tendências e risco áreas para ajudar escopo trabalho de auditoria e priorizar recursos. Alternativa \"B\" está incorreta. A avaliação (testando) fase usa tecnoregistraria para otimizar testando processos e analisar grande conjuntos de dados. no entanto, AI é não utilizado não avaliação fase para identificar tendências e risco áreas para ajudar escopo trabalho de auditoria ou priorizar recursos. Alternativa \"C\" está incorreta. A fase de elaboração fazer relatório usa tecnoregistraria para apoiar o creation de tempestivo relatórios e tempo real observação. no entanto, AI é não utilizado não fase de elaboração fazer relatório para identificar tendências e risco áreas para ajudar escopo trabalho de auditoria e priorizar recursos. Alternativa \"D\" está correta. Tecnoregistraria betters cada fase interno trabalho de auditoria por melhorando eficiência, precisão, e comunicação. Não fase de planejamento, auditores internos usar tecnoregistrarias como AI para identificar tendências e risco áreas, ajudando them escopo trabalho de auditoria e priorizar recursos eficazmente."},{"id":"M2_U2_Q22","num":22,"total":30,"module":"M2","unit":"U2","topic":"Opções Tecnológicas","question_pt":"Qual das seguintes alternativas tecnoregistrarias é melhor adequado para auditores internos para verificar fornecedor notas fiscais contra pedidos de compra e pagamento registros?","options_pt":{"A":"Inteligência artificial (IA)","B":"Monitoramento contínuo","C":"Aprendizado de máquina (ML)","D":"Automação robótica de processos (RPA)"},"correct":"D","explanation_pt":"Alternativa \"A\" está incorreta. Inteligência artificial (IA) refers ao usar de sistemas de informação esse mirror human intelligence. AI é tipicamente utilizado para tarefas esse envolver analisando complexo dados, identificando padrões, ou tomada predictions em vez de focando em simples, regra-baseado processos like verificando notas fiscais contra pedidos de compra. Alternativa \"B\" está incorreta. Monitoramento contínuo fornece contínuo testando todo população de transações e ajuda para reduzir erros, riscos, e fraude. Assim, ele é não melhor adequado para tarefas como verificando fornecedor notas fiscais contra pedidos de compra e pagamento registros. Alternativa \"C\" está incorreta. Aprendizado de máquina (ML) é tipo de inteligência artificial esse permite sistemas para melhorar sobre tempo por learning de dados. ML é tipicamente utilizado para tarefas esse envolver analisando complexo dados, identificando padrões, ou tomada predictions em vez de focando em simples, regra-baseado processos like verificando notas fiscais contra pedidos de compra. Alternativa \"D\" está correta. Automação robótica de processos (RPA) usa programmed robots (bots) para o automation de repetitivo, regra-baseado tarefas em toda vários aplicações. Bots são built em predefined rules e fluxos de trabalho para concluir routine tarefas como dados entrada, form filling, running consistente testes, e extracting informação. O adoption de RPA em interno auditoria saves tempo e reduz erros em routine processos. RPAs pode quickly e com precisão processo grande volumes de dados e deveria ser melhor adequado para verificar fornecedor notas fiscais contra pedidos de compra e pagamento registros."},{"id":"M2_U2_Q23","num":23,"total":30,"module":"M2","unit":"U2","topic":"Opções Tecnológicas","question_pt":"Qual das seguintes alternativas melhor descreve a função de módulos de auditoria integrados em interno auditoria?","options_pt":{"A":"Monitorando dados em real tempo para sinalizar anomalias e coletar relevantee evidências de auditoria","B":"Fornecendo tempo real atualiza não status de abrir achados","C":"Analisando grande conjuntos de dados para identificar tendências e detectar anomalias","D":"Automatizando repetitivo, regra-baseado tarefas"},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Módulos de auditoria integrados são routines programmed para monitorar dados em real tempo para sinalizar anomalias e coletar relevantee evidências de auditoria. Qualquer anomalias flagged são automatically registrado para manual revisar pela função de auditoria interna. Alternativa \"B\" está incorreta. Fornecendo tempo real atualiza não status de abrir achados é função de painéis de controle. Alternativa \"C\" está incorreta. Analisando grande conjuntos de dados para identificar tendências e detectar anomalias é função de aprendizado de máquina (ML). Alternativa \"D\" está incorreta. automatizando repetitivo, regra-baseado tarefas é função de automação robótica de processos (RPA)."},{"id":"M2_U2_Q24","num":24,"total":30,"module":"M2","unit":"U2","topic":"Opções Tecnológicas","question_pt":"Em qual fase da auditoria interna trabalho de auditoria é tecnoregistraria utilizado para acompanhar o status de achados de auditoria e garantir tempestivo resolução?","options_pt":{"A":"Monitorando","B":"Planejando","C":"Avaliação (testando)","D":"Relatórioando"},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Tecnoregistraria betters cada fase interno trabalho de auditoria por melhorando eficiência, precisão, e comunicação. Não monitorando fase, tecnoregistraria plays crucial papel em tracking desempenho e gerenciando abrir trabalho de auditoria questões. tempo real painéis de controle fornecer atualiza não status de achados, enquanto automatizado fluxos de trabalho streamline o processo de gerenciando e tratando esses questões. Assim, tecnoregistraria é utilizado não monitorando fase para acompanhar o status de achados de auditoria e garantir tempestivo resolução. Alternativa \"B\" está incorreta. A fase de planejamento usa tecnoregistraria para identificar tendências e risco áreas, ajudando escopo trabalho de auditoria e priorizar recursos, não para acompanhar o status de achados de auditoria e garantir tempestivo resolução. Alternativa \"C\" está incorreta. A avaliação (testando) fase usa tecnoregistraria para otimizar testando processos e analisar grande conjuntos de dados, não para acompanhar o status de achados de auditoria ou garantir tempestivo resolução. Alternativa \"D\" está incorreta. A fase de elaboração fazer relatório usa tecnoregistraria para apoiar o creation de tempestivo relatórios e tempo real observações, não para acompanhar o status de achados de auditoria e garantir tempestivo resolução."},{"id":"M2_U2_Q25","num":25,"total":30,"module":"M2","unit":"U2","topic":"Opções Tecnológicas","question_pt":"Uma equipe de auditoria interna é incumbido de monitorando da organização expenditures para garantir conformidade com aprovação limiares e para detectar potencial fraude. Este exige um sistema esse pode continuamente monitorar transações, sinalizar anomalias como notas fiscais exceeding predefined limita, e coletar relevantee evidências de auditoria para adicional revisar. Que tecnoregistraria é melhor adequado para este tarefa?","options_pt":{"A":"Automatizado papéis de trabalho","B":"Painéis de controle","C":"Análise de dados software","D":"Módulos de auditoria integrados"},"correct":"D","explanation_pt":"Alternativa \"A\" está incorreta. Automatizado papéis de trabalho são utilizado para preparar, revisar, e store trabalho de auditoria papéis de trabalho, mas eles são não projetado para sinalizar anomalias ou coletar evidências de auditoria em real tempo. Alternativa \"B\" está incorreta. Painéis de controle são utilizado para relatórioar resultados e atualizar administração não status de abrir questões, mas eles fazer não actively monitorar dados ou sinalizar anomalias em real tempo. Alternativa \"C\" está incorreta. Análise de dados software é utilizado para analisar grande conjuntos de dados para identificar tendências e detectar anomalias, mas ele faz não monitorar dados em real tempo ou coletar evidências de auditoria automatically. Alternativa \"D\" está correta. Módulos de auditoria integrados são routines programmed para monitorar dados em real tempo para sinalizar anomalias e coletar relevantee evidências de auditoria. Eles pode sinalizar anomalias, como notas fiscais exceeding predefined limita, e coletar relevantee evidências de auditoria em real tempo para adicional revisar. Este fazers them ideal para tarefas like monitorando expenditures para garantir conformidade com aprovação limiares e para detectar potencial fraude."},{"id":"M2_U2_Q26","num":26,"total":30,"module":"M2","unit":"U2","topic":"Opções Tecnológicas","question_pt":"Uma equipe de auditoria interna é incumbido de garantindo a precisão da organização registros financeiros. Eles necessidade para reconciliar banco declarações com da organização registros financeiros para identificar discrepâncias como missing transações ou duplicate entries. O processo envolve extracting dados de múltiplos fontes, comparando as informações, e sinalizando qualquer mismatches para adicional revisar. Que tecnoregistraria é melhor adequado para automatizando este conciliação processo?","options_pt":{"A":"Automação robótica de processos (RPA)","B":"Painéis de controle","C":"Análise de dados","D":"Monitoramento contínuo"},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Automação robótica de processos (RPA) usa programmed robots (bots) para o automation de repetitivo, regra-baseado tarefas em toda vários aplicações. RPA pode automate a conciliação processo por extracting dados de banco declarações e registros financeiros, comparando as informações, e sinalizando discrepâncias para revisar. Portanto, RPA é melhor adequado para automatizando a conciliação processo. Alternativa \"B\" está incorreta. Painéis de controle são visual ferramentas utilizado para relatórioar resultados, atualizar administração não status de abrir questões, e display indicadores-chave de desempenho (KPIs). Eles são não projetado para automate conciliação tarefas. Alternativa \"C\" está incorreta. Análise de dados é utilizado para analisar grande conjuntos de dados para identificar tendências e detectar anomalias, mas ele faz não automate conciliação tarefas. Alternativa \"D\" está incorreta. Monitoramento contínuo usa tecnoregistraria para realizar tempo real ou near-tempo realfalha de revisãode processos de negócio e controles, mas ele faz não automate conciliação tarefas."},{"id":"M2_U2_Q27","num":27,"total":30,"module":"M2","unit":"U2","topic":"Opções Tecnológicas","question_pt":"Qual das seguintes alternativas melhor descreve o usar de automatizado papéis de trabalho em interno auditoria?","options_pt":{"A":"Preparando, revisando, e storing trabalho de auditoria papéis de trabalho","B":"Automatizando repetitivo, regra-baseado tarefas","C":"Fornecendo tempo real atualiza não status de abrir achados","D":"Monitorando dados em real tempo para sinalizar anomalias"},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Auditores internos pode usar computerized sistema ou software para preparar, revisar, e store trabalho de auditoria papéis de trabalho para ajudar create consistency e eficiência. Assim, preparando, revisando, e storing trabalho de auditoria papéis de trabalho descreve o usar de automatizado papéis de trabalho em interno auditoria. Alternativa \"B\" está incorreta. automatizando repetitivo, regra-baseado tarefas pode ser atingido por usando automação robótica de processos (RPA), não automatizado papéis de trabalho. Alternativa \"C\" está incorreta. Fornecendo tempo real atualiza não status de abrir achados pode ser atingido por usando painéis de controle, não automatizado papéis de trabalho. Alternativa \"D\" está incorreta. Monitorando dados em real tempo para sinalizar anomalias pode ser atingido por usando módulos de auditoria integrados, não automatizado papéis de trabalho."},{"id":"M2_U2_Q28","num":28,"total":30,"module":"M2","unit":"U2","topic":"Opções Tecnológicas","question_pt":"Uma equipe de auditoria interna distributes um funcionário pesquisa para avaliar funcionário satisfaction e para identificar potencial gargalos em da organização processos. Que tecnoregistraria deve o auditores internos usar para avaliar o pesquisa retorno eficazmente e identificar principal preocupações?","options_pt":{"A":"Automação robótica de processos (RPA)","B":"Monitoramento contínuo","C":"Inteligência artificial (IA)","D":"Análise de dados"},"correct":"C","explanation_pt":"Alternativa \"A\" está incorreta. Automação robótica de processos (RPA) é utilizado para automatizando repetitivo, regra-baseado tarefas, como dados entrada ou conciliação, e é não adequado para analisando pesquisa retorno. Alternativa \"B\" está incorreta. Monitoramento contínuo é utilizado para realizar tempo real ou near-real- tempofalha de revisãode processos de negócio e controles mas é não melhor adequado para avaliar qualitative pesquisa retorno, que frequentemente exige processamento unestruturad dados e identificando nuanced padrões. Alternativa \"C\" está correta. Inteligência artificial (IA) refers ao usar de sistemas de informação esse mirror human intelligence. AI é well-adequado para analisando grande volumes de unestruturad dados, como pesquisa retorno, para identificar padrões, tendências, e principal preocupações. AI pode processo qualitative dados, detectar recurring themes, e fornecer percepções em funcionário satisfaction e processo gargalos. Alternativa \"D\" está incorreta. Análise de dados software pode ser utilizado para analisar grande dados sets para identificar tendências e detectar anomalias mas é não melhor adequado para avaliar qualitative pesquisa retorno, que frequentemente exige processamento unestruturad dados e identificando nuanced padrões."},{"id":"M2_U2_Q29","num":29,"total":30,"module":"M2","unit":"U2","topic":"Opções Tecnológicas","question_pt":"Qual cenário melhor ilustra o usar de técnicas de auditoria assistidas por computador (TAACs) em interno auditoria?","options_pt":{"A":"Painel de controle é created para display o status de abrir achados de auditoria, permitindo alta administração para monitorar progresso e priorizar crítico questões em real tempo.","B":"Bot é programmed para extract dados de fornecedor notas fiscais e comparar ele com pedidos de compra para sinalizar mismatches para adicional revisar.","C":"Um auditor interno usa análise de dados software para agregar dados de múltiplos localizações, analisar tendências, e identificar discrepâncias em despesa relatórioando.","D":"Um módulo de auditoria integrado é configured para monitorar transações financeiras em real tempo e sinalizar anomalias como duplicate pagamentos ou transações exceeding autorização limiares."},"correct":"C","explanation_pt":"Alternativa \"A\" está incorreta. Este cenário descreve o usar de painéis de controle, monitoramento contínuo ferramenta, que são visual ferramentas utilizado para relatórioar resultados e fornecer tempo real atualiza não status de abrir questões. Enquanto usando painéis de controle é beneficial em interno auditoria, ele é não considerado específico assistido por computador auditoria técnica. Alternativa \"B\" está incorreta. Este cenário descreve o usar de automação robótica de processos (RPA), que automates repetitivo, regra-baseado tarefas como dados extraction e comparação. Enquanto usando RPA é beneficial em interno auditoria, ele é não específico assistido por computador auditoria técnica. Alternativa \"C\" está correta. Auditores internos pode usar técnicas de auditoria assistidas por computador (TAACs) para realizar trabalho de auditorias e para testar grande valores de dados eficientemente, incluindo em testando controles. TAACs incluir ferramentas como análise de dados software, generalized auditoria software, e automatizado papéis de trabalho para testar grande valores de dados eficientemente e para identificar tendências ou anomalias. Assim, usando análise de dados software para agregar dados, analisar tendências, e identificar discrepâncias é um exemplo de TAACs. Alternativa \"D\" está incorreta. Este cenário descreve o usar de módulos de auditoria integrados, monitoramento contínuo tecnoregistraria esse monitora dados em real tempo para sinalizar anomalias e coletar relevantee evidências de auditoria. Enquanto usando módulos de auditoria integrados é beneficial em interno auditoria, ele é não considerado específico assistido por computador auditoria técnica."},{"id":"M2_U2_Q30","num":30,"total":30,"module":"M2","unit":"U2","topic":"Opções Tecnológicas","question_pt":"Um auditor necessidades para fornecer tempo real monitorando de principal controles financeiros e imediatamente sinalizar potencial questões. Qual tecnoregistraria deveria melhor apoiar este objetivo?","options_pt":{"A":"Painel de controle que é apenas revisado não end ano.","B":"Monitoramento contínuo ferramentas para acompanhar controle eficácia em real tempo.","C":"Static relatório que é manually atualizado não end de cada auditoria ciclo.","D":"Lista de verificação concluído trimestral para avaliar financeiro riscos."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Monitoramento contínuo fornece tempo realfalha de revisãode controles financeiros, permitindo imediato detecção de anomalias."},{"id":"M2_U3_Q1","num":1,"total":35,"module":"M2","unit":"U3","topic":"Comunicação com Partes Interessadas","question_pt":"Durante uma conferência de encerramento, administração atividade sob revisão disagrees com one trabalho de auditoria achados. Equipe de auditoria interna believes o achado é crítico e deve ser incluído no relatório final relatório. Qual é ação mais adequada ação para o equipe de auditoria interna para tomar?","options_pt":{"A":"Documentar o disagreement no relatório final relatório e incluir formal declaração de administração.","B":"Escalar o disagreement ao conselho imediatamente para resolução.","C":"Remove o achado final relatório para avoid conflitos com administração.","D":"Adiar emissão de o final relatório até que administração agrees com o achado."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Closing comunicação, também referred para como um \"conferência de encerramento\", serves como crítico etapa no trabalho de auditoria processo durante que auditores internos discutir com a administração atividade sob revisão e relevantee funcionários os resultados, recomendações, e/ou planos de ação antes de finalizando o final comunicação. Durante a conferência de encerramento, administração e auditores internos pode também discutir e resolve qualquer diferenças ou disagreements sobre o trabalho de auditoria resultados. Documentando disagreement e incluindo formal declaração de administração garante transparência e adherence à Normas. Se disagreements são não resolved, o Diretor Executivo de Auditoria e alta administração pode necessidade para get envolvido. Alternativa \"B\" está incorreta. Escalando disagreement ao conselho imediatamente é não exigido menos que questão envolve significativo riscos. Alternativa \"C\" está incorreta. Removing o achado compromises o auditores internos' integridade. Alternativa \"D\" está incorreta. Atrasando final relatório é desnecessário e pode disrupt o trabalho de auditoria cronograma."},{"id":"M2_U3_Q2","num":2,"total":35,"module":"M2","unit":"U3","topic":"Comunicação com Partes Interessadas","question_pt":"Qual das seguintes é mais provável que ser conduzido em um entrance reunião durante o trabalho de auditoria fase de planejamento?","options_pt":{"A":"Discutindo os resultados trabalho de auditoria","B":"Finalizando o trabalho de auditoria relatório","C":"Confirmando trabalho de auditoria objetivos e escopo com administração","D":"Revisando a implementação de administração planos de ação"},"correct":"C","explanation_pt":"Alternativa \"A\" está incorreta. Discutindo os resultados trabalho de auditoria ocorre durante a fase de elaboração fazer relatório. Alternativa \"B\" está incorreta. finalizando o trabalho de auditoria relatório ocorre não conclusão trabalho de auditoria. Alternativa \"C\" está correta. Auditores internos pode conduzir um opening, ou entrance, reunião com a administração atividade sob revisão durante o trabalho de auditoria fase de planejamento. O entrance reunião pode ajudar confirmar esse administração atividade sob revisão understands o trabalho de auditoria objetivos e escopo do trabalho de auditoria e fornece uma oportunidade para fazer qualquer necessário ajustes à abordagem do trabalho. Alternativa \"D\" está incorreta. Revisando a implementação de administração planos de ação ocorre durante acompanhamento atividades."},{"id":"M2_U3_Q3","num":3,"total":35,"module":"M2","unit":"U3","topic":"Comunicação com Partes Interessadas","question_pt":"Equipe de auditoria interna está preparando para begin um trabalho de auditoria e questões um advance observar para administração. O observar inclui o trabalho de auditoria propósito, proposed começar tempo, e estimated duration. no entanto, administraçãas solicitaçõesções adicional tempo para coletar documentação necessidade para o trabalho de auditoria. Qual deve equipe de auditoria interna fazer próximo?","options_pt":{"A":"Prosseguir com o trabalho de auditoria como planejado, independentemente de administraçãas solicitaçõesçõesr.","B":"Begin o trabalho de auditoria sem as solicitaçõesçõesdo documentação e tratar questão durante trabalho de campo.","C":"Ajustar o trabalho de auditoria cronograma para accommodate administraçãas solicitaçõesçõesr e garantir o necessário documentação é disponível.","D":"Cancel o trabalho de auditoria e reschedule ele para um later date."},"correct":"C","explanation_pt":"Alternativa \"A\" está incorreta. prosseguiring sem accommodating administraçãas solicitaçõesçõesr pode hinder o trabalho de auditoria eficácia. Alternativa \"B\" está incorreta. Beginning o trabalho de auditoria sem o necessário documentação pode compromise a qualidade trabalho de auditoria. Alternativa \"C\" está correta. Inicial comunicação geralmente começa com giving administração e relevantee funcionários advance observar trabalho de auditoria, como ele permite administração para planejar agenda eficazmente, avoiding conflitos com outro significativo atividades. O advance observar pode também incluir solicitaçõesr necessário informação e documentação para avaliação de riscos e trabalho programa desenvolvimento. Quando administraçãas solicitaçõesções adicional tempo para coletar documentação necessidade para o trabalho de auditoria, ajustando trabalho de auditoria cronograma garante esse administração tem suficiente tempo para coletar o necessário documentação, promoting eficiência e colaboração. Alternativa \"D\" está incorreta. Canceling o trabalho de auditoria é desnecessário e pode disrupt auditoria plano."},{"id":"M2_U3_Q4","num":4,"total":35,"module":"M2","unit":"U3","topic":"Comunicação com Partes Interessadas","question_pt":"Qual das seguintes alternativas melhor descreve a diferença entre final comunicações para garantia e trabalhos de auditoria consultivos?","options_pt":{"A":"Garantia trabalho de auditorias sempre exigir formal final comunicação, enquanto trabalhos de auditoria consultivos pode não exigir formal final comunicação, dependendo não natureza trabalho de auditoria.","B":"Trabalhos de auditoria consultivos exigir detalhado relatório escrito, enquanto garantia trabalho de auditorias tipicamente usar oral presentations para final comunicação.","C":"Garantia trabalho de auditorias exigir comunicação informal métodos, enquanto trabalhos de auditoria consultivos exigir comunicação formal métodos.","D":"Trabalhos de auditoria consultivos fazer não envolver final comunicações, enquanto garantia trabalho de auditorias sempre exigir final comunicações."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Garantia trabalho de auditorias sempre exigir formal final comunicação, enquanto trabalhos de auditoria consultivos pode não exigir formal final comunicação, dependendo não natureza trabalho de auditoria e cliente expectativas. Em casos onde administração pode solicitaçõesr quick orientação de auditores internos, comunicação formal (e.g., relatório formal) poderia não ser necessário. no entanto, há pode ser casos onde relatório formal é necessidade, especialmente quando função de auditoria interna é parte de um projeto para avaliar um processo ou produto. Alternativa \"B\" está incorreta. Trabalhos de auditoria consultivos pode usar menos comunicação formal métodos, como presentations ou memorandos, enquanto garantia trabalho de auditorias tipicamente exigir formal relatório escrito. Alternativa \"C\" está incorreta. Ambos garantia e trabalhos de auditoria consultivos pode usar formal e comunicação informal métodos, dependendo não situação. Alternativa \"D\" está incorreta. Trabalhos de auditoria consultivos pode envolver final comunicações, mas eles são não sempre obrigado ser formal."},{"id":"M2_U3_Q5","num":5,"total":35,"module":"M2","unit":"U3","topic":"Comunicação com Partes Interessadas","question_pt":"Qual das seguintes é um principal elemento de contínuo comunicação durante trabalho de campo?","options_pt":{"A":"Fornecendo regular progresso atualiza para partes interessadas para tratar emerging questões","B":"Avoiding comunicação informal métodos para manter profissionalismo","C":"Atrasando comunicação até que o trabalho de auditoria é completo para avoid interruptions","D":"Limitando comunicação para escrito atualiza para garantir documentação"},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Trabalho de campo exige contínuo comunicação para garantir transparência e para tratar qualquer questões ou mudanças esse arise durante o trabalho de auditoria. Assim, regular progresso atualiza para partes interessadas para tratar emerging questões são principal elemento de contínuo comunicação durante trabalho de campo. Alternativa \"B\" está incorreta. Comunicação informal métodos pode ser eficaz em certain situações e, portanto, deve não ser avoided. Informal métodos, como impromptu discussões ou emails, são útil para tratando urgente matters ou clarifying específico points. O Alternativa de comunicação método deve depender não natureza e urgency informação sendo shared. Alternativa \"C\" está incorreta. Atrasando comunicação até que o trabalho de auditoria é completo é ineficaz para tratando contínuo questões. Alternativa \"D\" está incorreta. Comunicação deve não ser limitado para escrito atualiza; comunicação verbal é também importante."},{"id":"M2_U3_Q6","num":6,"total":35,"module":"M2","unit":"U3","topic":"Comunicação com Partes Interessadas","question_pt":"Enquanto conduzindo auditoria de conformidade, equipe de auditoria interna identifica potencial regulatório violação. Equipe fornece regular atualiza à organização principal conformidade officer, mas o principal conformidade officer insists esse questão é baixo-risco e faz não exigir imediato ação. Qual é o mais eficaz comunicação abordagem em este situação?","options_pt":{"A":"Limitar comunicação para escrito atualiza para garantir documentação.","B":"Cronograma reunião com o principal conformidade officer e alta administração para discutir o potencial impacto violação.","C":"Escalar questão ao conselho sem consultoria conformidade officer.","D":"Adiar adicional comunicação até que o trabalho de auditoria é completo para avoid desnecessário conflitos."},"correct":"B","explanation_pt":"Alternativa \"A\" está incorreta. Limitando comunicação para escrito atualiza pode não convey o urgency questão. Alternativa \"B\" está correta. Norma 13.1 comunicação do trabalho exige auditores internos para comunicar eficazmente ao longo do trabalho de auditoria. Contínuo comunicação durante trabalho de campo garante transparência e trata qualquer questões ou mudanças esse arise durante o trabalho de auditoria. Informal métodos, como impromptu discussões ou emails, são útil para tratando urgente matters ou clarifying específico points. O Alternativa de comunicação método deve depender não natureza e urgency informação sendo shared. Portanto, agendando reunião com o principal conformidade officer e alta administração é um eficaz comunicação abordagem para discutir o potencial violação. Alternativa \"C\" está incorreta. Escalando questão ao conselho sem consultoria o principal conformidade officer é premature. Alternativa \"D\" está incorreta. Atrasando comunicação é ineficaz para tratando urgente questões."},{"id":"M2_U3_Q7","num":7,"total":35,"module":"M2","unit":"U3","topic":"Comunicação com Partes Interessadas","question_pt":"Após emissão de o relatório final do trabalho, equipe de auditoria interna descobre esse controle-chave deficiência foi omitida relatório devido a umfalha de revisãodurante revisão processo. O omitida deficiência poderia significativamente impacto da organização capacidade para atender a seu conformidade requisitos. Qual é ação mais adequada ação para o equipe de auditoria interna para tomar?","options_pt":{"A":"Notificar o conselho imediatamente e questão revised relatório do trabalho.","B":"Comunicar o erro ao adequado partes e determinar se revised relatório é necessário.","C":"Tomar não ação, como relatório tem already sido finalizando e issued.","D":"Documentar o erro internally e tratar ele durante o próximo trabalho de auditoria."},"correct":"B","explanation_pt":"Alternativa \"A\" está incorreta. Enquanto notificando conselho pode ser necessário em alguns casos, decisão para questão revised relatório deve ser com base não importância erro. Alternativa \"B\" está correta. De acordo com Norma 11.4, equipe de auditoria interna deve comunicar o erro ou omission ao adequado partes e determinar se revised relatório é necessário com base não importância questão. Assim, o omitida deficiência de controle no relatório final relatório deve ser comunicado ao adequado partes primeiro, e então equipe de auditoria interna deve determinar se revised relatório é necessário. Alternativa \"C\" está incorreta. Taking não ação é não acceptable quando significativo erro ou omission é identificado. Alternativa \"D\" está incorreta. Tratando erro durante o próximo trabalho de auditoria é insuficiente para um significativo questão esse impactos conformidade."},{"id":"M2_U3_Q8","num":8,"total":35,"module":"M2","unit":"U3","topic":"Comunicação com Partes Interessadas","question_pt":"Qual das seguintes alternativas partes interessadas é tipicamente envolvido em contínuo comunicação durante trabalho de campo?","options_pt":{"A":"Externo fornecedores","B":"Administração atividade sob revisão","C":"Conselho membros","D":"Reguladores"},"correct":"B","explanation_pt":"Alternativa \"A\" está incorreta. Externo fornecedores são não tipicamente envolvido em contínuo comunicação durante trabalho de campo. Alternativa \"B\" está correta. Contínuo comunicação é crítico para garantindo transparência e alinhamento ao longo do trabalho de auditoria. Administração atividade sob revisão é o principal parte interessada envolvido em contínuo comunicação durante trabalho de campo. Tal comunicação permite auditores internos para tratar imediato preocupações, atualizar trabalho de auditoria progresso, e tratar qualquer mal-entendidos ou diferenças durante o trabalho de auditoria processo. Alternativa \"C\" está incorreta. Conselho membros são não diretamente envolvido em contínuo comunicação durante trabalho de campo mas são envolvido no relatório final trabalho de auditoria comunicações. Alternativa \"D\" está incorreta. Reguladores são não tipicamente envolvido em contínuo comunicação durante trabalho de campo mas pode ser envolvido no relatório final trabalho de auditoria comunicações."},{"id":"M2_U3_Q9","num":9,"total":35,"module":"M2","unit":"U3","topic":"Comunicação com Partes Interessadas","question_pt":"Qual das seguintes é o objetivo principal de emissão de advance observar para administração antes de um trabalho de auditoria begins?","options_pt":{"A":"Para permitir administração para planejar agenda eficazmente e avoid conflitos com outro significativo atividades","B":"Para fornecer administração com um resumo trabalho de auditoria achados","C":"Para confirmar o trabalho de auditoria objetivos e escopo com administração","D":"Para finalizando o trabalho de auditoria relatório antes de trabalho de campo começa"},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Inicial comunicação geralmente começa com giving administração e relevantee funcionários advance observar trabalho de auditoria. Advance observar permite administração para planejar agenda eficazmente e avoid conflitos com outro significativo atividades. Alternativa \"B\" está incorreta. Resumo trabalho de auditoria achados é fornecido não conclusão trabalho de auditoria. Alternativa \"C\" está incorreta. Confirmando trabalho de auditoria objetivos e escopo é tipicamente realizado durante o entrance reunião. Alternativa \"D\" está incorreta. finalizando o trabalho de auditoria relatório ocorre após trabalho de campo, não antes do trabalho de auditoria begins."},{"id":"M2_U3_Q10","num":10,"total":35,"module":"M2","unit":"U3","topic":"Comunicação com Partes Interessadas","question_pt":"Qual é o objetivo principal de uma conferência de encerramento durante o trabalho de auditoria processo?","options_pt":{"A":"Para fornecer administração com um resumo trabalho de auditoria objetivos e escopo","B":"Para finalizando o trabalho de auditoria relatório e distribuir ele para partes interessadas","C":"Para revisar a implementação de administração planos de ação","D":"Para discutir trabalho de auditoria achados, recomendações, e/ou planos de ação com administração antes de finalizando o trabalho de auditoria comunicação"},"correct":"D","explanation_pt":"Alternativa \"A\" está incorreta. Resumo trabalho de auditoria objetivos e escopo é tipicamente fornecido durante o entrance reunião. Alternativa \"B\" está incorreta. finalizando o trabalho de auditoria relatório ocorre após a conferência de encerramento. Alternativa \"C\" está incorreta. Revisando a implementação de administração planos de ação ocorre durante acompanhamento atividades. Alternativa \"D\" está correta. Closing comunicação, também referred para como um \"conferência de encerramento\", serves como crítico etapa no trabalho de auditoria processo. O principal propósito de uma conferência de encerramento é para discutir trabalho de auditoria achados, recomendações, e/ou planos de ação com administração antes de finalizando o trabalho de auditoria comunicação."},{"id":"M2_U3_Q11","num":11,"total":35,"module":"M2","unit":"U3","topic":"Comunicação com Partes Interessadas","question_pt":"Qual das seguintes é um exemplo de eficaz comunicação durante fase de planejamento de um trabalho de auditoria?","options_pt":{"A":"Fornecendo verbal atualiza para administração após o trabalho de auditoria é concluído","B":"Issuing final relatório ao conselho antes de discutindo achados com administração","C":"Sending escrito announcement para administração outlining o trabalho de auditoria objetivos, escopo, e timing","D":"Conduzindo uma conferência de encerramento para discutir trabalho de auditoria resultados com administração"},"correct":"C","explanation_pt":"Alternativa \"A\" está incorreta. Verbal atualiza após o trabalho de auditoria é concluído são não parte fase de planejamento. Alternativa \"B\" está incorreta. Issuing final relatório antes de discutindo achados com administração é não adequado e é não conduzido durante fase de planejamento. Alternativa \"C\" está correta. conforme Norma 13.1 comunicação do trabalho, auditores internos deve comunicar eficazmente ao longo do trabalho de auditoria. Eles deve comunicar os objetivos, escopo, e timing trabalho de auditoria com administração. Inicial comunicação geralmente começa com giving administração e relevantee funcionários advance observar trabalho de auditoria, como ele permite administração para planejar agenda eficazmente, avoiding conflitos com outro significativo atividades. Sending escrito announcement durante fase de planejamento garante esse administração understands o trabalho de auditoria objetivos, escopo, e timing. Alternativa \"D\" está incorreta. Exit conferences ocorre não conclusão trabalho de auditoria, não durante o planejamento."},{"id":"M2_U3_Q12","num":12,"total":35,"module":"M2","unit":"U3","topic":"Comunicação com Partes Interessadas","question_pt":"Uma auditoria equipe está preparando para comunicar preliminar trabalho de auditoria achados antes de emissão de o final relatório. Que são mais adequado partes interessadas para este discussão?","options_pt":{"A":"Funcionários envolvido na auditoria processo e responsável por ações corretivas.","B":"Interno conformidade officers e gestão de riscos pessoal.","C":"Alta administração e departamento heads responsável por auditoria áreas.","D":"Auditores externos quem irá revisar a organização demonstrações financeiras."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Preliminar achados deve ser shared com alta administração e relevantee departamento heads antes de finalizando o trabalho de auditoria relatório."},{"id":"M2_U3_Q13","num":13,"total":35,"module":"M2","unit":"U3","topic":"Comunicação com Partes Interessadas","question_pt":"Um auditor interno está iniciando um trabalho de auditoria e necessidades para confirmar auditoria escopo. Que é o mais adequado parte interessada para este comunicação?","options_pt":{"A":"Alta administração e o processo owners envolvido no trabalho de auditoria.","B":"Funcionários que são não diretamente envolvido não processo sendo audited.","C":"Auditores externos quem anteriormente audited a organização.","D":"A organização conselho membros quem Supervisionar relatórios financeiros."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Confirmando auditoria escopo exige coordenação com alta administração e processo owners, como eles são diretamente envolvido no trabalho de auditoria."},{"id":"M2_U3_Q14","num":14,"total":35,"module":"M2","unit":"U3","topic":"Comunicação com Partes Interessadas","question_pt":"Equipe de auditoria interna descobre esse administração tem não implementado crítico plano de ação para tratar segurança cibernética vulnerabilidade. Administração explica esse o adiar é devido a recurso constraints mas fornece não cronograma para conclusão. Qual deve equipe de auditoria interna fazer próximo?","options_pt":{"A":"Obter e documentar um explanation de administração e escalar questão ao Diretor Executivo de Auditoria.","B":"Encerrar questão na auditoria registros, como administração teve fornecido reason para o adiar.","C":"Aceitar administração explanation e documentar o adiar não acompanhamento relatório.","D":"Recomendar esse administração revise o plano de ação para incluir novo conclusão date."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Função de auditoria interna é responsável por confirmando a implementação de recomendações e/ou administração planos de ação. Como observou em Norma 15.2 confirmando a implementação de recomendações ou planos de ação, \"se administração tem não progressed em implementando ações de acordo com o estabelecido conclusão dates, auditores internos deve obter e documentar um explanation de administração e discutir questão com o Diretor Executivo de Auditoria. O Diretor Executivo de Auditoria é responsável por determinando se alta administração, por adiar ou inaction, tem accepted um risco esse exceeds o risco tolerance.\" portanto, equipe de auditoria interna deve obter e documentar um explanation de administração e escalar questão ao Diretor Executivo de Auditoria para adicional avaliação. Se o Diretor Executivo de Auditoria determina esse o adiar ou inaction indica um unacceptable risco, o assunto deve ser comunicado alta administração para resolução. Se alta administração faz não resolve questão, o Diretor Executivo de Auditoria deve escalar ele ao conselho. Alternativa \"B\" está incorreta. Closing questão prematurely é não adequado quando risco reprincipals unresolved. Alternativa \"C\" está incorreta. Aceitando administração explanation sem adicional ação é insuficiente para tratando um unresolved risco. Alternativa \"D\" está incorreta. Enquanto revisando plano de ação pode ser parte resolução, questão deve ainda ser escalado ao Diretor Executivo de Auditoria."},{"id":"M2_U3_Q15","num":15,"total":35,"module":"M2","unit":"U3","topic":"Comunicação com Partes Interessadas","question_pt":"Durante trabalho de campo, um auditor necessidades para solicitaçõesr adicional dados de um departamento gestor. Qual é ação mais adequada comunicação método?","options_pt":{"A":"Post-auditoria resumo descrevendo missing dados.","B":"Brief mention durante um unrelated reunião.","C":"Formal relatório de auditoria detailing missing documentara.","D":"Direto e-mail outlining as solicitaçõesçõesr e specifying prazo."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Um e-mail fornece claro, trackable solicitaçõesr e garante responsabilização enquanto mantendo eficiência durante trabalho de campo."},{"id":"M2_U3_Q16","num":16,"total":35,"module":"M2","unit":"U3","topic":"Comunicação com Partes Interessadas","question_pt":"Durante um trabalho de auditoria, equipe de auditoria interna identifica esse departamento gestor teve aprovado significativo financeiro transação sem seguinte a organização aprovação hierarquia. Transação envolve fornecedor com um hirelato de não conformidade, e o risco financeiro exceeds a organização tolerância ao risco. Quando equipe de auditoria interna discusses questão com o departamento gestor, o gestor insists esse o processo de aprovação follows da organização políticas. Equipe de auditoria interna então relatórios questão ao Diretor Executivo de Auditoria. Qual deve o Diretor Executivo de Auditoria fazer próximo?","options_pt":{"A":"Escalar questão para alta administração e, se unresolved, escalar ele ao conselho.","B":"Documentar questão não relatório do trabalho e recomendar stricter enforcement de aprovação políticas.","C":"Notificar o conselho imediatamente sem consultoria alta administração.","D":"Recomendar esse o departamento gestor revise transação para alinhar-se com a organização políticas."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. De acordo com Norma 11.5 comunicando a aceitação de riscos, quando Diretor Executivo de Auditoria concludes esse administração tem accepted nível de risco esse exceeds da organização apetite ao risco ou tolerância ao risco, o assunto deve ser discussed com um sênior gestor. Se o Diretor Executivo de Auditoria determina esse o assunto tem não sido resolved por alta administração, o assunto deve ser escalado ao conselho. Portanto, escalando questão para alta administração e, se unresolved, ao conselho é necessário quando risco financeiro exceeds a organização tolerância ao risco. Alternativa \"B\" está incorreta. Documentando questão sem escalonamento é insuficiente para tratando significativo riscos, de acordo com a Normas. Alternativa \"C\" está incorreta. De acordo com a Normas, questão deve primeiro ser escalado para alta administração antes de notificando conselho. Alternativa \"D\" está incorreta. Revisando transação faz não tratar o subjacente risco de não conformidade."},{"id":"M2_U3_Q17","num":17,"total":35,"module":"M2","unit":"U3","topic":"Comunicação com Partes Interessadas","question_pt":"Qual das seguintes alternativas melhor descreve o propósito de comunicação formal durante fase de planejamento de um trabalho de auditoria?","options_pt":{"A":"Para finalizando o trabalho de auditoria relatório antes de trabalho de campo begins","B":"Para garantir esse todos partes interessadas têm documentarado compreensão trabalho de auditoria objetivos, escopo, e timing","C":"Para fornecer verbal atualiza para partes interessadas sobre o trabalho de auditoria progresso","D":"Para esclarecer objetivos do trabalho de auditoria por meio de informal discussões com administração"},"correct":"B","explanation_pt":"Alternativa \"A\" está incorreta. finalizando o trabalho de auditoria relatório ocorre após trabalho de campo, não durante o planejamento. Alternativa \"B\" está correta. Comunicação formal métodos, como escrito announcements ou entrance reunião agendas, são eficaz para definindo claro expectativas sobre o trabalho de auditoria objetivos, escopo, e timing. Comunicação formal durante fase de planejamento garante esse todos partes interessadas têm documentarado compreensão trabalho de auditoria objetivos, escopo, e timing. Alternativa \"C\" está incorreta. Verbal atualiza são uma comunicação informal método e são tipicamente parte de contínuo comunicação durante trabalho de campo. Alternativa \"D\" está incorreta. Informal discussões são não considerado comunicação formal."},{"id":"M2_U3_Q18","num":18,"total":35,"module":"M2","unit":"U3","topic":"Comunicação com Partes Interessadas","question_pt":"Equipe de auditoria interna descobre esse administração implementou apenas parcial ações corretivas para tratar significativo deficiência de controle. O reprincipaling ações são atrasado devido a recurso constraints, e administração tem não fornecido revised cronograma para conclusão. Qual deve equipe de auditoria interna fazer próximo?","options_pt":{"A":"Encerrar questão na auditoria registros, como parcial implementação teve sido atingido.","B":"Recomendar esse administração priorizar o reprincipaling ações no próximo trimestral revisar.","C":"Aceitar administração explanation e documentar o adiar não acompanhamento relatório.","D":"Escalar questão ao Diretor Executivo de Auditoria para adicional avaliação."},"correct":"D","explanation_pt":"Alternativa \"A\" está incorreta. Enquanto Documentando administração explanation é importante, closing questão prematurely é não adequado quando significativo riscos reprincipal unresolved. Alternativa \"B\" está incorreta. Recomendando prioritization faz não tratar o falta de um revised cronograma. Alternativa \"C\" está incorreta. Aceitando explanation sem adicional ação é insuficiente para tratando unresolved riscos. Alternativa \"D\" está correta. Função de auditoria interna é responsável por confirmando a implementação de recomendações e/ou administração planos de ação. conforme Norma 15.2 confirmando a implementação de recomendações ou planos de ação, se administração tem não progressed em implementando ações de acordo com o estabelecido conclusão dates, auditores internos deve obter e documentar um explanation de administração e discutir questão com o Diretor Executivo de Auditoria. O Diretor Executivo de Auditoria é responsável por determinando se alta administração, por adiar ou inaction, tem accepted um risco esse exceeds o risco tolerance. Portanto, equipe de auditoria interna deve escalar questão ao Diretor Executivo de Auditoria para adicional avaliação e potencial escalonamento."},{"id":"M2_U3_Q19","num":19,"total":35,"module":"M2","unit":"U3","topic":"Comunicação com Partes Interessadas","question_pt":"Qual das seguintes é um eficaz comunicação método durante trabalho de campo?","options_pt":{"A":"Enquanto auditoria controles de TI, equipe de auditoria interna adiars comunicação com o ele gestor até que todos testando é concluído para avoid desnecessário interruptions.","B":"Durante uma revisão relatórios financeiros processo, equipe de auditoria interna fornece semanal progresso atualiza ao controller, tratando qualquer emerging questões e garantindo alinhamento com objetivos do trabalho de auditoria.","C":"Durante uma revisão de compras e aquisições processos, equipe de auditoria interna avoids informal discussões com o compras e aquisições gestor para garantir todos comunicação é documentarado em formal relatórios.","D":"Enquanto conduzindo auditoria de conformidade, equipe de auditoria interna limita comunicação um único escrito atualizar não end trabalho de auditoria para avoid overwhelming partes interessadas."},"correct":"B","explanation_pt":"Alternativa \"A\" está incorreta. Atrasando comunicação até que todos testando é concluído pode levar para missed oportunidades para tratar questões de forma tempestiva. Alternativa \"B\" está correta. Trabalho de campo exige contínuo comunicação para garantir transparência e para tratar qualquer questões ou mudanças esse arise durante o trabalho de auditoria. Fornecendo regular progresso atualiza para partes interessadas, como controller, garante transparência e alinhamento com objetivos do trabalho de auditoria durante trabalho de campo. Alternativa \"C\" está incorreta. Avoiding informal discussões pode hinder o tempestivo resolução de questões e eficaz comunicação. Alternativa \"D\" está incorreta. Limitando comunicação um único escrito atualizar não end trabalho de auditoria é ineficaz para tratando contínuo questões."},{"id":"M2_U3_Q20","num":20,"total":35,"module":"M2","unit":"U3","topic":"Comunicação com Partes Interessadas","question_pt":"Uma equipe de auditoria interna began planejado trabalho de avaliação e agendado um inicial reunião com principal gestores atividade sob revisão. Qual das seguintes é mais adequada para discussão não reunião?","options_pt":{"A":"Auditores deve outline auditoria processo, principal topics eles pretender para focar em, e ask para gestores' expectativas.","B":"Auditores deve reassure o gestores esse auditoria é meramente routine formality e nada fora fazer ordinary é expected.","C":"Auditores deve resumir qual principal riscos e deficiências eles believe para ser apresentar na atividade sob revisão.","D":"Auditores deve explicar esse auditoria recomendações deve ser taken seriously para avoid escalando questões para alta administração."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Outlining auditoria processo, topics de focar, e soliciting gestores' expectativas não inicial reunião ajuda alinhar auditoria equipe e administração não escopo do trabalho de auditoria, objetivos, e prioridades."},{"id":"M2_U3_Q21","num":21,"total":35,"module":"M2","unit":"U3","topic":"Comunicação com Partes Interessadas","question_pt":"Durante um trabalho de auditoria para revisar da organização segurança cibernética controles, equipe de auditoria interna identifica significativo vulnerabilidade em da organização firewall configuração. A vulnerabilidade poderia permitir não autorizado acesso para sensível cliente dados. Quando questão é raised com o ele gestor, eles argue esse o risco é acceptable porque a organização tem não experiente qualquer breaches nos últimos ano. O Diretor Executivo de Auditoria (Diretor Executivo de Auditoria) escala questão para alta administração, mas eles decidir não para tomar qualquer ação, citing orçamento constraints e competing prioridades. Meanwhile, equipe de auditoria interna descobre evidências de attempted não autorizado acesso targeting da organização rede, adicional aumentando urgency questão. Qual deve o Diretor Executivo de Auditoria fazer próximo?","options_pt":{"A":"Adiar adicional ação até que o próximo trabalho de auditoria para reavaliar o risco.","B":"Escalar questão ao conselho, como risco exceeds da organização tolerância ao risco.","C":"Recomendar esse o ele departamento implementar temporário controles para mitigar o risco.","D":"Aceitar alta administração decisão e documentar questão não relatório do trabalho."},"correct":"B","explanation_pt":"Alternativa \"A\" está incorreta. Atrasando ação é não adequado para um crítico risco esse exige imediato attention. Alternativa \"B\" está correta. De acordo com Norma 11.5: comunicando a aceitação de riscos, quando Diretor Executivo de Auditoria concludes esse administração tem accepted nível de risco esse exceeds da organização apetite ao risco ou tolerância ao risco, o assunto deve ser discussed com um sênior gestor. Se o Diretor Executivo de Auditoria determina esse o assunto tem não sido resolved por alta administração, o assunto deve ser escalado ao conselho. Após o Diretor Executivo de Auditoria escala o sistema vulnerabilidade questão para alta administração, o alta administração decides não para tomar qualquer ação, indicando esse o risco esse exceeds da organização tolerância ao risco tem não sido resolved. Portanto, o Diretor Executivo de Auditoria deve escalar questão ao conselho. Alternativa \"C\" está incorreta. Enquanto temporário controles pode ajudar, o Diretor Executivo de Auditoria deve ainda escalar questão ao conselho. Alternativa \"D\" está incorreta. Aceitando alta administração decisão é não adequado para unresolved riscos esse exceed da organização tolerância ao risco."},{"id":"M2_U3_Q22","num":22,"total":35,"module":"M2","unit":"U3","topic":"Comunicação com Partes Interessadas","question_pt":"Qual das seguintes alternativas situações deveria mais provável exigir escalonamento para alta administração ou o conselho?","options_pt":{"A":"Um auditor interno e departamento gestor discordar não classificação de um baixo-risco achado, mas o disagreement faz não impacto trabalho de auditoria geral conclusões.","B":"Elaborar relatório do trabalho é atrasado porque equipe de auditoria interna é waiting para adicional documentação de um departamento gestor.","C":"Durante um trabalho de auditoria, equipe de auditoria interna descobre menor discrepância em estoque registros esse administração agrees para tratar no próximo trimestral revisar.","D":"Equipe de auditoria interna identifica esse administração teve aprovado novo fornecedor contrato esse introduces significativo risco financeiro exceeding da organização tolerância ao risco."},"correct":"D","explanation_pt":"Alternativa \"A\" está incorreta. Disagreement sobre baixo-risco achado faz não exigir escalonamento menos que ele envolve significativo riscos. Alternativa \"B\" está incorreta. adiar não relatório preliminar devido a missing documentação é um operacional questão e não um escalonamento-worthy assunto. Alternativa \"C\" está incorreta. Menor discrepância em estoque registros faz não exigir escalonamento como ele é não considerado significativo para justificar escalonamento. Alternativa \"D\" está correta. De acordo com Norma 11.5: comunicando a aceitação de riscos, quando Diretor Executivo de Auditoria concludes esse administração tem accepted nível de risco esse exceeds da organização apetite ao risco ou tolerância ao risco, o assunto deve ser discussed com um sênior gestor. Se o Diretor Executivo de Auditoria determina esse o assunto tem não sido resolved por alta administração, o assunto deve ser escalado ao conselho. A aprovação de um fornecedor contrato esse introduces significativo risco financeiro exceeding da organização tolerância ao risco deve ser escalado para alta administração ou o conselho."},{"id":"M2_U3_Q23","num":23,"total":35,"module":"M2","unit":"U3","topic":"Comunicação com Partes Interessadas","question_pt":"Qual das seguintes alternativas melhor descreve o papel de partes interessadas em contínuo comunicação durante trabalho de campo?","options_pt":{"A":"Partes interessadas são responsável por implementando as recomendações outlined no relatório final comunicação.","B":"Partes interessadas pode ajudar tratar qualquer mal-entendidos ou diferenças durante o trabalho de auditoria processo.","C":"Partes interessadas são apenas envolvido no relatório final comunicação fase trabalho de auditoria.","D":"Partes interessadas são responsável por revisando e aprovando trabalho de auditoria trabalho programa."},"correct":"B","explanation_pt":"Alternativa \"A\" está incorreta. Implementando recomendações é parte pós-trabalho processo, não contínuo comunicação. Alternativa \"B\" está correta. Contínuo comunicação é crítico para garantindo transparência e alinhamento ao longo do trabalho de auditoria. O principal partes interessadas tipicamente incluir administração atividade sob revisão. Contínuo comunicação com partes interessadas permite auditores internos para tratar imediato preocupações, atualizar trabalho de auditoria progresso, e tratar qualquer mal-entendidos ou diferenças durante o trabalho de auditoria processo. Alternativa \"C\" está incorreta. Partes interessadas são envolvido ao longo do trabalho de auditoria, não just durante o final comunicação fase. Alternativa \"D\" está incorreta. Revisando e aprovando trabalho de audito
