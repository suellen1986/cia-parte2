wing root cause analysis techniques is most effective for prioritizing issues based on their frequency and impact?","options_en":{"A":"Fishbone diagram","B":"Fault tree analysis","C":"The Five Whys","D":"Pareto analysis"},"correct":"D","explanation_en":"Choice \"A\" is incorrect. A cause-and-effect diagram, such as a fishbone diagram (also known as Ishikawa diagram), helps with root cause analysis when the cause is not linear. Fishbone diagrams are used to categorize and visualize potential causes, not prioritize them. Choice \"B\" is incorrect. Fault tree analysis is a top-down approach for analyzing potential failure points, not prioritizing issues. Choice \"C\" is incorrect. The Five Whys is a straightforward, powerful tool used to drill down to the root cause of a problem and is better suited for identifying a single root cause. Choice \"D\" is correct. Different RCA methods offer unique approaches to dissecting problems and uncovering their origins. Common RCA techniques internal auditors use include the Five Whys, fishbone diagrams, and fault tree analysis. The Pareto principle is often referred to as the 80/20 rule. The principle indicates that 20% of the input or efforts levar to 80% of the output or results. This can be used by auditors to help prioritize issues by identifying the most significant causes of problems. Pareto Analysis is most effective for prioritizing issues based on their frequency and impact, as it focuses on the most significant causes that account for the majority of problems."},{"id":"M4_U2_Q20","num":20,"total":25,"module":"M4","unit":"U2","topic":"Evaluation Criteria and Existing Conditions","question_en":"An internal auditor has been asked to review the treasury department's compliance with corporate policy related to the use of forward trading to manage currency valuation risk. The auditor finds no related policies in the corporate policy manual but does discover that the department is following a policy developed by the company's bank. Which of the following would be the most appropriate response from the auditor?","options_en":{"A":"Use the bank's policy as the audit criteria and determine whether formal adoption should be recommended in the engagement final communication.","B":"Perform no further audit work and report the lack of a corporate policy as an audit observation.","C":"Withdraw from the audit engagement, because there is nothing to audit devido a to the lack of a corporate policy.","D":"Postpone the audit engagement until a corporate policy can be established."},"correct":"A","explanation_en":"Choice \"A\" is correct. As part of the control assurance provision of an auditor's role, it is imperative that the internal audit function evaluates the adequacy and effectiveness of existing controls and, where possible, provides recommendations to the organization on how to improve its control processes. If a department has no official policy for a specific kind of compliance—internal or external—then it is the responsibility of the auditor to make recommendations to address this oversight. In the example in this question, the auditor would evaluate the bank's policy to assess its effectiveness and adequacy in relation to the treasury department's activities. If the auditor thinks the policy is appropriate, then official adoption should be recommended."},{"id":"M4_U2_Q21","num":21,"total":25,"module":"M4","unit":"U2","topic":"Evaluation Criteria and Existing Conditions","question_en":"An internal auditor interviewed help desk employees and discovered that they were not aware of the latest authentication procedures. The auditor questioned those employees, and they explained that they did not receive appropriate training. The auditor then visited human resources and learned that the training was never ordered by the head of help desk services. This led the auditor to ask the head of help desk services why the training was not requested. Which of the following approaches was the auditor most likely applying?","options_en":{"A":"Benchmarking.","B":"Root cause analysis.","C":"Process mining.","D":"Tracing and vouching."},"correct":"B","explanation_en":"Choice \"B\" is correct. Root cause analysis focuses on identifying the underlying reasons for issues, such as why training was not requested. This approach helps address systemic problems and improve processes effectively."},{"id":"M4_U2_Q22","num":22,"total":25,"module":"M4","unit":"U2","topic":"Evaluation Criteria and Existing Conditions","question_en":"An internal auditor identifies a deviation between evaluation criteria and existing conditions. What should the auditor do next?","options_en":{"A":"Conclude that the activity is ineffective.","B":"Recommend changes to the evaluation criteria.","C":"Report the deviation immediately to senior management.","D":"Evaluate the significance of the deviation."},"correct":"D","explanation_en":"Choice \"A\" is incorrect. A deviation does not automatically mean the activity is ineffective; further evaluation is required. Choice \"B\" is incorrect. Changing evaluation criteria is not involved in the process of comparing existing conditions to evaluation criteria and is not the next step after identifying a deviation. Choice \"C\" is incorrect. Reporting should occur after evaluating the significance of the deviation, not right after the deviation is identified. Choice \"D\" is correct. According to Standard 14.3 Evaluation of Findings, internal auditors must evaluate each potential engagement finding to determine its significance. When determining the significance of the risk, internal auditors must consider the likelihood of the risk occurring and the impact the risk may have on the organization’s governance, risk management, and control processes."},{"id":"M4_U2_Q23","num":23,"total":25,"module":"M4","unit":"U2","topic":"Evaluation Criteria and Existing Conditions","question_en":"During an engagement of a manufacturing process, the internal auditor observes that machine maintenance logs are incomplete, leading to frequent equipment breakdowns. The evaluation criteria require logs to be updated daily. What is the most likely root cause of this deviation?","options_en":{"A":"Inadequate staff training on maintenance procedures","B":"Insufficient evidence to support the finding","C":"Lack of formal evaluation criteria","D":"Overly strict evaluation criteria"},"correct":"A","explanation_en":"Choice \"A\" is correct. Root cause analysis (RCA) helps internal auditors find the fundamental reasons for deviations from evaluation criteria. This method ensures that internal auditors address the actual problems rather than just the symptoms of the problems, leading to effective and lasting solutions. Inadequate staff training is a common root cause of incomplete maintenance logs, as it directly impacts compliance with the criteria. Choice \"B\" is incorrect. The evidence (i.e., incomplete logs) supports the finding; therefore, insufficient evidence is not the root cause of this deviation. Choice \"C\" is incorrect. The evaluation criteria are already defined in this scenario; therefore, lacking formal evaluation criteria is not the root cause of this deviation. Choice \"D\" is incorrect. The criteria are not overly strict and are reasonable for ensuring proper maintenance."},{"id":"M4_U2_Q24","num":24,"total":25,"module":"M4","unit":"U2","topic":"Evaluation Criteria and Existing Conditions","question_en":"Which of the following is an example of authoritative guidance used as evaluation criteria?","options_en":{"A":"Key performance indicators","B":"Established organizational practices","C":"Organizational policies and procedures","D":"Industry-specific standards and benchmarks"},"correct":"D","explanation_en":"Choice \"A\" is incorrect. Key performance indicators are internal evaluation criteria, not authoritative guidance. Choice \"B\" is incorrect. Established organizational practices are internal evaluation criteria, not authoritative guidance. Choice \"C\" is incorrect. Organizational policies and procedures are internal evaluation criteria, not authoritative guidance. Choice \"D\" is correct. Evaluation criteria that are most relevant to the engagement represent the desired state of the activity under review and should be specific and practical. Adequate criteria provided in the Standards include internal criteria, external criteria, authoritative guidance, established organizational practices, expectations based on the design of a control, and procedures that may not be formally documented. Industry-specific standards and benchmarks are examples of authoritative guidance, as they provide external, professional criteria for evaluation."},{"id":"M4_U2_Q25","num":25,"total":25,"module":"M4","unit":"U2","topic":"Evaluation Criteria and Existing Conditions","question_en":"Which of the following is the primary purpose of appraising the significance of findings in an internal audit engagement?","options_en":{"A":"To determine whether additional analyses are required","B":"To identify the root causes of deviations","C":"To prioritize findings based on their impact and likelihood","D":"To compare evaluation criteria with existing conditions"},"correct":"C","explanation_en":"Choice \"A\" is incorrect. Determining the need for additional analyses occurs earlier in the engagement process. Choice \"B\" is incorrect. Identifying root causes is a separate step before appraising significance. Choice \"C\" is correct. According to Standard 14.3 Evaluation of Findings, internal auditors must evaluate each potential engagement finding to determine its significance. They also must prioritize each engagement finding based on its significance, using methodologies established by the chief audit executive. Thus, appraising the significance of findings ensures that internal auditors prioritize issues based on their impact and likelihood, enabling the organization to address the most critical risks. Choice \"D\" is incorrect. Comparing criteria with conditions is part of the analysis phase, not the appraisal phase."},{"id":"M5_U1_Q1","num":1,"total":19,"module":"M5","unit":"U1","topic":"Finance and Accounting Concepts","question_en":"Which capital budgeting method is considered useful for determining if a project will add or destroy value for the organization but can be difficult to use for comparisons when the initial investment differs significantly between competing alternatives?","options_en":{"A":"Internal rate of return.","B":"Net present value.","C":"Accounting rate of return.","D":"Simple payback period."},"correct":"B","explanation_en":"Choice \"B\" is correct. Net present value (NPV) compares the present value of a project's cash inflows to the present value of its cash outflows. When the NPV is zero or greater, an investment project is acceptable. A weakness of NPV is that it is not meaningful for comparing projects requiring different amounts of investment. The internal rate of return can be used in such situations. The simple payback period and the accounting rate of return do not measure whether organizational value is increased or decreased because they ignore the time value of money."},{"id":"M5_U1_Q2","num":2,"total":19,"module":"M5","unit":"U1","topic":"Finance and Accounting Concepts","question_en":"Which of the following depreciation methods would be most appropriate for a soybean harvester that, devido a to crop rotations, produces zero bushels of soybeans every other year over its 10-year life?","options_en":{"A":"150% declining balance method.","B":"Sum-of-the-years'-digits method.","C":"Activity method.","D":"Straight-line method."},"correct":"C","explanation_en":"Choice \"C\" is correct. The activity method is most applicable because the asset's depreciation should be matched to its actual pattern of wear. In the periods of no use, no depreciation would be recorded. In the periods of use, depreciation would be tied to the number of bushels produced."},{"id":"M5_U1_Q3","num":3,"total":19,"module":"M5","unit":"U1","topic":"Finance and Accounting Concepts","question_en":"Everything else being equal, under which of the following conditions will the internal rate of return (IRR) of an investment project be lower?","options_en":{"A":"Cash inflows are larger.","B":"The investment cost is lower.","C":"Cash inflows are received later in the life of the project.","D":"The project has a shorter payback period."},"correct":"C","explanation_en":"Choice \"C\" is correct. Delayed cash inflows reduce the time value of money, resulting in a lower IRR for the investment project."},{"id":"M5_U1_Q4","num":4,"total":19,"module":"M5","unit":"U1","topic":"Finance and Accounting Concepts","question_en":"A finance lease agreement transfers substantially all of the benefits and risks of ownership of the asset to the lessee. How is the property recognized on the lessee's books?","options_en":{"A":"As an asset with related short- and long-term liabilities.","B":"As an asset with a corresponding lease licapacidade.","C":"The leased property is not recognized on the balance sheet, and lease payments are expensed as incurred.","D":"As an operating lease with expenses recognized over the lease term."},"correct":"A","explanation_en":"Choice \"A\" is correct. In a finance lease, the lessee recognizes the leased asset on their balance sheet. The lessee also records a lease licapacidade, representing the present value of future lease payments, split into short-term (current) and long-term portions."},{"id":"M5_U1_Q5","num":5,"total":19,"module":"M5","unit":"U1","topic":"Finance and Accounting Concepts","question_en":"As part of the monthly accounting process, which step should be completed first to ensure the accuracy of financial statements?","options_en":{"A":"Prepare adjusting journal entries.","B":"Prepare reversing entries.","C":"Prepare an adjusted trial balance.","D":"Take a post-closing trial balance."},"correct":"A","explanation_en":"Choice \"A\" is correct. Adjusting journal entries should be prepared first in the accounting cycle to ensure that all financial statements are accurate and complete before preparing the trial balance. Without this step, the trial balance may be inaccurate, which could levar to errors in financial reporting."},{"id":"M5_U1_Q6","num":6,"total":19,"module":"M5","unit":"U1","topic":"Finance and Accounting Concepts","question_en":"Which is an appropriatebasefor measuring the historical cost of fixed assets?","options_en":{"A":"All costs incurred in the construction of a plant building, from excavation to completion, should be considered as part of the asset's cost.","B":"The costs of improvements to equipment incurred after its acquisition should be omitida from the asset's cost even if they provide future service potential.","C":"Proceeds obtained in the process of readying land for its intended purpose, such as from the sale of cleared timber, should be recognized immediately as income.","D":"The purchase price, freight costs, and installation costs of a productive asset should be omitida from the asset's cost."},"correct":"A","explanation_en":"Choice \"A\" is correct. All costs directly associated with the construction of a plant building, including excavation and completion costs, should be included in the asset's historical cost."},{"id":"M5_U1_Q7","num":7,"total":19,"module":"M5","unit":"U1","topic":"Finance and Accounting Concepts","question_en":"Which of the following is an example of a contingent licapacidade?","options_en":{"A":"A retail store in a shopping mall pays the lessor a minimum monthly rent plus an agreed-upon percentage of sales.","B":"A company accrues income tax payable in its interim financial statements.","C":"A company refuses to pay the invoice for the annual audit because it seems higher than the amount agreed upon with the public accounting firm's partner.","D":"A lessee agrees to reimburse a lessor for a shortfall in the residual value of an asset under lease."},"correct":"D","explanation_en":"Choice \"D\" is correct. A lessee agreeing to reimburse a lessor for a shortfall in the residual value of an asset under lease is a contingent licapacidade. The licapacidade is contingent on the lessor not receiving the full residual value from a third party."},{"id":"M5_U1_Q8","num":8,"total":19,"module":"M5","unit":"U1","topic":"Finance and Accounting Concepts","question_en":"On a statement of shareholders' equity, which would be included in the calculation of the ending balance for retained earnings?","options_en":{"A":"Dividends declared during the period.","B":"Additional paid-in capital.","C":"Excess of par value of funds received from stock.","D":"Par value of newly issued shares."},"correct":"A","explanation_en":"Choice \"A\" is correct. Beginning Balance of Retained Earnings + Net Income (Period Revenues – Period Expenses) – Dividends = Ending Balance of Retained Earnings. The excess of par value of funds received from stock is additional paid-in capital and is not included in retained earnings."},{"id":"M5_U1_Q9","num":9,"total":19,"module":"M5","unit":"U1","topic":"Finance and Accounting Concepts","question_en":"Everything else being equal, the internal rate of return (IRR) of an investment project will be lower under which circumstance?","options_en":{"A":"The project has a shorter payback period.","B":"Cash inflows are received later in the life of the project.","C":"The investment cost is lower.","D":"Cash inflows are larger."},"correct":"B","explanation_en":"Choice \"B\" is correct. Cash inflows that occur later in the project have a lower present value than cash inflows that occur earlier, since the present value of a dollar is higher the sooner it is received. Projects with later cash flows will have lower net present values for any given discount rate than will projects with earlier cash flows, everything else being equal. Hence, projects with later cash flows will have a lower IRR."},{"id":"M5_U1_Q10","num":10,"total":19,"module":"M5","unit":"U1","topic":"Finance and Accounting Concepts","question_en":"When purchasing an asset using debt, which of the following transactions occurs?","options_en":{"A":"Debit liabilities (decrease) and credit assets (increase).","B":"Debit assets (decrease) and credit liabilities (increase).","C":"Debit liabilities (increase) and credit assets (increase).","D":"Debit assets (increase) and credit liabilities (increase)."},"correct":"D","explanation_en":"Choice \"D\" is correct. An asset account is debited, increasing it by the value of the additional assets. A licapacidade account is credited, increasing it by the amount of the loan."},{"id":"M5_U1_Q11","num":11,"total":19,"module":"M5","unit":"U1","topic":"Finance and Accounting Concepts","question_en":"Which of the following securities is likely to have the least risk?","options_en":{"A":"Debentures.","B":"Subordinated debentures.","C":"First-mortgage bonds.","D":"Income bonds."},"correct":"C","explanation_en":"Choice \"C\" is correct. First-mortgage bonds are backed by fixed assets. The other items have higher risk. Income bonds pay interest only if interest is earned, debentures are unsecured bonds, and subordinated debentures are subordinated to other debt."},{"id":"M5_U1_Q12","num":12,"total":19,"module":"M5","unit":"U1","topic":"Finance and Accounting Concepts","question_en":"Which of the following measures the return on a project in terms of net operating income, as opposed to using a project’s cash flow?","options_en":{"A":"Internal rate of return.","B":"Net present value.","C":"Payback period.","D":"Accounting rate of return."},"correct":"D","explanation_en":"Choice \"D\" is correct. Accounting rate of return (ARR) (also known as the simple rate of return) measures the return on a project in terms of net operating income, as opposed to using a project’s cash flow. The approach is to estimate the revenues that will be generated by a proposed investment and then to deduct from these revenues all of the projected operating expenses associated with the project."},{"id":"M5_U1_Q13","num":13,"total":19,"module":"M5","unit":"U1","topic":"Finance and Accounting Concepts","question_en":"After journal entries are recorded in the accounting cycle, which of the following steps should be completed next?","options_en":{"A":"Finalize trial balance.","B":"Post journal entries.","C":"Prepare adjustments.","D":"Review and approve transactions."},"correct":"C","explanation_en":"Choice \"C\" is correct. The posting step occurs after journalizing entries and adjustments, and is the process of transferring journal entries to the general ledger, which is typically done later in the accounting cycle."},{"id":"M5_U1_Q14","num":14,"total":19,"module":"M5","unit":"U1","topic":"Finance and Accounting Concepts","question_en":"Which of the following would be a typical capital budgeting decision?","options_en":{"A":"How many tons of steel will be required this quarter?","B":"Should the selling price of a new line of products be one dollar higher or lower?","C":"Should new equipment be leased or purchased?","D":"How much should the new secretary be paid?"},"correct":"C","explanation_en":"Choice \"C\" is correct. Capital budgets are concerned with long-term investments and projects that require large amounts of funding and provide benefits far into the future. A typical capital budgeting decision involves whether new equipment should be leased or purchased."},{"id":"M5_U1_Q15","num":15,"total":19,"module":"M5","unit":"U1","topic":"Finance and Accounting Concepts","question_en":"An organization using the accrualbaseof accounting has performed a substantial portion of work required to fulfill a contract but has not received any payment or recorded any revenue for the job. What adjusting entries should be made during the accounting cycle?","options_en":{"A":"Debit cash and credit revenue.","B":"Debit accounts receivable and credit unearned revenue.","C":"Debit deferred revenue and credit revenue.","D":"Debit work-in-progress and credit revenue."},"correct":"D","explanation_en":"Choice \"D\" is correct. Under accrual accounting, revenue is recognized when earned, regardless of when payment is received. Since the organization has performed a significant portion of the work, it has earned a portion of the revenue."},{"id":"M5_U1_Q16","num":16,"total":19,"module":"M5","unit":"U1","topic":"Finance and Accounting Concepts","question_en":"The goal of financial reporting is to provide stakeholders with which of the following?","options_en":{"A":"Information to demonstrar the value of the organization quantitatively.","B":"Information to exercise devido a diligence in decision making.","C":"Information to provide certainty to decisions if the statements are audited.","D":"Information on the future earnings results of the organization."},"correct":"B","explanation_en":"Choice \"B\" is correct. The goal of financial reporting is to provide stakeholders with information to exercise devido a diligence in decision making."},{"id":"M5_U1_Q17","num":17,"total":19,"module":"M5","unit":"U1","topic":"Finance and Accounting Concepts","question_en":"An internal auditor is reviewing the company’s financial statements, and notes and identifies a change in accounting estimates. How should this change be classified?","options_en":{"A":"Catch-up adjustments for amounts from prior periods.","B":"Normal recurring corrections or adjustments.","C":"Errors in the amounts reported in prior periods.","D":"Non-recurring extraordinary items or events."},"correct":"B","explanation_en":"Choice \"B\" is correct. Changes in accounting estimates are typically classified as normal recurring corrections or adjustments, rather than extraordinary items or errors from prior periods."},{"id":"M5_U1_Q18","num":18,"total":19,"module":"M5","unit":"U1","topic":"Finance and Accounting Concepts","question_en":"A bicycle manufacturer takes advantage of a promotional offer from a vendor and purchases paints that will be used during manufacturing in the next business cycle. This is reflected in a net increase of $50,000 in inventory on the company's statement of financial position (balance sheet) over the prior year's inventory of $1,000,000. What will be the effect on net cash?","options_en":{"A":"Net cash provided by operating activities on the cash flows statement will be increased by $50,000.","B":"Net cash provided by operating activities on the cash flows statement will be reduced by $1,050,000.","C":"Net cash provided by operating activities on the cash flows statement will be increased by $950,000.","D":"Net cash provided by operating activities on the cash flows statement will be reduced by $50,000."},"correct":"D","explanation_en":"Choice \"D\" is correct. A net increase in inventory from one year to the next on the statement of financial position will result in a decrease in cash flows, since money has been paid out but has not yet generated cash flows."},{"id":"M5_U1_Q19","num":19,"total":19,"module":"M5","unit":"U1","topic":"Finance and Accounting Concepts","question_en":"When analyzing an organization's capital structure, how does preferred stock differ from common stock?","options_en":{"A":"Preferred stock dividends are not tax-deductible, unlike common stock dividends, which are treated differently.","B":"Failure to pay dividends on common stock does not levar to bankruptcy, while it can affect preferred stock.","C":"Common stock dividends are variable, while preferred stock dividends are typically fixed amounts based on profitcapacidade.","D":"Preferred stock has characteristics of both debt (fixed dividends) and equity (no obligation to repay principal)."},"correct":"D","explanation_en":"Choice \"D\" is correct. Preferred stock has characteristics of both debt (fixed dividends) and equity (no obligation to repay principal), making it different from common stock, which is purely equity-based."},{"id":"M5_U2_Q1","num":1,"total":26,"module":"M5","unit":"U2","topic":"Prepare Workpapers and Engagement Conclusions","question_en":"An auditor is preparing workpapers to support engagement findings. What element must be included to ensure completeness?","options_en":{"A":"A brief note stating that all controls appeared to function properly.","B":"A summary of personal opinions regarding the audit findings.","C":"A record of the audit procedures performed, and the results obtained.","D":"A general statement confirming that management cooperated during the audit."},"correct":"C","explanation_en":"Choice \"C\" is correct. Workpapers must document audit procedures and findings to provide a clear and complete record that supports conclusions."},{"id":"M5_U2_Q2","num":2,"total":26,"module":"M5","unit":"U2","topic":"Prepare Workpapers and Engagement Conclusions","question_en":"An internal audit function uses a computerized system to manage its engagement workpapers. Which of the following statements describes the most appropriate way to manage audit workpapers in this environment?","options_en":{"A":"Workpapers should only be submitted into the system if they have already been signed by the engagement supervisor.","B":"The computerized system should store as much information as possible about operational management of the activity under review.","C":"There should be a separation of duties when assigning access privileges to the workpapers.","D":"Draft workpapers submitted into the system as part of an engagement should be permanently retained."},"correct":"C","explanation_en":"Choice \"C\" is correct. Separation of duties is a chave internal control principle that ensures the integrity and security of engagement workpapers by preventing unauthorized access and maintaining accountcapacidade in a computerized system."},{"id":"M5_U2_Q3","num":3,"total":26,"module":"M5","unit":"U2","topic":"Prepare Workpapers and Engagement Conclusions","question_en":"An auditor is reviewing workpapers before finalizing the engagement report. What is the best way to ensure they support the engagement results?","options_en":{"A":"Verifying that the workpapers contain sufficient evidence to justify conclusions.","B":"Confirming that the workpapers include general observations from interviews.","C":"Reviewing only the high-risk findings while omitting minor issues.","D":"Checking if the workpapers include the names of individuals involved in testing."},"correct":"A","explanation_en":"Choice \"A\" is correct. Workpapers must provide sufficient, relevant, and reliable evidence to support engagement conclusions."},{"id":"M5_U2_Q4","num":4,"total":26,"module":"M5","unit":"U2","topic":"Prepare Workpapers and Engagement Conclusions","question_en":"What should always be found in audit engagement workpaper documentation for a fraud investigation?","options_en":{"A":"Interrogation and/or interview recordings.","B":"Segregation of all incriminating evidence from other workpapers to maintain the chain of custody.","C":"Review of all important testimonial evidence to ensure that it provides a sufficientbasefor the conclusions reached.","D":"Overall opinion of whether or not the suspect or suspects should be charged with specific crimes."},"correct":"C","explanation_en":"Choice \"C\" is correct. The workpapers for a fraud investigation should always include a review of all important testimonial evidence to ensure that it provides a sufficientbasefor conclusions. This documentation supports the audit’s findings and any actions taken based on those findings."},{"id":"M5_U2_Q5","num":5,"total":26,"module":"M5","unit":"U2","topic":"Prepare Workpapers and Engagement Conclusions","question_en":"An auditor finds inconsistencies between the engagement report and the supporting workpapers. What is the best course of action?","options_en":{"A":"Removing findings from the report that lack complete workpaper documentation.","B":"Reconciling discrepancies to ensure workpapers align with conclusions.","C":"Relying on verbal explanations from audit staff to justify inconsistencies, the auditor is experienced and trustworthy.","D":"Finalizing the engagement report since minor inconsistencies are expected."},"correct":"B","explanation_en":"Choice \"B\" is correct. Ensuring alinhamento between workpapers and the engagement report is essential for accuracy and relicapacidade."},{"id":"M5_U2_Q6","num":6,"total":26,"module":"M5","unit":"U2","topic":"Prepare Workpapers and Engagement Conclusions","question_en":"An internal audit team wants to enhance their engagement workpapers. Which of the following changes would most likely increase the quality of their workpapers?","options_en":{"A":"Documenting the workpapers in a standardized, but flexible way and ensuring they are as concise as possible.","B":"Applying The IIA's certified format for workpapers, which is required by the Standards.","C":"Implementing a rigid format to use for all of the internal audit function's workpapers to ensure consistency.","D":"Including all versions of workpaper files completed during the engagement to ensure a paper trail is retained."},"correct":"A","explanation_en":"Choice \"A\" is correct. Standardized but concise workpapers enhance clarity, facilitate reviews, and support audit conclusions effectively, while allowing some flexibility for the unique needs of each engagement."},{"id":"M5_U2_Q7","num":7,"total":26,"module":"M5","unit":"U2","topic":"Prepare Workpapers and Engagement Conclusions","question_en":"At a non-governmental organization, an internal auditor performed an engagement to determine the effectiveness of its food donation program. The auditor identified that 20% of food distributions went to individuals that were ineligible for the program. Additionally, only 300 out of 400 distributions made were supported by proper documentation. Based on these findings, which of the following conclusions would the auditor communicate to senior management for review and action?","options_en":{"A":"The deficiencies identified in tracking food donations could hamper the organization's capacidade to achieve effective distribution.","B":"The deficiencies identified in the food distribution program indicate the organization has been the target of fraudulent activity.","C":"The deficiencies identified during the engagement raise concerns about the organization's capacidade to continue its operations.","D":"The deficiencies identified warrant an immediate suspension of the food distribution program until controls are implemented to correct weaknesses."},"correct":"A","explanation_en":"Choice \"A\" is correct. Highlighting that deficiencies in tracking food donations hinder effective distribution aligns with the findings and provides actionable insights for management to address operational inefficiencies."},{"id":"M5_U2_Q8","num":8,"total":26,"module":"M5","unit":"U2","topic":"Prepare Workpapers and Engagement Conclusions","question_en":"An internal auditor reviewed a sample of 25 payments and found that one payment was not authorized. Which of the following actions is the most appropriate next step for the auditor to take?","options_en":{"A":"Perform further testing by increasing the sample size.","B":"Report the results to senior management.","C":"Discuss the finding with the audit client.","D":"Conclude that the control is not operating effectively."},"correct":"C","explanation_en":"Choice \"C\" is correct. The most appropriate next step is to perform further testing by increasing the sample size to gather sufficient evidence. This ensures the finding is not an isolated incident and provides reliable data to determine the control's effectiveness before drawing conclusions or reporting results."},{"id":"M5_U2_Q9","num":9,"total":26,"module":"M5","unit":"U2","topic":"Prepare Workpapers and Engagement Conclusions","question_en":"During a review of audit workpapers, a supervisor finds that chave evidence is missing. What should be added to ensure the workpapers are complete?","options_en":{"A":"A summary of management’s responses without verifying their accuracy.","B":"Additional explanations of the auditor’s personal interpretation of the results.","C":"A checklist indicating that the audit steps were completed without evidence.","D":"Supporting documents that substantiate audit conclusions."},"correct":"D","explanation_en":"Choice \"D\" is correct. Workpapers must contain sufficient supporting documents to substantiate audit findings and conclusions."},{"id":"M5_U2_Q10","num":10,"total":26,"module":"M5","unit":"U2","topic":"Prepare Workpapers and Engagement Conclusions","question_en":"An auditor assessing a division's training program to enhance sales determines that 15% of the sales force received the designated training during each quarter of the preceding year and that per-person sales productivity was up by 2.5% per quarter on average for the sales representatives who successfully completed the training. Which of the following statements represents an appropriate conclusion based upon the findings?","options_en":{"A":"More information is needed to assess the performance in relation to goals.","B":"The organization needs to increase the number of training offerings each quarter to reach its goals.","C":"The training program is proceeding successfully.","D":"The increase in performance does not justify the training program."},"correct":"A","explanation_en":"Choice \"A\" is correct. Without knowing the goals of the program, the auditor cannot base a conclusion on the findings about the training initiative."},{"id":"M5_U2_Q11","num":11,"total":26,"module":"M5","unit":"U2","topic":"Prepare Workpapers and Engagement Conclusions","question_en":"According to IIA guidance, which of the following statements is true regarding high- quality engagement workpapers?","options_en":{"A":"Workpapers should ensure that all information gathered during the engagement is retained.","B":"Workpapers should contain only preapproved work programs and formats.","C":"Workpapers should facilitate reperformance of the engagement by another auditor.","D":"Workpapers should be in electronic format for efficiency and timely review."},"correct":"C","explanation_en":"Choice \"C\" is correct. High-quality workpapers should enable another auditor to reperform the engagement, ensuring that the evidence and documentation support the conclusions and recommendations made during the audit."},{"id":"M5_U2_Q12","num":12,"total":26,"module":"M5","unit":"U2","topic":"Prepare Workpapers and Engagement Conclusions","question_en":"An internal auditor is conducting a supplier management audit in an organization known to have high employee turnover. The auditor raises a major observation that supplier balances carried in the accounting records are not reconciled with the relevant suppliers. Which of the following is an appropriate conclusion to this observation?","options_en":{"A":"The balances carried in the accounting records may be inaccurate, which could result in misstatement of the balance sheet.","B":"The mandatory monthly supplier balances reconciliation should be undertaken as prescribed by the policy.","C":"The control that mitigates the risk of inaccurate supplier balances does not operate effectively.","D":"The employee previously responsible for the activity left the organization, and the vacant position has yet to be filled."},"correct":"C","explanation_en":"Choice \"C\" is correct. The conclusion that the control mitigating inaccurate supplier balances is ineffective highlights a significant process failure that needs to be addressed to prevent misstatements in accounting records."},{"id":"M5_U2_Q13","num":13,"total":26,"module":"M5","unit":"U2","topic":"Prepare Workpapers and Engagement Conclusions","question_en":"Which of the following options reflects best practice with regard to the maintenance of audit workpapers?","options_en":{"A":"Retain only the relevant documents that support any adverse audit findings.","B":"Include sufficient information to enable another person to reperform tests.","C":"Include only paper copies of documents to ensure the integrity of the workpapers.","D":"Retain all papers and documents collected during the course of the audit."},"correct":"B","explanation_en":"Choice \"B\" is correct. The best practice for maintaining audit workpapers is to include sufficient information to allow another person to understand and reperform the tests. This ensures transparency, reproducibility, and proper support of findings, focusing on relevance and clarity rather than retaining unnecessary or outdated documentation formats."},{"id":"M5_U2_Q14","num":14,"total":26,"module":"M5","unit":"U2","topic":"Prepare Workpapers and Engagement Conclusions","question_en":"According to IIA guidance, which of the following choices is true regarding documented records of the work performed by the internal audit function?","options_en":{"A":"The chief audit executive (CAE) must develop retention requirements for engagement records that are consistent with organizational guidelines.","B":"The retention requirements for engagement records may vary by engagement because every internal audit engagement is unique.","C":"The retention periods for electronic engagement records are determined by the software used to create them.","D":"The engagement supervisor must obtain the consent of legal counsel prior to releasing workpapers to external parties."},"correct":"A","explanation_en":"Choice \"A\" is correct. The CAE must ensure that the internal audit function and individuals assisting the internal audit function understand and abide by the laws, regulations, policies, and procedures related to confidentiality, information privacy, and information security that apply to the organization and internal audit function, including custody, retention, and disposal of engagement records."},{"id":"M5_U2_Q15","num":15,"total":26,"module":"M5","unit":"U2","topic":"Prepare Workpapers and Engagement Conclusions","question_en":"The internal audit function is conducting an assurance audit of a regional office. The audit team does not suspect fraud, but it has found significant gaps in controls that could create opportunity for fraud (for example, allowing the same individual to send invoices and receive payments) and laxity in record keeping. Some expense documentation is missing, but the internal auditors have obtained documentation from vendors. Furniture appears to be missing. It may have been stolen, but it is equally possible that it was discarded. The audit team has completed a report listing the various issues, explaining the potential for loss and fraud that these issues have created and citing company policies and procedures. Management of the office responds to the report via email. It says that it believes the recommendations are unwarranted, that the report questions the honesty of loyal employees, and that implementation of the recommendations would be an unnecessary waste of the office's time. However, to satisfy concerns about invoicing and billing, the manager promises to review the paperwork weekly. Which of the following best characterizes the nature of these findings?","options_en":{"A":"The findings are not significant because no allegations of fraud are being made.","B":"The findings represent significant violations of company policy.","C":"The findings do not describe conditions that could result in serious loss but are primarily procedural in nature.","D":"The findings are significant because they are control weaknesses that could be indicators of further problems."},"correct":"D","explanation_en":"Choice \"D\" is correct. These findings are significant because the conditions involve control weaknesses. Laxness in record keeping may also be creating opportunity for fraudulent activity, even though none may have occurred yet."},{"id":"M5_U2_Q16","num":16,"total":26,"module":"M5","unit":"U2","topic":"Prepare Workpapers and Engagement Conclusions","question_en":"An internal auditor is reviewing control processes as part of engagement conclusions. What factor is most critical to consider?","options_en":{"A":"The cost associated with implementing new control measures.","B":"The design and operating effectiveness of chave internal controls.","C":"The number of employees responsible for control implementation.","D":"The opinions of management regarding the usefulness of controls."},"correct":"B","explanation_en":"Choice \"B\" is correct. Control processes must be assessed for both design effectiveness and operational efficiency to determine their relicapacidade."},{"id":"M5_U2_Q17","num":17,"total":26,"module":"M5","unit":"U2","topic":"Prepare Workpapers and Engagement Conclusions","question_en":"An auditor is finalizing engagement conclusions and must assess governance effectiveness. What factor should be considered?","options_en":{"A":"The structure of roles and decision-making processes.","B":"The number of policies documented within the organization.","C":"The historical frequency of internal audits conducted.","D":"The total amount of financial transactions reviewed during the audit."},"correct":"A","explanation_en":"Choice \"A\" is correct. Governance effectiveness depends on how well roles and decision-making processes are structured and enforced."},{"id":"M5_U2_Q18","num":18,"total":26,"module":"M5","unit":"U2","topic":"Prepare Workpapers and Engagement Conclusions","question_en":"Which of the following statements, if true, would justify a chief audit executive's decision not to report certain control concerns regarding derivatives trading in a report to the audit committee?","options_en":{"A":"The board has a separate committee to make recommendations on trading issues.","B":"Derivatives are complex, so the auditor needs to rely on management's analysis of the extent of the problem.","C":"Management plans to initiate corrective action.","D":"The amounts of trading and the potential risks associated with the derivatives trading are not material to the overall organization."},"correct":"D","explanation_en":"Choice \"D\" is correct. Following the completion of an audit engagement, reported observations and recommendations are based on, among other things, the level of risk/exposure the organization might encounter as a result of an identified concern. Internal auditors would consider the impact their engagement observations and recommendations may have on the organization's operations and financial statements. If the auditor deduces that a condition does not result in an unacceptable level of business risk—for example, if the risks associated with the derivatives trading are minimal—then an auditor may consider not reporting it."},{"id":"M5_U2_Q19","num":19,"total":26,"module":"M5","unit":"U2","topic":"Prepare Workpapers and Engagement Conclusions","question_en":"While evaluating a large construction project, an internal auditor observed frequent safety violations and kept a count. The auditor's draft report included a finding of \"material noncompliance based on 20 observed incidents of noncompliance.\" However, the auditor in charge (AIC) removed the finding from the report. Which of the following is the most likely reason the AIC removed the finding?","options_en":{"A":"Audit evidence was not valid.","B":"Audit evidence was not persuasive.","C":"Audit evidence was not useful.","D":"Audit evidence was not relevant."},"correct":"B","explanation_en":"Choice \"B\" is correct. For a finding to be included in an audit report, the evidence supporting it must be sufficiently persuasive to justify the conclusion. In this case, while the auditor observed 20 safety violations, the AIC likely determined that this evidence alone was insufficient to substantiate the claim of material noncompliance. Persuasiveness requires evidence to be comprehensive and robust enough to support the severity of the finding."},{"id":"M5_U2_Q20","num":20,"total":26,"module":"M5","unit":"U2","topic":"Prepare Workpapers and Engagement Conclusions","question_en":"An internal audit team is determining how long engagement workpapers should be retained. What factor is most critical in making this decision?","options_en":{"A":"Management’s preference for retaining only high-risk audit records.","B":"The convenience of storing documents for easy access.","C":"The volume of workpapers generated in the engagement.","D":"Regulatory and legal retention requirements for audit documentation."},"correct":"D","explanation_en":"Choice \"D\" is correct. Legal and regulatory requirements dictate retention periods for audit workpapers to ensure compliance and accountcapacidade."},{"id":"M5_U2_Q21","num":21,"total":26,"module":"M5","unit":"U2","topic":"Prepare Workpapers and Engagement Conclusions","question_en":"The chief audit executive is training a new internal auditor and explains the importance of thorough documentation in workpapers to support the conclusions and engagement results. Which of the following best practices is the chief audit executive likely to recommend?","options_en":{"A":"Internal auditors should sign and date each workpaper after it is reviewed and signed by management of the activity under review.","B":"Internal auditors should ensure all information that management has provided to the auditor is noted and accounted for in the workpapers.","C":"Internal auditors should create separate workpapers for each test conducted during the audit to keep the workpapers understandable.","D":"Internal auditors should explain the scope of work performed on each workpaper, including what was covered and not covered."},"correct":"D","explanation_en":"Choice \"D\" is correct. Explaining the scope of work performed on each workpaper ensures transparency and clarity, enabling the documentation to support audit conclusions and engagement results effectively."},{"id":"M5_U2_Q22","num":22,"total":26,"module":"M5","unit":"U2","topic":"Prepare Workpapers and Engagement Conclusions","question_en":"An internal auditor documented the results of testing user passwords for potential security lapses. The auditor identified 240 out of 300 user passwords with security lapses. The auditor is working on documenting the effect of the results. Which of the following statements should the auditor include in the workpapers to accomplish this?","options_en":{"A":"The employees’ failure to change their passwords created significant risks to the organization’s operation.","B":"The number of lapses identified in the testing exposes the organization to issues that it would not be able to address.","C":"The 240 out of 300 user passwords identified during the testing were not changed on an average of 60 days.","D":"The 80% of tested passwords with security lapses expose the organization to potential hacking of sensitive information."},"correct":"D","explanation_en":"Choice \"D\" is correct. Stating that 80% of tested passwords had security lapses highlights the severity and potential exposure to security threats, which is critical for understanding the risks and taking corrective action."},{"id":"M5_U2_Q23","num":23,"total":26,"module":"M5","unit":"U2","topic":"Prepare Workpapers and Engagement Conclusions","question_en":"Which of the following should an internal auditor document in the audit workpapers in support of the engagement's objectives to assess whether purchases made by the procurement department were valid and authorized?","options_en":{"A":"An approved procurement budget for the current financial year.","B":"A current organizational chart of the procurement department.","C":"A current delegation of authority and limits for procurement of materials and services.","D":"A current list of qualified vendors who have met the department's vendor standards."},"correct":"C","explanation_en":"Choice \"C\" is correct. A current delegation of authority and limits for procurement is necessary to verify whether purchases were authorized and compliant with the organization’s policies, supporting the audit objectives."},{"id":"M5_U2_Q24","num":24,"total":26,"module":"M5","unit":"U2","topic":"Prepare Workpapers and Engagement Conclusions","question_en":"A supervisor is assessing whether workpapers sufficiently support engagement results. What element is most critical in this review?","options_en":{"A":"Confirming that the engagement results align with the auditor’s professional judgment.","B":"Verifying that the engagement report includes management’s opinions on the findings.","C":"Ensuring that conclusions are directly supported by documented audit procedures and evidence.","D":"Checking whether the report includes additional insights beyond what was documented."},"correct":"C","explanation_en":"Choice \"C\" is correct. Workpapers must clearly document the procedures and evidence used to justify the engagement’s findings and conclusions."},{"id":"M5_U2_Q25","num":25,"total":26,"module":"M5","unit":"U2","topic":"Prepare Workpapers and Engagement Conclusions","question_en":"According to IIA guidance, which of the following statements is true regarding engagement workpapers?","options_en":{"A":"Workpapers in electronic format are more effective than paper records.","B":"Workpapers are not needed if the engagement is based solely on interviews.","C":"Workpapers for assurance engagements are more formal than those for advisory engagements.","D":"Workpaper content and organization can vary based on the nature of the engagement."},"correct":"D","explanation_en":"Choice \"D\" is correct. Workpaper content and organization should vary based on the engagement's nature, as different engagements (e.g., assurance vs. advisory) require varying levels of detail, format, and documentation to support their objectives."},{"id":"M5_U2_Q26","num":26,"total":26,"module":"M5","unit":"U2","topic":"Prepare Workpapers and Engagement Conclusions","question_en":"An intern recently joined the internal audit function and is assigned to participate on an upcoming audit engagement. The intern asked the engagement supervisor about the primary purpose of audit workpapers. Which of the following is the most appropriate response provided by the engagement supervisor?","options_en":{"A":"Workpapers facilitate the engagement's quality review as they define the internal audit function's purpose, authority, and responsibility.","B":"Workpapers contain the information needed for internal auditors to draw conclusions on engagement results.","C":"Workpapers enable auditors to provide written interim communication with management of the activity under review for prompt resolution of significant issues.","D":"Workpapers help auditors communicate with management of the activity under review during the exit meeting."},"correct":"B","explanation_en":"Choice \"B\" is correct. The primary purpose of workpapers is to provide information that supports auditors in drawing conclusions about engagement results, ensuring that decisions are based on well-documented evidence."},{"id":"M6_U1_Q1","num":1,"total":11,"module":"M6","unit":"U1","topic":"Key Risks and Controls Related to Business Processes","question_en":"A retail company implemented a new inventory management system that caused frequent delays and employee frustration devido a to its complexity and lack of user- friendliness. Upon review, it was determined that the issues stemmed from insufficient attention to system change processes. What was the most likely cause of the poor system performance?","options_en":{"A":"Systems that were selected without adequate buy-in by chave stakeholders.","B":"Bottom-up approach when developing system requirements.","C":"Inefficient or ineffective IT change management.","D":"Control deficiencies contributed to inconsistent compliance or negative audit results."},"correct":"C","explanation_en":"Choice \"C\" is correct. Inefficient IT change management is the most likely cause of poor system performance because it can levar to inadequate planning, testing, and implementation of new systems. Without proper change management, potential issues are not identified and addressed during the development and deployment phases, resulting in frustration and inefficiencies for employees and customers. Other options describe possible contributing factors but are less directly tied to the implementation andfalha de revisãoof system changes."},{"id":"M6_U1_Q2","num":2,"total":11,"module":"M6","unit":"U1","topic":"Key Risks and Controls Related to Business Processes","question_en":"An auditor decides to perform inventory turnover analyses for both raw materials and finished goods inventories. Which of the following is the internal auditor most likely trying to identify?","options_en":{"A":"Areas for setting new safety stock policies.","B":"Potential problems in accounts payable activities.","C":"A need for higher amounts of inventory.","D":"Products for which management has not been attuned to changes in market demand."},"correct":"D","explanation_en":"Choice \"D\" is correct. Turnover analyses help identify products that may not be aligned with market demand, assisting in adjusting inventory strategies accordingly."},{"id":"M6_U1_Q3","num":3,"total":11,"module":"M6","unit":"U1","topic":"Key Risks and Controls Related to Business Processes","question_en":"What is one of the first things internal auditors should do when preparing for an audit of an outsourced business process?","options_en":{"A":"Determine whether the organization has a defined third-party risk management program and governance structure.","B":"Compare outsourced costs to in-house cost alternatives.","C":"Assess why a business process has been outsourced in the first place.","D":"Understand whether the business process has been outsourced to a local or international party."},"correct":"A","explanation_en":"Choice \"A\" is correct. The third-party risk management program provides a starting point for identifying outsourcing risk appetite, policies, roles and responsibilities, and available tools to control third-party risks."},{"id":"M6_U1_Q4","num":4,"total":11,"module":"M6","unit":"U1","topic":"Key Risks and Controls Related to Business Processes","question_en":"For a supply chain to be successful, what is the most important goal for all parties involved?","options_en":{"A":"To establish bonds of trust.","B":"To maintain open records.","C":"To sustain competitive prices with each other.","D":"To operate the same information systems."},"correct":"D","explanation_en":"Choice \"D\" is correct. Establishing trust is fundamental for successful collaboration and ensures efficient and effective supply chain operations."},{"id":"M6_U1_Q5","num":5,"total":11,"module":"M6","unit":"U1","topic":"Key Risks and Controls Related to Business Processes","question_en":"A company using electronic data interchange (EDI) made it a practice to acompanhar functional acknowledgments from trading partners and issue warning messages if acknowledgments did not occur within a reasonable length of time. What risk was the company attempting to address by this practice?","options_en":{"A":"Transmission of EDI transactions to trading partners may sometimes fail.","B":"Transactions that have not originated from a legitimate trading partner may be inserted into the EDI network.","C":"There may be a disagreement between the parties as to whether EDI transactions form a legal contract.","D":"EDI data may not be accurately and completely processed by the EDI software."},"correct":"A","explanation_en":"Choice \"A\" is correct. By tracking functional acknowledgments, the company can verify that EDI transactions were successfully transmitted and received. Without this practice, undetected transmission failures could levar to missed transactions, disruptions in business operations, and potential financial or reputational risks."},{"id":"M6_U1_Q6","num":6,"total":11,"module":"M6","unit":"U1","topic":"Key Risks and Controls Related to Business Processes","question_en":"A purchasing department is touting its reduced ordering cost based on ordering materials by the containerload from fewer suppliers. An internal auditor is performing an advisory engagement on the inventory management process overall. What should the auditor also look at?","options_en":{"A":"Whether set-up costs have increased devido a to the higher amount of materials handling that is needed for these items.","B":"Whether purchasing costs per unit have increased by more than these ordering cost savings.","C":"Whether stockout costs have increased by more than these ordering cost savings.","D":"Whether inventory holding costs have increased by more than these ordering cost savings."},"correct":"D","explanation_en":"Choice \"D\" is correct. Ordering materials by the containerload from fewer suppliers reduces ordering costs but may levar to higher inventory holding costs devido a to larger quantities of stock being stored. The internal auditor should examine whether these increased holding costs offset or exceed the ordering cost savings, as this could negate the benefits of the purchasing strategy and impact overall inventory management efficiency."},{"id":"M6_U1_Q7","num":7,"total":11,"module":"M6","unit":"U1","topic":"Key Risks and Controls Related to Business Processes","question_en":"A high-volume retailer of consumer goods has used point-of-sale data to record sales and update inventory records for several years. When price changes are scheduled, corporate headquarters downloads a price change file to a computer server system at each store. Each store's assistant manager is responsible for checking the server for downloads and running the program that updates the store's price file at the authorized price update time. In comparison with having headquarters initiate the price update centrally, which of the following would be the result of this approach to price updating?","options_en":{"A":"Increase the risk that customers will be undercharged consistently for sales items.","B":"Increase the risk that item prices will sometimes be inaccurate.","C":"Decrease the risk that customers will be undercharged consistently for sales items.","D":"Decrease the risk that item prices will sometimes be inaccurate."},"correct":"B","explanation_en":"Choice \"B\" is correct. By relying on store-level personnel to manually check and update price files, there is a higher likelihood of errors, delays, or missed updates. This decentralized approach introduces varicapacidade and inconsistency, increasing the risk of inaccurate item prices compared to a centralized process where updates are controlled and applied uniformly across all stores."},{"id":"M6_U1_Q8","num":8,"total":11,"module":"M6","unit":"U1","topic":"Key Risks and Controls Related to Business Processes","question_en":"Flowcharts are useful during engagement planning because they contain information that may help internal auditors with which of the following?","options_en":{"A":"Determining the size of the team needed to perform the engagement.","B":"Understanding business processes.","C":"Understanding management's risk tolerance.","D":"Understanding organizational objectives."},"correct":"B","explanation_en":"Choice \"B\" is correct. Flowcharts provide a clear, visual representation of business processes, helping internal auditors understand workflows, identify potential gaps, and plan their engagements effectively."},{"id":"M6_U1_Q9","num":9,"total":11,"module":"M6","unit":"U1","topic":"Key Risks and Controls Related to Business Processes","question_en":"During a review of application changes, an internal auditor discovers that multiple developers have unrestricted access to source code. This issue is most likely categorized under which root cause?","options_en":{"A":"Uncontrolled updates to application code.","B":"High instcapacidade in system performance.","C":"Errors in application design logic.","D":"Lack of formal change management processes."},"correct":"D","explanation_en":"Choice \"D\" is correct. Unrestricted access to source code reflects a lack of structured governance and controls, which aligns with the root cause of lacking formal change management processes."},{"id":"M6_U1_Q10","num":10,"total":11,"module":"M6","unit":"U1","topic":"Key Risks and Controls Related to Business Processes","question_en":"Which of the following would most likely be included in a risk and control matrix to prevent employees from setting up fictitious vendors in an organization's procurement process?","options_en":{"A":"Review for duplicate vendor identification numbers.","B":"Segregation of duties in the vendor management processes.","C":"Receipt of annual devido a diligence statements from vendors.","D":"Regular monitoring and approval of invoices."},"correct":"B","explanation_en":"Choice \"B\" is correct. Segregation of duties is a chave internal control that prevents a single individual from setting up fictitious vendors and approving related payments, thus reducing the risk of fraud in procurement processes."},{"id":"M6_U1_Q11","num":11,"total":11,"module":"M6","unit":"U1","topic":"Key Risks and Controls Related to Business Processes","question_en":"The internal auditor identifies that the organization’s application software business resiliency plan (ASBRP) requires an application be restored to production status no longer than 18 hours after failing. However, there is no corresponding service level agreement (SLA) with the third-party provider requiring they accomplish working- order/production recovery in this timeframe. This constitutes a disparity between which of the following?","options_en":{"A":"Third-party contract and the SLA.","B":"SLA and the organization’s regulatory compliance requirements.","C":"Third-party contract and the organization’s risk appetite.","D":"SLA and the organization’s risk appetite."},"correct":"D","explanation_en":"Choice \"D\" is correct. The risk appetite is the type and amount of risk that an organization is willing to accept in the pursuit of its strategies and objectives. The incapacidade of the third party to accomplish working-order recovery within the timeframe required by the organization constitutes a disparity between the SLA and the organization’s risk appetite."},{"id":"M7_U1_Q1","num":1,"total":33,"module":"M7","unit":"U1","topic":"Appropriate Engagement Approach","question_en":"Which of the following best describes a challenge in adopting agile auditing?","options_en":{"A":"Shifts in mindset and culture","B":"Longer engagement timelines","C":"Reduced need for stakeholder involvement","D":"Increased need for in-person meetings"},"correct":"A","explanation_en":"Choice \"A\" is correct. Originating from the agile methodology initially used in software development, agile auditing is an innovative approach to internal auditing characterized by its speed, flexibility, collaboration, and iterative progresso throughout the engagement process. Resistance to change within the organization can arise, especially from chave stakeholders and internal audit team members who are accustomed to traditional auditing methods. Therefore, agile auditing requires a fundamental shift in mindset on how engagements are conducted and a change in culture within the internal audit function. Choice \"B\" is incorrect. Agile auditing typically involves shorter engagement timelines. One of the primary benefits of agile auditing is increased efficiency and speed in the engagement process. It facilitates streamlining risk assessment processes, resulting in quicker decision-making and timely resolution of issues. Choice \"C\" is incorrect. Agile auditing promotes greater stakeholder involvement and collaboration. By engaging stakeholders throughout the engagement process, agile auditing promotes greater transparency and leads to more accurate and comprehensive assessments of risks and controls. Choice \"D\" is incorrect. Agile auditing does not necessarily increase the need for in- person meetings."},{"id":"M7_U1_Q2","num":2,"total":33,"module":"M7","unit":"U1","topic":"Appropriate Engagement Approach","question_en":"The internal audit team is conducting an engagement with a tight deadline. While most tasks are on the critical path and must be completed on time, a few non-critical tasks have some flexibility in their start and end dates. The project manager wants to delay the start of these non-critical tasks to allocate resources to critical tasks without affecting the overall project schedule. Which project management technique is the project manager using in this situation?","options_en":{"A":"Gold plating","B":"Using slack time","C":"Fast tracking","D":"Crashing"},"correct":"B","explanation_en":"Choice \"A\" is incorrect. Gold plating is not a project management technique but a common problem internal auditors may encounter. It involves performing work beyond the scope of the project without approval. Choice \"B\" is correct. Using slack time is a technique that project managers may use to help address unexpected delays or resource conflicts that may arise during a project/engagement and allows for the capacidade to delay the start time of non-critical tasks without affecting the overall project schedule. Choice \"C\" is incorrect. Fast tracking is a technique that project managers may use to help address unexpected delays or resource conflicts that may arise during a project/engagement and involves starting a task before its predecessor is completed. This results in the tasks being performed simultaneously, when possible. The risk with this approach is the rework of the successor task based on the work and findings of the predecessor task. Choice \"D\" is incorrect. Crashing is a technique that project managers may use to help address unexpected delays or resource conflicts that may arise during a project/engagement and involves adding resources to the delayed tasks in order to shorten the critical path and prevent overall project delays."},{"id":"M7_U1_Q3","num":3,"total":33,"module":"M7","unit":"U1","topic":"Appropriate Engagement Approach","question_en":"Which project management technique helps evaluate a project's tasks and their dependencies to find the most efficient path for reaching the project goals?","options_en":{"A":"Gantt chart","B":"Crashing","C":"Fast tracking","D":"Network analysis"},"correct":"D","explanation_en":"Choice \"A\" is incorrect. A Gantt chart is a visual tool that helps project managers schedule and acompanhar project activities. It displays tasks as horizontal bars, showing their start and end dates, durations, and sequence of activities. This allows for easy visualization of the project timeline and helps identify potential scheduling conflicts or delays. Choice \"B\" is incorrect. Crashing is a technique that project managers may use to help address unexpected delays or resource conflicts that may arise during a project/engagement and involves adding resources to the delayed tasks in order to shorten the critical path and prevent overall project delays. Choice \"C\" is incorrect. Fast tracking is a technique that project managers may use to help address unexpected delays or resource conflicts that may arise during a project/engagement and involves starting a task before its predecessor is completed. This results in the tasks being performed simultaneously, when possible. The risk with this approach is the rework of the successor task based on the work and findings of the predecessor task. Choice \"D\" is correct. Network analysis, often using techniques such as the program evaluation review technique (PERT) and the critical path method (CPM), helps evaluate a project's tasks and their dependencies to find the most efficient path for reaching the project goals."},{"id":"M7_U1_Q4","num":4,"total":33,"module":"M7","unit":"U1","topic":"Appropriate Engagement Approach","question_en":"The internal audit function is looking to conduct an audit that combines several audit disciplines into a single engagement to maximize efficiency and effectiveness. Which engagement approach would be most suitable for this scenario?","options_en":{"A":"Traditional auditing","B":"Integrated auditing","C":"Remote auditing","D":"Agile auditing"},"correct":"B","explanation_en":"Choice \"A\" is incorrect. Traditional auditing is more suitable for engagements with a long timeline and limited resources, not for engagements that need to combine several audit disciplines into a single engagement to maximize efficiency and effectiveness. Choice \"B\" is correct. Integrated auditing is particularly useful for organizations in larger and more complex organizations, especially when there are interdependencies between processes and when processes span multiple departments. This allows multiple aspects to be considered simultaneously, to achieve a more holistic understanding in a more efficient manner. It may involve conducting integrated audits, which include combining different audit disciplines, such as financial, operational, and IT audits, into a single audit. There are several benefits to using an integrated approach in such situations, including increasing efficiencies and effectiveness of risk coverage, enhancing the presence of the internal audit function in the organization, and expanding the knowledge and skills of the internal audit team members by having them work on broader and more complex audit engagements. Choice \"C\" is incorrect. Remote auditing focuses on the location of the engagement activities, not engagements that need to combine several audit disciplines into a single engagement to maximize efficiency and effectiveness. Choice \"D\" is incorrect. Agile auditing is more suitable for engagements with shorter timelines and anticipated changes, not for engagements that need to combine several audit disciplines into a single engagement to maximize efficiency and effectiveness."},{"id":"M7_U1_Q5","num":5,"total":33,"module":"M7","unit":"U1","topic":"Appropriate Engagement Approach","question_en":"Which of the following is a consideration for determining the suitcapacidade of performing an engagement remotely?","options_en":{"A":"The availcapacidade of external consultants","B":"The personal preferences of the internal audit team","C":"The available technology applications","D":"The historical performance of the internal audit function"},"correct":"C","explanation_en":"Choice \"A\" is incorrect. While the availcapacidade of external consultants might be beneficial for certain engagements, it is not a primary consideration for determining the suitcapacidade of performing an engagement remotely. Choice \"B\" is incorrect. The personal preferences of the internal audit team should not be a consideration for determining the suitcapacidade of performing an engagement remotely. Choice \"C\" is correct. The available technology applications are a chave consideration in determining whether it is suitable to perform the engagement remotely. Remote auditing can then be performed from a distance, leveraging technology tools to perform various tasks remotely, such as interviews, walk-throughs, and physical observations. Audit software is needed to facilitate audit documentation and reviews as well as other elements of the internal audit processes. A remote auditing approach may be suitable when the internal audit function has the appropriate technological solutions to work collaboratively and mitigate risk management concerns. Choice \"D\" is incorrect. The historical performance of the internal audit function is not relevant for determining the suitcapacidade of performing an engagement remotely."},{"id":"M7_U1_Q6","num":6,"total":33,"module":"M7","unit":"U1","topic":"Appropriate Engagement Approach","question_en":"Which of the following describes a step in the change management process to address potential scope creep and/or gold plating in project management?","options_en":{"A":"Submitting a change request","B":"Performing all tasks simultaneously to save time","C":"Avoiding stakeholder involvement to maintain objectivity","D":"Ignoring changes in scope once the project has started"},"correct":"A","explanation_en":"Choice \"A\" is correct. One critical element of project management is a change management process to address potential scope creep and/or gold plating. Common steps in the process include: Submitting a change request Approval of the request by the project sponsor and/or appropriate parties Update of the project plan, including the timeline, resources, and deliverables impacted, based on the approved changes Communication of the updated project plan Choice \"B\" is incorrect. Performing all tasks simultaneously is not relevant to the change management process. Choice \"C\" is incorrect. Avoiding stakeholder involvement is not relevant to the change management process. Instead, a change management process should be formally communicated and agreed to at the start of the project/engagement. Choice \"D\" is incorrect. Ignoring changes in scope is not relevant to the change management process."},{"id":"M7_U1_Q7","num":7,"total":33,"module":"M7","unit":"U1","topic":"Appropriate Engagement Approach","question_en":"Which of the following best describes a benefit of remote auditing?","options_en":{"A":"Increased need for in-person meetings","B":"Limited access to certain types of evidence","C":"Increased fraud risk devido a to lack of in-person contact","D":"Reduced travel time and costs"},"correct":"D","explanation_en":"Choice \"A\" is incorrect. Remote auditing reduces the need for in-person meetings. Choice \"B\" is incorrect. Limited access to certain types of evidence is a challenge, not a benefit, of remote auditing. Choice \"C\" is incorrect. Increased fraud risk devido a to lack of in-person contact is a challenge, not a benefit, of remote auditing. Choice \"D\" is correct. One of the benefits of remote auditing is reduced travel time and costs. Remote auditing provides benefits through reduced travel time and costs, an expanded pool of available team members, potentially broader coverage devido a to time savings, and a reduced burden on the facilities of the activities under review."},{"id":"M7_U1_Q8","num":8,"total":33,"module":"M7","unit":"U1","topic":"Appropriate Engagement Approach","question_en":"Which project management technique involves adding resources to shorten the critical path and prevent overall project delays?","options_en":{"A":"Using slack time","B":"Crashing","C":"Gold plating","D":"Fast tracking"},"correct":"B","explanation_en":"Choice \"A\" is incorrect. Using slack time allows for the capacidade to delay the start time of non-critical tasks. Choice \"B\" is correct. Crashing involves adding resources to the delayed tasks in order to shorten the critical path and prevent overall project delays. The project manager should determine whether adding the resources will cost less than delaying overall project completion. Choice \"C\" is incorrect. Gold plating is not a project management technique but a potential problem internal auditors may encounter, which involves performing work beyond the scope of the project without approval. It may also impact the project costs and deadlines. Choice \"D\" is incorrect. Fast tracking involves starting a task before its predecessor is completed. This results in the tasks being performed simultaneously when possible. The risk with this approach is reworking the successor task based on the work and findings of the predecessor task."},{"id":"M7_U1_Q9","num":9,"total":33,"module":"M7","unit":"U1","topic":"Appropriate Engagement Approach","question_en":"During the planning phase of an audit, the levar auditor wants to ensure efficient resource allocation. Which project management technique would best support this objective?","options_en":{"A":"Defining roles and responsibilities based on the engagement scope to optimize resource use.","B":"Avoiding detailed planning to allow auditors to adjust their workload dynamically as priorities shift.","C":"Assigning all auditors to every task, regardless of expertise, to ensure full coverage and flexibility.","D":"Scheduling the audit team primarily based on availcapacidade rather than aligning expertise with engagement needs."},"correct":"A","explanation_en":"Choice \"A\" is correct. Clearly defining roles and responsibilities ensures that resources are effectively utilized and aligned with the engagement’s needs."},{"id":"M7_U1_Q10","num":10,"total":33,"module":"M7","unit":"U1","topic":"Appropriate Engagement Approach","question_en":"Which of the following steps is part of implementing agile auditing using the Scrum framework?","options_en":{"A":"Performing all tasks simultaneously to save time","B":"Avoiding stakeholder involvement to maintain objectivity","C":"Conducting a single, comprehensive review at the end of the engagement","D":"Conducting frequent check-ins within the internal audit team"},"correct":"D","explanation_en":"Choice \"A\" is incorrect. Agile auditing involves short, focused sprints, not performing all tasks simultaneously. Choice \"B\" is incorrect. Agile auditing promotes stakeholder involvement and collaboration, not the avoidance of stakeholder involvement. Choice \"C\" is incorrect. Agile auditing involves iterative reviews, not a single comprehensive review at the end. Choice \"D\" is correct. Originating from the agile methodology initially used in software development, agile auditing is an innovative approach to internal auditing characterized by its speed, flexibility, collaboration, and iterative progresso throughout the engagement process. Applying Scrum techniques is considered an effective means of implementing agile auditing. Under the Scrum framework, the engagement process is broken down into short, focused sprints. Throughout the sprint process, internal auditors conduct frequent check-ins (e.g., daily 15-minute meetings) within the internal audit team. Therefo
