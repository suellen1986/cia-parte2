 o trabalho de auditoria objetivos e faz não alinhar-se com a Normas. Alternativa \"B\" é correto. O supervisor deve aprovar o trabalho de auditoria trabalho programa durante planejamento do trabalho e pode Supervisionar outro aspectos planejando processo. O principal considerações para aprovação são se o trabalho programa eficazmente atinge o trabalho de auditoria objetivos e inclui procedimentos para identificando, analisando, avaliando, e Documentando informação. Portanto, revisando trabalho programa garante esse o alto-risco área é adequadamente tratado e alinha-se com o objetivos do trabalho de auditoria e a Normas. Alternativa \"C\" é incorreto. Escalando questão ao Diretor Executivo de Auditoria é desnecessário menos que o problema não pode ser resolved não supervisor nível. Alternativa \"D\" é incorreto. Aprovando trabalho programa sem tratando alto-risco área compromises a qualidade e objetivos do trabalho de auditoria."},{"id":"M10_U1_Q1","num":1,"total":26,"module":"M10","unit":"U1","topic":"Recursos e Habilidades do Trabalho","question_pt":"Uma função de auditoria interna não possui o conhecimento técnico necessário para um trabalho de consultoria destinado a avaliar os processos de transferência de dados para um novo sistema contábil. O Diretor Executivo de Auditoria (CAE) quer garantir que a função de auditoria interna possa concluir o trabalho com êxito. Qual das seguintes é a ação mais adequada para o Diretor Executivo de Auditoria?","options_pt":{"A":"Adiar o trabalho de consultoria para o ano seguinte, enquanto o Diretor Executivo de Auditoria adquire as habilidades técnicas para supervisionar o trabalho.","B":"Contratar funcionários permanentes com conhecimento em ambos os sistemas para atuar neste trabalho de consultoria e em trabalhos futuros.","C":"Solicitar a inclusão de um especialista independente no assunto — vinculado à organização — na equipe da função de auditoria interna durante a execução do trabalho de consultoria.","D":"Solicitar aumento nos recursos de treinamento para que os auditores possam ser capacitados em ambos os sistemas antes do planejamento do trabalho de consultoria."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. A inclusão de um especialista independente no assunto garante que a equipe de auditoria interna disponha da especialização necessária para concluir o trabalho de consultoria sem atrasos nem necessidade de treinamento extensivo."},{"id":"M10_U1_Q2","num":2,"total":26,"module":"M10","unit":"U1","topic":"Recursos e Habilidades do Trabalho","question_pt":"Durante um trabalho de auditoria, equipe de auditoria interna descobre esse o budgeted recursos são insuficiente para concluir o trabalho. O Diretor Executivo de Auditoria é informado questão e deve decidir como para prosseguir. Qual das seguintes alternativas ações deveria melhor alinhar-se com a Normas?","options_pt":{"A":"Cancel o trabalho de auditoria e reatribuir equipe para outro projetos.","B":"Prosseguir com o trabalho de auditoria usando disponível recursos.","C":"Discutir o recurso limitações com alta administração e o conselho para determinar o melhor curso de ação.","D":"Reduzir o escopo do trabalho de auditoria sem notificando alta administração."},"correct":"C","explanation_pt":"Alternativa \"A\" está incorreta. Canceling o trabalho de auditoria outright pode não ser adequado, especialmente para alto-risco áreas, e deve apenas ser considerado após consultoria alta administração e o conselho. Alternativa \"B\" está incorreta. prosseguiring com insuficiente recursos poderia compromise a qualidade trabalho de auditoria e faz não alinhar-se com a Normas. Alternativa \"C\" está correta. Função de auditoria interna pode face recurso limitações, como constraints não disponibilidade de recursos humanos, tempo, orçamento, ou tecnoregistraria, que pode prevenir função de auditoria interna de atingindo trabalho de auditoria objetivos. De acordo com a Normas, o Diretor Executivo de Auditoria deve comunicar com alta administração e o conselho em relação a recurso limitações e seus implications. Este garante transparência e permite para um informado decisão em como para prosseguir, como reallocating recursos, reduzindo escopo, ou rescheduling o trabalho de auditoria. Alternativa \"D\" está incorreta. O escopo de um trabalho de auditoria é projetado para tratar específico objetivos e riscos. Reduzindo escopo sem adequado autorização deveria não ser um adequado curso de ação como ele poderia significativamente impacto auditoria objetivos e a garantia ele fornece."},{"id":"M10_U1_Q3","num":3,"total":26,"module":"M10","unit":"U1","topic":"Recursos e Habilidades do Trabalho","question_pt":"Como deve registraristical planejando para um trabalho de auditoria, como considerando necessidade para passports ou visas e potencial language ou translation questões, ser tratado?","options_pt":{"A":"Pelo Diretor Executivo de Auditoria (Diretor Executivo de Auditoria) com um alto-ranking cliente executivo.","B":"Durante preliminar cliente comunicações e o inicial cliente reunião.","C":"Durante o risco avaliação processo para anual planejamento de auditoria.","D":"Enquanto finalizando escopo do trabalho e objetivos."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. registraristical planejando, como securing passports, visas, e tratando language ou translation necessidades, deve ser tratado inicial durante preliminar cliente comunicações e o inicial cliente reunião. Este garante estes prático considerações são resolved em advance, permitindo trabalho de auditoria para prosseguir smoothly e sem adiars. Tratando registrarística em este etapa alinha-se com estabelecendo mutual compreensão e preparando para o trabalho de auditoria."},{"id":"M10_U1_Q4","num":4,"total":26,"module":"M10","unit":"U1","topic":"Recursos e Habilidades do Trabalho","question_pt":"Como deve um Diretor Executivo de Auditoria (Diretor Executivo de Auditoria) determinar o nível de funcionários e recursos exigido fim de completo uma auditoria trabalho de auditoria?","options_pt":{"A":"Considerar se há são suficientemente qualificado funcionários e disponibilidade de recursos para undertake auditoria trabalho de auditoria.","B":"Considerar que membros de funcionários são free para undertake o trabalho de auditoria antes do começar trabalho.","C":"Considerar o valor de funcionários tempo taken em um anterior ou similar revisar fim de aplicar esse ao planejado trabalho de auditoria.","D":"Considerar se há é suficiente número de funcionários não equipe para concluir o trabalho de auditoria."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. O Diretor Executivo de Auditoria deve avaliar se há são suficiente qualificado funcionários e disponível recursos, como este garante esse o trabalho de auditoria pode ser eficazmente conduzido sem compromising qualidade ou eficiência."},{"id":"M10_U1_Q5","num":5,"total":26,"module":"M10","unit":"U1","topic":"Recursos e Habilidades do Trabalho","question_pt":"Uma equipe de auditoria interna está conduzindo um trabalho de auditoria para um alto-risco área. Midway por meio do trabalho de auditoria, principal equipe membro unexpectedly leaves a organização. Qual é ação mais adequada ação para o Diretor Executivo de Auditoria para tomar?","options_pt":{"A":"Reallocate interno recursos ou engage externo consultants para concluir o trabalho de auditoria.","B":"Cancel o trabalho de auditoria e reatribuir equipe para outro projetos.","C":"Reduzir o escopo do trabalho de auditoria sem notificando alta administração.","D":"Prosseguir com o trabalho de auditoria usando reprincipaling equipe membros."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Como observou não Normas, em situações ondo disponível recursos são inadequado ou insuficiente para concluir o trabalho de auditoria, o supervisor do trabalho é responsável por escalando a preocupação ao Diretor Executivo de Auditoria. O Diretor Executivo de Auditoria deve reallocate recursos ou engage externo consultants para garantir o trabalho de auditoria objetivos são met. A Normas enfatizar o importance de tratando recurso limitações adequadamente. Alternativa \"B\" está incorreta. Canceling o trabalho de auditoria deveria não ser um adequado curso de ação, especialmente para um trabalho de auditoria de um alto-risco área onde atingindo garantia é crucial. Alternativa \"C\" está incorreta. O escopo de um trabalho de auditoria é projetado para tratar específico objetivos e riscos. Reduzindo escopo sem adequado autorização deveria não ser um adequado curso de ação como ele poderia significativamente impacto auditoria objetivos e a garantia ele fornece. Alternativa \"D\" está incorreta. prosseguiring sem suficiente recursos poderia compromise a qualidade trabalho de auditoria."},{"id":"M10_U1_Q6","num":6,"total":26,"module":"M10","unit":"U1","topic":"Recursos e Habilidades do Trabalho","question_pt":"O Diretor Executivo de Auditoria está planejando um trabalho de auditoria esse exige auditores internos para revisar documentação e realizar entrevistas em um estrangeiro language. no entanto, none auditores internos são proficiente em este estrangeiro language. Qual é ação mais adequada ação para o Diretor Executivo de Auditoria para tomar?","options_pt":{"A":"Adiar o trabalho de auditoria até que auditores internos pode ser capacitados não language.","B":"Prosseguir com o trabalho de auditoria e basear-se em translation software.","C":"Engage um prestador de serviços externo com o exigido language habilidades.","D":"Atribuir o trabalho de auditoria ao mais experiente auditor disponível."},"correct":"C","explanation_pt":"Alternativa \"A\" está incorreta. Fornecendo tempestivo garantia é crucial. Teaching interno auditoria funcionários novo language deveria ser very tempo-consuming e é unlikely para ser custo- eficaz solução. Além disso, postponing o trabalho de auditoria até que treinamento é concluído pode significativamente adiar a identificação de potencial riscos. Alternativa \"B\" está incorreta. Translation software pode não ser confiável para complexo documentara ou entrevistas e pode compromise a qualidade trabalho de auditoria. Alternativa \"C\" está correta. Como observou não Normas, em situações ondo disponível recursos são inadequado ou insuficiente, o supervisor do trabalho deve escalar a preocupação ao Diretor Executivo de Auditoria para determinar qual ações para tomar para resolve o recurso limitação. Engaging um prestador de serviços externo com o exigido language habilidades garante o trabalho de auditoria objetivos são met sem compromising qualidade. A Normas enfatizar obtendo adequado recursos, incluindo externo especialização quando necessário. Alternativa \"D\" está incorreta. Designando trabalho de auditoria um experiente auditor sem o exigido language habilidades poderia compromise a qualidade trabalho de auditoria."},{"id":"M10_U1_Q7","num":7,"total":26,"module":"M10","unit":"U1","topic":"Recursos e Habilidades do Trabalho","question_pt":"Qual das seguintes é um principal consideração quando determinando financeiro recursos exigido para um trabalho de auditoria?","options_pt":{"A":"A inclusão de todos custos, como travel, tecnoregistraria, e suprimentos","B":"A complexidade objetivos do trabalho de auditoria","C":"A disponibilidade de auditores internos com specialized habilidades","D":"O estimated número de hours exigido para o trabalho de auditoria"},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Função de auditoria interna deve identificar o tipos e quantidade de recursos necessidade para concluir um trabalho de auditoria e fulfill o trabalho de auditoria objetivos. De acordo com a Normas, financeiro recurso planejando deve incluir todos custos, como travel, tecnoregistraria, e suprimentos. Este abrangente abordagem garante o trabalho de auditoria é concluído eficazmente. Alternativa \"B\" está incorreta. A complexidade trabalho de auditoria impactos geral recurso planejando mas faz não eespecíficoamente determinar financeiro recursos. Alternativa \"C\" está incorreta. Enquanto a disponibilidade de specialized habilidades é importante, ele pertains para recursos humanos em vez de financeiro recursos. Alternativa \"D\" está incorreta. O número de hours é fator em human recurso planejando, não financeiro budgeting."},{"id":"M10_U1_Q8","num":8,"total":26,"module":"M10","unit":"U1","topic":"Recursos e Habilidades do Trabalho","question_pt":"Qual é principal fator esse impactos trabalho de auditoria staffing decisões?","options_pt":{"A":"Conhecido relação questões com função de auditoria interna.","B":"Operacional style de administração.","C":"Culture atividade sob revisão.","D":"Tipos de controles envolvido (hard ou soft)."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. O tipos de controles envolvido determinar o específico habilidades e especialização exigido para o auditoria equipe."},{"id":"M10_U1_Q9","num":9,"total":26,"module":"M10","unit":"U1","topic":"Recursos e Habilidades do Trabalho","question_pt":"De uma organização pagamento aplicativo software sistema é em urgente necessidade de uma auditoria para garantir fraudulent transações são não taking place; no entanto, função de auditoria interna faz não têm recursos com adequado habilidades. Como deve o Diretor Executivo de Auditoria prosseguir?","options_pt":{"A":"Informar o comitê de auditoria esse treinamento de atual auditoria funcionários deve ocorre antes de beginning o trabalho de auditoria.","B":"Prosseguir com o atual auditoria funcionários, mas incluir adicional auditoria funcionários membros para compensate para o falta de especialização.","C":"Obter comitê de auditoria aprovação para outfonte o trabalho de auditoria para terceiros consultants com o adequado habilidades e recursos.","D":"Decline o trabalho de auditoria em este tempo devido ao falta de especialização e staffing disponível para concluir auditoria."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Outsourcing para terceiros consultants garante esse a organização pode tratar fraudulent transações enquanto aproveitando adequado especialização e recursos."},{"id":"M10_U1_Q10","num":10,"total":26,"module":"M10","unit":"U1","topic":"Recursos e Habilidades do Trabalho","question_pt":"Qual das seguintes alternativas custos deve ser incluído quando budgeting financeiro recursos para um trabalho de auditoria?","options_pt":{"A":"Apenas o custo de tecnoregistraria e suprimentos","B":"Todos custos, incluindo travel, tecnoregistraria, e suprimentos","C":"Apenas o custo de recursos humanos","D":"Apenas o custo de externo serviço fornecendo"},"correct":"B","explanation_pt":"Alternativa \"A\" está incorreta. O custo de tecnoregistraria e suprimentos é importante mas faz não fornecer abrangente visão financeiro recursos necessidade para atingir objetivos do trabalho de auditoria. Alternativa \"B\" está correta. Função de auditoria interna deve identificar o tipos e quantidade de recursos necessidade para concluir um trabalho de auditoria e fulfill o trabalho de auditoria objetivos. Em conformidade com a Normas, financeiro recurso planejando deve incluir todos custos, como travel, tecnoregistraria, e suprimentos. Este abrangente abordagem garante o trabalho de auditoria é concluído eficazmente. Alternativa \"C\" está incorreta. Limitando orçamento para recursos humanos sozinho pode resultado em insuficiente financeiro planejando. Alternativa \"D\" está incorreta. Externo serviço fornecendo são apenas one componente geral financeiro recursos obrigado atingir objetivos do trabalho de auditoria."},{"id":"M10_U1_Q11","num":11,"total":26,"module":"M10","unit":"U1","topic":"Recursos e Habilidades do Trabalho","question_pt":"Durante um trabalho de auditoria, equipe de auditoria interna descobre esse o budgeted hours são insuficiente para concluir o trabalho. O supervisor do trabalho escala questão ao Diretor Executivo de Auditoria. Qual é ação mais adequada ação para o Diretor Executivo de Auditoria para tomar?","options_pt":{"A":"Prosseguir com o trabalho de auditoria usando disponível recursos.","B":"Discutir o recurso limitações com alta administração e o conselho para determinar o melhor curso de ação.","C":"Cancel o trabalho de auditoria e reatribuir equipe para outro projetos.","D":"Reduzir o escopo do trabalho de auditoria sem notificando alta administração."},"correct":"B","explanation_pt":"Alternativa \"A\" está incorreta. prosseguiring com insuficiente recursos poderia compromise a qualidade trabalho de auditoria. Alternativa \"B\" está correta. A Normas exigir o Diretor Executivo de Auditoria para comunicar com alta administração e o conselho em relação a recurso limitações e seus implications. Este garante transparência e permite para um informado decisão em como para prosseguir. Alternativa \"C\" está incorreta. Canceling o trabalho de auditoria outright pode não ser adequado, especialmente para alto-risco áreas. Alternativa \"D\" está incorreta. O escopo de um trabalho de auditoria é projetado para tratar específico objetivos e riscos. Reduzindo escopo sem adequado autorização deveria não ser um adequado curso de ação como ele poderia significativamente impacto auditoria objetivos e a garantia ele fornece."},{"id":"M10_U1_Q12","num":12,"total":26,"module":"M10","unit":"U1","topic":"Recursos e Habilidades do Trabalho","question_pt":"Uma equipe de auditoria interna está planejando um trabalho de auditoria esse exige specialized ele habilidades. Qual das seguintes é o melhor curso de ação se o exigido habilidades são não disponível internally?","options_pt":{"A":"Adiar o trabalho de auditoria até que auditores internos pode ser capacitados.","B":"Reduzir o escopo do trabalho de auditoria para excluir ele-relacionado áreas.","C":"Engage um prestador de serviços externo com o exigido habilidades.","D":"Prosseguir com o trabalho de auditoria usando disponível recursos."},"correct":"C","explanation_pt":"Alternativa \"A\" está incorreta. Atrasando trabalho de auditoria pode não ser viável, especialmente para alto-risco áreas. Alternativa \"B\" está incorreta. Reduzindo escopo deve apenas ser considerado como último resort após exploring outro opções. Alternativa \"C\" está correta. Quando planejando um trabalho de auditoria, o Diretor Executivo de Auditoria deve considerar se qualquer special habilidades são necessidade para concluir o trabalho de auditoria esse fazer não exist internally. Engaging um prestador de serviços externo garante o trabalho de auditoria objetivos são met sem compromising qualidade. A Normas enfatizar o importance de obtendo adequado recursos, incluindo externo ele especialização quando necessário. Alternativa \"D\" está incorreta. prosseguiring sem o exigido habilidades poderia compromise a qualidade trabalho de auditoria."},{"id":"M10_U1_Q13","num":13,"total":26,"module":"M10","unit":"U1","topic":"Recursos e Habilidades do Trabalho","question_pt":"Durante um trabalho de auditoria, equipe de auditoria interna descobre esse o budgeted recursos são insuficiente para concluir o trabalho. Qual é ação mais adequada ação para o supervisor do trabalho para tomar?","options_pt":{"A":"Prosseguir com o trabalho de auditoria usando disponível recursos.","B":"Reduzir o escopo do trabalho de auditoria sem notificando Diretor Executivo de Auditoria.","C":"Solicitaçõesr adicional recursos finanças departamento.","D":"Escalar o recurso limitação ao Diretor Executivo de Auditoria para resolução."},"correct":"D","explanation_pt":"Alternativa \"A\" está incorreta. prosseguiring sem suficiente recursos poderia compromise a qualidade trabalho de auditoria. Alternativa \"B\" está incorreta. O escopo de um trabalho de auditoria é projetado para tratar específico objetivos e riscos. Reduzindo escopo sem adequado autorização deveria não ser um adequado curso de ação como ele poderia significativamente impacto auditoria objetivos e a garantia ele fornece. Alternativa \"C\" está incorreta. Enquanto adicional recursos pode ser necessidade, este é não mais adequado curso de ação para o Diretor Executivo de Auditoria para tomar como ele bypasses o necessário comunicação e processo de aprovação dentro de função de auditoria interna. Alternativa \"D\" está correta. Função de auditoria interna pode face recurso limitações, como constraints não disponibilidade de recursos humanos, tempo, orçamento, ou tecnoregistraria, que pode prevenir função de auditoria interna de atingindo trabalho de auditoria objetivos. A Normas exigir o supervisor do trabalho para escalar recurso limitações ao Diretor Executivo de Auditoria, que é responsável por tratando questão com alta administração e o conselho."},{"id":"M10_U1_Q14","num":14,"total":26,"module":"M10","unit":"U1","topic":"Recursos e Habilidades do Trabalho","question_pt":"Quando planejando um trabalho de auditoria, auditores internos deve identificar o tipos e quantidade de recursos necessário para atingir o trabalho de auditoria objetivos. Qual das seguintes é o mais crítico fator para considerar quando determinando financeiro recursos?","options_pt":{"A":"A complexidade objetivos do trabalho de auditoria","B":"A disponibilidade de auditores internos com specialized habilidades","C":"O tempo frame dentro de que o trabalho de auditoria deve ser concluído","D":"O custo de recursos humanos e technoregistrarical ferramentas exigido para o trabalho de auditoria"},"correct":"D","explanation_pt":"Alternativa \"A\" está incorreta. A complexidade trabalho de auditoria affects recurso planejando mas faz não eespecíficoamente determinar financeiro recursos. Alternativa \"B\" está incorreta. Enquanto a disponibilidade de specialized habilidades é importante, ele pertains para recursos humanos em vez de financeiro recursos. Alternativa \"C\" está incorreta. O tempo frame impactos agendando e alocação de recursos mas é não diretamente tied para financeiro recursos. Alternativa \"D\" está correta. De acordo com a Normas, financeiro recursos incluir o custo de recursos humanos, technoregistrarical ferramentas, e outro despesas como travel e suprimentos. Estes custos deve ser estimated para garantir o trabalho de auditoria objetivos são met."},{"id":"M10_U1_Q15","num":15,"total":26,"module":"M10","unit":"U1","topic":"Recursos e Habilidades do Trabalho","question_pt":"Função de auditoria interna tem committed um firewall trabalho de auditoria que deve ser concluído dentro do month. O auditor interno quem specializes em firewalls é em vacation até que o seguinte month. Qual das seguintes é melhor ação para tomar fim de garantir esse o trabalho de auditoria é concluído não prazo?","options_pt":{"A":"Ask um funcionário ele funcionários quem elaborado firewall para auditoria área.","B":"Atribuir outro ele auditor para fazer aprofundado pesquisa em firewalls e então conduzir auditoria.","C":"Cofonte o trabalho de auditoria com uma organização esse specializes em firewalls para concluir auditoria.","D":"Wait até que o auditor com firewall experiência comes back de vacation."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Cosourcing com uma organização specializing em firewalls garante esse o trabalho de auditoria é concluído não prazo e fornece o exigido especialização, mantendo auditoria qualidade e reunião prazos."},{"id":"M10_U1_Q16","num":16,"total":26,"module":"M10","unit":"U1","topic":"Recursos e Habilidades do Trabalho","question_pt":"Qual das seguintes é melhor opção para um Diretor Executivo de Auditoria (Diretor Executivo de Auditoria) para affirm esse interno auditoria recursos são adequado, suficiente, e eficazmente deployed?","options_pt":{"A":"Estabelecer métricas esse avaliar função de auditoria interna desempenho e solicit retorno de atividades sob revisão.","B":"Cofonte função de auditoria interna com um mix de interno e auditores externos.","C":"Outfonte interno trabalhos de auditoria para externo auditoria firms que pode fornecer flexível recursos.","D":"Garantir há são suficiente número de qualificado people employed em outro divisões quem pode fornecer auditoria serviços em caso de necessidade."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Métricas e retorno fornecer mensurável e actionable percepções em alocação de recursos e eficácia, ajudando Diretor Executivo de Auditoria affirm esse recursos são adequado, suficiente, e eficazmente deployed."},{"id":"M10_U1_Q17","num":17,"total":26,"module":"M10","unit":"U1","topic":"Recursos e Habilidades do Trabalho","question_pt":"Porque natureza de trabalho em uma empresa plants, radiation safety é importante. Uma auditoria para testar o sistema de controles sobre o compra, distribuição, e usar de radioactive material está sendo conduzido. O processo é well-documentarado, e funcionários não safety departamento são very familiar com fazer departamento procedimentos. Desdo purchasing e instalações departamentos são envolvido não processo, o auditor está considerando revisando seus procedimentos para handling radioactive material como well. Qual deve o auditor fazer?","options_pt":{"A":"Ajustar auditoria cronograma e orçamento, se necessidade, e entrevista o adequado indivíduos em purchasing e instalações para ascertain se adicional controles exist esse complement esses identificado dentro do safety departamento.","B":"Adiar questions em relação a purchasing, instalações, e outro departamentos até que auditoria projetos pode ser agendado para esses departamentos.","C":"Têm confidence não rigorous e detalhado safety departamento procedimentos, desde esse departamento tem o principal responsabilidade para radiation safety; o auditor deve não usar auditoria tempo para revisar outro departamentos.","D":"Testar os controles identificado dentro do safety departamento; se resultados são unfavorable, considerar se para envolver o outro departamentos."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Radiation safety é crítico área esse exige minucioso revisar de todos departamentos envolvido não processo. Por engaging purchasing e instalações, o auditor garante abrangente avaliação de controles em toda o todo sistema, identificando qualquer lacunas ou complementar controles. Este proativo abordagem alinha-se com a auditoria objetivo para avaliar eficácia de controles sobre o compra, distribuição, e usar de radioactive material."},{"id":"M10_U1_Q18","num":18,"total":26,"module":"M10","unit":"U1","topic":"Recursos e Habilidades do Trabalho","question_pt":"O Diretor Executivo de Auditoria determina esse o disponível funcionários faz não têm o requisite habilidades para realizar um trabalho de auditoria. Qual deve o Diretor Executivo de Auditoria fazer?","options_pt":{"A":"Considerar usando externo recursos com o requisite habilidades para supplement interno funcionários e completo trabalho de auditoria.","B":"Não realizar o trabalho de auditoria desdo requisite habilidades são não disponível.","C":"Realizar o trabalho de auditoria mas limitar o escopo em light habilidade deficiência.","D":"Usar o trabalho de auditoria como treinamento oportunidade e let o auditores learn como trabalho de auditoria é realizado."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Usando externo recursos com o necessidade conhecimento, habilidades, e disciplines garante esse auditoria meets profissional Normas e trata o risco adequadamente."},{"id":"M10_U1_Q19","num":19,"total":26,"module":"M10","unit":"U1","topic":"Recursos e Habilidades do Trabalho","question_pt":"Uma equipe de auditoria interna está planejando análise de dados-driven trabalho de auditoria. Qual technoregistrarical recurso deve ser prioritized?","options_pt":{"A":"Printed spreadsheets para manual dados revisar.","B":"Norma escritório produtividade software para documentação.","C":"Shared e-mail conta para equipe comunicação durante o trabalho de auditoria.","D":"Specialized auditoria software para analisando grande conjuntos de dados eficientemente."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Análise de dados-driven trabalho de auditorias exigir specialized auditoria software para processo e analisar grande conjuntos de dados eficazmente."},{"id":"M10_U1_Q20","num":20,"total":26,"module":"M10","unit":"U1","topic":"Recursos e Habilidades do Trabalho","question_pt":"Qual das seguintes é mais eficaz maneira para tratar technoregistrarical recurso limitação durante um trabalho de auditoria?","options_pt":{"A":"Reduzir o escopo do trabalho de auditoria para excluir áreas requerendo avançado tecnoregistraria.","B":"Engage um prestador de serviços externo com acesso ao exigido tecnoregistraria.","C":"Adiar o trabalho de auditoria até que o necessário tecnoregistraria é adquirido.","D":"Usar manual processos para concluir o trabalho de auditoria."},"correct":"B","explanation_pt":"Alternativa \"A\" está incorreta. O escopo de um trabalho de auditoria é projetado para tratar específico objetivos e riscos. Reduzindo escopo sem adequado autorização deveria não ser um adequado curso de ação como ele poderia significativamente impacto auditoria objetivos e a garantia ele fornece. Alternativa \"B\" está correta. Como observou não Normas, em situações ondo disponível recursos são inadequado ou insuficiente, o supervisor do trabalho deve escalar a preocupação ao Diretor Executivo de Auditoria para determinar qual ações para tomar para resolve o recurso limitação. Engaging um prestador de serviços externo com acesso ao exigido tecnoregistraria garante o trabalho de auditoria objetivos são met sem compromising qualidade. Este abordagem alinha-se com a Normas, que enfatizar o importance de obtendo adequado recursos. Alternativa \"C\" está incorreta. Atrasando trabalho de auditoria pode não ser viável, especialmente para alto-risco áreas. Alternativa \"D\" está incorreta. Manual processos pode ser ineficiente e poderia compromise a qualidade trabalho de auditoria."},{"id":"M10_U1_Q21","num":21,"total":26,"module":"M10","unit":"U1","topic":"Recursos e Habilidades do Trabalho","question_pt":"O auditores internos são determinando trabalho de auditoria alocação de recursos para um próximo trabalho de auditoria. Qual das seguintes alternativas fatores deve o auditores internos considerar?","options_pt":{"A":"O nível de cooperation expected atividade sob revisão.","B":"O natureza e complexidade trabalho de auditoria.","C":"O nível de importância de anticipated achados.","D":"O risco appetite atividade sob revisão."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. De acordo com a Normas Globais de Auditoria Interna, quando identificando tipos e quantidade de recursos do trabalho, auditores internos deve considerar o natureza e complexidade trabalho de auditoria, o tempo frame dentro de que o trabalho de auditoria é para ser concluído, e se o disponível financeiro, human, e technoregistrarical recursos são adequado e suficiente para atingir o trabalho de auditoria objetivos."},{"id":"M10_U1_Q22","num":22,"total":26,"module":"M10","unit":"U1","topic":"Recursos e Habilidades do Trabalho","question_pt":"Qual das seguintes é o mais crítico fator para considerar quando assembling e alocando recursos humanos para um trabalho de auditoria?","options_pt":{"A":"O habilidades e competencies obrigado meet o trabalho de auditoria objetivos","B":"O profissional desenvolvimento necessidades de auditores internos","C":"A disponibilidade de externo serviço fornecendo","D":"O tempo frame para concluindo trabalho de auditoria"},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. De acordo com a Normas, o habilidades e competencies obrigado meet o trabalho de auditoria objetivos são mais crítico fator quando assembling e alocando recursos humanos. Este inclui técnico conhecimento, language requisitos, e qualquer specialized habilidades necessidade para o trabalho de auditoria. Alternativa \"B\" está incorreta. Profissional desenvolvimento é importante mas secundário para reunião trabalho de auditoria objetivos. Alternativa \"C\" está incorreta. Enquanto externo serviço fornecendo pode ser necessário, eles são considerado apenas se interno recursos são insuficiente para atingir objetivos do trabalho de auditoria. Alternativa \"D\" está incorreta. O tempo frame está agendando consideração, não principal fator em alocação de recursos."},{"id":"M10_U1_Q23","num":23,"total":26,"module":"M10","unit":"U1","topic":"Recursos e Habilidades do Trabalho","question_pt":"Uma equipe de auditoria interna está conduzindo um trabalho de auditoria para um alto-risco área. Midway por meio do trabalho de auditoria, equipe realizes esse o disponível análise de dados software é outdated e não pode tratar o volume de dados. Qual é ação mais adequada ação para o Diretor Executivo de Auditoria para tomar?","options_pt":{"A":"Reduzir o escopo do trabalho de auditoria para excluir dados-intensive áreas.","B":"Adiar o trabalho de auditoria até que novo software é adquirido.","C":"Engage um prestador de serviços externo com acesso para avançado analytics ferramentas.","D":"Prosseguir com o trabalho de auditoria usando manual amostragem técnicas."},"correct":"C","explanation_pt":"Alternativa \"A\" está incorreta. O escopo de um trabalho de auditoria é projetado para tratar específico objetivos e riscos. Reduzindo escopo sem adequado autorização deveria não ser um adequado curso de ação como ele poderia significativamente impacto auditoria objetivos e a garantia ele fornece. Alternativa \"B\" está incorreta. Atrasando trabalho de auditoria pode não ser viável, especialmente para alto-risco áreas. Alternativa \"C\" está correta. Como observou não Normas, em situações ondo disponível recursos são inadequado ou insuficiente, o supervisor do trabalho deve escalar a preocupação ao Diretor Executivo de Auditoria para determinar qual ações para tomar para resolve o recurso limitação. Engaging um prestador de serviços externo com acesso para avançado analytics ferramentas garante o trabalho de auditoria objetivos são met sem compromising qualidade. Este abordagem alinha-se com a Normas. Alternativa \"D\" está incorreta. Manual amostragem técnicas pode não fornecer suficiente garantia para alto-risco áreas."},{"id":"M10_U1_Q24","num":24,"total":26,"module":"M10","unit":"U1","topic":"Recursos e Habilidades do Trabalho","question_pt":"Uma equipe de auditoria interna está planejando um trabalho de auditoria para um alto-risco área. O trabalho de auditoria exige especialização em segurança cibernética, que é não disponível dentro de equipe. O Diretor Executivo de Auditoria está considerando opções para tratar este lacuna. Qual das seguintes é mais adequada curso de ação?","options_pt":{"A":"Reduzir o escopo do trabalho de auditoria para excluir segurança cibernética-relacionado áreas.","B":"Adiar o trabalho de auditoria até que equipe pode ser capacitados em segurança cibernética.","C":"Engage um prestador de serviços externo com segurança cibernética especialização.","D":"Atribuir o trabalho de auditoria ao mais experiente auditor não equipe."},"correct":"C","explanation_pt":"Alternativa \"A\" está incorreta. O escopo de um trabalho de auditoria é projetado para tratar específico objetivos e riscos. Reduzindo escopo sem adequado autorização deveria não ser um adequado curso de ação como ele poderia significativamente impacto auditoria objetivos e a garantia ele fornece. Alternativa \"B\" está incorreta. Fornecendo tempestivo garantia é crucial, especialmente para alto-risco áreas. Treinamento interno auditoria funcionários em segurança cibernética pode ser tempo-consuming, e postponing o trabalho de auditoria até que treinamento é concluído pode significativamente adiar a identificação de potencial riscos. Alternativa \"C\" está correta. Função de auditoria interna pode face recurso limitações, como constraints não disponibilidade de recursos humanos, tempo, orçamento, ou tecnoregistraria, que pode prevenir função de auditoria interna de atingindo trabalho de auditoria objetivos. Engaging um prestador de serviços externo garante o trabalho de auditoria objetivos são met sem compromising qualidade. A Normas enfatizar obtendo adequado recursos, incluindo externo especialização quando necessário. Alternativa \"D\" está incorreta. Designando trabalho de auditoria um experiente auditor sem o exigido especialização poderia compromise a qualidade trabalho de auditoria."},{"id":"M10_U1_Q25","num":25,"total":26,"module":"M10","unit":"U1","topic":"Recursos e Habilidades do Trabalho","question_pt":"A equipe de auditoria interna não possui a especialização necessária para realizar um trabalho de investigação de fraude decorrente de um incidente de denúncia interna. Qual das seguintes é a opção mais adequada para o Diretor Executivo de Auditoria?","options_pt":{"A":"Designar um auditor experiente para o trabalho como oportunidade de desenvolvimento profissional.","B":"Organizar sessões internas de treinamento em investigação de fraude para auditores internos selecionados.","C":"Designar um especialista independente em investigação de fraude para trabalhar com os auditores internos selecionados.","D":"Contratar um novo auditor interno que possua experiência em investigação de fraude."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. A contratação de um especialista independente em investigação de fraude garante a disponibilidade da especialização necessária, permitindo que a equipe de auditoria interna conduza a investigação com qualidade e credibilidade."},{"id":"M10_U1_Q26","num":26,"total":26,"module":"M10","unit":"U1","topic":"Recursos e Habilidades do Trabalho","question_pt":"O auditor em cobrança está planejando um trabalho de auditoria esse inclui o físico exame de um construction projeto. Qual das seguintes é o auditor em cobrança mais provável que considerar quando estimando monetary recursos necessidade para o trabalho de auditoria?","options_pt":{"A":"Tempo spent por auditoria cliente representantes assisting auditores internos durante trabalho de campo.","B":"Análise de dados tecnoregistraria routinely utilizado por auditores internos para concluir o trabalho de auditoria.","C":"Profissional desenvolvimento necessidades interno auditoria funcionários.","D":"Safety equipamento necessidade por auditores internos durante trabalho de campo."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Orçamento pode incluir, além do human recurso custos, o custo de vários non-routine itens necessidade pelo auditor interno fim de realizar seus trabalho (como steel-toed shoes e hard hats para ativos observações)."},{"id":"M2_U1_Q1","num":1,"total":27,"module":"M2","unit":"U1","topic":"Requisitos Temáticos e Objetivos Estratégicos","question_pt":"Qual das seguintes é melhor medir de produtividade para avaliar vários departamentos em um grande varejo store?","options_pt":{"A":"Receita generated per square foot de varejo space.","B":"Average quantidade de produtos restocked cada month per departamento.","C":"Total número de clientes served per funcionário cada day.","D":"Total número de itens sold per departamento per day."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Receita generated per square foot de varejo space é comumente utilizado e eficiente produtividade medir para avaliando desempenho em um varejo ambiente."},{"id":"M2_U1_Q2","num":2,"total":27,"module":"M2","unit":"U1","topic":"Requisitos Temáticos e Objetivos Estratégicos","question_pt":"Qual das seguintes alternativas não crítico componente de coletando relevantee informação para compreensão estratégico objetivos?","options_pt":{"A":"Revisando negócio ou operacional plano para obter percepções em estratégias","B":"Conduzindo discussões com administração para compreender objetivos","C":"Examining da organização anual demonstrações financeiras para de alto nível desempenho financeiro","D":"Analisando processo maps e risco/controle matrices para um overview de operações"},"correct":"C","explanation_pt":"Alternativa \"A\" está incorreta. Revisando negócio ou operacional plano é crítico componente de coletando relevantee informação para compreensão estratégico objetivos, como ele fornece detalhado percepções não estratégias adopted para atingir atividade objetivos. Alternativa \"B\" está incorreta. Conduzindo discussões com administração é principal etapa em compreensão estratégico objetivos como ele permite auditores internos para obter direto percepções não metas e prioridades set por esses responsável por atingindo them. Alternativa \"C\" está correta. Examining da organização anual demonstrações financeiras para alto- nível desempenho financeiro é não crítico componente de coletando relevantee informação eespecíficoamente para compreensão estratégico objetivos. Enquanto demonstrações financeiras fornecer valioso percepções em da organização geral financeiro health, eles fazer não diretamente tratar o estratégico objetivos de específico atividades ou processos. Alternativa \"D\" está incorreta. Analisando processo maps e risco/controle matrices é essencial para compreensão como operações são estruturado e controlled, que é crucial para alinhando-se com estratégico objetivos."},{"id":"M2_U1_Q3","num":3,"total":27,"module":"M2","unit":"U1","topic":"Requisitos Temáticos e Objetivos Estratégicos","question_pt":"Qual das seguintes alternativas melhor descreve um crítico etapa não processo de identificando principal riscos durante planejamento do trabalho?","options_pt":{"A":"Focando apenas em externo riscos","B":"Ignoring riscos que têm baixo financeiro impacto","C":"Categorizing e combining similar risco cenários","D":"Documentando todos potencial riscos sem prioritization"},"correct":"C","explanation_pt":"Alternativa \"A\" está incorreta. focando apenas em externo riscos é não advisable, como ele overlooks interno riscos que poderia também significativamente impacto a organização. Ambos interno e externo riscos deve ser considerado. Alternativa \"B\" está incorreta. Ignoring riscos que têm baixo financeiro impacto pode levar parafalha de revisãode riscos que pode têm significativo não financeiro consequences, como reputational ou operacional impactos. Todos riscos deve ser considerado e avaliado com base em seus potencial impacto e probabilidade. Alternativa \"C\" está correta. Brainstorm sessions pode ser conduzido para identificar potencial risco cenários. Durante brainstorming sessions, categorizing e combining similar risco cenários é crítico etapa em identificando principal processo-nível riscos. Por combining similar cenários, auditores internos pode focar em o mais significativo riscos que poderia impacto achievement de objetivos, garantindo abrangente e eficiente avaliação de riscos processo. Alternativa \"D\" está incorreta. Documentando todos potencial riscos sem prioritization pode levar um overwhelming valor de informação que é difficult para gerenciar. Prioritization é necessário para focar não mais crítico riscos e allocate recursos eficazmente para tratar them."},{"id":"M2_U1_Q4","num":4,"total":27,"module":"M2","unit":"U1","topic":"Requisitos Temáticos e Objetivos Estratégicos","question_pt":"Qual é o objetivo principal de compreensão o estratégico objetivos atividade sob revisão durante planejamento do trabalho?","options_pt":{"A":"Para garantir todos demonstrações financeiras são preciso","B":"Para alinhar procedimentos do trabalho com da organização metas","C":"Para focar exclusivamente em conformidade com regulamentações","D":"Para reduzir o tempo exigido para o trabalho de auditoria"},"correct":"B","explanation_pt":"Alternativa \"A\" está incorreta. Enquanto garantindo a precisão de demonstrações financeiras é importante, ele é não principal propósito de compreensão estratégico objetivos. Em vez este pode ser um trabalho de auditoria objetivo atividade sob revisão, como relatórios financeiros processo. Alternativa \"B\" está correta. O principal propósito de compreensão o estratégico objetivos atividade sob revisão durante planejamento do trabalho é para alinhar procedimentos do trabalho com da organização metas. Por compreensão estes objetivos, auditores internos pode garantir esse o trabalho de auditoria é focado em áreas que são crítico para da organização success e esse o trabalho de auditoria procedimentos são projetado para avaliar eficácia de processos em atingindo estes estratégico metas. Alternativa \"C\" está incorreta. focando exclusivamente em conformidade com regulamentações é too restrito focar. compreensão estratégico objetivos envolve broader perspective esse inclui, mas é não limitado para, conformidade. Alternativa \"D\" está incorreta. Reduzindo tempo exigido para o trabalho de auditoria é não principal propósito de compreensão estratégico objetivos."},{"id":"M2_U1_Q5","num":5,"total":27,"module":"M2","unit":"U1","topic":"Requisitos Temáticos e Objetivos Estratégicos","question_pt":"Qual das seguintes é um exemplo de uma eficiência medir?","options_pt":{"A":"Taxa de ausenteeeism.","B":"Número de insurance claims processado per day.","C":"Taxa de cliente reclamações.","D":"Meta de becoming leading manufacturer."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Eficiência mede focar em saídas atingido em relation para entradas utilizado, como número de claims processado per day, que diretamente reflects o operacional eficiência de um processo."},{"id":"M2_U1_Q6","num":6,"total":27,"module":"M2","unit":"U1","topic":"Requisitos Temáticos e Objetivos Estratégicos","question_pt":"Não(a) contexto de planejamento do trabalho, Qual é o objetivo principal de aplicando tópico requisitos?","options_pt":{"A":"Para focar exclusivamente em relatórios financeiros riscos","B":"Para aprimorar o consistency e qualidade de interno auditoria serviços","C":"Para fornecer abrangente lista de verificação para todos auditoria atividades","D":"Para garantir todos trabalho de auditorias são concluído dentro de orçamento"},"correct":"B","explanation_pt":"Alternativa \"A\" está incorreta. tópico requisitos cover range de riscos, não just relatórios financeiros. Alternativa \"B\" está correta. tópico requisitos são one componentes internacional profissional prática estrutura, que também inclui a Normas Globais de Auditoria Interna. Quando uma função de auditoria interna fornece garantia em um específico risco área covered sob tópico requisitos, auditores internos deve acompanhar estes requisitos, incluindo aplicando them durante planejamento do trabalho. Áreas covered sob tópico requisitos incluir (ou irá incluir) segurança cibernética, culture, terceiros, e negócio resiliência. tópico requisitos são projetado para enhance o consistency e qualidade de interno auditoria serviços relacionado específico auditoria subjects. Alternativa \"C\" está incorreta. tópico requisitos são não abrangente listas de verificação. Alternativa \"D\" está incorreta. Orçamento considerações são importante mas são não propósito de tópico requisitos."},{"id":"M2_U1_Q7","num":7,"total":27,"module":"M2","unit":"U1","topic":"Requisitos Temáticos e Objetivos Estratégicos","question_pt":"Como fazer estratégico objetivos integrar com gestão de riscos em uma organização?","options_pt":{"A":"Por incorporando risco considerações em estratégico planejando","B":"Por aligning apetite ao risco com estratégico metas","C":"Por garantindo todos riscos são eliminated","D":"Por focando apenas em financeiro riscos"},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Estratégico objetivos integrar com gestão de riscos por incorporando risco considerações em todo etapa de estratégico planejando. Este abordagem garante esse riscos são identificado, avaliado, e gerenciado ao longo do estratégico planejando processo, aligning da organização risco profile com seu estratégico metas. Por embedding gestão de riscos em estratégico planejando, organizações pode proativamente tratar potencial ameaças e oportunidades, garantindo esse estratégico objetivos são realista e alcançável dentro do contexto da organização risco ambiente. Alternativa \"B\" está incorreta. Enquanto aligning apetite ao risco com estratégico metas é importante, ele é não principal maneira estratégico objetivos integrar com gestão de riscos. A integração envolve broader processo de incorporando risco considerações em estratégico planejando. Alternativa \"C\" está incorreta. Garantindo todos riscos são eliminated é não viável ou prático. Gestão de riscos aims para identificar, avaliar, e mitigar riscos um acceptable nível, não para eliminar them entirely, como alguns nível de risco é inherent em todos negócio atividades. Alternativa \"D\" está incorreta. O focar de integrating estratégico objetivos com gestão de riscos é broader fazer que just financeiro riscos. Eficaz gestão de riscos considera amplo range de riscos, incluindo operacional, estratégico, conformidade, e reputational riscos, para garantir abrangente integração com estratégico objetivos."},{"id":"M2_U1_Q8","num":8,"total":27,"module":"M2","unit":"U1","topic":"Requisitos Temáticos e Objetivos Estratégicos","question_pt":"Qual é o principal benefit de usando balanced scorecard em desempenho administração?","options_pt":{"A":"Ele prioritizes curto prazo gains sobre longo prazo objetivos","B":"Ele eliminates o necessidade para outro desempenho measurement ferramentas","C":"Ele foca principalmente em desempenho financeiro","D":"Ele fornece abrangente visão de organizacional desempenho em toda múltiplos dimensions"},"correct":"D","explanation_pt":"Alternativa \"A\" está incorreta. O balanced scorecard foca em ambos curto prazo e longo- termo objetivos. Alternativa \"B\" está incorreta. O balanced scorecard complements outro desempenho measurement ferramentas e faz não eliminar o necessidade para outro desempenho measurement ferramentas. Alternativa \"C\" está incorreta. O balanced scorecard inclui ambos financeiro e non- financeiro mede. Alternativa \"D\" está correta. O balanced scorecard gathers informação em múltiplos dimensions de de uma organização desempenho. O principal benefit de usando balanced scorecard é esse ele fornece abrangente visão de organizacional desempenho em toda múltiplos dimensions, incluindo financeiro, cliente, interno processos, e learning e crescimento."},{"id":"M2_U1_Q9","num":9,"total":27,"module":"M2","unit":"U1","topic":"Requisitos Temáticos e Objetivos Estratégicos","question_pt":"Qual das seguintes alternativas melhor descreve o principal papel de desempenho mede em uma organização?","options_pt":{"A":"Para acompanhar e avaliar da organização progresso em direção a atingindo seu estratégico objetivos","B":"Para garantir conformidade com regulatório requisitos","C":"Para replace demonstrações financeiras como principal fonte de desempenho dados","D":"Para focar em curto prazo financeiro gains"},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. O principal papel de desempenho mede é para acompanhar e avaliar da organização progresso em direção a atingindo seu estratégico objetivos, fornecendobasepara informado decisão-tomada e estratégico alinhamento. Alternativa \"B\" está incorreta. Desempenho mede são não um eficaz ferramenta para garantir conformidade com regulatório requisitos. Alternativa \"C\" está incorreta. Desempenho mede complement demonstrações financeiras por fornecendo adicional percepções em organizacional desempenho. Alternativa \"D\" está incorreta. Desempenho mede deve focar em ambos curto prazo e longo prazo objetivos, e não curto prazo financeiro gains."},{"id":"M2_U1_Q10","num":10,"total":27,"module":"M2","unit":"U1","topic":"Requisitos Temáticos e Objetivos Estratégicos","question_pt":"Como pode desempenho appraisals contribute para eficaz desempenho administração?","options_pt":{"A":"Por priorizando financeiro resultados sobre funcionário crescimento","B":"Por eliminating o necessidade para regular retorno","C":"Por linking job desempenho ao reward sistema e facilitando funcionário desenvolvimento","D":"Por focando exclusivamente em passado desempenho"},"correct":"C","explanation_pt":"Alternativa \"A\" está incorreta. Desempenho appraisals deve saldo financeiro resultados com funcionário crescimento e desenvolvimento e não priorizar financeiro resultados sobre funcionário crescimento. Alternativa \"B\" está incorreta. Regular retorno é essencial para contínuo melhoria e desenvolvimento, e portanto, não pode ser eliminated. Alternativa \"C\" está correta. Desempenho appraisals são utilizado para link job desempenho ao reward sistema. Desempenho appraisals contribute para eficaz desempenho administração por linking job desempenho ao reward sistema e facilitando funcionário desenvolvimento, garantindo alinhamento com organizacional objetivos. Alternativa \"D\" está incorreta. Desempenho appraisals deve focar em ambos passado desempenho e futuro desenvolvimento, e não just passado desempenho."},{"id":"M2_U1_Q11","num":11,"total":27,"module":"M2","unit":"U1","topic":"Requisitos Temáticos e Objetivos Estratégicos","question_pt":"Qual é o principal focar de um balanced scorecard?","options_pt":{"A":"Sistemas.","B":"Estratégia.","C":"Funcionários.","D":"Estrutura."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Balanced scorecard é principalmente concerned com estratégia, examining vários perspectives para alinhar organizacional metas com desempenho measurement."},{"id":"M2_U1_Q12","num":12,"total":27,"module":"M2","unit":"U1","topic":"Requisitos Temáticos e Objetivos Estratégicos","question_pt":"Qual das seguintes alternativas melhor descreve a integração de estratégico objetivos com desempenho measurement?","options_pt":{"A":"Usando principalmente histórico dados para avaliar desempenho","B":"Focando principalmente em desempenho financeiro métricas","C":"Minimizing qualitative mede em desempenho avaliação","D":"Estabelecendo KPIs para acompanhar progresso towards estratégico metas"},"correct":"D","explanation_pt":"Alternativa \"A\" está incorreta. Ambos histórico e atual dados deve ser utilizado em desempenho avaliação. Usando principalmente histórico dados para avaliar desempenho limita o capacidade para fazer proativo ajustes e melhorias. Enquanto histórico dados fornece valioso percepções, eficaz desempenho measurement deve também incorporar forward-looking métricas e tempo real dados para garantir alinhamento com estratégico objetivos e tempestivo decisão-tomada. Alternativa \"B\" está incorreta. focando principalmente em desempenho financeiro métricas é too restrito uma abordagem. Enquanto financeiro métricas são importante, eficaz desempenho measurement deve incluir balanced mix de financeiro e não financeiro métricas para fornecer abrangente visão de progresso towards estratégico objetivos. Alternativa \"C\" está incorreta. Minimizing qualitative mede em desempenho avaliação overlooks importante aspectos de desempenho esse não pode ser registrard por quantitative métricas sozinho. Qualitative mede são também importante para um holistic compreensão de desempenho e seu alinhamento com estratégico objetivos. Alternativa \"D\" está correta. Estabelecendo indicadores-chave de desempenho (KPIs) para acompanhar progresso towards estratégico metas é o melhor descrição de integrating estratégico objetivos com desempenho measurement. KPIs são de alto nível métricas esse fornecer resumo de principal accomplishments ou comportamentos valued pela organização ou negócio função para atender a seu objetivos. Eles são utilizado para acompanhar da organização ou negócio função progresso em direção a seu metas."},{"id":"M2_U1_Q13","num":13,"total":27,"module":"M2","unit":"U1","topic":"Requisitos Temáticos e Objetivos Estratégicos","question_pt":"Qual das seguintes é um recomendado abordagem para identificando risco cenários durante planejamento do trabalho?","options_pt":{"A":"Focando exclusivamente em financeiro riscos","B":"Conduzindo brainstorming sessions com processo pessoal","C":"Revisando apenas histórico dados","D":"Consultoria auditores externos exclusivamente"},"correct":"B","explanation_pt":"Alternativa \"A\" está incorreta. Risco cenários deve abranger variety de riscos, não just financeiro riscos. focando exclusivamente em financeiro riscos limita o escopo de risco identificação. Alternativa \"B\" está correta. Conduzindo brainstorming sessions com pessoal envolvido não processo é recomendado abordagem para identificando potencial risco cenários, como ele maximizes o saída por aproveitando seus percepções e experiences. Alternativa \"C\" está incorreta. Enquanto histórico dados é útil, ele deve não ser o sole focar. histórico dados deve ser one de vários entradas em um abrangente risco identificação processo. Alternativa \"D\" está incorreta. Auditores externos fornecer valioso entrada, mas consultoria com them deve não ser o exclusive método para identificando risco cenários."},{"id":"M2_U1_Q14","num":14,"total":27,"module":"M2","unit":"U1","topic":"Requisitos Temáticos e Objetivos Estratégicos","question_pt":"Que perspective balanced scorecard foca em da organização interno processos?","options_pt":{"A":"Learning e crescimento","B":"Financeiro Perspective","C":"Interno processos de negócio","D":"Cliente Perspective"},"correct":"C","explanation_pt":"Alternativa \"A\" está incorreta. O learning e crescimento perspective foca em da organização recursos humanos e desenvolvimento, não da organização interno processos. Alternativa \"B\" está incorreta. O financeiro perspective foca em desempenho financeiro métricas, não da organização interno processos. Alternativa \"C\" está correta. O balanced scorecard gathers informação em múltiplos dimensions de de uma organização desempenho. Ele inclui nonfinancial e financeiro informação e analisa informação seguinte four perspectives: financeiro, cliente, interno processos, e learning e crescimento. O interno processos de negócio perspective balanced scorecard foca em da organização interno processos, avaliando seus eficiência e eficácia em delivering produtos e serviços. Alternativa \"D\" está incorreta. O cliente perspective foca em cliente satisfaction e retention, não da organização interno processos."},{"id":"M2_U1_Q15","num":15,"total":27,"module":"M2","unit":"U1","topic":"Requisitos Temáticos e Objetivos Estratégicos","question_pt":"Quando avaliando eficácia de desempenho mede, que fator é mais crítico?","options_pt":{"A":"O número de desempenho mede em usar","B":"O custo de implementando desempenho mede","C":"O alinhamento de desempenho mede com estratégico objetivos","D":"O histórico dados utilizado em desempenho mede"},"correct":"C","explanation_pt":"Alternativa \"A\" está incorreta. O número de desempenho mede é não crítico fator quando avaliando seus eficácia. Alternativa \"B\" está incorreta. Enquanto custo é consideração, ele deve não ser consideração não eficácia de desempenho mede. Alternativa \"C\" está correta. O alinhamento de desempenho mede com estratégico objetivos é crítico para garantir esse eles eficazmente refletir da organização desempenho em atingindo seu metas. Este alinhamento ajuda em priorizando esforços e recursos. Alternativa \"D\" está incorreta. histórico dados é útil mas é não mais crítico fator quando avaliando eficácia de desempenho mede."},{"id":"M2_U1_Q16","num":16,"total":27,"module":"M2","unit":"U1","topic":"Requisitos Temáticos e Objetivos Estratégicos","question_pt":"Serviço organização reorganizes seu districts e constata que ele pode agora tratar indagações com fewer recursos humanos fazer que seu usual Normas. Que tipo de Normas poderia necessidade para ser atualizado?","options_pt":{"A":"Benchmarking.","B":"Tarefa análise.","C":"Eficiência.","D":"Eficácia."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Eficiência Normas avaliar como recursos são utilized em relation para saídas, e se fewer recursos são exigido para o mesmo ou melhor resultados, então estes Normas pode necessidade atualizando para refletir melhorado operacional desempenho."},{"id":"M2_U1_Q17","num":17,"total":27,"module":"M2","unit":"U1","topic":"Requisitos Temáticos e Objetivos Estratégicos","question_pt":"Um auditor interno é incumbido de revisando departamento estratégico objetivos. Qual das seguintes alternativas documentara deveria ser mais útil para compreensão estes objetivos?","options_pt":{"A":"Fazer departamento orçamento relatório","B":"Fazer departamento funcionário handbook","C":"Fazer departamento negócio ou operacional plano","D":"Da organização anual demonstrações financeiras"},"correct":"C","explanation_pt":"Alternativa \"A\" está incorreta. Fazer departamento orçamento relatórios focar em financials, não estratégico objetivos. Enquanto ele fornece informação em financeiro recursos, ele faz não oferecer detalhado visão de estratégico objetivos ou a estratégias para atingir them. Alternativa \"B\" está incorreta. Funcionário handbooks tipicamente focar em políticas, procedimentos, e diretrizes para funcionários. O handbooks fazer não fornecer informação em estratégico objetivos ou fazer departamento planos para atingir them. Alternativa \"C\" está correta. Fazer departamento negócio ou operacional plano é o mais útil documentar para compreensão fazer departamento estratégico objetivos. Este plano outlines a estratégias e ações o departamento pretende para implementar para atingir seu metas e objetivos. Ele fornece detalhado percepções em fazer departamento prioridades, initiatives, e como estes alinhar-se com o broader organizacional objetivos. Por revisando negócio ou operacional plano, O auditor interno pode obter abrangente compreensão de fazer departamento estratégico direction e como ele planos para atingir seu objetivos. Alternativa \"D\" está incorreta. Anual demonstrações financeiras fornecer de alto nível overview da organização desempenho financeiro e position. Demonstrações financeiras fazer não eespecíficoamente tratar o estratégico objetivos de indivíduo departamentos ou o detalhado planos para atingir them."},{"id":"M2_U1_Q18","num":18,"total":27,"module":"M2","unit":"U1","topic":"Requisitos Temáticos e Objetivos Estratégicos","question_pt":"Qual das seguintes alternativas questions é mais adequado para auditores internos para ask quando avaliando desenho de desempenho mede?","options_pt":{"A":"São desempenho mede focused principalmente em financeiro resultados?","B":"Fazer o desempenho mede fornecer tempestivo e relevantee informação?","C":"São desempenho mede estabelecido sem parte interessada entrada?","D":"Fazer o desempenho mede cover todos possível negócio atividades?"},"correct":"B","explanation_pt":"Alternativa \"A\" está incorreta. Desempenho mede deve incluir ambos financeiro e non- financeiro resultados, não just financeiro resultados. Alternativa \"B\" está correta. Para avaliar o desenho de desempenho mede durante planejamento do trabalho, auditores internos pode considerar múltiplos fatores. Para caso, auditores internos deve avaliar se desempenho mede fornecer tempestivo e relevantee informação para garantir eles são eficaz em guiding decisão-tomada e melhorias. Alternativa \"C\" está incorreta. Parte interessada entrada é importante para garantir o mede são relevantee e alinhado com estratégico objetivos. Alternativa \"D\" está incorreta. Desempenho mede deve focar em principal áreas esse alinhar-se com estratégico objetivos, e não necessarily todos negócio atividades."},{"id":"M2_U1_Q19","num":19,"total":27,"module":"M2","unit":"U1","topic":"Requisitos Temáticos e Objetivos Estratégicos","question_pt":"Qual das seguintes é um principal característica de eficaz indicadores-chave de desempenho (KPIs)?","options_pt":{"A":"Eles focar principalmente em financeiro métricas","B":"Eles são alinhado com da organização estratégico objetivos","C":"Eles são principalmente qualitative em natureza","D":"Eles são estabelecido sem entrada de administração"},"correct":"B","explanation_pt":"Alternativa \"A\" está incorreta. Enquanto financeiro métricas são importante, KPIs deve abranger ambos financeiro e não financeiro aspectos para fornecer abrangente visão de desempenho. Alternativa \"B\" está correta. Eficaz KPIs são alinhado com da organização estratégico objetivos, garantindo esse eles fornecer meaningful percepções em da organização progresso em direção a seu metas. Este alinhamento ajuda em tracking desempenho e tomada informado decisões. Alternativa \"C\" está incorreta. KPIs pode ser ambos quantitative e qualitative, dependendo em qual aspectos de desempenho eles são projetado para medir. Alternativa \"D\" está incorreta. Entrada de administração é crucial em estabelecendo KPIs para garantir eles são relevantee e alinhado com estratégico prioridades."},{"id":"M2_U1_Q20","num":20,"total":27,"module":"M2","unit":"U1","topic":"Requisitos Temáticos e Objetivos Estratégicos","question_pt":"Qual das seguintes alternativas não consideração para auditores internos quando determinando controles-chave?","options_pt":{"A":"Considerando impacto de one controle em outro controles, especialmente quando execução de one controle influencia o execução de outro controles","B":"Garantindo esse todos identificado controles são testado para eficácia operacional, independentemente de seus importância","C":"Considerando efeito de entidade-nível controles em processo-nível controles, especialmente quando deficiências em entidade-nível controles pode reduzir eficácia de processo- nível controles","D":"Avaliando consequences de inadequado controle execução para determinar se um controle deficiência deveria significativamente impair objetivo achievement"},"correct":"B","explanation_pt":"Alternativa \"A\" está incorreta. Considerando impacto de one controle em outro controles é importante, como ele ajuda compreender como controles interact e influenciar cada outro, que é crucial para eficaz gestão de riscos. Alternativa \"B\" está correta. Garantindo esse todos identificado controles são testado para eficácia operacional, independentemente de seus importância, é não consideração quando determinando controles-chave. Auditores internos focar em identificando e testando controles-chave que são crítico para mitigando significativo riscos e atingindo processo-nível objetivos, em vez de testando todos controles indiscriminately. Alternativa \"C\" está incorreta. Considerando efeito de entidade-nível controles em processo-nível controles é válido consideração, como deficiências não entidade nível pode affect eficácia de controles não processo nível. Alternativa \"D\" está incorreta. Avaliando consequences de inadequado controle execução é principal consideração, como ele ajuda determinar o importância de uma deficiência de controle e seu impacto em atingindo objetivos."},{"id":"M2_U1_Q21","num":21,"total":27,"module":"M2","unit":"U1","topic":"Requisitos Temáticos e Objetivos Estratégicos","question_pt":"Qual das seguintes alternativas melhor descreve um principal etapa em identificando estratégico objetivos para um interno trabalho de auditoria?","options_pt":{"A":"Entrevistaring externo partes interessadas","B":"Focando em passado relatórios de auditoria","C":"Discutindo com administração para compreender objetivos","D":"Revisando apenas financeiro documentara"},"correct":"C","explanation_pt":"Alternativa \"A\" está incorreta. entrevistaring externo partes interessadas pode fornecer adicional contexto, mas ele é não principal método para identificando interno estratégico objetivos. Enquanto externo entrada pode ser valioso, interno discussões são principal. Alternativa \"B\" está incorreta. Passado relatórios são útil para identificando histórico questões e tendências, mas eles fazer não diretamente tratar o atual estratégico objetivos. Alternativa \"C\" está correta. Discutindo com administração para compreender objetivos é principal etapa em identificando estratégico objetivos para um interno trabalho de auditoria. Ele ajuda auditores internos para obter percepções diretamente de esses responsável por definindo e atingindo da organização estratégico metas. Por engaging em discussões com administração, auditores internos pode esclarecer os objetivos, compreender o rationale atrás them, e garantir esse o trabalho de auditoria alinha-se com da organização estratégico direction. Este etapa é crucial para tailoring o trabalho de auditoria para tratar o mais relevantee riscos e oportunidades relacionado estratégico objetivos. Alternativa \"D\" está incorreta. Enquanto financeiro documentara pode fornecer valioso informação, relying exclusivamente em them faz não oferecer abrangente compreensão de estratégico objetivos. Estratégico objetivos abranger mais fazer que just financeiro métricas e exigir broader perspective."},{"id":"M2_U1_Q22","num":22,"total":27,"module":"M2","unit":"U1","topic":"Requisitos Temáticos e Objetivos Estratégicos","question_pt":"Quando planejando um trabalho de auditoria, Qual das seguintes é um principal consideração para aplicando tópico requisitos?","options_pt":{"A":"Focando apenas em riscos discussed não tópico requisitos","B":"Recognizing o específico auditoria topics esse exigir obrigatório tópico requisitos","C":"Aplicando mesmo tópico requisitos para todos trabalho de auditorias","D":"Garantindo todos auditoria áreas são incluído independentemente de risco nível"},"correct":"B","explanation_pt":"Alternativa \"A\" está incorreta. Enquanto tópico requisitos focar em específico riscos, eles são não limitado para apenas esses riscos. Eles fornecer estrutura para tratando range de questões dentro do identificado auditoria topics, e focando exclusivamente não riscos discussed não requisitos deveria overlook outro relevantee considerações. Alternativa \"B\" está correta. De acordo com o internacional profissional práticas estrutura (IPPF), tópico requisitos são obrigatório para certain auditoria topics identificado não plano de auditoria, garantindo esse crítico elementos são tratado e fornecendo baseline para trabalho de auditoria desempenho. Recognizing o específico auditoria topics esse exigir obrigatório tópico requisitos é crucial porque estes requisitos são projetado para enhance o consistency e qualidade de interno auditoria serviços relacionado específico auditoria subjects. Alternativa \"C\" está incorreta. tópico requisitos são não universally aplicável para todos trabalho de auditorias. Eles são específico para certain topics identificado não plano de auditoria, e aplicando them indiscriminately deveria não alinhar-se com seus pretendido propósito. Alternativa \"D\" está incorreta. Não todos auditoria áreas exigir tópico requisitos; eles são aplicado com base em risco e relevância para específico auditoria topics. Aplicando them para todos áreas independentemente de risco deveria ser ineficiente e desnecessário."},{"id":"M2_U1_Q23","num":23,"total":27,"module":"M2","unit":"U1","topic":"Requisitos Temáticos e Objetivos Estratégicos","question_pt":"Que tipo de administração abordagem é demonstrated por um gestor quem foca em atingindo organizacional metas sobre conserving recursos, especialmente em urgente situações?","options_pt":{"A":"Demonstrating incompetência em recurso usar.","B":"Usando meta-driven administração style.","C":"Focando em eficiência sobre eficácia.","D":"Priorizando eficácia sobre recursos."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Priorizando eficácia sobre recursos enfatizars atingindo desired resultados em situações onde urgency necessitates priorizando metas sobre eficiência."},{"id":"M2_U1_Q24","num":24,"total":27,"module":"M2","unit":"U1","topic":"Requisitos Temáticos e Objetivos Estratégicos","question_pt":"Qual é melhor qualitative indicador-chave de desempenho (KPI) para tratar eficácia de trouble ticket processamento?","options_pt":{"A":"O número de tech apoiar tickets resolved.","B":"O conclusão taxa de submitted tickets.","C":"O tempo ele takes para resolve tech apoiar tickets.","D":"O satisfaction de usuários com tech apoiar."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Satisfação fazer usuário é o melhor qualitative KPI para avaliando eficácia de tech apoiar serviços porque ele fornece percepção em como well apoiar meets usuário expectativas e necessidades. Quantitative métricas, like ticket conclusão rates ou resolução tempo, são menos adequado para qualitative análise."},{"id":"M2_U1_Q25","num":25,"total":27,"module":"M2","unit":"U1","topic":"Requisitos Temáticos e Objetivos Estratégicos","question_pt":"Qual das seguintes alternativas não um exemplo de um \"causa e efeito\" protocolo para definir processo-nível risco?","options_pt":{"A":"Determinando esse o incapacidade para processo pagamentos não prazo pode causa tardio pagamento penalidades","B":"Recognizing esse falha para attract competente pessoal pode resultado em inadequado tarefa handling","C":"Documentando todos riscos em um standardized formato para consistency","D":"Identificando falta de eficaz lógico segurança controles leading para não autorizado dados acesso"},"correct":"C","explanation_pt":"Alternativa \"A\" está incorreta. Determinando esse o incapacidade para processo pagamentos não prazo pode causa tardio pagamento penalidades é um exemplo de um \"causa e efeito\" relação, onda causa (incapacidade para processo pagamentos) leads um efeito (penalidades). Alternativa \"B\" está incorreta. Recognizing esse falha para attract competente pessoal pode resultado em inadequado tarefa handling é outro exemplo de um \"causa e efeito\" relação, onda causa (falha para attract pessoal) leads um efeito (inadequado handling). Alternativa \"C\" está correta. Documentando todos riscos em um standardized formato para consistency é não um exemplo de um \"causa e efeito\" protocolo. o \"causa e efeito\" protocolo foca em identificando root causes de potencial questões e seus impactos, em vez de standardizing documentação formats. Alternativa \"D\" está incorreta. Identificando falta de eficaz lógico segurança controles leading para não autorizado dados acesso é claro exemplo de um \"causa e efeito\" relação, onda causa (falta de controles) leads um efeito (não autorizado acesso)."},{"id":"M2_U1_Q26","num":26,"total":27,"module":"M2","unit":"U1","topic":"Requisitos Temáticos e Objetivos Estratégicos","question_pt":"Que elemento é não tipicamente incluído não tópico requisitos para planejamento do trabalho?","options_pt":{"A":"Obrigatório avaliação de governança processos","B":"Documentação de escopo limitações","C":"Obrigatório avaliação de controle processos","D":"Nonmandatory considerações para implementação"},"correct":"B","explanation_pt":"Alternativa \"A\" está incorreta. Obrigatório avaliação de governança processos é principal componente de tópico requisitos, como eles são projetado para garantir esse crítico elementos de governança, gestão de riscos, e controle processos são avaliado consistentemente em toda trabalho de auditorias. Alternativa \"B\" está correta. tópico requisitos são one componentes internacional profissional prática estrutura, que também inclui a Normas Globais de Auditoria Interna. documentação de escopo limitações é não tipicamente incluído não tópico requisitos themselves. Enquanto escopo limitações são importante para documentar durante planejamento do trabalho, eles são não componente tópico requisitos, que focar em garantindo consistency e qualidade em interno auditoria serviços para específico auditoria topics, como segurança cibernética. Alternativa \"C\" está incorreta. Obrigatório avaliação de controle processos é principal componente de tópico requisitos, como eles são projetado para garantir esse crítico elementos de governança, gestão de riscos, e controle processos são avaliado consistentemente em toda trabalho de auditorias. Alternativa \"D\" está incorreta. Nonmandatory considerações para implementação são incluído em tópico requisitos para aid auditores internos em aplicando obrigatório requisitos eficazmente. Estes considerações fornecer orientação em como para implementar os requisitos em vários contextos."},{"id":"M2_U1_Q27","num":27,"total":27,"module":"M2","unit":"U1","topic":"Requisitos Temáticos e Objetivos Estratégicos","question_pt":"Qual é o primeiro etapa em estabelecendo um processo para medir interno auditoria eficácia e eficiência?","options_pt":{"A":"Definir eficácia e eficiência claramente.","B":"Desenvolver indicadores-chave de desempenho (KPIs) para eficácia.","C":"Implementar achados e resultados processo.","D":"Identificar principal interno e externo partes interessadas."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Definindo eficácia e eficiência é o identificadoational etapa porque ele estabelece estrutura sobre que adicional measurement ferramentas, como KPIs, são desenvolvido. Sem este clarity, subsequente etapas pode falta focar ou relevância."},{"id":"M2_U2_Q1","num":1,"total":30,"module":"M2","unit":"U2","topic":"Opções Tecnológicas","question_pt":"Qual das seguintes alternativas melhor descreve a função de auditoria expert sistemas em interno auditoria?","options_pt":{"A":"Fornecendo tempo real atualiza não status de abrir achados","B":"Monitorando dados em real tempo para sinalizar anomalias","C":"Avaliando riscos, identificando potencial questões, e priorizando controles e áreas para o trabalho de auditoria","D":"Automatizando repetitivo, regra-baseado tarefas"},"correct":"C","explanation_pt":"Alternativa \"A\" está incorreta. Fornecendo tempo real atualiza não status de abrir achados descreve função de painéis de controle. Alternativa \"B\" está incorreta. Monitorando dados em real tempo para sinalizar anomalias descreve função de módulos de auditoria integrados. Alternativa \"C\" está correta. Auditoria expert sistemas são uma decisão apoiar ferramenta para ajudar auditores internos em vários atividades como avaliando riscos, identificando potencial questões e red flags, e priorizando controles e áreas para trabalho de auditoria. Eles são projetado para mimic decisão tomada de um auditor interno. Expert sistemas enhance interno auditoria por automatizando routine tarefas e offering estruturado estrutura para decisão tomada. Alternativa \"D\" está incorreta. automatizando repetitivo, regra-baseado tarefas descreve função de automação robótica de processos (RPA)."},{"id":"M2_U2_Q2","num":2,"total":30,"module":"M2","unit":"U2","topic":"Opções Tecnológicas","question_pt":"Que tecnoregistraria pode auditores internos usar para simulate testar cenários e avaliar eficácia de controles?","options_pt":{"A":"Automação robótica de processos (RPA)","B":"Painéis de controle","C":"Inteligência artificial (IA)","D":"Monitoramento contínuo"},"correct":"C","explanation_pt":"Alternativa \"A\" está incorreta. Automação robótica de processos (RPA) é utilizado para automatizando repetitivo, regra-baseado tarefas, não para simulating testar cenários e avaliando eficácia de controles. Alternativa \"B\" está incorreta. Painel de controle é visual esse displays pertinent informação ao usuário. Painéis de controle são utilizado para relatórioar resultados e atualizar administração não status de abrir questões, não para simulate testar cenários e avaliar eficácia de controles. Alternativa \"C\" está correta. Inteligência artificial (IA) refers ao usar de sistemas de informação esse mirror human intelligence. AI pode analisar grande conjuntos de dados, identificar padrões, e simulate vários cenários para testar como controles realizar sob diferente condições. Auditores internos pode usar AI para simulate testar cenários e avaliar eficácia de controles. Alternativa \"D\" está incorreta. Monitoramento contínuo é utilizado para tempo realfalha de revisãode processos de negócio e controles, não para simulating testar cenários e avaliando eficácia de controles."},{"id":"M2_U2_Q3","num":3,"total":30,"module":"M2","unit":"U2","topic":"Opções Tecnológicas","question_
