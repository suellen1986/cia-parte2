ation_pt":"Alternativa \"A\" está correta. Avaliação critérios que são mais relevantee para o trabalho de auditoria representa o desired declarar atividade sob revisão e deve ser específico e prático. Adequado critérios fornecido não Normas incluir interno critérios, externo critérios, authoritative orientação, estabelecido organizacional práticas, expectativas com base não desenho de um controle, e procedimentos que pode não ser formalmente documentarado. Interno avaliação critérios incluir organizacional políticas e procedimentos, como eles representa o desired declarar atividade sob revisão. Alternativa \"B\" está incorreta. Regulatório requisitos são externo avaliação critérios, não interno critérios. Alternativa \"C\" está incorreta. Profissional Normas são authoritative orientação, não interno critérios. Alternativa \"D\" está incorreta. Setor parâmetros de referência são externo avaliação critérios, não interno critérios."},{"id":"M4_U2_Q2","num":2,"total":25,"module":"M4","unit":"U2","topic":"Critérios de Avaliação e Condições Existentes","question_pt":"Qual das seguintes alternativas melhor descreve o propósito de avaliação critérios em um interno trabalho de auditoria?","options_pt":{"A":"Para definir o desired declarar atividade sob revisão","B":"Para documentar o histórico condições atividade","C":"Para identificar o root causes de desvios","D":"Para priorizar trabalho de auditoria achados com base em seus importância"},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. De acordo com a Normas, avaliação critérios são definido como \"específicoations desired declarar atividade sob revisão.\" avaliação critérios que são mais relevantee para o trabalho de auditoria representa o desired declarar atividade sob revisão e deve ser específico e prático. Alternativa \"B\" está incorreta. histórico condições são parte evidências gathered durante o trabalho de auditoria, não a avaliação critérios. Alternativa \"C\" está incorreta. Causa-raiz análise é realizado após identificando desvios de avaliação critérios, não como parte de definindo avaliação critérios. Avaliação critérios são determinado durante fase de planejamento trabalho de auditoria e utilizado não testando e avaliação fase trabalho de auditoria para reach conclusões. Alternativa \"D\" está incorreta. Priorizando achados é parte de appraising seus importância, não descrição de avaliação critérios. Avaliação critérios são determinado durante fase de planejamento trabalho de auditoria e utilizado não testando e avaliação fase trabalho de auditoria para reach conclusões."},{"id":"M4_U2_Q3","num":3,"total":25,"module":"M4","unit":"U2","topic":"Critérios de Avaliação e Condições Existentes","question_pt":"Um auditor interno está revisando estoque administração processo e constata que estoque registros são frequentemente inaccurate. A avaliação critérios exigir preciso registros para ser mantido. Qual das seguintes alternativas root causes é mais provável responsável por este desvio?","options_pt":{"A":"Overly strict avaliação critérios","B":"Insuficiente evidências para apoiar o achado","C":"Inadequado funcionários treinamento em estoque procedimentos","D":"Falta de formal avaliação critérios"},"correct":"C","explanation_pt":"Alternativa \"A\" está incorreta. Os critérios são não overly strict e são razoável para garantindo adequado estoque administração. Alternativa \"B\" está incorreta. As evidências (i.e., inaccurate registros) apoia o achado. Assim, insuficiente evidências é não a causa-raiz. Alternativa \"C\" está correta. Causa-raiz análise (RCA) ajuda auditores internos constatar o fundamental reasons para desvios de avaliação critérios. Este método garante esse auditores internos tratar o actual problemas em vez de just o symptoms problemas, leading para eficaz e lasting soluções. Inadequado funcionários treinamento é comum causa-raiz de inaccurate estoque registros, como ele diretamente impactos conformidade com o critérios. Alternativa \"D\" está incorreta. O cenário indica esse critérios exist mas são não sendo met. Assim, falta de formal avaliação critérios é não a causa-raiz."},{"id":"M4_U2_Q4","num":4,"total":25,"module":"M4","unit":"U2","topic":"Critérios de Avaliação e Condições Existentes","question_pt":"Qual das seguintes alternativas melhor descreve o propósito de árvore de falhas análise (FTA) em interno auditoria?","options_pt":{"A":"Para visualize potencial causes de um problema em um estruturado, categorized manner","B":"Para analisar todos possível causes de uma falha usando top-down abordagem","C":"Para identificar único causa-raiz por repeatedly asking \"por que\"","D":"Para identificar o mais significativo causes de um problema e priorizar them"},"correct":"B","explanation_pt":"Alternativa \"A\" está incorreta. Este descreve o diagrama de espinha de peixe, que categorizes potencial causes. Ele ajuda um auditor interno para visualize o muitos potencial causes de um problema, organizing them em categorias. Este diagram resembles fish skeleton, com o problema declaração não \"head\" e o causes ampliando out como \"bones.\" alternativa \"B\" está correta. Diferente RCA métodos oferecer único abordagens para dissecting problemas e uncovering seus origins. Comum RCA técnicas auditores internos usar incluir o Five Whys, fishbone diagrams, e árvore de falhas análise. Árvore de falhas análise (FTA) é top-down abordagem esse começa com um potencial undesirable event (falha) e usa árvore diagram para explore todos possível causes leading para esse event. Ele ajuda auditores internos sistematicamente identificar e analisar contributing fatores. Alternativa \"C\" está incorreta. Este descreve o Five Whys técnica, que é simples, powerful ferramenta utilizado para drill down à causa-raiz de um problema. Ele identifica único causa-raiz por repeatedly asking \"por que.\" alternativa \"D\" está incorreta. Este descreve Pareto análise, que foca em priorizando mais significativo causes. Ele determina que causes têm o greatest impacto com base em frequência ou severidade."},{"id":"M4_U2_Q5","num":5,"total":25,"module":"M4","unit":"U2","topic":"Critérios de Avaliação e Condições Existentes","question_pt":"Um auditor revisando fornecedor pagamentos identifica vários duplicate pagamentos. Qual aspecto é mais crítico em avaliando importance de este questão?","options_pt":{"A":"Frequência com que fornecedores notificar a empresa sobre duplicate pagamentos.","B":"Total financeiro perda incurred e probabilidade de recovering overpayments.","C":"Número de funcionários membros envolvido em processamento fornecedor notas fiscais.","D":"Transação volume não contas pagar sistema durante auditoria período."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Quantifying financeiro exposure e avaliando recuperação opções são principal fatores em determinando a severidade de duplicate pagamentos."},{"id":"M4_U2_Q6","num":6,"total":25,"module":"M4","unit":"U2","topic":"Critérios de Avaliação e Condições Existentes","question_pt":"Qual das seguintes alternativas melhor descreve o propósito de causa-raiz análise (RCA) em interno auditoria?","options_pt":{"A":"Para comparar avaliação critérios com o actual resultados","B":"Para documentar o existente condições atividade sob revisão","C":"Para identificar o fundamental reasons para desvios de avaliação critérios","D":"Para determinar o importância de trabalho de auditoria achados"},"correct":"C","explanation_pt":"Alternativa \"A\" está incorreta. Comparando critérios com resultados identifica desvios mas faz não explicar seus root causes, que é não propósito de RCA. Alternativa \"B\" está incorreta. Documentando existente condições é parte de coletando evidências, não RCA. Alternativa \"C\" está correta. Causa-raiz análise (RCA) ajuda auditores internos uncover o fundamental reasons para desvios de avaliação critérios, garantindo esse recomendações tratar o actual problemas em vez de symptoms. Por identificando root causes, auditores internos pode fazer específico recomendações para prevenir questões de recurring. Alternativa \"D\" está incorreta. Determinando importância é separado etapa após identificando root causes e, assim, é não propósito de RCA."},{"id":"M4_U2_Q7","num":7,"total":25,"module":"M4","unit":"U2","topic":"Critérios de Avaliação e Condições Existentes","question_pt":"Qual das seguintes alternativas causa-raiz análise técnicas é melhor adequado para identificando múltiplos interconnected causes de um problema?","options_pt":{"A":"Diagrama de espinha de peixe","B":"Árvore de falhas análise","C":"Pareto análise","D":"O Five Whys"},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Diferente RCA métodos oferecer único abordagens para dissecting problemas e uncovering seus origins. Comum RCA técnicas auditores internos usar incluir o Five Whys, fishbone diagrams, e árvore de falhas análise. Causa-e-efeito diagram, como diagrama de espinha de peixe (também conhecido como diagrama de Ishikawa), ajuda com causa-raiz análise quando a causa é não linear. Ele ajuda um auditor interno para visualize o muitos potencial causes de um problema, organizing them em categorias. Diagrama de espinha de peixe (diagrama de Ishikawa) é ideal para identificando múltiplos interconnected causes, como ele organizes potencial causes em categorias como People, processos, Materials, e equipamento. Alternativa \"B\" está incorreta. Árvore de falhas análise é top-down abordagem para analisando potencial falha points, não categorizing causes. Alternativa \"C\" está incorreta. Pareto análise prioritizes questões mas faz não explore interconnected causes. Alternativa \"D\" está incorreta. O Five Whys é melhor adequado para simples, linear problemas."},{"id":"M4_U2_Q8","num":8,"total":25,"module":"M4","unit":"U2","topic":"Critérios de Avaliação e Condições Existentes","question_pt":"Um auditor constata que funcionário despesa reembolsos frequentemente exceed política limita. Qual é o mais eficaz maneira para determinar a causa-raiz?","options_pt":{"A":"Comparando despesa limita para esses de outro organizações.","B":"Surveying funcionários sobre seus satisfaction com o reembolso processo.","C":"Revisando política enforcement práticas e aprovação fluxos de trabalho.","D":"Ajustando política limita para corresponder atual spending padrões."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Examining política enforcement e aprovação fluxos de trabalho ajuda identificar se questão stems de fraco controles ou falta de adherence."},{"id":"M4_U2_Q9","num":9,"total":25,"module":"M4","unit":"U2","topic":"Critérios de Avaliação e Condições Existentes","question_pt":"De acordo com as orientações fazer IIA, qual das seguintes alternativas fornece adicional percepção em erros, problemas, missed oportunidades, ou não conformidade para melhorar eficácia e eficiência de de uma organização controle processo?","options_pt":{"A":"Rerealizarance.","B":"Independente confirmação.","C":"Vouching.","D":"Causa-raiz análise."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Causa-raiz análise goes além de identificando symptoms para uncover o subjacente reasons para questões, possibilitando melhorias para controle processos e reduzindo a probabilidade de recurring erros ou problemas."},{"id":"M4_U2_Q10","num":10,"total":25,"module":"M4","unit":"U2","topic":"Critérios de Avaliação e Condições Existentes","question_pt":"Um ele segurança auditoria reveals esse alguns funcionários têm administrative acesso além de seus job requisitos. Qual é o mais relevantee fator em avaliando a severidade de este questão?","options_pt":{"A":"Risco de não autorizado sistema modificações ou segurança breaches.","B":"Departamentos esse frequentemente exigir elevated acesso permissions.","C":"Percentage de funcionários membros que têm concluído segurança cibernética treinamento.","D":"Casos em que excess acesso teve sido utilizado incorrectly nos últimos."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Avaliando potencial para dados breaches e imadequado sistema mudanças é crucial quando avaliando segurança riscos."},{"id":"M4_U2_Q11","num":11,"total":25,"module":"M4","unit":"U2","topic":"Critérios de Avaliação e Condições Existentes","question_pt":"Qual das seguintes alternativas não válido exemplo de avaliação critérios?","options_pt":{"A":"Regulatório requisitos","B":"Setor parâmetros de referência","C":"Organizacional políticas e procedimentos","D":"Personal opiniões auditor interno"},"correct":"D","explanation_pt":"Alternativa \"A\" está incorreta. Regulatório requisitos são válido externo avaliação critérios. Alternativa \"B\" está incorreta. Setor parâmetros de referência são válido externo avaliação critérios. Alternativa \"C\" está incorreta. Organizacional políticas e procedimentos são válido interno avaliação critérios. Alternativa \"D\" está correta. Avaliação critérios que são mais relevantee para o trabalho de auditoria representa o desired declarar atividade sob revisão e deve ser específico e prático. Adequado critérios fornecido não Normas incluir interno critérios, externo critérios, authoritative orientação, estabelecido organizacional práticas, expectativas com base não desenho de um controle, e procedimentos que pode não ser formalmente documentarado. no entanto, o personal opiniões auditor interno são não válido avaliação critérios, como eles falta objetividade e relevância à atividade sob revisão."},{"id":"M4_U2_Q12","num":12,"total":25,"module":"M4","unit":"U2","topic":"Critérios de Avaliação e Condições Existentes","question_pt":"Um auditor interno descobre esse despesa relatórios frequentemente exceed empresa política limita. Qual deve ser considerado quando determinando importância de este questão?","options_pt":{"A":"Funcionário preocupações sobre o fairness de política limita.","B":"Número de reembolsas solicitaçõesções submitted em um fornecidos período.","C":"Anterior casos de menor despesa violações observou em passado auditorias.","D":"Financeiro impacto e frequência de não conformidade casos."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. O importância questão depende não financeiro exposure e como frequentemente não conformidade ocorre."},{"id":"M4_U2_Q13","num":13,"total":25,"module":"M4","unit":"U2","topic":"Critérios de Avaliação e Condições Existentes","question_pt":"Qual das seguintes é um exemplo de externo avaliação critérios?","options_pt":{"A":"Indicadores-chave de desempenho","B":"Regulatório requisitos","C":"Organizacional políticas e procedimentos","D":"Estabelecido organizacional práticas"},"correct":"B","explanation_pt":"Alternativa \"A\" está incorreta. Indicadores-chave de desempenho são interno avaliação critérios, não externo critérios. Alternativa \"B\" está correta. Avaliação critérios que são mais relevantee para o trabalho de auditoria representa o desired declarar atividade sob revisão e deve ser específico e prático. Adequado critérios fornecido não Normas incluir interno critérios, externo critérios, authoritative orientação, estabelecido organizacional práticas, expectativas com base não desenho de um controle, e procedimentos que pode não ser formalmente documentarado. Regulatório requisitos são externo avaliação critérios porque eles são imposed por statutory bodies e são não interno à organização. Alternativa \"C\" está incorreta. Organizacional políticas e procedimentos são interno avaliação critérios, não externo critérios. Alternativa \"D\" está incorreta. Estabelecido organizacional práticas são interno avaliação critérios, não externo critérios."},{"id":"M4_U2_Q14","num":14,"total":25,"module":"M4","unit":"U2","topic":"Critérios de Avaliação e Condições Existentes","question_pt":"Qual das seguintes alternativas fatores deve auditores internos considerar quando appraising o importância de achados?","options_pt":{"A":"A probabilidade e impacto risco","B":"A disponibilidade de evidências","C":"Da organização risco residual","D":"O custo de adicional analisa"},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. De acordo com Norma 14.3 avaliação de achados, auditores internos deve avaliar cada potencial trabalho de auditoria achado para determinar seu importância. Auditores internos deve considerar a probabilidade e impacto risco quando appraising o importância de achados. Outro fatores para ser considerado incluir tolerância ao risco e outro fatores importante à organização. Alternativa \"B\" está incorreta. Disponibilidade de evidências é considerado durante análise fase, não quando appraising o importância de achados. Alternativa \"C\" está incorreta. Risco residual é um importante consideração mas é parte broader avaliação de riscos processo, não principal focar quando appraising achados. Alternativa \"D\" está incorreta. O custo de adicional analisa é considerado earlier no trabalho de auditoria processo, não quando appraising o importância de achados."},{"id":"M4_U2_Q15","num":15,"total":25,"module":"M4","unit":"U2","topic":"Critérios de Avaliação e Condições Existentes","question_pt":"Qual das seguintes é a ação mais adequada para um auditor interno quando a organização não possui critérios formais de avaliação para o processo em análise?","options_pt":{"A":"Colaborar com a alta administração para identificar critérios adequados.","B":"Concluir que o processo é ineficaz.","C":"Adiar o trabalho de auditoria até que os critérios sejam estabelecidos.","D":"Utilizar o julgamento pessoal para avaliar o processo."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. De acordo com a Norma 13.4, os auditores internos devem avaliar em que medida o conselho e a alta administração estabeleceram critérios adequados para determinar se a atividade sob revisão alcançou seus objetivos e metas. Quando os critérios formais são inadequados ou inexistentes, o auditor deve trabalhar com a administração para desenvolvê-los."},{"id":"M4_U2_Q16","num":16,"total":25,"module":"M4","unit":"U2","topic":"Critérios de Avaliação e Condições Existentes","question_pt":"Um auditor interno está revisando compras e aquisições transações para determinar conformidade com empresa política. Qual é melhor abordagem para comparar existente condições para avaliação critérios?","options_pt":{"A":"Benchmarking compras e aquisições dados contra externo setor averages.","B":"Matching transações com documentarado aprovação limita e purchasing diretrizes.","C":"Aceitando administração confirmação esse políticas são sendo followed.","D":"Selecting random transações sem considerando política diretrizes."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. O mais eficaz maneira para avaliar conformidade é por diretamente comparando compras e aquisições transações para estabelecido aprovação critérios."},{"id":"M4_U2_Q17","num":17,"total":25,"module":"M4","unit":"U2","topic":"Critérios de Avaliação e Condições Existentes","question_pt":"Durante uma auditoria de um cliente serviço departamento, O auditor interno observa esse cliente reclamações são não sendo resolved dentro do exigido 48-hour timeframe. A avaliação critérios specify esse todos reclamações deve ser tratado dentro de este período para garantir cliente satisfaction. Qual é o mais provável causa-raiz de este desvio?","options_pt":{"A":"Overly strict avaliação critérios","B":"Falta de formal avaliação critérios","C":"Inadequado staffing níveis não cliente serviço departamento","D":"Insuficiente evidências para apoiar o achado"},"correct":"C","explanation_pt":"Alternativa \"A\" está incorreta. A avaliação critérios são razoável e não overly strict, como resolver reclamações dentro de 48 hours é Norma prática para cliente satisfaction. Assim, overly strict avaliação critérios são não a causa-raiz de este desvio. Alternativa \"B\" está incorreta. O cenário indica esse critérios exist mas são não sendo met. Assim, o falta de formal avaliação critérios é não a causa-raiz de este desvio. Alternativa \"C\" está correta. Causa-raiz análise (RCA) ajuda auditores internos constatar o fundamental reasons para desvios de avaliação critérios. Este método garante esse auditores internos tratar o actual problemas em vez de just o symptoms problemas, leading para eficaz e lasting soluções. Inadequado staffing níveis não cliente serviço departamento são comum causa-raiz de adiars em resolver cliente reclamações, como ele diretamente impactos fazer departamento capacidade para meet o exigido timeframe. Alternativa \"D\" está incorreta. As evidências (i.e., adiars em reclamação resolução) apoia o achado, então insuficiente evidências é não a causa-raiz de este desvio."},{"id":"M4_U2_Q18","num":18,"total":25,"module":"M4","unit":"U2","topic":"Critérios de Avaliação e Condições Existentes","question_pt":"Qual das seguintes é um interno fazer auditor mais importante consideração quando revisando registra ou outro evidências de informação segurança violações?","options_pt":{"A":"Controles de acesso que são em place para prevenir segurança violações.","B":"Administração investigação e resolução segurança violações.","C":"Planos para melhorias à informação segurança arquitetura.","D":"Setor tendências em relação a comum tipos de segurança violações."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. O auditor deve garantir esse informação segurança violações são revisado e tratado por administração."},{"id":"M4_U2_Q19","num":19,"total":25,"module":"M4","unit":"U2","topic":"Critérios de Avaliação e Condições Existentes","question_pt":"Qual das seguintes alternativas causa-raiz análise técnicas é mais eficaz para priorizando questões com base em seus frequência e impacto?","options_pt":{"A":"Diagrama de espinha de peixe","B":"Árvore de falhas análise","C":"O Five Whys","D":"Pareto análise"},"correct":"D","explanation_pt":"Alternativa \"A\" está incorreta. Causa-e-efeito diagram, como diagrama de espinha de peixe (também conhecido como diagrama de Ishikawa), ajuda com causa-raiz análise quando a causa é não linear. Fishbone diagrams são utilizado para categorize e visualize potencial causes, não priorizar them. Alternativa \"B\" está incorreta. Árvore de falhas análise é top-down abordagem para analisando potencial falha points, não priorizando questões. Alternativa \"C\" está incorreta. O Five Whys é simples, powerful ferramenta utilizado para drill down à causa-raiz de um problema e é melhor adequado para identificando único causa-raiz. Alternativa \"D\" está correta. Diferente RCA métodos oferecer único abordagens para dissecting problemas e uncovering seus origins. Comum RCA técnicas auditores internos usar incluir o Five Whys, fishbone diagrams, e árvore de falhas análise. O Pareto princípio é frequentemente referred para como 80/20 regra. O princípio indica esse 20% entrada ou esforços levar para 80% saída ou resultados. Este pode ser utilizado por auditores para ajudar priorizar questões por identificando mais significativo causes de problemas. Pareto análise é mais eficaz para priorizando questões com base em seus frequência e impacto, como ele foca não mais significativo causes esse conta para o majority de problemas."},{"id":"M4_U2_Q20","num":20,"total":25,"module":"M4","unit":"U2","topic":"Critérios de Avaliação e Condições Existentes","question_pt":"Um auditor interno foi solicitaçõesdo para revisar a tesouraria departamento conformidade com corporativo política relacionado usar de negociação futura para gerenciar valoração cambial risco. O auditor identifica não relacionado políticas não corporativo política manual mas faz descobrir esse o departamento é seguinte uma política desenvolvido por a empresa banco. Qual das seguintes seria mais adequada resposta auditor?","options_pt":{"A":"Usar o banco política como auditoria critérios e determinar se adoção formal deve ser recomendado não comunicação final do trabalho de auditoria.","B":"Realizar não adicional trabalho de auditoria e relatório falta de um corporativo política como uma auditoria observação.","C":"Retirar-se trabalho de auditoria, porque há é nada para auditoria devido ao falta de um corporativo política.","D":"Adiar auditoria trabalho de auditoria até que corporativo política pode ser estabelecido."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Como parte controle garantia provision de um fazer auditor papel, ele é imperative esse função de auditoria interna avalia o adequação e eficácia de existente controles e, onde possível, fornece recomendações à organização em como para melhorar seu controle processos. Se departamento tem não official política para um específico kind de conformidade—interno ou externo—então ele é responsabilidade auditor para fazer recomendações para tratar este oversight. Não exemplo em este question, o auditor deveria avaliar o banco política para avaliar seu eficácia e adequação em relation à tesouraria departamento atividades. Se o auditor thinks política é adequado, então official adoption deve ser recomendado."},{"id":"M4_U2_Q21","num":21,"total":25,"module":"M4","unit":"U2","topic":"Critérios de Avaliação e Condições Existentes","question_pt":"Um auditor interno entrevistou ajudar desk funcionários e descoberto esse eles foram não aware latest autenticação procedimentos. O auditor questioned esses funcionários, e eles explicado esse eles fez não receber adequado treinamento. O auditor então visited recursos humanos e learned esse o treinamento foi nunca ordered pelo head de ajudar desk serviços. Este led o auditor para ask o head de ajudar desk serviços por que o treinamento foi nãas solicitaçõesçõesdo. Qual das seguintes alternativas abordagens foi o auditor mais provável aplicando?","options_pt":{"A":"Benchmarking.","B":"Causa-raiz análise.","C":"Processo mining.","D":"Tracing e vouching."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Causa-raiz análise foca em identificando subjacente reasons para questões, como por que treinamento foi nãas solicitaçõesçõesdo. Este abordagem ajuda tratar systemic problemas e melhorar processos eficazmente."},{"id":"M4_U2_Q22","num":22,"total":25,"module":"M4","unit":"U2","topic":"Critérios de Avaliação e Condições Existentes","question_pt":"Um auditor interno identifica desvio entre avaliação critérios e existente condições. Qual deve o auditor fazer próximo?","options_pt":{"A":"Conclude esse atividade é ineficaz.","B":"Recomendar mudanças à avaliação critérios.","C":"Relatório desvio imediatamente para alta administração.","D":"Avaliar o importância desvio."},"correct":"D","explanation_pt":"Alternativa \"A\" está incorreta. Desvio faz não automatically mean atividade é ineficaz; adicional avaliação é exigido. Alternativa \"B\" está incorreta. Changing avaliação critérios é não envolvido não processo de comparando existente condições para avaliação critérios e é no próximo etapa após identificando desvio. Alternativa \"C\" está incorreta. relatórioando deve ocorre após avaliando importância desvio, não correto após o desvio é identificado. Alternativa \"D\" está correta. De acordo com Norma 14.3 avaliação de achados, auditores internos deve avaliar cada potencial trabalho de auditoria achado para determinar seu importância. Quando determinando importância risco, auditores internos deve considerar a probabilidade risco occurring e o impacto risco pode têm na organização governança, gestão de riscos, e controle processos."},{"id":"M4_U2_Q23","num":23,"total":25,"module":"M4","unit":"U2","topic":"Critérios de Avaliação e Condições Existentes","question_pt":"Durante um trabalho de auditoria de um manufacturing processo, O auditor interno observa esse machine manutenção registra são incompleto, leading para frequente equipamento falhas. A avaliação critérios exigir registra para ser atualizado diário. Qual é o mais provável causa-raiz de este desvio?","options_pt":{"A":"Inadequado funcionários treinamento em manutenção procedimentos","B":"Insuficiente evidências para apoiar o achado","C":"Falta de formal avaliação critérios","D":"Overly strict avaliação critérios"},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Causa-raiz análise (RCA) ajuda auditores internos constatar o fundamental reasons para desvios de avaliação critérios. Este método garante esse auditores internos tratar o actual problemas em vez de just o symptoms problemas, leading para eficaz e lasting soluções. Inadequado funcionários treinamento é comum causa-raiz de incompleto manutenção registra, como ele diretamente impactos conformidade com o critérios. Alternativa \"B\" está incorreta. As evidências (i.e., incompleto registra) apoia o achado; portanto, insuficiente evidências é não a causa-raiz de este desvio. Alternativa \"C\" está incorreta. A avaliação critérios são already definido em este cenário; portanto, faltaing formal avaliação critérios é não a causa-raiz de este desvio. Alternativa \"D\" está incorreta. Os critérios são não overly strict e são razoável para garantindo adequado manutenção."},{"id":"M4_U2_Q24","num":24,"total":25,"module":"M4","unit":"U2","topic":"Critérios de Avaliação e Condições Existentes","question_pt":"Qual das seguintes é um exemplo de authoritative orientação utilizado como avaliação critérios?","options_pt":{"A":"Indicadores-chave de desempenho","B":"Estabelecido organizacional práticas","C":"Organizacional políticas e procedimentos","D":"Setor-específico Normas e parâmetros de referência"},"correct":"D","explanation_pt":"Alternativa \"A\" está incorreta. Indicadores-chave de desempenho são interno avaliação critérios, não authoritative orientação. Alternativa \"B\" está incorreta. Estabelecido organizacional práticas são interno avaliação critérios, não authoritative orientação. Alternativa \"C\" está incorreta. Organizacional políticas e procedimentos são interno avaliação critérios, não authoritative orientação. Alternativa \"D\" está correta. Avaliação critérios que são mais relevantee para o trabalho de auditoria representa o desired declarar atividade sob revisão e deve ser específico e prático. Adequado critérios fornecido não Normas incluir interno critérios, externo critérios, authoritative orientação, estabelecido organizacional práticas, expectativas com base não desenho de um controle, e procedimentos que pode não ser formalmente documentarado. Setor-específico Normas e parâmetros de referência são exemplos de authoritative orientação, como eles fornecer externo, profissional critérios para avaliação."},{"id":"M4_U2_Q25","num":25,"total":25,"module":"M4","unit":"U2","topic":"Critérios de Avaliação e Condições Existentes","question_pt":"Qual das seguintes é o objetivo principal de appraising o importância de achados em um interno trabalho de auditoria?","options_pt":{"A":"Para determinar se adicional analisa são exigido","B":"Para identificar o root causes de desvios","C":"Para priorizar achados com base em seus impacto e probabilidade","D":"Para comparar avaliação critérios com existente condições"},"correct":"C","explanation_pt":"Alternativa \"A\" está incorreta. Determinando necessidade para adicional analisa ocorre earlier no trabalho de auditoria processo. Alternativa \"B\" está incorreta. Identificando root causes é separado etapa antes de appraising importância. Alternativa \"C\" está correta. De acordo com Norma 14.3 avaliação de achados, auditores internos deve avaliar cada potencial trabalho de auditoria achado para determinar seu importância. Eles também deve priorizar cada trabalho de auditoria achado com base em seu importância, usando methodoregistraries estabelecido por o Diretor Executivo de Auditoria. Assim, appraising o importância de achados garante esse auditores internos priorizar questões com base em seus impacto e probabilidade, possibilitando a organização para tratar o mais crítico riscos. Alternativa \"D\" está incorreta. Comparando critérios com condições é parte análise fase, não appraisal fase."},{"id":"M5_U1_Q1","num":1,"total":19,"module":"M5","unit":"U1","topic":"Conceitos de Finanças e Contabilidade","question_pt":"Que capital budgeting método é considerado útil para determinando se projeto irá add ou destroy valor para o organização mas pode ser difficult para usar para comparações quando inicial investimento differs significativamente entre competing alternativas?","options_pt":{"A":"Interno taxa de retorno.","B":"Líquido apresentar valor.","C":"Contabilidade taxa de retorno.","D":"Simples payback período."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Líquido apresentar valor (NPV) compara o apresentar valor de um projeto caixa inflows ao apresentar valor de seu caixa outflows. Quando NPV é zero ou greater, um investimento projeto é acceptable. Fraqueza de NPV é esse ele é não meaningful para comparando projetos requerendo diferente valores de investimento. O interno taxa de retorno pode ser utilizado em tal situações. O simples payback período e a contabilidade taxa de retorno fazer não medir se organizacional valor é aumentado ou decreased porque eles ignore o tempo valor de money."},{"id":"M5_U1_Q2","num":2,"total":19,"module":"M5","unit":"U1","topic":"Conceitos de Finanças e Contabilidade","question_pt":"Qual dos seguintes métodos de depreciação seria mais adequado para uma colheitadeira de soja que, devido à rotação de culturas, produz zero alqueires de soja em anos alternados ao longo de sua vida útil de 10 anos?","options_pt":{"A":"Método dos saldos decrescentes a 150%.","B":"Método da soma dos dígitos dos anos.","C":"Método da atividade (unidades produzidas).","D":"Método linear."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. O método da atividade é o mais adequado porque a depreciação do ativo deve refletir seu padrão real de desgaste. Nos períodos sem uso, nenhuma depreciação é registrada; nos períodos de uso, a depreciação é vinculada ao número de alqueires produzidos."},{"id":"M5_U1_Q3","num":3,"total":19,"module":"M5","unit":"U1","topic":"Conceitos de Finanças e Contabilidade","question_pt":"Em igualdade de condições, em qual das seguintes situações a Taxa Interna de Retorno (TIR) de um projeto de investimento será menor?","options_pt":{"A":"Quando as entradas de caixa são maiores.","B":"Quando o custo do investimento é menor.","C":"Quando as entradas de caixa são recebidas mais tarde na vida do projeto.","D":"Quando o projeto tem um período de payback mais curto."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Entradas de caixa postergadas reduzem o valor temporal do dinheiro, resultando em uma TIR menor para o projeto de investimento."},{"id":"M5_U1_Q4","num":4,"total":19,"module":"M5","unit":"U1","topic":"Conceitos de Finanças e Contabilidade","question_pt":"Um contrato de arrendamento financeiro (leasing financeiro) transfere substancialmente todos os benefícios e riscos da propriedade do ativo para o arrendatário. Como o bem é reconhecido nos registros do arrendatário?","options_pt":{"A":"Como um ativo com passivos de curto e longo prazo correspondentes.","B":"Como um ativo com um passivo de arrendamento correspondente.","C":"O bem arrendado não é reconhecido no balanço patrimonial, e os pagamentos de arrendamento são registrados como despesa quando incorridos.","D":"Como um arrendamento operacional, com despesas reconhecidas ao longo do prazo do contrato."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Em um arrendamento financeiro, o arrendatário reconhece o ativo arrendado em seu balanço patrimonial. O arrendatário também registra um passivo de arrendamento — representando o valor presente dos pagamentos futuros — dividido em parcelas de curto e longo prazo."},{"id":"M5_U1_Q5","num":5,"total":19,"module":"M5","unit":"U1","topic":"Conceitos de Finanças e Contabilidade","question_pt":"Como parte do processo contábil mensal, qual etapa deve ser concluída primeiro para garantir a exatidão das demonstrações financeiras?","options_pt":{"A":"Preparar os lançamentos de ajuste.","B":"Preparar os lançamentos de estorno.","C":"Preparar o balancete ajustado.","D":"Elaborar o balancete pós-encerramento."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Os lançamentos de ajuste devem ser preparados primeiro no ciclo contábil para garantir que todas as demonstrações financeiras sejam precisas e completas antes da elaboração do balancete. Sem essa etapa, o balancete pode conter imprecisões que levam a erros nos relatórios financeiros."},{"id":"M5_U1_Q6","num":6,"total":19,"module":"M5","unit":"U1","topic":"Conceitos de Finanças e Contabilidade","question_pt":"Qual é uma base adequada para mensurar o custo histórico de ativos imobilizados?","options_pt":{"A":"Todos os custos incorridos na construção de um prédio fabril, desde a escavação até a conclusão, devem ser considerados parte do custo do ativo.","B":"Os custos de melhorias em equipamentos realizadas após sua aquisição devem ser excluídos do custo do ativo, mesmo que gerem potencial de serviço futuro.","C":"Os valores obtidos durante o processo de preparação de um terreno para sua finalidade (como a venda de madeira extraída), devem ser reconhecidos imediatamente como receita.","D":"O preço de compra, os fretes e os custos de instalação de um ativo produtivo devem ser excluídos do custo do ativo."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Todos os custos diretamente associados à construção de um prédio fabril — incluindo escavação e conclusão — devem ser incluídos no custo histórico do ativo."},{"id":"M5_U1_Q7","num":7,"total":19,"module":"M5","unit":"U1","topic":"Conceitos de Finanças e Contabilidade","question_pt":"Qual das seguintes é um exemplo de um contingent passivo?","options_pt":{"A":"Varejo store em um shopping mall pays o lessor mínimo mensal rent plus um agreed-sobre percentage de vendas.","B":"Empresa accrues renda tax payable em seu interim demonstrações financeiras.","C":"Empresa refuses para pay o nota fiscal para o anual auditoria porque ele seems higher fazer que o valor agreed sobre com o público contabilidade empresa parceiro.","D":"Lessee agrees para reimburse lessor para um shortfall não residual valor de um ativo sob lease."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Lessee agreeing para reimburse lessor para um shortfall não residual valor de um ativo sob lease é contingent passivo. O passivo é contingent não lessor não receiving o completo residual valor de um terceiro parte."},{"id":"M5_U1_Q8","num":8,"total":19,"module":"M5","unit":"U1","topic":"Conceitos de Finanças e Contabilidade","question_pt":"Na demonstração das mutações do patrimônio líquido, qual item seria incluído no cálculo do saldo final dos lucros acumulados?","options_pt":{"A":"Dividendos declarados no período.","B":"Capital integralizado adicional.","C":"Excedente do valor nominal das ações recebido na emissão.","D":"Valor nominal das ações recém-emitidas."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Saldo Inicial de Lucros Acumulados + Lucro Líquido (Receitas do Período – Despesas do Período) – Dividendos = Saldo Final de Lucros Acumulados. O excedente do valor nominal das ações faz parte do capital integralizado adicional e não está incluído nos lucros acumulados."},{"id":"M5_U1_Q9","num":9,"total":19,"module":"M5","unit":"U1","topic":"Conceitos de Finanças e Contabilidade","question_pt":"Em igualdade de condições, em qual circunstância a Taxa Interna de Retorno (TIR) de um projeto de investimento será menor?","options_pt":{"A":"Quando o projeto tem um período de payback mais curto.","B":"Quando as entradas de caixa são recebidas mais tarde na vida do projeto.","C":"Quando o custo do investimento é menor.","D":"Quando as entradas de caixa são maiores."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Entradas de caixa que ocorrem mais tarde no projeto têm valor presente menor do que entradas que ocorrem mais cedo, pois o valor presente de um real é maior quanto antes ele for recebido. Projetos com fluxos de caixa tardios terão Valores Presentes Líquidos menores para qualquer taxa de desconto, resultando em uma TIR mais baixa."},{"id":"M5_U1_Q10","num":10,"total":19,"module":"M5","unit":"U1","topic":"Conceitos de Finanças e Contabilidade","question_pt":"Ao adquirir um ativo utilizando dívida, qual das seguintes transações ocorre?","options_pt":{"A":"Débito em passivos (diminuição) e crédito em ativos (aumento).","B":"Débito em ativos (diminuição) e crédito em passivos (aumento).","C":"Débito em passivos (aumento) e crédito em ativos (aumento).","D":"Débito em ativos (aumento) e crédito em passivos (aumento)."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Uma conta de ativo é debitada, aumentando-a pelo valor dos ativos adicionais. Uma conta de passivo é creditada, aumentando-a pelo valor do empréstimo."},{"id":"M5_U1_Q11","num":11,"total":19,"module":"M5","unit":"U1","topic":"Conceitos de Finanças e Contabilidade","question_pt":"Qual dos seguintes títulos de dívida provavelmente apresenta o menor risco?","options_pt":{"A":"Debêntures simples.","B":"Debêntures subordinadas.","C":"Títulos com primeira hipoteca.","D":"Títulos de renda variável."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Os títulos com primeira hipoteca são garantidos por ativos fixos. Os demais apresentam risco maior: os títulos de renda variável pagam juros apenas quando há lucro; as debêntures simples são títulos sem garantia real; e as debêntures subordinadas são subordinadas a outras dívidas."},{"id":"M5_U1_Q12","num":12,"total":19,"module":"M5","unit":"U1","topic":"Conceitos de Finanças e Contabilidade","question_pt":"Qual das seguintes alternativas mede o retorno de um projeto em termos de lucro operacional líquido, ao invés de utilizar o fluxo de caixa do projeto?","options_pt":{"A":"Taxa interna de retorno.","B":"Valor presente líquido.","C":"Período de payback.","D":"Taxa contábil de retorno."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. A taxa contábil de retorno (TCR), também conhecida como taxa simples de retorno, mede o retorno de um projeto em termos de lucro operacional líquido, ao contrário dos métodos baseados em fluxo de caixa. A abordagem consiste em estimar as receitas que serão geradas pelo investimento proposto e subtrair os custos operacionais e de depreciação esperados."},{"id":"M5_U1_Q13","num":13,"total":19,"module":"M5","unit":"U1","topic":"Conceitos de Finanças e Contabilidade","question_pt":"Após os lançamentos contábeis serem registrados no ciclo contábil, qual das seguintes etapas deve ser concluída a seguir?","options_pt":{"A":"Finalizar o balancete.","B":"Publicar os lançamentos no razão geral.","C":"Preparar os ajustes.","D":"Revisar e aprovar as transações."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. A etapa de publicação no razão ocorre após o registro dos lançamentos e dos ajustes. Trata-se do processo de transferência dos lançamentos do diário para o razão geral, etapa que normalmente é realizada posteriormente no ciclo contábil. O enunciado pede o que deve ser feito logo após o registro dos lançamentos — ou seja, preparar os ajustes."},{"id":"M5_U1_Q14","num":14,"total":19,"module":"M5","unit":"U1","topic":"Conceitos de Finanças e Contabilidade","question_pt":"Qual das seguintes situações seria uma decisão típica de orçamento de capital?","options_pt":{"A":"Quantas toneladas de aço serão necessárias neste trimestre?","B":"O preço de venda de uma nova linha de produtos deve ser um real mais alto ou mais baixo?","C":"O novo equipamento deve ser arrendado ou comprado?","D":"Quanto deve ser pago à nova secretária?"},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Os orçamentos de capital envolvem investimentos de longo prazo e projetos que exigem grandes volumes de recursos e geram benefícios ao longo do tempo. Uma decisão típica de orçamento de capital é determinar se um novo equipamento deve ser arrendado ou comprado."},{"id":"M5_U1_Q15","num":15,"total":19,"module":"M5","unit":"U1","topic":"Conceitos de Finanças e Contabilidade","question_pt":"Uma organização que utiliza o regime de competência realizou uma parcela substancial do trabalho exigido para cumprir um contrato, mas ainda não recebeu nenhum pagamento nem registrou qualquer receita pelo serviço. Qual lançamento de ajuste deve ser realizado?","options_pt":{"A":"Débito em caixa e crédito em receita.","B":"Débito em contas a receber e crédito em receita diferida.","C":"Débito em receita diferida e crédito em receita.","D":"Débito em trabalho em andamento e crédito em receita."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Pelo regime de competência, a receita é reconhecida quando ganha, independentemente de quando o pagamento é recebido. Como a organização já realizou uma parte significativa do trabalho, ela já ganhou uma parcela da receita, que deve ser reconhecida com o lançamento de débito em trabalho em andamento e crédito em receita."},{"id":"M5_U1_Q16","num":16,"total":19,"module":"M5","unit":"U1","topic":"Conceitos de Finanças e Contabilidade","question_pt":"O objetivo dos relatórios financeiros é fornecer às partes interessadas qual das seguintes informações?","options_pt":{"A":"Informações para demonstrar o valor da organização de forma quantitativa.","B":"Informações para exercer a devida diligência na tomada de decisões.","C":"Informações que ofereçam certeza às decisões, caso as demonstrações sejam auditadas.","D":"Informações sobre os resultados de lucros futuros da organização."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. O objetivo dos relatórios financeiros é fornecer às partes interessadas as informações necessárias para exercer a devida diligência na tomada de decisões."},{"id":"M5_U1_Q17","num":17,"total":19,"module":"M5","unit":"U1","topic":"Conceitos de Finanças e Contabilidade","question_pt":"Um auditor interno está revisando a empresa demonstrações financeiras, e observa e identifica mudança em contabilidade estima. Como deve este mudança ser classified?","options_pt":{"A":"Catch-up ajustes para valores de anterior períodos.","B":"Normal recurring corrections ou ajustes.","C":"Erros não valores relatórioado em anterior períodos.","D":"Non-recurring extraordinary itens ou events."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. mudanças em contabilidade estima são tipicamente classified como normal recurring corrections ou ajustes, em vez de extraordinary itens ou erros de anterior períodos."},{"id":"M5_U1_Q18","num":18,"total":19,"module":"M5","unit":"U1","topic":"Conceitos de Finanças e Contabilidade","question_pt":"Um fabricante de bicicletas aproveita uma oferta promocional de um fornecedor e adquire tintas que serão utilizadas na fabricação no próximo ciclo de negócios. Isso se reflete em um aumento líquido de US$ 50.000 nos estoques e um aumento de US$ 1.000.000 em vendas. Qual será o efeito no fluxo de caixa?","options_pt":{"A":"O caixa líquido gerado pelas atividades operacionais na demonstração dos fluxos de caixa aumentará US$ 50.000.","B":"O caixa líquido gerado pelas atividades operacionais na demonstração dos fluxos de caixa diminuirá US$ 1.050.000.","C":"O caixa líquido gerado pelas atividades operacionais na demonstração dos fluxos de caixa aumentará US$ 950.000.","D":"O caixa líquido gerado pelas atividades operacionais na demonstração dos fluxos de caixa diminuirá US$ 50.000."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Um aumento líquido nos estoques de um ano para o outro no balanço patrimonial resultará em uma redução no fluxo de caixa, pois o dinheiro foi desembolsado mas ainda não gerou entradas de caixa."},{"id":"M5_U1_Q19","num":19,"total":19,"module":"M5","unit":"U1","topic":"Conceitos de Finanças e Contabilidade","question_pt":"Ao analisar a estrutura de capital de uma organização, como as ações preferenciais diferem das ações ordinárias?","options_pt":{"A":"Os dividendos de ações preferenciais não são dedutíveis para fins fiscais, ao contrário dos dividendos de ações ordinárias, que recebem tratamento diferente.","B":"O não pagamento de dividendos de ações ordinárias não leva à falência, ao passo que pode afetar as ações preferenciais.","C":"Os dividendos de ações ordinárias são variáveis, enquanto os dividendos de ações preferenciais são geralmente valores fixos baseados na lucratividade.","D":"As ações preferenciais têm características tanto de dívida (dividendos fixos) quanto de patrimônio líquido (sem obrigação de reembolso do principal)."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. As ações preferenciais combinam características de dívida (dividendos fixos) e de patrimônio líquido (sem obrigação de reembolso do principal), o que as diferencia das ações ordinárias, que são puramente baseadas em patrimônio."},{"id":"M5_U2_Q1","num":1,"total":26,"module":"M5","unit":"U2","topic":"Elaborar Papéis de Trabalho e Conclusões do Trabalho","question_pt":"Um auditor está preparando papéis de trabalho para apoiar trabalho de auditoria achados. Qual elemento deve ser incluído para garantir completude?","options_pt":{"A":"Brief observar stating esse todos controles appeared para função adequadamente.","B":"Resumo de personal opiniões em relação a auditoria achados.","C":"Registro procedimentos de auditoria realizado, e os resultados obtido.","D":"Geral declaração confirmando esse administração cooperated durante auditoria."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Papéis de trabalho deve documentar procedimentos de auditoria e achados para fornecer claro e completo registro esse apoia conclusões."},{"id":"M5_U2_Q2","num":2,"total":26,"module":"M5","unit":"U2","topic":"Elaborar Papéis de Trabalho e Conclusões do Trabalho","question_pt":"Uma função de auditoria interna usa computerized sistema para gerenciar seu trabalho de auditoria papéis de trabalho. Qual das seguintes alternativas declarações descreve o mais adequado maneira para gerenciar auditoria papéis de trabalho em este ambiente?","options_pt":{"A":"Papéis de trabalho deve apenas ser submitted não sistema se eles têm already sido assinado por o supervisor do trabalho.","B":"O computerized sistema deve store como much informação como possível sobre operacional administração atividade sob revisão.","C":"Há deve ser separation de deveres quando designando acesso privileges ao papéis de trabalho.","D":"Elaborar papéis de trabalho submitted não sistema como parte de um trabalho de auditoria deve ser permanently mantido."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Separation de deveres é principal controle interno princípio esse garante integridade e segurança de trabalho de auditoria papéis de trabalho por prevenindo não autorizado acesso e mantendo responsabilização em um computerized sistema."},{"id":"M5_U2_Q3","num":3,"total":26,"module":"M5","unit":"U2","topic":"Elaborar Papéis de Trabalho e Conclusões do Trabalho","question_pt":"Um auditor está revisando papéis de trabalho antes de finalizando o trabalho de auditoria relatório. Qual é melhor maneira para garantir eles apoiar o trabalho de auditoria resultados?","options_pt":{"A":"Verificando esse os papéis de trabalho contain evidências suficientes para justify conclusões.","B":"Confirmando esse os papéis de trabalho incluir geral observações de entrevistas.","C":"Revisando apenas o alto-risco achados enquanto omitting menor questões.","D":"Checking se os papéis de trabalho incluir o names de indivíduos envolvido em testando."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Papéis de trabalho deve fornecer suficiente, relevantee, e confiável evidências para apoiar conclusões do trabalho."},{"id":"M5_U2_Q4","num":4,"total":26,"module":"M5","unit":"U2","topic":"Elaborar Papéis de Trabalho e Conclusões do Trabalho","question_pt":"Qual deve sempre ser constatou em trabalho de auditoria papel de trabalho documentação para uma fraude investigação?","options_pt":{"A":"Interrogation e/ou entrevista recordings.","B":"Segregação de todos incriminating evidências de outro papéis de trabalho para manter o chain de custody.","C":"Revisar de todos importante testimonial evidências para garantir esse ele fornece suficientebasepara o conclusões reached.","D":"Geral opinião de se ou não suspeitar ou suspeita deve ser charged com específico crimes."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Os papéis de trabalho para uma fraude investigação deve sempre incluir uma revisão de todos importante testimonial evidências para garantir esse ele fornece suficientebasepara conclusões. Este documentação apoia auditoria achados e qualquer ações taken com base em esses achados."},{"id":"M5_U2_Q5","num":5,"total":26,"module":"M5","unit":"U2","topic":"Elaborar Papéis de Trabalho e Conclusões do Trabalho","question_pt":"Um auditor identifica inconsistências entre o trabalho de auditoria relatório e o papéis de trabalho de suporte de trabalho. Qual é o melhor curso de ação?","options_pt":{"A":"Removing achados relatório esse falta completo papel de trabalho documentação.","B":"Conciliação discrepâncias para garantir papéis de trabalho alinhar-se com conclusões.","C":"Relying em verbal explanations de auditoria funcionários para justify inconsistências, o auditor é experiente e trustworthy.","D":"Finalizando o trabalho de auditoria relatório desde menor inconsistências são expected."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Garantindo alinhamento entre papéis de trabalho e o trabalho de auditoria relatório é essencial para precisão e confiabilidade."},{"id":"M5_U2_Q6","num":6,"total":26,"module":"M5","unit":"U2","topic":"Elaborar Papéis de Trabalho e Conclusões do Trabalho","question_pt":"Uma equipe de auditoria interna quer enhance seus trabalho de auditoria papéis de trabalho. Qual das seguintes alternativas mudanças deveria mais provável increase a qualidade de seus papéis de trabalho?","options_pt":{"A":"Documentando os papéis de trabalho em um standardized, mas flexível maneira e garantindo eles são como concise como possível.","B":"Aplicando IIA certificado formato para papéis de trabalho, que é exigido por a Normas.","C":"Implementando rigid formato para usar para todos função de auditoria interna papéis de trabalho para garantir consistency.","D":"Incluindo todos versions de papel de trabalho arquivos concluído durante o trabalho de auditoria para garantir paper trail é mantido."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Standardized mas concise papéis de trabalho enhance clarity, facilitate revisa, e apoiar auditoria conclusões eficazmente, enquanto permitindo alguns flexibilidade para o único necessidades de cada trabalho de auditoria."},{"id":"M5_U2_Q7","num":7,"total":26,"module":"M5","unit":"U2","topic":"Elaborar Papéis de Trabalho e Conclusões do Trabalho","question_pt":"Em um non-governamental organização, um auditor interno realizado um trabalho de auditoria para determinar eficácia de seu food donation programa. O auditor identificado esse 20% de food distributions went para indivíduos que foram ineligible para o programa. Adicionalmente, apenas 300 fora fazer 400 distributions feita foram apoiado por adequado documentação. Com base em estes achados, Qual das seguintes alternativas conclusões deveria o auditor comunicar para alta administração para revisar e ação?","options_pt":{"A":"A deficiências identificado em tracking food donations poderia hamper da organização capacidade para atingir eficaz distribuição.","B":"A deficiências identificado não food distribuição programa indicar a organização teve sido meta de fraudulent atividade.","C":"A deficiências identificado durante o trabalho de auditoria raise preocupações sobre da organização capacidade para continuar seu operações.","D":"A deficiências identificado justificar um imediato suspension food distribuição programa até que controles são implementado para correto fraquezas."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Destacando esse deficiências em tracking food donations hinder eficaz distribuição alinha-se com o achados e fornece actionable percepções para administração para tratar operacional ineficiências."},{"id":"M5_U2_Q8","num":8,"total":26,"module":"M5","unit":"U2","topic":"Elaborar Papéis de Trabalho e Conclusões do Trabalho","question_pt":"Um auditor interno revisado uma amostra de 25 pagamentos e constatou esse one pagamento foi não autorizado. Qual das seguintes alternativas ações é o mais adequado próximo etapa para o auditor para tomar?","options_pt":{"A":"Realizar adicional testando por aumentando amostra size.","B":"Relatório os resultados para alta administração.","C":"Discutir o achado com a auditoria cliente.","D":"Conclude esse o controle é não operacional eficazmente."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. O mais adequado próximo etapa é para realizar adicional testando por aumentando amostra size para coletar evidências suficientes. Este garante o achado é não um isolated incidente e fornece confiável dados para determinar o controle eficácia antes de drawing conclusões ou relatórioando resultados."},{"id":"M5_U2_Q9","num":9,"total":26,"module":"M5","unit":"U2","topic":"Elaborar Papéis de Trabalho e Conclusões do Trabalho","question_pt":"Durante uma revisão de auditoria papéis de trabalho, um supervisor constata que principal evidências é missing. Qual deve ser adicional para garantir os papéis de trabalho são completo?","options_pt":{"A":"Resumo de administração respostas sem verificando seus precisão.","B":"Adicional explanations auditor personal interpretação resultados.","C":"Lista de verificação indicando esse auditoria etapas foram concluído sem evidências.","D":"Apoiando documentara esse substantiate auditoria conclusões."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Papéis de trabalho deve contain suficiente apoiando documentara para substantiate achados de auditoria e conclusões."},{"id":"M5_U2_Q10","num":10,"total":26,"module":"M5","unit":"U2","topic":"Elaborar Papéis de Trabalho e Conclusões do Trabalho","question_pt":"Um auditor que avalia o programa de treinamento de uma divisão para aprimorar as vendas constata que 15% da força de vendas recebeu o treinamento designado a cada trimestre do ano anterior e que a produção de vendas por pessoa aumentou 5% entre o início e o fim do ano. Com base nessas informações, qual conclusão o auditor pode tirar?","options_pt":{"A":"São necessárias mais informações para avaliar o desempenho em relação às metas.","B":"A organização precisa aumentar o número de ofertas de treinamento a cada trimestre para alcançar suas metas.","C":"O programa de treinamento está sendo executado com êxito.","D":"O aumento no desempenho não justifica o programa de treinamento."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Sem conhecer as metas do programa, o auditor não pode basear uma conclusão nas constatações sobre a iniciativa de treinamento."},{"id":"M5_U2_Q11","num":11,"total":26,"module":"M5","unit":"U2","topic":"Elaborar Papéis de Trabalho e Conclusões do Trabalho","question_pt":"De acordo com as orientações fazer IIA, qual das seguintes alternativas declarações é verdadeiro em relação a alto- qualidade trabalho de auditoria papéis de trabalho?","options_pt":{"A":"Papéis de trabalho deve garantir esse todos informação gathered durante o trabalho de auditoria é mantido.","B":"Papéis de trabalho deve contain apenas preaprovados trabalho programas e formats.","C":"Papéis de trabalho deve facilitate rerealizarance trabalho de auditoria por outro auditor.","D":"Papéis de trabalho deve ser em eletrônico formato para eficiência e tempestivo revisar."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Alto-qualidade papéis de trabalho deve possibilitar outro auditor para rerealizar o trabalho de auditoria, garantindo esse as evidências e documentação apoiar as conclusões e recomendações feita durante auditoria."},{"id":"M5_U2_Q12","num":12,"total":26,"module":"M5","unit":"U2","topic":"Elaborar Papéis de Trabalho e Conclusões do Trabalho","question_pt":"Um auditor interno está conduzindo fornecedor administração auditoria em uma organização conhecido para têm alto funcionário turnover. O auditor raises principal observação esse fornecedor saldos carried não contabilidade registros são não reconciled com o relevantee fornecedores. Qual das seguintes é um adequado conclusão para este observação?","options_pt":{"A":"O saldos carried não contabilidade registros pode ser inaccurate, que poderia resultado em misstatement balanço patrimonial.","B":"O obrigatório mensal fornecedor saldos conciliação deve ser undertaken como prescribed pela política.","C":"O controle esse mitiga o risco de inaccurate fornecedor saldos faz não operar eficazmente.","D":"O funcionário anteriormente responsável por atividade left a organização, e o vacant position tem ainda para ser filled."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Conclusão esse o controle mitigando inaccurate fornecedor saldos é ineficaz destaca significativo processo falha esse necessidades para ser tratado para prevenir misstatements em contabilidade registros."},{"id":"M5_U2_Q13","num":13,"total":26,"module":"M5","unit":"U2","topic":"Elaborar Papéis de Trabalho e Conclusões do Trabalho","question_pt":"Qual das seguintes alternativas opções reflects melhor prática em relação a manutenção de auditoria papéis de trabalho?","options_pt":{"A":"Manter apenas o relevantee documentara esse apoiar qualquer adverse achados de auditoria.","B":"Incluir suficiente informação para possibilitar outro pessoa para rerealizar testes.","C":"Incluir apenas paper cópias de documentara para garantir integridade papéis de trabalho.","D":"Manter todos papers e documentara coletado durante o curso auditoria."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. O melhor prática para mantendo auditoria papéis de trabalho é para incluir suficiente informação para permitir outro pessoa para compreender e rerealizar os testes. Este garante transparência, reproducibility, e adequado apoiar de achados, focando em relevância e clarity em vez de mantendo desnecessário ou outdated documentação formats."},{"id":"M5_U2_Q14","num":14,"total":26,"module":"M5","unit":"U2","topic":"Elaborar Papéis de Trabalho e Conclusões do Trabalho","question_pt":"De acordo com as orientações fazer IIA, qual das seguintes alternativas choices é verdadeiro em relação a documentarado registros trabalho realizado por função de auditoria interna?","options_pt":{"A":"O Diretor Executivo de Auditoria (Diretor Executivo de Auditoria) deve desenvolver retention requisitos para trabalho de auditoria registros que são consistente com organizacional diretrizes.","B":"O retention requisitos para trabalho de auditoria registros pode vary por trabalho de auditoria porque todo interno trabalho de auditoria é único.","C":"O retention períodos para eletrônico trabalho de auditoria registros são determinado pelo software utilizado para create them.","D":"O supervisor do trabalho deve obter o consent de legal counsel antes de releasing papéis de trabalho para externo partes."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. O Diretor Executivo de Auditoria deve garantir esse função de auditoria interna e indivíduos assisting função de auditoria interna compreender e abide pelo leis, regulamentações, políticas, e procedimentos relacionado confidencialidade, informação privacidade, e informação segurança esse aplicar à organização e função de auditoria interna, incluindo custody, retention, e disposal de trabalho de auditoria registros."},{"id":"M5_U2_Q15","num":15,"total":26,"module":"M5","unit":"U2","topic":"Elaborar Papéis de Trabalho e Conclusões do Trabalho","question_pt":"Função de auditoria interna está conduzindo uma garantia auditoria de um regional escritório. Auditoria equipe faz não suspeitar fraude, mas ele tem constatou significativo lacunas em controles que poderia create oportunidade para fraude (para exemplo, permitindo mesmo indivíduo para enviar notas fiscais e receber pagamentos) e laxity em registro keeping. Alguns despesa documentação é missing, mas o auditores internos têm obtido documentação de fornecedores. Furniture appears para ser missing. Ele pode têm sido stolen, mas ele é equally possível esse ele foi discarded. Auditoria equipe concluiu um relatório listagem o vários questões, explaining o potencial para perda e fraude esse estes questões têm created e citing empresa políticas e procedimentos. Administração escritório responds ao relatório via e-mail. Ele says esse ele believes as recomendações são unwarranted, esse o relatório questions a honestidade de fiéis funcionários, e esse implementação recomendações deveria ser um desnecessário waste escritório tempo. no entanto, para satisfy preocupações sobre invoicing e billing, o gestor promises para revisar o paperwork semanal. Qual das seguintes alternativas melhor characterizes o natureza de estes achados?","options_pt":{"A":"Os achados são não significativo porque não allegations de fraude são sendo feita.","B":"Os achados representa significativo violações de empresa política.","C":"Os achados fazer não descrever condições que poderia resultado em serious perda mas são principalmente procedural em natureza.","D":"Os achados são significativo porque eles são deficiências de controle que poderia ser indicadores de adicional problemas."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Estes achados são significativo porque o condições envolver deficiências de controle. Laxness em registro keeping pode também ser creating oportunidade para fraudulent atividade, mesmo que none pode têm ocorreu ainda."},{"id":"M5_U2_Q16","num":16,"total":26,"module":"M5","unit":"U2","topic":"Elaborar Papéis de Trabalho e Conclusões do Trabalho","question_pt":"Um auditor interno está revisando controle processos como parte de conclusões do trabalho. Qual fator é mais crítico para considerar?","options_pt":{"A":"O custo associated com implementando novo controle mede.","B":"O desenho e eficácia operacional de principal controles internos.","C":"O número de funcionários responsável por controle implementação.","D":"O opiniões de administração em relação a o úteisness de controles."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Controle processos deve ser avaliado para ambos desenho eficácia e operacional eficiência para determinar seus confiabilidade."},{"id":"M5_U2_Q17","num":17,"total":26,"module":"M5","unit":"U2","topic":"Elaborar Papéis de Trabalho e Conclusões do Trabalho","question_pt":"Um auditor está finalizando conclusões do trabalho e deve avaliar governança eficácia. Qual fator deve ser considerado?","options_pt":{"A":"A estrutura de papéis e decisão-tomada processos.","B":"O número de políticas documentarado dentro da organização.","C":"O histórico frequência de interno auditorias conduzido.","D":"O total valor de transações financeiras revisado durante auditoria."},"correct":"A","explanation_pt":"Alternativa \"A\" está correta. Governança eficácia depende em como well papéis e decisão-tomada processos são estruturado e enforced."},{"id":"M5_U2_Q18","num":18,"total":26,"module":"M5","unit":"U2","topic":"Elaborar Papéis de Trabalho e Conclusões do Trabalho","question_pt":"Qual das seguintes alternativas declarações, se verdadeiro, deveria justify um Diretor Executivo de Auditoria decisão não para relatórioar certain controle preocupações em relação a derivatives trading em um relatório ao comitê de auditoria?","options_pt":{"A":"O conselho teve separado comitê para fazer recomendações em trading questões.","B":"Derivatives são complexo, então auditor necessidades para basear-se em administração análise extent problema.","C":"Administração planos para iniciar ação corretiva.","D":"O valores de trading e o potencial riscos associated com o derivatives trading são não material ao geral organização."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Seguinte o conclusão de um trabalho de auditoria, relatórioado observações e recomendações são com base em, entre outro things, o nível de risco/exposure a organização poderia encontrar como resultado de um identificado preocupação. Auditores internos deveria considerar o impacto seus observações do trabalho e recomendações pode têm em da organização operações e demonstrações financeiras. Se o auditor deduces esse condição faz não resultado em um unacceptable nível de negócio risco—para exemplo, se os riscos associated com o derivatives trading são mínimo—então um auditor pode considerar não relatórioando ele."},{"id":"M5_U2_Q19","num":19,"total":26,"module":"M5","unit":"U2","topic":"Elaborar Papéis de Trabalho e Conclusões do Trabalho","question_pt":"Enquanto avaliando grande construction projeto, um auditor interno observado frequente safety violações e kept contagem. Fazer auditor relatório preliminar incluído um achado de \"material não conformidade com base em 20 observado incidentes de não conformidade.\" no entanto, o auditor em cobrança (AIC) removed o achado relatório. Qual das seguintes é mais provável reason o AIC removed o achado?","options_pt":{"A":"Evidências de auditoria foi não válido.","B":"Evidências de auditoria foi não persuasive.","C":"Evidências de auditoria foi não útil.","D":"Evidências de auditoria foi não relevantee."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. Para um achado para ser incluído em um relatório de auditoria, as evidências apoiando ele deve ser suficientemente persuasive para justify conclusão. Em este caso, enquanto auditor observado 20 safety violações, o AIC provável determinado esse este evidências sozinho foi insuficiente para substantiate o claim de material não conformidade. Persuasiveness exige evidências para ser abrangente e robust suficientemente para apoiar a severidade achado."},{"id":"M5_U2_Q20","num":20,"total":26,"module":"M5","unit":"U2","topic":"Elaborar Papéis de Trabalho e Conclusões do Trabalho","question_pt":"Uma equipe de auditoria interna está determinando como longo trabalho de auditoria papéis de trabalho deve ser mantido. Qual fator é mais crítico em tomada este decisão?","options_pt":{"A":"Administração preference para mantendo apenas alto-risco auditoria registros.","B":"O convenience de storing documentara para easy acesso.","C":"O volume de papéis de trabalho generated no trabalho de auditoria.","D":"Regulatório e legal retention requisitos para documentação de auditoria."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Legal e regulatório requisitos dictate retention períodos para auditoria papéis de trabalho para garantir conformidade e responsabilização."},{"id":"M5_U2_Q21","num":21,"total":26,"module":"M5","unit":"U2","topic":"Elaborar Papéis de Trabalho e Conclusões do Trabalho","question_pt":"O Diretor Executivo de Auditoria é treinamento novo auditor interno e explica o importance de minucioso documentação em papéis de trabalho para apoiar as conclusões e trabalho de auditoria resultados. Qual das seguintes alternativas melhor práticas é o Diretor Executivo de Auditoria provável que recomendar?","options_pt":{"A":"Auditores internos deve sign e date cada papel de trabalho após ele é revisado e assinado por administração atividade sob revisão.","B":"Auditores internos deve garantir todos informação esse administração teve fornecido ao auditor é observou e accontagemed para não papéis de trabalho.","C":"Auditores internos deve create separado papéis de trabalho para cada testar conduzido durante auditoria para keep os papéis de trabalho understandable.","D":"Auditores internos deve explicar o escopo de trabalho realizado em cada papel de trabalho, incluindo qual foi covered e não covered."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Explaining o escopo de trabalho realizado em cada papel de trabalho garante transparência e clarity, possibilitando documentação para apoiar auditoria conclusões e trabalho de auditoria resultados eficazmente."},{"id":"M5_U2_Q22","num":22,"total":26,"module":"M5","unit":"U2","topic":"Elaborar Papéis de Trabalho e Conclusões do Trabalho","question_pt":"Um auditor interno documentarado os resultados de testando usuário senhas para potencial segurança lapses. O auditor identificado 240 fora fazer 300 usuário senhas com segurança lapses. O auditor está trabalhando em Documentando efeito resultados. Qual das seguintes alternativas declarações deve o auditor incluir não papéis de trabalho para alcançar este?","options_pt":{"A":"O funcionários' falha para mudança seus senhas created significativo riscos à organização operação.","B":"O número de lapses identificado não testando exposes a organização para questões esse ele deveria não ser capaz para tratar.","C":"O 240 fora fazer 300 usuário senhas identificado durante os testes foram não mudançad em um average de 60 days.","D":"O 80% de testado senhas com segurança lapses expose a organização para potencial hacking de sensível informação."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Stating esse 80% de testado senhas tinha segurança lapses destaca severidade e potencial exposure para segurança ameaças, que é crítico para compreensão os riscos e taking ação corretiva."},{"id":"M5_U2_Q23","num":23,"total":26,"module":"M5","unit":"U2","topic":"Elaborar Papéis de Trabalho e Conclusões do Trabalho","question_pt":"Qual das seguintes alternativas deve um auditor interno documentar na auditoria papéis de trabalho em apoiar trabalho de auditoria objetivos para avaliar se purchases feita pelo departamento de compras foram válido e autorizado?","options_pt":{"A":"Um aprovado compras e aquisições orçamento para o atual financeiro ano.","B":"Atual organizacional gráfico departamento de compras.","C":"Atual delegação de autoridade e limita para compras e aquisições de materials e serviços.","D":"Atual lista de qualificado fornecedores que têm met fazer departamento fornecedor Normas."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Atual delegação de autoridade e limita para compras e aquisições é necessário para verificar se purchases foram autorizado e compliant com a organização políticas, apoiando auditoria objetivos."},{"id":"M5_U2_Q24","num":24,"total":26,"module":"M5","unit":"U2","topic":"Elaborar Papéis de Trabalho e Conclusões do Trabalho","question_pt":"Um supervisor está avaliando se papéis de trabalho suficientemente apoiar trabalho de auditoria resultados. Qual elemento é mais crítico em este revisar?","options_pt":{"A":"Confirmando esse o trabalho de auditoria resultados alinhar-se com o auditor julgamento profissional.","B":"Verificando esse o trabalho de auditoria relatório inclui administração opiniões não achados.","C":"Garantindo esse conclusões são diretamente apoiado por documentarado procedimentos de auditoria e evidências.","D":"Checking se o relatório inclui adicional percepções além de qual foi documentarado."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Papéis de trabalho deve claramente documentar os procedimentos e evidências utilizado para justify o trabalho de auditoria achados e conclusões."},{"id":"M5_U2_Q25","num":25,"total":26,"module":"M5","unit":"U2","topic":"Elaborar Papéis de Trabalho e Conclusões do Trabalho","question_pt":"De acordo com as orientações fazer IIA, qual das seguintes alternativas declarações é verdadeiro em relação a trabalho de auditoria papéis de trabalho?","options_pt":{"A":"Papéis de trabalho em eletrônico formato são mais eficaz fazer que paper registros.","B":"Papéis de trabalho são não necessidade se o trabalho de auditoria é baseado exclusivamente em entrevistas.","C":"Papéis de trabalho para garantia trabalho de auditorias são mais formal fazer que esses para trabalhos de auditoria consultivos.","D":"Papel de trabalho content e organização pode vary com base não natureza trabalho de auditoria."},"correct":"D","explanation_pt":"Alternativa \"D\" está correta. Papel de trabalho content e organização deve vary com base no trabalho de auditoria natureza, como diferente trabalho de auditorias (e.g., garantia vs. Advisory) exigir varying níveis de detalhe, formato, e documentação para apoiar seus objetivos."},{"id":"M5_U2_Q26","num":26,"total":26,"module":"M5","unit":"U2","topic":"Elaborar Papéis de Trabalho e Conclusões do Trabalho","question_pt":"Um intern recentemente joined função de auditoria interna e é designado para participate em um próximo trabalho de auditoria. O intern asked o supervisor do trabalho sobre o principal propósito de auditoria papéis de trabalho. Qual das seguintes é mais adequada resposta fornecido pelo supervisor do trabalho?","options_pt":{"A":"Papéis de trabalho facilitate o trabalho de auditoria qualidade revisar como eles definir função de auditoria interna propósito, autoridade, e responsabilidade.","B":"Papéis de trabalho contain as informações necessidade para auditores internos para draw conclusões em trabalho de auditoria resultados.","C":"Papéis de trabalho possibilitar auditores para fornecer escrito interim comunicação com administração atividade sob revisão para prompt resolução de significativo questões.","D":"Papéis de trabalho ajudar auditores comunicar com administração atividade sob revisão durante o exit reunião."},"correct":"B","explanation_pt":"Alternativa \"B\" está correta. O principal propósito de papéis de trabalho é para fornecer informação esse apoia auditores em drawing conclusões sobre trabalho de auditoria resultados, garantindo esse decisões são com base em well-documentarado evidências."},{"id":"M6_U1_Q1","num":1,"total":11,"module":"M6","unit":"U1","topic":"Riscos e Controles-Chave Relacionados a Processos de Negócio","question_pt":"Varejo empresa implementado novo estoque administração sistema esse caused frequente adiars e funcionário frustration devido a seu complexidade e falta de usuário- friendliness. Sobre revisar, ele foi determinado esse as questões stemmed de insuficiente attention para sistema mudança processos. Qual foi o mais provável causa poor sistema desempenho?","options_pt":{"A":"Sistemas que foram selected sem adequado buy-em por principal partes interessadas.","B":"Bottom-up abordagem quando desenvolvendo sistema requisitos.","C":"Ineficiente ou ineficaz ele mudança administração.","D":"Deficiências de controle contributed para inconsistent conformidade ou negative auditoria resultados."},"correct":"C","explanation_pt":"Alternativa \"C\" está correta. Ineficiente ele mudança administração é o mais provável causa de poor sistema desempenho porque ele pode levar para inadequado planejando, testando, e implementação de novo sistemas. Sem adequado mudança administração, potencial questões são não identificado e tratado durante o desenvolvimento e implantação fases, resulting em frustration e ineficiências para funcionários e clientes. Outro opções descrever possível contributing fatores mas são menos diretamente tied à implementação efalha de revisãode sistema mudanças."},{"id":"M6_U1_Q2","num":2,"total":11,"module":"M6","unit":"U1","topic":"Riscos e Controles-Chave Relacionados a Processos de Negócio","question_pt":"Um auditor decides para realizar giro de estoque analisa para ambos raw materials e finished bens inventories. Qual das seguintes é O auditor interno mais provável trying para identificar?","options_pt":{"A":"Áreas para definindo novo safety estoque políticas.","B":"Potencial problemas em contas pagar atividades.","C":"Necessidade para higher valores de estoque.","D":"Produtos para que administração tem não sido attuned para mudanças em mercado demand."},"correct
